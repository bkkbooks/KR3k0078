body:
  text: 漢書五傳張釋之字季南陽人也以資為郎事文帝十年不得調欲免歸中郎將爰盎知其賢惜其去乃請徙釋之補謁者釋之既朝畢因前言便宜事文帝稱善拜釋之為謁者僕射從行上登虎圈問上林尉禽獸簿十餘問尉左右視盡不能對虎圈嗇夫從旁代尉對上所問禽獸簿甚悉欲以觀其能口對響應無窮者文帝曰吏不當如此邪詔拜嗇夫為上林令釋之前曰陛下以絳侯周勃何人也上曰長者又復問東陽侯張相如何人也上復曰長者釋之曰夫絳侯東陽侯稱為長者此兩人言事曾不能出口豈效嗇夫喋喋利口捷給哉且秦以任刀筆之吏爭以亟疾苛察相高其弊徒文具無惻隱之實以故不聞其過陵夷至於二世天下土崩今陛下以嗇夫口辨而超遷之臣恐天下隨風靡爭口辨無其實且下之化上疾於景響舉措不可不察也文帝曰善乃止從行至霸陵上顧謂群臣曰嗟乎以北山石為用紵絮斫陳漆其間豈可動哉左右皆曰善釋之前曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石又何戚焉文帝稱善其後拜釋之為廷尉頃之上行出中渭橋橋在兩岸之中也有一人從橋下走乘輿馬驚於是使騎捕屬廷尉釋之奏當此人犯蹕蹕止行人當罰金上怒曰此人親驚吾馬馬賴和柔令他馬固不敗傷我乎而廷尉乃當之罰金釋之曰法者天子所與天下公共也今法如是更重之是法不信於民也且方其時上使使誅之則已今已下廷尉廷尉天下之平也一傾天下用法皆為之輕重民安所措其手足唯陛下察之良久曰廷尉當是也其後人有盜高廟坐前玉環得文帝怒下廷尉治奏當棄市上大怒曰人無道乃盜先帝器吾屬廷尉者欲致之族而君以法奏之非吾所以共承宗廟意也釋之曰法如是足矣且罪等俱死罪也盜玉環不若盜長陵土之逆也然以逆順為基今盜宗廟器而族之假令愚民取長陵一抔土不欲指言故以取土喻也陛下且何以加其法乎乃許廷尉當馮唐趙人也以孝著為郎中署長事文帝帝輦過問唐曰父老何自為郎家安在具以實言曰吾居代時吾尚食監高袪數為我言趙將李齊之賢戰於巨鹿下吾每飲食意未嘗不在巨鹿也每食念監所説李齊在巨鹿時也父老知之乎唐對曰齊尚不如廉頗李牧上曰嗟乎吾獨不得廉頗李牧時為將豈憂胸奴哉唐曰陛下雖有頗牧不能用也上怒起入禁中良久召唐復問曰公何以言吾不能用頗牧也對曰臣聞上古王者遣將也跪而推轂曰闑以內寡人制之闑以外將軍制之門中橛為闑也軍功爵賞皆決於外歸而奏之此非空言也李牧之為趙將居邊軍市之租皆自用饗士賞賜決於外不從中覆也委任而責成功故李牧乃得盡其知能是以北逐單于破東胡滅淡林胡名也西抑強秦南支韓魏今臣竊聞魏尚為雲中守軍市租盡以給士卒出私養錢五日一殺牛以饗賓客軍吏舍人是以胸奴遠避不近雲中之塞虜嘗一入尚帥車騎擊之所殺甚衆上功莫府一言不相應文吏以法繩之其賞不行愚以為陛下法太明賞太輕罰太重且魏尚坐上功首虜差六級陛下下之吏削其爵罰作之由此言之陛下雖得頗牧不能用也臣誠愚觸忌諱死罪文帝悅是日令唐持節赦魏尚復以為雲中守而拜唐為車騎都尉荀悅紀論曰以孝文之明本朝之治百寮之賢而賈誼見排逐張釋之十年不見省馮唐皓首屈於郎署豈不惜哉夫絳侯之忠功存社稷而由見疑不亦痛乎夫知賢之難用人之不易忠臣自固之難在明世且由若茲而況亂君暗主者乎然則屈原赴於汩子胥鴟夷於江安足恨哉周勃質朴忠誠高祖知之以為安劉氏者勃也既定漢室建立明主眷眷之心豈有已哉狼狽失據塊然囚執俯首拊襟屈於獄吏可不愍哉夫忠臣之於其主由孝子之於其親也盡心焉盡力焉進而喜非貪位也退而憂非懷寵也忠結於心巒慕不止進得及時樂行其道也故仲尼去魯遲遲吾行也孟軻去齊三宿而後出蓋彼誠仁聖之心也夫賈誼過湘弔屈原惻愴慟懷豈徒忿怨而已哉與夫茍患失之者異類殊意矣及其傅梁王哭泣而從之死豈可謂非至忠乎然而人主不察豈不哀哉及釋之屈而思歸馮唐困而後達又可悼也此忠臣所以泣血賢哲所以傷心也汲黯字長孺濮陽人也為人正直以嚴見憚武帝召為中大夫以數切諫不得久留內遷為東海太守黯學黃老言治民好清靜責大指而不細苛黯多病臥閣內不出歲餘東海大治召為主爵都尉治務在無為而已引大體不拘文法上曰汲黯何如人也嚴助曰使黯任職居官亡以愈人然至其輔少主雖自謂賁育弗能奪也上曰然古有社稷之臣至如汲黯近之矣大將軍青侍中上踞廁視之廁謂床邊踞床視之丞相弘宴見上或時不冠至如見黯不冠不見也嘗坐武帳黯前奏事上不冠望見黯避帳中使人可其奏其見敬禮如此張湯以更定律令為廷尉黯質責湯於上前曰公為正卿上不能先帝之功業下不能化天下之邪心安國富民使囹圄空虛何空取高皇帝約束紛更之為紛亂也而公以此無種矣黯時與湯論議湯辨常在文深小苛黯憤發罵曰天下謂刀筆吏不可以為公卿果然必湯也令天下重足而立側目而視矣賈山潁川人也孝文時言治亂之道借秦為諭名曰至言其辭曰夫布衣韋帶之士修身於內成名於外而使後世不絶息至秦則不然貴為天子富有天下賦斂重數赭衣半道群盜滿山使天下之人戴目而視傾耳而聽一夫大呼天下響應秦非徒如此也又起咸陽而西至雍離宮三百鐘鼓帷帳不移而具又為阿房之殿殿高數十仞東西五里南北千步從車羅騎四馬騖馳旌旗不撓為宮室之麗至於此使其後世曾不得聚廬而託處焉為馳道於天下東窮燕齊南極吳楚道廣五十步厚築其外隱以金椎作壁如甬道隱築也以鐵椎築之也樹以青松為馳道之麗至於此使其後世曾不得邪徑而託足焉死葬乎驪山吏徒數十萬人曠日十年下徹三泉冶銅錮其內漆塗其外被以珠玉飾以翡翠中成觀遊上成山林為葬埋之侈至於此使其後世曾不得蓬顆蔽冢而託葬焉蓬顆猶裸顆小冢秦以熊羆之力虎狼之心蠶食諸侯并吞海內而不篤禮義故天殃已加矣臣昧死以聞願陛下少留意而詳擇其中臣聞忠臣之事君也言切直則不用其身危不切直則不可以明道故切直之言明主所欲急聞忠臣之所以蒙死而竭智也地之磽者雖有善種不能生焉江皋河瀕雖有惡種無不猥大故地之美者善養禾君之仁者善養士雷霆之所擊無不摧折者萬鈞之所壓無不糜滅者今人主之威非特雷霆勢重非特萬鈞也開道而求諫和顏色而受之用其言而顯其身士猶恐懼而不敢自盡又乃況於縱欲恣行暴虐惡聞其過乎震之以威壓之以重則雖有堯舜之智孟賁之勇豈有不摧折者哉如此則人主不得聞其過失矣弗聞則社稷危矣古者聖王之制史在前書過失工誦針諫庶人謗於道商旅議於市然後君得聞其過失也聞其過失而改之見義而從之所以永有天下也天子之尊四海之內其義莫不為臣然而養三老於大學舉賢以自輔弼求修正之士使直諫故尊養三老示孝也立輔弼之臣者恐驕也置直諫之士者恐不得聞其過也學問至於芻蕘者求善無厭也商人庶人誹謗己而改之從善無不聽也昔者秦力并萬國富有天下破六國以為郡縣築長城以為關塞秦地之固大小之勢輕重之權其與一家之富一夫之疆胡可勝計也然而兵破於陳涉地奪於劉氏者何也秦王貪狼暴虐殘賊天下窮困萬民以適其欲也昔者周蓋千八百國以九州之民養千八百之君用民之力不過歲三日什一而藉君有餘財民有餘力而頌聲作秦皇帝以千八百國之民自養力疲不勝其役財盡不勝其求一君之身所以自養者馳騁弋獵之娛天下弗能供也勞疲者不得休息飢寒者不得衣食無辜死刑者無所告訴人與之為怨家與之為讎故天下壞也身死才數月天下四面而攻之宗廟滅絶矣秦皇帝居滅絶之中而不自知者何也天下莫敢告也其所以莫敢告者何也無養老之義無輔弼之臣無進諫之士縱恣行誅退誹謗之人殺直諫之士是以偷合茍容比其德則賢於堯舜課其功則賢於湯武天下已潰而莫之告也詩曰非言不能胡此畏忌此之謂也又曰濟濟多士文王以寧天下未嘗無士也然而文王獨言以寧者何也文王好仁故仁興得士而敬之則士用用之有禮義故不致其愛敬則不能盡其心則不能盡其力則不能成其功故古之賢君於其臣也尊其爵祿而親之疾則臨視之無數死則弔哭之為之服錫衰而三臨其喪未斂不飲酒食肉未葬不舉樂當宗廟之祭而死為之廢樂故古之君人者於其臣也可謂盡禮矣故臣下莫敢不竭力盡死以報其上功德立於後世而今問不忘也鄒陽齊人也事吳王濞濞以太子事怨望稱疾不朝陰有邪謀陽奏書諫吳王不納其言去之梁從孝王遊陽為人有智略慨不茍合介於羊勝公孫詭之間勝等疾陽惡之於孝王孝王怒下陽吏將殺之陽乃從獄中上書曰臣聞忠無不報信不見疑臣常以為然徒虛語耳昔者荊軻慕燕丹之義白虹貫日太子畏之燕太子丹厚養荊軻令西刺秦王其精誠感天白虹為之貫日也白虹兵象也日君象也衛先生為秦畫長平之事太白食昂昭王疑之白起為秦伐趙破長平軍欲遂滅趙遣衛先生説昭王益兵糧為應侯所害事不成其精誠上達於天故太白為之食昂昂趙分也夫精變天地而信不諭兩主豈不哀哉今臣盡忠竭誠畢議願知盡其計議願王知之也左右不明卒從吏訊為世所疑是使荊軻衛先生復起而燕秦不寤也願大王孰察之昔玉人獻寶楚王誅之李斯竭忠胡亥極刑是以箕子陽狂接輿避世恐遭此患也願大王察玉人李斯之意而後楚王胡亥之聽無使臣為箕子接輿所笑臣聞比干剖心子胥鴟夷臣始不信乃今知之願大王孰察少加憐焉語曰有白頭如新傾蓋如故何則知與不知也故樊於期逃秦之燕借荊軻首以奉丹事於期為秦將被讒走之燕始皇滅其家又重購之燕遣軻刺始皇於期自刎首令軻齎往也王奢去齊之魏臨城自剄以卻齊而存魏王奢齊臣也亡至魏其後齊伐魏奢登城謂齊將曰今君之來不過以奢故也義不茍生以為魏纍也遂自剄夫王奢樊於期非新於齊秦而故於燕魏也所以去二國死兩君者行合於志慕義無窮也蘇秦相燕人惡於燕王燕王按劍而怒食以駃騠駃騠駿馬也敬重蘇秦雖有讒謗而更食以珍奇之味也白圭顯於中山人惡之魏文侯文侯賜以夜光之璧何則兩主二臣剖心析肝相信豈移於浮辭哉女無美惡入宮見妒士無賢不肖入朝見疾昔司馬喜臏腳於宋卒相中山范睢拉脅折齒於魏卒為應侯此二人者皆信必然之畫捐朋黨之私故不能自免於疾妒之人也百里奚乞於道路繆公委之以政寧戚飯牛車下桓公任之以國此二人者豈素宦於朝借譽左右然後二主用之哉感於心合於行堅如膠漆昆弟不能離豈惑於衆口哉故偏聽生姦獨任成亂昔魯聽季孫之説逐孔子宋任子冉之計囚墨翟夫以孔墨之辨不能自免於讒諛而二國以危何則衆口鑠金積毀銷骨也秦用戎人由余而伯中國齊用越人子臧而強威宣此二國豈係於俗牽於世繫奇偏之辭哉公聽並觀垂明當世故意合則胡越為兄弟由余子臧是矣不合則骨肉為讎敵朱象管蔡是矣今人主誠能用齊秦之明後宋魯之聽則五伯不足侔而三王易為也夫晉文親其讎強伯諸侯齊桓用其仇而匡天下何則慈仁殷勤誠加於心不可以虛辭借也至夫秦用商鞅之法東弱韓魏立強天下卒車裂之越用大夫種之謀禽徑吳而伯中國遂誅其身是以孫叔敖三去相而不悔於陵子仲辭三公為人灌園也今人主誠能去驕傲之心懷可報之意披心腹見情素墮肝膽施德厚無愛於士則桀之狗可使吠堯跖之客可使刺由何況因萬乘之權假聖王之資乎然則荊軻沈七族要離燔妻子豈足為大王道哉臣聞明月之珠夜光之璧以暗投人於道衆莫不按劍相盻者何則無因而至前也蟠木根柢輪囷離奇根柢下本也輪囷離奇委曲盤戾也而為萬乘器者以左右先為之容也故無因至前雖出隨珠和璧祇結怨而不見德有人先遊則枯木朽株樹功而不忘今夫天下布衣窮居之士身在貧羸雖蒙堯舜之術狹伊管之辨懷龍逢比干之意而素無根柢之容雖竭精神欲開忠於當世之君則人主必襲案劍相盻之矣是使布衣之士不得為枯木朽株之資也今人主沈諂諛之辭牽帷牆之制使不羈之士與牛驥同皂此鮑焦所以憤於世也臣聞盛飾入朝者不以私汙義砥礪名號者不以利傷行故里名勝母曾子不入邑號朝歌墨子回車今欲使天下寥廓之士籠於威重之權脅於位勢之貴回面汙行以事諂諛之人而求親近於左右則士有伏死堀穴巖藪之中耳安有盡忠信而趨闕下者哉書奏孝王立出之卒為上客枚乘字叔淮陰人也為吳王濞郎中吳王之初怨望謀為逆也乘奏書諫曰臣聞得全者全昌失全者全亡忠臣不避重誅以直諫則事無遺策功流萬世臣乘願披心腹而效愚忠唯大王少加意念於臣乘言夫以一縷之任係千鈞之重上懸之無極之高下垂之不測之深雖甚愚之人猶知哀其將絶也馬方駭鼓而驚之係方絶又重鎮之係絶於天不可復結墜入深泉難以復出其出不出間不容髮言其激切甚急也能聽忠臣之言百舉必脫必若所欲為危於纍卵難於上天變所欲為易於反掌安於泰山今欲極天命之壽敝無窮之樂究萬乘之藝不出反掌之易以居泰山之安而欲乘纍卵之危走上天之難此愚臣之所大惑也人性有畏其影而惡其者卻背而走逾多影逾疾不知就陰而止影滅絶欲人勿聞莫若勿言欲人勿知莫若勿為欲湯之滄滄寒也一人炊之百人揚之無益也不如絶薪止火而已不絶之於彼而救之於此譬由抱薪而救火也夫銖銖而稱之至石必差寸寸而度之至丈必過石稱丈量徑而寡失夫十圍之木始生而如蘗足可搔而絶手可擢而拔據其未生先其未形也磨礱砥礪不見其損有時而盡種樹畜養不見其益有時而大積德纍行不知其善有時而用棄義背理不知其惡有時而亡臣願大王孰計而行之此百世不易之道也吳王不納乘去而之梁路溫舒字長君巨鹿人也宣帝初即位溫舒上書言宜尚德緩刑其辭曰臣聞齊有無知之禍而桓公以興晉有驪姬之難而文公用伯近世諸呂作亂而孝文為大宗由是觀之禍亂之作將以開聖人也帝永思至德以承天心崇仁義省刑罰通關梁一遠近敬賢如大賓愛民如赤子內恕情之所安而施之海內是以囹圄空虛天下太平夫繼變化之後必有異舊之德此賢聖所以昭天命也陛下初登至尊宜改前世之失滌煩文除民疾存亡繼絶以應天意臣聞秦有十失其一尚存治獄之吏是也秦之時羞文學好武勇賤仁義之士貴治獄之吏正言者謂之誹謗遏過者謂之妖言故盛服先生不用於世忠良切言皆鬱於胸譽諛之聲日滿於耳虛美熏心實禍蔽塞此乃秦之所以亡天下也方今天下賴陛下厚恩無金革之危飢寒之患然太平未洽者獄亂之也夫獄者天下之大命死者不可生斷者不可屬書曰與殺不辜寧失不經今治獄吏則不然上下相毆以刻為明深者獲公名平者多後患故治獄之吏皆欲人死非憎人也自安之道在人之死是以死人之血流離於市被刑之徒比肩而立大辟之計歲以萬數此仁聖之所傷也太平之未洽凡以此也夫人情安則樂生痛則思死捶楚之下何求而不得故囚人不勝痛則飾辭以示之吏治者利其然則指道以明之上奏畏卻則鍛鍊而周內之精孰周悉致之法中也蓋奏當之成雖咎繇聽之猶以為死有餘何則成練者衆文致之罪明也是以獄吏專為深刻殘賊不顧國患此世之大賊也故俗語曰畫地為獄議不入刻木為吏期不對此皆疾吏之風悲痛之辭也故天下之患莫深於獄敗法亂正離親塞道莫甚乎治獄之吏此所謂一尚存者也臣聞烏鳶之卵不毀而後鳳皇集誹謗之罪不誅而後良言進故古人有言曰山藪藏疾川澤納汙瑾瑜匿惡國君含詬唯陛下除誹謗以招切言開天下之口廣針諫之路掃亡秦之失尊文武之德省法制寬刑罰則太平之風可興於世永履和樂與天無極天下幸甚上善其言蘇建杜陵人也子武字子卿武帝遣武以中郎將持節送胸奴使與副中郎將張勝及假吏常惠等俱會虞常等謀反胸奴中虞常在漢時素與副張勝相知私候勝曰聞漢天子甚怨衛律常能為漢殺之吾母與弟在漢幸蒙其賞人夜亡告之單于怒召諸貴人議欲殺漢使者左伊秩訾曰胡官號也即謀單于何以復加宜皆降之單于使衛律召武受辭武曰屈節辱命雖生何面目以歸漢引佩刀自刺衛律驚自抱持武氣絶半日復息單于壯其節使使曉武會論虞常欲因此時降武劍斬虞常已律曰單于募降者赦罪舉劍欲擊之勝請降律謂武曰副有罪當相坐復舉劍擬之武不動律曰蘇君律前負漢歸胸奴幸蒙大恩賜號稱王擁衆數萬馬畜彌山富貴如此蘇君今日降明日復然空以身膏草野誰復知之武不應律曰君因我降與君為兄弟今不聽吾計後雖欲復見我尚可得乎武律曰汝為人臣子不顧恩義畔主背親為降虜於蠻夷何以汝為見且單于信汝使決人死生不平心持正反欲兩主觀禍敗南越殺漢使者屠為九郡宛王殺漢使者頭懸北闕朝鮮殺漢使者即時誅滅獨胸奴未耳若知我不降明欲令兩國相攻胸奴之禍從我始矣律知武終不可脅白單于單于愈益欲降之遒幽武置大窖中絶不飲食天雨雪武臥齧雪與旃毛并咽之數日不死胸奴以為神乃徙武北海上無人處使牧羝羊曰羊乳乃得歸武至海上稟食不至掘野鼠去草實而食之杖漢節而牧羊臥起操持節旄盡落單于使李陵至海上為武置酒設樂因謂武曰單于聞陵與子卿素厚故使陵來説足下虛心欲相待終不得歸空自苦無人之地信義安攸見乎來時太夫人已不幸子卿婦年少聞已更嫁矣獨有女弟二人兩女一男今復十餘年存亡不可知人生如朝露何久自苦如此陵始降時忽忽如狂自痛負漢加以老母繫保宮子卿不欲降何以過陵且陛下春秋高法令無常大臣無罪夷滅者數十家安危不可知尚復誰為乎願聽陵計武曰武父子無功德皆陛下所成就位列將爵通侯兄弟親近常願肝腦塗地今得殺身自效雖蒙斧鉞湯鑊誠甘樂之臣事君猶子事父子為父死無所恨願勿復再言陵與武飲數日復曰子卿一聽陵言武曰自分已死久矣王必欲降武請畢今日之歡效死於前陵見其至誠喟然歎曰嗟乎義士陵與衛律之罪上通天因泣下霑襟與武決去武留胸奴十九年始以強壯出及還須髮盡白在胸奴聞上崩南向號哭歐血旦夕臨數月卒得全歸宣帝甘露三年單于始入朝上思股肱之美乃圖畫其人於麒麟閣法其形貌署其官爵姓名唯霍光不名曰大司馬大將軍博陸侯姓霍氏次曰衛將軍富平侯張安世次曰車騎將軍龍額侯韓增次曰後將軍營平侯趙充國次曰丞相高平侯魏相次曰丞相博陽侯丙吉次曰御史大夫建平侯杜延年次曰宗正陽成侯劉德次曰少府梁丘賀次曰太子太傅蕭望之次曰典屬國蘇武皆有功德知名當世是以表而揚之明中興輔佐列於方叔召虎仲山甫焉几十一人韓安國字長孺梁人也為御史大夫是時胸奴請和親上下其議大行王恢議曰漢與胸奴和親率不過數歲即背約不如勿許舉兵擊之安國曰千里而戰即兵不獲利今胸奴負戎馬足懷鳥獸心遷徙鳥集難得而制得其地不足為廣有其衆不足為強自古弗屬漢數千里爭利則人馬疲虜以全制其弊藝必危殆臣故以為不如和親群臣議多附安國於是上許和親明年雁門馬邑豪聶一因大行王恢言胸奴初和親親信邊可誘以利致之伏兵襲必破之道也上乃召問公卿曰朕飾子女以配單于幣帛文錦賂之甚厚單于待命加嫚侵盜無已邊境數驚朕甚閔之今欲舉兵攻之何如大行王恢對曰陛下雖未言臣固願效之臣聞全伐之時北有強胡之敵內連中國之兵然尚得養老長幼倉廩常實胸奴不輕侵也今以陛下威海內為一又遣子弟乘邊守塞轉粟挽輸以為之備然胸奴侵盜不已者無他以不恐之故耳臣竊以為擊之便安國曰不然臣聞高皇帝嘗圍於平城七日不食天下歌之解圍反位而無忿怒之心夫聖人以天下為度者也不以己私怒傷天下之功故乃遣劉敬奉金千斤以結和親至今為五世利孝文皇帝又嘗一擁天下之精兵聚之廣武常溪然無尺寸之功而天下黔首無不憂者孝文寤於兵之不可宿故復合和親之約此二聖之足以為效矣臣竊以為勿擊便恢曰不然臣聞五帝不相襲禮三王不相復樂非故相反也各因世宜且高帝所以不報平城之怨者非力不能所以休天下之心也今邊境數驚士卒傷死中國槥車相望此仁人之所隱也隱痛也臣故曰擊之便安國曰不然臣聞利不十者不易業功不百者不變常且自三代之盛夷狄不與正朔服色非威不能制強弗能服也以為遠方絶地不牧之臣不足煩中國也且胸奴輕疾悍亟之兵也至如猋風去如收電逐獸隨草居處無常難得而制今使邊郡久廢耕織以支胡之常事其勢不相權也臣故曰勿擊便恢曰不然臣聞鳳鳥乘於風聖人因於時昔秦穆公都雍地方三百里知時宜之變攻取西戎闢地千里及後蒙恬為秦侵胡闢數千里以河為境胸奴不敢飲馬於河夫胸奴獨可以威服不可以仁畜也今以中國之威萬倍之資遣百分之一以攻胸奴譬猶以強弩射且潰之癰也必不留行矣若是則北發月氏可得而臣也故曰擊之便安國曰不然臣聞用兵者以飽待飢正治以待其亂定舍以待其勞故接兵覆衆伐國墮城常坐而役敵國此聖人之兵也且臣聞之衝風之衰不能起毛羽強弩之末力不能入魯縞夫盛之有衰猶朝之有暮也今卷甲輕舉深入長驅難以為功從行則迫脅橫行則中絶疾則糧乏徐則後利不至千里人馬乏食兵法曰遺人獲也意者有他繆巧以禽之則臣不知也不然則未見深入之利也臣故曰勿擊便恢曰不然夫草木遭霜者不可以風過清水明鏡不可以形逃通方之士不可以文亂今臣言擊之者固非發而深入也將順因單于之欲誘而致之邊吾選驍騎壯士審遮險阻吾勢已定或營其左或營其右或當其前或絶其後單于可禽百全必取上曰善乃從恢議陰使聶一為間亡入胸奴謂單于曰吾能斬馬邑令丞以城降財物可盡得單于信以為然而許之聶一乃詐斬死罪囚懸其頭馬邑城下示單于使者於是單于穿塞將十萬騎入武州塞是時漢兵三十餘萬匿馬邑旁谷中約單于入馬邑縱兵擊之單于入塞未至馬邑百餘里覺之還去諸將竟無功恢坐自殺董仲舒廣川人也下帷讀書三年不窺園舉賢良武帝制問焉曰蓋聞五帝三王之道改制作樂而天下洽和百王同之聖王已沒鍾鼓管弦之聲未衰而大道微缺陵夷至乎桀紂之行作王道大壞矣夫五百年之間守文之君當塗之士欲則先王之法以戴翼其世者甚衆然猶不能反日以仆滅至後王而後止豈其所持操或悖繆而失統與固天降命不可復反與夙興夜寐法上古者又將無補與三代受命其符安在災異之變何緣而起性命之情或夭或壽或仁或鄙習聞其號未燭厥理伊欲風流而令行刑輕而姦改百姓和樂政事宣昭何修何飾而膏露降百穀登德潤四海澤臻草木三光全寒暑平受天之祜享鬼神之靈德澤洋溢施乎方外延及群生士大夫其明以諭朕靡有所隱仲舒對曰陛下發德音下明詔求天命與情性皆非愚臣之所能及也臣謹按春秋之中視前世已行之事以觀天人相與之際甚可畏也國家將有失道之敗而天乃先出災害以譴告之不知自省又出怪異以警懼之尚不知變而傷敗乃至以此見天心之仁愛人君而欲止其亂也自非大無道之世者天盡欲扶持而全安之事在強勉而已矣強勉學問則聞見博而智益明強勉行道則德日起而大有功此皆可使還至而立有效者也夫人君莫不欲安存而惡危亡然而政亂國危者甚衆所任者非其人而所由者非其道也夫周道衰於幽厲非道亡也幽厲不由也至於宣王思昔先王之德周道粲然復興此夙夜不懈行善之所致也孔子曰人能弘道非道弘人也故治亂廢興在於己非天降命不可得反也及至後世淫泆衰微諸侯背叛廢德教而任刑罰刑罰不中則生邪氣邪氣積於下怨惡蓄於上上下不和陰陽繆戾而妖孽生矣此災異所緣而起也故堯舜行德則民仁壽桀紂行暴則民鄙夭夫上之化下下之從上猶泥之在鈞唯甄者之所為陶人作瓦器謂之甄猶金之在鎔唯冶者之所鑄綏之斯動之斯和此之謂也天道之大者在陰陽陽為德陰為刑刑主殺而德主生是故陽常居大夏而以生育養長為事陰常居大冬而積於空虛不用之處以此見天之任德不任刑也天使陽出布施於上而主歲功使陰入伏於下而時出佐陽陽不得陰之助亦不能獨成歲也王者承天意以從事故任德教而不任刑刑者不可任以治世猶陰之不可任以成歲也為政而任刑不順於天故先王莫之肯為也今廢先王任德教之官而獨用執法之吏治民無乃任刑之意與孔子曰不教而誅謂之虐虐政用於下而欲德教之被四海故難成也故為人君者正心以正朝廷正朝廷以正百官正百官以正萬民正萬民以正四方四方正遠近莫敢不一於正而無有邪氣姦其間者是以陰陽調而風雨時群生和而萬民殖天地之間被潤澤而大豐美四海之內聞盛德而皆臣諸福之物可致之祥莫不畢至而王道終矣孔子稱鳳鳥不至河不出圖吾已矣夫自悲能致此物而身卑賤不得致也今陛下居得致之位操可致之勢又有能致之資然而天地未應而美祥莫至者何也凡民之從利如水之走下不以教化隄防之不能止也是故教化立而姦邪皆止者其隄防完也教化廢而姦邪皆出刑罰不能勝者其隄防壞也古之王者莫不以教化為大務立大學以教於國設庠序以化於邑漸民以仁摩民以義節民以禮故其刑罰甚輕而禁不犯者教化行而習俗美也聖王之繼亂世也掃除其而悉去之復修教化而崇起之教化已明習俗已成子孫循之行五六百歲尚未敗也至周之末世大為無道以失天下秦繼其後猶不能改又益甚之重禁文學棄捐禮誼其心欲盡滅先聖之道而專為自恣茍簡之治故立為天子十四歲而國破亡矣自古以來未嘗有以亂濟亂大敗天下之民如秦者也其遺毒餘烈至今未滅今漢繼秦之後如朽木糞牆矣雖欲善治之無可奈何法出而姦生令下而詐起如以湯止沸以薪救火愈甚無益也竊譬之琴瑟琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也當更張而不更張雖有良工不能善調也當更化而不更化雖有大賢不能善治也故漢得天下以來常欲善治而至今不可善治者失之於當更化而不更化也古人有言臨川而羡魚不如退而結網今臨政而願治七十餘歲矣不如退而更化更化則可善治善治則災害日去福祿日來夫仁誼禮智信五常之道王者所當修飾也王者修飾故受天之祜而享鬼之靈德施乎方外延及群生也天子覽其對而異焉制曰蓋聞虞舜之時垂拱無為而天下太平周文王至於日昃不暇食而宇內亦治夫帝王之道豈不同條共貫與何逸勞之殊也殷人執五刑以督姦傷肌膚以懲惡成康不式四十餘年天下不犯囹圄空虛秦國用之死者甚衆刑者相望朕夙寤晨興惟前帝王之憲功烈休德未始云獲今陰陽錯謬群生寡遂廉恥貿亂賢不肖渾殽未得其真明其指略稱朕意焉仲舒對曰臣聞堯受命以天下為憂而未聞以位為樂也故誅逐亂臣務求賢聖是以教化大行天下和洽虞舜因堯之輔佐繼其統業是以垂拱無為而天下治孔子曰韶盡善矣此之謂也至殷紂逆天暴物殺戮賢智天下耗亂萬民不安文王順天理物悼痛而欲安之是以日昃不暇食也由此觀之帝王之條貫同然而勞逸異所遇之時異也陛下愍世俗之靡薄悼王道之不昭故舉賢良方正之士論義考問將欲興仁誼之休德明帝王之法制建太平之道也此大臣輔佐之職三公九卿之任非臣仲舒所及也然而臣竊有所怪夫古之天下亦今之天下共是天下古以大治上下和睦不令而行不禁而止吏無姦邪囹圄空虛德潤草木澤被四海以古準今一何不相逮之遠也安所繆戾而陵夷若是意者有所失於古之道與有所詭於天之理與夫天亦有所分與與上齒者去其角傅其翼者兩其足是所受大者不得取小也古之所與祿者不食於力不動於末是亦受大者不得取小也夫已受大又取小天不能足而況人乎此民之所以囂囂苦不足也身寵而載高位家溫而食厚祿因乘富貴之資力以與民爭利於下民安能如之哉是故博其産業蓄其積委務此而無已以迫蹴民民寖以大窮富者奢侈羡溢貧者窮急愁苦而上不救則民不樂生民不樂生尚不避死安能避罪此刑罰之所以繁而姦邪不可勝者也故受祿之家食祿而已不與民爭業然後利可均布而民可家足也此上天之理而太古之道天子之所宜法以為制大夫之所當循以為行也故公儀子怒而出其婦慍而拔其葵曰吾已食祿矣又奪園夫工女利乎古之賢人君子在列位者皆如是故下高其行而從其教民化其廉而不貪鄙故詩曰赫赫師尹民具爾瞻由是觀之天子大夫者下民之所視效豈可以居賢人之位而為庶人行哉皇皇求財利常恐匱乏者庶人之意也皇皇求仁義常恐不能化民者大夫之意也易曰負且乘致寇至乘車者君子之位也負擔者小人之事也此言居君子之位而為庶人行者其患禍必至也
