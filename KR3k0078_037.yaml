body:
  text: 吳子圖國吳子曰古之圖國家者必先教百姓而親萬民民有三不和不和於國不可以出軍不和於軍不可以出陣不和於陣不可以進戰凡兵所起者五一曰爭名二曰爭利三曰積惡四曰內亂五曰困飢其名又五一曰義兵二曰強兵三曰剛兵四曰暴兵五曰逆兵禁暴救亂曰義恃眾以伐曰強因怒興師曰剛棄禮貪利曰暴國危民疲舉事動眾曰逆五者之數各有其道義必以禮服強必以謙服剛必以辭服暴必以詐服逆必以權服此其勢也論將夫總文武者軍之將也兼剛柔者兵之事也凡人之論將恆觀之於勇勇之於將乃數分之一耳夫勇者輕命而不知利未可也故將之所慎者五一曰理二曰備三曰果四曰戒五曰約理者治眾如治寡備者出門如見敵果者迎敵不懷生戒者雖克如始戰約者法令省而不煩受命而不辭家敵破而後言反將之禮也故師出之日有死而榮無生而辱也凡制國治軍必設之以禮厲之以義在大足以戰在小足以守矣然戰勝易守勝難是故以勝得天下者稀以亡者眾武侯曰願聞陣必定戰必勝守必固之道對曰君使賢者居上不肖處下則陣已定矣民安其田宅親其有司則守已固矣百姓皆是吾居而非鄰國則戰已勝矣治兵武侯問曰兵以何為勝吳子曰兵以治為勝又問不在眾乎對曰若法令不明賞罰不信金之不止鼓之不進雖有百萬之師何益於用所謂治者居則有禮動則有威進不可當退不可追前卻如節左右應麾投之所往天下莫當名曰父子之兵也勵士武侯曰嚴刑明賞足以勝敵乎吳子曰嚴明之事非所恃也發號布令而民樂聞興師動眾而民樂戰交兵接刃而民安死此三者人之所恃也武侯曰致之柰何對曰君舉有功而進之饗無功而厲之於是武侯設坐廟庭為三行饗士大夫上功坐前行肴席有重器上牢次功坐中行肴席器差減無功坐後行肴席無重饗畢而出乃又班賜有功者之父母妻子於廟門之外亦以功為差數唯無功者不得耳死事之家歲使使者勞賜其父母行之五年秦人興師臨於西河魏士聞之介冑不待吏令舊擊之者以萬數吳子曰臣聞之人有短長氣有盛衰君試發無功者五萬人臣請率以當之其可乎今使一死賊伏於曠野千人追之莫不梟視狼顧何者恐其暴起而害己也是則一人投命足懼千夫今臣以五萬之眾而為一死賊以率討之固難當矣武侯從之兼車五百乘騎三千匹而以破秦五十萬眾此勵士之功也魏武侯嘗謀事群臣莫能及罷朝而有喜色吳起進曰昔楚莊王謀事群臣莫能及罷朝而有憂色曰寡人聞之世不絕聖國不乏賢能得其師者王能得其友者霸今寡人不才而群臣莫之過國其殆矣莊王所憂而君悅之臣竊懼矣於是武侯乃慚六法先王當時而立法度務而制事法宜其時則治事適其務故有功然則法有時而治事有當而功今時移而法不變務易而事以古是法與時詭而事與務易也故法立而亂益務為而事廢故聖人之治國也不法古不循今當時而立功在難而能免今民能變俗矣而法不易國形更勢矣而務以古夫法者民之治也務者事之用也國失法則危事失用則不成故法不當時而務不適用而不危者未之有也脩權國之所以治者三一曰法二曰信三曰權法者君臣之所共操也信者君臣之所共立也權者君之所獨制也人主失守則危君臣釋法任私則亂故立法明分而不以私害法則治權制獨斷於君則威民信其賞則事功不信其刑則姦無端矣唯明主愛權重信而不以私害法也故上多惠言而不克其賞則下不用數加嚴命而不致其刑則民傲罪凡賞者文也刑者武也文武者法之約也故明主慎法不蔽之謂明不欺之謂察故賞厚而信刑重而必不失疏遠不私親近故臣不蔽主而下不欺上世之為治者多釋法而任私議此國之所以亂也先王懸權衡立尺寸而至今法之其分明也夫釋權衡而斷輕重廢尺寸而意長短雖察商賈不用為其不必也故法者國之權衡也夫背法度而任私議皆不知類者也故立法明分中程者賞毀公者誅賞誅之法不失其議故民不爭不以爵祿便近親則勞臣不怨不以刑罰隱疏遠則下親上故官賢選能不以其勞則忠臣不進行賞賦祿不稱其功則戰士不用凡人臣之事君也多以主所好事君君好法則臣以法事君君好言則臣以言事君君好法則端直之士在前君好言則毀譽之臣在側公私之分明則小人不嫉賢而不肖者不妒功故三王以義親五伯以法正諸侯皆非私天下之利也今亂世之君臣區區然皆欲擅一國之利而蒐一官之重以便其私此國之所以危也夫廢法度而好私議則姦臣鬻權以約祿秩官之吏隱下而漁民諺曰蠹眾而木折隙大而牆壞故大臣爭於私而不顧其民則下離上下離上者國之隙也秩官之吏隱下以漁百姓此民之蠹也故國有隙蠹而不亡者天下鮮矣故明主任法去私而國無隙蠹矣定分法令者民之命也為治之本也所以備民也智者不得過愚者不得不及名分不定而欲天下之治是猶欲無饑而去食欲無寒而去衣也其不幾亦明矣一兔走而百人追之非以兔為可分以為百由名之未定也夫賣兔者滿市盜不敢取由名分之定也故名分未定堯舜禹湯且皆加務而逐之名分已定貪盜不取今法令不明其名不定天下之人得議之此所謂名分不定也夫名分不定堯舜猶將皆折而奸之而況眾人乎故聖人必為法令置官也置吏也為天下師所以定分也名分定則大詐真信巨盜愿愨而各自治也故夫名分定勢治之道也名分不定勢亂之道也故勢治者不可亂也勢亂者不可治也夫勢亂而欲治之愈亂矣勢治而治之則治矣故聖人治治不治亂也聖人為民法必使之明白易知愚智能知之萬民無陷於險危也故聖人立天下而天下無刑死者非可刑殺而不刑殺也萬民皆知所以避禍就福而皆自治也明主因治而治之故天下大治也勸學學不倦所以治己也教不厭所以治人也是故子路卞之野人子貢衛之賈人顏涿聚盜也顓孫師駔也孔子教之皆為顯士夫學譬之猶礪也夫昆吾之金而銖父之錫使于越之工鑄之以為劍而勿加砥礪則以刺不入以擊不斷磨之礱礪加之以黃砥則其刺也無前其擊也無下自是觀之礪之與弗礪其相去遠矣今人皆知礪其劍而弗知礪其身夫學身之礪砥也夫子曰車唯恐地之不堅也舟唯恐水之不深也有其器則以人之難為易夫道以人之難為易也是故曾子曰父母愛之喜而不忘父母惡之懼而無咎然則愛與惡其於成孝無擇也史曰君親而近之至敬以遜貌而疏之敬無怨然則親與疏其於成忠無擇也孔子曰自娛於檃括之中直己而不直人以善廢而不邑邑蘧伯玉之行也然則興與廢其於成善無擇也屈侯附曰賢者易知也觀其富之所分達之所進窮之所不取然則窮與達其於成賢無擇也是故愛惡親疏廢興窮達皆可以成義有其器也桓公之舉管仲穆公之舉百里比其德也此所以國甚僻小身至穢污而為政於天下也今非比志意也比容貌非比德行也而論爵列亦可以卻敵服遠矣農夫比粟商賈比財烈士比義是故監門逆旅農夫陶人皆得與焉爵列私貴也德行公貴也奚以知其然也司城子罕遇乘封人而下其僕曰乘封人也奚為下之子罕曰古之所謂良人者良其行也貴人者貴其心也今天爵而人良其行而貴其心吾敢弗敬乎以是觀之古之所謂貴非爵列也所謂良非先故也人君貴於一國而不達於天下天子貴於一世而不達於後世唯德行與天地相弊也爵列者德行之舍也其所息也詩曰蔽芾甘棠勿翦勿敗召伯所憩仁者之所息人不敢敗也天子諸侯人之所以貴也桀紂處之則賤矣是故曰爵列非貴也今天下貴爵列而賤德行是貴甘棠而賤召伯也亦反矣夫德義也者視之弗見聽之弗聞天地以正厲物以無爵而貴不祿而尊也貴言范獻子遊於河大夫皆存君曰孰知欒氏之子大夫莫答舟人清涓舍楫而答曰君奚問欒氏之子為君曰自吾亡欒氏也其老者未死而少者壯矣吾是以問之清涓曰君善修晉國之政內得大夫而外不失百姓雖欒氏之子其若君何君若不修晉國之政內不得大夫而外失百姓則舟中之人皆欒氏之子也君曰善哉言明日朝令賜舟人清涓田萬畝清涓辭君曰以此田也易彼言也子尚喪寡人猶得也古之貴言也若此臣天下一天下也一天下者令於天下則行禁焉則止桀紂令天下而不行禁焉而不止故不得臣也目之所美心以為不義弗敢視也口之所甘心以為非義弗敢食也耳之所樂心以為不義不敢聽也身之所安心以為不義弗敢服也然則令於天下而行禁焉而止者心也故曰心者身之君也天子以天下受令於心心不當則天下禍諸侯以國受令於心心不當則國亡匹夫以身受令於心心不當則身為戮矣禍之始也易除其除之不可者避之及其成也欲除之不可欲避之不可治於神者其事少而功多干霄之木始若蘗足易去也及其成達也百人用斧斤弗能僨也熛火始起易息也及其焚雲夢孟諸雖以天下之役抒江漢之水弗能救也夫禍之始也猶熛火蘗足也易止也及其措於大事雖孔子墨翟之賢弗能救也屋焚而人救之則知德之年老者使塗隙戒突故終身無失火之患而不知德也入於囹圄解於患難者則三族德之教之以仁義慈悌則終身無患而莫之德夫禍亦有突賢者行天下而務塞之則天下無兵患矣而莫之知德也故曰聖人治於神愚人爭於神也天地之道莫見其所以長物而物長莫見其所以亡物而物亡聖人之道亦然其興福也人莫之見而福興矣其除禍也人莫之知而禍除矣故曰神人益天下以財為仁勞天下以力為義分天下以生為神修先王之術除禍難之本使天下丈夫耕而食婦人織而衣皆得戴其首父子相保此其分萬物以生盈天下以財不可勝計也神也者萬物之始萬事之紀也四儀行有四儀一曰志動不忘仁二曰智用不忘義三曰力事不忘忠四曰口言不忘信慎守四儀以終其身名功之從之也猶形之有影聲之有響也是故志不忘仁則中能寬裕智不忘義則行有文理力不忘忠則動無廢功口不忘信則言若符節若中寬裕而行文理動有功而言可信也雖古之有厚功大名見於四海之外知萬世之後者其行身也無以加於此矣明堂夫高顯尊貴利天下之徑也非仁者之所以輕也何以知其然耶日之能燭遠勢高也使日在井中則不能燭十步矣舜之方陶也不能利其巷下南面而君天下蠻夷戎狄皆被其福目在足下則不可以視矣天高明然後能燭臨萬物地廣大然後能載任群體其本不美則其枝葉莖心不得美矣此古今之大徑也是故聖王謹修其身以君天下則天道至焉地道稽焉萬物度焉古者明王之求賢也不避遠近不論貴賤卑爵以下賢輕身以先士故堯從舜於畎畝之中北面而見之不爭禮貌此先王之所以能正天地利萬物之故也今諸侯之君廣其土地之富而奮其兵革之強以驕士士亦務其德行美其道術以輕上此仁者之所非也曾子曰取人者必畏與人者必驕今說者懷畏而聽者懷驕以此行義不亦難乎非求賢務士而能致大名於天下者未之嘗聞也夫士不可妄致也覆巢破卵則鳳皇不至焉刳胎焚夭則騏驎不往焉竭澤漉魚則神龍不下焉夫禽獸之愚而不可妄致也而況於火食之民乎是故曰待士不敬舉士不信則善士不往焉聽言耳目不瞿視聽不深則善言不往焉孔子曰大哉河海乎下之也夫河下天下之川故廣人下天下之士故大故曰下士者得賢下敵者得友下眾者得譽故度於往古觀於先王非求賢務士而能立功於天下成名於後世者未之嘗有也夫求士不遵其道而能致士者未之嘗見也然則先王之道可知已務行之而已矣分天地生萬物聖人裁之裁物以制分便事以立官君臣父子上下長幼貴賤親疏皆得其分曰治愛得分曰仁施得分曰義慮得分曰智動得分曰適言得分曰信皆得其分而後為成人明王之治民也事少而功立身逸而國治言寡而令行事少而功多守要也身逸而國治用賢也言寡而令行正名也君人者茍能正名愚智盡情執一以靜令名自正令事自定賞罰隨名民莫不敬周公之治天下也酒肉不徹於前鐘鼓不解於懸聽樂而國治勞無事焉飲酒而賢舉智無事焉自為而民富仁無事焉知此道也者眾賢為役愚智盡情矣明王之道易行也勞不進一步聽獄不後皋陶食不損一味富民不後虞舜樂不損一日用兵不後湯武書之不盈尺簡南面而立一言而國治堯舜復生弗能更也身無變而治國無變而王湯武復生弗能更也執一之道去智與巧有虞之君天下也使天下貢善殷周之君天下也使天下貢才夫至眾賢而能用之此有虞之盛德也三人之所廢天下弗能興也三人之所興天下弗能廢也親曰不孝君曰不忠友曰不信天下弗能興也親言其孝君言其忠友言其信天下弗能廢也夫符節合之則是非自見行亦有符三者合則行自見矣此所以觀行也諸治官臨眾者上比度以觀其賢案法以觀其罪吏雖有邪僻無所逃之所以觀勝任也群臣之愚智日劾於前擇其知事者而令之謀群臣之所舉日劾於前擇其知人者而令之舉群臣之治亂日劾於前擇其勝任者而令之治群臣之行可得而察也擇其賢者而舉之則民競於行勝任者治則百官不亂知人者舉則賢者不隱知事者謀則大舉不失聖王正言於朝而四方治矣是故曰正名去偽事成若化以實覆名百事皆成夫用賢使能不勞而治正名覆實不罰而威達情見素則是非不蔽復本原始則言若符節良工之馬易御也聖王之民易治也其此之謂乎發蒙若夫名分聖之所審也造父之所以與交者少操轡馬之百節皆與明王之所以與臣下交者少審名分群臣莫敢不盡力竭智矣天下之可治分成也是非之可辨名定也無過其實罪也弗及愚也是故情盡而不偽質素而無巧故有道之君其無易聽此名分之所審也若夫臨官治事者案其法則民敬事任士進賢者保其後則民慎舉議國親事者盡其實則民敬言孔子曰臨事而懼希不濟易曰若履虎尾終之吉若群臣之眾皆戒慎恐懼若履虎尾則何不濟之有乎君明則臣少罪夫使眾者詔作則遲分地則速是何也無所逃其罪也言亦有地不可不分也君臣同地則臣有所逃其罪矣故陳繩則木之枉者有罪措準則地之險者有罪審名分則群臣之不審者有罪夫愛民且利之也愛而不利則非慈母之德也好士且知之也好而弗知則眾而無用也力於朝且治之也力而弗治則勞而無功矣三者雖異道一也是故曰審一之經百事乃成審一之紀百事乃理名實判為兩合為一是非隨名實賞罰隨是非是則有賞非則有罰人君之所獨斷也明君之立也正其貌壯其心虛其視不躁其聽不淫審分應辭以立於廷則隱匿疏遠雖有非焉必不多矣明君不用長耳目不行閒諜不強聞見形至而觀聲至而聽事至而應近者不過則遠者治矣明者不失則微者敬矣家人子姪和臣妾力則家富丈人雖厚衣食無傷也子姪不和臣妾不力家貧丈人雖薄衣食無益也而況於萬乘之君國之所以不治者三不知用賢此其一也雖知用賢求不能得此其二也雖得賢不能盡此其三也正名以御之則堯舜之智必盡矣明分以示之則桀紂之暴必止矣賢者盡暴者止則治民之道不可以加矣聽朝之道使人有分有大善者必問孰進之有大過者必云孰任之而行賞罰焉且以觀賢不肖也今有大善者不問孰進之有大過者不問孰任之則有分無益已問孰任之而不行賞罰則問之無益已是非不得盡見謂之蔽見而弗能知謂之虛知而弗能賞謂之縱三者亂之本也明分則不蔽正名則不虛賞賢罰暴則不縱三者治之道也於群臣之中賢則貴之不肖則賤之治則使之不治則愛之不忠則罪之賢不肖治不治忠不忠由是觀之猶白黑也陳繩而斲之則巧拙易知也夫觀群臣亦有繩以名引之則雖堯舜不服矣慮事而當不若進賢進賢而當不若知賢知賢又能用之備矣治天下之要在於正名正名去偽事成若化茍能正名天成地平為人臣者以進賢為功為人君者以用賢為功為人臣者進賢是自為置上也自為置上而無賞是故不為也進不肖者是自為置下也自為置下而無罪是故為之也使進賢者必有賞進不肖者必有罪無敢進也者為無能之人若此則必多進賢矣恕恕者以身為度者也己所不欲毋加諸人惡諸人則去諸己欲諸人則求諸己此恕也農夫之耨去害苗者也賢者之治去害義者也慮之無益於義而慮之此心之穢也道之無益於義而道之此言之穢也為之無益於義而為之此行之穢也慮中義則智為上言中義則言為師事中義則行為法射不善而欲教人人不學也行不修而欲談人人不聽也夫驥唯伯樂獨知之不害其為良馬也行亦然唯賢者獨知之不害其為善士也治天下治天下有四術一曰忠愛二曰無私三曰用賢四曰度量度量通則財足矣用賢則多功矣無私百智之宗也忠愛父母之行也奚以知其然父母之所畜子者非賢強也非聰明也非俊智也愛之憂之欲其賢己也人利之與我利之無擇也此父母所以畜子也然則愛天下欲其賢己也人利之與我利之無擇也則天下之畜亦然矣此堯之所以畜天下也有虞氏盛德見人有善如己有善見人有過如己有過天無私於物地無私於物襲此行者謂之天子誠愛天下者得賢奚以知其然也弱子有疾慈母之見秦醫也不爭禮貌在囹圄其走大吏也不愛資財視天下若子是故其見醫者不爭禮貌其奉養也不愛資財故文王之見太公望也一日五反桓公之奉管仲也列城有數此所以其僻小身至穢污而為正於天下也鄭簡公謂子產曰飲酒之不樂鐘鼓之不鳴寡人之任也國家之不入朝廷之不治與諸侯交之不得志子之任也子產治鄭國無盜賊道無餓人孔子曰若鄭簡公之好樂雖抱鐘而朝可也夫用賢身樂而名附事少而功多國治而能逸凡治之道莫如因智智之道莫如因賢譬之猶相馬而借伯樂也相玉而借猗頓也亦必不過矣今有人於此盡力以為舟濟大水而不用也盡力以為車行遠而不乘也則人必以為無慧今人盡力以學謀事則不借智處行則不因賢舍其學不用也此其無慧也有甚於舍舟而涉舍車而走者矣仁意治水潦者禹也播五種者后稷也聽獄折衷者皋陶也舜無為也而天下以為父母愛天下莫甚焉天下之善者唯仁也夫喪其子者茍可以得之無擇人也仁者之於善也亦是然故堯舉舜於畎畝湯舉伊尹於雍人內舉不避親外舉不避讎仁者之於善也無擇也無惡也唯善之所在堯問於舜曰何事舜曰事天平地而注水水流溼均薪而施火火從燥召之類也是故堯為善而眾美至焉桀為非而眾惡至焉廣因井中視星所視不過數星自丘上以視則見其始出又見其入非明益也勢使然也夫私心井中也公心丘上也故智載於私則所知少載於公則所知多矣何以知其然夫吳越之國以臣妾為徇中國聞而非之恕則以親戚徇一言夫智在公則愛吳越之臣妾在私則忘其親戚非智損也恕弇之也好亦然語曰莫知其子之惡也非智損也愛弇之也是故夫論貴賤辨是非者必且自公心言之自公心聽之而後可知也匹夫愛其宅不愛其鄰諸侯愛其國不愛其敵天子兼天下而愛之大也綽子堯養無告禹愛辜人湯武及禽獸此先王之所以安危而懷遠也聖人於大私之中也為無私其於大好惡之中也為無好惡舜曰南風之薰兮可以解吾民之慍兮舜不歌禽獸而歌民湯曰朕身有罪無及萬方萬方有罪朕身受之湯不私其身而私萬方文王曰茍有仁人何必周親不私其親而私萬國先王非無私也所私者與人不同也處道孔子曰欲知則問欲能則學欲給則豫欲善則肄國亂則擇其邪人去之則國治矣胸中亂則擇其邪欲而去之則德正矣天下非無盲者也美人之貴明目者眾也天下非無聾者也辨士之貴聰耳者眾也天下非無亂人也堯舜之貴可教者眾也孔子曰君子者盂也民者水也盂方則水方盂圓則水圓上何好而民不從昔者句踐好勇而民輕死靈王好細腰而民多餓夫死與餓民之所惡也君誠好之百姓自然而況仁義乎桀紂之有天下也四海之內皆亂而關龍逢王子比干不與焉而謂之皆亂其亂者眾也堯舜之有天下也四海之內皆治而丹朱商均不與焉而謂之皆治其治者眾也故曰君誠服之百姓自然卿大夫服之百姓若逸官長服之百姓若流夫民之可教者眾故曰猶水也德者天地萬物得也義者天地萬物宜也禮者天地萬物體也使天地萬物皆得其宜當其體者謂之大仁食所以為肥也壹飯而問人曰奚若則皆笑之夫治天下大事也今人皆壹飯而問奚若者也善人以治天地則可矣我奚為而人善仲尼曰得之身者得之民失之身者失之民不出於戶而知天下不下其堂而治四方知反之於己者也以是觀之治己則人治矣神明仁義聖智參天地天若不覆民將何恃何望地若不載民將安居安行聖人若弗治民將安率安將是故天覆之地載之聖人治之聖人之身猶日也夫日圓尺光盈天地聖人之身小其所燭遠聖人正己而四方治矣上綱茍直百目皆開德行茍直群物皆正正也者正人者也身不正則人不從是故不言而信不怒而威不施而仁有諸心而彼正謂之至政今人曰天亂矣難以為善此不然也夫饑者易食寒者易衣此亂而後易為德也大體夫一婦擅夫眾婦皆亂一臣專君群臣皆蔽故妒妻不難破家也亂臣不難破國也是以明君使其臣並進輻湊莫得專君今人君之所以高為城郭用謹門閭之閉者為寇戎盜賊之至也今夫弒君而取國者非必踰城郭之險而犯門閭之閉也蔽君之明塞君之聽奪之政而專其令有其民而取其國矣今使烏獲彭祖負千鈞之重而懷琬琰之美令孟賁成荊帶干將之劍衛之行乎幽道則盜猶偷之矣今人君之力非賢乎烏獲彭祖而勇非賢乎孟賁成荊也其所守者非恃琬琰之美千金之重也而欲勿失其可得耶明君如身臣如手君若號臣如響君設其本臣操其末君治其要臣行其詳君操其柄臣事其常為人臣者操契以責其名名者天地之綱聖人之符張天地之綱用聖人之符則萬物之情無所逃之矣故善為主者倚於愚立於不盈設於不敢藏於無事竄端匿疏示天下無為是以近者親之遠者懷之示人有餘者人奪之示人不足者人與之剛者折危者覆動者搖靜者安名自正也事自定也是以有道者自名而正之隨事而定之也鼓不與於五音而為五音主有道者不為五官之事而為治主君知其道也官人知其事也十言十當百為百當者人臣之事非君人之道也昔者堯之治天下也以名其名正則天下治桀之治天下也亦以名其名倚而天下亂是以聖人貴名之正也主處其大臣處其細以其名聽之以其名視之以其名命之鏡設精無為而美惡自備衡設平無為而輕重自得凡因之道身與公無事無事而天下自極也
