body:
  text: 漢書七傳朱雲字游魯人也成帝時故丞相安昌侯張禹以帝師位特進甚尊雲上書求見公卿在前雲曰今朝廷大臣上不能匡主下無以益民皆尸位素餐孔子所謂鄙夫不可與事君茍患失之亡所不至者也臣願賜尚方斬馬劍斷佞臣一人以厲其餘上問誰也對曰丞相安昌侯張禹上大怒曰小臣居下訕上廷辱師傅罪死不赦御史將雲下雲攀殿檻檻折雲呼曰臣得下從龍逢比干遊於地下足矣未知聖朝何如耳御史遂將雲去於是左將軍辛慶忌免冠解印綬叩頭殿下曰此臣素著狂直於世使其言是不可誅其言非固當容之臣以死爭慶忌叩頭流血上意解然後得已及後當治殿檻上曰勿易因而輯之以旌直臣雲自是之後不復仕梅福字子真九江人也成帝委任大將軍王鳳而京兆尹王章素忠直譏鳳為鳳所誅群下莫敢正言故福上書曰臣聞箕子陽狂於殷而為周陳洪範叔孫通遁秦歸漢制作儀品夫叔孫先非不忠也箕子非疏其家而叛親也不可為言也昔高祖納善若不及從諫若轉圜聽言不求其能舉功不考其素陳平起於亡命而為謀主韓信拔於行陳而建上將故天下之士雲合歸漢爭進奇異智者竭其策愚者盡其慮勇士極其節怯夫勉其死合天下之智並天下之威是以舉秦如鴻毛取楚若拾遺此高祖所以無敵於天下也士者國之重器得士則重失士則輕詩云濟濟多士文王以寧廟堂之議非草茅所當言也臣誠恐身塗野草尸并卒伍故數上書求見輒報罷臣聞齊桓之時有以九九見者桓公不逆欲以致大也今臣所言非特九九也陛下拒臣者三矣此天下士所以不至也今陛下既不納天下之言又加戮焉夫鵲遭害則仁鳥增逝愚者蒙戮則智士深退閒者愚民上疏多觸不急之法或下廷尉而死者衆自陽朔以來天下以言為諱朝廷尤甚群臣承順上指莫有執正何以明其然也取民所上書陛下之所善者試下之廷尉廷尉必曰非所宜言大不敬以此卜之一矣故京兆尹王章資質忠直敢面引廷爭孝元皇帝擢之以厲具臣而矯曲朝及至陛下戮及妻子惡惡止其身王章非有反叛之辜而殃及家折直士之節結諫臣之舌群臣皆知其非然不敢爭天下以言為戒最國家之大患也雋不疑字曼倩勃海人也為京兆尹吏民敬其威信始元五年有一男子乘黃犢車建黃旐衣黃襜褕著黃冒詣北闕自謂為衛太子詔使公卿將軍雜識視長安中吏民聚觀者數萬人右將軍勒兵闕下以備非常丞相御史中二千石至者立莫敢發言不疑後到叱從吏使收縛或曰是非未可知且安之不疑曰昔蒯聵違命出奔輒拒而不內春秋是之衛太子得罪先帝亡不即死今來自詣此罪人也遂送詔獄天子與大將軍霍光聞而嘉之曰公卿大臣當用經術明於大誼由是名聲重於朝廷在位者皆自以不及也廷尉驗治竟得奸詐疏廣字仲翁東海人也為太子太傅兄子受為少傅太子外祖父平恩侯許伯以為太子幼白使其弟中郎將舜監護太子家上以問廣廣對曰太子國儲副君師友必於天下英俊不宜獨親外家且太子自有太傅少傅官屬已傭今復使舜護太子家示陋非所以廣太子德於天下也上善其言以語丞相魏相相免冠謝曰此非臣等所能及廣由是見器重于定國字曼倩東海人也其父于公為郡決曹決獄平羅文法者于公所決皆不恨郡中為之生立祠名曰于公祠定國少學法於父為廷尉其決疑平法務在哀鰥寡罪疑從輕加審慎之心朝廷稱之曰張釋之為廷尉天下無冤民于定國為廷尉民自以為不冤遷御史大夫為丞相始定國父于公其閭門壞父老方共治之于公謂曰少高大閭門令容駟馬高蓋車我治獄未嘗有所冤子孫必有興者至定國為丞相子永為御史大夫封侯傳世云薛廣德字長卿沛郡人也為人溫雅及為三公直言諫爭成帝幸甘泉郊泰畤禮畢因留射獵廣德上書曰竊見關東困極民人流離陛下日撞亡秦之鐘聽鄭衛之樂臣誠悼之今士卒暴露從官勞倦願陛下亟反宮思與百姓同憂樂天下幸甚上即日還其秋上酎祭宗廟出便門欲御樓船廣德當乘輿車免冠頓首曰宜從橋詔曰大夫冠廣德曰陛下不聽臣臣自刎以血汙車輪陛下不得入廟矣上不悅先驅光祿大夫張猛進曰臣聞主聖臣直乘船危就橋安聖主不乘危御史大夫言可聽乃從橋王吉字子陽琅邪人也為諫大夫是時宣帝頗修武帝故事宮室車服盛於昭帝時外戚許史王氏貴寵而上躬親政事任用能吏吉上疏言得失曰陛下總萬方帝王圖籍日陳於前惟思世務將興大平詔書每下民欣然若更生臣伏而思之可謂至恩未可謂本務也欲治之主不世出公卿幸得遭遇其時言聽諫從然未有建萬世之長策舉明主於三代之隆者也其務在於期會簿書斷獄聽訟而已此非太平之基也臣聞聖王宣德流化必自近始朝廷不備難以言治左右不正難以化遠民者弱而不可勝愚而不可欺也聖主獨行於深宮得則天下稱誦之失則天下咸言之行發於近必見於遠謹選左右審擇所使左右所以正身也所使所以宣德也今俗吏所以牧民者非有禮義科指可世世通行者也獨設刑法以守之其欲治者不知所由以意穿鑿各取一切是以百里不同風千里不同俗詐僞萌生刑罰無極質朴日銷恩愛寖薄孔子曰安上治民莫善於禮非空言也臣願陛下承天心發大業與公卿大臣延及儒生述舊禮明王制驅一世之人躋之仁壽之域則俗何以不若成康壽何以不若高宗竊見當世趍務不合於道者謹條奏唯陛下裁擇焉吉意以為漢家列侯尚公主諸侯則國人承翁主娶天子女則曰尚公主國人娶諸侯女曰承翁主也使男事女夫詘於婦逆陰陽之位故多女亂古者衣服車馬貴賤有章以褒有德而別尊卑今上下僭差人人自制是故貪財趍利不畏死亡周之所以能致治刑措而不用者以其禁邪於冥冥絶惡於未萌也又言舜湯不用三公九卿之世而舉咎繇伊尹不仁者遠今使俗吏得任子弟漢舊儀子弟以父兄任為郎率多驕傲不通古今至於積功治人無益於民此伐檀所為作也宜明選求賢除任子之令外家及故人可厚以財不宜居位去角抵減樂府省尚方明視天下以儉民見儉則歸本本立而末成其指如此上以其言迂闊不甚寵異也吉遂謝病歸貢禹字少翁琅邪人也元帝初即位徵為諫大夫數虛己問以政事是時年歲不登郡國多困禹奏言古者宮室有制宮女不過九人馬不過八匹牆塗而不雕木摩而不刻車輿器物皆不文畫苑不過數十里與民共之任賢使能什一而稅無他賦斂繇戍之役使民歲不過三日故天下家給人足頌聲作至高祖孝文孝景循古節儉宮女不過十餘人廄馬百餘匹孝文皇帝衣綈履革器無雕文金銀之飾後世爭為奢轉轉益甚臣下亦相放效衣服亂於主上甚非宜然非自知奢僭也今大夫僭諸侯諸侯僭天子天子過天道其日久矣承衰救亂矯復古化在於陛下臣愚以為盡如大古難宜少放古以自節焉方今宮室已定無可奈何矣其餘盡可減損故時齊三服官輸物不過十笥方今齊三服官一歲費數巨萬蜀廣漢主金銀器歲各用五百萬三工官官費五千萬河內懷蜀郡成都廣漢皆有工官工官主漆器物東西織室亦然廄馬食粟將萬匹臣禹嘗從之東宮見賜杯案盡文畫金銀飾非當所以賜食臣下也東宮之費亦不可勝計天下之民所為大飢餓死者是也今民大飢而死人至相食而廄馬食粟苦其大肥氣盛怒至乃日步作之王者受命於天為民父母固當若此乎天不見邪武帝時又多取好女至數千人以填後宮及棄天下昭帝幼弱霍光專事不知禮正妄多藏金錢財物鳥獸魚凡百九十物盡瘞藏之又皆取後宮女置於園陵大失禮逆天心昭帝晏駕先復行之至孝宣皇帝時群臣亦隨故事甚可痛也故使天下承化及衆庶葬埋皆虛地上以實地下其過自上生皆在大臣循故事之也唯陛下深察古道從其儉者大減損乘輿服御器物三分去二審察後宮擇其賢者留二十人餘悉歸之諸陵園女無子者宜皆遺廄馬可無過數十匹獨舍長安城南苑地以為田獵之囿自城西南至鄠皆復其田以與貧民方今天下飢饉可無大自損減以救之稱天意乎天生聖人蓋為萬民非獨使自娛樂而已也當仁不讓獨可以聖心參諸天地揆之往古不可與臣下議也臣禹不勝拳拳不敢不盡愚心天子納善其忠乃下詔令太僕減食穀馬水衡減食肉獸省宜春下苑以與貧民又罷角抵諸戲及齊三服官遷禹為光祿大夫禹又言孝文皇帝時貴廉潔賤貪汙賞善罰惡不阿親戚罪白者伏其誅疑者以與民無贖罪之法故令行禁止海內大化與刑措無異武帝始臨天下尊賢用士闢地廣境數千里自見功大威行遂縱嗜欲用度不足乃行一切之變使犯法者贖罪入穀者補吏是以天下奢侈官亂民貧盜賊並起亡命者衆郡國恐伏誅則擇便巧史書習於計簿能欺上府者以為右職姦軌不勝則取勇猛能操切百姓以苛暴威服下者使居大位故無義而有財者顯於世欺謾而善書者尊於朝悖逆而勇猛者貴於官故俗皆曰何以孝悌為財多而光榮何以禮義為史書而仕宦何以謹慎為勇猛而臨官故黥劓而髡鉗者猶復攘臂為政於世而行雖犬彘家富藝足目指氣使是為賢耳謂居官而致富者為雄桀處姦而得利者為壯士兄勸其弟父勉其子俗之壞敗乃至於是察其所以然者皆以犯法得贖罪求士不得真賢相守崇財利誅不行之所致也今欲興至治致太平宜除贖罪之法相守選舉不以實及有臧者輒行其誅無但免官則爭盡力為善貴孝悌賤賈人進真賢舉實廉而天下治矣孔子匹夫之人耳以樂道正身不懈之故四海之內天下之君微孔子之言無所折中況乎以漢地之廣陛下之德處南面之尊因天地之助其於以變世易俗調和陰陽陶冶萬物化正天下易於決流抑墜墜物欲墜落也自成康以來幾且千歲欲為治者甚衆然而太平不復興者何也以其舍法度而任私意奢侈行而仁義廢也陛下誠深念高祖之苦醇法太宗之治正己以先下選賢以自輔開進忠正致誅姦臣遠放諂佞放出圍陵之女罷倡樂絶鄭聲去甲乙之帳退僞薄之物修節儉之化驅天下之民皆歸於農如此不懈則三王可侔五帝可及唯陛下留意省察天下幸甚上雖未盡從嘉其質直之意而省其半鮑宣字子都渤海人也為諫大夫以丁傅子弟並進董賢貴幸上書諫曰竊見孝成皇帝時外親持權人人牽引所私以充塞朝廷妨賢人路濁亂天下奢泰無度窮困百姓是以日蝕且十彗星四起危亡之徵升下所親見也今奈何反覆劇於前乎朝臣無有大儒骨鯁白首耆艾魁壘之士魁壘壯貌論議通古今喟然動衆心憂國如飢渴者臣未見也敦外親小童及幸臣董賢等在公門省戶下陛下欲與此共承天地安海內甚難今俗謂不智者為能謂智者為不能昔堯放四罪而天下服今除一吏而衆皆惑古刑人尚服今賞人反惑請寄為姦群小日進國家空虛用度不足民流亡去城郭盜賊並起吏為殘賊歲增於前凡民有七亡陰陽不和水旱為災一亡也縣官重責更賦租稅二亡也貪吏並公受取不已三亡也豪強大姓蠶食無厭四亡也苛吏繇役失農桑時五亡也部落鼓鳴男女遮列六亡也盜賊劫略取民財物七亡也七亡尚可又有七死酷吏驅殺一死也治獄深刻二死也冤陷無辜三死也盜賊橫發四死也怨讎相殘五死也歲惡飢餓六死也時氣疾疫七死也民有七亡而無一得欲望國安誠難民有七死而無一生欲望刑措誠難此非公卿守相貪殘成化之所致邪群臣幸得居尊官食重祿豈有肯加惻隱於細民助陛下流教化者邪志但在營私家稱賓客為姦利而已以茍容曲從為賢以拱默尸祿為智謂如臣宣等為愚陛下擢臣巖穴誠冀有益豪毛豈徒欲使臣美食大官重高門之地哉高門殿名天下乃皇天之天下也陛下上為皇天子下為黎庶父母為天牧養元元視之當如一合尸鳩之詩今貧民菜食不厭衣又穿空父子夫婦不能相保誠可為酸鼻陛下不救將安所歸命乎奈何獨私養外親與幸臣董賢多賞賜以大萬數使奴從賓客漿酒霍肉視酒如漿視肉如霍也蒼頭廬兒皆用致富非天意也漢名奴為蒼頭諸給殿中者所居為廬蒼頭侍從因呼廬兒及汝昌侯傅商無功而封夫官爵非陛下之官爵乃天下之官爵也陛下取非其官官非其人而望天悅民服不亦難乎治天下者當用天下之心為心不得自專快意而已也上之皇天見譴下之黎庶恨怨上以宣名儒優而納之宣復上書言陛下父事天母事地子養黎民即位以來父虧明母震動子訛言相驚恐今日蝕於三始正月一日為歲之朝月之朝日之朝始猶朝也誠可畏懼小民正月朔日尚恐毀敗器物何況於日虧乎魏相字弱翁濟陰人也為丞相宣帝與後將軍趙充國等議欲因胸奴衰弱出兵擊其右地使不敢復擾西域相上書諫曰臣聞救亂誅暴謂之義兵兵義者王敵加於己不得已而起者謂之應兵兵應者勝爭恨小故不勝憤怒者謂之忿兵兵忿者敗利人土地貨寶者謂之貪兵兵貪者破恃國家之大矜民人之衆欲見威於敵者謂之驕兵兵驕者滅此五者非但人事乃天道也閒者胸奴常有善意所得漢民輒奉歸之未有犯於邊境雖爭屯田車師不足致意中今聞諸將軍欲興兵入其地臣愚不知此兵何名者也今邊郡困乏父子共犬羊之裘食草萊之實常恐不能自存難以動兵軍旅之後必有凶年言民以其愁苦之氣傷陰陽之和也出兵雖勝猶有後憂恐災害之變因此以生今郡國守相多不實選風俗尤薄水旱不時案今年計子弟殺父兄妻殺夫者凡二百二十二人臣愚以為此非小變也今左右不憂此乃欲發兵報纖介之忿於遠夷殆孔子所謂吾恐季孫之憂不在顓臾而在蕭牆之內者也願陛下與有識者詳議乃可上從相言而止丙吉字少卿魯國人也代魏相為丞相吉本起獄法小吏及居相位尚寬大好禮讓嘗出逢清道群者死傷橫道吉過之不問掾史獨怪之吉前行逢人逐牛牛喘吉止駐使騎吏問逐牛行幾里矣掾史謂丞相前後失問或以譏吉吉曰民相殺傷長安令京兆尹職所當禁備逐捕歲竟丞相課其殿最奏行賞罰而已宰相不親小事非所當於道路問也方春少陽用事未可以熱恐牛近行用暑故喘此時氣失節恐有所傷害也三公典調和陰陽職所當憂是以問之掾史乃服以吉知大體京房字君明東郡人也以孝廉為郎是時中書令石顯專權顯友人五鹿充宗為尚書令與房同經論議相非二人用事房嘗宴見問上曰幽厲之君何以危所任者何人也上曰君不明而所任巧佞房曰知其巧佞而用之耶將以為賢也上曰賢之房曰然則今何以知其不賢也上曰以其時亂而君危知之房曰若是任賢必治任不肖必亂必然之道也幽厲何不覺寤而更求賢曷為卒任不肖以至於是上曰臨亂之君各賢其臣令皆覺寤天下安得危亡之君房曰齊桓公秦二世亦嘗聞此君而非笑之然則任豎刁趙高政治日亂盜賊滿山何不以幽厲卜之而覺寤乎上曰唯有道者能以往知來耳房因免冠頓首曰春秋紀二百四十二年災異以示萬世之君今陛下即位以來日月失明星辰逆行山崩泉涌地震石隕夏霜冬雷春凋秋榮水旱螟蟲民人飢疫盜賊不禁刑人滿市春秋所記災異盡備陛下視今為治耶亂耶上曰亦極亂耳尚何道房曰今所任用者誰與上曰然幸其愈於彼又以為不在此人也房曰夫前世之君亦皆然矣臣恐後之視今猶今之視前也上良久乃曰今為亂者誰哉房曰明主宜自知之上曰不知也如知之何故用之房曰上最所信任與圖事帷幄之中進退天下之士者是矣房指謂石顯上亦知之謂房曰已諭房罷出後石顯五鹿充宗皆疾房欲遠之建言宜試以房為郡守元帝於是以房為魏郡太守顯告房與張博通謀非謗政治歸惡天子詿誤諸侯王房博皆棄市蓋寬饒字次公魏郡人也為司隸校尉刺舉無所回避公卿貴戚及郡國吏繇使至長安莫敢犯禁京師為清為人剛直高節志在奉公以言事不當意而為文法吏所詆挫大夫鄭昌上書頌寬饒曰臣聞山有猛獸藜藿為之不採國有忠臣姦邪為之不起司隸校尉寬饒居不求安食不求飽進有憂國之心退有死節之義上無許史之屬許伯宣帝后父也史高宣帝外家也下無金張之託金日磾張安世也職在司察直道而行多仇少與上書陳國事有司劾以大辟臣幸得從大夫之後官以諫為名不敢不言上不聽遂下寬饒吏寬饒引佩刀自剄北闕下衆莫不憐之諸葛豐字少季琅邪人也為司隸校尉刺舉無所避侍中許章奢淫不奉法度賓客犯事與章相連豐按劾章欲收之章迫窘馳車去得入宮門自歸於是收豐節豐上書謝曰臣豐駑怯文不足以勸善武不足以執邪陛下拜為司隸校尉未有以自效故常願捐一旦之命而斷姦臣之首懸於都市編書其罪使四方明知為惡之罰然後卻就斧鉞之誅誠臣所甘心也夫以布衣尚猶有刎頸之交今以四海之大曾無伏節死義之臣率盡茍合取容阿黨相為念私門之利忘國家之政邪穢溷濁之氣上感於天是以災變數見百姓困乏此臣下不忠之效也臣誠恥之無已凡人情莫不欲安存而惡危亡然忠臣直士不避患害者誠為君也臣竊不勝憤悶願賜清宴唯陛下裁幸上不許是後所言益不用豐復上書言臣聞伯奇孝而棄於親子胥忠而誅於君隱公慈而殺於弟叔武弟而殺於兄夫以四子之行屈平之材然猶不能自顯而被刑戮豈不足以觀哉使臣殺身以安國蒙誅以顯君臣誠願之獨恐未有云補而為衆邪所排令讒夫得遂正直之路壅塞忠臣沮心智士杜口此愚臣之所懼也劉輔河閒人也為諫大夫會成帝欲立趙倢為皇后輔上封事曰今乃觸情縱欲傾於卑賤之女欲以母天下不畏乎天不愧於人惑莫大焉里語曰腐木不可以為柱卑人不可以為主天人之所不與必有禍而無福市道皆共知之朝臣莫肯一言臣竊傷心自念得以同姓拔擢尸祿不忠汙辱諫爭之官不敢不盡死唯陛下察焉書奏上使侍御史收縛輔繫掖庭祕獄群臣莫知其故於是左將軍辛慶忌右將軍廉褒光祿勳師丹太中大夫谷永俱上書曰臣聞明主垂寬容之聽崇諫爭之官廣開忠直之路不罪狂狷之言然後百僚在位竭忠盡謀不懼後患朝廷無諂諛之士元首無失道之愆竊見諫大夫劉輔前以縣令求見擢為諫大夫此其言必有卓詭切至當聖心者故得拔至於此旬日之閒收下祕獄臣等愚以為輔幸得託公族之親在諫臣之列新從下土來未知朝廷體獨觸忌諱不足深過小罪宜隱忍而已如有大惡宜暴治理官與衆共之今天心未豫豫悅豫也災異屢降水旱迭臻方當隆寬廣問直盡下之時也而行慘急之誅於諫爭之臣震驚群下失忠直心假令輔不坐直言所坐不著天下不可戶曉同姓近臣本以言顯其於治親養忠之義誠不宜幽囚于掖庭獄公卿以下見陛下進用輔亟而折傷之暴人有懼心莫敢盡節正言非所以昭有虞之聽廣德美之風也臣等竊深傷之唯陛下留神省察上乃減死罪鄭崇字子游本高密人也哀帝擢為尚書僕射數求見諫爭上初納用之每見曳革履上笑曰我識鄭尚書履聲久之上欲封祖母傅太后從弟商崇諫曰孝成皇帝封親舅五侯天為赤黃晝昏日中有黑氣今祖母從昆弟二人已侯孔鄉侯皇后父高武侯以三公封尚有因緣今無故欲復封商壞亂制度逆天人心非傅氏之福也臣願以身命當咎崇因持詔書案起持當受詔書案起去傅太后大怒曰何有為天子乃反為一臣所專制邪上遂下詔封商為汝昌侯崇又以董賢貴寵過度數諫由是重得罪數以職事見責發疾頸癰欲乞骸骨不敢尚書令趙昌佞詔素害崇知其見疏因奏崇與宗族通疑有姦請治上責崇曰君門如市何以欲禁切主上崇對曰臣門如市臣心如水願得考覆上怒下崇獄窮治死獄中荀悅紀論曰夫臣下之所以難言者何也言出乎口則咎悔及之矣故舉過揚非則剌上之譏言而當則恥其勝己也言而不當則賤其愚也先己而同則惡其奪己之明也後己而同則以為順從也違下從上則以為諂諛也違上從下則以為雷同也與衆共言則以為順負也違衆獨言則以為專美也言而淺露則簡而薄之深妙弘遠則不知而非之特見獨知則衆其蓋之雖是而不見稱與衆同智則以為附隨也雖得之不以為功據事盡理則以為專必謙讓不爭則以為易窮言而不盡則以為懷隱進說竭情則謂之不知量言而不效則受其怨責言而事效則以為固當也或利於上不利於下或便於右不便於左或令於前而忤於後夫能應事當理決疑定功發情起意值所欲聞不害上下無妨於時言立而策成始無咎悔若此之比百不一遇又智之所見萬不一及也且犯顏冒死下之所難言也拂旨忤情上之所難聞也以難言之臣忤難聞之主以萬不一及之智求百不一遇之時此下情所以常不通也非唯君臣而已凡言亦皆如之是乃仲尼所以發憤嗟歎稱吾欲無言者也蕭望之字長倩東海人也為諫大夫出為平原太守上疏曰陛下哀愍百姓恐德化之不究悉出諫官以補郡吏所謂憂其末而忘其本者也朝無爭臣則不知過國無達士則不聞善願陛下選明經術溫故知新通於幾微謀慮之士以為內臣與參政事諸侯聞之則知國家納諫憂政無有闕遺若此不怠成康之道其庶幾矣外郡不治豈足憂哉書聞徵入守少府為御史大夫五鳳中胸奴大亂議者多曰胸奴為害日久可因其壞亂舉兵滅之詔問望之對曰春秋晉士帥師侵齊聞齊侯卒而還君子大其不伐喪以為恩足以服孝子誼足以動諸侯前單于慕化鄉善遣使請求和親海內欣然夷狄莫不聞不幸為賊臣所殺今而伐之是乘亂而幸災也彼必奔走遠遁不以義動兵恐勞而無功宜遣使者弔問輔其微弱救其災患四夷聞之咸貴中國之仁義必稱臣服從此德之盛也上從其議宣帝寢疾選大臣可屬者引外屬侍中史高太子太傅望之少傅周堪至禁中拜高為車騎將軍望之為前將軍堪為光祿大夫皆受遺詔輔政孝元皇帝即位望之堪本以師傅見尊重數宴見言治亂陳王事望之選白宗室明經達學劉更生與金敞並拾遺左右四人同心謀議多所匡正中書令弘恭石顯久典樞機與車騎將軍高為表裏論議常持故事不從望之等望之以為中書政本宜以賢明之選自武帝游宴後庭故用宦者非國舊制又違古不近刑人之義白欲更置士人由是大與高恭顯忤恭顯令鄭朋華龍二人告望之等謀欲罷車騎將軍疏退許史狀侯望之出休日令朋龍上之事下弘恭恭顯奏望之堪更生朋黨相稱舉數譖大臣毀離親戚欲以專擅權藝為臣不忠誣上不道請召致廷尉時上初即位不省召致廷尉為下獄也可其奏後上召堪更生曰繫獄上大驚責恭顯皆叩頭謝上曰令出視事恭顯因使高言上新即位而先驗師傅既下獄宜因決免於是望之堪更生皆免為庶人後數月賜望之爵關內侯給事中恭顯等知望之素高節不詘辱曰望之前輔政欲專權擅朝幸得不坐復賜爵邑與聞政事不悔過服罪深懷怨望自以託師傅懷終不坐非頗詘望之於牢獄塞其怏怏心則聖朝無以施恩厚上曰蕭太傅素剛安肯就吏顯等曰人命至重望之所坐語言薄罪必無所憂上乃可其奏顯等封以付謁者因急發車騎馳圍其第使者至召望之望之仰天歎曰吾嘗備位將相年踰六十矣老入牢獄茍求生活不亦鄙乎竟自殺天子聞之驚拊手曰果殺吾賢傅是時太官方上晝食上乃卻食為之涕泣哀慟左右顯等免冠謝良久然後已
