body:
  text: 漢書三傳韓信淮陰人也家貧無行不得推擇為吏常從人寄食從項羽為郎中數以策干項羽弗用亡楚歸漢上未奇之也數與蕭何語何奇之至南鄭諸將亡者十數人信度何已數言上不我用即亡何聞信亡不及以聞自追之人有言上曰丞相何亡上怒如失左右手居一二日何來謁上且怒且喜罵何曰若亡何也曰臣非敢亡追亡者耳上曰所追誰曰韓信上復曰諸將亡者以十數公無所追追信詐也何曰諸將易得至如信國士無雙王必欲長王漢中無所事信必欲爭天下非信無可與計事者王曰吾亦欲東耳何曰王必東能用信信即留不能用信信終亡耳王曰吾以為將何曰雖為將信不留王曰以為大將何曰幸甚必欲拜之擇日齋戒設壇場具體乃可王許之諸將皆喜人人各以為得大將至拜乃韓信也一軍皆驚信已拜上坐王曰丞相數言將軍將軍何以教寡人計策信因問王曰今東向爭天下豈非項王耶曰然大王自料勇悍仁強孰與項王漢王曰弗如也信曰唯信亦以為大王弗如也然臣嘗事項王請言項王為人也項王意烏猝嗟千人皆廢言羽一嗟千人皆廢不收也然不能任屬賢將此特匹夫之勇也項王見人恭謹言語姁姁人有疾病涕泣分食飲至使人有功當封爵刻印刓忍不能與此所謂婦人之仁也又背義帝約而以親愛王諸侯不平所過無不殘滅多怨百姓百姓不附特劫於威強服耳名雖為霸實失天下心故曰其強易弱今大王誠能反其道任天下武勇何不誅以天下城邑封功臣何不服以義兵從思東歸之士何不散且大王之入武關秋豪無所害除秦苛法秦民無不欲得大王今失職之蜀民無不恨者今王舉而東三秦可傳檄而定也於是漢王大喜自以為得信晚漢王以信為左丞相擊魏信問酈生魏得無用周叔為大將乎曰柏直也信曰豎子耳遂進擊魏虜豹定河東使人請漢王願益兵三萬人臣請以北舉燕趙東擊齊南絶楚之糧道西與大王會於榮陽漢王與兵三萬人進破代禽夏説以兵數萬欲東下井陘擊趙趙王成安君陳餘聚兵井陘口廣武君李左車説成安君曰聞漢將韓信涉西河虜魏王禽夏説議欲以下趙此乘勝而去國遠其鋒不可當臣聞千里餽糧士有飢色樵蘇後爨樵取薪也蘇取草也師不宿飽今井陘之道車不得方軌騎不得成列行數百里其勢糧食必在後願足下假臣奇兵三萬人從間路絶其輜重足下深溝高壘勿與戰彼前不得退不得還不至十日兩將之頭可致麾下成安君不聽信知其不用大喜乃引兵遂下井陘口斬成安君泜水禽趙王歇乃令軍毋斬廣武君頃之有縛而至麾下者於是問廣武君僕欲北攻燕東伐齊何若有功廣武君辭曰臣聞之亡國之大夫不可以圖存敗軍之將不可以語勇若臣者何足以權大事乎信曰僕聞之百里奚居虞而虞亡之秦而秦伯非愚於虞而智於秦也用與不用聽與不聽耳使成安君聽子計僕亦禽矣僕委心歸計願子勿辭廣武君曰臣聞智者千慮必有一失愚者千慮亦有一得故曰狂夫之言聖人擇焉顧恐臣計未足用願效愚忠故成安君有百戰百勝之計一日而失之軍敗鄗下今高邑是也身死泜水上今足下虜魏王禽夏説不旬朝破趙二十萬衆誅成安君名聞海內威震諸侯衆庶莫不傾耳以待命者然而衆勞卒疲其實難用也今足下舉敝之兵頓之燕堅城之下情見力屈欲戰不拔曠日持久糧食單竭若燕不破齊必拒境而自強二國相持則劉項之權未有所分也當今之計不如按甲休兵饗士大夫北首燕路然後發一乘之使奉咫尺之書以使燕燕必不敢不聽從燕而東臨齊雖有智者亦不知為齊計矣如是則天下事可圖也兵固有先聲後實者此之謂也信曰善於是發使燕燕從風而靡遂度河襲歷下軍破龍且楚已亡龍且項王恐使武涉往信信謝曰臣得事項王數年官不過郎中位不過執戟言不聽畫策不用故背楚歸漢漢王授我上將軍印數萬之衆解衣衣我推食食我言聽計用吾得至於此人深親信我背之不祥武涉已去蒯通知天下權在於信深説以三分天下之計信不忍背漢又自以功大漢不奪我齊遂不聽項羽死徙信為楚王信初之國陳兵出入有變告信欲反上偽遊於雲夢信謁於陳高祖令武士縛信載後車信曰果若人言狡兔死良狗烹上曰人告公反遂械信至雒陽赦以為淮陰侯信知漢王畏惡其能稱疾不朝黥布六人也漢封為淮南王十一年高后誅韓信布心恐憂復誅彭越盛其醢以賜諸侯王布見醢大恐遂聚兵反書聞上召諸將問布反為之奈何皆曰發兵坑豎子耳何能為汝陰侯滕公以問其客薛公薛公曰是固當反滕公曰上裂地而封之疏爵而貴之疏分也南面而立萬乘之主其反何也薛公曰前年殺彭越往年殺韓信三人皆同功一體之人也自疑禍及身故反耳楚元王交高祖少弟也玄孫向字子政本名生為諫大夫向見光祿勳周堪光祿大夫張猛二人給事中大見信弘恭石顯憚之數譖毀焉向上封事曰臣前幸得以骨肉備九卿奉法不謹乃復蒙恩竊見災異並起天地失常徵表為國欲終不言念忠臣雖在畎畝猶不忘君況重以骨肉之親又加以舊恩乎臣聞舜命九官禹作司空棄后稷契司徒咎繇作士垂共工益朕虞伯夷秩宗夔典樂龍納言凡九官也濟濟相讓和之至也衆賢和於朝則萬物和於野故四海之內靡不和寧及至周文開基西郊雜遝衆賢罔不肅和崇推讓之風以銷分爭之訟武王周公繼政朝臣和於內萬國歡於外故盡得其歡心以事其先祖下至幽厲之際朝廷不和轉相非怨君子獨守正勉強以從王事則反見憎毒讒訴反其詩曰密勿從事不敢告勞無罪無辜讒口當是之時天變見於上地變動於下水泉沸騰山谷易處由此觀之和氣致祥乖氣致異祥多者其國安異衆者其國危天地之常經古今之通義也今升下開三代之業招文學之士優遊寬容使得並進今賢不肖渾淆白黑不分邪正雜糅忠讒並進朝臣更相讒訴轉相是非文書紛毀譽渾亂所以熒惑耳目感移心意者不可勝載分曹為黨將同心以陷正臣進者治之表也正臣陷者亂之機也乘治亂之機未知孰任而災異數見此臣所以寒心者也夫乘權席勢之人子弟鱗集於朝羽翼陰附者衆毀譽將必用以終乖離之咨是以日月無光雪霜夏隕陵谷易處列星失行皆怨氣之所致也夫遵衰周之軌循詩人之所刺而欲以成太平致雅頌猶行而求及前人也初元以來六年矣按春秋六年之中災異未有稠如今用賢人而行善政如或譖之則賢人退而善政還夫執狐疑之心者來讒賊之口持不斷之意者開群枉之門讒邪進者衆賢退群枉盛者正士銷故易有否泰小人道長則君子道銷君子道銷則政日亂故為否否者閉而亂也君子道長則小人道銷小人道銷則政日治故為泰泰者通而治也昔者鯀共工歡兜與舜禹雜處堯朝周公與管蔡並居周位當是時迭進相毀流言相謗豈可勝道哉帝堯成王能賢舜禹周公而銷共工管蔡故以大治孔子與季孟偕仕於魯李斯與叔孫俱宦於秦定公始皇賢季孟李斯而銷孔子叔孫故以大亂故治亂榮辱之端在所信任所信任既賢在於堅固而不移詩云我心匪石不可轉也言守善篤也易曰渙汗其大號言號令如汗汗出而不反者也今出號令未能踰時而反是反汗也用賢未能三旬而退是轉石也論語曰見不善如探湯今二府奏佞諂不當在位歷年而不去也出令則如反汗用賢則如轉石去佞則如拔山而望陰陽之調不亦難乎是以群小窺見間隙巧言醜詆流言飛文譁於民間故詩云憂心悄悄慍於群小小人成群誠足慍也昔孔子與顏淵子貢更相稱譽不為朋黨禹稷與皋陶傳相汲引不為比周何則忠於為國無邪心也故賢人在上位則引其類而聚之朝在下位則思與其類俱進故湯用伊尹不仁者遠而衆賢至類相致也今佞邪與賢臣並在交戟之內合黨共謀違善依惡數設危險之言欲以傾移主上如忽然用之此天地之所以先戒災異之所以重至者也自古明聖未有無誅而治者也故舜有四放之罰而孔子有兩觀之誅然後聖化可得而行也今以陛下明智誠深思天地之心察兩觀之誅覽否泰之卦歷周唐之所進以為治原秦魯之所銷以為戒考祥應之福省災異之禍以揆當世之變放遠佞邪之黨壞散險詖之聚杜閉群枉之門廣開衆正之路決斷狐疑分別猶豫使是非炳然可知則百異銷滅而衆祥並至太平之基萬世之利也向又見成帝營起昌陵數年不成制度泰奢上疏諫曰臣聞易曰安不忘危存不忘亡是以身安而國家可保也故賢聖之君博觀終始必通三統一曰天統二曰地統三曰人統天命所授者博非獨一姓也孔子論詩至於殷士膚敏灌將於京喟然歎曰大哉天命善不可不傳於子孫是以富貴無常不如是則王公其何以戒慎民萌其何以勸勉蓋傷微子之事周而痛殷之亡也雖有堯舜之聖不能化丹朱之子雖有禹湯之德不能移末孫之桀紂自古及今未有不亡之國也故常戰栗不敢諱亡孔子所謂富貴無常蓋謂此也孝文皇帝居霸陵顧曰以北山石為豈可動哉張釋之進曰使其中有可欲雖錮南山猶有隙使其中無可欲雖無石又何戚乎孝文寤焉遂為薄葬易曰古之葬者厚衣之以薪藏之中野不封不樹後世聖人易之以棺黃帝葬於橋山堯葬濟陰丘皆小葬具甚微舜葬蒼梧二妃不從禹葬會稽不改其列不改官里樹木百物之行列也殷湯無葬處文武周公葬於畢泰穆公葬於雍樗里子葬於武庫皆無丘之處此聖帝明王賢君智士遠覽獨慮無窮之計也其賢臣孝子亦承命順意而薄葬之此誠奉安君父忠孝之至也故仲尼孝子而延陵慈父舜禹忠臣周公悌弟其葬君親骨肉皆微薄矣非茍為儉誠便於體也宋桓司馬為石仲尼曰不如速朽逮至吳王闔閭違禮厚葬十有餘年越人發之及秦惠文武昭嚴襄五王皆大作丘多其瘞藏咸盡發掘暴露甚足悲也秦始皇帝葬於驪山之阿下錮三泉上崇山墳棺之麗宮館之盛不可勝原又多殺宮人生埋工匠計以萬數天下苦其役而叛之驪山之作未成而周章百萬之師至其下矣數年之間外被項籍之災內離牧豎之禍豈不哀哉是故德彌厚者葬彌薄智愈深者葬愈微無德寡智者葬愈厚丘彌高宮廟甚麗發掘必速由是觀之明暗之效葬之吉凶昭然可見矣陛下即位躬親節儉始營初陵其制約小天下莫不稱明及徙昌陵增埤為高積土為山發民墳墓積以萬數營起邑居期日迫卒功費大萬百餘大萬一億也死者恨於下生者愁於上怨氣感動陰陽因之以飢饉物故流離以十萬數臣甚焉以死者為有知發人之墓其害多矣若其無知又安用大謀之賢智則不悅以示衆庶則苦之若茍以悅愚夫淫侈之人又何為哉陛下慈仁篤美甚厚聰明疏達蓋世而顧與暴秦亂君競為奢侈比方丘悅愚夫之目隆一時之觀違賢智之心忘萬世之安臣竊為陛下羞之唯陛下上覽明聖黃帝堯舜禹湯文武周公仲尼之制下觀賢智穆公延陵樗里張釋之意孝文皇帝去墳薄葬以儉安神可以為則秦昭始皇增山厚葬以侈生害足以為戒初陵之摹宜從公卿大臣之議以息衆庶書奏上甚感向言而不能從其計向見上無繼嗣政由王氏遂上封事極諫曰臣聞人君莫不欲安然而危莫不欲存然而亡失御臣之術也夫大臣操權柄持國政未有不為害者也昔晉有六卿智伯范中行韓趙魏也齊有田崔衛有孫寧魯有季孟常掌國事世執朝柄後田氏取齊六卿分晉崔杼殺其君光孫林父寧殖出其君衎弒其君剽季氏卒逐昭公皆陰盛而陽微下失臣道之所致也故書曰臣之有作威作福害於而家凶於而國孔子曰祿去公室政逮大夫危亡之兆也秦昭王舅穰侯及涇陽葉陽君皆昭王母之弟專國擅勢假大后之威三人者權重於昭王家富於秦國國甚危殆賴寤范睢之言而奏復存二世委任趙高趙高專權自恣壅蔽大臣終有閻樂望夷之禍秦遂以亡近事不遠即漢所代也漢興諸呂無道擅相尊王呂産呂祿席大后之寵據將相之位欲危劉氏賴忠正大臣絳侯朱虛等竭誠盡節以誅滅之然後劉氏復安今王氏一姓乘朱輪華轂者二十三人青紫貂蟬充盈幄內魚鱗左右大將軍秉事用權五侯驕奢僭盛並作威福擊斷自恣行汙而寄治身私而託公依東宮之尊假甥舅之親以為威重尚書九卿州牧郡守皆出其門管執樞機朋黨比周稱譽者登進忤恨者誅傷遊談者助之説執政者為之言排擯宗室孤弱公族其有智能者尤非毀而不進遠絶宗室之任不令得給事朝省恐其與己分權數稱燕王蓋主以疑上心避諱呂霍而弗肯稱內有管蔡之萌外假周公之論兄弟據重宗族磐牙歷上古至秦漢外戚貴未有如王氏者也雖周皇甫秦穰侯漢武安呂霍上官之屬皆不及也物盛必有非常之變先見為其人徵象孝昭帝時冠石立於泰山有石自立三石為足一石在上故曰冠石也仆柳起於上林而孝宣帝即位今王氏先祖墳墓在濟南者其梓柱生枝葉扶疏上出屋根垂地中雖立石起柳無以過此明也事勢不兩大王氏與劉氏亦且不並立如下有泰山之安則上有纍卵之危陛下為人子孫守持宗廟而令國祚移於外親降為皂隸縱不為身奈宗廟何婦人內夫家而外父母家此亦非皇太后之福也孝宣皇帝不與舅平昌樂昌侯權所以全安之也夫明者起福於無形銷患於未然宜發明詔吐德音援近宗室親而納信黜遠外戚無授以政以則效先帝之所行厚安外戚全其宗族誠東宮之意外家之福也王氏永存保其爵祿劉氏長安不失社稷所以睦外內之姓子子孫孫無疆之計也如不行此策田氏復見於今六卿必起於漢為後嗣憂昭昭甚明不可不深圖不可不早慮也唯陛下深留聖思覽往事之戒居萬安之實用保宗廟久承皇太后天下幸甚書奏天子召見向歎息悲傷其意謂曰君且休矣吾將思之向每召見數言公族者國之枝葉枝葉落則本根無所庇廕方今同姓疏遠毋黨專政祿去公室權在外家非所以強漢宗卑私門保守社稷安固後嗣也向自見得信於上故常顯訟宗室譏刺王氏及在位大臣其言多痛切發於至誠終不能用向卒後十三歲而王氏代漢季布楚人也項籍使將兵數窘漢王項籍滅高祖購求布千金敢舍匿罪三族布匿濮陽周氏周氏乃髡鉗布衣褐置廣柳車中載以喪車欲人不知也之魯朱家賣之朱家心知其季布也買置田舍乃之雒陽見汝陰侯滕公説曰季布何罪臣各為其主用職耳項氏臣豈可盡誅耶今上始得天下而以私怨求一人何示不廣也且以季布之賢漢求之急如此此不北走胡南走越耳夫忌壯士以資敵國此伍子胥所以鞭荊平王之墓也君何不從容為上言之滕公心知朱家大俠意布匿其所乃許諾侍間果言如朱家旨上乃赦布布為河東守孝文時人有言其賢召欲以為御史大夫人又言其勇使酒難近至留邸一月見罷布進曰臣待罪河東陛下無故召臣此人必有以臣欺陛下者今臣至無所受事罷去此人必有毀臣者夫以一人譽召臣一人毀去臣恐天下有識聞之有以窺陛下窺見陛下深淺也上默然慚曰河東吾股肱郡故特召君耳欒布梁人也為梁大夫使於齊未還漢召彭越責以謀反夷三族梟首雒陽下詔有收視者輒捕之布還奏事彭越頭下祠而哭之吏捕以聞上召曰若與彭越反耶吾禁人勿收若獨祠哭之與反明矣趣烹之方提趨湯顧曰願一言而死上曰何言布曰方上之困彭城敗滎陽成皋項王所以不能遂西徒以彭王居梁地與漢合從苦楚也當是之時彭王一顧與楚則漢破且垓下之會微彭王項氏不亡天下已定彭王割符受封亦欲傳之萬世今漢一徵兵於梁彭王病不行而疑以為反反形未見以苛細誅之臣恐功臣人人自危也今彭王已死臣生不如死請就烹上乃釋布拜為都尉蕭何沛人也漢殺項羽即皇帝位論功行封群臣爭功歲餘不決上以何功最盛先封為酇侯食邑八千戶功臣皆曰臣等身被堅執兵多者百餘戰少者數十合攻城略地大小各有差今蕭何未有汗馬之勞徒持文墨議論不戰居臣等上何也上曰諸君知獵乎曰知之知獵狗乎曰知之上曰夫獵追殺獸者狗也而發縱指示獸處者人也諸君徒能走得獸耳功狗也至如蕭何發縱指示功人也且諸君獨以身從我多者兩三人蕭何舉宗數十人皆隨我功不可忘也群臣後皆莫敢言列侯畢已受封奏位次皆曰平陽侯曹參身被七十創攻城略地功最多宜第一關內侯鄂千秋時為謁者進曰群臣議皆誤夫曹參雖有野戰略地之功此特一時之事夫上與楚相拒五歲失軍亡衆跳身遁者數矣然蕭何常從關中遣軍補其處非上所詔令召而數萬衆會上乏絶者數矣夫漢與楚相守滎陽數年軍無見糧蕭何轉漕關中給食不乏陛下雖數亡山東蕭何常全關中待陛下此萬世功也今雖無曹參等百數何缺於漢漢得之不必待以全奈何欲以一旦之功而加萬世之功哉蕭何當第一曹參次之上曰善於是乃令何第一賜劍履上殿入朝不趨是日悉封何父母兄弟十餘人皆食邑何為民請曰長安地陝上林中多空地棄願令民得入田毋收為獸食上大怒曰相國多受賈人財物為請吾苑乃下何廷尉械繫之數日王衛尉侍前問曰相國胡大罪陛下繫之暴也上曰吾聞李斯相秦有善歸主有惡自豫今相國多受賈豎金為請吾苑以自媚於民故繫治之王衛尉曰夫職事茍有便於民而請之真宰相事也陛下奈何乃疑相國受賈人錢乎且升下距楚數歲陳豨黥布反時陛下自將往當是時相國守關中搖足即關西非陛下有相國不以此時為利乃利賈人之金乎且秦以不聞其過亡天下夫李斯之分過又何足法哉陛下何疑宰相之淺也是日使使持節赦出何何年老素恭謹徒跣入謝上曰相國休矣相國為民請吾苑不許我不過為桀紂主而相國為賢相吾故繫相國欲令百姓聞吾過也曹參沛人也為齊丞相參聞膠西有蓋公善治黃老言使人厚幣請之既見蓋公為言治道貴清靜而民自定推此類具言參於是避正堂舍蓋公焉其治要用黃老術齊國安集大稱賢相蕭何薨使者召參參去屬其後相曰以齊獄市為寄慎勿擾也後相曰治無大於此者乎參曰不然夫獄市者所以并容也今君擾之姦人安所容乎吾是以先之夫獄市兼受善惡若窮極姦人姦人無所容竄反且為亂秦人極刑而天下叛孝武峻法而獄繁此其效也老子曰我無為民自化我好靜民自正參欲以道化為本不欲擾其末也始參微時與蕭何善及為宰相有隙至何且死所推賢唯參參代何為相國舉事無所變更一遵何之約束擇郡國吏長大取年長大者訥於文辭謹厚長者即召除為丞相史史言文刻深欲務聲名輒斥去之日夜飲酒卿大夫以下吏及賓客見參不事事不事丞相之事來者皆欲有言至者參輒飲以醇酒度之欲有言復飲酒醉而後去終莫得開説開謂有所啓白相舍後園近吏舍日飲歌呼從吏患之無如何乃請參遊後園聞吏醉歌呼從吏幸相國召按之乃反取酒張坐飲大歌呼與相和參見人之有細過專掩匿覆蓋之府中無事參子窋為中大夫惠帝怪相國不治事以為豈少朕與乃謂窋曰汝歸試私從容問乃父曰高帝新棄群臣帝富於春秋君為相國日飲無所請事何以憂天下然無言吾告汝也窋既洗沐歸諫參參怒而笞之二百曰趣入侍天下事非乃所當言也至朝時帝讓參參免冠謝曰陛下自察聖武孰與高皇帝上曰朕乃安敢望先帝參曰陛下觀參孰與蕭何賢上曰君似不及也參曰陛下之言是也且高皇帝與蕭何定天下法令既明具陛下垂拱參等守職遵而勿失不亦可乎惠帝曰善君休矣百姓歌之曰蕭何為法講若畫一講或作較曹參代之守而勿失載其清靜民以寧一張良字子房韓人也沛公欲以二萬人擊秦嶢關下軍良曰秦兵尚強未可輕臣聞其將屠者子賈豎易動以利願沛公令酈食其持重寶啖秦將秦將果欲連和俱西良曰此獨其將欲叛士卒恐不從不如因其解擊之沛公乃引兵擊秦軍大破之遂至咸陽秦王子嬰降沛公沛公入秦宮室帷帳狗馬重寶婦女以千數意欲留居之樊噲諫沛公不聽良曰夫秦為無道故沛公得至此為天下除殘去賊宜縞素為資今始入秦即安其樂此所謂助桀為虐資質也欲令沛公反秦奢儉素以為質也且忠言逆於耳利於行毒藥苦於口利於病願沛公聽樊噲言沛公乃還軍霸上陳平戶牖人也背楚因魏無知見漢王漢王拜為都尉典護軍絳灌等或讒平曰聞平居家時盜其嫂事魏王不容亡而歸楚不中又亡歸漢今大王尊官之令護軍臣聞平使諸將金多者得善處金少者得惡處平反覆亂臣也願王察之漢王疑之以讓無知問曰有之乎無知曰有漢王曰公言其賢人何也對曰臣之所言者能也升下所問者行也今有尾生孝己之行孝己高宗之子有孝行也而無益於勝敗之數升下何暇用之乎今楚漢相拒臣進奇謀之士王召平而問曰吾聞先生事魏不遂事楚而去今又從吾遊信者固多心乎平曰臣事魏王魏王不能用臣説故去事項王項王不信人其所任愛非諸項即妻之昆弟雖有奇士不能用臣居楚聞漢王之能用人故歸大王臣裸身來不受金無以為資誠臣計畫有可采者願不王用之使無可用者大王所賜金具在請封輸官得請骸骨漢王乃謝厚賜拜以為護軍中尉盡護諸將諸將乃不敢復言周勃沛人也為人木強敦厚高帝以為可屬大事惠帝以勃為太尉高后崩呂祿以趙王為漢上將軍呂産以呂王為相國秉權欲危劉氏勃與丞相平朱虛侯章共誅諸呂遂共迎立代王是為孝文皇帝初即位以勃為右丞相後乃免丞相就國人有上書告勃欲反下廷尉廷尉逮捕勃治之勃恐不知置辭吏稍侵辱之勃以千金與獄吏乃書牘背示之以公主為證公主者文帝女也勃太子勝之尚之故獄吏教引為證薄太后亦以為無反事文帝朝太后曰絳侯綰皇帝璽將兵於北軍不以此時反今居一小縣顧欲反耶文帝乃謝曰吏方驗而出之於是使使持節赦勃復爵邑勃既出曰吾嘗將百萬軍然安知獄吏之貴也勃子亞夫文帝封為條侯後六年胸奴大入邊以宗正劉禮為將軍軍霸上祝茲侯徐厲為將軍軍棘門以亞夫為將軍軍細柳以備胡上自勞軍至霸上及棘門軍直馳入將以下騎送迎已而之細柳軍軍士吏被甲鋭兵刃彀弓弩持滿天子先驅至不得入先驅曰天子且至軍門都尉曰將軍令曰軍中聞將軍之令不聞天子之詔有頃上至又不得入於是上使使持節詔將軍曰吾欲勞軍亞夫乃傳言開壁門壁門士請車騎曰將軍約軍中不得驅馳於是乃按轡徐行至中營將軍亞夫持兵揖曰介胄之士不拜請以軍禮見禮介者不拜天子為動改容式車使人稱謝成禮而去既出軍門群臣皆驚文帝曰嗟乎此真將軍矣向者霸上棘門軍如兒戲耳其將固可襲而虜也亞夫可得而犯耶稱善者久之樊噲沛人也與高祖俱起高帝嘗病惡見人臥禁中詔戶者毋得入群臣絳灌等莫敢入十餘日噲乃排闥直入大臣隨之上獨枕一宦者臥噲等見上流涕曰始陛下與臣等起豐沛定天下何其壯也今天下已定又何憊也且陛下病甚大臣震恐不見臣等計事顧獨與一宦者絶乎且陛下獨不見趙高之事乎高帝笑而起周昌沛人也為御史大夫為人強力敢直言自蕭曹等皆卑下之昌嘗燕入奏事以上宴時入奏事也高帝方擁戚姬昌還走高帝逐得騎昌項間曰我何如主昌仰曰陛下即桀紂之主也於是上笑之然尤憚昌及高帝欲廢太子大臣固爭莫能得而昌庭爭之強上問其説昌為人吃又盛怒曰臣口不能言然臣心知其不可陛下欲廢太子臣期期不奉詔上欣然而笑太子遂定申屠嘉梁人也為丞相是時太中大夫鄧通方愛幸賞賜纍巨萬文帝常燕飲通家其寵如是是時嘉入朝而通居上旁有怠慢之禮嘉奏事畢因言曰陛下幸愛群臣則富貴之至於朝廷之禮不可以不肅上曰君勿言吾私之罷朝坐府中為檄召通通恐入言上上曰汝第往吾今使人召若通至丞相府免冠徒跣頓首謝嘉責曰夫朝廷者高皇帝之朝廷也通小臣戲殿上大不敬當斬通頓首首盡出血不解上使使持節召通而謝丞相曰此吾弄臣君釋之通既至為上泣曰丞相幾殺臣
