body:
  text: 呂氏春秋呂氏春秋先聖王之治天下也必先公公則天下平平和嘗觀於上志上志古記有得天下者衆矣其得之必以公其失之必以偏偏私不正凡主之立也生於公故洪範曰無偏無黨王道蕩蕩蕩蕩平易陰陽之和不長一類甘露時雨不私一物萬民之主不阿一人桓公行公去私惡用管子而為五伯長行私阿所愛用豎刁而蟲出於戶五子爭立無主喪六十日乃殯至使蟲流出戶也人之少也愚其長也智故智而用私不若愚而用公用私以敗用公則齊天無私覆也地無私載也日月無私燭也四時無私為也行其德而萬物得遂長焉遂成庖人調和而不敢食故可以為庖若使庖人調和而食之則不可以為庖矣伯王之君亦然誅暴而不私以封天下之賢者故可以為伯王若使王伯之君誅暴而私之則亦不可以為王伯矣誅暴有所私枉則不可以為王伯水泉深則魚歸之樹木盛則飛鳥歸之庶草茂則禽獸歸之人主賢則豪桀歸之故聖王不務歸之者而務其所歸務人使歸之末也務其所行可歸本也彊令之笑不樂強令之哭不悲皆無其中心也彊令之為道也可以成小而不可以成大大寒既至民暖是利大熱在上民清是走故民無常處見利之聚無利之去欲為天子民之所走不可不察凡論人通則觀其所禮通達貴則觀其所進富則觀其所養聽則觀其所行養則養賢也行則行仁也近則觀其所好習則觀其所言好則好義也言則言道也窮則觀其所不受賤則觀其所不為喜之以驗其守守情守也樂之以驗其僻僻邪怒之以驗其節節性懼之以驗其特特獨也雖獨不恐也哀之以驗其仁仁人見可哀者則不忍之也苦之以驗其志八觀六驗此賢主之所以論人也論人必以六戚四隱六戚六親也四隱相匿揚長蔽短也何謂六戚父母兄弟妻子何謂四隱交友故舊邑里門廊內則用六戚四隱外則以八觀六驗人之情僞貪鄙羡美無所失矣言盡知之此先聖王之所以知人也先王之教莫榮於孝莫顯於忠忠孝人君人親之所甚欲也顯榮人臣人子之所甚願也然而人君人親不得所欲人臣人子不得所願此生於不知理義不知理義在君父則不仁不慈在臣子則不忠不孝不知理義生於不學生猶出也是故古之聖王未有不尊師也尊師則不論貴賤貧富矣神農師悉諸黃帝師大橈悉姓諸名也大橈作甲子者也帝顓頊師伯夷父帝嚳師伯招帝堯師子州支父帝舜師許由禹師大成摯湯師小臣小臣謂伊尹文王武王師呂望周公旦齊桓公師管夷吾晉文公師咎犯隨會秦穆公師百里奚公孫枝楚莊王師孫叔敖沈尹筮沈縣大夫吳王闔閭師伍子胥文之儀文氏儀名越王勾踐師范蠡大夫種此十聖六賢者未有不尊師者也今尊不至於帝智不至於聖而欲無尊師奚由至哉至於道也此五帝之所以絶三代之所以滅言五帝三代之後不復重道尊師故以絶滅也音樂之所由來遠矣天下太平萬民安寧皆化其上化猶隨也樂乃可成故唯得道之人其可與言樂乎言說亡國戮民非無樂也其樂不樂不和於雅故不樂也溺者非不笑也溺人必笑雖笑不歡罪人非不歌也當死者雖歌不樂也狂者非不舞也雖舞不能中節亂世之樂有似於此君臣失位父子失處夫婦失宜民人呻吟其以為樂若之何哉以民人呻吟歡戚不可為樂也故曰若之何也亂世之樂為木革之聲則若雷為金石之聲則若霆為絲竹歌舞之聲則若譟譟叫以此駭心氣動耳目搖蕩生則可矣生性以此為樂則不樂不樂不和故樂愈侈而民愈鬱侈淫也鬱怨也國愈亂主愈卑則亦失樂之情矣凡古聖王之所為貴樂者為其樂也夏桀殷紂作為侈樂大鼓鐘磬管簫之音以巨為美巨大俶詭殊瑰耳所未嘗聞目所未嘗見俶始也始作詭異瑰奇之樂故耳未嘗聞目未嘗見務以相過不用度量不用樂之法制侈則侈矣失樂之情失樂之情其樂不樂非正樂也故曰不樂樂不樂者其民必怨其主必傷怨悲也傷病也此主乎不知樂之情而以侈為務故也耳之情欲聲心不樂五音在前弗聽目之情欲色心弗樂五色在前弗視鼻之情欲香心弗樂芬香在前弗臭口之情欲味心弗樂五味在前弗味欲之者耳目鼻口也樂之者不樂者心也心必和平然後樂心樂然後耳目鼻口有以欲之故樂之務在於和心和心在於行適適中適也夫樂有適心亦有適人之情欲壽而惡夭欲安而惡危欲榮而惡辱欲逸而惡勞四欲得四惡除則心適矣四欲之得也在於勝理勝理以治身則生全矣生全則壽長矣勝理以治國則法立矣法立則天下服服於理也故適心之務在勝理凡音樂通乎政而風乎俗者也風猶化也俗定而樂化之矣故有道之世觀其音而知其俗觀其俗而知其政矣觀其政而知其主矣故先王必託於音樂以論其教論明故先王之制樂也非特以歡耳目極口腹之欲也特止也將以教民平好惡行理義也平正也行猶通黃鐘之月土事毋作慎毋發蓋以固天閉地十一月也大呂之月數將幾終十二月也幾近也終盡也歲且更起而農民毋有所使使役大蔟之月陽氣始至正月草木繁動動生令農發土毋或失時發土而耕夾鐘之月寬裕和平行德去刑夾鐘二月毋或作事以害群生事兵戍事姑洗之月達通道路溝瀆修利三月也時雨將降故修利溝瀆中呂之月毋聚大衆巡勸農事四月也大衆謂軍旅興功築宜草木方長毋攜民心民當務農長育穀木徭役聚則心攜離逆上命也蕤賓之月陽氣在上安壯養孩五月也壯盛也孩少本朝不靜草木早槁靜安也朝政不寧故草木變動墮落早枯槁也林鐘之月草木盛滿陰氣將刑六月也立秋則行戮故曰陰氣將始殺也毋發大事以將陽氣發起也將猶養夷則之月修法飾刑選士厲兵七月也飾正也詰誅不義以懷遠方懷柔南呂之月八月趣農收聚毋敢懈怠無射之月疾斷有罪當法勿赦九月也有罪當斷殺勿赦應鐘之月陰陽不通閉而為冬十月也陽伏在下陰閉於上故不通修辨喪紀審民所終審慎也終卒也修別喪服親疏輕重服制之紀也周文王立國八年寢疾五日而地動東西南北不出周郊百吏皆請曰臣聞地之動也為人主也今王寢疾請移之文王曰若何其移之也對曰興事動衆以增國城其可以移之乎文王曰天之見妖以罰有罪也我必有罪故天以此罰我也今興事動衆以增國城是重吾罪也不可重猶益也移咎徵於他人是益吾咎昌也請改行重善以移之其可以免乎於是謹其禮秩皮革以交諸侯飾其辭令幣帛以禮豪士無幾何疾乃止止除立國五十一年而終宋景公之時熒惑在心公懼召子韋而問之曰熒惑在心何也子韋宋之太史子韋曰熒惑者天罰也心者宋分野也禍當君雖然可移於宰相公曰宰相所與治國家也而移死焉不祥曰可移於民公曰民死寡人將誰為君乎曰可移於歲公曰歲饑民必餓死為人君而殺其民以自活其誰以我為君乎是寡人之命固盡已子無復言矣子韋再拜曰臣敢賀君天之處高而聽卑君有至德之言三天必三賞君命今昔熒惑必徙三舍君延年二十一歲是昔也熒惑果徙三兵之所自來者上矣自從也上久也家無怒笞則豎子嬰兒之有過也立見國無刑罰則百姓之相侵也立見天下無誅伐則諸侯之相暴也立見故怒笞不可偃於家刑罰不可偃於國誅伐不可偃於天下有巧有拙而已矣巧者以治拙者以亂故古之聖王有義兵而無偃兵夫有以食死者欲禁天下之食悖矣有以乘舟死者欲禁天下之船悖矣有以用兵喪其國者欲偃天下之兵悖矣兵之不可偃也譬之若水火然水以療渴火以熟食不可乏也兵以除亂亦不可偃善用之則為福不能用之則為禍能者養之取福不能者敗以取禍也善用藥者亦然得良藥則活人得惡藥則殺人義兵之為天下良藥也亦大矣義兵除天下之凶殘解百姓之倒懸故方之於良藥故兵誠義以誅暴君而振苦民民之悅之也若孝子之見慈親也若饑者之見美食也民之號呼而走之走歸若強弩之射於深溪也義兵至鄰國之民歸之若流水誅國之民望之若父母行地滋遠得民滋衆兵不接刃而民服若化若順義也者萬事之紀也君臣上下親疏之所由起也治亂安危之所在也勿求於他必反人情人情欲生而惡死欲榮而惡辱死生榮辱之道一則三軍之士可使一心矣衣人以其寒食人以其饑饑寒人之大害也救之大義也人之困窮多如饑寒故賢主必憐人之困也必哀人之窮也如此則名號顯矣國土得矣得國土也人主其胡可以無務行德愛人乎行德愛人則民親其上民親其上則皆樂為其君死矣趙簡子有兩白而甚愛之陽城胥渠陽城姓胥渠名也廣門之宦夜款門而謁曰主君之臣胥渠有疾廣門邑名也宦小臣也款叩也醫教之曰得白之肝病則止不得則死謁者通簡子曰夫殺畜以活人不亦仁乎於是召庖人殺白取肝以與之無幾何趙興兵而攻翟廣門之宦左七百人右七百人皆先登而獲甲首獲衣甲者之首也人主其胡可以不好士也孝子之重其親慈親之愛其子也痛於肌骨性也所重所愛死而棄之溝壑人之情不忍為故有葬死之義葬者藏也慈親孝子之所慎也慎重慎之者以生人之心慮也慮計以生人之心為死者慮莫如無動莫如無發無發無動莫如無有可利無有可利此之謂重閉人不發掘不見動搖謂之重閉葬不可不藏也葬淺則狐貍掘之深則及於水泉故凡葬必於高陵之上以避狐貍之患水泉之溼此則善矣而忘奸邪盜賊寇亂之難豈不惑哉厚葬人利之必有此難故謂之惑也慈親孝子備之者得葬之情矣今世俗大亂人主愈侈非葬之心也非為死者慮也生者以相矜也侈靡者以為榮儉節者之為辱不以便死為故故事而徒以生者之誹譽為務此非慈親孝子之心也父雖死孝子之重之不怠重尊也怠懈也子雖死慈親之愛之不懈夫葬所愛重而以生者之所甚欲其以安之若之何哉厚葬必發掘故曰其以安之也若之何言不安世之為丘也其高大若山其樹之若林其設闕庭為宮室若都邑以此觀世示富則可矣以此為死者則不可夫死者其視萬歲猶一瞚也人之壽久不過百中壽不過六十以百與六十為無窮者慮其情必不相當矣以無窮為死者慮則得之矣今有人於此為石銘置之上曰此其中珠玉玩好財物寶器甚多不可不掘掘之必大富人必相與笑之以為大惑惑悖世之厚葬也有似於此自古及今未有不亡之國也無不亡之國者是無不掘之墓也以耳目所聞見齊荊燕嘗亡矣宋中山已亡矣趙魏韓皆失其故國矣自此以上者亡國不可勝數上猶前也是故古大墓無不掘者也而皆爭為之豈不悲哉堯葬於穀林通樹之通林以為樹也舜葬於紀市不變其肆市肆如故言不煩民禹葬於會稽不變人徒變動也言無所興造不擾民也是故先王以儉節葬死也非愛其費非惡其勞以為死者也為猶便也先王之所惡唯死者之辱也發則必辱儉則不發故先王之葬必儉也謂愛人者衆知愛人者寡謂凡愛死人者衆多厚葬之也知所以愛之者寡能儉葬者少也故宋未亡而東冢掘文公冢也齊未亡而莊公冢掘以葬厚冢見發國安寧而猶若此又況百世之後而國已亡乎故孝子忠臣親父佼友不可不察也夫愛之而反害之安之而反危之其此之謂乎至忠逆於耳倒於心倒亦逆也非賢主其孰能聽之聽受故賢主之所說不肖主之所誅也賢主悅忠言不肖主反之今有樹於此而欲其美也人時灌之則惡之惡其灌之者也而日伐其根則必無活樹矣夫惡聞忠言自伐之精者也精猶甚甚於自伐其根也賢主必自知士故士盡力竭智直言交爭而不辭其患士為知己者死故盡力竭智何患之辭也豫讓公孫弘是已當是時也智伯孟嘗君知之矣智伯知豫讓故為之報讎孟嘗君知公孫弘故為之不受折於秦也世之人主得地百里則喜四境皆賀得士則不喜不知相賀不通乎輕重也湯武千乘也而士皆歸之桀紂天子也而士皆去之孔墨布衣之士也萬乘之主千乘之君不能與之爭士也士不歸之而歸孔墨故曰不能與之爭士自此觀之尊貴富大不足以來士矣來猶致也必自知之然後可可者可至豫讓之友謂豫讓曰子嘗事范氏中行氏諸侯盡滅之而子不為報至於智氏而子必為之報何故豫讓曰范氏中行氏我寒而不我衣我饑而不我食而時使我與千人共其養是衆人畜我也夫衆人畜我者我亦衆人事之至於智氏則不然出則乘我以車入則足我以養衆人廣朝而必加禮於吾所是國士畜我也夫國士畜我者我亦國士事之豫讓國士也而猶以人於己也於猶厚也又況於中人乎孟嘗君為從關東曰從公孫弘謂孟嘗君曰不若使人西觀秦意者秦王帝王之主也君恐不得為臣何暇從以難之言不能成從以難秦意者秦王不肖主也君從以難之未晚也孟嘗君曰善願因請公往矣公孫弘見昭王昭王曰薛之地小大幾何公孫弘對曰百里昭王笑而曰寡人之國地數千里猶未敢以有難也今孟嘗君之地方百里而欲以難寡人猶可乎公孫弘對曰孟嘗君好士大王不好士也昭王曰孟嘗君之好人何如對曰義不臣乎天子不友乎諸侯得意暫為人君不得意不肯為人臣如此者三人能治可為管商之師管管仲商商鞅能致其主霸王如此者五人萬乘之嚴主辱其使者退而自刎必以其血污其衣與如臣者七人昭王笑而謝焉世之聽者多有所尤多有所尤即聽必悖矣尤過人有亡鈇者意其鄰之子視其色言語動作態度無為而不竊鈇竊盜掘其谷得其鈇谷坑他日復見其鄰之子動作態度無似竊鈇者其鄰之子非變也己則變之變之者無他有所尤也邾之故法為甲裳以帛以帛綴甲公息忌謂邾君曰不若以組邾君曰將何所得組公息忌對曰上用之則民為之矣邾君曰善下令令官為甲必以組公息忌因令其家皆為組人有傷之者曰公息忌之所以欲用組者其家多為組也傷敗邾君不悅於是乎止無以組以用邾君有所尤也為甲以組而便公息忌雖多為組何傷以組不便公息忌雖無為組亦何益為組與不為組不足以纍公息忌之說纍猶辱也凡聽言不可不察察者詳也不察則善不善不分善不善不分亂莫大焉昔禹一沐而三捉髮一食而三起以禮有道之士通乎己之不足欲以聞所不聞知所不知故也通乎己之不足則不與物爭矣情欲之物不爭愈易平靜以待之使夫自以之以用因然而然之使夫自言之亡國之主反此自賢而少人少人則說者持容而不極極至聽者自多而不得自多自賢三王之佐皆能以公及其私矣俗主之佐其欲名實也與三王之佐同其名無不辱者其實無不危者無功故也皆患其身之不貴於國也而不患其主之不貴於天下也皆患其家之不富也而不患其國之不大也此所以欲榮而愈辱欲安而愈危故榮富非自至緣功伐也今功伐甚薄而所望厚誣也以薄獲厚為誣無功伐而求榮富詐也以虛取之為詐詐誣之道君子不由由用凡為天下治國家必務其本也務本莫貴於孝人主孝則名章榮天下譽譽樂人臣孝則事君忠處官廉臨難死士民孝則耕藝疾守戰固不疲北夫執一術而百喜至百邪去天下從者其唯孝乎故論人必以所親而後及所疏必以所重而後及所輕曾子曰先王之所以治天下者五貴貴貴德貴老敬長慈幼此五者先王之所以定天下也定安所為貴貴為其近於君也所為貴德為其近於聖也所為貴老為其近於親也所為敬長為其近於兄也所為慈幼為其近於弟也昔晉文公將與楚人戰於城濮召咎犯而問曰楚衆我寡奈何而可咎犯對曰臣聞繁禮之君不足於文繁戰之君不足於詐足猶厭也君亦詐之而已文公以咎犯言告雍季雍季曰竭澤而漁豈不獲得而明年無魚焚藪而田豈不獲得而明年無獸言盡其類詐僞之為道雖今偷可後將無復不可復行非長術也文公用咎犯之言而敗楚人於城濮反而為賞雍季在上左右諫曰城濮之功咎犯之謀也君用其言而後其身或者不可乎公曰雍季之言百世之利也咎犯之言一時之務也務猶事也焉有以一時之務先百世之利者乎孔子聞之曰臨難用詐足以卻敵返而尊賢足以報德文公雖不終始焉足以霸矣賢主愈大愈懼愈彊愈恐愈益凡大者小鄰國也彊者勝其敵也大者侵削鄰國使小勝其敵則多怨小鄰國則多患多怨國雖大惡得不懼惡得不恐惡安故賢主於安思危安不忘危於達思窮顯不忘約於得思喪喪亡也有得必有失故思之也惠盎見宋康王康王曰寡人之所悅者勇有力也不悅為仁義者客將何以教寡人惠盎對曰臣有道於此有道於此勇有力也使人雖勇刺之不入雖有力擊之弗中夫刺之不入擊之不中此猶辱也臣有道於此使人雖有勇弗敢刺雖有力弗敢擊夫弗敢非無其志也臣有道於此使人本無其志本無有擊刺之志也夫無其志未有愛利之心也臣有道於此使天下丈夫女子莫不歡然皆欲愛利之此其賢於勇有力也言以仁義之德使民皆欲愛利之故賢於勇有力也大王獨無意耶宋王曰此寡人之所欲得也曰孔墨是也言當為孔丘墨翟之德則得所欲也孔丘墨翟無地為君以德見尊也無官為長以道見敬天下丈夫女子莫不延頸舉踵而願安利之願其尊高而利己也今大王萬乘之主也誠有其志孔墨之志則四境之內皆得其利矣其賢於孔墨也遠矣得賢名過於孔墨武王使人候殷反報曰殷亂矣武王曰其亂焉至對曰讒匿勝忠良武王曰尚未也又往反報曰賢者出走矣武王曰尚未也又往反報曰其亂甚矣百姓不敢誹怨矣武王遽告太公太公曰其亂至矣不可以駕矣駕加也凡國之亡也有道者必先去古今一也君子見機而作不待終日故必先去天下雖有有道之士固猶少千里而有一士比肩也纍世而有一聖人繼踵也士與聖人之所自來若此其難也而治必待之治奚由至乎雖幸而有未必知也不知則與無同不知其賢而用之故不治不治則與無賢同此治世之所以短而亂世之所以長也短少也長多也故亡國相望言不絶也賢主知其若此也故日慎一日以終其世譬之若登山者處已高矣左右視尚魏魏焉山在其上矣聖者之所與處有似於此身已賢矣行已高矣左右視尚盡賢於己也故周公曰與我齊者吾不與處無益我者也齊等也等則不能勝己故曰無益我者也以為賢者必與賢於己者處賢者之得可與處也禮之諸衆齊民不待知而使不待禮而令令亦使也若夫有道之士必禮必知然後其智能可盡也可盡得而用也凡人主必審分然後治可以至分謂仁義禮律殺生與奪之分至至於治也凡為善難任善易奚以知之今與驥俱走則人不勝驥矣居於車上而任驥則驥不勝人矣人主好人官好為臣之官事則是與驥俱走也必多所不及矣言力不贍也夫人主亦有車無去其車則衆善皆盡力竭能矣人主之車所以乘物也不知乘物而自怙恃奮其智能多其教詔而好自以詔亦教也以用則百官恫擾恫動擾亂少長相越萬邪並起權威分移政在家門此亡國之風風化王良之所以使馬者約審握其轡而四馬莫敢不盡力有道之主其所以使群臣者亦有轡正名審分是治之轡也故案其實審其名以求其情聽其言察其類毋使放悖放紛也悖亂也堯舜之民不獨義禹湯之臣不獨忠得其數也御之得其術也桀紂之民不獨鄙幽厲之臣不獨僻失其理也今有人於此求牛則名馬求馬則名牛所求必不得矣失其名故不得而因用威怒有司必誹怨矣牛馬必擾亂矣百官衆有司也萬物群牛馬也不正其名不分其職而數用刑罰亂莫大焉昊天無形而萬物以成天無所制作物形而物自成也大聖無事而千官盡能官得其人其人任其職故盡能也此之謂不教之教無言之詔故有以知君之狂以其言之當君狂言臣下不敢諫止而喜輕言自以其言為當是以知其言之當有以知君之惑以其言之得狂言而得所以知其惑也君也者以無當為當以無得為得者也當得不在於君而在臣待臣匡之今之為車者數官然後成輪輿轅軸各自有材故曰數官然後成也夫國豈特為車哉衆智衆能之所持也不可以一物一方安也方道也思慮自傷也思慮勞精神也智差自亡也用智過差極其情欲以自消亡奮能自殃也奮彊凡姦邪險詖之人也必有因何因因主之為因猶隨也人主好以己為己所好情欲則為也則守職者舍職而阿主之為有過則主無以責之則人主日侵而人臣日得得其阿主之心是宜動者靜宜靜者動尊之為卑卑之為尊從此生矣此國之所以衰而敵之所以攻也凡官者以治為任以亂為罪今亂而無責則亂愈長矣人主以好為示能以能示衆以好唱自奮奮彊人臣以不爭持位以聽從取容是君代有司為有司也大臣匡君進思盡忠退思補過此以聽從取容無有正君者君當自正耳是為代有司為有司是臣得後隨以進其業也後隨隨後也其業不爭取容之業也君臣不定君不君臣不臣故不定也人主自智而愚人自巧而拙人若此則愚拙者請矣君自謂智而巧故愚拙者從之請也巧智者詔矣詔多則請者愈多矣請者愈多且無不請也主雖巧智未無不知也未能盡無所不知也以未無不知應無不請其道固窮固必窮而不知其窮其患又將反以自多是之謂重重塞塞之主無存國矣故有道之主因而不為因舊循法不改為也責而不詔責臣成功不妄有所教詔不伐之言不奪之事督名審實官使自司以不知為道以奈何為實以不知為道道尚因循長養不違戾自然之性故以不可奈何為實也絶江者託於船致遠者託於驥霸王者託於賢伊尹呂尚管夷吾百里奚此霸王之船驥也釋父兄與子弟非疏之也任庖人釣者與仇人僕虜非阿之也用持社稷立功名之道不得不然也庖人則伊尹釣者即呂尚仇人則管夷吾僕虜即百里奚也非阿私近之也用其以持社稷立功名之道也故曰不得不然三代之道無二以信為管管准法也宋人有取道者其馬不進剄而投之溪水剄殺也投棄又後取道其馬不進又剄而投之溪水如此者三雖造父之所以威馬不過此矣不得造父之道而徒得其威無益於御人主之不肖者有似於此不得其道而徒多其威威愈多民愈不用民不為之用也亡國之主多以威使其民矣故威不可無有而不足專恃譬之若鹽之於味凡鹽之用有所託也不適則敗所託而不可食威亦然矣惡乎託託於愛利愛則利民愛利之心息而徒疾行威身必咎矣古之君民者仁義以治之愛利以安之忠信以導之務除其災致其福故民之於上也若璽之於塗此五帝三王之所以無敵也東野稷以御見莊公莊公以為造父不過也顏闔曰其馬將敗少頃東野稷之馬放而至莊公召顏闔而問之曰子何以知其放也對曰夫進退中繩左右旋中規造父之御無以過焉猶求其馬臣是以知其放也故亂國之使其民不論人之性不反人之情煩為教而過不識過責也識知也重為任而罪不勝不能勝其所任者而罰民進則欲其賞退則畏其罪知其能力之不足也則以僞繼矣知則上又從而罪之罪其僞也是以罪召罪也召致故禮煩則不莊業衆則無功令苛則不聽禁多則不行桀紂之禁不可勝數故民不用而身為戮凡使賢不肖異使不肖以賞罰不肖者喜生惡死則可使也矣使賢以義唯義所在死生一也故賢主之使其下也必以義必審賞罰然後賢不肖盡為用也凡人筋骨欲其固也心志欲其和也精氣欲其行也若此則病無所居而惡無由生矣病之留惡之生精氣鬱也鬱滯不通故水鬱則為污水淺不流曰污樹鬱則為蠹蠹蝎草鬱則為菑菑穢國亦有鬱主德不通民欲不達此國之鬱也國之鬱處久則百惡並起而萬災叢生矣叢聚故聖人貴豪士與忠臣也為其敢直言而決鬱塞也趙簡子曰厥也愛我鐸也不我愛也厥簡子家臣也鐸尹鐸亦家臣厥之諫我也必於無人之所鐸之諫我也喜質我於人中質正必使我醜尹鐸對曰厥也愛君之醜愛惜而不愛君之過也鐸也愛君之過而不愛君之醜也不質君於人中恐君之不變也變改此簡子之賢也人主賢則人臣之言刻刻盡人主執民之命執名之命重任也不得以快志亡國之主必驕必自智必輕物自謂有過人智故輕物物人也驕則簡士簡賤自智則專獨不咨忠良輕物則無備傳曰無備而官辨猶拾瀋無備召禍專獨位危簡士雍塞士不盡規故雍塞無聞知欲無雍塞必禮士欲位無危必得衆欲無召禍必完備三者君人之大經也經道趙簡子沈欒徼於河曰吾嘗好聲色矣而欒徼致之吾嘗好宮室臺榭矣而欒徼為之吾嘗好良馬善御矣而欒徼來之今吾好士六年矣而欒徼未嘗進一人是長吾過而絀吾善也所得者皆過也所不進乃善故曰長吾過而絀吾善也故若簡子能以理督責於其臣矣以理督責於其臣則人主可與為善而不可與為非可與為直而不可與為枉此三代之盛教也吳起行魏武侯自送之曰先生將何以治西河對曰以忠以信以勇以敢武侯曰安忠曰忠君盡忠於君安信曰信民施信於民安勇曰勇去不肖勇於去不肖也安敢曰敢用賢用賢無疑武侯曰四者足矣使人大迷惑者必物之相似者也玉人之所患患石之似玉者賢主之所患患人博聞辨言而似通者通達亡國之主似智亡國之臣似忠似之物此愚者之所大惑而聖人之所加慮也思則知之賢主所貴莫如士所以貴士直言也言直則枉者見矣人主之患欲聞枉而惡直言是障其原而欲其水也水奚自至自從是賤其所欲而貴其所惡也所欲奚自來所欲欲聞己枉所惡惡聞直言也直言何從來至能意見齊宣王宣王曰寡人聞子好直有之乎能姓也意名也對曰意惡能直意聞好直之士家不處亂國身不見污君今身得見王而家宅乎齊意惡能直宅居也惡安也若能意者使謹乎論主之側亦必不阿主阿曲不阿主主之所得豈少哉此賢主之所求而不肖主之所惡也荊文王得茹黃之狗宛路之矰矰弋射短矢也以田於雲夢田獵也雲夢楚澤也三月不反得丹之姬淫年不聽朝淫惑保申曰先王卜以臣為保吉保大保官申名今王之罪當笞王曰願請變更而無笞保申曰臣承先王之令不敢廢也王不受笞是廢先王之令也臣寧抵罪於王毋抵罪於先王王曰諾引席王伏保申束細荊五十跪而加之于背如此者再謂王起矣王曰有笞之名一也遂致之遂痛致之保申曰臣聞君子恥之小人痛之恥之不變痛之何益保申起出請死文王曰此不穀之過也保申何罪王乃變更召保申殺茹黃之狗折宛路之矰放丹之姬務治荊國兼國三十九令荊國廣大至於此者保申之力也極言之功也齊宣王好射悅人之謂己能用彊弓示有力也其嘗所用不過三石以示左右左右皆試引之中開而止開開弓弦至半而止皆曰此不下九石非王其孰能用是宣王終身自以為用九石豈不悲哉傷其自誣而不知實非直士其孰不阿主故亂國之主患在乎用三石為九石力不足而自以為有餘也其功德其治理皆亦如之欲知平直則必準繩欲知方圓則必規矩人主欲自知則必直士唯直士能正言故天子立輔弼設師保所以舉過也舉猶正也務在自知堯有欲諫之鼓舜有誹謗之木湯有司過之士武有戒慎之鞀欲戒者搖其鞀鼓也猶恐不能自知今賢非堯舜湯武也而有掩蔽之道奚由自知哉荊成齊莊不自知而殺吳王智伯不自知而亡故敗莫大於不自知范氏之亡也范氏晉卿百姓有得其鐘者欲負而走則鐘大不可負以椎毀之鐘況然有音恐人之聞之而奪己也遽掩其耳惡人之聞之可也惡己自聞之悖矣為人主而惡聞其過亦由此此自掩其耳之類也荊有善相人者所言無遺策遺失莊王見而問焉對曰臣非能相人也能視人之友也布衣也其友皆孝悌純謹畏令如此者家必日益身必日安此所謂吉人也事君也其友皆誠信有行好善如此者事君日益官職日進此所謂吉臣也人主也朝臣多賢左右多忠主有失敢交爭正諫交俱如此者國日安主日尊天下日服此所謂吉主也臣非能相人也能觀人之友也莊王善之於是疾收士日夜不懈遂霸天下先王用非其有如己有之通乎君道者也為宮室必任巧匠奚故奚何曰匠不巧則宮室不善也夫國重物也其不善也豈特宮室哉特猶直也巧匠為宮室為圓必以規為方必以矩為平直必以準繩功已就就成不知規矩準繩而賞巧匠宮室已成不知巧匠而皆曰此某君某王之宮室也人主之不通乎主道者則不然自為之則不能任賢者惡之與不肖者議之此功名之所以傷傷敗國家之所以危危亡湯武一日而盡有夏商之民盡有夏商之地盡有夏商之財以其民安而天下莫敢危之以其地封而天下莫不悅以其財賞而天下皆競勸勸進通乎用非其有也衛靈公天寒鑿池宛春諫曰天寒起役恐傷民傷病公曰天寒乎哉宛春曰公衣狐裘坐熊席是以不寒今民衣弊不補履決不組君則不寒民則寒矣公曰善令罷役左右以諫曰公鑿池不知天之寒也而春也知之以春之知也而令罷之福將歸於春也而怨將歸於君公曰不然夫春也魯國之匹夫也而我舉之舉用夫民未有見焉未見其德今將令人以此見之且春也有善如寡人有春之善非寡人之善歟靈公之論宛春也可謂知君道矣
