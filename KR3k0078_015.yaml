body:
  text: 漢書二志六經之道同歸而禮樂之用為急治身者斯須忘禮則暴嫚入之矣為國者一朝失禮則荒亂及之矣人函天地陰陽之氣有喜怒哀樂之情天稟其性而不能節也聖人能為之節而不能絶也故象天地而制禮樂所以通神明立人倫正情性節萬事者也哀有哭踊之節樂有歌舞之容正人足以副其誠邪人足以防其失故婚姻之禮廢則夫婦之道乖而淫僻之罪多鄉飲之禮廢則長幼之序亂而爭之獄繁祭祀之禮廢則骨肉之恩薄而背死忘先者衆朝聘之禮廢則君臣之位失而侵陵之漸起故孔子曰安上治民莫善於禮移風易俗莫善於樂禮節民心樂和民聲政以刑之刑以防之禮樂政刑四達而不悖則王道備矣樂以治內而為同同於和樂也禮以修外而為異尊卑為異同則和親異則畏敬和親則無怨畏敬則不爭揖讓而天下治者禮樂之謂也王者必因前王之禮順時宜有所損益即民心稍稍制作至太平而大備周監二代禮文尤具事為之制曲為之防故稱禮經三百威儀三千於是教化浹洽民用和睦災害不生禍亂不作囹圄空虛四十餘年及其衰也諸侯踰越法度惡禮制之害已去其篇籍遭秦滅學遂以亂亡漢興撥亂反正日不暇給猶命叔孫通制禮儀以正君臣之位高祖悅而歎曰吾乃今日知為天子之貴也遂定儀法未盡備而通終至文帝時賈誼以為漢承秦之敗俗棄禮義捐廉恥而大臣特以簿書不報期會為故至於風俗流溢恬而不怪夫移風易俗使天下回心而向道類非俗吏之所能為也立君臣等上下使綱紀有序六親和睦此非天之所為人之所設也人之所設不為不立不修則壞乃草具其儀天子悅焉而大臣絳灌之屬害之故其議遂寢至武帝即位議立明堂制禮服會竇太后不悅儒術其事又廢後董仲舒言王者承天意以從事故務德教而省刑罰今廢先王之德教獨用執法之吏治民而欲德化被四海故難成也是故古之王者莫不以教化為大務立大學以教於國設庠序以化於邑教化已明習俗已成天下嘗無一人之獄矣至周末世大為無道秦繼其後又益甚之今漢繼秦之後雖欲治之無可奈何法出而姦生令下而詐起如以湯止沸沸愈甚而無益譬之琴瑟不調甚者必解而更張之乃可鼓也為政而不行甚者必變而更化之乃可理也故漢得天下以來常欲以善治而至今不能勝殘去殺者失之當更化而不能更化也是時上方征討四夷鋭志武功不暇留意禮文之事至宣帝時琅邪王吉為諫大夫又上疏言欲治之主不世出公卿幸得遭遇其時未有建萬世之長策舉明主於三代之隆者也其務在於簿書斷獄聽訟而已此非太平之基也上不納其言至成帝時劉向要説上宜興辟雍設庠序陳禮樂隆雅頌之聲盛揖讓之容以風化天下如此而不治未之有也或曰不能具禮禮以養人為本如有過差是過而養人也刑罰之過或至死傷今之刑非皋陶之法也而有司請定法削則削筆則筆救時務也至於禮樂則曰不敢是敢於殺人不敢於養人也夫教化之比於刑法刑法輕是舍所重而急所輕也且教化所恃以為治刑法所以助治也今廢所恃而獨立其所助非所以致太平也成帝以向言下公卿議丞相大司空奏請立辟雍營表未作遭成帝崩世祖受命中興即位三十年四夷賓服政教清明乃營立明堂辟雍明帝即位躬行其禮威儀既盛美矣然德化未流洽者以其禮樂未具群下無所誦説而庠序尚未設之故也夫人宵天地之貌宵化也言稟天地氣化而生也懷五帝之性仁義禮智信也聰明精粹精細也粹淳也有生之最靈者也爪牙不足以供嗜欲趨走不足以避利害無毛羽以禦寒暑必將役物以為養用智而不恃力此所以為貴也故不仁愛則不能群不能群則不勝物不勝物則養不足群而不足爭心將作上聖卓然先行敬讓博愛之德者衆心悅而從之從之成群是為君矣歸而往之是為王矣洪範曰天子作民父母為天下王聖人取類以正名而謂君為父母明仁愛德讓王道之本也愛待敬而不敗德須威而久立故制禮以崇敬作刑以明威也聖人既躬明哲之性必通天地之心制禮作教立法設刑動緣民情而則天象地故因天秩而制五禮因天討而作五刑上刑用甲兵其次用斧鉞中刑用刀鋸其次用鑽鑿薄刑用鞭撲大者陳諸原野小者致諸市朝其所繇來者上矣自黃帝有涿鹿之戰顓頊有共工之陳共工主水官秉政作虐故顓頊伐之也唐虞之隆至治之極猶流共工放歡兜殺三苗殛鯀然後天下服夏有甘扈之誓殷周以兵定天下古人有言天生五材民並用之廢一不可誰能去兵鞭撲不可弛於家刑罰不可廢於國征伐不可偃於天下用之有本末行之有逆順耳孔子曰工欲善其事必先利其器文德者帝王之利器威武者文德之輔助也夫文之所加者深則武之所服者大德之所施者博則威之所制者廣三代之盛至於刑措兵寢者以其本末有序帝王之極功也春秋之時王道寢壞禮樂不興刑罰不中陵夷至於戰國韓任申子秦用商鞅連相坐之法造參夷之誅增加肉刑大辟有鑿顛押鑊亨之刑至於始皇兼吞戰國遂毀先王之法滅禮義之官專任刑罰躬操文墨而姦邪並生赭衣塞路囹圄成市天下愁怨潰而叛之高祖初入關約法三章蠲削煩苛兆民大悅其後四夷未附兵革未息三章之法不足以禦姦於是相國蕭何捃托秦法取其宜於時者作律九章當孝惠高后時蕭曹為相填以無為是以衣食滋殖刑罰用希及孝文即位躬修玄默勸趣農桑減省租賦將相皆舊功臣少文多質懲惡亡秦之政論義務在寬厚恥言人之過失化行天下告訐之俗易吏安其官民樂其業蓄積歲增戶口浸息風流篤厚禁罔疏闊選張釋之為廷尉罪疑者豫民是以刑罰大省至於斷獄四百有刑措之風即位十三年齊大倉令淳于公有罪當刑其少女緹縈上書曰妾父為吏齊中皆稱其廉平今坐法當刑妾傷夫死者不可復生刑者不復屬雖後欲改過自新其道無由也妾願沒入為官婢以贖父刑罪使得自新書奏天子天子憐悲其意遂下令曰蓋聞有虞氏之時畫衣冠異章服以為戮民不犯何治之至今法有肉刑三黥劓二刖左右趾合一凡三也而姦不止其咎安在非乃朕德之薄而教不明與吾甚自愧故夫訓道不純而愚民陷焉詩曰凱悌君子民之父母今人有過教未施而刑已加焉或欲改行為善而道無由至朕甚憐之夫刑至斷支體刻肌膚終身不息何其刑之痛而不德也豈稱為民父母之意哉其除肉刑有以易之善乎孫卿之論刑也曰世俗之為説者以為治古無肉刑有象刑是不然矣以為治古則人莫觸罪邪豈獨無肉刑哉亦不待象刑矣以為人或觸罪矣而直輕其刑是殺人者不死而傷人者不刑也罪至重而刑至輕民無所畏亂莫大焉凡制刑之本將以禁暴惡且懲其末也殺人者不死傷人者不刑是惠暴而寬惡也故象刑非生於治古方起於亂今也所以有象刑之言者近起今人惡刑之重故遂推言古之聖君但以象刑天下自治也凡爵列官職賞慶刑罰皆以類相從者也一物失稱亂之端也德不稱位能不稱官賞不當功刑不當罪不祥莫大焉夫征暴誅悖治之盛也殺人者死傷人者刑是百王之所同未有知其所由來者也故治則刑重亂則刑輕犯治之罪固重犯亂之罪固輕也書云刑罰世重世輕此之謂也書所謂象刑惟明者言象天道而作刑安有菲屨赭衣者哉孫卿之言既然又因俗説而論之曰禹承堯舜之後自以德衰而制肉刑湯武順而行之者以俗薄於唐虞故也今漢承衰周暴秦極弊之流俗已薄於三代而行堯舜之刑是猶以鞿羈而御駻突以繩繫馬領曰鞿駻突惡馬也違救時之宜矣且除肉刑者本欲以全民也今去髡鉗一等轉而入於大辟以死罔民失本惠矣故死者歲以萬數刑重之所致也至乎穿窬之盜忿怒傷人男女淫佚吏為姦臧若此之惡髡鉗之罰又不足以懲也故刑者歲十萬數民既不畏又曾不恥刑輕之所生也故俗之能吏公以殺盜為威專殺者勝任奉法者不治亂名傷制不可勝條是以網密而姦不塞刑繁而民愈嫚必世而未仁百年而不勝殘誠以禮樂闕而刑不正也豈宜惟思所以清原正本之論刪定律令撰二百章以應大辟其餘罪次於古當生今觸死者皆可募行肉刑及傷人與盜吏受賕枉法男女淫亂皆復古刑為三千章詆欺文致微細之法悉蠲除如此則刑可畏而禁易避吏不專殺法無二門輕重當罪民命得全合刑罰之中殷天人之和順稽古之制成時雍之化成康刑措雖未可致孝文斷獄庶幾可及也洪範八政一曰食二曰貨二者生民之本興自神農之世斫木為耜煣木為耒耒耨之利以教天下日中為市致天下之民聚天下之貨交易而退各得其所而貨通食足然後國實民富而教化成黃帝以下通其變使民不倦殷周之盛詩書所述要在安民富而教之也故易稱天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財財者帝王所以聚人守位養成群生治國安人之本也是以聖王域民築城郭以居之制井廬以均之開市肆以通之設庠序以教之士農工商四民有業聖王量能授事四民陳力受職故朝無廢官邑無傲民地無曠土孔子曰導千乘之國敬事而信節用而愛人使民以時故民皆勸功樂業先公而後私民三年耕則餘一年之畜衣食足而知榮辱廉讓生而爭訟息餘三年食進業曰登再登曰平三登泰平然後王德流洽禮樂成焉又曰糴甚貴傷民甚賤傷農民傷則離散農傷則國貧故甚貴與甚賤其傷一也善為國者使民毋傷而農益勸文帝即位躬修儉節思安百姓時民近戰國背本趣末賈誼説上曰管子曰倉廩實知禮節民不足而可治者自古及今未之嘗聞古之人曰一夫不耕或受之飢一女不織或受之寒生之有時而用之無度則物力必屈古之治天下至纖至悉也故其蓄積足恃今背本而趨末食者甚衆是天下之大殘也淫侈之俗日日以長是天下之大賊也殘賊公行莫之或止生之者甚少而靡之者甚多天下財産何得不蹶哉世之有飢穰天之行也天之行氣不能常孰禹湯被之矣即不幸有方二三千里之旱國胡以相恤卒然邊境有急數十萬之衆國胡以餽之兵旱相乘天下屈有勇者聚徒而橫擊並舉而爭起矣乃駭而圖之豈將有及乎夫積貯者天下之大命也茍粟多而財有餘何為而不成以攻則取以守則固以戰則勝懷敵附遠何招而不至今毆民而歸之農皆著於本使天下各食其力末技遊食之民轉而緣南則畜積足而人樂其所矣可以為富安天下而直為此稟稟也稟稟危也竊為陛下惜之於是上感誼言始開藉田躬耕以勸百姓朝錯復説上曰聖王在上而民不凍飢者非能耕而食之織而衣之也為開其資財之道也故堯禹有九年之水湯有七年之旱而國無捐瘠者捐謂民飢也或謂貧乞者為捐也以畜積多而備先具也今海內為一土地民人之衆不避湯禹加以無天災而畜積之未及者何也地有遺利民有餘力生穀之土未盡墾山澤之利未盡出遊食之人未盡歸農也民貧則姦邪生貧生於不足不足生於不農不農則不地著不地著則離鄉輕家民如鳥獸雖有高城深池嚴法重刑猶不能禁也夫寒之於衣不待輕暖飢之於食不待甘旨飢寒至身不顧廉恥人情一日不再食則飢終歲不製衣則寒夫腹飢不得食膚寒不得衣雖慈母不能保其子君安能以有民哉明主知其然也故務民於農桑薄賦斂廣蓄積以實倉稟備水旱故民可得而有也民者在上所以牧之趨利如水走下四方無擇也夫珠玉金銀飢不可食寒不可衣然而衆貴之者以上用之故也其為物輕微易臧在於把握可以周海內而無飢寒之患此令民易去其鄉盜賊有所勸亡逃者得輕資也粟米布帛生於地長於時聚於力非可一日成也數石之重中人不勝不為姦邪所利一日弗得而飢寒至是故明君貴五穀而賤金玉今農夫春耕夏耘秋穫冬藏伐薪樵給徭役春不得避風塵夏不得避暑熱秋不得避陰雨冬不得避寒凍四時之間無日休息又私自送往迎來弔死問疾養孤長幼在其中勤苦如此尚復被水旱之災急政暴虐賦斂不時朝令而暮改當其有者半賈而賣無者取倍稱之息取一償二為倍稱於是有賣田宅鬻子孫以償責者矣而商賈大者積貯倍息小者坐列販賣操其奇贏日遊都市乘上之急所賣必倍故其男不耕耘女不蠶織衣必文采食必粱肉無農夫之苦而有阡伯之得因其富厚交通王侯力過吏藝以利相傾千里遊敖冠蓋相望此商人所以兼農人農人所以流亡者也今法律賤商人商人已富貴矣尊農夫農夫已貧賤矣故俗之所貴主之所賤也吏之所卑法之所尊也上下相反好惡乖忤而欲國富法立不可得也方今之務莫若使民務農而已矣欲民務農在於貴粟貴粟之道在於使民以粟為賞罰今募天下入粟縣官得以拜爵得以除如此富人有爵農民有錢粟有所泄矣夫能入粟以受爵皆有餘者也取於有餘以供上用則貧民之賦可損所謂損有餘補不足令出而民利者也順於民心所補者三一曰主用足二曰民賦少三曰勸農功爵者上之所擅出於口而無窮粟者民之所種生於地而不乏夫得高爵與免人之所甚欲也使天下人入粟於邊以受爵免不過三歲塞下粟必多矣於是文帝從錯之言令民入粟邊各以多少級數為差至武帝之初七十年間國家無事都鄙廩庾盡滿而府庫餘財京師之錢纍百巨萬貫朽而不可校校數也太倉之粟陳陳相因充溢露積於外腐敗不可食衆庶街巷有馬阡陌之間成群守閭閻者食粱肉為吏者長子孫居官者以為姓號倉氏庾氏是也人人自愛而重犯法先行誼而黜愧辱焉於是罔疏而民富是後外事四夷內興功利役費並興而民去本天下虛耗人民相食武帝末年悔征伐之事乃封丞相為富民侯以趙過為搜粟都尉教民代田用力少而得穀多至昭帝時流民稍還田野益闢頗有蓄積宣帝即位用吏多選賢良百姓安土歲數豐穰穀至石五錢農人少利時大司農中丞耿壽昌奏言糴三輔弘農河東上黨太原郡穀足供京師可以省關東漕卒過半天子從其計壽昌遂白令邊郡皆以穀賤時增價而糴穀貴時減價而糶名曰常平倉民便之上乃賜壽昌爵關內侯至元帝時乃罷常平倉哀帝即位百姓訾富雖不及文景然天下戶口最盛平常崩莽遂篡位因漢承平之業胸奴稱藩百蠻賓服舟車所通盡為臣妾府庫百官之富天下晏然莽一朝有之而其意未滿小漢家制度以為疏闊宣帝始賜單于印璽與天子同而西南夷鉤町稱王莽乃遣使易單于印綬貶鉤町為侯二方始怨侵犯邊境莽遂興師發三十萬衆欲同時十道並出一舉滅胸奴海內擾矣又動欲慕古不度時宜分裂州郡改職作官下令更名天下田曰王田奴婢曰私屬皆不得賣買其男口不滿八而田過一井者分餘田與九族鄉黨犯令法至死制又不定吏緣為姦天下謷謷然陷刑者衆凡貨金錢布帛之用夏殷以前其詳靡記云太公為周立九府圜法圜即錢也退又行之於齊至管仲相桓公通輕重之權曰歲有凶穰故穀有貴賤令有緩急故物有輕重所緩則賤所急則貴人君不理則蓄賈遊於市乘民之不給百倍其本矣計本量委則足矣然而民有飢餓者穀有所藏也民有餘則輕之故人君斂之以輕民不足則重之故人君散之以重民輕之之時為斂糴之重之之時官為散之凡輕重斂散之以時即準平故大賈蓄家不得豪奪吾民矣秦兼天下幣為二等黃金以溢為名二十兩為溢秦以溢為一金漢以一斤為一金也錢質如周錢文曰半兩漢興以為秦錢重難用更令民鑄莢錢如榆莢也孝文為錢益多而輕更鑄四誅文為半兩除盜鑄錢令賈誼諫曰夫事有召禍而法有起姦今令細民人操造幣之執各隱屏而鑄作因欲禁其厚利微姦雖黥罪日報其執不止報論為法若此上何賴焉又民用錢郡縣不同法錢不立吏急而一之呼則大為煩苛而力不能勝縱而弗呵乎則市肆異用錢文大亂茍非其術何鄉而可哉今農事棄捐而采銅者繁姦錢日多五穀不為多民采銅鑄錢廢其農業故五穀不為多善人怵而為姦邪怵誘動心於姦邪也願民陷而之刑戮刑戮甚不祥奈何而忽上不聽是時吳以諸侯即山鑄錢富埒天子後卒叛逆鄧通大夫也以鑄錢財過王者故吳鄧錢布天下武帝因文景之蓄忿胡粵之害即位數年嚴助朱買臣等招來東甌事兩粵江淮之間蕭然煩費矣唐蒙司馬相如開西南夷鑿山通道千餘里以廣巴蜀巴蜀之民罷焉彭吳穿穢柏朝鮮置滄海郡則燕齊之間靡然發動及王恢設謀馬邑胸奴絶和親侵擾北邊兵連而不解天下共其勞干戈日滋行者齎居者送中外騷擾相奉財賂衰耗而不淡入物者補官出貨者除選舉陵夷廉恥相冒武力進用法嚴令具興利之臣自此而始其後衛青歲以數萬騎出擊胸奴遂取河南築朔方郡時又通西南夷道作者數萬人千里負擔餽餉率十餘鍾致一石鍾六石四斗置滄海郡築衛朔方轉漕甚遠自山東咸被其勞費數十百巨萬府庫並虛乃募民能入奴婢以終身復為郎增秩及入羊為郎始於此此後衛青比歲將十餘萬衆擊胡斬捕首虜之士受賜黃金二十餘萬斤而漢軍士馬死者十餘萬兵甲轉漕之費不與焉於是經用賦稅既竭不足以奉戰士有司請令民得買爵及贖禁錮免贓罪大者封侯卿大夫小者郎吏道雜而多端官職耗廢票騎仍再出擊胡大克獲渾邪王率數萬衆來降皆得厚賞衣食仰給縣官縣官不給天子乃損膳解乘輿駟出御府禁藏以淡之費以億計縣官大空富商賈財或纍萬金而不佐公家之急於是天子與公卿議更造錢造幣以淡用而摧浮淫并兼之徒於是以東郭咸陽孔僅為大司農丞領鹽鐵事而桑私羊貴幸侍中故三人言利事析秋豪矣法既益嚴吏多廢免皆謫令伐棘上林作昆明池其明年大將軍票騎大出擊胡賞賜五十萬金軍馬死者十餘萬匹轉漕車甲之費不與焉是時財匱戰士頗不得祿矣諸賈人末作貰貸及商以取利者雖無市籍各以其物自占率緡錢二千而算一軺車一算商賈人軺車二算商賈人有軺車使出二算重其賦也船五丈以上一算匿不自占占不悉戍邊一歲沒入緡錢有能告者以其半畀之是時豪富皆爭匿財唯卜式數求入財以助縣官天子乃超拜式為中郎賜爵左庶長田十頃布告天下以風百姓自造白金五銖錢後五歲而赦吏民之坐盜鑄金錢死者數十萬人其不發覺相殺者不可勝計赦自出者百餘萬人然不能半自出矣犯法者衆吏不能盡誅於是遣博士褚大徐偃等分行郡國舉并兼之徒而御史大夫張湯方貴用事減宣杜周等為中丞義縱尹齊王溫舒等用慘急苛刻為九卿直指夏蘭之屬始出而大農顏異誅矣自是後有腹非之法比而公卿大夫多諂諛取容天子既下緡錢令而尊卜式百姓終莫分財佐縣官於是告緡錢縱矣揚可告緡天下中家以上大氐皆遇告得民財物以億計奴婢以千萬數田大縣數百頃小縣百餘宅亦如之於是商賈中家以上大氐破民偷甘食好衣不事蓄藏之業而縣官以鹽鐵緡錢之故用少饒矣是時越欲與漢用船戰逐水戰相逐乃大修昆明池列館環之治樓船高十餘丈作柏梁臺高數十丈宮室之修由此日麗明年天子始巡郡國公卿白議封禪事而郡國皆豫治道修繕故宮儲設共具而望幸明年南越反西羌侵邊天子因南方樓船士二十餘萬人擊越發三河以西騎擊羌又度河築令居初置張掖酒泉郡而上郡朔方西河河西開田官斥塞卒塞上候斥卒也六十萬人戍田之中國繕道餽糧遠者三千餘里邊兵不足乃發武庫工官兵器以淡之齊相卜式上書願父子死南粵天子下詔揚賜爵關內侯黃金四十斤田十頃布告天下天下莫應列侯以百數皆莫求從軍至飲酎少府省金省視諸侯金有輕重而列侯坐酎金失侯者百餘人乃拜卜式為御史大夫式既在位見郡國多不便縣官作鹽鐵器或強令民買之而船有算因孔僅言船算事上不説然兵所過縣縣以為訾給毋乏而已不敢言輕賦法矣元封元年卜式貶為太子太傅而桑弘羊為治粟都尉領大農乃請置大農部丞數十人分部主郡國各往往置均輸鹽鐵官盡籠天下之貨名曰平準不復告緡民不益賦天下用饒於是弘羊賜爵左庶長黃金者再百焉是歲小旱上令百官求雨卜式言曰縣官當食租衣稅而已今弘羊令吏坐市列販物求利烹弘羊天乃雨久之拜弘羊為御史大夫昭帝即位詔郡國舉賢良文學士問以民所疾苦教化之要皆對願罷鹽鐵酒榷均輸官毋與天下爭利示以節儉然後教化可興乃罷酒酤宣元成哀平五世亡所變改王莽居攝變漢制更作金銀龜貝錢布之品名曰寶貨凡寶貨五物六名二十八品百姓憒亂其貨不行民私以五銖錢市買莽患之下詔敢非井田挾五銖錢者為惑衆投諸四裔以御魑魅於是商農失業食貨俱廢民涕泣於市道坐賣買田宅奴婢鑄錢抵者自公卿大夫至庶人不可勝數莽知民愁乃但行小錢直一與大錢五十二品並行龜貝布屬且寢莽性擾不能毋為每有所興造必欲依古得經文羲和置命士督五均六斡郡有數人皆用富賈乘傳求利交錯天下因與郡縣通姦多張空簿府藏不實百姓愈病莽每一斡為設科條防禁犯者至死姦吏猾民並侵衆庶各不安生每一易錢民用破業而大陷刑莽以私鑄錢死及非沮寶貨投四裔犯法者多不可勝計乃更輕其法私鑄作泉布者與妻子沒入為官奴婢吏及比伍知而不舉告與同罪非沮寶貨民罰作一歲吏免官犯者俞衆及五人相坐皆沒入郡國檻車鐵傳送長安鍾官愁苦死者十六七胸奴侵寇甚莽大募天下囚徒人奴名曰豬突狶勇豬性觸突人故取以喻一切稅吏民訾三十而取一又令公卿已下至郡縣黃綬吏皆保養軍馬吏盡復以與民民搖手觸禁不得耕桑徭役煩劇而枯旱蝗蟲相因又用制作未定上自公侯下至小吏皆不得奉祿而私賦斂貨賂上流獄訟不決吏用苛暴立威旁緣莽禁侵刻小民富者不得自保貧者無以自存起為盜賊依阻山澤吏不能禽而覆蔽之浸淫日廣於是青徐荊楚之地往往萬數戰死亡緣邊四夷所係虜陷罪飢疫人相食及莽未誅而天下戶口減半矣自發豬突狶勇後四年而漢兵誅莽昔仲尼沒而微言絶隱微不顯之言七十子喪而大義乖戰國從橫真偽分爭諸子之言紛然殽亂至秦患之乃焚滅文章以愚黔首漢興改秦之敗大收篇籍廣開獻書之路建藏書之策置寫書之官書必同文不知則闕問諸故老至於衰世是非亡正人用其私古之學者耕且養三年而通一藝存其大體玩經文而已是故用日約少而蓄德多三十而五經立也後世經傳既已乖離博學者又不思多聞闕疑之義而務碎義逃難便辭巧説破壞形體説五字之文至於二三萬言後進彌以馳逐故幼童而守一藝白首而後能言以安其所習毀所不見終以自蔽此學者之患也儒家者流蓋出於司徒之官助人君順陰陽明教化者也遊文於六經之中留意於仁義之際祖述堯舜憲章文武宗師仲尼以重其言於道最為高然惑者既失精微而辟者又隨時抑揚違離道本茍以譁衆取寵後進循之是以五經乖析儒學寢衰此辟儒之患也道家者流蓋出於史官歷紀成敗存亡禍福古今之道秉要執本清虛以自守卑弱以自持此君人南面者之術也合於堯之克讓易之嗛嗛一謙而四益此其所長也及放者為之則欲絶去禮學兼棄仁義曰獨任清虛可以為治陰陽家者流蓋出於羲和之官敬順昊天歷象日月星辰敬授民時此其所長也及拘者為之則牽於禁忌泥於小數舍人事而任鬼神法家者流蓋出於理官信賞必罰以輔禮制此其所長也及刻者為之則無教化去仁愛專任刑法而欲以致治至於殘害至親傷恩薄厚名家者流蓋出於禮官古者名位不同禮亦異數孔子曰必也正名乎此其所長也及譥者為之則茍鉤鈲析亂而已墨家者流蓋出於清廟之守茅屋採椽是以貴儉養三老五更是以兼愛選士大射是以上賢宗祀嚴父是以右鬼右鬼謂信鬼神親鬼而右之順四時而行是以非命言無吉凶之命但有賢不肖善惡也以孝視天下是以上同言皆同可以治此其所長也及蔽者為之見儉之利因以非禮樂推兼愛之意而不知別親疏從橫家者流蓋出於行人之官孔子曰使乎使乎言當權事制宜受命而不受辭此其所長也及邪人為之則上詐諼而棄其信雜家者流蓋出於議官兼儒墨合名法知國體之有此見王治之無不貫此其所長也及蕩者為之則漫羡而無所歸心農家者流蓋出於農稷之官播百穀勸耕桑以足衣食故孔子曰所重民食此其所長也及鄙者為之以為無所事聖王欲使君臣並耕悖上下之序
