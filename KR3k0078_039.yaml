body:
  text: 孫卿子孫卿子君子曰學不可以已青取之藍而青於藍冰水為之而寒於水故木受繩則直金就礪則利君子博學而日三省乎己則知明而行無過矣故不登高山不知天之高也不臨深溪不知地之厚也不聞先王之遺言不知學問之大也于越夷貊之子生而同聲長而異俗教使之然也吾嘗終日而思矣不如須臾之所學吾嘗跂而望矣不如登高之博見也登高而招臂非加長也而見者遠順風而呼聲非加疾也而聞者彰假輿馬者非利足也而致千里假舟楫者非能水也而絶江河君子生非異也善假於物也故君子居必擇鄉遊必就士所以防邪僻而近中正也積土成山風雨興焉積水成淵蛟龍生焉積善成德聖心備焉故不積跬步無以至千里不積小流無以成河海故聲無小而不聞行無隱而不形玉在山而木草潤淵生珠而崖不枯為善積也安有不聞者乎見善必以自存也見不善必以自省也故非我而當者吾師也是我而當者吾友也諂諛我者吾賊也故君子隆師而親友以致惡其賊好善無厭受諫而能誡雖欲無進得乎哉小人反是致亂而惡人之非己致不肖而欲人之賢己心如狼虎行如禽獸而又怨人之賊己諂諛者親諫爭者疏循正為笑至忠為賊雖欲無滅亡得乎哉夫驥一日而千里駑馬十駕則亦及之矣或遲或速或先或後耳胡為乎其不可相及也跬步而不休跛千里纍土而不輟丘山崇成彼人之才性之相懸也豈若跛之與六驥足哉然而跛致之六驥不致是無他故焉或為之或不為耳君子易知而難狎易懼而難脅畏患而不避義死欲利而不為所非交親而不比言辨而不辭蕩蕩乎其有以殊於世也君子能亦好不能亦好小人能亦醜不能亦醜君子能則寬容直易以開導人不能則恭敬撙絀以畏事人小人能則倨傲僻違以驕溢人不能則妒嫉怨誹以傾覆人故曰君子能則人榮學焉不能則人樂告之小人能則人賤學焉不能則人羞告之是君子小人之分也君子養心莫善於誠致誠無他唯仁之守唯義之行誠心守仁則能化誠心行義則能變變化代興謂之天德天不言而人推高焉地不言而人推厚焉四時不言而百姓期焉夫此有常以至其誠者也君子至德默然而喻未施而親不怒而威天地為大矣不誠則不能化萬物聖人為智矣不誠則不能化萬民父子為親矣不誠則疏君上為尊矣不誠則卑夫誠者君子之守而政事之本也君子位尊而志恭心小而道大所聽視者近而所聞見者遠是何耶則操術然也君子審後王之道而論於百王之前推禮義之統分是非之分總天下之要治海內之衆若使一人故操彌約而事彌大五寸之矩盡天下之方故君子不下室堂而海內之情舉積此者則操術然也好榮惡辱好利惡害是君子小人所同也若其所以求之道則異小人疾為誕而欲人之信己疾為詐而欲人之親己禽獸行而欲人之善己慮之難知也行之難安也持之難立也成則必不得其所好必遇其所惡焉故君子者信矣而亦欲人之信己忠矣而亦欲人之親己修正治辨矣而亦欲人之善己慮之易知也行之易安也持之易立也成則必得其所好必不遇其所惡焉是故窮則不隱通則大明身死而名彌白兼服天下之心高上尊貴不以驕人聰明聖智不以窮人齊給速通不爭先人剛毅勇敢不以傷人不知則問不能則學雖能必讓君子能為可貴不能使人必貴己能為可信不能使人必信己能為可用不能使人必用己故君子恥不修不恥見污恥不信不恥不見信恥不能不恥不見用是以不誘於譽不恐於誹率道而行端然正己不為物傾側夫是之謂誠君子仲尼之門人五尺之豎子言羞稱乎五伯是何也曰然彼非本政教也非致隆高也非綦文理也非服人心也向方略審勞逸畜積修而能顛倒其敵者也詐心已勝矣彼以讓飾爭依乎仁而蹈利者也小人之傑也彼固曷足稱乎大君子之門哉彼王者不然致賢而能以救不肖致強而能以寬弱戰必能殆之而羞與之委然成文以示之天下自化矣有災繆者然後誅之故聖王之誅甚省矣秦昭王問孫卿曰儒無益於人之國孫卿曰儒者法先王隆禮義謹乎臣子而致貴其上者也雖窮困凍餒必不以邪道為貪無置錐之地而明於持社稷之大義勢在人上則王公之材也在人下則社稷之臣國君之寶也雖隱於窮閻陋屋人莫不貴貴道誠存也在本朝則美政在下位則美俗儒之為人下如是矣其為人上也廣大矣志意定乎內禮節修乎朝法則度量正乎官忠信愛利形乎下故近者歌謳而樂之遠者竭蹶而趨之四海之內若一家通達之屬若不從服夫其為人下也如彼其為人上也如此何為其無益於人之國乎昭王曰善君子之所謂賢者非能能人之所能之謂也君子之所謂知者非能知人之所知之謂也君子之所謂辨者非能辨人之所辨之謂也君子之所謂察者非能察人之所察之謂也有所止矣相高下序五種君子不如農人通財貨辨貴賤君子不如賈人設規矩便備用君子不如工人若夫論德而定次量能而授官使賢不肖皆得其位能不能皆得其官萬物得宜事變得應言必當理事必當務然後君子之所長也君子無爵而貴無祿而富不言而信不怒而威窮處而榮獨居而樂豈不至尊至富至重至嚴哉請問為政曰聽政之大分以善至者待之以禮以不善至者待之以刑兩者分別則賢不肖不雜是非不亂賢不肖不雜則英傑至是非不亂則國家治若是令行禁止王者之事畢矣公平者職之衡也中和者聽之繩也其有法者以法行其無法者以類舉聽之盡也偏黨而無經聽之辟也故有良法而亂者有之矣有君子而亂者自古及今未嘗聞也傳曰治生乎君子而亂生乎小人此之謂也馬駭輿則君子不安輿庶人駭政則君子不安位馬駭輿則莫若靜之庶人駭政則莫若惠之選賢良舉篤敬興孝悌收孤寡如是則庶人安政然後君子安位矣傳曰君者舟也庶人者水也水則載舟水則覆舟此之謂也故君人者欲安則莫若平政愛民矣欲榮則莫若隆禮敬士矣欲立功名則莫若尚賢使能矣是君人者之大節也三節者當則其餘莫不當矣三節者不當則其餘雖曲當由將無益也成侯嗣公聚斂計數之君也未及取民也鄭子産取民者也未及為政也管仲為政者也未及修禮也故修理者王為政者強取民者安聚斂者亡故王者富民霸者富士僅存之國富大夫亡國富筐篋實府庫筐篋已富府庫已實而百姓貧夫是之謂上溢而下漏入不可以守出不可以戰則傾覆滅亡可立而待也故我聚之以亡敵得之以強聚斂者召寇肥敵亡國危身之道也故明君不蹈也足國之道節用裕民而善藏其餘也節用以禮裕民以政彼裕民則民富出實百倍上以法取焉而下以禮節用之餘若丘山夫君子奚患乎無餘也故知節用裕民則必有仁義聖良之名而且有富厚丘山之積矣不知節用裕民則民貧出實不半上雖好取侵奪猶將寡獲也而或以無禮節用之則必有貪利之名而且有空虛窮乏之實矣禮者貴賤有等長幼有差貧富輕重皆有稱者也德必稱位位必稱祿祿必稱用由士以上則必以禮樂節之衆庶百姓則必以法數制之輕田野之稅平關市之征省商賈之數罕興力役無奪農時如是則國富矣夫是謂以政裕民也人之生不能無群群而無分則爭爭則亂亂則窮矣故無分者人之大害也有分者天下之本利也古者先王分割而等異之也故使或美或惡或厚或薄或逸樂或劬勞非特以為淫夸之聲將以明仁之文通仁之順也故為雕琢刻鏤黼黻文章使之以辨貴賤而已不求其觀為鍾鼓管磬琴瑟竽笙使之以辨吉凶合歡定和而已不求其餘為宮室臺榭使以避燥濕辨輕重而已不求其外若夫重色而衣之重味而食之重財物而制之合天下而君之非特以為淫泰也以為王天下理萬變裁萬物養萬民兼制天下者為莫若仁人之善也夫故其知慮足以治之其仁厚足以安之其德音足以化之得之則治失之則亂百姓誠賴其智也故相率而為之勞苦以務逸之以養其智也誠美其厚也故為之出死斷亡以覆救之以養其厚也誠美其意也故為雕琢刻鏤黼黻文章以藩飾之以養其德也故仁人在上百姓貴之如帝親之如父母為之出死斷亡者無他故焉其所是焉誠美其所得焉誠大其所利焉誠多也故曰君子以德小人以力也百姓之力待之而後功百姓之群待之而後和百姓之財待之而後聚百姓之勢待之而後安百姓之壽待之而後長父子不得不親兄弟不得不順男女不得不歡少者以長老者以養故曰天地生之聖人成之此之謂也今之世不然厚刀布之斂以奪之財重田野之稅以奪之食苛關市之征以難其事權謀傾覆以靡弊之百姓曉然皆知其將大危亡也是以臣背其節而不死其事者無他故焉人主自取之也不教而誅則刑繁而邪不勝教而不誅則姦民不懲誅而不賞則勤勵之民不勸誅賞而不類則下疑俗險而百姓不一故先王明禮義以一之致忠信以愛之尚賢使能以次之爵服賞慶以申重之時其事輕其任以調齊之兼覆之養長之如保赤子若是故姦邪不作盜賊不起而化善者勸勉矣是何則其道易其塞固其政令一其防表明也故曰上一則下一矣上二則下二矣國者天下之制利用也人主者天下之利勢也得道以持之則大安也大榮也不得道以持之則大危矣大纍矣故用國者義立而王信立而霸權謀立而亡三者明主之所謹擇也仁人之所務白也湯以亳武王以鎬皆百里之地也天下為一諸侯為臣通達之屬莫不從服無他故焉以濟義矣是所謂義立而王也齊桓晉文楚莊吳闔廬越句踐是皆僻陋之國也威動天下強殆中國無他故焉信也是所謂信立而霸也不務張其義濟其信唯利之求內則不憚詐其民而求小利焉外則不憚詐其與而求大利焉內不修正其所以有然常欲人之有如是則臣下百姓莫不以詐心得其上矣上詐其下下詐其上則是上下析也如是則敵國輕之與國疑之權謀日行而國不免危亡齊閔薛公是也是無他故焉唯其不由禮義而由權謀也三者明主之所謹擇也而仁人之所務白也善擇者制人不善擇者為人制之國君者天下之大器也重任也不可不善為擇所而後措之措險則危不可不善為擇道然後道之塗穢則塞危塞則亡故道王者之法與王者之人為之則亦王矣道霸者之法與霸者之人為之則亦霸矣道亡國之法與亡國之人為之則亦亡矣故國者世以新者也改玉改行也一朝之日也一日之人也然而有千歲之國何也曰援夫千歲之信法以持之也安與夫千歲之信士為之也人無百歲之壽百有千歲之信士何也曰以夫千歲之法自持者是乃千歲之信士矣故與積禮義之君子為之則王與端誠信全之士為之則霸與權謀傾覆之人為之則亡三者明主之所謹擇也國危則無樂君國安則無憂民亂則國危治則國安今君人者急逐樂而緩治國豈不過甚哉譬之是由好聲色而恬無耳目也豈不哀哉故百樂者生於治國者也憂患者生於亂國者也急逐樂而忘治國非知樂者也故明君者必將先治其國然後百樂得其中暗君者必將荒逐樂而緩治國故憂患不可勝校也必至於身死國亡然後止也豈不哀哉將以為樂乃得憂焉將以為安乃得危焉將以為福乃得死亡焉豈不哀哉嗚呼君人者亦可以察若言矣故治國有道人主有職若夫論一相以兼率之使臣下百吏莫不宿道向方而務是夫人主之職也若是則名配堯禹人主者守至約而詳事至逸而功垂衣裳不下簟席之上而海內之人莫不願得以為帝王夫是之謂至約樂莫大焉人主者以官人為能者也匹夫者以自能為能者也人主得使人為之匹夫則無所移之今以一人兼聽天下必自為之然後可則勞苦耗萃莫甚焉如是則雖臧獲不肯與天子易勢業以是懸天下一四海役夫之道也傳曰士大夫分職而聽諸侯之君分土而守三公總方而議則天子拱己止矣故人主欲得善射射遠中微則莫若使羿逢門矣欲得善馭及速致遠則莫若使王良造父矣欲調一天下制秦楚則莫若聰明君子矣其用智甚簡其為事不勞而功名致大甚易處而甚可樂矣夫貴為天子富有天下名為聖王兼制人人莫得而制也是人情之所同欲也欲是之主並肩而存能建是之士不世絶千歲而不合何也曰人主不公人臣不忠也人主則外賢而偏舉人臣則爭職而妒賢是其所以不合之故也人主胡不廣焉無恤親疏無偏貴賤唯誠能之求人臣輕職業讓賢而安隨其後矣如是則功一天下名配禹舜物由有可樂如是其美者乎嗚呼君人者亦可以察若言矣治國者分已定則主相臣下百吏各謹其所聞不務聽其所不聞各謹其所見不務視其所不見則雖幽間靜僻百姓莫不敬分安制以化其上是治國之徵也主道治近不治遠治明不治幽治一不治二主能治近則遠者理主能治明則幽者化主能當一則百事正夫兼聽天下日有餘而治不足者如此也是治之極也既能治近又務治遠既能治明又務治幽既能當一又務正百是過者也過猶不及也不能治近又務治遠不能察明又務見幽不能當一又務正百是悖者也故明主好要而暗主好詳主好要則百事詳主好詳則百事荒矣國得百姓之力者富得百姓之死者強得百姓之譽者榮三得者具而天下歸之三得者亡而天下去之湯武興天下同利除天下同害政令制度所以接百姓者有非理如豪末必不加焉故百姓親之如父母為之死亡而不偷也亂世不然使愚詔智不肖臨賢生民則致貧隘使民則甚勞苦又望百姓為之死不可得也孔子曰審吾所以適人人之所以來我也大國之主好見小利又好以權謀傾覆之人斷事社稷必危是傷國者也大國之主好詐群臣亦從而成俗群臣若是則衆庶亦不隆禮義而好貪利矣君臣上下之俗莫不若是則地雖廣權必輕人雖衆兵必弱刑雖繁令不下通是之謂傷國有亂君無亂國有治人無治法羿之法未亡也而羿不世中禹之法猶存而夏不世王故法不能獨立得其人則存失其人則亡法者治之端也君子者法之源也故有君子則法雖省足以矣無君子則法雖具足以亂矣故明主急得其人而暗主急得其勢忽得其人則身逸而國治功大而名美急得其勢則身勞而國亂功廢而名辱故君人者勞於索之而休於使之械數者治之流也非治之源也君子者治之源也官人守數君子養源故上好禮義尚賢使能而無貪利之心則下亦將綦辭讓致忠信而謹於臣子矣故賞不治政令不繁而俗美百姓莫敢不順上之法象上之志而勸上之事而安樂之矣君者民之源也源清則流清源濁則流濁故有社稷而不能愛民不能利民而求民之親愛己不可得也民不親不愛而求其為己用為己死不可得也民不為己用不為己死而求兵之徑城之固不可得也兵不徑城不固而求敵之不至不可得也敵至而求無危削不滅亡不可得也故人主欲強固安樂則莫若反之民欲附下一民則莫若反之政欲修政美國則莫若求其人故君人者愛民而安好士而榮兩者無一焉而亡也明分職序事業拔材官能莫不治理則公道達而私門塞矣公義明而私事息矣如是則德厚者進而佞悅者止貪利者退而廉節者起兼聽齊明而百事不留故天子不視而見不聽而聰不慮而知不動而功塊然獨坐而天下從之如四支之從心也人主有六患使賢者為之則與不肖者規之使智者慮之則與愚者論之使修士行之則與奸邪之人疑之雖欲成功得乎哉譬之是猶立直木而恐其影之枉也惑莫大焉語曰公正之士衆人之痤也循道之人奸邪之賊也今使奸邪之人論其怨賊而求其無偏得乎哉譬之是猶立枉木而求其影之直也亂莫大焉故古之人為之不然其取人有道其用人有法取人以道參之以禮用人之法禁之以等行義動靜度之以禮智慮取舍稽之以成日月積久校之以功故卑不得臨尊輕不得懸重愚不得謀智是以萬舉不過也人主欲得善射射遠中微者欲得善馭及速致遠者懸貴爵重賞以招致之內不可阿子弟外不可隱遠人能致是者取之是豈不必得之之道哉雖聖人不能易也欲治國馭民調一上下將內以固城外以拒難治則制人人不能制也亂則危辱滅亡可立而待也而求卿相輔佐則獨不若是其公也唯便辟親比己者之用也豈不過甚哉故有社稷者莫不欲強俄則弱矣莫不欲安俄則危矣莫不欲存俄則亡矣故明主有私人以金石珠玉無私人以官職事業是何也曰本不利於所私也彼不能而主使之則是主暗也臣不能而誣能則是臣詐也主暗於上臣詐於下滅亡無日俱害之道也夫文王非無貴戚也非無子弟也非無便僻也乃舉太公而用之兼制天下立七十一國姬姓獨居五十三人周之子孫莫不為顯諸侯如是者能愛人也故舉天下之大道立天下之大功然後隱其所憐所愛故曰唯明主為能愛其所愛暗主則必危其所愛此之謂也從命而利君謂之順從命而不利君謂之諂逆命而利君謂之忠逆命而不利君謂之算不恤君之榮辱不恤國之臧否偷合茍容以持祿養交而已謂之國賊君有過謀過事將危國家隕社稷之具也大臣父兄有能進言於君用則可不用則去謂之諫有能進言於君用則可不用則死謂之爭有能比智同力率群臣百吏而相與強君矯君以解國之大患除國之大害成於尊君安國謂之輔有能抗君之命竊君之重反君之事以安國之危除君之辱謂之弼故諫爭輔弼之人社稷之臣也國君之寶也明君之所尊所厚也而暗主惑君為己賊也故明君之所賞暗君之所罰也暗君之所賞明君之所殺也傳曰從道不從君正義之臣設則朝廷不頗諫爭輔弼之人信則君過不遠爪牙之士施則仇讎不作邊境之臣處則界垂不喪故明主好同暗主好獨明主尚賢使能而饗其盛暗主妒賢畏能而滅其功罰其忠賞其賊夫是之謂至暗有大忠者有次忠者有下忠者有國賊者以德覆君而化之大忠也以德調君而補之次忠也以是諫非而怒之下忠也不恤君之榮辱不恤國之臧否偷合茍容以持祿養交而已國賊也人主之患不在乎不言而在乎不誠夫言用賢者口也卻賢者行也口行相反而欲賢者之至不肖者之退不亦難乎夫曜蟬者務在明其火振其樹而已火不明雖振其樹無益也今人主有能明其德則天下歸之若蟬之歸明火也臨武君與荀卿議兵於趙孝成王前王曰請問兵要臨武君曰上得天時下得地利觀敵之變動後之發先之至此用兵之要術也荀卿曰不然所聞古之道凡用兵戰攻之本在乎一民也弓矢不調則羿不能以中微六馬不和則造父不能以致遠士民不親附則湯武不能以必勝也故善附民者是乃善用兵者也故兵要在乎善附民而已臨武君曰不然兵之所貴者勢利也所行者變詐也善用之者莫知其所從出孫吳用之無敵於天下豈必待附民乎荀卿曰不然臣之所道仁人之兵王者之志也君之所貴權謀勢利攻奪變詐也仁人之兵不可詐也彼可詐者怠慢者也故以桀詐桀猶有幸焉以桀詐堯譬之若以卵投石若以指撓沸若赴水火入焉焦沒耳故仁人上下一心三軍同力臣之於君下之於上若子之事父弟之事兄若手臂之捍頭目而覆胸腹也詐而襲之與先驚而後擊之一也臨武君曰善陳囂問荀卿曰先生議兵常以仁義為本仁者愛人義者修理然則又何以兵為凡所為有兵者為爭奪也荀卿曰非汝所知也彼仁者愛人愛人故惡人之害之也義者修理修理故惡人之亂之也彼兵者所以禁暴除害也非爭奪也故仁人之兵所存者神所過者化若時雨之降莫不悅喜故近者親其善遠者慕其德兵不血刃遠邇來服德盛於此施及四極天行有常不為堯存不為桀亡應之以治則吉應之以亂則凶強本而節用則天不能貧養備而動時則天不能病循道而不忒則天不能禍故水旱不能使之饑寒暑不能使之疾妖不能使之凶背道而妄行則天不能吉故水旱未至而饑寒暑未薄而疾怪未生而凶受時與治世同而殃禍與治世異不可以怨天其道然也故明於天人之分則可謂至人矣天不為人之惡寒輟冬地不為人之惡遼遠輟廣君子不為小人之胸胸輟行天有常道地有常數君子有常體君子道其常小人計其功星墜木鳴國人皆恐是天地之變陰陽之化物之罕至者也怪之可也而畏之非也夫日月之有食風雨之不時怪異之儻見是無世而不嘗有之上明而政平則是雖並世起無傷也上暗而政險則是雖無一至者無益也若夫天地之變畏之非也人妖則可畏也政險失民田薉稼惡糴貴民饑道路有死人夫是之謂人妖也政令不明舉措不時本事不理夫是之謂人妖也禮義不修外內無別男女淫亂父子相疑上下乖離寇難日至夫是之謂人妖也三者錯無安國矣其說甚邇其災甚慘傳曰萬物之怪書不說無用之辨不急之察棄而不治也若夫君臣之義父子之親夫婦之別則日切磋而不舍也在天者莫明於日月在人者莫明於禮義故人之命在天國之命在禮君人者隆禮尊賢而王重法愛民而霸好利多詐而危權謀傾覆而亡矣主道明則下安主道幽則下危故下安則貴上下危則賤上故上易知則下親上矣上難知則下畏上矣下親上則上安下畏上則上危故主道莫患乎難知莫危乎使下畏己傳曰惡之者衆則危矣入孝出悌人之小行也上順下篤人之中行也從道不從君從義不從父人之大行也孝子所以不從命有三從命則親危不從命則親安孝子不從命乃衷也從命則親辱不從命則親榮孝子不從命乃義也從命則禽獸不從命則修飾孝子不從命乃敬也故可以從而不從是不子也未可以從而從是不衷也明於從不從之義而能致恭敬忠信端愨以慎行之則可謂大孝矣傳曰從道不從君從義不從父此之謂也繁弱巨黍古之良弓也然而不得排檠則不能自正干將莫邪古之良劍也然而不加砥礪則不能利不得人力則不能斷驊騮騄耳古之良馬也然而必前有銜轡之制後有鞭策之威加之以造父之馭然後一日致千里也夫人雖有性質美而心辨智必求賢師而事之擇賢友而友之得賢師而事之則所聞者堯舜禹湯之道也得良友而友之則所見者忠信敬讓之行也身日進於仁義而不自知者靡使然也今與不善人處則所聞者欺誣詐僞也所見者汙漫淫邪貪利之行也身且加於刑戮而不自知者靡使然也傳曰不知其子視其友不知其君視其左右靡而已矣桓公用其賊文公用其盜故明主任計不信怒暗主信怒不任計計勝怒則強怒勝計者亡天子即位上卿進曰如之何憂長也能除患則為福不能則為賊授天子一策中卿進曰配天而有下土者先事慮事先患慮患先事慮事謂之接接則事優成先患慮患謂之豫豫則禍不生事至而後慮者後之後之則事不舉患至而後慮者謂之困困則禍不可禦授天子二策下卿進曰敬戒無怠慶者在堂弔者在閭禍與福鄰莫知其門務哉務哉萬民望之授天子三策口能言之身能行之國寶也口不能言身能行之國器也口能言之身不能行國用也口言善身行惡國妖也治國者敬其寶愛其器任其用除其妖義與利者人之所兩有也雖堯舜不能去民之欲利然而能使其欲利不克其好義也雖桀紂亦不能去民之好義然而能使其好義不勝其欲利也故義勝利者為治世利克義者為亂世上重義則義克利上重利則利克義故天子不言多少諸侯不言利害大夫不言得喪士不通貨財從士以上皆羞利而不與民爭業樂分施而恥積藏然後民不困則貧窶者有所竄其中矣仁義禮善之於人也譬之若貨財粟米之於家也多有之者富少有之者貧至無有者窮聖王在上分義行乎下則士大夫無沈淫之行百吏官人無怠慢之事衆庶百姓無姦怪之俗無盜賊之罪莫敢犯上之禁天下曉然皆知夫盜竊之不可以為富也皆知夫賊害之不可以為壽也皆知夫犯上之禁不可以為安也由其道則人得其所好焉不由其道則必遇其所惡焉是故刑罰甚省而威行如流也故刑當罪則威不當罪則侮爵當賢則貴不當賢則賤古者刑不過罪爵不踰德故殺其父而臣其子殺其兄而臣其弟刑罰不怒罪爵賞不踰德是以為善者勸為不善者沮威行如流化易如神亂世不然刑罰怒罪爵賞踰德以族論罪以世舉賢故一人有罪而三族皆夷雖德如舜不免刑均是以族論罪也先祖賢子孫必顯行雖如桀列從必尊此以世舉賢也以族論罪以世舉賢欲無亂得乎尊聖者王貴賢者霸敬賢者存嫚賢者亡古今一也故尚賢使能等貴賤分親疏序長幼此先王之道也故尚賢使能則主尊下安貴賤有等則令行而不留親疏有分則施行而不悖長幼有序則事業捷成而有所休故仁者仁此者也義者分此者也節者死生此者也忠者惇慎於此者也兼此而能之備矣
