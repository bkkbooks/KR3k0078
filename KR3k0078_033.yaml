body:
  text: 管子牧民凡有地牧民者務在四時守在倉廩倉廩實則知禮節衣食足則知榮辱上服度則六親固四維張則君令行四維不張國乃滅亡國有四維一維絶則傾二維絶則危三維絶則覆四維絶則滅傾可正也危可安也覆可起也滅不可復錯也四維一曰禮二曰義三曰廉四曰恥政之所行在順民心政之所廢在逆民心民惡憂勞我逸樂之民惡貧賤我富貴之民惡危墜我存安之民惡滅絶我生育之能逸樂之則民為之憂勞能富貴之則民為之貧賤能存安之則民為之危墜能生育之則民為之滅絶故刑罰不足以恐其意殺戮不足以服其心故刑罰繁而意不恐則令不行矣殺戮衆而心不服則上位危矣故從其四欲則遠者自親行其四惡則近者叛之故知與之為取者政之寶也措國於不傾之地積於不凋之倉藏於不竭之府下令於流水之原使民於不爭之官明必死之路開必得之門不為不可成不求不可得不處不可久不行不可復措國於不傾之地授有德也積於不凋之倉務五穀也藏於不竭之府養桑麻育六畜也下令於流水之原令順民心也使民於不爭之官使民各為其所長也明必死之路嚴刑罰也開必得之門信慶賞也不為不可成量民力也不求不可得不強民以其所惡也不處不可久不偷取一世也不行不可復不欺其民也如地如天何私何親如月如日維君之節御人之轡在上之所貴導民之門在上之所先召民之路在上之所好惡故君求之則臣得之君嗜之則臣食之君好之則臣服之無蔽汝惡無異汝度賢者將不汝助言室滿室言堂滿堂是謂聖王城郭溝渠不足以固守兵甲勇力不足以應敵博地多財不足以有衆唯有道者能備患於未形也天下不患無臣患無君以使人天下不患無財患無人以分之故知時者可立以為長無私者可置以為政審於時而察於用而能備官者可奉以為君也緩者後於事於財者失所親信小人者失士形勢言而不可復者君不言也行而不可再者君不行也凡言而不可復行而不可再者有國者之大禁也權修萬乘之國兵不可以無主土地博大野不可以無吏百姓殷衆官不可以無長操民命朝不可以無政地博而國貧者野不闢也民衆而兵弱者民無取也故末産不禁則野不闢賞罰不信則民無取野不闢民無取外不可以應敵內不可以固守地闢而國貧者舟輿飾臺榭廣也賞罰信而兵弱者輕用衆民使勞也民勞則力竭賦斂厚則下怨上民力竭則令不行下怨上令不行而求敵勿謀己不可得也欲為天下者必重用其國欲為其國者必重用其民欲為其民者必重盡其力無以畜之則往而不可止也無以牧之則處而不可使也遠人至而不去則有以畜之也民衆而可一則有以牧之也見其可也喜之有徵見其不可也惡之有刑賞罰信於其所見雖其所不見其敢為之乎見其可也喜之無徵見其不可也惡之無刑賞罰不信於其所見而求其所不見之為之化不可得也地之生財有時民之用力有倦而人君之欲無窮以有時與有倦養無窮之君而度量不生於其間則上下相疾矣故取於民有度用之有正國雖小必安取於民無度用之無正國雖大必危身者治之本也故上不好本事則末産不禁末産不禁則民緩於時事而輕地利輕地利而求田野之闢倉廩之實不可得也商賈在朝則貨財上流婦言人事則賞罰不信男女無別則民無廉恥而求百姓之安兵士之死節不可得也朝廷不肅貴賤不明長幼不分度量不審衣服無等下賤侵節而求百姓之尊主政令不可得也上好詐謀間欺臣下賦斂競得使民偷一則百姓疾怨而求下之親上不可得也有地不務本事君國不能一民而求宗廟社稷之無危不可得也一年之計莫如樹穀十年之計莫如樹木終身之計莫如樹人立君君之所審者三一曰德不當其位二曰功不當其祿三曰能不當其官此三本者治亂之原也故國有德義未明於朝者則不可加於尊位功力未見於國者則不可與重祿臨事不信於民者則不可使任大官故德厚而位卑者謂之過德薄而位尊者謂之失寧過於君子而無失於小人過於君子其為怨淺矣失於小人其為禍深矣君之所慎者四一曰大位不至仁不可授國柄二曰見賢不能讓不可與尊位三曰罰避親貴不可使主兵四曰不好本事不務地利而輕賦斂不可與都邑此四務者安危之本也故曰卿相不得衆國之危也大臣不和同國之危也兵主不足畏國之危也民不懷其産國之危也故大德至仁則操國得衆見賢能讓則大臣和同罰不避親貴則威行於鄰敵好本事務地利則民懷其産矣七法言是而不能立言非而不能廢有功而不能賞有罪而不能誅若是而能理民者未之有也是必立非必廢有功必賞有罪必誅若是治安矣五輔古之聖王所以取明名廣譽厚功大業顯於天下不忘於後世非得人者未之嘗聞也暴主之所以失國家危社稷覆宗廟滅於天下非失人者未之嘗聞也今有土之君皆處欲安動欲威戰欲勝守欲固大者欲王天下小者欲霸諸侯而不務得人是以小者兵挫而地削大者身死而國亡故曰人不可不務也此天下之極也曰然則得人之道莫如利之利之道莫如教之故善為政者田疇墾而國邑實朝廷間而官府治公法行而私曲止倉廩實而囹圄空賢人進而姦民退其君子上忠正而下諂諛其士民貴武勇而賤得利其庶人好耕農而惡飲食於是財用足而食飲薪菜饒是故上必寬裕而有解舍下必聽從而不疾怨上下和同而有禮義故處安而動威戰勝而守固不能為政者田疇荒而國邑虛朝廷凶而官府亂公法廢而私曲行倉廩虛而囹圄實賢人退而姦民進其君子上諂諛而下忠正其士民貴得利而賤武勇其庶人好飲食而惡耕農於是財用匱而食飲薪菜之上彌殘茍而無解舍下愈覆鷙而不聽從上下交引而不和同故處不安而動不威戰不勝而守不固是以小者兵挫而地削大者身死而國亡以此觀之則政不可不慎也法法聞賢而不舉殆也聞善而不索殆也見能而不使殆也親仁而不固殆也同謀而離殆也人主不周密則正言直行之士危正言直行之士危則人主孤而無內人主孤而無內則人臣黨而成群使人主孤而無內人臣黨而成群者此非人臣之罪也人主之過也號令已出又易之禮義已行又止之度量已制又遷之刑法已措又移之如是則賞慶雖重民不勸也殺戮雖繁民不畏也使賢者食於能士食於功賢者食於能則上尊而民從士食於功則卒輕患而傲敵二者設於國則天下治而主安矣凡赦者小利而大害者也故久而不勝其禍無赦者小害而大利者也故久而不勝其福故赦者奔馬之委轡也無赦者痤疽之砭石也先王制軒冕足以著貴賤不求其觀也使君子食於道小人食於力君子食於道則上尊而民順小人食於力則財厚而養足凡人君之所以為君者勢也勢在下則君制於臣勢在上則臣制於君故君臣之易位勢在下也故曰堂上遠於百里堂下遠於千里門廷遠於萬里今步者一日百里之情通矣堂上有事十日而君不聞此所謂遠於百里也步者十日千里之情通矣堂下有事一月而君不聞此所謂遠於千里也步者百日萬里之情通矣門廷有事年而君不聞此所謂遠於萬里也故請入而不出謂之滅出而不入謂之絶入而不至謂之侵出而道止謂之壅滅絶侵壅之君者非杜其門而守其戶也為政之有所不行也政者正也聖人明正以治國故正者所以止過而逮不及也過與不及皆非正也非正則傷國一也勇而不義傷兵仁而不法傷正故軍之敗也生於不義法之侵也生於不正故言有辨而非務者行有難而非善者故言必中務不茍為辨行必思善不茍為難規矩者方圜之正也雖有巧目利手不如拙規矩之正方圜也故巧者能生規矩不能廢規矩而正方圜聖人能生法不能廢法而治國故雖有明智高行背法而治是廢規矩而正方圜也賢人不至謂之蔽忠臣不至謂之塞令之不行謂之障禁而不止謂之逆蔽塞障逆之君者不杜其門而守其戶也為賢者之不至令之不行也凡民從上也不從口之所言從情之所好也上好勇則民輕死上好仁則人輕財故上之所好民必甚焉是故明君知民之必以上為心也故置法以自治立義以自正也故上不行則民不從是以有道之君行法修制公國一民以聽於世忠臣直進以論其能明君不以祿爵私所愛忠臣不誣能以干爵祿君不私國臣不誣能行此道者雖未大治正民之徑也中匡管仲朝公曰寡人願聞國君之信對曰民愛之鄰國親之天下信之此國君之信公曰善請問信安始而可對曰始於為身中於為國成於為天下公曰請問為身對曰道血氣以求長年長心長德此為身也遠舉賢人慈愛百姓此為國也法行而不苛刑廉而不赦此為天下也小匡桓公自莒反於齊使鮑叔牙為宰辭曰君有加惠於其臣使臣不凍餧則是君之賜也若必治國家則非臣之所能也其唯管夷吾乎臣之所不如管夷吾者五寬惠愛民臣不如也治國不失柄臣不如也忠信可結於諸侯臣不如也制禮義可法於四方臣不如也介胄執枹立於軍門使百姓皆加勇臣不如也夫管子民之父母也將欲治其子不可以棄其父母公曰管夷吾親射寡人中鉤殆於死今乃用之可乎鮑叔曰彼為其君也君若宥而反之其為君亦猶是也公使人請之魯囚管仲以與齊桓公親迎之郊遂與歸禮之于廟而問為政焉管仲相三月請論百官公曰諾管仲曰升降揖讓進退間習臣不如隰朋請立以為大行闢土聚粟盡地之利臣不如寧戚請立以為司田平原廣牧車不結轍士不旋踵鼓之而三軍之士視死如歸臣不如王子城父請立以為大司馬決獄折中不殺不辜不誣無罪臣不如賓胥無請立以為大理犯君顏色進諫必忠不避死亡不撓貴富臣不如東郭牙請立以為大諫之官此五子者夷吾一不如然君若欲治國強兵則五子者存若欲霸王夷吾在此桓公曰善霸形桓公在位管仲隰朋見立有間有二鴻飛而過之桓公歎曰今彼鴻鵠有時而南有時而北四方無遠所欲至焉寡人之有仲父猶飛鴻之有羽翼也若濟大水有舟楫也仲父不一言教寡人乎管子對曰君若將欲霸王舉大事乎則必從其本事矣桓公曰敢問何謂其本管子對曰齊國百姓公之本也民甚憂飢而稅斂重民甚懼死而刑政險民甚傷勞而上舉事不時輕其稅斂則民不憂飢緩其刑政則民不懼死舉事以時則民不傷勞桓公曰寡人聞命矣霸言夫明王之所輕者馬與玉其所重者政與軍然輕與人政而重與人馬輕與人軍而重與人玉重宮闕之勞而輕四境之守其所以削也聖人能輔時不能違時智者善謀不如當時精時者曰少而功多夫謀無主則困事無備則廢是以聖王務具其備而慎守其時以備待時以時興事德利百姓威振天下令行而不咈近無不服遠無不聽戒管仲復於桓公曰任之重者莫如身塗之畏者莫如口期之遠者莫如年以重任行畏塗至遠期唯君子為能及矣君臣國之所以亂者四內有疑妻之妾此宮亂也庶有疑嫡之子此家亂也朝有疑相之臣此國亂也任官無能此衆亂也四者無別主失其體群官朋黨以懷其私則失強矣故妻必定子必正相必直立以聽官必忠信以敬小稱管子曰身不善之患無患人莫己知民之觀也察矣不可遁逃故我有善則立譽我我有過則立毀我當人之毀譽也則莫歸問於家矣故明王有過則反之於身有善則歸之於民有過而反之身則身懼有善而歸之民則民喜往喜民來懼身此明王之所以治民也今夫桀紂則不然有善則反之於身有過則歸之於民有過而歸之於民則民怒有善而反之於身則身驕往怒民來驕身此其所以失身也可無慎乎管仲有病桓公往問之曰仲父之病病矣若不可諱將何以詔寡人管仲對曰臣願君之遠易牙豎刁堂巫公子開方夫易牙以調味事公公曰唯蒸嬰兒之未嘗也於是蒸其首子而獻之公人情非不愛其子也於子之不愛將何有於公公喜宮而豎刁自刑而為公治內人情非不愛其身也於身之不愛將何有於公公子開方事公十五年不歸視其親於親之不愛焉能有於公桓公曰善管仲死已葬公召四子者廢之逐堂巫而苛病起逐易牙而味不至逐豎刁而宮中亂逐公子開方而朝不治桓公曰嗟聖人固有悖乎乃復四子者處期年四人作難圍公一室十日不通公曰嗟死者無知則已若有知吾何面目以見仲父於地下乃援素幭以裹首而絶死十一日蟲出於戶葬以揚門之扇以不終用賢也桓公管仲鮑叔牙寧戚四人飲飲酣桓公謂叔牙曰盍不起為寡人壽乎叔牙奉杯而起曰使公無忘出而在於莒使管仲無忘束縛在於魯也使寧戚無忘飯牛車下也桓公避席再拜曰寡人與二大夫能無忘夫子之言則國之社稷必不危矣治國凡治國之道必先富民民富則易治也民貧必難治奚以知其然也民富則安鄉重家安鄉重家則敬上畏罪敬上畏罪則易治也民貧則危鄉輕家危鄉輕家則敢凌上犯禁凌上犯禁則難治也故曰治國常富而亂國必貧是以善為國者必先富民然後治之昔者七十九代之君法制不一號令不同然俱王天下者何也必國富而粟多也夫富國多粟生於農故先王貴之凡為國之急者必先禁末作文巧末作文巧禁則民無所遊食民無所遊食則必農民事農則富先王者善為民除害興利故天下之民歸之所謂興利者利農事也所謂除害者禁害農事也國富則安鄉家安鄉家則雖變俗易習驅衆移民至於殺之而不怨也民貧則輕家易去輕家易去則上令不能必行上令不能必行則禁不能必止禁不能必止則戰不必勝守不必固矣夫令不必行禁不必止戰不必勝守不必固命之曰寄生之君此由不利農少粟之害也粟者王者之本事也人主之大務治國之道也桓公問齊桓公問管子曰吾念有而勿失得而勿忘為之有道乎對曰勿創勿作時至而隨無以私好惡害公正察民所惡以自為戒黃帝立明臺之議堯有衢室之問舜有告善之旌禹立諫鼓於朝湯有總街之庭以觀民誹也此古聖帝明王所以有而勿失得而勿忘者也形勢解人主之所以令則行禁則止者必令於民之所好而禁於民之所惡也民之情莫不欲生而惡死莫不欲利而惡害也故上令於生利人則令行禁於殺害人則禁止矣令之所以行者必民樂其政也而令乃行故曰貴有以行令也人主之所以使下盡力而親上者必為天下致利除害也故德澤加於天下惠施厚於萬物父子得以安群生得以育故萬民歡盡其力而樂為上用入則務本疾作以實倉廩出則盡節死敵以安社稷雖勞苦卑辱而不敢告也民利之則來害之則去民之從利也如水之走下於四旁無擇也故欲來民者先起其利雖不召而民自至設其所惡雖召之而民不可來也蒞民如父母則民親愛之導民純厚遇之有實雖不言曰吾親民而民親矣蒞民如仇讎則民疏之導之不厚遇之無實雖言曰吾親民民不親也聖人擇可言而後言擇可行而後行偷得利而後有害偷得樂而後有憂者聖人不為也故聖人擇言必顧其纍擇行必顧其憂聖人之求事也先論其理義計其可否故義則求之不義則止可則求之不可則止故其所得事者常為身寶小人求事也不論其理義不計其可否不義亦求之不可亦求之故其所得事者未嘗為賴也故曰必得之事不足賴也人主者溫良寬厚則民愛之整齊嚴莊則民畏之故民愛之則親畏之則用夫民親而為用主之所急也故曰且懷且威則君道備矣人主能安其民則民事其主如事其父母故主有憂則憂之有難則死之人主視民如土則民不為用主有憂則不憂有難則不死故曰莫樂之則莫哀之莫生之則莫死之民之所以守戰至死而不衰者上之所以加施於民者厚也故上施厚則民之報上亦厚上施薄則民之報上亦薄故薄施而厚責君不能得於臣父不能得於子民之從有道也如飢之先食也知寒之先衣也如暑之先陰也故有道則民歸之無道則民去之故道在身則言自順行自正事君自忠事父自孝遇人自理天之道滿而不溢盛而不衰明主法象天道故貴而不驕富而不奢故能長守富貴久有天下而不失也故曰持滿者與天明主救天下之禍安天下之危者也必待萬民之為用也而後能為之故曰安危者與人地大國富民衆兵強此盛滿之國也雖已盛滿無德厚以安之無度數以治之則國非其國而民非其民也故曰失天之度雖滿必涸臣不親其主百姓不信其吏上下離而不和故雖自安必且危之故曰上下不和雖安必危古者三王五伯皆人主之利天下者也故身貴顯而子孫被其澤桀紂幽厲皆人主之害天下者也故身困傷而子孫蒙其禍故曰疑今者察之古不知來者視之往古者武王地方不過百里戰卒之衆不過萬人然能戰勝攻取立為天子而世謂之聖王者知為之術也桀紂貴為天子富有海內地方甚大戰卒甚衆然而身死國亡為天下戮者不知為之術也故能為之則小可以為大賤可以為貴不能為之則雖為天子人猶奪之明主度量人力之所能為而後使焉故令於人之所能為則令行使於人之所能為則事成亂主不量人力令於人之所不能為故其令廢使於人之所不能為故其事敗夫令出而廢舉事而敗此強不能之罪也明主不用其智而任聖人之智不用其力而任衆人之力故以聖人之智思慮者無不知也以衆人之力起事者無不成也能自去而因天下之智力起則身逸而福多亂主獨用其智而不任聖人之智獨用其力而不任衆人之力故其身勞而禍多故曰獨任之國勞而多禍明主者人未之見而皆有親心焉者有使民親之之道也故其位安而民往之故曰未之見而親焉可以往矣人主出言不逆於民心不悖於理義其所言足以安天下者也人唯恐其不復言也出言而離父子之親疏君臣之道害天下之衆此言之不可復者也故明君不言也人主身行方正使人有理遇人有禮行發於身而為天下法式人唯恐其不復行也身行不正使人暴虐遇人不信行發於身而為天下笑者此不可復之行也故曰行而不可再者君不行也言之不可復者其言不信也行之不可再者其行暴賊也故言而不信則民不附行而暴賊則天下怨民不附天下怨此滅亡之所從生也故明主禁之故曰凡言行之不可復者有國者之大禁也板法解治國有三器亂國有六攻明君能勝六攻而立三器故國治不肖君不能勝六攻而立三器故國不治三器者何也曰號令也斧鉞也祿賞也六攻者何也曰親也貴也貨也色也巧佞也玩好也三器之用何也曰非號令無以使下非斧鉞無以威衆非祿賞無以勸民六攻之敗何也曰雖不聽而可以得存雖犯禁而可以得免雖無功而可以得富夫國有不聽而可以得存者則號令不足以使下有犯禁而可以得免者則斧鉞不足以威衆有無功而可以得富者則祿賞不足以勸民號令不足以使下斧鉞不足以威衆祿賞不足以勸民則人君無以自守也明法解明主者審於法禁而不可犯也察於分職而不可亂也故群臣不敢行其私貴臣不得蔽賤近者不得塞遠孤寡老弱不失其職此之謂治國故曰所謂治國者主道明也法度者主之所以制天下而禁姦邪也私意者所以生亂長姦而害公正也故法度行則國治私意行則國亂明主雖心之所愛而無功者弗賞也雖心之所憎而無罪者弗罰也案法式而驗得失非法度不留意焉故曰先王之治國也不淫意於法之外明主之治國也案賞罰行其正理其當賞者群臣不得辭也其當罰者群臣弗敢避也夫賞功誅罪者所以為天下致利除害也草茅弗去則害禾穀盜賊弗誅則傷良民夫舍公法而行私惠則是利姦邪而長暴亂也行私惠而賞無功則是使民偷幸而望於上也行私惠而赦有罪則是使民輕上而易為非也夫舍公法用私惠明主弗為也故曰不為惠於法之內權衡者所以起輕重之數也然而人弗事者非心惡利也權不能為之多少其數而衡不能為之輕重其量也人知事權衡之無益故弗事也故明主在上位則官不得枉法吏不得為私民知事吏之無益故貨財不行於吏權衡平正而待物故姦詐之人不得行其私故曰有權衡之稱者不可欺以輕重也尺寸尋丈者所以得短長之情也故以尺寸量短長則萬舉而萬不失矣是故尺寸之度雖富貴衆強不為益長雖卑辱貧賤弗為損短公平而無所偏故姦詐之人弗能誤也故曰有尋丈之數者不可差以長短凡所謂忠臣者務明法術日夜佐主明於度數之理以治天下者也姦邪之臣知法術明之必治也治則姦臣困而法術之士顯是故姦邪之所務事者使法無明主無寤而己得所欲也故方正之臣得用則姦邪之臣困傷矣是方正之與姦邪不兩進之勢也姦邪之在主之側者不能勿惡之惟惡之則必候主間而日夜危之人主弗察而用其言則忠臣無罪而困死姦臣無功而富貴故曰忠臣死於非罪而邪臣起於非功富貴尊顯久有天下人主莫弗欲也令行禁止海內無敵人主莫弗欲也蔽欺侵陵人主莫不惡也失天下滅宗廟人主莫不惡也忠臣之欲明法術以致主之所欲而除主之所惡者也姦臣之擅主也有以私危之則忠臣無從進其公正之數矣故曰所死者非罪所起者非功然則為人臣者重私而輕公矣明主之擇賢人也言勇者試之以軍言智者試之以官試於軍而有功者則舉之試於官而事治者則用之故以戰攻之事定勇怯以官職之治定愚智故勇怯愚智之見也如白黑之分亂主則不然聽言而不試故妄言者得用任人而不課故不肖者不困故明主以法案其言而求其實以官任其身而課其功專任法不自舉焉故曰先王之治國也使法擇人弗自舉也凡所謂功者安主上利萬民者也夫破軍殺弱戰勝攻取使主無危亡之憂而百姓無死虜之患此軍士之所以為功者也奉主法治境內使強不凌弱衆不暴寡萬民歡盡其力而奉養其主此吏之所以為功也匡主之過救主之失明理義以導其主主無邪僻之行蔽欺之患此臣之所以為功也故明主之治也明分職而課功勞有功者賞亂治者誅誅賞之所加各得其宜而主不自與焉故曰使法量功不自度也明主之治也審是非察事情以度量案之合於法則行不合於法則止功充其言則賞不充則誅故言智能者必有見功而後舉之言惡敗者必有見過而後廢之如此則士上通而莫之能不肖者困廢而莫之能舉故曰能不可蔽而敗不可飾也輕重管子入復桓公曰終歲之租金四萬二千金請以一朝素賞軍士桓公即諾期於泰舟之野朝軍士桓公即壇而立管子執枹而揖軍士曰誰能陷陳破衆者賜之百金三問不對有一人乘劍而前問曰幾何人之衆也管子曰千人之衆曰千人之衆臣能陷之賜之百金管子又曰兵接弩張誰能得卒長者賜之百金問曰幾何人卒之長也管子曰千人之長千人之長臣能得之賜之百金管子又曰誰能聽旌旗之所指而得執將首者賜之千金言能得者纍千人賜之人千金其餘言能外斬首者賜之人十金一朝素賞四萬二千金廓然虛桓公惕然大息曰吾曷以識此子管曰君勿患且使外為名於其內鄉為功於其親家為德於其妻子若此則士必爭名報德無北之意矣吾舉兵而攻破其軍并其地則非特四萬二千金之利也公曰諾乃戒大將曰百人之長必為之朝禮千人之長必拜而送之降兩級其有親戚者必遺之酒四石肉四鼎其無親戚者必遺其妻子酒三石肉三鼎行教半歲父教其子兄教其弟妻諫其夫曰見禮若此不死列陳可以反於鄉乎桓公終舉兵攻萊戰於莒鼓旗未相望而萊人大遁故遂破其軍兼其地而虜其將故未列地而封未出金而賞破萊軍并其地禽其君此素賞之計也
