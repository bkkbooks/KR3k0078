body:
  text: 六韜序文王田乎渭之陽見太公坐茅而釣問之曰子樂得魚耶太公曰夫釣以求得也其情深可以觀大矣文王曰願聞其情太公曰夫魚食其餌乃牽於緡人食其祿乃服於君故以餌取魚魚可殺以祿取人人可竭以家取國國可拔以國取天下天下可畢也天下者非一人之天下天下之天下也與天下同利者則得天下擅天下之利者失天下天有時地有財能與人共之者仁也仁之所在天下歸之免人之死解人之難救人之患濟人之急者德也德之所在天下歸之與人同憂同樂同好同惡者義也義之所在天下歸之凡人惡死而樂生好得而歸利能生利者道也道之所在天下歸之文韜文王問太公曰天下一亂一治其所以然者何天時變化自有之乎太公曰君不肖則國危而民亂君賢聖則國家安而天下治禍福在君不在天時文王曰古之賢君可得聞乎太公曰昔帝堯上世之所謂賢君也堯王天下之時金銀珠玉弗服錦繡文綺弗衣奇怪異物弗視玩好之器弗寶淫佚之樂弗聽宮垣室屋弗崇茅茨之蓋不翦衣履不敝盡不更為滋味重累不食不以役作之故留耕種之時削心約志從事乎無為其自奉也甚寡役賦也甚薄故萬民富樂而無飢寒之色百姓戴其君如日月視其君如父母文王曰大哉賢君之德矣文王問太公曰願聞為國之道太公曰愛民文王曰愛民奈何太公曰利而勿害成而勿敗生而勿殺與而勿奪樂而勿苦喜而勿怒文王曰奈何太公曰民不失其所務則利之也農不失其時業則成之也省刑罰則生之也薄賦斂則與之也無多宮室臺池則樂之也吏清不苛則喜之也民失其務則害之也農失其時則敗之也無罪而罰則殺之也重賦斂則奪之也多營宮室遊觀以疲民則苦之也吏為苛擾則怒之也故善為國者御民如父母之愛子如兄之慈弟也見之飢寒則為之哀見之勞苦則為之悲文王曰善哉文王問於太公曰賢君治國何如對曰賢君之治國其政平吏不苛其賦斂節其自奉薄不以私善害公法賞賜不加於無功刑罰不施於無罪不因喜以賞不因怒以誅害民者有罪進賢者有賞後宮不荒女謁不聽上無淫匿下無陰害不供宮室以費財不多游觀臺池以罷民不雕文刻鏤以逞耳目官無腐蠹之藏國無流餓之民也文王曰善哉文王問師尚父曰王人者何上何下何取何去何禁何止尚父曰上賢下不肖取誠信去詐偽禁暴亂止奢侈故王人者有六賊七害六賊者一曰大作宮殿臺池游觀淫樂歌舞傷王之德二曰不事農桑作業作勢游俠犯歷法禁不從吏教傷王之化三曰結連朋黨比周為權以蔽賢智傷王之權四曰抗智高節以為氣勢傷吏威五曰輕爵位賤有司羞為上犯難傷功臣之勞六曰強宗侵奪陵侮貧弱傷庶民矣七害者一曰無智略大謀而以重賞尊爵之故強勇輕戰僥倖於外王者慎勿使將二曰有名而無用出入異言揚美掩惡進退為巧王者慎勿與謀三曰朴其身躬惡其衣服語無為以求名言無欲以求得此偽人也王者慎勿近四曰博文辨辭高行論議而非時俗此姦人也王者慎勿寵五曰果敢輕死茍以貪得尊爵重祿不圖大事待利而動王者慎勿使六曰為雕文刻鏤技巧華飾以傷農事王者必禁之七曰為方伎詛作蠱道鬼神不驗之物不詳訛言欺詐良民王者必禁止之故民不盡其力非吾民士不誠信而巧偽非吾士臣不忠諫非吾臣吏不平潔愛人非吾吏宰相不能富國強兵調和陰陽以安萬乘之主簡練群臣定名實明賞罰令百姓富樂非吾宰相也故王人之道如龍之首高居而遠望徐視而審聽神其形散其精若天之高不可極若川之深不可測也文王問太公曰君務舉賢而不獲其功世亂愈甚以致危亡者何也太公曰舉賢而不用是有舉賢之名也無得賢之實也文王曰其失安在太公曰其失在好用世俗之所譽不得其真賢文王曰好用世俗之所譽者何也太公曰好聽世俗之所譽者或以非賢為賢或以非智為智或以非忠為忠或以非信為信君以世俗之所譽者為賢智以世俗之所毀者為不肖則多黨者進少黨者退是以群邪比周而蔽賢忠臣死於無罪邪臣以虛譽取爵位是以世亂愈甚故其國不免於危亡文王曰舉賢奈何太公曰將相分職而各以官舉人案名察實選才考能令能當其名名得其實則得賢人之道文王曰善哉文王問太公曰願聞治國之所貴太公曰貴法令之必行必行則治道通通則民大利大利則君德彰矣君不法天地而隨世俗之所善以為法故令出必亂亂則復更為法是以法令數變則群邪成俗而君沈於世是以國不免危亡矣文王問太公曰願聞為國之大失太公曰為國之大失作而不法法國君不悟是為大失文王曰願聞不法法國君不悟太公曰不法法則令不行令不行則主威傷不法法則邪不止邪不止則禍亂起矣不法法則刑妄行刑妄行則賞無功不法法則國昏亂國昏亂則臣為變不法法則水旱發水旱發則萬民病君不悟則兵革起兵革起則失天下也文王問太公曰人主動作舉事善惡有福殃之應鬼神之福無太公曰有之主動作舉事惡則天應之以刑善則地應之以德逆則人備之以力順則神授之以職故人主好重賦斂大宮室多游臺則民多病溫霜露殺五穀絲麻不成人主好田獵畢弋不避時禁則歲多大風禾穀不實人主好破壞名山壅塞大川決通名水則歲多大水傷民五穀不滋人主好武事兵革不息則日月薄蝕太白失行故人主動作舉事善則天應以之德惡則人備之以力神奪之以職如響之應聲如影之隨形文王曰誠哉文王問太公曰君國主民者其所以失之者何也太公曰不慎所與也人君有六守三寶六守者一曰仁二曰義三曰忠四曰信五曰勇六曰謀是謂六守文王曰慎擇此六者奈何太公曰富之而觀其無犯貴之而觀其無驕付之而觀其無轉使之而觀其無隱危之而觀其無恐事之而觀其無窮富之而不犯者仁也貴之而不驕者義也付之而不轉者忠也使之而不隱者信也危之而不恐者勇也事之而不窮者謀也人君慎此六者以為君用君無以三寶借人以三寶借人則君將失其威大農大工大商謂之三寶六守長則國昌三寶完則國安文王問太公曰先聖之道可得聞乎太公曰義勝欲則昌欲勝義則亡敬勝怠則吉怠勝敬則滅故義勝怠者王怠勝敬者亡武王問太公曰桀紂之時獨無忠臣良士乎太公曰忠臣良士天地之所生何為無有武王曰為人臣而令其主殘虐為後世笑可謂忠臣良士乎太公曰是諫者不必聽賢者不必用武王曰諫不聽是不忠賢而不用是不賢也太公曰不然諫有六不聽強諫有四必亡賢者有七不用武王曰願聞六不聽四必亡七不用太公曰主好作宮室臺池諫者不聽主好忿怒妄誅殺人諫者不聽主好所愛無功德而富貴者諫者不聽主好財利巧奪萬民諫者不聽主好珠玉奇怪異物諫者不聽是謂六不聽四必亡一曰強諫不可止必亡二曰強諫知而不肯用必亡三曰以寡正強正眾邪必亡四曰以寡直強正眾曲必亡七不用一曰主弱親強賢者不用二曰主不明正者少邪者眾賢者不用三曰賊臣在外奸臣在內賢者不用四曰法政阿宗族賢者不用五曰以欺為忠賢者不用六曰忠諫者死賢者不用七曰貨財上流賢者不用武王伐殷得二丈夫而問之曰殷之將亡亦有妖乎其一人對曰有殷國嘗雨血雨灰雨石小者如椎大者如箕六月雨雪深尺餘其一人曰是非國之大妖也殷君喜以人餧虎喜割人心喜殺孕婦喜殺人之父孤人之子喜奪喜誣以信為欺欺者為真以忠為不忠忠諫者死阿諛者賞以君子為下急令暴取好田獵出入不時臺治宮室修臺池日夜無已喜為酒池肉林糟丘而牛飲者三千飲人無長幼之序貴賤之禮喜聽讒用舉無功者賞無德者富所愛專制而擅令無禮義無忠信無聖人無賢士無法度無升斛無尺丈無稱衡此殷國之大妖也武韜文王在酆召太公曰商王罪殺不辜汝尚助余憂民今我何如太公曰王其修身下賢惠民以觀天道天道無殃不可以先唱人道無災不可以先謀必見天殃又見人災乃可以謀與民同利同病相救同情相成同惡相助同好相趣無甲兵而勝無衝機而攻無渠塹而守利人者天下啟之害人者天下閉之天下非一人之天下也取天下若逐野獸得之而天下皆有分肉若同舟而濟濟則皆同其利舟敗皆同其害然則皆有啟之無有閉之矣無取於民者取民者也無取於國者取國者也無取於天下者取天下者也取民者民利之取國者國利之取天下者天下利之故道在不可見事在不可聞勝在不可知微哉微哉鷙鳥將擊卑飛翕翼猛獸將擊俛耳俯伏聖人將動必有過色唯文唯德誰為之惑弗觀弗視安知其極今彼殷商眾口相惑吾觀其野草茅勝穀吾觀其群眾曲勝直吾觀其吏暴虐殘賊敗法亂刑而上下不覺此亡國之時也夫上好貨群臣好得而賢者逃伏其亂至矣太公曰天下之人如流水鄣之則止啟之則行動之則濁靜之則清嗚呼神哉聖人見其所始則知其所終矣文王曰靜之奈何太公曰夫天有常形民有常生與天下共其生而天下靜矣文王在岐周召太公曰爭權於天下者何先太公曰先人人與地稱則萬物備矣今君之位尊矣待天下之賢士勿臣而友之則君以得天下矣文王曰吾地小而民寡將何以得之太公曰可天下有地賢者得之天下有粟賢者食之天下有民賢者收之天下者非一人之天下也莫常有之唯賢者取之夫以賢而為人下何人不與以貴從人曲直何人不得屈一人之下則申萬人之上者唯聖人而後能為之文王曰善請著之金板於是文王所就而見者六人所求而見者七十人所呼而友者千人文王曰何如而可以為天下太公對曰大蓋天下然後能容天下信蓋天下然後可約天下仁蓋天下然後可以求天下恩蓋天下然後王天下權蓋天下然後可以不失天下事而不疑然後天下恃此六者備然後可以為天下政故利天下者天下啟之害天下者天下閉之生天下者天下德之殺天下者天下賊之徹天下者天下通之窮天下者天下仇之安天下者天下恃之危天下者天下災之天下者非一人之天下唯有道者得天下也武王問太公曰論將之道奈何太公曰將有五才十過所謂五才者勇智仁信忠也勇則不可犯智則不可亂仁則愛人信則不欺人忠則無二心所謂十過者將有勇而輕死者有急而心速者有貪而喜利者有仁而不忍於人者有智而心怯者有信而喜信於人者有廉潔而不愛民者有智而心緩者有剛毅而自用者有懦心而喜用人者勇而輕死者可暴也急而心速者可久也貪而喜利者可遺也仁而不忍於人者可勞也智而心怯者可窘也信而喜信於人者可誑也廉潔而不愛人者可侮也智而心緩者可襲也剛毅而自用者可事也懦心而喜用人者可欺也故兵者國之大器存亡之事命在於將也先王之所重故置將不可不審察也武王問太公曰王者舉兵欲簡練英雄知士之高下為之奈何太公曰知之有八徵一曰微察問之以言觀其辭二曰窮之以辭以觀其變三曰與之閒諜以觀其誠四曰明白顯問以觀其德五曰使之以財以觀其貪六曰試之以色以觀其貞七曰告之以難觀其勇八曰醉之以酒以觀其態八徵皆備則賢不肖別矣龍韜武王曰士高下豈有差乎太公曰有九差武王曰願聞之太公曰人才參差大小猶斗不以盛石滿則棄矣非其人而使之安得不殆多言多語惡口惡舌終日言惡寢臥不絕為眾所憎為人所疾此可使要問閭里察奸伺猾權數好事夜臥早起雖遽不悔此妻子將也先語察事實長希言賦物平均此十人之將也切切截截不用諫言數行刑戮不避親戚此百人之將也訟辨好勝疾賊侵陵斥人以刑欲正一眾此千人之將也外貌咋咋言語切切知人飢飽習人劇易此萬人之將也戰戰慄慄日慎一日近賢進謀使人以節言語不慢忠心誠必此十萬之將也溫良實長用心無兩見賢進之行法不枉此百萬之將也動動紛紛鄰國皆聞出入居處百姓所親誠信緩大明於領世能教成事又能救敗上知天文下知地理四海之內皆如妻子此英雄之率乃天下之主也武王問太公曰立將之道奈何太公曰凡國有難君避正殿召將而詔之曰社稷安危一在將軍將軍受命乃齋於太廟擇日授斧鉞君入廟西面而立將軍入北面立君親操鉞持其首授其柄曰從此以往上至於天將軍制之乃復操斧持柄授將其刃曰從此以下至於泉將軍制之既受命曰臣聞治國不可從外治軍不可從中御二心不可以事君疑志不可以應敵臣既受命專斧鉞之威不敢還請願君亦垂一言之命於臣君不許臣臣不敢將君許之乃辭而行軍中之事不可聞君命皆由將出臨敵決戰無有二心若此無天於上無地於下無敵於前無主於後是故智者為之慮勇者為之氣厲青雲疾若馳騖兵不接刃而敵降服武王問太公曰將何以為威何以為明何以為禁止而令行太公曰以誅大為威以賞小為明以罰審為禁止而令行故殺一人而三軍振者殺之賞一人而萬人說者賞之故殺貴大賞貴小殺及貴重當路之臣是刑上極也賞及牛馬廝養是賞下通也刑上極賞下通是將威之所行也夫殺一人而三軍不聞殺一人而萬民不知殺一人而千萬人不恐雖多殺之其將不重封一人而三軍不悅爵一人而萬人不勸賞一人而萬人不欣是為賞無功貴無能也若此則三軍不為使是失眾之紀也武王問太公曰吾欲令三軍之眾親其將如父母攻城爭先登野戰爭先赴聞金聲而怒聞鼓音而喜為之奈何太公曰將有三禮冬日不服裘夏日不操扇天雨不張蓋幕名曰三禮也將身不服禮無以知士卒之寒暑出隘塞犯泥塗將必下步名曰力將將身不服力無以知士卒之勞苦士卒軍皆定次將乃就舍炊者皆熟將乃敢食軍不舉火將亦不火食名曰止欲將不身服止欲無以知士卒之飢飽故上將與士卒共寒暑共飢飽勤苦故三軍之眾聞鼓音而喜聞金聲而怒矣高城深池矢石繁下士爭先登白刃始合士爭先赴非好死而樂傷為其將念其寒苦之極知其飢飽之審而見其勞苦之明也武王問太公曰攻伐之道奈何太公曰資因敵家之動變生於兩陣之間奇正傳於無窮之源故至事不語用兵不言其事之成者其言不足聽兵之用者其狀不足見倏然而往忽然而來能獨轉而不制者也善戰者不待張軍善除患者理其未生善勝敵者勝於無形上戰無與戰矣故爭於白刃之前者非良將也備於已失之後者非上聖也智與眾同非人師也伎與眾同非國工也事莫大於必成用莫大於必成用莫貴於玄眇動莫神於不意勝莫大於不識夫必勝者先見弱於敵而後戰者也故事半而功自倍兵之害猶豫最大兵之災莫大於狐疑善者見利不失遇時不疑失利後時反受其災善者從而不擇巧者一決而不猶豫故疾雷不及掩耳卒電不及瞬目起之若驚用之若狂當之者破近之者亡孰能待之武王曰善武王問太公曰凡用兵之極天道地利人事三者孰先太公曰天道難見地利人事易得天道在上地道在下人事以飢飽勞逸文武也故順天道不必有吉違之不必有害失地之利則士卒迷惑人事不和則不可以戰矣故戰不必任天道飢飽勞逸文武最急地利為寶王曰天道鬼神順之者存逆之者亡何以獨不貴天道太公曰此聖人之所生也欲以止後世故作為譎書而寄勝於天道無益於兵勝而眾將所拘者九王曰敢問九者奈何太公曰法令不行而任侵誅無德厚而用日月之數不順敵之強弱幸於天道無智慮而候氛氣少勇力而望天福不知地形而歸過敵人怯弗敢擊而待龜筮士卒不募而法鬼神設伏不巧而任背向之道凡天道鬼神視之不見聽之不聞索之不得不可以治勝敗不能制死生故明將不法也太公曰天下有粟聖人食之天下有民聖人收之天下有物聖人裁之利天下者取天下安天下者有天下愛天下者久天下仁天下者化天下虎韜武王勝殷召太公問曰今殷民不安其處奈何使天下安乎太公曰夫民之所利譬之如冬日之陽夏日之陰冬日之從陽夏日之從陰不召自來故生民之道先定其所利而民自至民有三幾不可數動動之有凶明賞則不足不足則民怨生明罰則民懾畏民懾畏則變故出明察則民擾民擾則不安其處易以成變故明王之民不知所好不知所惡不知所從不知所去使民各安其所生而天下靜矣樂哉聖人與天下之人皆安樂也武王曰為之奈何太公曰聖人守無窮之府用無窮之財而天下仰之天下仰之而天下治矣神農之禁春夏之所生不傷不害謹修地利以成萬物無奪民之所利而農順其時矣任賢使能而官有材而賢者歸之矣故賞在於成民之生罰在於使人無罪是以賞罰施民而天下化矣犬韜武王至殷將戰紂之卒握炭流湯者十八人以牛為禮以朝者三千人舉百石重沙者二十四人趍行五百里而矯矛殺百步之外者五千人介士億有八萬武士懼曰夫天下以紂為大以周為細以紂為眾以周為寡以周為弱以紂為強以周為危以紂為安以周為諸侯以紂為天子今日之事以諸侯擊天子以細擊大以少擊多以弱擊強以危擊安以此五短擊此五長其可以濟功成事乎太公曰審天子不可擊審大不可擊審眾不可擊審強不可擊審安不可擊王大恐以懼太公曰王無恐且懼所謂大者盡得天下之民所謂眾者盡得天下之眾所謂強者盡用天下之力所謂安者能得天下之所欲所謂天子者天下相愛如父子此之謂天子今日之事為天下除殘去賊也周雖細曾殘賊一人之不當乎王大喜曰何謂殘賊太公曰所謂殘者收天下珠玉美女金錢綵帛狗馬穀粟藏之不休此謂殘也所謂賊者收暴虐之吏殺天下之民無貴無賤非以法度此謂賊也武王問太公曰欲與兵深謀進必斬敵退必克全其略云何太公曰主以禮使將將以忠受命國有難君召將而詔曰見其虛則進見其實則避勿以三軍為貴而輕敵勿以授命為重而茍進勿以貴而賤人勿以獨見而違眾勿以辯士為必然勿以謀簡於人勿以謀後於人士未坐勿坐士未食勿食寒暑必同敵可勝也陰謀武王問太公曰賢君治國教民其法何如太公對曰賢君治國不以私害公賞不加於無功罰不加於無罪法不廢於仇讎不避於所愛不因怒以誅不因喜以賞不高臺深池以役下不雕文刻畫以害農不極耳目之欲以亂政是賢君之治國也不好生而好殺不好成而好敗不好利而好害不好與而好奪不好賞而好罰妾孕為政使內外相疑君臣不和拓人田宅以為臺觀發人丘墓以為苑囿僕媵衣文繡禽獸犬馬與人同食而萬民糟糠不厭裘褐不完其上不知而重斂奪民財物藏之府庫賢人逃隱於山林小人任大職無功而爵無德而貴專恣倡樂男女昏亂不恤萬民違陰陽之氣忠諫不聽信用邪佞此亡國之君治國也武王問太公曰吾欲輕罰而重威少其賞而勸善多簡其令而眾皆化為之何如太公曰殺一人千人懼者殺之殺二人而萬人懼者殺之殺三人三軍振者殺之賞一人而千人喜者賞之賞二人而萬人喜者賞之賞三人三軍喜者賞之令一人千人得者令之禁二人而萬人止者禁之教三人而三軍正者教之殺一以懲萬賞一而勸眾此明君之威福也武王問太公曰吾欲以一言與身相終再言與天地相永三言為諸侯雄四言為海內宗五言傳之天下無窮可得聞乎太公曰一言與身相終者內寬而外仁也再言與天地相永者是言行相副若天地無私也三言為諸侯雄者是敬賢用諫謙下於士也四言為海內宗者敬接不肖無貧富無貴賤無善惡無憎愛也五言傳之天下無窮者通於否泰順時容養也武王問尚父曰五帝之戒可聞乎尚父曰黃帝之時戒曰吾之居民上也搖搖恐夕不至朝堯之居民上振振如臨深川舜之居民上兢兢如履薄冰禹之居民上慄慄恐不滿日湯之居民上戰戰恐不見旦王曰寡人今新并殷居民上翼翼懼不敢怠鬻子君子不與人之謀則已矣若與人謀之則非道無由也故君子之謀能必用道而不能必見受也能必忠而不能必入也能必信而不能必見信也君子非仁者不出之於辭而施之於行故非非者行是而惡惡者行善而道諭矣文王問於鬻子曰敢問人有大忌乎對曰有文王曰敢問大忌奈何鬻子對曰大忌知身之惡而不改也以賊其身乃喪其軀有行如此之謂大忌也昔之帝王其所以為明者以其吏也昔之君子其所以為功者以其民也力生於民而功最於吏福歸於君民者至庳也而使之取吏焉必取所愛故十人愛之則十人之吏也百人愛之則百人之吏也千人愛之則千人之吏也萬人愛之則萬人之吏也周公曰吾聞之於政也知善不行者則謂之狂知惡不改者則謂之惑夫狂與惑者聖人之戒也不肖者不自謂不肖而不肖見於行不肖者雖自謂賢人猶皆謂之不肖也愚者不自謂愚而愚見於言愚者雖自謂智人猶皆謂之愚也禹之治天下也以五聲聽門懸鐘鼓鐸磬而置鞀以待四海之士為銘於筍曰教寡人以道者擊鼓教寡人以義者擊鐘教寡人以事者振鐸告寡人以憂者擊磬語寡人以訟獄者揮鞀此之謂五聲是以禹嘗據一饋而七起日中而不暇飽食曰吾不恐四海之士留於道路吾恐其留吾門廷也是以四海之士皆至是以禹朝廷間可以羅雀者夫卿相無世賢者有之國無因治智者理之智者非一日之志也治者非一日之謀也治志治謀在於帝王然後民知所保而知所避發政施令為天下福者謂之道上下相親謂之和民不求而得所欲謂之信除天下之害謂之仁仁與信和與道帝王之器也凡萬物皆有器故欲有為而不行其器者不成也欲王者亦然不用帝王之器者亦不成也昔者魯周公使衛康叔往守於殷戒之曰與殺不辜寧失有罪無有無罪而見誅無有有功而不賞戒之封誅賞之慎焉
