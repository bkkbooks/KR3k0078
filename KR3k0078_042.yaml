body:
  text: 淮南子原道夫道者覆天地而和陰陽節四時而調五行故達於道者處上而民弗重也居前而眾不害也天下歸之姦邪畏之以其無爭於萬物也故莫能與之爭故體道者逸而不窮任數者勞而無功夫峭法刻誅者非霸王之業也峭峻箠筴繁用者非致遠之御也離朱之明察鍼末於百步之外而不能見淵中之魚師曠之聰合八風之調而不能聽十里之外故任一人之能不足以治三畝之宅修道理之數因天地之自然則六合不足均也本經凡人之性心平欲得則樂歌舞節則禽獸跳矣有憂則悲哀有所侵犯則怒怒則有所釋憾矣故鐘鼓管簫所以飾喜也衰絰苴杖苴麻所以飾哀也金鼓鈇鉞所以飾怒也必有其質乃為之文古者聖王在上上下同心君臣輯睦衣食有餘家足人給父慈子孝兄良弟順天下和洽人得其願故聖人為之作禮樂以和節之末世之政田漁重稅關市急征民力竭於徭役財用殫於會賦會計居者無食行者無糧老者不養死者不葬贅妻鬻子以給上求猶不能贍其用愚夫惷婦皆有流連之心悽愴之意乃始為之撞大鐘擊鳴鼓吹竽笙彈琴瑟則失樂之本矣古者上求薄而民用給君施其德臣盡其力父行其慈子竭其孝各致其愛而無憾恨其閒矣夫三年之喪非強引而致之也聽樂不樂食旨不甘思慕之心未能弛晚世風流俗敗嗜欲多而禮義廢君臣相欺父子相疑怨尤充胸思心盡亡被衰戴絰戲笑其中雖致之三年失喪之本矣古者天子一畿千里為畿諸侯一同百里為同也各守其分地不得相侵有不行王道暴虐萬民亂政犯禁者乃舉兵而伐之戮其君易其黨卜其子孫以代之天子不滅同姓諸侯不滅國自古之正也晚世務廣地侵壤并兼無已舉不義之兵而伐無罪之國殺不辜之民而絕先聖之後大國出攻小國城守驅人之馬牛繫人之子女毀人之宗廟徙人之重寶流血千里暴駭滿野以贍貪主之欲非兵之所為主也故兵者所以討暴也非所以為暴也樂者所以致和也非所以為淫也喪者所以盡哀也非所以為偽也故事親有道矣而愛為務朝廷有容矣而敬為上處喪有禮矣而哀為主用兵有術矣而義為本本立而道行本傷而道廢矣主術人主之術處無為之事行不言之教清靜而不動壹動而不搖因循而任下責成而不勞是故心知規而師傅喻道口能言而行人稱辭足能行而相者前導耳能聽而執政者進諫是故慮無失策舉無過事言成文章而行為儀表於天下進退應時動靜循理不為醜美好憎不為賞罰喜怒事由自然莫出於己故古之王者冕而前旒所以蔽明冕冠也前旒冕前珠飾也黈纊充耳所以揜聰黈纊所以塞耳天子外屏所以自障也故所理者遠則所在者近所治者大則所守者小目妄視則淫耳妄聞則惑口妄言則亂三關者不可不慎守也夫明主之聽於群臣其計可用也不羞其位其言可行也不責其辯闇主則不然信所愛習親近者雖邪枉不正不能見也疏遠卑賤者雖竭力盡忠不能知也有言者窮之以辭有諫者誅之以罪如此而欲炤海內存萬方是猶塞耳而聽清濁掩目而視青黃也其離聰明亦遠矣湯武聖主也而不能與越人乘舼舟浮江湖伊尹賢相也而不能與胡人騎原馬服騊駼原國名在益州西南出千里馬騊駼野馬孔墨博通而不能與山居者入榛薄出險阻由此觀之則人智之於物淺矣而欲以炤海內存萬方不因道理之數而專己之能則其窮不達矣故智不足以為治勇不足以為彊則人才不足以任明矣然而君人者不下廟堂之上而知四海之外者因物以識物因人以知人也故人主深居隱處以避燥溼閨門重襲以避奸賊內不知閭里之情外不知山澤之形帷幕之外目不能見十里之前耳不能聞百步之外然天下之物無所不通者其灌輸者大而斟酌者眾也是故不出戶知天下不窺牖知天道乘眾人之智則天下不足有也專用其心則獨身不能守也主道圓者運轉而無端化育如神虛無因循常後而不先者也臣道方者論是處當為事先唱守職分明以立成功者也是故君臣異道則治同道則亂各得其宜處得其當則上下有以相使也夫載重而馬羸雖造父不能以致遠車輕而馬良中工可以追速是故聖人之舉事也豈能咈道理之數詭自然之性以曲為直以詘為伸哉未嘗不因其資而用之也是以積力之所舉則無不勝也眾智之所為則無不成也賢主之用人猶巧匠制木大小脩短皆得所宜規矩方圓各有所施殊形異材莫不可得而用也天下之物莫凶於奚毒奚毒附子然而良醫橐而藏之有所用也是故竹木草莽之材猶有不棄者而又況人乎今夫朝廷之所不舉而鄉邑之所不譽非其人不肖其所以官之者非其職也麋之上山也大獐不能跋也及其下也牧豎能追之才有脩短也是故有大略者不可責以捷巧有小智者不可任以大功人有其才物有其形有任一而大重有任百而尚輕是故審於豪氂之計者必遺天地之數不失小物之選者惑於大事之舉猶狸之不可使搏牛虎之不可使捕鼠也今人之才有欲平九州從方外存危國而乃責之以閨閤之禮人事之閒或佞巧小具脩鄉曲之俗卑下眾人之耳目而乃任之以天下之權治亂之機是猶以斧鬋毛而以刀伐木也皆失其宜矣人主之賦斂於人也必先計歲收量民積聚知民饒饉有餘不足之數然後取車輿衣食供養其欲高臺層榭非不麗也然民無窟室狹廬窟室土室則明主不樂也肥醲甘非不香也然民無糟菽則明主不甘也匡床衽席非不寧也然而民有處邊城犯危難澤死暴骸者則明主不安也故古之君人者甚憯怛於民也國有饑者食不重味民有寒者而冬不被裘歲豐穀登乃始懸鐘鼓陳干戚君臣上下同心而樂之國無哀人故古之為金石管絃者所以宣樂也兵革斧鉞所以飾怒也觴酌俎豆所以效喜也衰絰菅屨所以喻哀也此皆有充於內而成象於外者也及至亂主取民則不裁其力求下則不量其積男女不得事耕織之業以供上之求力勤財匱君臣相疾而乃始撞大鐘擊鳴鼓吹竽笙彈琴瑟是由貫介冑而入廟被綺羅而從軍也失樂之所由生矣食者民之本也民者國之本也國者君之本也是故君人者上因天時下盡地財中用人力是以群生遂長五穀蕃殖各因其宜所以應時脩備富利國民實曠來遠者其道備矣非能目見而足行之也欲利之也欲利之也不忘於心則官自備矣心之於九竅四支也不能一事焉然而動靜聽視皆以為主者不忘乎欲利之也故堯為善而眾善至桀為非而眾非來矣凡人之論心欲小而志欲大智欲圓而行欲方能欲多而事欲鮮堯置欲諫之鼓舜立誹謗之木湯有司直之人武王有戒慎之銘過若毫氂而既已備之矣夫聖人之於善也無小而不舉於過也無微而不改戰戰慄慄日慎一日由此觀之則聖人之心小矣武王克殷發鉅橋之粟散鹿臺之錢封比干之墓解箕子之囚無故無新唯賢之親用非其有使非其人晏然若其故有之由此觀之則聖人之志大矣文王周觀得失覽是非堯舜所以昌桀紂所以亡者皆著之於明堂由是觀之則聖人之智圓矣成康繼文武之業守明堂之制觀存亡之跡見成敗之變非道不言非義不行言不茍出行不茍為擇善而後從事焉由此觀之則聖人之行方矣孔子之通智過萇弘萇弘周景王之史臣通天下鬼方之術也勇服孟賁孟賁衛人能亦多矣然而勇力不聞伎巧不知專行孝道以成素王事亦鮮矣夫聖人之智固已多矣其所守者約故舉而必榮愚人之智固以少矣其所事者又多故動而必窮矣繆稱主者國之心也心治則百節皆安心擾則百節皆亂治猶理也節猶事也以體喻也故其心治者枝體相遺遺忘其國治者君臣相忘也各得其所無所思念君子非義無以生失義則失其所以生小人非嗜欲無以活失嗜欲則失其所以活故君子懼失義小人懼失利觀其所懼知居殊矣凡人各賢其所悅而悅其所快世莫不舉賢賢其所悅者而悅其所行之快性人無不舉與已同者以為賢也或以治或以亂非自遁也求同于己者遁失己未必賢而求與己同者也而欲得賢亦不幾矣幾近也子路拯溺而受牛謝拯舉也孔子曰魯國必好救人於患矣子貢贖人而不受金於府魯國之法贖人於他國者受金於府孔子曰魯國不復贖人矣子路受而勸德子貢讓而止善孔子之明以小知大以近知遠通於論者也由此觀之廉有所不在而不可公行也故行齊於俗可隨也事周於能易為也矜偽以惑世伉行以違眾聖人不以為民俗也齊俗日月欲明浮雲蓋之河水欲清沙石穢之人性欲平嗜欲害之夫縱欲而失性動未嘗正也以治身則失以治國則敗是故不聞道者無以反性故古之聖王能得諸已故令行禁止名傳後世德施四海是故凡將舉事必先平意清神神清意平物乃可正夫載哀者聞歌聲而泣載樂者聞哭者而笑何者載使然也是故貴虛虛者無所載於哀樂故水激則波興氣亂則智昏智昏不可以為政波水不可以為平故聖王執一而勿失萬物之情測矣四夷九州服矣天下是非無所定世各是其所是非其所非所謂是與所謂非各異皆自是而非人今吾欲擇是而居之擇非而去之不知世之所謂是非者孰是孰非客有見人於季子者季子子賤也客出季子曰子之所見客獨有三過望我而笑是也慢談語而不稱師是反也交淺而言深是亂也客曰望君而笑是公也談語而不稱師是通也交淺而言深是忠也故客之容一體也或以為君子或以為小人所自見之異也故趣舍合則言忠而益親身疏則謀當而見疑也親母為其子治禿血流至耳見者以為愛之至也使在於繼母則過者以為嫉也事之情一也所從觀者異也從城上視牛如羊視羊如豚所居高也窺面於盤水則圓於杯水即橢面形不變其故有所圓有所橢者所自窺之異也今吾雖欲正身而待物庸遽知世之所自窺我者乎治世之職易守也其事易為也是以人不兼官官不兼事各安其性不得相干故伊尹之興土功也修脛者使之踏钁長脛以蹋插者使入深彊脊者使之負土脊彊者任重也眇者使之准傴者使之塗傴人塗地因其俛也各有所以而人性齊矣胡人便於馬越人便於舟異形殊類易事而悖失處而賤得勢而貴聖人總而用之其數一也夫擎輕重不失銖兩聖人弗用而懸之乎權衡視高下不差尺寸明主弗任而求之乎浣準浣準水望之平何則人材不可專用而度量可世傳也夫待要褭飛兔而駕之要褭飛兔皆一日萬里也則世莫乘車待西施絡慕而為妃西施絡慕古好女也則終身不家矣然不待古之英俊而人自足者因其所有而遂用之也治國之道上無茍令官無煩治士無偽行工無淫巧其事任而不擾其器完而不飾亂世則不然為行者相揚以高揚舉為禮者相矜以偽車輿極於雕琢器用遽於刻鏤求貨者爭難得以為寶調文者遽於煩繞以為慧爭為詭辯久稽而不決無益於治工為奇器歷歲而後成不周於用故神農之法曰丈夫丁壯而不耕天下有受其饑者婦人當年而不織天下有受其寒者故身自耕妻親織以為天下先其道民也不貴難得之貨不器無用之物是故其耕不彊者無以養生其織不力者無以揜形有餘不足各歸其身衣食饒裕奸邪不生安樂無事而天下均平故孔丘曾參無所施其善孟賁成荊無所行其威成荊古勇士也衰世之俗以其智巧詐偽飾眾無用貴遠方之貨珍難得之財不積於養生之具澆天下之淳以清為濁人失其情故其為編戶齊民無以異然貧富之相去也猶人君與僕虜不足倫之夫乘奇伎為邪施者自足乎一世之閒守正脩理不為茍得者不免乎饑渴之患而欲民之去末反本是猶發其源而壅其流也且夫雕文刻鏤傷農事者也錦鏽纂組害女功者也農事廢業饑之本也女功不繼寒之源也饑寒並至而能無犯令干誅者古今未之聞也故江河決流一鄉父子兄弟相遺而走爭升陵阪上高丘輕足者先不能相顧也世樂志平見鄰國人溺尚猶哀之況親戚乎而人不能解也游者不能拯溺手足有所急也灼者不能救火身體有所痛也夫民有餘即讓不足即爭讓則禮義生爭則暴亂起扣門求水火莫不與者所饒足也林中不賣薪湖上不鬻魚所有餘也故物隆則欲省求贍則爭止故世治則小人守正而利不能誘也世亂則君子為奸而刑不能禁也惠子為惠王為國法惠王魏惠王惠子惠施也已成王甚悅之以示翟煎翟煎曰善王曰可行耶煎曰不可王曰善而不可行何也對曰今舉大木者前呼邪許後亦應之此舉重勸力之歌也豈無鄭衛激楚之音哉然而不用者不若此其宜也治國在禮不在文辯故老子曰法令滋彰盜賊多有此之謂也道應趙襄子使攻翟而勝之襄子方將食而有憂色左右曰一朝而兩城下此人之所喜也今君有憂色何也襄子曰江河之大也不過三日三日而減飄風暴風日中不須臾言其不能終日今趙氏之德行無積一朝而兩城下亡其及我乎孔子聞之曰趙氏其昌乎夫憂所以為昌也而喜所以為亡也勝非其難者也持之其難者也賢主以此持勝故其福及後世齊楚吳越皆嘗勝矣然而卒取亡焉不通乎持勝也唯有道之主能持勝齊王后死欲置后而未定使群臣議薛公欲中王之意薛公田嬰因獻十珥而美其一旦日因問美珥之所在因勸立以為王后齊王大悅遂重薛公故人主之嗜慾見於外則為人臣之所制故老子曰塞其兌閉其門終身不勤宓子治單父三年宓子子賤也而巫馬期巫馬期孔子弟子也往觀化焉微視之見夜漁者得魚則釋之問焉漁者對曰宓子不欲人之取小魚也所得者小魚是以釋之巫馬期歸以報孔子曰宓子之德至矣使人闇行若有嚴刑在其側者宓子何以至於此孔子曰丘嘗問之以治言曰誠於此者形於彼宓子必行此術也汜論天下豈有常法哉當於世事得於人理順於天地則可以正治矣夫神農伏羲不施賞罰而民不為非然立政者不能廢法而治民舜執干戚而服有苗然征伐者不能釋甲兵而制彊暴由此觀之法度者所以論民俗而節緩急也器械者因時變而制宜適也聖人作法而萬民制焉賢者立禮而不肖者拘焉制法之民不可與遠舉拘禮之人不可以應變耳不知清濁之分者不可令調音心不知治亂之源者不可令制法度必有獨聞之聽獨見之明然後能擅道而行也夫殷變夏周變殷春秋變周三代之禮不同何古之從今儒墨稱三代文武而不行也是言其所不行也儒墨之所言今皆不行也非今時之世而不改是行其所非也稱其所是行其所非是以盡日極慮而無益於治勞形竭精而無補於主今夫圖工好畫鬼魅而憎圖狗馬鬼魅無信驗而狗馬切於前也夫存危治亂非智不能而道先稱古雖愚有餘故不用之法聖主不行不驗之言明主不聽也今謂彊者勝則度地計眾富者利則量粟稱金如此則千乘之君無不霸王萬乘之國無破亡者矣國之亡也大不足恃道之行也小不可輕由此觀之存在得道而不在於大亡在失道而不在於小也亂國之君務廣其地而不務仁義務高其位而不務道德是釋其所以存而就其所以亡也故桀囚於焦門而不能自非其所行而悔不殺湯於夏臺紂拘於宣室而不反其過而悔其不殺文王於牖里嘗試處強大之勢而修道德之論湯武救罪之不給何謀之敢慮乎若上亂三光之明下失萬民之心雖微湯武孰弗能奪今不審其在已者而反備諸乎人天下非一湯武也殺一人即必或繼之者矣且湯武之所以處小弱而能著者以其有道也桀紂之所以處強大而終見奪者以其無道也今不行人之所以王而反益已之所以奪者趍亡之道也事有可行而不可言者有可言而不可行者或易為而難成者或難成而易敗者所謂可行而不可言者趣舍也可言而不可行者偽詐也易為而難成者事也難成而易敗者治也此四策者聖人之所獨視而留志也未有功而知其賢者唯堯之知舜也功成事立而知其賢者市人之知舜也夫物之相類者世主之所亂惑也嫌疑肖象者眾人之所眩燿也故狠者類智而非智也狠慢也愚者類君子而非君子也戇者類勇而非勇也使人之相去也若玉之與石也葵之與莧也則論人易矣天下莫易於為善而莫難於為不善所謂為善者靜而無為也所謂為不善者躁而多欲也適情辭餘無所誘慕脩性保真無變於己故曰為善者易也越城郭踰險塞篡殺矯誣非人之性也故曰為不善難也今人之所以犯囹圄之罪而陷於刑戮之患者由嗜欲無厭不修度量之故也何以知其然今夫陳卒設兵而相當將施令曰斬首者拜爵而曲橈者要斬然而隊伯之卒皆不能前遂斬首之功而後被要斬之罪是去恐死而就必死也故事或欲之適足以失之或避之適足以就之有人乘船而遇大風者波至而恐自投水中非不貪生而畏死惑於恐死而反忘生也故人之嗜欲亦猶此也故達道之人不茍得不讓福其有不棄非其有不索也恒盈而不溢常虛而易足今夫溜水足以溢壺榼而江河不能實漏卮故人心猶此也自當以道術度量食充虛衣禦寒則足以養七尺之形矣若無道術度量則萬乘之勢不足以為尊天下之富不足以為樂矣詮言為治之本務在於安民安民之本在於足用足用之本在於勿奪時勿奪時之本在於省事省事之本在於節欲節欲之本在於反性釋道而任智者必危棄數而用材者必困有以欲多亡者未有以無欲危者也有以欲治而亂者未有以守常失者也故智不足以免患愚不足以至於失寧守其分循其理失之不憂得之不喜因春而生因秋而殺所生者不德所殺者不怨則近於道矣聖人守其所以有不求其所未得求其所未得則所有者亡矣脩其所有則所欲者至矣故用兵者先為不可勝以待敵之可勝也治國者先為不可奪也以待敵之可奪也舜脩之歷山而海內從文王脩之岐周而天下移使舜趍天下之利而忘脩己之道身猶弗能保何尺地之有乎故福莫大無禍利莫美不喪動之為物不損則益動有為也不成則毀不利則病皆險也險言危難不可行道之者危說山上求材臣殘木上求魚臣乾谷上求楫而下致船上言若下言若綸上有一善下有二譽上有三衰下有九殺衰殺皆喻儉也傳曰上之所好下尤甚焉故有九殺也人閒夫言出於口者不可止於人行發於邇者不可禁於遠事者難成而易敗也名者難立而易廢也千里之堤以螻蟻之穴漏百尋之屋以突隙之煙焚突突也堯戒曰戰戰慄慄日慎一日莫蹪於山而蹪於垤蹪躓垤螘封也是故人者皆輕小害易微事是以多悔患至而後憂之是猶病者已惓惓劇而索良醫也雖有扁鵲俞夫之巧猶不能生也俞夫黃帝時醫天下有三危少德而多寵一危也材下而位高二危也身無大功而有厚祿三危也賢主不茍得忠臣不茍利何以明之中行繆伯攻鼓弗能下中行繆伯晉大夫鼓北翟餽閒倫曰鼓之嗇夫閒倫知之餽閒倫晉大夫請無疲武丈夫而鼓可得也繆伯弗應左右曰不折一戟不傷一卒而鼓可得也君奚為弗取繆伯曰閒倫為人佞而不仁若使閒倫下之吾可以勿賞乎若賞之是賞佞人佞人得志是使晉國之武舍仁而為佞雖得鼓將何所用之泰族聖王在上位廓然無形寂然無聲官府若無事朝廷若無人無隱士無逸民無勞役無冤刑四海之內莫不仰上之德象主之指夷狄之國重譯而至非戶辨而家說之也推其誠心施之天下而已矣詩曰惠此中國以綏四方內順外寧矣大王亶父處邠狄人攻之杖策而去百姓攜幼扶老而國乎岐周非令之所能召也秦穆公為食駿馬之傷也飲之美酒以其死力報非券之所責也券契也季子治單父夜漁者得小即釋之非刑之所能禁也孔子為魯司寇田漁皆讓長長者得多而斑白不負載斑白鬚有白髮非法之所能致也夫矢之所以射遠貫堅者弩力也其所以中的剖微者人心也賞善罰暴者政令也其所以行者精誠也故弩雖彊不能獨中令雖明不能獨行必有精氣所與之故總道以被民而民不從誠心弗施也天地四時非生萬物者神明接陰陽和而萬物生之聖人之治天下非易民性也拊循其所有而滌蕩之故因則大化則細矣能因循則大矣化而欲作則小先王之制法也因民之所好而為之節文者也因其好色而制婚姻之禮故男女有班因其好音而正雅頌之聲故風俗不流因其寧室家樂妻子教之以孝故父子有親因其喜朋友而教之以悌故長幼有序然後脩朝聘以明貴賤鄉飲習射以明長幼時蒐振旅以習用兵蒐簡車馬也入學庠序以脩人倫此皆人所有於性而聖人所匠成也民無廉恥不可治也非脩禮義廉恥不立民不知禮義法弗能正也非崇善廢醜不向禮義無法不可以為治也不知禮義不可以行法法能殺不孝者而不能使人為孔墨之行法能刑竊盜者而不能使人為伯夷之廉孔子養徒三千人皆入孝出悌言為文章行為儀表教之所成也墨子服役百八十人皆可使赴火蹈刃死不還踵化之所致也夫刻肌膚鑱皮革被創流血至難也然越人為之以求榮也越人以箴刺其皮為龍文聖王在位明好憎以示人經誹譽以導之親賢而進之賤不肖而退之無被瘡流血之患而有高世尊顯之名民孰不從古者法設而不犯刑措而不用非可刑而不刑也百工維時庶績咸熙禮義脩而任賢得也故舉天下之高以為三公一國之高以為九卿一縣之高以為二十七大夫一鄉之高以為八十一元士各以小大之材處其位得其宜由本流末以重制輕上唱而民和上動而下隨四海之內一心同歸背貪鄙而向義理於其以化民也若風之搖草木無之而不靡今使愚教智使不肖臨賢雖嚴刑罰民弗從者小不能制大弱不能使強也故聖主者舉賢以立功不肖主舉其所與同文王舉太公望召公奭而王桓公任管仲隰朋而霸此舉賢以立功也夫差用大宰嚭而滅秦任李斯趙高而亡此舉所與同也故觀其所舉而治亂可見也察其黨與而賢不肖可論也夫聖人之屈者以求申也枉者以求直也故雖出邪僻之道行幽昧之塗將欲以興大道成大功猶出林之中不得直道拯溺之人不得不濡足夫觀逐者於其反也觀行者於其終也故百川並流不注海者不為川谷趨行蹐馳不歸善者不為君子故善言歸乎可行善行歸乎仁義君子之過也猶日月之蝕也何害於明小人之可也猶狗之晝吠鴟之夜見何益於善夫智者不妄為勇者不妄發擇善而為之計義而行之故事成而功足賴也身死而名足稱也雖有智能必以仁義為之本而後可立也智能蹐馳百事並作聖人以仁義為之準繩中之者謂之君子不中者謂之小人人莫不知學之有益於己也然而不能者嬉戲害之也人皆多以無用害有用故知不博而日不足以鑿觀池之力耕則田野必闢矣以積土山之高脩隄防則水用必足矣以食狗馬鴻鴈之費養士則名譽必榮矣以弋獵博奕之日誦詩書則聞識必博矣故上下異道則治同道則亂位高而道大者從事大而道小者凶故小快害義小惠害道小辯害治苛峭傷德大政不險故民易遵至治寬裕故下不相賊至德樸索故民無慝原蠶一歲再收非不利也然而王法禁之者為其殘桑也家老異糧而食之殊器而烹之子婦跣而上堂跪而酌羹非不費也然而不可省者為其害義也待媒而結言娉納而取婦紱絻而親迎非不煩也然而不可易者可以防淫也使民居處相司有罪相告於以禁奸非不輟也然而不可行者為傷和睦之心而搆仇讎之怨也故事有鑿一孔而生百樹一物而生萬葉者所鑿不足以為便而所開足以為敗所樹不足以為利而所生足以為穢愚者惑於小利而忘其大害不可以為法也故仁智人材之美者也所謂仁者愛人也所謂智者知人也愛人則無虐刑矣知人則無亂政矣三代之所以昌也智伯有五過人之材智伯美髯長大一材也射御足力二材也伎藝畢極三材也巧文辯惠四材也強毅果敢五材也而不免於身死人手者不愛人也齊王建有三過人之巧力能引強走先馳馬超能越高而身虜於秦者不知賢也齊王建任用后勝之計不用淳越之言故仁莫大於愛人智莫大於知人二者不立雖察惠捷巧不免於亂矣
