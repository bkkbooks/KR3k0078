body:
  text: 申鑒申鑒夫道之大本仁義而已五典以經之群籍以緯之前鑒既明後復申之故古之聖王其於仁義也申重無已篤厚無疆謂之申鑒天作道皇作極臣作輔民作基制度以綱之事業以紀之先王之政一曰承天二曰正身三曰任賢四曰恤民五曰明制六曰立業承天惟允正身惟恆任賢惟固恤民惟勤明制惟典立業惟敦是謂政體致治之術先屏四患乃崇五政一曰偽二曰私三曰放四曰奢偽亂俗私壞法放越軌奢敗制四者不除則政無由行矣俗亂則道荒雖天地不得保其性矣法壞則世傾雖人主不得守其度矣軌越則禮亡雖聖人不得全其行矣制敗則欲肆雖四表不能充其求矣是謂四患興農桑以養其生審好惡以正其俗宣文教以章其化立武備以秉其威明賞罰以統其法是謂五政民不畏死不可懼以罪民不樂生不可勸以善雖使布五教咎繇作士政不行焉故在上者先豐民財以定其志帝耕藉田后桑蠶宮國無游民野無荒業財不虛用力不妄加以周民事是謂養生君子之所以動天地應神明正萬物而成王治者必本乎真實而已故在上者審則儀道以定好惡善惡要於功罪毀譽放於準驗聽言責事舉名察實無或詐偽淫巧以蕩眾心故事無不核物無不功善無不顯惡無不彰俗無姦怪民無淫風百姓上下利害之存乎己也故肅恭其心慎修其行有罪惡者無徼幸無罪過者不憂懼請謁無所行貨賂無所用則民志平矣是謂正俗君子以情用小人以刑用榮辱者賞罰之精華也故禮教榮辱以加君子治其情也桎梏鞭朴以加小人治其刑也君子不犯辱況於刑乎小人不忌刑況於辱乎若夫中人之倫則刑禮兼焉教化之廢推中人而墜於小人之域教化之行引中人而納於君子之途是謂彰化小人之情緩則驕驕則恣急則叛叛則謀亂安則思欲非威強無以懲之故在上者必有武備以戒不虞以遏寇虐安居則寄之內政有事則用之軍旅是謂秉威賞罰政之柄也明賞必罰審信慎令賞以勸善罰以懲惡人主不妄賞非徒愛其財也賞妄行則善不勸矣不妄罰非徒矜其人也罰妄行則惡不懲矣賞不勸謂之止善罰不懲謂之縱惡在上者能不止不為善不縱下為惡則國治矣是謂統法四患既蠲五政既立行之以誠守之以固簡而不怠疏而不失無為為之使自施之無事事之使自憂之不肅而成不嚴而治垂拱揖讓而海內平矣是謂為政之方惟恤十難以任賢能一曰不知二曰不求三曰不任四曰不終五曰以小怨棄大德六曰以小過黜大功七曰以小短掩大美八曰以干訐傷忠正九曰以邪說亂正度十曰以讒嫉廢賢能是謂十難十難不除則賢臣不用賢臣不用則國非其國也惟審九風以定國常一曰治二曰衰三曰弱四曰乖五曰亂六曰荒七曰叛六曰危九曰亡君臣親而有禮百僚和而不同護而不爭勤而不怨無事惟職是司此治國之風也禮俗不一職位不重小臣咨度庶人作議此衰國之風也君好謙臣好逸士好遊民好流此弱國之風也君臣爭明朝廷爭功士大夫爭名庶人爭利此乖國之風也上多欲下多端法不定政多門此亂國之風也以侈為博以伉為高以濫為通遵禮謂之劬守法謂之固此荒國之風也以苛為察以利為公以割下為能以附上為忠此叛國之風也上下相疏內外相疑小臣爭寵大臣爭權此危國之風也上不訪下下不諫上婦言用私政行此亡國之風也惟督五赦以綏民中一曰原心二曰明德三曰勸功四曰裒化五曰權計凡先王之攸赦必是族也非是族焉刑茲無赦有一言而可常行者恕也一行而可常履者正也恕者仁之術也正者義之要也至矣哉或曰聖王以天下為樂乎曰否聖王以天下為憂天下以聖王為樂凡主以天下為樂天下以凡主為憂聖王屈己以申天下之樂凡主申己以屈天下之憂申天下之樂故樂亦報之屈天下之憂故憂亦及之天之道也治世之臣所貴乎順者三一曰心順二曰職順三曰道順衰世之臣所貴乎順者三一曰體順二曰辭順三曰事順治世之順真順也衰世之順則生逆也體茍順則逆節辭茍順則逆忠事茍順則逆道下有憂民則上不盡樂下有飢民則上不備膳下有寒民則上不具服故足寒傷心民憂傷國或曰三皇之民至敦也其治至清也天性乎曰皇民敦秦民弊時也山民樸市民玩處也桀紂不易民而亂湯武不易民而治政也皇民寡寡斯敦皇治純純斯清矣唯性不求無益之物不畜難得之貨節華麗之退利進之路則民俗清矣簡小忌去淫祀絕奇怪則妖偽息矣致精誠求諸己正大事則神明應矣放邪說絕淫智抑百家崇聖典則道義定矣去浮華舉功實絕末技周本務則事業脩矣尚主之制非古也釐降二女陶唐之典歸妹元吉帝乙之訓王姬歸齊宗周之禮也以陰乘陽違天也以婦凌夫違人也違天不祥違人不義古者天子諸侯有事必告於廟有二史右史記事左史記言事為春秋言為尚書君舉必記臧否成敗無不存焉下及士庶茍有茂異咸在載籍或欲顯而不得欲隱而名章得失一朝榮辱千載善人勸焉淫人懼焉故先王重之以副賞罰以輔法教宜於今者官以其方各書其事歲盡則集之於尚書各備史官使掌其典君子有三鑒鑒乎前鑒乎人鑒乎鏡前惟訓人惟賢鏡惟明商德之衰不鑒於禹湯也周秦之弊不鑒於群下也側弁垢顏不鑒於明鏡也故君子惟鑒之務焉不任所愛之謂公惟義是從之謂明齊桓公中材也夫能成功業由有異焉者矣妾媵盈宮非無愛幸也群臣盈朝非無親近也然外則管仲射己衛姬色衰非愛也任之也然後知非賢不可任非智不可從也夫此之舉宏矣哉膏肓純白二豎不生茲謂心寧省闥清靜嬖孽不作茲謂主平夫膏肓近心而處鍼之不逮藥之不中攻之不可二豎藏焉是謂篤患故治身治國者唯是之畏或曰愛民如子仁之至乎曰未也愛民如身仁之至乎曰未也湯禱桑林邾遷於繹景祀於旱可謂愛民矣曰何重民而輕身也曰人主承天命以養民者也民存則社稷存人亡則社稷亡故重民者所以重社稷而承天命也或問曰孟軻稱人皆可以為堯舜其信矣乎曰人非下愚則可以為堯舜矣寫堯舜貌同堯之性則否服堯之制行堯之道則可矣行之於前則古之堯舜也行之於後則今之堯舜也或曰人皆可以為桀紂乎曰行桀紂之事是桀紂也堯舜桀紂之事常並存於世唯人所用而已人主之患常立於二難之閒在上而國家不治是難也治國家則必勤身苦思矯情以從道是難也有難之難闇主取之無難之難明主居之人臣之患常立於二罪之閒在職而不盡忠直之道罪也盡忠直之道焉則必矯上拂下罪也有罪之罪邪臣由之無罪之罪忠臣致之人臣有三罪一曰導二曰阿失三曰尸寵以非先上謂之導從上之非謂之阿見非不言謂之尸導臣誅阿臣刑尸臣絀忠有三術一曰防二曰救三曰戒先其未然謂之防也發而進謂諫之救也行而責之謂之戒也防為上救次之戒為下或問天子守在四夷有諸曰此外守也天子之內守在身曰何謂也曰至尊者其攻之者眾焉故便僻御侍攻人主而奪其財近幸妻妾攻人主而奪其寵逸遊伎藝攻人主而奪其志左右小臣攻人主而奪其行不令之臣攻人主而奪其事是謂內寇自古失道之君其見攻者眾矣小者危身大者亡國鯀共工之徒攻堯儀狄攻禹弗能克故唐夏平南之威攻文公申侯伯攻恭王不能克故晉楚興萬眾之寇淩疆埸非患也一言之寇襲於膝下患之甚矣八域重譯而獻珍非寶也腹心之人匍匐而獻善寶之至矣故明主慎內守除內寇而重內寶君子所惡乎異者三好生事也好生奇也好變常也好生事則多端而動眾好生奇則離道而惑俗好變常則輕法而亂度故名不貴茍傳行不貴茍難純德無慝其上也伏而不動其次也動而不行行而不遠遠而能復又其次也其下遠而已矣中論慌其瞻視輕其辭令而望民之則我者未之有也莫之則者必慢之者至矣小人見慢而致怨乎人患己之卑而不思其所以然哀哉是故君子敬孤獨而慎幽微雖在隱翳鬼神不得見其隙況於遊宴乎君子口無戲謔之言言必有防身無戲謔之行行必有檢言必有防行必有檢雖妻妾不可得而黷也雖朋友不可得而狎也是以不慍怒而教行于閨門不諫諭而風聲化乎鄉黨傳稱大人正己而物正者蓋此之謂也徒以匹夫之居猶然況得志而行於天下乎故唐帝允恭克讓光被四表成湯不敢怠遑而掩有九域文王祗畏而造彼區夏也民心莫不有治道至於用之則異矣或用乎人或用乎己用乎己者謂之務本用乎人者謂之追末君子之治之也先務其本故德建而怨寡小人之治之也先追其末故功廢而讎多夫見人而不自見者謂之矇聞人而不自聞者謂之聵慮人而不自慮者謂之瞀故明莫大於自見聰莫大於自聞叡莫大於自慮此三者舉之甚輕行之甚邇而人莫之知也故知者舉甚輕之事以任天下之重行甚邇之路以窮天下之遠故位彌高基彌固勝彌眾受彌廣君子之於己也無事而不懼焉我之有善懼人之未吾好也我之有不善懼人之必吾惡也見人之善懼我之不能脩也見人之不善懼我之必若彼也故君子不恤年之將衰而憂志之有倦不寢道焉不宿義焉言而不行斯寢道矣行而不時斯宿義矣是故君子之務以行前言也民之過在於哀死而不愛生悔往而不慎來善語乎已然好爭乎遂事墮今日而懈於後旬如斯以及於老故孔子撫其心曰師吾欲聞彼將以改此也聞彼而不以改此雖聞何益小人朝為而夕求其成坐施而立望其及行一日之善而問終身之譽譽不至則曰善無益矣遂疑聖人之言背先王之教存其舊術順其常好是以身辱名賤而永為人役也人之為德其猶器歟器虛則物注滿則止焉故君子常虛其心志恭其容貌不以逸群之才加乎眾人之上視彼猶賢自視猶不肖也故人願告之而不厭誨之而不倦君子之於善道也大則大識之小則小識之善無大小咸載於心然後舉而行之我之所有既不可奪而我之所無又取於人是以功常前人而人後之也故夫才敏過人未足貴也博辨過人未足貴也勇決過人未足貴也君子之所貴者遷善懼其不及改惡恐其有餘故孔子曰顏氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行夫惡猶疾也攻之則日益悛不攻則日甚故君子之相求也非特與善也將以攻惡也惡不廢則善不興自然之道也先民有言人之所難者二樂知其惡者難以惡告人者難夫唯君子然後能為己之所難能致人之所難也夫酒食人之所愛也而人相見莫不進焉不吝於所愛者以彼之嗜之也使嗜忠言甚於酒食人豈其愛之乎故忠言之不出以未有嗜之者也詩云匪言不能胡其畏忌目也者遠察天際而不能近見其眥心亦如之君子誠知心之似目也是以務鑒於人以觀得失故視不過垣牆之裹而見邦國之表聽不過閾之內而聞千里之外因人之耳目也人之耳目盡為我用則我之聰明無敵於天下矣是謂人一之我萬之人塞之我通之故其高不可為員其廣不可為方先王之禮左史記事右史記言師瞽誦詩庶僚箴誨器用載銘筳席書戒月考其為歲會其行所以自供正也昔衛武公年過九十猶夙夜不怠思聞訓道命其群臣曰無謂我老耄而舍我必朝夕交戒我凡興國之君未有不然者也下愚反此道以為己既仁矣知矣神明矣何求乎眾人是以辜罪昭著腥德發聞百姓傷心鬼神怨痛若有告之者則曰斯事也徒生乎予心出乎子口於是刑焉戮焉辱焉不然則曰與我異德故也未達我道故也又安足責是己之非遂初之謬至於身危國亡可痛矣已事莫貴乎有驗言莫棄乎無徵言之未有益也不言未有損也水之寒也火之熱也金石之堅剛也彼數物未嘗有言而人莫不知其然者信著乎其體也使吾所行之信若彼數物誰其疑我哉今不信吾所行而怨人之不信己猶教人執鬼縛魅而怨人之不得也惑亦甚矣孔子曰欲人之信己則微言而篤行之篤行之則用日久用日久則事著明事著明則有目者莫不見也有耳者莫不聞也其可誣乎故根深而枝葉茂行久而名譽遠人情也莫不惡謗而卒不免乎謗其故何也非愛智力而不已之也已之之術反也謗之為名也逃之而愈至拒之而愈來訟之而愈多明乎此則君子不足為也闇乎此則小人不足得也帝舜屢省禹拜昌言明乎此者也厲王加戮吳起刺之闇乎此者也夫人也皆書名前策著形列圖或為世法或為世戒可不慎歟夫聞過而不改謂之喪心思過而不改謂之失體失體喪心之人禍亂之所及也君子舍旃君子不友不如己者非羞彼而大我也不如己者須己慎者也然則扶人不暇將誰相我哉吾之僨也亦無日矣故墳庳則水縱友邪則己僻是以君子慎所友孔子曰居而得賢友福之次也夫賢者言足聽貌足象行足法加乎善獎人之美而好攝人之過其不隱也如影其不諱也如響故我之憚之若嚴君在堂而神明處室矣雖欲為不善其敢乎夫利口者心足以見小數言足以盡巧辭給足以應切問難足以斷俗疑然而好說不倦諜諜如也夫類族辨物之士者寡而愚闇不達之人者多孰知其非乎此其所以無用而不見廢也至賤而不見遺也先王之法析言破律亂名改作行僻而堅言偽而辨者殺之為其疑眾惑民而澆亂至道也古之制爵祿也爵以居有德祿以養有功功大者其祿厚德遠者其爵尊功小者其祿薄德近者其爵卑是故觀其爵則別其人之德見其祿則知其人之功不待問之也古之君子貴爵祿者蓋以此也爵祿者先王所重也爵祿之賤也由處之者不宜也賤其人斯賤其位矣其貴也由處之者宜之也貴其人斯貴其位矣黻衣繡裳君子之所服愛其德故美其服也暴亂之君非無此服民弗美也位也者立德之機也勢也者行義之杼也聖人蹈機握杼織成天地之化使萬物順焉人倫正焉六合之內各充其願其為大寶不亦宜乎夫登高而建旌則所示者廣矣順風而奮鐸則所聞者遠矣非旌色之益明非鐸聲之益長所託者然也況居富貴之地而行其政令者也人君之大患也莫大乎詳於小事而略於大道察於近物而暗於遠數自古及今未有如此而不亡也詳於小事察於近物者謂耳聽於絲竹歌謠之和目明乎雕琢采色之章口給乎辨慧切對之辭心通乎短言小說之文手習乎射御書數之功體比乎俯仰般旋之容凡此數者觀之足以盡人之心學之足以勤人之思且先王之末教也非有小才智則亦不能為也是故能之者莫不自悅乎其事而無取於人皆以不能故也夫君居南面之尊秉殺生之權者其勢固足以勝人矣而加之以勝人之能懷足己之心誰敢犯之者乎以匹夫行之猶莫敢規也而況於人君哉故罪惡若山而己不見謗聲若雷而己不聞豈不甚乎夫小事者味甘而大道者醇淡而近物者易驗而遠數者難效非大明君子則不能兼通也故皆惑於所甘而不能至乎所淡眩於所易而不能及於所難是以治君世寡而亂君世多也故人君之所務者其在大道遠數乎大道遠數者謂仁足以覆燾群生惠足以撫養百姓明足以照見四方智足以統理萬物權足以應變無端義足以阜生財用威足以禁遏奸非武足以平定禍亂詳於聽受而審於官人達於廢興之源通於安危之分如此則君道畢矣今使人君視如離婁聽如師曠御如王良射如夷羿書如史籀計如隸首走追駟馬力折門鍵有此六者可謂善於有司之職何益於治乎無此六者可謂乏於有司之職何增於亂乎必以廢仁義妨道德矣何則小器不能兼容治亂又不繫於此而中才之人所好也昔潞豐舒晉智伯瑤之亡皆怙其三材恃其五賢而以不仁之故也故人君多伎藝好小智而不通於大道者祇足以拒諫者之說而鉗忠直之口也祗足以追亡國之跡而背安家之軌也不其然耶不其然耶帝者昧旦而視朝南面而聽天下將與誰為之豈非群公卿士歟故大臣不可以不得其人也大臣者君股肱耳目也所以視聽也所以行事也先王知其如是故博求聰明叡哲君子措諸上位使執邦之政令焉執政聰明叡哲則其事舉其事舉則百僚莫不任其職百僚莫不任其職則庶事莫不致其治庶事莫不致其治則九牧之人莫不得其所故書曰元首明哉股肱良哉庶事康哉凡亡國之君其朝未嘗無致治之臣也其府未嘗無先王之書也然而不免乎亡者何也其賢不用其法不行也茍書法而不行其事爵賢而不用其道則法無於異路說而賢無異於木主也昔桀奔南巢紂踣于京厲流于彘幽滅于戲當是時也三后之典尚在而良謀之臣猶存也下及春秋之世楚有伍舉左史倚相右尹子革而靈王喪師衛有大叔儀公子鱄蘧伯玉而獻公出奔晉有趙宣孟范武子而靈公被弒魯有子家羈叔孫婼而昭公野死齊有晏平仲南史氏而莊公不免弒虞虢有宮之奇舟之僑而二公絕祀由是觀之茍不用賢雖有無益也然彼亦知有馬必待乘之然後遠行有醫必待使之而後愈疾至於有賢則不知必待用之而後興治也且六國之君雖不用賢及其致人也猶修禮盡意不敢侮慢也至於王莽既不能用及其致之也尚不能言莽之為人內實奸邪外慕古義亦聘求名儒徵命術士政煩教虐無以致之於是之以峻刑威之以重戮賢者恐懼莫敢不至徒張設虛名以夸海內莽亦卒以滅亡且莽之爵人也其實囚之也囚人者非必著桎梏置之囹圄之謂也拘係之愁憂之之謂也使在朝之人欲進則不得陳其謀欲退則不得安其身是則以綸組為繩索以印偑為鉗釱也小人雖樂之君子則以為辱矣故明主之得賢也得其心也非謂得其軀也茍得其軀而不論其心斯與籠鳥檻獸未有異也則賢者之於我也亦猶怨讎豈為我用哉日雖班萬鍾之祿將何益歟故茍得其心萬里猶近茍失其心同衾為遠今不脩所以得賢者之心而務脩所以執賢者之身至於社稷顛覆宗廟廢絕豈不哀哉孫子曰人主之患不在於言不用賢而在於誠不用賢言用賢者口也卻賢者行也口行反而欲賢者之進不肖之退不亦難乎善哉言也故人君茍脩其道義昭其德音慎其威儀審其教令刑無頗類惠澤播流百宮樂職萬民得所則賢者仰之如天地愛之如其親樂之如塤篪歆之如蘭芳故其歸我也猶決壅導滯注之大壑何不至之有乎茍麤穢暴虐香馨不登讒邪在側殺戮不辜宮館崇侈妻妾無度淫樂日縱征稅繁多財不匱竭怨喪盈野矜己自得諫者被誅外內震騷遠近怨悲則賢者之視我容貌如臺殿如狴牢采服如衰絰歌樂如號哭酒醴如滫滌肴饌如糞土眾事舉措每無一善彼之惡我也如是其肯至哉今不務明其義而徒設其祿可以獲小人難以得君子君子者行不茍合立不易方不以天下枉道至以樂生害仁安可以祿誘哉雖強縛執之而不獲已亦杜口佯愚茍免不暇國之安危將何賴政之大綱有二賞罰之謂也人君明乎賞罰之道則治不難矣賞罰者不在於必重而在於必行必行則雖不重而民肅必不行也則雖重而民怠故先王務賞罰之必行也夫當賞者不賞則為善者失其本望而疑其所行當罰者不罰則為惡者輕其國法而怙其所守茍如是也雖日用斧銊於市而民不去惡矣日賜爵祿於朝而民不興善矣是以聖人不敢以親戚之恩而廢刑罰不敢以怨讎之忿而留慶賞夫何故哉將以有救也故司馬法曰賞罰不踰時欲使民速見善惡之報也踰時且猶不可而況廢之者乎賞罰不可以疏亦不可以數數則所及者多疏則所漏者多賞罰不可以重亦不可以輕賞輕則不勸罰輕則不懼賞重則民徼幸罰重則民無聊故先王明恕以聽之思中以平之而不失其節也夫賞罰之於萬人猶轡策之於駟馬也轡策之不調非徒遲速之分也至於覆車而摧轅賞罰之不明非徒治亂之分也至於滅國而喪身可不慎乎可不慎乎天地之間含氣而生者莫知乎人人情之至痛莫過乎喪親夫創巨者其日久痛甚者其愈遲故聖王制三年之服所以稱情而立文為至痛極也自天子至于庶人莫不由之帝王相傳未有知其所從來者及孝文皇帝天姿謙讓務崇簡易其將棄萬國乃顧臣子令勿行久喪已葬則除之將以省煩勞而寬群下也觀其詔文唯欲施乎己而已非為漢室創制喪禮而傳之於來世也後人遂奉而行焉莫之分理至乎顯宗聖德欽明深照孝文一時之制又惟先王之禮不可以久違是以世祖徂崩則斬衰三年孝明既沒朝之大臣徒以己之私意忖度嗣君之必貪速除也檢之以大宗遺詔不惟孝子之心哀慕未歇故令聖王之陵遲而莫遵短喪之制遂行而不除斯誠可悼之甚者也滕文公小國之君耳加之生周之末世禮教不行猶能改前之失咨問於孟軻而服喪三年豈況大漢配天之主而廢三年之喪豈不惜哉且作法於仁其弊猶薄道隆於己歷世則廢況以不仁之作宣之於海內而望家有慈孝民德歸厚不亦難乎詩曰爾之教矣民胥放矣聖主若以遊宴之閒超然遠思覽周公之舊章咨顯宗之故事感蓼莪之篤行惡素冠之所刺發復古之德音改大宗之權令事行之後永為典式傳示萬代不刊之道也昔之聖王制為禮法貴有常尊賤有等差君子小人各司分職故下無潛上之愆而人役財力能相供足也往昔海內富民及工商之家資財巨萬役使奴婢多者以百數少者以十數斯豈先王制禮之意哉夫國有四民不相干黷士者勞心工農商者勞力勞心之謂君子勞力之謂小人君子者治人小人者治於人治於人者食人治人者食於人百王之達義也今夫無德而居富之民宜治於人且食人者也役使奴婢不勞筋力目喻頤指從容垂拱雖懷忠信之士讀聖哲之書端委執笏列在朝位者何以加之且今之君子尚多貧匱家無奴婢既其有者不足供事妻子勤勞躬自爨烹其故何也皆由罔利之人與之競逐又有紆青拖紫并兼之門使之然也夫物有所盈則有所縮聖人知其如此故裒多益寡稱物平施動為之防不使過度是以治可致也為國而令廉讓君子不足如此而使貪人有餘如彼非所以辨尊卑等貴賤賤財利尚道德也今太守令長得稱君者以慶賞刑威咸自己出也民畜奴婢或至數百慶賞刑威亦自己出則與郡縣長史又何以異夫奴婢雖賤俱含五常本帝王良民而使編戶小人為己役哀窮失所猶無告訴豈不枉哉今自斗食佐吏以上至諸侯王皆治民人者也宜畜奴婢農工商及給趨走使令者皆勞力躬作治於人者也宜不得畜昔孝哀皇帝即位師丹輔政建議令畜田宅奴婢者有限時丁傅用事董賢貴寵皆不樂之事遂廢覆夫師丹之徒皆前朝知名大臣患疾并兼之家建納忠信為國設禁然為邪臣所抑卒不施行豈況布衣之士而欲唱議立制不亦遠乎典論何進滅於吳匡張璋袁紹亡於審配郭圖劉表昏於蔡瑁張允孔子曰佞人殆信矣古事已列於載籍聊復論此數子以為後之監誡作姦讒中平之初大將軍何進弟車騎苗並開府近士吳匡張璋各以異端有寵於進而苗惡其為人匡璋毀苗而稱進進聞而嘉之以為一於己後靈帝崩進為宦者韓悝等所害匡璋忌苗遂劫進之眾殺苗于北闕而何氏滅矣昔鄭昭公殺於渠彌魯隱公死于羽父苗也能無及此乎夫忠臣之事主也尊其父以重其子奉其兄以敬其弟故曰愛其人者及其屋烏況乎骨肉之間哉而進獨何嘉焉袁紹之子譚長而慧尚少而美紹妻愛尚數稱其才紹亦雅奇其貌欲以為後未顯而紹死別駕審配護軍逢紀宿以驕侈不為譚所善於是外順紹妻內慮私害矯紹之遺命奉尚為嗣潁川郭圖辛評與配紀有隙懼有後患相與依譚盛陳嫡長之義激以絀降之辱勸其為亂而譚亦素有意焉與尚親振干戈欲相屠裂王師承天人之符應以席卷乎河朔遂走尚梟譚禽配馘圖二子既滅臣無餘紹遇因運得收英雄之謀假士民之力東苞巨海之實西舉全晉之地南阻白渠黃河北有勁弓胡馬地方二千里眾數十萬可謂威矣當此之時無敵於天下視霸王易於覆手而不能抑遏愚妻顯別嫡庶婉戀私愛寵子以貌其後敗績喪師身以疾死邪臣飾姦二子相屠墳土未乾而宗廟為墟其誤至矣劉表長子曰琦表始愛之稱其類己久之為少子琮納後妻蔡氏之姪至蔡氏有寵其弟蔡瑁表甥張允並幸於表憚琦之長欲圖毀之而琮日睦於蔡氏允瑁為之先後琮之有善雖小各聞有過雖大必蔽蔡氏稱美於內瑁允歎德於外表日然之而琦益疏矣出為江夏太守監兵於外瑁允陰司其過闕隨而毀之美無顯而不掩闕無微而不露於是表忿怒之色日發誚讓之書日至而琮堅為嗣矣故曰容刀生於身疏積愛出於近習豈謂是耶昔泄柳申詳無人乎穆公之側則不能安其身君臣則然父子亦猶是乎後表疾病琦歸省疾琦素慈孝瑁允恐其見表父子相感更有託後之意謂曰將軍命君撫臨江夏為國東藩其任至重今釋眾而來必見譴怒傷為之歡以增其疾非孝敬也遂遏于戶外使不得見琦流涕而去士民聞而傷焉雖易牙杜宮豎牛虛器何以加此琦豈忌晨鳧北犬之獻乎隔戶牖而不達何言千里之中山嗟乎父子之間可至是也表卒琮竟嗣立以侯與琦琦怒投印偽辭奔喪內有討瑁允之意會王師已臨其郊琮舉州請罪琦遂奔于江南昔伊戾費忌以無寵而作讒江充焚豐以負罪而造蠱高斯之詐也貪權躬寵之罔也欲貴皆近取乎骨肉之間以成其凶逆悲夫匡璋配圖瑁允之徒固未足多怪以後監前無不烹菹夷滅為百世戮試然猶昧於一往者姦利之心篤也其誰離父子隔昆弟成姦於朝制事於須臾皆緣隙以措意託氣應以發事挾宜恤之成畫投必忿之常心勢如憝怒應若發機雖在聖智不能自免況乎中材之人若夫爰盎之諫淮南田叔之救梁孝杜鄴之紿二王安國之和兩主倉唐之稱詩史丹之引過周昌犯色以廷爭叔孫切諫以陳誡三老抗疏以理冤千秋託靈以寤主彼數公者或顯德於前朝或揚聲於上世或累遷而登相或受金於帝室其言既酬福亦隨之斯可謂善處骨肉之閒矣三代之亡由乎婦人故詩刺豔女書誡哲婦斯已著在篇籍矣近世之若此者眾或在布衣細人其失不足以敗政亂俗至於二袁過竊聲名一世豪士而術以之失紹以之滅斯有國者所宜慎也是以錄之庶以為誡于後作內誡古之有國有家者無不患貴臣擅朝寵妻專室故女無美惡入宮見妒士無賢愚入朝見嫉夫寵幸之欲專愛擅權其來尚矣然莫不恭慎於明世而恣睢於閒時者度主以行志也故龍陽臨釣而泣以塞美人之路鄭袖偽隆其愛以殘魏女之貌司隸馮方女國色也世亂避地楊州袁術登城見而悅之遂納焉甚愛幸之諸婦害其寵紿言將軍貴人有志節當時涕泣示憂愁必長見敬重馮氏女以為然後見術輒垂涕術果以為有心志益哀之諸婦因是共絞懸之廟梁言自殺術誠以為不得志而死厚加殯斂袁紹妻劉氏甚妒忌紹死僵尸未殯寵妾五人妻盡殺之以為死者有知當復見紹乃髡頭墨面以毀其形追妒亡魂戮及死人惡婦之為一至是哉其少子尚又為盡殺死者之家嬪說惡母蔑死先父行暴逆忘大義滅其宜矣紹聽順妻意欲以尚為嗣又不時決定身死而二子爭國舉宗塗地社稷為墟上定冀州屯鄴舍紹之第余親涉其庭登其堂遊其閣寢其房棟宇未墮陛除自若忽然而他姓處之紹雖蔽乎亦由惡婦
