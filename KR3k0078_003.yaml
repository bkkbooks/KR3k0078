body:
  text: 尚書尚書昔在帝堯聰明文思光宅天下言聖德之遠著作堯典典者常也言可為百代常行之道曰若稽古帝堯言能順考古道而行之者帝堯也曰放勛欽明文思安安勛功也言堯放上世之功化而以敬明文思之四德安天下之當安者也允恭克讓光被四表格於上下既有四德又信恭能讓故其名聞充溢四外至于天地也克明俊德以親九族能明俊德之士任用之以睦高祖玄孫之親也九族既睦平章百姓百姓百官百姓昭明協和萬邦黎民於變時雍時是也雍和也言天下衆人皆變化從上是以風俗大和也虞舜側微堯聞之聰明側側陋微微賤將使嗣位歷試諸難歷試之以難事慎徽五典五典克從五典五常之教也謂父義母慈兄友弟恭子孝舜舉八元使布五教于四方五教能從無違命也納於百揆百揆時敘揆度也舜舉八凱以度百事百事時敘也賓於四門四門穆穆賓迎也四門宮四門也舜流四凶族諸侯來朝者舜賓迎之皆有美德無凶人也納於大麓烈風雷雨弗迷納舜於尊顯之官使大録萬機之政於是陰陽清和烈風雷雨各以期應不有迷錯伏明舜之行合於天心也正月上日受終於文祖堯天祿永終舜受之也文祖是五廟之大名也五載一巡狩群后四朝敷奏以言明試以功車服以庸敷奏猶進也諸侯每見皆以次序進而問焉以觀其才既則效試其居國為政以著其功賜之車服以旌其所用任也象以典刑典常也象用之者謂上刑赭衣不純中刑雜履下刑墨以居州里而民恥之而反於禮流宥五刑流放也宥三宥也言所流宥皆犯五刑之罪也眚災肆赦眚過也災害也肆失也言罪過誤失以為當赦之也怙終賊刑怙謂怙赦宥而為者也終為殘賊當刑之也流共工於幽洲共工窮奇也幽洲北裔也放歡兜於崇山歡兜渾敦崇山南裔也竄三苗於三危三苗國名也縉雲氏之後為諸侯號叨餮也三危西裔也殛鯀於羽山鯀檮杌也殛誅也羽山東裔也四罪而天下咸服美舜之行故本其徵用之功也二十有八載放勛乃徂落百姓如喪考妣三載四海遏密八音遏絶也密止也堯崩百姓如喪父母絶止金石八音之樂也舜格於文祖詢於四嶽闢四門開闢四方之門廣致衆賢也明四目明視四方也達四聽聽達於四方也柔遠能邇能安遠者則能安近也不能安近則不能安遠也敦德允元所厚而尊者德也所信而行者善也而難任人任佞也辨給之言易悅耳目以理難之也蠻夷率服遠無不服邇無不安三載考績三考黜陟幽明黜退也陟升也三歲考功九載三考退其幽暗無功者升其昭明有功者也庶績咸熙九載三考衆功皆興也曰若稽古大禹曰后克艱厥后臣克艱厥臣政乃乂黎民敏德敏疾也能知為君之難為臣不易則其政治而衆民皆疾修德也帝曰俞允若茲嘉言罔攸伏野無遺賢萬邦咸寧攸所也嘉言無所伏言必用也如此則賢材在位天下安也稽於衆舍己從人弗虐無告弗廢困窮惟帝時克帝謂堯也舜因嘉言無所伏遂稱堯德以成其義考衆從人矜孤愍窮凡人所輕聖人所重也益曰都帝德廣運乃聖乃神乃武乃文益因舜言又美堯也廣謂所覆者大運謂所及者遠聖無不通神妙無方文經緯天地武定禍亂也皇天眷命奄有四海為天下君言堯有此德故為天所命所以勉舜也禹曰惠迪吉從逆凶惟影響迪道也順道吉從逆凶吉凶之報若影之隨形響之應聲言不虛益曰吁戒哉敬戒無虞罔失法度罔遊於逸罔淫於樂淫過也遊逸過樂敗德之源富貴所忽故特以為戒也任賢勿二去邪勿疑疑謀勿成百志惟熙一意任賢果於去邪疑則勿行道義所存於心者日以廣也罔違道以干百姓之譽干求也失道求名古人賤之也罔咈百姓以從己之欲咈戾也專欲難成犯衆興禍故戒也無怠無荒四夷來王言天子常戒慎無怠惰荒廢則四夷歸往之也禹曰於帝念哉德惟善政政在養民水火金木土穀惟修言養民之本在先修六府也正德利用厚生惟和正德以率下利用以阜財厚生以養民三者和所謂善政也九功惟序九序惟歌言六府三事之功有次序皆可歌樂乃德政之致戒之用休董之用威勸之以九歌俾勿壞休美也董督也言善政之道美以戒之威以督之歌以勸之使政勿壞在此三者也帝曰俞地平天成六府三事允治萬世永賴時乃功水土治曰平五行敘曰成因禹陳九功而歎美之言是汝之功也帝曰咎繇惟茲臣庶罔或干豫正或有也無有干我正言順命也汝作士明於五刑以弼五教期於豫治欲其能以刑輔教當於治體也刑期於無刑民協於中時乃功懋哉雖或行刑以殺止殺終無犯者刑期於無所刑民皆合于大中是汝之功勉之也咎繇曰帝德罔臨下以簡御衆以寬過也善則歸君人臣之義也罰弗及嗣賞延於世嗣亦世也延及也父子罪不相及也而及其賞道德之政也宥過無大刑故無小過誤所犯雖大必宥不忌故犯雖小必刑也罪疑惟輕功疑惟重刑疑附輕賞疑從重忠厚至也與其殺弗辜寧失不經好生之德洽於民心茲用弗犯於有司咎繇因帝勉己遂稱帝之德所以明民不犯上也寧失不常之罪不枉不辜之善仁愛之道也帝曰來禹汝惟弗矜天下莫與汝爭能汝惟弗伐天下莫與汝爭功自賢曰矜自功曰伐言禹推善讓人而不失其能不有其勞而不失其功所以能絶衆人也人心惟危道心惟微惟精惟一允執厥中危則難安微則難明故戒以精一信執其中也無稽之言勿聽弗詢之謀勿庸無考無信驗也不詢專獨也終必無成故戒勿聽用也可愛非君可畏非民衆非元后何戴后非衆罔與守邦庶民以君為命故可愛君失道民叛之故可畏言衆戴君以自存君恃衆以守國相須而成也惟口出好興戎朕言弗再好謂賞善戎謂伐惡言口榮辱之主慮而宣之成於一也帝曰咨禹惟時有苗弗率汝徂征三苗之民數干王誅率循也徂往也不循帝道言亂逆也命禹討之禹乃會群后誓於師曰濟濟有衆咸聽朕命會諸侯共伐有苗也軍旅曰誓濟濟衆盛之貌也蠢茲有苗昏迷弗恭蠢動也昏暗也言其所以宜討也侮嫚自賢反道敗德狎侮先王輕嫚典教反正道敗德義也君子在野小人在位廢仁賢任姦佞民棄弗保天降之咎言民叛之天災之也肆豫以爾衆士奉詞伐罪肆故也爾尚一乃心力其克有勳三旬有苗民逆命益贊於禹曰惟德動天無遠弗屆滿招損謙受益時乃天道自滿者人損之自謙者人益之是天道之常至誠感神矧茲有苗至和感神況有苗也言易感也禹拜昌言曰俞班師振旅以益言為當故拜受遂班師兵入曰振旅言整衆也帝乃誕敷文德遠人不服大布文德以來之也干羽於兩階七旬有苗格討而不服不討自來明御之必有道也咎繇曰允迪厥德謨明弼諧迪蹈厥其也其古人謨謀也言人君當信蹈行古人之德謀廣聰明以輔諧其政也禹曰俞如何然其言問所以行也咎繇曰都慎厥身修思永歎美之重也慎修其身思為長久之道也惇敘九族庶明厲翼邇可遠在茲言慎修其身厚次敘九族則衆庶皆明其教而自勉厲翼戴上命邇可推而遠者在此道也禹拜昌言曰俞以咎繇言為當故拜受而然之咎繇曰都在知人在安民歎修身親親之道在知人所信任在能安民也禹曰吁咸若時惟帝其難之言帝堯亦以知人安民為難也知人則哲能官人安民則惠黎民懷之哲知也無所不知故能官人惠愛也愛則民歸之也能哲而惠何憂乎歡兜何遷乎有苗何畏乎巧言令色孔壬孔甚也壬佞也巧言靜言庸違也令色象恭滔天也禹言有苗歡兜之徒甚佞如此堯畏其亂政故遷放之也咎繇曰都亦行有九德言人性行有九德以考察真僞則可知也寬而栗性寬弘而能莊栗也柔而立和柔而能立事願而恭愨願而恭恪也亂而敬亂治也有治而能謹敬也擾而毅擾順也致果為毅也直而溫行正直而氣溫和也簡而廉性簡大而有廉隅也剛而塞剛斷而實塞也彊而義無所屈撓動必合義彰厥有常吉哉彰明也吉善也明九德之常以擇人而官之則政之善也九德咸事俊乂在官使九德之人皆用事則俊德治能之士並在官也百僚師師百工惟時僚工皆官也師師相師法也百官皆是言政無非也庶績其疑凝成也言百事功皆成也無教逸欲有邦不為逸豫貪欲之教是有國者之常也兢兢業業一日二日萬幾兢兢戒慎業業危懼戒懼萬事微也無曠庶官天工人其代之曠空也位非其人為空官言人代天理官不可以天官私非其才也政事懋哉言無非天意者故人君居天官聽政治事不可以不自勉也帝曰吁臣哉鄰哉鄰哉臣哉禹曰俞鄰近也言君臣道近相須而成也帝曰臣作朕股肱耳目言大體若身也豫欲左右有民汝翼左右助也助我所有之民富而教之汝翼成我也豫欲觀古人之象欲觀示法象之服制也以五采彰施於五色作服汝明天子服日月以下諸侯自龍袞以下上得兼下下不得僭上以五采明施于五色作尊卑之服汝明制之也豫欲聞六律五聲八音以出納五言汝聽言欲以六律和聲音出納仁義禮智信五德之言施於民以成化汝當聽審之豫違汝弼汝無面從退有後言我違道汝當以義輔正我無得面從我違退後言我不可弼也禹曰俞哉萬邦黎獻共惟帝臣惟帝時舉敷納以言明庶以功車服以庸獻賢也萬國衆賢共為帝臣帝舉是而用之使陳布其言明之皆以功大小為差以車服旌其能用之也誰敢弗讓敢弗敬應上唯賢是用則下皆敬應上命而讓善也帝弗時敷同日奏罔功帝用臣不是則遠近布同而日進於無功以賢愚並位優劣共流故也無若丹朱奡惟慢遊是好丹朱堯子舉以戒也傲虐是作罔晝夜額額傲戲而為虐無晝夜常額額肆惡不休息也罔水行舟明淫於家用殄厥世朋群也丹朱習於無水陸地行舟言無度也群淫於家妻妾亂也用是絶其世不得嗣也帝其念哉夔曰於豫擊石拊石百獸率庶尹允諧尹正也衆正官之長信皆和諧言神人治也始於任賢立政以禮治成以樂所以致太平也帝庸作歌曰敕天之命惟時惟幾敕正也奉正天命以臨民惟在順時惟在慎微也乃歌曰股肱喜哉元首起哉百工熙哉元首君也股肱之臣喜樂盡忠君之治功乃起百官之業乃廣也咎繇拜手稽首乃賡載歌曰元首明哉股肱良哉庶事康哉賡續也載成也帝歌歸美股肱義未足故續歌先君後臣衆事乃安以成其義也又歌曰元首叢脞哉股肱惰哉萬事墮哉叢脞細碎無大略也君如此則臣懈隋萬事墮廢其功不成歌以申戒也帝拜曰俞欽哉拜受其歌戒群臣自今已往敬職也太康尸位以逸豫啓子也尸主也以尊位為逸豫不勤也滅厥德黎民咸二君喪其德則衆民二心也乃盤遊無度盤樂遊逸無法度也畋於有洛之表十旬弗反洛水表也有窮后羿因民弗忍拒於河有窮國名羿諸侯名也拒太康於河遂廢之也厥弟五人御其母以從御侍言從畋也俟於洛之汭五子咸怨待太康怨其久畋失國也述大禹之戒以作歌述循也其一曰民惟邦本本固邦寧言人君當固民以安國也豫視天下愚夫愚婦一能勝豫言能敬畏小民所以得衆心也怨豈在明不見是圖不見是謀備其微也豫臨兆民廩乎若朽索之馭六馬廩危貌也朽腐也腐索御馬言危懼甚也為人上者奈何弗敬能敬則不驕在上不驕則高而不危也其二曰訓有之內作色荒外作禽荒迷亂曰荒甘酒嗜音峻宇雕牆有一於此未或弗亡此六者有一必亡況兼有乎其三曰惟彼陶唐有此冀方陶唐帝堯氏都冀州也今失厥道亂其紀綱乃底滅亡言失堯之道亂其法制自致亡滅也其四曰明明我祖萬邦之君有典有則貽厥子孫典謂經籍也則法也荒墮厥緒覆宗絶祀言古制存而太康失其業以亡也其五曰烏呼曷歸豫懷之悲曷何也言思而悲也萬世仇豫豫將疇依仇怨也言當依誰以復國乎鬱陶乎豫心顏厚有忸怩鬱陶言哀思也顏厚色愧忸怩心慚也慚愧於仁人賢士也弗慎厥德雖悔可追言人君行已不慎其德以速滅敗雖欲改悔其可追及乎言無益也成湯放桀於南巢惟有慚德有慚德慚德不及古也曰豫恐來世以台為口實恐來世論道我放天子常不去口也仲虺乃作誥陳義告湯可無慚也曰烏呼惟天生民有欲無主乃亂民無君主則恣情欲必致必禍亂也惟天生聰明時乂言天生聰明是治民亂也有夏昏德民墜塗炭夏桀暗亂不恤下民民之危險若陷泥墜火無救之者惟王弗邇聲色弗殖貨利邇近也德懋懋官功懋懋賞用人惟己改過弗吝勉於德者則勉之以官勉於功者亦勉之以賞用人之言若自己出有過則改無所惜所以能成王業者也克寬克仁彰信兆民言湯寬仁之德明信於天下也乃葛伯仇餉初征自葛東征西夷怨南征北狄怨葛伯游行見農民之餉於田者殺其人奪其餉故謂之仇餉仇怨也曰奚獨後豫怨者辭也攸徂之民室家相慶曰徯豫后后來其蘇湯所往之民皆喜曰待我君君來其可蘇息也右賢輔德顯忠進良賢則助之德則輔之忠則顯之良則進之明王之道推亡固存邦乃其昌有亡道則推而亡之有存道則輔而固之王者如此國乃昌盛也德日新萬那惟懷志自滿九族乃離日新不懈怠也自滿志盈溢也王懋昭大德建中於民以義制事以禮制心乖裕後昆欲王自勉明大德立大中之道於民率義奉禮垂優足之道示後世也豫聞曰能自得師者王求聖賢而事之謂人莫己若者亡自多足人莫之益己亡之道好問則裕自用則小問則有得所以足也不問專固所以小也烏呼慎厥終惟其始靡不有初鮮克有終故戒慎終如其始也殖有禮覆昏暴有禮者封殖之昏暴者覆亡之欽崇天道永保天命王者如此上事則敬天安命之道也王歸自克夏至於亳誕告萬方誕大也以天命大義告萬方之衆人曰夏王滅德作威以敷虐於爾萬方百姓夏桀滅道德作威刑以布行虐政於天下百官言殘酷也肆台小子將天命明威弗敢赦其爾萬方有罪在豫一人自責化不至也豫一人有罪無以爾萬方無用汝萬方言非所及也烏呼尚克時忱乃亦有終忱誠也庶幾能是誠道乃亦有終世之美也成湯既歿伊尹作伊訓作訓以教道太甲也曰烏呼古有夏先后方懋厥德罔有天災先君謂禹以下少康以上賢王言能以德讓災也於其子孫弗率皇天降災假手於我有命言桀不循其祖道天下禍災借手於我有命商王誅討之也惟我商王布昭聖武代虐以寬兆民允懷言湯布明武德以寬政代桀虐政兆民以此皆信懷我商王之德也今王嗣厥德罔弗在初言善惡之由無不在初欲其慎始也立愛惟親立敬惟長始於家邦終於四海言立愛敬之道始於親長則家國並化終洽四海也烏呼先后敷求哲人俾輔於爾後嗣敷求賢智使師輔於爾嗣王言仁及後世也制官刑警於有位言湯制治官刑法警戒百官也曰敢有恆舞於宮酣歌於室時謂巫風常舞則荒淫也樂酒曰酣事鬼神曰巫也敢有徇於貨色恆於遊畋時謂淫風徇求也昧求財貨美色常遊戲田獵是淫過之風俗敢有侮聖言逆忠直遠耆德比頑童時謂亂風狎侮聖人之言而不行拒逆忠直之規而不納耆年有德疏遠之童稚頑囂親比之是謂荒亂之風俗也惟茲三風十愆卿士有一於身家必喪有一過則德義廢失位亡家之道也邦君有一於身國必亡諸侯犯此國亡之道也臣下弗匡其刑墨邦君卿士則以爭臣自匡正臣不正君服墨刑鑿其額涅以墨也烏呼嗣王祗厥身念哉言當敬身念祖德也惟上帝弗常作善降之百祥作不善降之百殃祥善也天之禍福唯善惡所在不常在一家也爾惟德罔小萬邦惟慶修德無小則天下賴慶也爾惟弗德罔大墜厥宗茍為不德無大必墜失宗廟此伊尹至忠之訓也太甲既立弗明不用伊尹之訓不明居喪之禮伊尹放諸桐湯葬地也王徂桐宮居憂往入桐宮居憂位也克終允德言能思念其祖終其信德也惟三祀伊尹奉嗣王歸於亳王拜稽首曰豫小子弗明於德自底弗類類善也暗於德故自致不善也欲敗度縱敗禮以速戾於厥躬速召也言已放縱情欲毀敗禮儀法度以召罪於其身也天作孽猶可違自作孽弗可逭孽災也逭逃也言天災可避自作災不可逃也既往背師保之訓弗克於厥初尚賴匡救之德圓惟厥終言己已往之前不能言修德於其初今庶幾賴教訓之德謀終於善悔過之辭也伊尹拜手稽首拜手首至手也曰修厥身允德協於下惟明后言修其身使信德合于群下惟乃明君先王子惠困窮民服厥命罔有弗悅言湯子愛困窮之人使皆得其所故民心服其教令無有不欣喜也奉先思孝接下思恭以念祖德為孝以不驕慢為恭也視遠惟明聽德惟聰言當以明視遠以聰聽德朕承王之休無斁王所行如此則我承王之美無厭也伊尹申誥於王曰烏呼惟天無親克敬惟親言天於人無所親疏唯親能敬身者民無常懷懷於有仁民所歸無常以仁政為常也鬼神無常享享於克誠言鬼神不保一人能誠信者則享其祀天位難哉言居天子之位難以此三者德惟治否德亂為政以德則治不以德則亂也與治同道罔弗興與亂同事罔弗亡言安危在所任治亂在所法也若升高必自下若陟遐必自邇言善政有漸如登高升遠必用下近為始然後致高遠也無輕民事惟難無輕為力役之事必重難之乃可也無安厥位惟危言當常自危懼以保其位也慎終於始於始慮終於終慮始有言逆於汝心必求諸道人以言咈違汝心必以道義求其意勿拒逆之也有言遜於汝志必求諸非道遜順也言順汝心必以非道察之勿以自臧也烏呼弗慮胡獲弗為胡成一人元良萬邦以貞胡何也貞正也言常念慮道德則得道德念為善政則成善政也一人天子也天子有大善則天下得正也君罔以辨言亂舊政利口覆國家故特慎為臣罔以寵利居成功成功不退其志無限故為之極以安之也邦其永孚於休言君臣各以其道則國長信保於美也伊尹既復政厥辟還政太甲將告歸乃陳戒於德告老歸邑陳德以戒曰烏呼天難忱命靡常以其無常故難信也常厥德保厥位厥德匪常九月以亡人能常其德則安其位九有諸侯也夏王弗克庸德慢神虐民言桀不能常其德不敬神明不恤下民皇天弗保言天不安桀所為眷求一德俾作神主天求一德使代桀為天地神祗之主惟尹躬暨湯咸有一德克享天心受天明命享當也非天私我有商惟天祐於一德非天私商而王之也祐助一德所以王也非商求於下民惟民歸於一德非商以力求民民自歸於一德德惟一動罔弗吉德二三動罔弗凶惟吉凶不僭在人惟天降災祥在德行善則吉行惡則凶是不差也德一天降之福不一天降之災是在德也今嗣王新服厥命惟新厥德其命王命也新其德戒勿怠也終始惟一時乃日新言德行終始不衰殺是乃日新之義也任官惟賢材左右惟其人官賢才而任之非賢才不可任也選左右必忠良不忠良非其人也其難其慎惟和惟一其難無以為易也其慎無以輕之也群臣當和一心事君政乃善也后非民罔使民非后罔事君以使民自尊民以事君自生無自廣以狹人匹夫匹婦弗獲自盡民主罔與成厥功上有狹人之心則下無所自盡矣言先盡其心然後乃能盡其力人君所以成功也高宗夢得說小乙子也名武丁夢得賢相其名曰說也使百工營求諸野得諸傅巖使百官以所夢之形象經營求之於外野得之於傅巖之溪也曰朝夕納誨以輔台德言當納諫誨直辭以輔我若金用汝作礪若濟巨川用汝作舟楫若歲大旱用汝作霖雨啓乃心沃朕心若藥弗瞑眩厥疾弗瘳開汝心以沃我心如服藥必瞑眩極其病乃除欲其出切言以自警也若跣弗視地厥足用傷跣必視地足乃無害言欲使為己視聽也惟暨乃僚罔弗同心以匡乃辟與汝並官皆當倡率無不同心以匡正汝君也說復於王曰惟木從繩則正后從諫則聖言木以繩直君以諫明也后克聖臣弗命其承君能受諫則臣不待命其承意而諫也誰敢弗祗若王之休命言如此誰敢不敬順王之美命而諫也惟說命總百官在宰之任也乃進於王曰烏呼明王奉若天道建邦設都天有日月五星皆有尊卑相正之法言明王奉順此道以立國設都也樹后王君公承以大夫師長言立君臣上下也將陳為治之本故先舉其始也弗惟逸豫惟以亂民不使有位者逸豫於民上也言立之主使治民也惟口起羞惟甲胄起戎言不可輕教令易用兵也惟衣裳在笥惟干戈省厥躬言服不可加非其人兵不可任非其才也王惟戒茲允茲克明乃罔弗休言王戒慎四惟之事信能明政乃無不美也惟治亂在庶官所官得人則治失人則亂也官弗及私昵惟其能不加私昵唯能是官也爵弗及惡德惟其賢言非賢不爵也慮善以動動惟厥時非善非時不可動也有其善喪厥善矜其能喪厥功雖天子亦必讓以得之無啓寵納侮開寵非其人則納侮之道也無恥過作非恥過誤而文之遂成大非王曰旨哉說乃言惟服旨美也美其所言皆可服行也乃弗良於言豫罔聞於行汝若不善於所言則我無聞於所行之事說拜稽首曰非知之艱行之惟艱言知之易而行之難以勉高宗也王曰來汝說爾惟訓於朕志言汝當教訓於我使我志通達也若作酒醴爾惟麴蘗酒醴須麴蘗以成亦我須汝以成也若作和羹爾惟鹽梅鹽梅酢羹須酢以和之說曰王人求多聞時惟建事學於古訓乃有獲王者求多聞以立事學古訓乃有所得也事弗師古以克永世匪說攸聞事不法古訓而以能長世非所聞王曰烏呼說四海之內咸仰朕德時乃風風教也使天下皆仰我德是汝教也股肱惟人良臣惟聖手足具乃成人有良臣乃成聖也昔先正保衡作我先王保衡伊尹也作起也正長也言先世長官之臣也乃曰豫弗克俾厥后惟堯舜其心愧恥若撻於市言伊尹不能使其君如堯舜則心恥之若見撻于市也一夫弗獲則曰時豫之辜伊尹見一夫不得其所則以為己罪也右我烈祖格於皇天言以此道左右成湯功至大天爾尚明保豫罔俾阿衡專美有商汝庶幾明安我事與伊尹同美也惟后非賢弗乂惟賢非后弗食言君須賢以治賢須君以食也其爾克紹乃辟於先王永綏民能繼汝君於先王長安民則汝亦有保衡之功也說拜稽首曰敢對揚天子之休命受美命而稱揚之也武王伐殷師渡盟津王曰今商王受弗敬上天降災下民沈湎冒色敢行暴虐沈湎嗜酒冒亂女色敢行酷暴虐殺無辜也罪人以族官人以世一人有罪刑及父母兄弟妻子言淫濫也官人不以賢才而以父兄所以政亂也焚炙忠良刳剔孕婦忠良無罪焚灸之懷子之婦刳剔視之言暴虐也皇天震怒惟受罔有悛心乃夷居弗事上帝神祇遺厥先宗廟弗祀悛改也言紂縱惡無改心平居無故廢天地百神宗廟之祀慢甚也乃曰吾有民有命罔懲其侮紂言吾所以有兆民有天命故也群臣畏罪不爭無能止其慢心同力度德同德度義力鈞則有德者勝德鈞則秉義者彊揆度優劣勝負可見受其臣億萬惟億萬心人執異心不和諧也豫有臣三千惟一心三千一心言同欲也南罪貫盈天命誅之豫弗順天厥罪惟鈞紂之為惡一以貫之惡貫已滿天畢其命今不誅紂則為逆天與紂同罪天矜於民民之所欲天必從之矜憐也言天除惡樹善與民同也時哉不可失言今我伐紂正是天人合同之時不可違失也王次於河朔次止群后以師畢會王乃徇師而誓曰我聞吉人為善惟日弗足凶人為不善亦惟日弗足言吉人竭日以為善凶人亦竭日以行惡者也今商王受力行無度播棄老昵比罪人鮐背之耇稱老布棄不禮敬也昵近也罪人謂天下逋逃小人也剝喪元良賊虐諫輔剝傷害也賊殺也元善之長良善也以諫輔紂紂反殺之謂己有天命謂敬弗足行謂祭無益謂暴無傷天其以豫乂民用我治民當除惡也受有億兆夷人離心離德平人凡人也雖多而執心用德不同也豫有亂臣十人同心同德我治理之臣雖少而心德同也今朕必往百姓廩廩若崩厥角言民畏紂之虐危懼不安若崩摧其角無所容頭也烏呼乃一德一心立定厥功惟克永世汝同心立功則能長世以安也王曰商王受自絶於天結怨於民不敬天自絶之也酷虐民結怨也斫朝涉之脛剖賢人之心崇信姦回放黜師保屏棄典刑囚奴正士屏棄常法而不顧也箕子正諫而以為囚奴也郊社弗修宗廟弗享作奇伎淫巧以悅婦人古人有言曰撫我則后虐我則讎武王述古言以明義言非唯今惡紂也獨夫受洪惟作威乃汝世讎言獨夫失君道也大作威殺無辜乃是汝纍世讎明不可不討也樹德務滋除惡務本立德務滋長除惡務除本言紂為天下惡本也肆豫小子誕以爾衆士殄殲乃讎言欲行除惡之義絶盡紂也武王與受戰於牧野王曰古人有言牝無晨言無晨鳴之道牝之晨惟家之索索盡也喻婦知外事雌代雄鳴則家盡婦奪夫政則國亡也今商王受惟婦言是用妲已惑紂紂信用之乃惟四方之多罪逋逃是崇是長言紂棄其忠臣而尊長逃亡罪人信用之是信是使是以為大夫卿士俾暴虐於爾百姓以姦宄於商邑使四方罪人暴虐姦宄於都邑也今豫發惟龔行天之罰王來自商至於豐乃偃武修文倒載干戈示不復用也行禮射設庠序修文教也歸馬於華山之陽放牛於桃林之野示天下弗服示天下不復乘用也王若曰今商王為天下逋逃主肆豫東征陳於商郊受率其旅若林會於牧野罔有敵於我師前徒倒戈攻於後以北血流漂杵一戎衣天下大定一著戎服而滅紂言與衆同心動有成功也釋箕子囚封比干墓式商容閭封益其土也商容賢人紂所黜退散鹿臺之財發巨橋之粟紂所積之府倉也皆散發以帳貧民也大於四海而萬姓悅服施舍己責救之賙無所謂周有大也天下皆悅仁服德也西旅獻獒西旅遠國也貢大犬大保乃作旅獒用訓於王陳貢獒之義以訓諫也曰烏呼明王慎德四夷咸賓言明王慎德以懷遠故四夷皆賓服無有遠近畢獻方物惟服食器用天下萬國盡貢方土所生之物惟可以供服食器用者言不為耳目華侈王乃昭德之致於異姓之邦無替厥服德之所致謂遠夷之貢也以分賜異姓諸侯使無廢其職也分玉於伯叔之國時庸展親以寶玉分同姓之國是用誠信其親親之道也人弗易物惟德其物言物貴由人也有德則物貴無德則物賤所貴在德也德盛弗狎侮盛德必自敬何狎易侮慢之有也狎侮君子罔以盡人心以虛受人則人盡其心矣狎侮小人罔以盡其力以悅使民民忘其勞則盡力矣玩人喪德玩物喪志以人為戲弄則喪其德矣以器物為戲弄則喪其志矣弗作無益害有益功乃成弗貴異物賤用物民乃足遊觀為無益奇巧為異物言明王之道以德義為益器用為貴所比化俗生民犬馬非其土生弗畜非此土所生不畜以不習其用珍禽奇獸弗育於國皆非所用有所損害故也弗遠物則遠人格不侵奪其利則來服所惟賢則邇人安寶賢任能則近人安近人安則遠人安矣烏呼夙夜罔或弗勤言當常勤於德弗務細行終纍大德輕忽小物積害毀大故君子慎其微也為山九仞功虧一簣諭向成也未成一簣猶不為山故曰功虧一簣是以聖人乾乾日側慎終如始也允迪茲生民保厥居惟乃世王言其能信蹈行此誡則生民安其居天子乃世世王天下也武王雖聖猶設此誡況其非聖可以無誡乎其不免於過則亦宜矣王若曰小子封封康叔名惟乃丕顯考文王克明德慎罰弗敢侮鰥寡庸庸祗祗威威顯民惠恤窮民不慢鰥夫寡婦用可用敬可敬刑可刑明此道以示民也天乃大命文王殪戎殷誕受厥命天美文王乃大命之殺兵殷大受其王命往盡乃心無康好逸豫往當盡汝心為政無自安好逸豫也我聞曰怨弗在大亦弗在小惠弗惠懋弗懋不在大起於小也不在小小至於大也言怨不可為故當使不順者順不勉者勉也若保赤子惟民其康乂愛養民如赤子不失其欲惟民其皆安治也非汝封刑人殺人言得刑殺人也無或刑人殺人無以得刑殺人而有妄刑殺也非汝封劓刵人劓截鼻也刵截耳也無或劓刵人所以舉輕刑以戒為人輕行之也王曰封元惡大憝矧惟弗孝弗友言人之罪惡莫大於不孝不友乃其速由文王作罰刑茲無赦言當亦速用文王所作違教之罰刑此無得赦也敬哉無作怨勿用非謀非彝言當修己以敬無為可怨之事勿用非善之謀非常之法小子封惟命弗於常當念天命之不於常也行善則得之行惡則失之王若曰乃穆考文王誥庶邦御事朝夕曰祀茲酒文王所告衆國治事吏朝夕敕之唯祭祀而用此酒不常飲也曰小大邦用喪亦罔非酒惟辜於小大之國所用喪無不以酒為罪也飲惟祀德將無醉飲酒惟當因祭祀以德自將無至醉在昔殷先哲王惟御事弗敢自暇自逸惟殷御治事之臣不敢自寬暇自逸豫矧曰其敢崇飲崇聚也自逸暇猶不敢況敢聚會飲酒乎弗惟弗敢亦弗暇非徒不敢志在助君敬法亦不暇飲在今後嗣王酣身嗣王紂也酣樂其身不憂政也惟荒腆於酒弗惟自息言紂大厚於酒晝夜不念自息庶群嗜酒腥聞在上故天降喪於殷紂衆群臣用酒耽荒腥穢聞在天故下喪亡於殷也天非虐惟人自速辜言凡為天所亡天非虐人惟人所行惡自召罪古人有言曰人無於水鑑當於民鑑古賢聖有言人無於水鑑當於民鑑也視水見己形視民行事見吉凶今惟殷墜命我其可弗大鑑今惟殷紂無道墜失天命我其可不大視為戒也周公作無逸中人之性好逸豫成王即政恐其逸豫故以所戒名篇周公曰烏呼君子所其無逸歎美君子之道所在念德其無逸豫也君子且猶然況王者乎先知稼穡之艱難乃逸則知小人之依稼穡農夫之艱難事先知之乃謀逸豫則知小民所依怙我聞曰昔在殷王中宗大戊也治民祗懼弗敢荒寧為政敬身畏懼不敢荒怠自安享國七十有五年以敬畏之故得壽考之福也其在高宗嘉靖殷邦至於小大無時或怨善謀殷國至於小大之政民無時有怨也享國五十有九年其在祖甲湯孫太甲爰知小人之依能保惠於庶民弗侮鰥寡知小人以所依依仁政也故能安順於衆民不敢侮慢惸獨也享國三十有三年自時厥後立王生則逸從是三王各承其後而立者生則逸豫無法度也弗知稼穡之根難弗聞小人之勞惟耽樂之從過樂謂之耽惟耽樂之從言荒淫亦罔或克壽以耽樂之故無有能壽者也或十年或七八年或四三年高者十年下者三年言逸樂之損壽也惟我周大王王季克自抑畏大王周公曾祖王季即祖也言皆能以義自抑畏敬天命也文王卑服文王節儉卑其衣服自朝至於日中昃弗皇暇食用咸和萬民從朝至日昳不暇食思慮政事用皆協和萬民者也厥享國五十年自殷王中宗及我周文王茲四人迪哲言此四人皆蹈智明德以臨下也厥或告之曰小人怨汝詈汝則皇自敬德其有告之言小人怨詈者則大自敬德增修善政也此厥弗聽人乃或譸張為幻曰小人怨汝詈汝則信之此其不聽中正之君有人誑惑之言小人怨憾樝詈汝則信受之也亂罰無罪殺無辜怨有同是叢於厥身信讒含怒罰殺無罪則天下同怨讎之叢聚於其身也烏呼嗣王其監於茲視此亂罰之禍以為戒也蔡叔既沒以罪放而卒也王命蔡仲踐諸侯位王成王也父卒命子罪不相及王若曰小子胡胡仲名也皇天無親惟德是輔民心無常惟惠之懷天之於人無有親疏惟有德者則輔佐之民心於上無有常主惟愛己者則歸往之為善弗同同歸於治為惡弗同同歸於亂爾其戒哉慎厥初惟其終康濟小民率自中無作聰明亂舊章汝為政當安小民之業循用大中之道無敢為小聰明作異辨以變亂舊典文章也詳乃視聽罔以側言改厥度則豫一人汝嘉詳審汝視聽非禮義勿視聽也無以邪巧之言易其常度必斷之以義則我一人善汝矣小子胡汝往哉無荒棄朕命汝往之國無廢我命欲其終身奉行之王若曰猷告爾四國多方順大道告四方惟聖罔念作狂惟狂克念作聖惟聖人無念於善則為狂人惟狂人能念善則為聖人言桀紂非實狂愚以不念善故滅亡也自作不和爾惟和哉爾室弗睦爾惟和哉爾邑克明爾惟克勤乃事小大衆官自為不和汝有方多土當和之哉汝親近室家不睦汝亦當和之汝邑中能明是汝惟能勤職事也周公戒於王曰文王罔攸兼於庶言庶獄庶慎惟有司之牧夫文王無所兼知於毀譽衆言及衆刑獄衆所當慎之事惟慎擇有司牧夫而已勞於求才逸於任賢是訓用違庶獄庶慎文王罔敢知於茲是萬民順法用違法衆獄衆慎之事文王一無敢自知於此委任賢能而已也武王率惟敉功弗敢替厥義德武王循惟文王撫安天下之功不敢廢其義德奉遵父道也孺子王矣稚子今已為王矣不可不勤法祖考也繼自今文子文孫其勿誤於庶獄庶慎惟正是乂之文子文孫文王之子孫也從今以往惟以正是之道治衆獄衆慎其勿誤也王曰若昔大猷制治於未亂保邦於未危言當順古大道制治安國必於未亂未危之前思患豫防之曰唐虞稽古建官惟百內有百揆四嶽外有州牧侯伯道堯舜考古以建百官上下相維內外咸治也庶政惟和萬國咸寧官職有序故衆政惟和萬國皆安所以為至治也夏商官倍亦克用乂禹湯建官二百亦能用治言不及唐虞之清要也明王立政弗惟其官惟其人言聖帝明王立政修教也不惟多其官惟在得其人也立太師太傅太保茲惟三公論道經邦燮理陰陽師天子所師法傅傅相天子保保安天子於德義者也此惟三公之任佐王論道以經緯國事和理陰陽也官弗必備唯其人三公之官不必備員惟其人有德乃處之也少師少傅少保曰三孤孤特也卑於公尊於卿特置此三人也二公弘化寅亮天地弼豫一人副二三公弘大道化敬信天地之教輔我一人之治冢宰掌邦治統百官均四海天官卿稱太宰主國政治統理百官均平四海之內邦國言任大司徒掌邦教敷五典擾兆民地官卿主國教化布五常之教安和天下衆民使小大協睦也宗伯掌邦禮治神人和上下春官卿主宗廟天地神祇人鬼之事及國之五禮以和上下尊卑等列也司馬掌邦政統六師平邦國夏官卿主戎馬之事掌國征伐統正六軍平治王邦四方之亂也司寇掌邦禁詰姦慝刑暴亂秋官卿主寇賊法禁治姦惡刑彊暴作亂者也司空掌邦土居四民時地利冬官卿主國空土以居士農工商四民使順天時分地利授之土六卿分職各帥其屬以倡九牧阜成兆民六卿各率其屬官大夫士治其所分之職以倡導九州之牧伯為政大成兆民之性命皆能其官則政治矣王曰烏呼凡我有官君子欽乃攸司慎乃出令令出惟行弗惟反有官君子大夫以上也歎而戒之使敬所司慎出令從政之本也令出必惟行之不惟反改二三其令亂之道也以公滅私民其允懷從政以公平滅私情則民其信歸之學古入官議事以制政乃弗迷言當先學古訓然後入官治政凡制事必以古義議度終始政乃不迷錯也其爾典常作師無以利口亂厥官其汝為政當以舊典常故事為師法無以利口辨佞亂其官也弗學牆面蒞事惟煩人而不學其猶正牆面而立臨政事必煩矣戒爾卿士功崇惟志業廣惟勤此戒凡有官位但言卿士舉其掌事者也功高由志業廣由勤也位弗期驕祿弗期侈貴不舉驕期而驕自至富不與侈期而侈自來驕侈以行己所以速亡也恭儉惟德無載爾僞言當恭儉惟以立德無行姦僞也作德心逸日休作僞心勞日拙為德直道而行於心逸豫而名日美為僞飾巧百端於心勞苦而事日拙不可為之也居寵思危罔弗惟畏弗畏入畏言雖居貴寵當常思危懼無所不畏若乃不畏則入不可畏之刑推賢讓能庶官乃和賢能相讓俊乂在官所以和諧也舉能其官惟爾之能稱匪其人惟爾弗任所舉能修其官惟亦汝之功能也舉非其人惟亦汝之不勝其任也王曰烏呼三事暨大夫敬爾有官亂爾有政難而敕公卿以下各敬居汝所有之官治汝所有之職也以右乃辟永康兆民萬邦惟無斁言當敬治官政以助汝君長安天下兆民則天下萬國惟乃無壓我周德也周公既歿命君陳分正東郊成周成王重周公所營故命陳分居正東郊成周之邑王若曰君陳我聞曰至治馨香感於神明黍稷非馨明德惟馨所聞上古聖賢之言也政治之至者芬芳馨氣動於神明所謂芬芳非黍稷之氣乃明德之馨厲之以德也凡人未見聖若弗克見既見聖亦弗克由聖此言凡人有初無終也未見聖道如不能得見已見聖道亦不能用之所以無成也爾其戒哉爾惟風下民惟草汝戒勿為凡人之行也民從上教而變猶草應風而偃不可不慎也無依勢作威無倚法以削無乘勢位作威民上無倚法制以行刻削之政寬而有制從容以和寬不失制動不失和德教之治也殷民在辟豫曰辟爾惟勿辟豫曰宥爾惟勿宥惟厥中殷民有罪在刑法者我曰刑之汝勿刑也我曰赦宥汝勿宥也惟其當以中正平理斷也有弗若於汝政弗化於訓辟以止辟乃辟有不順於汝政不變於汝教刑之而懲止犯刑者乃刑之也爾無忿疾於頑無求備於一人人有頑囂不喻汝當訓之無忿怒疾之使人當器之無責備於一夫也王曰烏呼父師畢公代周公為大師為東伯命之代君陳也政貴有恆辭尚體要弗惟好異政以仁義為常辭以體實為要故貴尚之若異於先王君子不好也商俗靡靡利口惟賢餘風未殄公其念哉紂以靡靡利口為賢覆亡國家今殷民利口餘風未絶公其念絶之也我聞曰世祿之家鮮克由禮以蕩陵德實悖天道世有祿位而無禮教少不以放蕩陵邈有德者如此實亂天道也斃化奢麗萬世同流言斃俗相化車服奢麗雖相去萬世若同一流者也茲殷庶士驕淫矜誇將由惡終間之惟艱言殷士驕恣過制矜其所能以自誇大將用惡自終以禮禦其心惟難也惟周公克慎厥始惟君陳克和厥中惟公克成厥終周公遷殷頑民以消亂階能慎其始也君陳弘周公之訓能和其中也畢公闡二公之烈能成其終也欽若先王成烈以休於前政敬順文武成業以美於前人之政所以勉畢公穆王命君牙作周大司徒穆王昭王子也王若曰烏呼惟乃祖乃父世篤忠貞服勞王家厥有成績紀於大常言汝父祖世厚忠貞服事勤勞王家其有成功見紀録書於王之大常以表顯之也惟豫小子嗣守文武成康遺緒亦惟先王之臣克左右亂四方惟我小子繼守先王遺業亦惟父祖之臣能佐助我治四方言己無所能也心之憂危若蹈虎尾涉於春冰言祖業之大己才之弱故心懷危懼也虎噬畏噬春冰畏陷危懼之甚也今命爾豫翊作股肱心膂今命汝為我輔翊股肱心體之臣言委任之也爾身克正罔敢弗正民心罔中惟爾之中言汝身能正則下無敢不正民心無中從女取中必當正身示民以中正之道夏暑雨小民惟曰怨咨夏月暑雨天之常道小民惟怨歎咨嗟言心無中正也冬祁寒小民亦惟曰怨咨厥惟艱哉思其艱以圖其易民乃寧天不可怨民猶怨嗟治民其惟艱哉當思慮其艱以謀其易民乃安王若曰伯冏昔在文武聰明齊聖小大之臣咸懷忠良聰明聽視遠也齊通無滯礙也臣雖官有尊卑無不忠良其侍御僕從罔匪正人給侍進御僕從從官官雖微無不用中正之人以旦夕承弼厥辟出入起居罔有弗欽小臣皆良僕從皆正以旦夕承輔其君故君出入起居無有不敬發號施令罔有弗臧下民祗若萬邦咸休言文武發號施令無有不善下民敬順其命萬國皆美其化也惟豫一人無良實賴左右前後有位之士匡其弗及惟我一人無善實恃左右前後有職位之士匡正其不及言此責群臣正己者也繩糾謬格其非心俾克紹先烈言恃左右之臣彈正過誤檢其非妄之心使能繼先王之功業也今豫命汝作大僕正正於群僕侍御之臣欲其教正群僕無敢佞僞也懋乃后德交修弗逮言侍御之臣無小大親疏皆當勉汝君為德更代修進其所不逮也慎簡乃僚無以巧言令色便辟側媚其惟吉士當謹慎簡選汝僚屬侍臣無得用巧言無實令色無質便辟足恭側媚諂諛之人其惟皆吉良正士也僕臣正厥后克正僕臣諛厥后自聖言僕臣皆正則其君乃能正僕臣諂諛則其君乃自謂聖后德惟臣弗德惟臣君之有德惟臣成之君之無德惟臣誤之言君所行善惡專在左右也爾無昵於憸人充耳目之官迪上以非先王之典汝無親近憸利小子之人充備侍從在視聽之官導君上以先王之法也王曰嗚呼伯父伯兄仲叔季弟幼子童孫皆聽朕言皆王同姓有父兄弟子孫列者也爾尚敬逆天命以奉我一人雖畏勿畏雖休勿休汝當庶幾敬逆天命以奉我一人之戒行事雖見畏勿自謂可敬畏雖見美勿自謂有德美惟敬五刑以成三德一人有慶兆民賴之先戒以勞謙之德次教以惟敬五刑所以成剛柔正直之三德也天子有善則兆民賴之王曰吁來有邦有土告爾祥刑吁歎也有國有土諸侯也告汝以善用刑之道也在今爾安百姓何擇非人何敬非刑在今汝安百官兆民之道當何所擇非惟吉人乎當何所敬非惟五刑乎兩造具備師聽五辭兩謂囚證也造至也兩至具備則衆獄官共聽其入五刑之辭也五辭簡孚正於五刑五辭簡核信有罪驗則正之於五刑也五刑不簡正於五罰不簡核謂不應五刑當出金贖罪也五罰弗服正于五過不服不應罰也正於五過從赦免也五刑之疑有赦五罰之疑有赦刑疑赦從罰罰疑赦從免刑罰世輕世重惟齊非齊言刑罰隨世輕重也刑新國用輕典刑亂國用重典刑平國用中典凡刑所以齊非齊非佞折獄惟良折獄罔非在中非口才可以斷獄惟平良可以斷獄無非在中正也哀敬折獄咸庶中正當矜下民之犯法敬斷獄之害人皆庶幾必得中正之道也其刑其罰其審克之其所刑其所罰其當審能之無失中也
