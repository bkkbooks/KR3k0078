body:
  text: 晉書下傳劉毅字仲雄東萊人也治身清高厲志方直為司隸校尉皇太子鼓吹入東掖門毅奏劾保傅以下詔赦之然後得入世祖問毅曰卿以吾可方漢何帝對曰可方桓靈世祖曰吾雖德不及古人猶克己為治又平吳會混一天下方之桓靈其已甚乎對曰桓靈賣官錢入官庫陛下賣官錢入私門以此言之乃殆不如桓靈也習鑿齒陽秋曰毅答巳帝大笑曰桓靈之朝不聞此言今有直臣故不同乎散騎常侍鄒湛進曰世說以陛下比漢文帝人心猶多不同昔馮唐答文帝曰不能用頗牧而文帝怒今劉毅言犯順而陛下樂以此相校聖德乃過之也帝曰我平天下而不封禪焚雉頭裘行布衣禮今於小事何見之甚耶湛曰聖詔所及皆可豫先算計以長短相推慕名者能力行為之至如向詔非明恕內充苞之德度不可為也臣聞猛獸在田荷戈而出凡人能之蜂蠆起於懷袖勇夫為之驚駭非虎弱蜂蠆強也倉卒出於意外故也夫君臣有自然之尊卑辭語有自然之逆順向劉毅始言臣等莫不變色易容而仰視陛下者陛下發不世之詔出思慮之外臣之喜慶不亦宜乎遷尚書左僕射龍見武庫井中車駕親觀有喜色於是外內議當賀毅獨表曰昔龍降鄭時門之外子產不賀龍降夏廷卜藏其漦至周幽王禍舋乃發證據舊典無賀龍之禮詔報曰政德未修誠未有以膺受嘉祥省來示以為瞿然賀慶之事宜詳依典義動靜數示上疏陳九品之弊曰臣聞立政者以官才為本官才有三難而興替之所由也人物難知一也愛憎難防二也情偽難明三也三者雖聖哲在上嚴刑督之猶不可治故堯求俊乂而得四凶三載考績而饕餮得成使世主雖有上聖之明而無考察之法授凡庸之才而去賞罰之勸則為開姦豈徒四族側陋何望於時哉今立中正定九品高下任意榮辱在手操人主之威福奪天朝之權勢愛憎決於心情偽由於己公無考校之負私無告訴之忌榮黨橫越威福擅行用心百態求者萬端廉讓之風滅茍且之俗成天下但爭品位不聞推讓流俗之過一至於此竊為聖世恥之愚心之所非者不可以一慨論輒條列其事夫名狀以當才為清品輩以得實為平治亂之要不可不允清平者治化之美枉濫者亂敗之惡也不可不察然人才異能備體者寡器有大小達有早晚是以三仁殊塗而同歸四子異行而鈞義陳平韓信笑侮於邑里而收功於帝王屈原伍胥不容於人主而顯名於竹帛是篤論之所明也今之中正不精才實務依黨利不鈞稱尺務隨愛憎所欲舉者獲虛以成譽所欲下者吹毛以求疵前鄙後脩者則引古以病今古賢今病者則考虛以覆過質直者罪以違時阿容者善其得和度遠者責以小檢才近者美其合俗齊量者以己為限高下逐強弱是非隨愛憎憑權附黨毀平從親隨世興衰不顧才實衰則削下興則扶上一人之身旬日異狀或以貨賂自通或以計協登進附託必達守道困悴無報於身必見割奪有私於己必得其欲淩弱黨強以植後利是以上品無寒門下品無勢族暨時有之皆曲有故慢主罔時實為亂源昔在前聖之世欲敦風俗鎮靜百姓隆鄉黨之義崇六親之行人道賢否於是見矣然鄉老書其善以獻天子司馬論其能以官於職有司考績以明黜陟故天下之人退而脩本州黨有德義朝廷有公正天下大治浮華邪佞所無容厝今一國之士多者千數或流徙異邦或給役殊方面猶不識況盡其才力而中正知與不知其當品狀采譽於臺府納毀於流言任己則有不識之蔽聽受則有彼此之偏所知者以愛憎奪其平所不知者以人事亂其度既無鄉老紀行之譽又非朝廷考績之課遂使進官之人棄近求遠背本逐末位以求成不由行立故狀無實事諧文浮飾品不校功黨譽虛妄上奪天朝考績之分下長浮華朋黨之事凡官不同事人不同能得其能則成失其能則敗今品不狀才能之所宜而以九等為例以品取人則非才能之所長以狀取人則為本品之所限若狀得其實猶品狀相妨所疏則削其長所親則飾其短徒結白論以為虛譽以治風俗則狀無實行以宰官職則品不料能百揆何以得理萬機何以得脩職名中正實為姦府事名九品而有八損自魏立以來未見其得人之功而生讎薄之累愚臣以為宜罷中正除九品棄魏氏之弊法更立一代之美制愚臣以為便也張華字茂先范陽人也領中書令名重一世朝野擬為臺輔而荀勖馮紞等深忌疾之會世祖問華誰可付以後事者對曰明德至親莫如齊王攸既非上意所在微為忤旨閒言得行以華為都督幽州諸軍事領護烏桓校尉於是遠夷賓服四境無虞朝議欲徵華入相馮紞乾沒苦陷以華有震主之名不可保必遂徵為太常以小事免官世祖崩遷中書監加侍中遂盡忠救匡彌縫補闕雖當闇主虐后之朝猶使海內宴然遷司空卓爾獨立無所阿比趙王倫及孫秀等疾華如讎倫秀舋起遂與裴頠俱被害朝野之士莫不悲酸裴頠字逸民河東人也遷尚書左僕射侍中元康七年以陳準子匡韓蔚子嵩並侍東宮頠諫曰東宮之建以儲皇極其所與游接必簡英宜用成德賢邵之才匡嵩幼弱未識人理立身之節東宮實體夙成之表而今有童子侍從之聲未是光闡遐風之弘理也頠深患時俗放蕩不尊儒術魏末以來轉更增甚何晏阮籍素有高名於世口談浮虛不遵禮法尸祿耽寵仕不事事至王衍之徒聲譽太盛位高勢重不以物務自嬰遂相放效風教陵遲頠著崇有之論以釋其蔽世雖知其言之益治而莫能革也朝廷之士皆以遺事為高四海尚寧而有識者知其將亂矣而夷狄遂淪中州者其禮久亡故也倫秀之興亹頠張華俱見害朝綱傾弛遠近悼之傅玄字休奕北地人也性剛直果勁不能容人之非世祖受禪加駙馬都尉與皇甫陶俱掌諫職玄志在拾遺多所獻替上疏曰前皇甫陶上事為政之要計民而置官分民而授事陶之所上義合古制前春樂平太守冑志上欲為博士置史卒此尊儒之一隅也主者奏寑之今志典千里臣等並受殊寵雖言辭不足以自申意在有益主者請寑多不施用臣恐草萊之士雖懷一善莫敢獻之矣詔曰凡關言於人主人臣之所至難而人主苦不能虛心聽納自古忠臣直士所慨也其甚者至使杜口結舌每念於此未嘗不歎息也故前詔敢有直言勿有所拒庶幾得以發蒙補過獲保高位喉舌納言諸賢當深解此心務使下情必盡茍言有偏善情在忠益不可責備於一人雖文辭有謬誤言語有得失皆當曠然恕之古人猶不拒誹謗況皆善意在可采錄乎近者孔晁綦母和皆案以輕慢之罪所以皆原欲使四海知區區之朝無諱言之忌也又每有陳事輒出付主者主者眾事之本故身而所處當多從深刻至乃云恩貸當由上出出村外者寧縱刻峻是信耶故復因此喻意玄遷侍中任愷字元裒樂安人也為侍中愷性忠直以社稷為己任帝器而昵之政事多諮焉愷惡賈充之為人不欲令久執政每裁抑之充病之後承閒稱愷忠公局正宜在東宮使保護太子外假稱揚內斥遠之帝以為太子少傅而侍中如故充計畫不行會吏部尚書缺好事者為充謀曰愷今總門下樞要得與上親接宜啟令典選便得漸疏此一都令史事耳且九流難精閒隙易乘充即啟稱愷才能宜在官人之職世祖不疑充挾邪而以選官勢望唯賢是任即日用愷愷既在尚書侍覲轉希充與荀勖馮紞承閒譖潤免官愷受黜在家充毀間得行世祖情遂漸薄然眾論明愷為人群共舉愷為河南尹甚得朝野稱譽而賈充朋黨日夜求愷小過又諷有司奏愷免官後起為太常不得志遂以憂卒裴楷字叔則河東人也為侍中世祖嘗問曰朕應天順民海內更始天下風聲何得何失對曰陛下受命四海承風所以未比德於堯舜者賈充之徒猶在朝也夫逆取而順守湯武是也今宜引天下賢人與弘政道不宜示之以私也和嶠字長輿汝南人也遷侍中嶠見東宮不令因侍坐曰皇太子有淳古之風而季世多偽恐不了陛下家事世祖默然後與荀顗荀勖同侍世祖曰太子近入朝差長進卿可俱詣粗及世事既奉詔而還顗勖並稱皇太子明識弘雅誠如明詔嶠曰聖質如初耳帝不悅而起嶠以為國雖休明終必喪亂言及社稷未嘗不以儲君為憂或以告賈妃妃銜之愍懷建宮官嶠為太子少傅太子朝西宮嶠從人賈后使惠帝問嶠曰卿昔謂我不了家事今日定云何嶠曰臣昔事先帝有斯言言之不效國之福也臣敢逃其罪乎詵字廣基濟陰人也舉賢良對策曰臣竊觀乎古今而考其美惡古人相與求賢今人相與求爵此風俗所以異流也古之官人君責之於上臣舉之於下得其人有賞失其人有罰安得不求賢乎今之官者父兄營之親戚助之有人事則通無人事則塞安得不求爵乎賢茍求達達在脩道窮在失義故靜以待之也爵茍可求得在進取失在後時故動以要之也天地不能頓為寒暑人主亦不能頓為治亂故寒暑漸於春秋治亂起於得失當今之世官者無關梁邪門啟矣朝廷不責賢正路塞矣所謂責賢使之相舉也所謂關梁使之相保也賢不舉則有咎保不信亦有罰有罰則有司莫不悚也以求其才焉今則不然貪鄙竊位不知誰升之者虎兕出檻不知誰可咎者網漏吞舟何以過此雖聖思勞於夙夜所使為政恆得此屬欲化美俗平亦俟河之清耳為左丞劾奏吏部尚書崔洪洪曰我舉丞而還奏我此為挽弩自射詵聞曰昔趙宣子任韓厥為司馬厥以軍法戮宣子之僕宣子謂諸大夫可賀我矣吾選厥也任其事崔侯為國舉才我以才見舉惟官是視各明在公何故私言乃至於此洪聞之慚服荀勖字公曾潁陰人也為中書監加侍中勖才學博覽有可觀採而性邪佞與賈充馮紞共相朋黨朝廷賢臣心不能悅任愷因機舉充鎮關中世祖即詔遣之勖謂紞曰賈公遠放吾等失勢太子婚尚未定若使充女為妃則不營留而自停矣勖與紞伺世祖閒並稱充女淑令風姿絕世若納東宮必能輔佐君子有關雎后妃之德遂成婚焉馮紞字少冑安平人也稍遷左衛將軍承顏悅色寵愛日隆賈充荀勖並與之親善世祖詔治金墉廢賈妃已定紞與勖乾沒救請故得不廢轉侍中世祖篤病得愈紞與勖乃言於世祖曰陛下前者病若不差太子其廢矣齊王為百姓所歸公卿所仰雖欲高讓其得免乎宜遣還藩以安社稷世祖納之初謀伐吳紞與充勖共苦諫世祖不納斷從張華吳平紞內懷慚懼疾華如讎及華外鎮威德大著朝論當徵為尚書令紞從容侍帝論晉魏故事因曰臣常謂鍾會之反頗由太祖帝勃然曰何言邪紞曰臣以為夫善御者必識六轡盈縮之勢善治者必審官方控帶之宜是故漢高八王以寵過夷滅光武諸將以抑損克終非上之人有仁暴之異在下者有愚智之殊蓋抑揚與奪使之然耳鍾會才具有限而太祖獎誘太過喜其謀猷盛其名位授以重勢故會自謂算無遺策功在不賞張利害遂搆凶逆耳向令太祖錄其小能節以大禮抑之權勢納之以軌度則逆心無由而生亂事無階而成世祖曰然紞稽首曰愚臣之言宜鎮堅冰之道無令如會之徒復致覆喪世祖曰當今豈有會乎紞曰陛下謀謨之臣著大功於天下四海莫不聞知據方鎮總戎馬之任者皆在陛下聖慮矣世祖默然徵張華為太常尋免華官劉頌字子雅廣陵人也除淮南相上疏曰臣竊惟萬載之事理在二端天下大器一安難傾一傾難正故慮經後世者必精目下之治治安遺業使數世賴之若乃兼建諸侯而樹藩屏深根固蔕則祚延無窮可以比跡三代如或當身之治遺風餘烈不及後嗣雖樹親戚而成國之制不建使夫後世獨任智力以安大業若未盡其理雖經異時憂責猶追在陛下將如之何願陛下善當今之治樹不拔勢則天下無遺憂矣夫聖明不世及後嗣不必賢此天理之常也故善為天下者任勢而不任人任勢者諸侯是也任人者郡縣是也郡縣之治小察理而大勢危諸侯牧民近多違而遠慮固聖王惟終始之弊權輕重之理苞彼小違以據大安然後足以藩固內外維鎮九服夫武王聖主也成王賢嗣也然武王不恃成王之賢而廣封建者慮經無窮也且善言今者必有以驗之於古唐虞以前書文殘缺其事難詳至於三代則並建明德及舉王之顯親開國承家以藩屏帝室延祚久長近者五六百歲遠者延將千載逮至秦氏罷侯置守子弟不分尺土孤立無輔二世而亡漢承周秦之後雜而用之前後二代各二百餘年揆其封建雖制度舛錯不盡事中然跡其衰亡恆在同姓失職諸侯微時不在強盛也昔呂氏作亂幸賴齊代之援以寧社稷七國叛逆梁王捍之卒弭其難自是之後威權削奪諸侯止食祖俸甚者至乘牛車是以王莽得擅本朝遂其姦謀傾蕩天下毒流生靈光武紹起雖封樹子弟而不建成國之制祚亦不延魏氏承之圈閉親戚幽囚子弟是以神器速傾天命移在陛下長短之應禍福之徵可見於此矣然則建邦茍盡其理則無向不可故曰為社稷計莫若建國夫邪正逆順者人心之所繫服也今之建置審量事勢使君樂其國臣榮其朝各流福祚傳之無窮上下一心愛國如家視人如子然後能保荷天祿兼翼王室今諸王裂土皆兼於古之諸侯而君賤其爵臣恥其位莫有安志其故何也法同郡縣無成國之制故也今之建置宜使率由舊章一如古典然人心繫常不累十年好惡未改情願未移臣之愚慮以為宜早創大制遲回眾望猶在十年之外然後能令君臣各安其位榮其所蒙上下相持用成藩輔如今之為適足以虧天府之藏徒棄穀帛之資無補鎮國衛土之勢也古者封建既定各有其國後雖王之子孫無復尺土此今事之必不行者也若推親疏轉有所廢以有所樹則是郡縣之職非建國之制也今宜豫開此地使親疏遠近不錯其制然後可以永安然於古典所應有者悉立其制然非急所須漸而備之不得頓設也須車甲器械既具其群臣乃服綵章倉廩已實乃營宮室百姓已足乃備官司境內充實乃作禮樂唯宗廟社稷則先建之至境內之政官人用才自非內史國相命於天子其餘眾職及死生之斷穀帛資實慶賞刑威非封爵者悉得專之周之建侯長享其國與王者並遠者延將千載近者猶數百年漢之諸王傳祚暨至曾玄人性不甚相遠古今一揆而短長甚違其故何邪立意本殊而制不同故也周之封建使國重於君公侯之身輕於社稷故無道之君不免誅放敦興滅繼絕之義故國祚不泯不免誅放則群后思懼胤嗣必繼是無亡國也諸侯思懼然後軌道下無亡國天子乘之理勢自安此周室所以長存也漢之樹置君國輕重不殊故諸王失度陷於罪戮國遂以亡不崇興滅繼絕之序故下無固國天子居上勢孤無輔故姦臣擅朝易傾大業今宜反漢之弊脩周舊跡國君雖或失道陷於誅絕又無子應除茍有始封支胤不問遠近必紹其祚若無遺類則虛建之須皇子生以繼其統然後建國無滅又班固稱諸侯失國亦由網密今又宜都寬其檢且建侯之理本經盛衰慮關強弱則天下同忿并力誅之大制都邑班之群后著誓丹青書之玉板藏之金匱置諸宗廟副在有司寡弱小國猶不可危豈況萬乘之主承難傾之邦而加其上則自然永久故臣願陛下置天下於自安之地寄大業於固成之勢則可以無遺憂矣今閻閭少名士官司無高能其故何也清議不肅人不立德行在取容故無名士下不專局又無考課吏不竭節故無高能無高能則有疾世事少名士則後進無准故臣思立吏課而肅清議也天下至大萬事至眾人君至少同於天日故非垂聽所得周覽是以聖王之治執要而已委務於下而不以事自嬰也分職既定無所與焉非憚日側之勤而牽於逸豫之虞誠以治體宜然事勢致之也何則夫造創謀始逆睹是非以別能否甚難察也既以施行因其成敗以分功罪甚易識也易識在考終難察在造始故人君恆居其易則治人臣不處其難則亂今人主恆能居易執要以御其下然後人臣功罪形於成敗之徵無所逃其誅賞故罪不可蔽功不可誣功不可誣則能者勸罪不可蔽則違慢日肅此為治之大略也天下至大非垂聽所周又精始難校考終易明今人主不委事仰成而與諸下共造事始則功罪難分能否不別陛下縱未得盡仰成之理都委務於下至如今事應奏御者蠲除不急使要事得精可三分之二今親掌者受成於上上之所失不得復以罪下歲終事功不建不知所責也夫監司以法舉罪獄官案劾盡實法吏據辭守文大較雖同然至於施用監司與夫法獄體宜小異獄官唯實法吏唯文監司則欲舉大而略小何則夫細過微闕謬妄之失此人情之所必有而悉以法則朝野無全人此所謂欲治而反亂者也是以善為治者綱舉而網疏綱舉則所羅者廣綱疏則小罪必漏所羅者廣則大罪不縱則甚泰必刑微過必漏則為政不苛甚泰必刑然後犯治必塞此為治之要也而自近世以來為監司者類大綱不振而網甚密網甚密則微過必舉微過人情所必有而不足以害治舉之則微而益亂大網不振則豪強橫肆豪強橫肆則平民失職此錯所急而倒所務之由也非徒無益於治體清議乃由此益傷古人有言曰君子之過如日之蝕焉又曰過而能改又曰不貳過凡此數者是賢人君子不能無過之言也茍不至於害治則皆天網之所漏也所犯在甚泰然後王誅所必加此舉罪淺深之大例也故君子得全美以善事不善者必夷戮警眾此為治誅赦之准式也凡舉過彈違將以肅風論而整世教今舉小過清議益頹是以聖王深識人情而達治體故其稱曰不以一眚掩大德又曰赦小過舉賢才又曰無求備於一人故冕而前旒充纊塞耳意在去苛察舉甚泰善惡之報必取其尤然後簡而不漏大罪必誅法禁易全也今則當小罪甚察而時不加治者明小罪非亂治之姦也害治在犯尤而謹搜微過何異放兕豹於公路而禁鼠盜於隅隙時政所失少有此類陛下宜反而求之乃得所務也江統字應元陳留人也除華陰令時關隴屢為氐羌所擾牧守淪沒黎庶塗炭孟觀西討生禽齊萬年群氐死散統深惟四夷亂華宜杜其萌乃作徙戎論其辭曰夫蠻夷戎狄謂之四海九服之制地在要荒春秋之義內諸夏而外夷狄以其言語不通法俗詭異或居絕域之外山河之表與中國壤斷土隔不相侵涉賦役不及正朔不加其性氣貪婪凶悍不仁四夷之中戎狄為甚弱則畏服強則侵叛雖有賢聖之世大德之君咸未能以道化率導而以恩德柔懷也當其強也以殷之高宗而憊於鬼方有周文王而患昆夷獫狁高祖困於白登孝文軍於霸上及其弱也周公來九譯之貢中宗納單于之朝以元成之微而猶四夷賓服此其已然之效也故匈奴求守邊塞而侯應陳其不可單于屈膝未央望之議以不臣是以有道之君牧夷狄也唯以待之有備禦之有常雖稽顙執贄而邊城不弛固守為寇賊強暴而兵甲不加遠征期令境內獲安疆埸不侵而已及至周室失統諸侯專征以大兼小轉相殘滅封疆不固而利害異心戎狄乘閒得入中國或招誘安撫以為己用故申繒之禍顛覆宗周襄公要秦遽興姜戎義渠大荔居秦晉之域陸渾陰戎據伊洛之閒搜瞞之屬侵入齊宋陵虐邢衛南夷與北夷交侵中國不絕若線始皇之并天下也南兼百越北走匈奴當時中國無復四夷矣漢興而都長安宗周豐鎬之舊也及至莽之敗西都荒毀百姓流亡建武中以馬援領隴西太守討叛羌徙其餘種於關中居馮翊河東空地而與齊民雜處數歲之後族類繁息既恃其肥強且苦漢民侵之永初之元騎都尉王弘使西域發調羌氐以為行衛於是群羌奔駭互相扇動二州之戎一時俱發覆沒將守屠破城邑諸戎遂熾至於南入蜀漢東掠趙魏唐突軹關侵及河內十年之中夷夏俱弊此所以為害深重累年不定者雖由禦者之無方將非其才亦豈不以寇發心腹害起肘腋疾篤難療瘡大遲愈之故哉自此之後餘燼不盡小有際會輒復侵叛雍州之戎常為國患中世之寇唯此為大漢末之亂關中殘滅魏興之初與蜀分隔疆埸之戎一彼一此魏武皇帝遂徙武都之種於秦川欲以弱寇疆國捍禦蜀虜此蓋權宜之計一時之勢非所以保境安民為萬世之利也今者當之已受其弊矣夫關中土沃物豐厥田上上帝王之都未聞戎狄宜在此土也非我族類其心必異戎狄志體不與華同而因其衰弊遷之畿服吏民玩習侮其輕弱使其怨恨之氣毒於骨髓至於蕃育眾盛則坐生其心以貪捍之性挾憤怒之情候隙乘便輒為橫逆而居封域之內無障塞之隔掩不備之民收散野之積故能為禍滋蔓暴害不測此必然之勢已驗之事也當今之宜宜及兵威方盛眾事未罷徙馮翊北地新平安定界內諸羌著先零罕汧析支之地徙扶風始平京兆之氐出還隴右著陰平武都之界各附本種反其舊土使屬國撫夷就安集之戎晉不雜並得其所上合往古即敘之義下為盛世永久之規縱有猾夏之心風塵之警則絕遠中國隔閡山河雖為寇暴所害不廣是以充國子明能以數萬之眾制群羌之命有征無戰全軍獨克雖有謀謨深計廟勝遠圖亦豈不以華夷異處戎夏區別要塞易守之故得成其功哉難者曰方今關中之禍暴兵二載征戍之勞老師十萬水旱之害薦飢累荒凶逆既戮悔惡初附且款且畏咸懷危懼百姓愁苦異人同慮望寧息之有期若枯旱之思雨露誠宜鎮之以靜默而綏之以安豫而子方欲作役起徒興功造事使疲悴之眾徙自猜之寇以無穀之民遷乏食之虜恐勢盡力屈緒業不卒羌戎離散心不可一前害未及弭而後變復橫出矣答曰羌戎狡猾傷害牧守連兵聚眾載離寒暑而今異類瓦解同種土崩老幼繫虜丁壯降散子以此等為尚挾餘資悔惡反善懷我德惠而來柔附乎將勢窮道盡智力俱困懼我兵誅以至於此乎曰無有餘力勢窮道盡故也然則我能制其短長之命而令其進退由己矣夫樂其業者不易事安其居者無遷志方其自疑危懼畏怖促遽可制以兵威使之左右無違也迨其死亡散流故可遐遷遠處令其心不懷土也夫聖賢之謀事為之於未有治之於未亂道不著而平德不顯而成其次則能轉禍為福因敗為功值困必濟遇否能通今子遭弊事之終而不圖更制之始愛易轍之勤而得覆車之軌何哉且關中之民百餘萬口率其少多戎狄居半處之與遷必須口實若有窮乏故當傾關中之穀以全其生生之計必無擠於溝壑而不為侵掠之害也今我遷之傳食而至附其種族自使相贍而秦地之民得其半穀此為濟行者以廩糧遺居者以積倉寬關中之逼去盜賊之原除旦夕之損建終年之益若憚暫舉之小勞而遺累世之寇敵非所謂能開物成務創業垂統崇基拓跡謀及子孫者也并州之胡本實匈奴桀惡之寇也漢宣之世凍餒殘破國內五裂後合為二呼韓邪遂衰弱孤危不能自存依阻塞下委質柔服建武中南單于復求降附於彌扶羅值世喪亂遂乘舋而作虜掠趙魏寇至河南建安中又使右賢王去卑誘質呼廚泉聽其部落散居六郡咸熙之際分為三率泰始之初又增為四今五部之眾戶至數萬人口之盛過於西戎然其天性驍勇弓馬便利倍於氐羌若有不虞風塵之慮則并州之域可為寒心今晉民失職猶或亡叛犬馬肥充則有噬齧況於夷狄能不為變但顧其微弱勢力不陳耳夫為邦者患不在貧而在不均憂不在寡而在不安以四海之廣士民之富豈須夷虜在內然後取足哉此等皆可申喻發遣還其本域慰彼羈旅懷土之思釋我華夏纖介之憂惠此中國以綏四方德施永世於計為長陸機字士衡吳郡人也為著作郎孫盛陽秋載機五等論曰夫體國經野先王所慎創制垂基思隆後業然而經略不同長短異術五等之制始於黃唐郡縣之治創於秦漢得失成敗備在典謨是以其詳可得而言夫王者知帝業至重天下至廣廣不可以偏制重不可以獨任任重必於借力制廣終乎因人故設官分職所以輕其任也並建伍長所以弘其制也於是乎立其封疆之典裁其親疏之宜使萬國相維以成盤石之固宗庶雜居以定維城之業又有以見綏世之長御識人情之大方知其為人不如厚己利物不如圖身安上在於悅下為己在乎利人是以分天下以厚樂而己得與之同憂饗天下以豐利而己得與之共害利博則恩篤樂遠則憂深故諸侯享食土之實萬國受傳世之祚夫然則南面之君各務其治九服之民知有定主上之子愛於是乎生下之禮信於是乎結世治足以敦風道衰足以禦暴故強毅之國不能擅一時之勢雄俊之民無所寄霸王之志然後國安由萬邦之思治主尊賴群后之圖身蓋三代所以直道四王所以垂業也故世及之制弊禍終乎七雄昔者成湯親照夏后之鑒公旦目涉商人之式文質相濟損益有物然五等之禮不革于時封畛之制有隆焉爾者豈玩二王之禍而闇經世之算乎固知百世非可懸禦善制不能無弊而侵弱之辱愈於殄祀土崩之困痛於陵夷也是以經始獲其多福慮終取其小禍非謂侯伯無可亂之符郡縣非致治之基也故國憂賴其釋位主弱憑於其翼戴及其承微積弊王室遂卑猶保名位祚遺後嗣皇統幽而不輟神器否而必存者豈非事勢使之然與降及亡秦棄道任術懲周之失自矜其得尋斧始於所庇制國昧於弱下國慶獨享其利主憂莫與共害雖速亡趍亂不必一道顛沛之舋實由孤立是蓋思五等之小怨忘萬國之大德知陵夷之可患闇土崩之為痛也周之不競有自來矣國乏令主十有餘世然片言勤王諸侯必應一朝震矜遠國先叛故強晉收其請隧之圖暴楚頓其觀鼎之志豈劉項之能闚關勝廣之敢號澤哉借使秦人因循周制雖則無道有共興亡其覆滅之禍豈在曩日漢矯秦枉大啟王侯境土踰溢不遵舊典故賈生憂其危晁錯痛其亂是以諸侯阻其國家之富憑其土民之力勢足者反疾土狹者逆遲六臣犯其弱綱七子衝其漏網皇祖夷於黥徒西京病於東帝是蓋過正之災而非建侯之累也逮至中葉忌其失節割削宗子有名無實天下嚝然復襲亡秦之軌矣是以五侯作威不忌萬邦新都襲漢易於拾遺也光武中興纂隆皇統而猶遵覆車之遺轍養喪家之宿疾僅及數世姦宄充斥卒有強臣專朝則天下風靡一夫縱橫而城地自夷豈不危哉在周之衰難興王室放命者七臣干位者三子嗣王委其九鼎凶族據其天邑鉦鼙震於閫宇鋒鏑流乎絳闕然禍止畿甸害不覃及天下晏然以治待亂是以宣王興於共和襄惠振於晉鄭豈若二漢陛闥暫擾而四海已沸孽臣朝入而九服夕亂哉遠惟王莽篡逆之事近覽董卓擅權之際億兆悼心愚智同痛然周以之存漢以之亡夫何故哉豈世乏曩時之臣士無匡合之志歟蓋遠績屈於時異雄心挫於卑勢耳故烈士扼腕終委寇讎之手忠臣變節以助虐國之桀雖復時有鳩合同志以謀王室然上非奧主下皆市人師旅無先定之班君臣無相保之志是以義兵雲合無救劫殺之禍眾望未改而已見大漢之滅矣或以諸侯世位不必常全昏主暴君有時比故五等所以多亂今之牧守皆官方庸能雖或失之其得固多故郡縣易以為政治夫德之休明黜陟日用長率連屬咸述其職而淫昏之君無所容過何則不治哉故先代有以之興矣茍或衰陵百度自悖鬻官之吏以貨准才則貪殘之萌皆群后也安在其不亂哉故後王有以之廢矣且要而言之五等之君為己思治郡縣之長為利圖物何以徵之蓋企及進取仕子之常志修己安民良士之所希及夫進取之情銳安民之譽遲是故侵百姓以利己者在位所不憚損實事以養名者官長所夙夜也君無卒歲之圖臣挾一時之志五等則不然知國為己土眾皆我民民安己受其利國傷家嬰其病故前人欲以垂後後嗣思其堂構為上無茍且之心群下知膠固之義使其並賢居政則功有厚薄而兩愚處亂則過有深淺然則八代之制幾可以一理貫秦漢之典殆可以一言蔽也胡威字伯武淮南人也父質字文德清廉潔白質之為荊州刺史也威自京都定省家貧每至客舍自放驢取樵既至見父停廄中十餘日告歸臨辭賜絹一匹為道中資威跪曰大人清高不審於何得此絹質曰是吾奉祿之餘故以為汝糧耳威受之辭歸荊州帳下都督聞威將去請假還家持資糧於路要威因與為伴每事佐助又進飯食威疑而誘問之既知乃取所賜絹與都督謝而遣之後因他信以白質質杖都督一百除吏名父子清慎如此於是名譽著聞為安豐太守徐州刺史政化大行後入朝世祖因言次謂威曰卿清孰如父清對曰臣不如也世祖曰以何為勝邪對曰臣父清恐人知臣清恐人不知是臣不及遠也世祖以威言直而婉謙而順累遷豫州刺史入為尚書周顗字伯仁汝南人也為尚書左僕射王敦作逆石頭既王師敗績顗奉詔往詣敦敦曰伯仁卿負我顗曰公戎車犯順下官親率六軍不能其事使王旅奔敗以此負公敦憚其辭正不知所答左右文武勸顗避敦曰吾備位大臣朝廷喪破寧可復草閒求活外投胡越者邪俄而被收於石頭害之陶侃字士行廬江人也為荊州刺史政刑清明惠施均治故楚郢士女莫不相慶引接疏遠門無停客常語人曰大禹聖者乃惜寸陰至於眾人當惜分陰豈可逸游荒醉生無益於時死無聞於後是自棄也諸參佐或以談戲廢事者乃命取蒱博之具悉投之于江吏將則加鞭朴曰樗蒱者牧奴戲耳老莊浮華非先王之法言不可行也君子當正其衣冠攝其威儀何有亂頭養望自謂宏達邪於是朝野用命移風易俗高崧字茂琰廣陵人也累轉侍中哀帝雅好服食崧諫以為非萬乘所宜陛下此事實是日月之一蝕也帝欲脩鴻寶禮崧反覆表諫事遂不行何充字次道廬江人也為護軍中書令顯宗初崩充建議曰父子相傳先王舊典忽妄改易懼非長計庾冰等不從故康帝遂立帝臨軒冰充侍坐帝曰朕嗣洪業二君之力也對曰陛下龍飛臣冰之力也若如臣議不升平之世康帝崩充奉遺旨便立孝宗加錄尚書事侍中臨朝正色以社稷為己任凡所選用皆以功臣為先不以私恩樹用親戚談者以此重之吳隱之字處默濮陽人也早孤事母孝謹愛敬著於色養幾滅鄣於執喪居近韓康伯家康伯母賢明婦人每聞隱之哭臨饌輟當織投杼為之悲泣如此終其喪謂伯曰汝若得在官人之任當舉如此之徒及伯為吏部超選隱之遂階清級為龍驤將軍廣州刺史州之北界有水名曰貪泉父老云飲此水者使廉士變節隱之始踐境先至水所酌而飲之因賦詩曰古人云此水一歃懷千金試使夷齊飲終當不易心在州清操愈厲化被幽荒詔曰廣州刺史吳隱之孝友過人祿均九族處可欲之地而能不改其操饗惟錯之富而家人不易其服革奢務嗇南域改觀朕有嘉焉可進號前將軍賜錢五十萬穀千斛
