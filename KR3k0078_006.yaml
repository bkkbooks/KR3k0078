body:
  text: 春秋左氏傳中宣公二年鄭公子歸生伐宋宋華元禦之將戰華元殺羊食士其御羊斟不與及戰曰疇昔之羊子為政疇昔猶前日也令日之事我為政與入鄭師故敗晉靈公不君失君道厚斂以雕牆雕畫也從臺上彈人而觀其避丸也宰夫胹熊蹯不熟殺之置諸畚使婦人載以過朝畚筥屬趙盾士季患之將諫士季曰諫而不入則莫之繼也會請先不入則子繼之三進及溜而後視之士季隨會也三進三伏公不省而又前也公知欲諫故佯不視曰吾知所過矣將改之稽首而對曰人誰無過過而能改善莫大焉詩曰靡不有初鮮克有終夫如是則能補過者鮮矣君能有終則社稷之固也豈唯群臣賴之猶不改宣子驟諫公患之使鉏麑賊之鉏麑力士晨往寢門闢矣盛服將朝尚早坐而假寐不解衣冠而睡麑退歎而言曰不忘恭敬民之主也賊民之主不忠棄君之命不信有一於此不如死觸槐而死槐趙盾庭樹晉侯飲趙盾酒伏甲將攻之其右提彌明知之右車右趨登曰臣侍宴過三爵非禮遂扶以下公嗾夫獒焉明搏而殺之獒猛犬也盾曰棄人用犬雖猛何為責公不養士而更以犬為己用也且出趙穿攻靈公於桃園穿趙盾之從父昆弟子宣子未出山而復晉境之山也盾出奔聞公弒而還大史書曰趙盾殺其君以示於朝宣子曰不然對曰子為正卿亡不越境反不討賊非子而誰孔子曰董狐古之良史也書法不隱不隱盾之罪趙宣子古之良大夫也為法受惡善其為法屈也三年楚子伐陸渾之戎遂至于雒觀兵于周疆定王使王孫滿勞楚子王孫滿周大夫楚子問鼎之大小輕重焉示欲逼周取天下也對曰在德不在鼎昔夏之方有德也禹之世也遠方圖物圖畫山川奇異之物而獻之貢金九牧使九州之牧貢金鑄鼎象物象所圖物使民知神姦圖鬼神百物之形使民逆傋之故民入川澤山林魑魅罔兩魑山神魅怪物罔兩水神也莫能逢之逢遇用能協于上下以承天休民無災害則上下和而受天祐桀有昏德鼎遷于商商紂暴虐鼎遷于周德之休明雖小重不可遷其姦回昏亂雖大輕也言可移天祚明德有所底止底致周德雖衰天命未改鼎之輕重未可問也四年楚子滅若敖氏其孫針尹克黃針尹官名克黃子文孫也使于齊還及宋聞亂其人曰不可以入矣針尹曰棄君之命獨誰受之君天也天可逃乎遂歸復命自拘於司敗王思子文之治楚國也曰子文無後何以勸善使復其所十一年楚子伐陳十年夏徵舒弒君也謂陳人無動將討於少西氏矣少西徵舒之祖子夏之名遂入陳殺夏徵舒因縣陳滅陳以為楚縣申叔時使於齊反復命而退王使讓之曰夏徵舒為不道弒其君寡人以諸侯討而戮之諸侯縣公皆慶寡人楚縣大夫皆僭稱公汝獨不慶寡人何故對曰夏徵舒弒其君其罪大矣討而戮之君之義也抑人亦有言曰牽牛以蹊人之田抑辭也蹊徑也而奪之牛牽牛以蹊者信有罪矣而奪之牛罰已重矣諸侯之從也曰討有罪也今縣陳貪其富也以討召諸侯而以貪歸之無乃不可乎王曰善哉吾未之聞也反之可乎對曰可哉吾儕小人所謂取諸其懷而與之也叔時謙言小人意淺謂譬如取人物於其懷而還之為愈於不還也乃復封陳十二年晉師救鄭及河聞鄭既及楚平桓子欲還桓子林父隨武子曰善武子士會也會聞用師觀舋而動舋罪也德刑政事典禮不易不可敵也楚君討鄭怒其二而哀其卑叛而伐之服而舍之德刑成矣伐叛刑也柔服德也二者立矣昔歲入陳討徵舒今茲入鄭民不罷勞君無怨讟讟謗也政有經矣經常也商農工賈不敗其業而卒乘輯睦步曰卒車曰乘事不姦矣姦犯也蒍敖為宰擇楚國之令典宰令尹蒍敖孫叔敖百官象物而動軍政不戒而備物猶類也戒敕令也能用典矣其君之舉也內姓選於親外姓選於舊言親疏並用也舉不失德賞不失勞君子小人物有服章尊卑別也貴有常尊賤有等威威儀有等差也禮不逆矣德立刑行政成事時典從禮順若之何敵之見可而進知難而退軍之善政也兼弱攻昧武之善經也昧昏亂也經法子姑整軍而經武乎姑且猶有弱而昧者何必楚彘子曰不可彘子先縠成師以出聞敵強而退非夫也非丈夫師遂濟楚子北師次於管熒陽有管城鄭皇戌使如晉師曰楚師驟勝而驕其師老矣子擊之楚師必敗欒武子曰武子欒書楚自克庸以來在文十六年其君無日不討國人而訓之討治也于民生之不易禍至之無日戒懼之不可怠于曰也在軍無日不討軍實而申警之軍實軍器于勝之不可保紂之百克而卒無後針之曰民生在勤勤則不匱不可謂驕針誡也先大夫子犯有言曰師直為壯曲為老我不德而徼怨于楚我曲楚直不可謂老不德謂以力爭諸侯也徼要也鄭不可從楚人遂疾進師乘晉軍桓子不知所為鼓於軍中曰先濟者有賞中軍下軍爭舟舟中之指可掬潘黨曰君盍築武軍築軍營以彰武功也而收晉尸以為京觀積尸封土其上謂之京觀臣聞克敵必示子孫以無忘武功楚子曰非爾所知也夫文止戈為武文字也武王克商作頌曰載戢干戈載櫜弓矢戢藏也櫜韜也詩美武王能滅暴亂而息兵也夫武禁暴戢兵保大定功安民和衆豐財者也此武七德也故使子孫無忘其章著之篇章使子孫不忘也今我使二國曝骨暴矣觀兵以威諸侯兵不戢矣暴而不戢安能保大猶有晉在焉得定功所違民欲猶多民何安焉無德而強爭諸侯何以和衆利人之幾幾危也而安人之亂以為已榮何以豐財兵動則年荒武有七德我無一焉何以示子孫其為先君宮告成事而已祀先君告戰勝武非吾功也古者明王伐不敬取其鯨鯢而封之以為大戮於是乎有京觀以懲淫慝鯨鯢大魚名也以喻不義之人吞食小國也今罪無所晉罪無所犯而民皆盡忠以死君命又可以為京觀乎晉師歸桓子請死晉侯欲許之士貞子諫曰不可貞子士渥濁城濮之役晉師三日穀在僖二十八年文公猶有憂色左右曰有喜而憂如有憂而喜乎言憂喜失時也公曰得臣猶在憂未歇也歇盡也困獸猶況國相乎及楚殺子玉子玉得臣也公喜而後可知也喜見於顏色也曰莫余毒也已是晉再克而楚再敗也楚是以再世不競成王至穆王也今天或者大警晉也而又殺林父以重楚勝其無乃久不競乎林父之事君也進思盡忠退思補過社稷之衛也若之何殺之夫其敗也如日月之食何損於明晉侯使復其位言晉景所以不失霸也楚子伐蕭申公巫臣曰師人多寒王巡三軍拊而勉之拊撫慰勉之三軍之士皆如挾纊纊也言悅以忘寒十五年楚子伐宋宋人告急于晉晉侯欲救之伯宗曰不可伯宗晉大夫古人有言曰雖鞭之長不及馬腹言非所擊天方授楚未可與爭雖晉之強能違天乎諺曰高下在心度時制宜也川澤納汙受汙濁也山藪藏疾山之有林藪毒害者所居瑾瑜匿瑕匿亦藏也雖美玉之質亦或居藏瑕穢國君含垢天之道也晉侯恥不救宋故伯宗為説小惡不損大德之喻也君其待之待楚衰也乃止使解揚如宋使無降楚曰晉師悉起將至鄭人囚而獻楚楚子厚賂之使反其言不許三乃許之登諸樓車使呼宋人而告之樓車車上望櫓遂致其君命楚子將殺之使與之言曰爾既許不穀而反之何故非我無信汝則棄之速即爾刑對曰臣聞之君能制命為義臣能承命為信義無二信欲為義者不行兩信信無二命欲行信者不受二命君之賂臣不知命也受命以出有死無霣霣廢隊又可賂乎臣之許君以成命也成君命死之成命臣之祿也寡君有信臣已不廢命也下臣獲考考成也死又何求楚子舍之以歸潞子嬰兒之夫人晉景公之姊也酆舒為政而殺之又傷潞子之目酆舒潞相晉侯將伐之諸大夫皆曰不可酆舒有三才絶異也不如待後之人伯宗曰必伐之狄有五罪才雖多何補焉不祀一也耆酒二也棄仲章而奪黎氏之地三也仲章潞賢人黎氏黎侯國虐我伯姬四也傷其君目五也怙其才而不以茂德茲益罪也後之人或者將敬奉德義以事神人而申固其命審政令若之何待之不討有罪曰將待後後有辭而討焉無乃不可乎夫恃才與衆亡之道也商紂由之故滅天反時為災寒暑易節地反物為妖群物失性民反德為亂亂則妖災生盡在狄矣晉侯從之夏晉荀林父敗赤狄于曲梁滅潞晉侯賞桓子狄臣千室千家也亦賞士伯以瓜衍之縣士伯士貞子曰吾獲狄土子之功也微子吾喪伯氏矣伯桓子字也羊舌職悅是賞也職叔向父曰周書所謂庸庸祗祗者謂此物也夫庸用也祗敬也言文王能用可用敬可敬也士伯庸中行伯言中行伯可用君信之亦庸士伯此之謂明德矣文王所以造周不是過也率是道也其何不濟十六年晉侯命士會將中軍且為太傅於是晉國之盜逃奔于秦羊舌職曰吾聞之禹稱善人稱舉也不善人遠此之謂也夫善人在上則國無幸民諺曰民之多幸國之不幸是無善人之謂也成公二年衛侯使孫良夫侵齊與齊師遇師敗仲叔于奚救孫桓子桓子是以免既衛人賞之以邑賞于奚也辭請曲縣軒縣也繁纓以朝許之繁纓馬飾皆諸侯之服也仲尼聞之曰惜也不如多與之邑惟器與名不可以假人器車服也名爵號也君之所司也政之大節也若以假人與人政也政亡則國家從之不可止也已宋文公卒始厚葬用蜃炭益車馬始用徇燒蛤為炭以瘞壙多埋車焉用人從葬也重器備重猶多也君子謂華元樂舉於是乎不臣臣治煩去惑者也是以伏死而爭今二子者君生則縱其惑謂文十八年殺母弟須死則益其侈是棄君於惡也何臣之為若言何用為臣楚之討陳夏氏也在宣十一年莊王欲納夏姬申公巫臣諫曰不可君召諸侯以討罪也今納夏姬貪其色也貪色為淫淫為大罰周書曰明德慎罰若興諸侯以取大罰非慎之也君其圖之王乃止六年晉欒書救鄭與楚師遇於繞角繞角鄭地楚師還晉師遂侵蔡楚公子申公子成以申息之師救蔡趙同趙括欲戰請於武子武子將許之知莊子荀首范文子士燮韓獻子韓厥諫曰不可吾來救鄭楚師去我吾遂至於此此蔡地是遷戮也戮而不已又怒楚師戰必不克遷戮不義怒敵難當故不克也雖克不令成師以出而敗楚二縣何榮之有焉六軍悉出故曰成師以大勝小不足為榮也若不能敗為辱已甚不如還也乃遂還於是軍帥之欲戰者衆或謂欒武子曰聖人與衆同欲是以濟事子盍從衆盍何不子之佐十一人六軍之卿佐也其不欲戰者三人而已知范韓也欲戰者可謂衆矣商書曰三人占從二人衆故也武子曰善鈞從衆鈞等夫善衆之主也三卿為主可謂衆矣三卿皆晉之賢人從之不亦可乎傳善欒書得從衆之義也八年晉侯使韓穿來言汶陽之田歸之于齊季文子餞之餞送行飲酒也私焉私與之言曰大國制義以為盟主是以諸侯懷德畏討無有二心謂汶陽之田敝邑之舊也而用於於齊使歸諸敝邑用師鞍之戰也今有二命曰歸諸齊信以行義義以成命小國所望而懷也信不可知義無所立四方諸侯其誰不解體言不復肅敬於晉也詩曰女也不爽士二其行士也罔極二三其德爽差也極中也婦人怨丈夫不一其行也喻魯事晉猶女之事夫不敢過差而晉有罔極之心反二三其德也七年之中一與一奪二三孰甚焉士之二三猶喪配耦而況霸主乎將德是以以用也而二三之其何以長有諸侯乎晉討趙同趙括武從姬氏畜于公室趙武莊姬之子莊姬晉成公女也畜養也以其田與祁奚韓厥言於晉侯曰成季之勳宣孟之忠成季趙衰宣孟趙盾而無後為善者其懼矣三代之令王皆數百年保天祿夫豈無僻王賴前哲以免也言三代亦有邪僻之君但賴其先人以免禍耳周書曰不敢侮鰥寡所以明德也言文王不侮鰥寡而德益明欲使晉侯之法文王乃立武而反其田焉十六年楚子救鄭司馬將中軍子反也過申子反入見申叔時叔時老在申也曰師其何如對曰德刑詳義禮信戰之器也器猶用也德以施惠刑以正邪詳以事神義以建利禮以順時信以守物上下和睦周旋不逆動順理也是以神降之福時無災害民生敦龐和同以聽敦厚龐大莫不盡力以從上命此戰之所由克也今楚內棄其民不施惠也而外絶其好義不建利瀆齊盟不祥事神而食話言信不守物姦時以動不順時妨農業而疲民以逞刑不正邪而茍快意民不知信進退罪也子其勉之吾不復見子矣言其必敗不反也晉楚遇於鄢陵范文子不欲戰卻至曰韓之戰惠公不振旅衆散敗也在僖十五年邲之師荀伯不復從荀林父奔走不復故道也在宣十二年皆晉之恥也子亦見先君之事矣見先君成敗之事今我避楚又益恥也文子曰吾先君之亟戰也有故亟數也秦狄齊楚皆強不盡力子孫將弱今三強服矣齊秦狄也敵楚而已唯聖人能外內無患自非聖人外寧必有內憂驕亢則憂患生盍釋楚以為外懼乎襄公三年祁奚請老老致仕晉侯問嗣焉嗣續其職者稱解狐其讎也將立之而卒解狐卒也又問焉對曰午也可午祁奚子於是羊舌職死矣晉侯曰孰可以代之對曰赤也可赤職之子伯華於是使祁午為中軍尉羊舌赤佐之各代其父君子謂祁奚於是能舉善矣稱其讎不為諂立其子不為比舉其偏不為黨偏屬也能舉善也夫唯善故能舉其類也晉侯之弟揚干亂行於曲梁行陳次也魏絳戮其僕僕御晉侯怒謂羊舌赤曰合諸侯以為榮也揚干為戮何辱如之必殺魏絳無失之也對曰絳無二志事君不避難有罪不逃刑其將來辭何辱命焉言終魏絳至授僕人書僕人晉侯御僕將伏劍士魴張老止之公讀其書曰日君乏使使臣斯司馬斯此也臣聞師衆以順為武順莫敢違軍事有死無犯為敬守官行法雖死不敢有違君合諸侯臣敢不敬乎君師不武執事不敬罪莫大焉臣懼其死以及揚干無所逃罪懼自犯不武不敬之罪也不能致訓至於用鉞用鉞斬揚干之僕也臣之罪重敢有不從以怒君心言不敢不從戮請歸死於司寇公跣而出曰寡人之言親愛也吾子之討軍禮也寡人有弟弗能教訓使干大命寡人之過也子無重寡人之過聽絳死為重過敢以為請請使無死反役使佐新軍四年無終子嘉父使孟樂如晉無終山戎國名也因魏莊子納虎豹之皮以請和諸戎欲戎與晉和莊子魏絳晉侯曰戎狄無親而貪不如伐之魏絳曰諸侯新服陳新來和將觀於我我德則睦否則攜二勞師於戎而楚伐陳必不能救是棄陳也諸華必叛諸華中國戎禽獸也獲戎失華無乃不可乎昔周辛甲之為太史也命百官官針王闕辛甲周武王太史也闕過也使百官各為針辭戒王過也於虞人之針虞人掌田獵者曰茫茫禹畫為九州茫茫遠貌畫分也經啓九道啓開九州之道民有寢廟獸有茂草各有攸處德用不擾人神各有所歸故德不亂也在帝夷羿冒于原獸冒貪也忘其國恤而思其麀牡言但念獵武不可重重猶數用不恢于夏家羿以好武雖有夏家而不能恢大之也獸臣司原敢告僕夫獸臣虞人也告僕夫不敢斥尊也虞針如是可不懲乎於是晉侯好田故魏絳及之及后羿事也公曰然則莫如和戎乎對曰和戎有五利焉戎狄荐居貴貨易土荐聚也易猶輕也土可賈焉一也邊鄙不聳民狎其野穡人成功二也聳懼也狎習也戎狄事晉四鄰振動諸侯威懷三也以德綏戎師徒不勤甲兵不頓四也頓壞也鑒于后羿而用德度以后羿為鑒戒遠至邇安五也君其圖之公悅使魏絳盟諸戎修民事田以時言晉侯能用善謀也九年秦景公使乞師于楚將以伐晉楚子許之子囊曰不可當今吾不能與晉爭也晉君類能而使之隨所能也舉不失選得所選也官不易方方猶宜也其卿讓於善讓勝已者其大夫不失守各任其職也其士競於教奉上命也其庶人力於農穡種曰農收曰穡商工皂隸不知遷業四民不雜也君明臣忠上讓下競尊官相讓勞職力競當是時也晉不可敵事之而後可君其圖之冬諸侯伐鄭鄭從楚也鄭人行成與晉成也十一年諸侯復伐鄭鄭人賂晉侯以師觸師蠲觸蠲皆樂師名歌鍾二肆肆列也懸鍾十六為一肆女樂二八十六人也晉侯以樂之半賜魏絳曰子教寡人和諸戎狄以正諸華在四年八年之中九合諸侯如樂之和無所不諧諧亦和也請與子樂之共此樂也辭曰夫和戎狄國之福也八年之中九合諸侯諸侯無慝君之靈也二三子之勞也臣何力之有焉抑臣願君安其樂而思其終也公曰子之教敢不承命抑微子寡人無以待戎待遇接納不能濟河度河南服鄭夫賞國之典也不可廢也子其受之魏絳於是乎始有金石之樂禮也禮大夫有功則賜樂十三年晉侯搜于綿上以治兵為將命軍帥也使士將中軍辭曰伯遊長伯遊荀偃昔臣習於知伯是以佐之非能賢也七年韓厥老知罃代將中軍士佐之今將讓故謂爾時之舉不以己賢也請從伯遊荀偃將中軍代荀罃士佐之位如故使韓起將上軍辭以趙武又使欒黶以武位卑故不聽更命黶也辭曰臣不如韓起韓起願上趙武君其聽之使趙武將上軍武自新軍超四等韓起佐之位如故也欒黶將下軍魏絳佐之黶亦如故絳自新軍佐超一等晉國之民是以大和諸侯遂睦君子曰讓禮之主也范宣子讓其下皆讓欒黶為汰弗敢違也晉國以平數世賴之刑善也夫刑法也一人刑善百姓休和可不務乎世之治也君子尚能而讓其下能者在下位則貴尚而讓之小人農力以事其上是以上下有禮而讒慝黜遠由不爭也謂之懿德及其亂也君子稱其功以加小人加陵也君子在位者也小人伐其技以馮君子馮亦陵也自稱其能為伐是以上下無禮亂虐並生由爭善也爭自善也謂之昏德國家之弊恆必由之傳言晉之所以興也十四年衛獻公戒孫文子寧惠子食敕戒二子欲共宴食日旰不召旰晏也而射鴻於囿二子怒公使子蟜子伯子皮與孫子盟于丘宮孫子皆殺之三子衛群公子也公出奔齊師曠侍於晉侯師曠子野晉侯曰衛人出其君不亦甚乎對曰或者其君實甚良君養民如子蓋之如天容之如地民奉其君愛之如父母仰之如日月敬之如神明畏之如雷霆其可出乎夫君神之主而民之望也若困民之主匱神之祀百姓絶望社稷無主將安用之弗去何為天生民而立之君使司牧之勿使失性有君而為之二二卿佐使師保之勿使過度善則賞之賞謂宣揚之也過則匡之匡正患則救之救其難也失則革之自王以下各有父兄子弟以補察其政補其愆過察其得失史為書謂大史君舉必書瞽為詩為詩以風刺工誦針諫工樂人也誦針諫之辭大夫規誨規正諫誨其君士傳言聞君過失傳告大夫庶人謗庶人不與政聞君過得從而誹謗商旅于市旅陳也陳其貨物以示時所貴尚也百工獻藝獻其伎藝以喻政事也天之愛民甚矣豈其使一人肆於民上肆放也以從其淫而棄天地之性必不然矣傳言師曠能因問盡言也十五年宋人或得玉獻諸子罕子罕不受獻玉者曰以示玉人玉人能治玉者玉人以為寶也故敢獻之子罕曰我以不貪為寶爾以玉為寶若以與我皆喪寶也不若人有其寶稽首而告曰小人懷璧不可以越鄉言必為盜所害納此以請死請免死子罕置諸其里使玉人為之攻之攻治也富而後使復其所賣玉得富二十一年邾庶其以漆閭丘來奔庶其邾大夫也季武子以公姑姊妻之皆有賜於其從者於是魯多盜季孫謂臧武仲曰子盍詰盜詰治也武仲曰不可詰也紇又不能季孫曰子為司寇將盜是務去若之何不能武仲曰子召外盜而大禮焉何以止吾盜吾謂國中也子為正卿而來外盜使紇去將何以能庶其竊邑於邾以來子以姬氏妻之而與之邑使食漆閭丘也其從者皆有賜焉若大盜禮焉以君之姑姊與其大邑其次皂牧輿馬給其賤役從皂至牧其小者衣裳劍帶是賞盜也賞而去之其或難焉紇也聞之在上位者酒濯其心一以待人軌度其信可明徵也徵驗也而後可以治人夫上之所為民之歸也上所不為而民或為之是以加刑罰焉而莫敢不懲若上之所為而民亦為之乃其所也又可禁乎晉欒盈出奔楚宣子殺羊舌虎欒盈之黨囚叔向樂王鮒見叔向曰吾為子請叔向不應樂王鮒晉大夫樂桓子其人皆咎叔向曰必祁大夫祁大夫祁奚室老聞之曰樂王鮒言於君無不行求救吾子吾子不許祁大夫所不能也何為也叔向曰祁大夫外舉不棄讎內舉不失親其獨遺我乎詩曰有覺德行四國順之言德行直則天下順也夫子覺者也覺較然正直晉侯問叔向之罪於樂王鮒對曰不棄其親其有焉言叔向篤親親必與叔虎同謀於是祁奚老矣老去公族大夫聞之乘馹而見宣子曰詩云惠我無疆子孫保之言文武有惠訓之德加於百姓故子孫保賴之夫謀而鮮過惠訓不倦者叔向有焉社稷之固也猶將十世宥之以勸能者今一不免其身一以弟故以棄社稷不亦惑乎鯀殛而禹興言不以父罪廢其子也管蔡為戮周公右王言兄弟罪不相及也若之何其以虎也棄社稷乎子為善誰敢不勉多殺何為宣子悅與之乘以言諸公而免之共載入見公也不見叔向而歸言為國非私叔向也叔向亦不告免焉而朝不告謝之明不為己二十三年孟孫惡臧孫季孫愛之孟孫卒臧孫入哭甚哀多涕出其御曰孟孫之惡子也而哀如是季孫若死其若之何臧孫曰季孫之愛我疾疢也志相順從身之害孟孫之惡我藥石也志相違戾猶藥石療疾美疢不如惡石夫石猶生我愈己疾也疢之美其毒滋多孟孫死吾亡無日矣二十五年齊棠公之妻東郭偃之姊也棠公齊棠邑大夫棠公死武子取之武子崔杼莊公通焉驟如崔氏崔杼殺莊公晏子立於崔氏之門外聞難而來其人曰死乎曰獨吾君也乎哉吾死也言已與衆臣無異也曰行乎曰吾罪也乎哉吾亡也自謂無罪曰歸乎曰君死安歸言安可以歸也君民者豈以陵人社稷是主臣君者豈為其口實社稷是養言君不徒居民上臣不徒求祿皆為社稷也故君為社稷死則死之為社稷亡則亡之謂以公義死亡也若為己死而為己亡非其私昵誰敢任之私昵所親愛也非所親愛無為當其禍門啓而入枕尸股而哭以公尸枕己股興三踴而出晉程鄭卒子産始知然明前年然明謂程鄭將死今如其言故知之問為政對曰視民如子見不仁者誅之如鷹鸇之逐鳥雀也子産喜以語子大叔且曰他日吾見蔑之面而已蔑然明名今吾見其心矣二十六年初楚伍參與蔡太師子朝友其子伍舉與聲子相善聲子子朝子也伍舉椒舉也伍舉奔晉聲子通使於晉還如楚令尹子木與之語曰晉大夫與楚孰賢對曰晉卿不如楚其大夫則賢皆卿才也如梓皮革自楚往也梓皆木名也雖楚有材晉實用之言楚亡臣多在晉子木曰夫獨無族姻乎夫謂晉也對曰雖有而用楚材實多歸生聞之歸生聲子名也曰善為國者賞不僭而刑不濫賞僭則懼及淫人刑濫則懼及善人若不幸而過寧僭無濫與其失善寧其利淫無善人則國從之從亡也詩曰人之云亡邦國殄瘁無善人之謂也故夏書曰與其殺不辜寧失不經懼失善也逸書也不經不用常法古之治民者勸賞而畏刑樂行賞而憚用刑也恤民不倦賞以春夏刑以秋冬順天時是以將賞為之加膳加膳則飫賜飫厭也酒食賜下無不饜足所謂加膳也此以知其勸賞也將刑為之不舉不舉則徹樂不舉盛饌也此以知其畏刑也夙興夜寐朝夕臨政此以知其恤民也三者禮之大節也有禮無敗今楚多淫刑其大夫逃死於四方而為之謀主以害楚國不可救療所謂不能也療治也所謂楚人不能用其材也子儀之亂析公奔晉在文十四年晉人以為謀主繞角之役楚師宵潰楚失華夏則析公之為也雍子之父兄譖雍子君與夫人不善是也不是其曲直雍子奔晉晉人以為謀主彭城之役楚師宵潰晉降彭城而歸諸宋在元年楚失東夷則雍子之為也楚東小國見楚不能救彭城皆叛也子反與子靈爭夏姬子靈巫臣子靈奔晉晉人以為謀主通吳于晉教吳叛楚楚疲於奔命至今為患則子靈之為也事見成七年若敖之亂伯賁之子賁皇奔晉晉人以為謀主鄢陵之役在成十六年楚師大敗王夷師熸夷傷也吳楚之間謂火滅為熸鄭叛吳興楚失諸侯則苗賁皇之為也子木曰是皆然矣聲子曰今又有甚於此者椒舉娶於申公子牟子牟得戾而亡君大夫謂椒舉汝實遣之懼而奔鄭今在晉矣晉人將與之縣以比叔向以舉才能比叔向彼若謀害楚國豈不為患子木懼言諸王益其祿爵而復之二十七年宋向戌欲弭諸侯之兵為會於宋將盟於宋西門之外楚人衷甲甲在衣中欲因會擊晉伯州曰合諸侯之師以為不信無乃不可乎夫諸侯望信於楚也是以來服若不信是棄其所以服諸侯也固請釋甲子木曰晉楚無信久矣事利而已茍得志焉焉用有信大宰退大宰伯州告人曰令尹將死矣不及三年求逞志而棄信志其逞乎信亡何以及三明年子木死也趙孟患楚衷甲以告叔向叔向曰何害也匹夫一為不信猶不可也若合諸卿以為不信必不捷矣非子之患也夫以信召人而以僭濟之濟成必莫之與也安能害我子何懼焉宋左師請賞曰請免死之邑欲宋君稱功加厚賞故謙言免死之邑公與之邑六十以示子罕子罕曰凡諸侯小國晉楚所以兵威之畏而後上下慈和慈和而後能安靜其國家以事大國所以存也無威則驕驕則亂生亂生必滅所以亡也天生五材金木水火土也民並用之廢一不可誰能去兵兵之設久矣所以威不軌而昭文德聖人以興謂湯武亂人以廢謂桀紂廢興存亡昏明之術皆兵之由也而子求去之不亦誣乎以誣道蔽諸侯罪莫大焉縱無大討而又求賞無厭之甚也削而投之削賞左師之書左師辭邑二十九年吳公子札來聘見叔孫穆子曰子其不得死乎不得以壽死也好善而不能擇人吾子為魯宗卿而任其大政不慎舉何以堪之禍必及子焉昭四年豎牛作亂三十年楚公子圍殺大司馬蒍掩而取其室申無宇曰王子必不免善人國之主也王子相楚國將善是封殖而虐之是禍國也且司馬令尹之偏偏佐也而王之四體也絶民之主去身之偏刈王之體以禍其國無不祥大焉何以得免為昭十三年弒靈王傳鄭子皮授子産政子産使都鄙有章國都及邊鄙車服尊卑各有分部也上下有服公卿大夫服不相踰田有封洫封疆也洫溝也廬井有伍廬舍也九夫為井使五家相保也大人之忠儉者謂卿大夫從而與之泰侈者因而斃之從政一年輿人誦之曰取我衣冠而褚之褚畜也奢侈者畏法故畜藏也取我田疇而伍之孰殺子産吾其與之並畔為疇及三年又誦之曰我有子弟子産誨之我有田疇子産殖之殖生也子産而死誰其嗣之嗣續也三十一年鄭人遊于鄉校校學之名也以論執政論其得失然明謂子産曰毀鄉校如何患人於中謗議國政子産曰何為夫人朝夕退而遊焉以議執政之善否其所善者吾則行之其所惡者吾則改之是吾師也若之何毀之我聞忠善以損怨為忠善則怨謗息也不聞作威以防怨欲毀鄉校即作威也豈不遽止然猶防川也遽畏懼也大決所犯傷人必多吾不克救也不如小決使道道通不如吾聞而藥之以為己藥石然明曰蔑也今而後知吾子之信可事小人實不才若果行此其鄭國實賴之豈唯二三臣仲尼聞是語也曰以是觀之人謂子産不仁吾不信也鄭子皮欲使尹何為邑為邑大夫子産曰少未知可否尹何年少子皮曰願吾愛之不吾叛也願謹善也使夫往而學焉夫亦愈知治矣夫謂尹何子産曰不可人之愛人求利之也今吾子愛人則以政以政與之猶未能操刀而使割也其傷實多多自傷子之愛人傷之而已其誰敢求愛於子子於鄭國棟也棟折榱崩僑將厭焉敢不盡言子有美錦不使人學製製裁大官大邑身之所庇也而使學者製焉其為美錦不亦多乎言官邑之重多於美錦僑聞學而後入政未聞以政學者也若果行此必有所害譬如田獵射御貫則能獲禽貫習也若未嘗登車射御則敗績厭覆是懼何暇思獲子皮曰善哉虎不敏吾聞君子務知大者遠者小人務知小者近者我小人也衣服附在吾身我知而慎之大官大邑所以庇身也吾遠而慢之慢易微子之言吾不知也他日我曰子為鄭國我為吾家以庇焉其可也今而後知不足自知謀慮不足謀其家自今請雖吾家聽子而行子産曰人心不同也如其面焉吾豈敢謂子面如吾面乎抑心所謂危亦以告也子皮以為忠故委政焉子産是以能為鄭國傳言子産之治乃子皮之力衛侯在楚北宮文子見令尹圍之威儀言於衛侯曰令尹似君矣將有他志言語瞻視行步不常雖獲其志不能終也詩云靡不有初鮮克有終終之實難令尹其將不免乎公曰何以知之對曰詩云敬慎威儀惟民之則令尹無威儀民無則焉民所不則以在民上不可以終公曰善哉何謂威儀對曰有威而可畏謂之威有儀而可象謂之儀君有君之威儀其臣畏而愛之則而象之故能有其國家令聞長世臣有臣之威儀其下畏而愛之故能守其官職保族宜家順是以下皆如是是以上下能相固也衛詩曰威儀棣棣不可選也棣棣富而間也選猶數也言君臣上下父子兄弟內外大小皆有威儀也周書數文王之德逸書曰大國畏其力小國懷其德言畏而愛之也詩云不識不知順帝之則言則而象之言文王行事無所斟酌唯在則象上天紂囚文王七年諸侯皆從之囚可謂愛之矣文王伐崇再駕而降為臣文王聞崇德亂而伐之三旬不降退修教而復伐之因壘而降蠻夷帥服可謂畏之矣文王之功天下誦而歌舞之可謂則之矣文王之行至今為法可謂象之有威儀也故君子在位可畏施舍可愛進退可度周旋可則容止可觀作事可法德行可象聲氣可樂動作有文言語有章以臨其下謂之有威儀也
