body:
  text: 鹽鐵論鹽鐵論行遠道者假於車濟江海者因於舟故賢士之立功成名因於資而假物者也公輸子能因人主之材木以搆宮室臺榭而不能自為專屋狹廬材不足也歐冶能因君之銅鐵以為金爐大鐘而不能自為壼鼎槃杅無其用也君子能因人主之政朝以和百姓潤衆庶而不能自饒其家勢不便也故舜耕於歷山恩不及州里太公屠牛於朝歌利不及妻子及其見用恩流八荒德溢四海故舜假之堯太公因之周君子能修身以假道者不能枉道而假財也扁鵲不能治不受針藥之疾聖賢不能正不食善言之君故桀有關龍逢而夏亡紂有三仁而商滅故不患無夷吾由余之論患無桓穆之聽耳是以孔子東西無所遇屈原放逐於楚國也故曰直道而事人焉往而不三黜枉道而事人何必去父母之邦此所以言而不見從行不得合者也古者篤教以導民明辟以正刑刑之於治猶策之於御也良工不能無策而御有策而勿用也聖人假法以成教教成而刑不施故威厲而不殺刑設而不犯今廢其紀綱而不能張壞其禮義而不能防民陷於罪從而獵之以刑是猶開其闌牢發以毒矢也不盡不止矣曾子曰上失其道民散久矣如得其情則哀矜而勿喜夫不傷民之不治而伐己之能得姦猶弋者鳥獸挂罻羅而喜也今天下之被誅者不必有管蔡之邪鄧之偽也孔子曰人而不仁疾之以甚亂也故民亂反之政政亂反之身身正而天下定是以君子嘉善而矜不能恩及刑人德潤窮夫施惠悅爾行刑不樂也周公之相成王也百姓饒樂國無窮人非代之耕織也易其田疇薄其稅斂則民富矣上以奉君親下無飢寒之憂則教可成也語曰既富矣又何加焉曰教之教之以德齊之以禮則民徙義而從善莫不入孝出悌夫何奢侈暴慢之有乎管子曰倉廩實而知禮節衣食足而知榮辱故富民易與適禮古者政得則陰陽調星辰理風雨時故行修於內聲聞于外為之於下福應于天周公在上而天下太平國無夭傷歲無荒年當此時雨不破塊風不鳴條旬而一雨必以夜無丘陵高下皆孰今不省其所以然而曰陰陽之運也非所聞也孟子曰野有死殍不知收也狗豕食人食不知斂也為民父母見飢而死則曰非我歲也何異乎以刃殺之則曰非我兵也方今之務在除飢寒之患罷鹽鐵退權利分土地趣本業養桑麻盡地力也寡功節用則民自富如是則水旱不能憂凶年不能纍也王者崇禮施德尚仁義而賤怪力故聖人絶而不言孔子曰言忠信行篤敬雖之蠻貊不可棄也今萬方絶國之君奉贄獻見者懷天子之威德而欲觀中國之禮宜設明堂辟雍以示之揚干戚昭雅頌以風之今乃以玩好不用之器奇蟲不畜之獸角抵之戲炫耀之物陳夸之殆與周公之待遠方殊也昔周公處謙讓以交卑士執禮德以下天下故辭越裳之贄見恭敬之禮也既與入文王之廟是見大孝之禮也目威儀干戚之容耳聽升歌雅頌之聲心充至德欣然以歸此四夷所以慕義內附非重譯狄鞮來觀猛獸熊羆也夫犀象兕虎南夷之所多也驢騾馲駝北狄之常畜也中國所鮮外國賤之南越以孔雀珥門戶昆山之旁以玉璞抵鳥鵲今貴人之所賤珍人之所饒非所以厚中國而明盛德也隋和世之名寶也而不能安危存亡故喻德示威唯賢臣良相不在戎馬珍怪也是以聖王以賢為寶不以珠玉為寶昔晏子修之樽俎之間而折衝乎千里不能者雖隋和滿篋無益於存亡矣衛靈公當隆冬興衆穿池海春以諫曰天寒百姓凍餧願公之罷役也公曰天寒乎哉寒乎哉海春曰人之言曰安者不能恤危飽者不能食飢故餘粱肉者難為言隱約處逸樂者難為言勤苦夫高堂邃宇廣廈洞房者不知專屋狹廬上漏下溼者之痛也繫馬百駟貨財充內儲陳納新者不知有旦無暮稱貸者之急也乘堅驅良列騎成行者不知負擔步行者之勞也匡床薦席侍御滿側者不知服輅挽船登高絶流者之難也衣輕暖處溫室載安車者不知乘長城眺故代向清風者危寒也妻子好合子孫保之者不知老母之憔悴匹婦之悲恨也耳聽五音目視弄優者不知蒙流矢推敵方外之死亡也東向仗几振筆而調文者不知木索之急箠楚之痛也昔商鞅之任秦也刑人若刈菅茅用師若彈丸從軍旅者暴骨長城戍漕者輜車相望生而往死而還彼獨非人子耶故君子仁以恕義以度所好惡與天下共之地廣而不德者國危兵強而陵敵者身亡虎兕相搏而螻蟻得志兩敵相機而匹夫乘間是以聖王見利慮害見遠存近道徑衆民不知所由也法令衆人不知所避也故王者之制法也昭乎如日月故民不迷曠乎若大路故民不惑幽隱遠方折乎知之愚婦童婦咸知所避是故法令不犯而獄犴不用也昔秦法繁於秋荼而網密於凝脂然而上下相遁姦偽萌生有司治之若救爛捌焦不能禁非網疏而罪漏禮義廢而刑罰任也方今律令百有餘篇文章繁罪名重群國用之疑惑或淺或深自吏明習者不知所處而況愚民乎律令塵蠹於棧閣吏不能而況愚民乎此斷獄所以滋衆而民犯禁滋多也親服之屬甚衆上附下附而服不過五五刑之屬三千上殺下殺而罪不過五故治民之道務篤於教也法能刑人而不能使人廉能殺人而不能使人仁所貴良醫者貴其審消息而退邪氣也非貴其下針石而鑽肌膚也所貴良吏者貴其絶惡於未萌使之不為非非貴其拘之囹圄而刑殺之也今之所謂良吏者文察則以禍其民強力則以厲其下不本法之所由生而專己之殘心文誅假法以陷不辜纍無罪以子及父以弟及兄一人有罪州里驚駭十家奔亡若癰疽之相漫色淫之相連一節動而百枝搖詩云舍彼有罪既伏其辜若此無罪淪胥以鋪傷無罪而纍也非患銚鉏之不利患其舍草而藝苗也非患無準平患其舍枉而繩直也故親近為過不必誅是鉏不用也疏遠有功不必賞是苗不養也故世不患無法而患無必行之法也古者周其禮而明其教禮周教明不從者然後等之以刑刑罰中民不怨矣故舜施四罪而天下咸服誅不仁也輕重各伏其誅刑必加而無赦赦維疑者若此則世安得不軌之人而罪之乎今廢其德教而責之禮義是虐民也春秋傳曰子有罪執其父臣有罪執其君聽失之大者也今以子誅父以弟誅兄親戚相坐什伍相連若引根本而及華葉傷小指而纍四體也如此則以有罪反誅無罪反誅無罪則天下之無罪者寡矣故吏不以多斷為良醫不以多刺為工子産殺一人刑二人道不拾遺而民無誣心故為民父母似養疾子長恩厚而己自首匿相坐之法立骨肉之恩廢而刑罪多矣聞父母之於子雖有罪猶匿之其不欲服罪爾子為父隱父為子隱未聞父子之相坐也聞兄弟能緩追以免賊未聞兄弟之相坐也聞惡惡止其人疾始而誅首惡未聞什伍而相坐也紂為炮烙之刑而秦有收孥之法趙高以峻文決罪於內百官以峭法斷割於外死者相枕席刑者相望百姓側目重足不寒而栗方此之時豈特冒火蹈刃哉然父子相背兄弟相嫚至於骨肉相踐上下相殺非刑輕而罰不必令太嚴而仁恩不施也故政寬則下親其上政嚴則臣謀其主晉厲以幽二世以弒惡在峻法之不犯嚴家之無挌虜也聖人知之是以務和而不務威故高皇帝約秦苛法以慰怨毒之人而長和睦之心唯恐刑之重而德之薄也是以恩施無窮澤流後世商鞅吳起以秦楚之法為輕而纍之上危其主下沒其身或非特慈母乎民之仰法猶魚之仰水水清則靜濁則擾擾則不安其居靜則樂其業樂其業則富富則仁生贍則爭止是以成康之世賞無所施法無所加非可刑而不刑民莫犯禁也非可賞而不賞民莫不仁也若斯則吏何事而可理乎今之治民者若拙御之御馬也行則頓之止則擊之身創於箠吻傷於銜而求其無失何可得也故疲馬不畏鞭箠疲民不畏刑法雖增而纍之其有益乎古者明其仁義之誓使民不踰不教而殺是虐民也與其刑不可踰不若義之不可踰也聞禮義行而刑罰中未聞刑罰任而孝悌興也高牆狹基不可立也嚴刑峻法不可久也二世信趙高之計深督責而任誅斷刑者半道死者日積殺人多者為忠斂民悉者為能百姓不勝其求黔首不勝其刑海內同憂而俱不聊生故過任之事父不得於子無己之求君不得於臣知死不再窮鼠齧狸匹夫奔萬乘舍人折弓陳勝吳廣是也聞不一而社稷為虛惡在其能長制群下而久守其國也新序楚恭王有疾召令尹曰常侍管蘇與我處常勸我以義吾與處不安也不見不思也雖然吾有得也其功不細必厚爵之申侯伯與我處常縱恣吾吾所樂者勸吾為之吾所好者先吾服之吾與處歡樂之不見則戚雖然吾終無得也其過不細必亟遣之令尹曰諾明日王薨令尹即拜管蘇為上卿而逐申侯伯出之境曾子曰人之將死其言也善恭王之謂也孔子曰朝聞道夕死可矣於是以開後嗣覺來世猶愈沒身不寤者也趙簡子上羊腸之群臣皆偏袒推車而虎會獨擔戟行歌不推車簡子曰群臣皆推車會獨擔戟行歌是會為人臣侮其主為人臣侮其主者其罪何若對曰為人臣而侮其主者死而又死簡子曰何為死而又死會曰身死妻子為徒若是謂死而又死也君既已聞為人臣而侮其主者之罪矣君亦聞為人君而侮其臣者乎簡子曰何若會曰為人君而侮其臣者智者不為謀辨者不為使勇者不為智者不為謀則社稷危辨者不為使則使不通勇者不為則邊境侵簡子曰善乃以會為上客魏文侯與大夫坐問曰寡人何如君也群臣皆曰君仁君也次至翟黃曰君非仁君也曰子何以言之對曰君伐中山不以封君之弟而以封君之長子臣以此知君之非仁君也文侯怒而出之次至任座文侯問曰寡人何如君也任座對曰君仁君也曰子何以言之對曰臣聞之其君仁者其臣直向翟黃之言直臣是以知君仁君也文侯曰善復召翟黃中行寅將亡乃召其大祝而欲加罪焉曰子為我祝犧牲不肥澤耶且齋戒不敬耶使國亡何也祝簡對曰昔者吾先君中行穆子皮車十乘不憂其薄也憂德義之不足也今主君有革車百乘不憂德義之薄唯患車之不足也夫船車飾則賦斂厚賦斂厚則民怨謗詛矣且君茍以為祝有益於國乎則詛亦將為損世亡矣一人祝之一國詛之一祝不勝萬詛國亡不亦宜乎祝其何罪中行子乃慚秦欲伐楚使使者往觀楚之寶器楚王聞之召令尹子西而問焉曰秦欲觀楚之寶器吾和氏之璧隨侯之珠可以示諸令尹子西對曰不知也召昭奚恤而問焉昭奚恤曰此欲觀吾國得失而圖之寶器在賢臣珠玉玩好之物非寶之重者也王遂使昭奚恤應之昭奚恤為東面之壇一為南面之壇四為西面之壇一秦使者至昭奚恤曰君客也請就上位東面令尹子西南面太宗子敖次之葉公子高次之司馬子反次之昭奚恤自居西面之壇稱曰客欲觀楚之寶器楚國之寶者賢臣也理百姓實倉廩使民各得其所令尹子西在此奉圭璧使諸侯解忿悁之難交兩國之歡使無兵革之憂太宗子敖在此守封疆謹境界不侵鄰國鄰國亦不見侵葉公子高在此理師旅整兵戎以當強敵提枹鼓以動百萬之衆所使皆趣湯火蹈白刃出萬死不願一生司馬子反在此懷霸王之餘議撮治亂之遺風昭奚恤在此唯大國之所觀秦使者瞿然無以對使者反言於秦君曰楚多賢臣未可謀也遂不伐楚昔者唐虞崇舉九賢布之於位而海內大康要荒來賓麟鳳在郊商湯用伊尹而文武用太公閎夭成王任周邵而海內大治越裳重譯祥瑞並降遂安千載皆由任賢之功也無賢臣雖五帝三王不能以興齊桓得管仲有霸諸侯之榮失管仲而有亂危之辱虞不用百里奚而亡秦穆用之而霸楚不用子胥而破吳王闔廬用之而霸夫差非徒不用子胥也又殺之而卒以亡燕昭王用樂毅推弱燕之兵破強齊之讎屠七十城而惠王廢樂毅變代以騎劫兵立破亡七十城此父用之子不用其事可見也故闔廬用子胥而興夫差殺之而以亡昭王用樂毅以勝惠王逐之而以敗此的的然若白黑也秦不用叔孫通項王不用陳平韓信而皆滅漢用之而大興此未遠也夫失賢者其禍如彼用賢者其福如此人君莫不求賢以自輔然而國以亂亡者所以賢者不賢也或使賢者為之與不肖者議之使智者圖之與愚者謀之不肖嫉賢愚者妒智是賢者之所以隔蔽也所以千歲不合者也或不肯用賢或用賢而不能久也或久而不能終也或不肖子廢賢父之忠臣其禍敗難一二録也然其要在於已不明而聽衆口也故譖訴不行斯為明矣魏龐共與太子質於邯鄲謂魏王曰今一人言市中有虎王信之乎王曰不信也曰二人言王信之乎曰寡人疑矣曰三人言王信之乎曰寡人信之矣龐共曰夫市之無虎明矣三人言而成有虎今邯鄲去魏遠於市議臣者過三人願王察之也魏王曰寡人知之矣及龐共自邯鄲反讒口果至矣遂不得見昔者鄒忌以鼓琴見齊宣王宣王善之與語三日遂拜以為相有稷下先生淳于髡之屬七十二人乃相與俱行見鄒忌曰狐白之裘補之以弊羊皮何如忌曰諾請不敢雜賢以不肖髡曰方內而圜缸何如忌曰諾請謹門戶不敢留客髡等曰三人共牧一羊羊不得食人不得息何如忌曰諾請減吏省員使無擾民淳于髡等三辭鄒忌三知之如應響淳于髡等辭屈辭而去梁君出獵見白鴈群梁君下車彀弩欲射之道有行者梁君謂行者止行者不止白鴈群駭梁君怒欲射行者其御公孫龍下車撫矢曰君止梁君忿然作色而怒曰龍不與其君而顧與他人何也公孫龍對曰昔者齊景公之時大旱三年卜之曰必以人祠乃雨景公曰凡吾所以求雨者為吾民也今必使吾以人祠乃且雨寡人將自當之言未卒而天大雨方千里何也為有德於天而惠於民也今主君以白鴈之故而欲射殺之無異於虎狼矣梁君援其手與上車歸入郭門呼萬年曰幸哉今日也人獵皆得獸吾獵得善言而歸晉文公出田逐獸碭入大澤迷不知所出其中有漁者文公謂曰我若君也道安從出漁者曰臣願有獻文公曰出澤而受之於是送出澤漁者曰鴻鵠保河海之中厭而欲數移徙之小澤則必有丸矰之憂黿鼉保深淵厭而出之淺渚則必有羅網釣射之憂今君逐獸碭入至此何行之太遠也文公曰善哉謂從者記漁者名漁者曰君何以名為君其尊天事地敬社稷固四國慈愛萬民薄賦斂輕租稅者臣亦與焉君不敬社稷不固四國外失禮於諸侯內逆民心一國流亡漁者雖有厚賜不得保也遂辭不受曰君亟歸國臣亦反漁所晉文公逐麋而失之問農夫老古曰吾麋何在老古以足指曰如是往矣文公曰寡人問子子以足指何也老古振衣而起曰一不意人君之如此也虎豹之居也厭間而近人故得魚之居也厭深而之淺故得諸侯厭衆而亡其國詩曰維鵲有巢維鳩居之君放不歸人將居之矣於是文公恐歸遇欒武子欒武子曰獵得獸乎侯有悅色文公曰吾逐麋而失之得善言故有悅色武子曰其人安在曰吾未與來武子曰處上位而不恤其下驕也緩令急誅暴也取人言而棄其身盜也文公曰善還車載老古與俱歸魏文侯出遊見路人反裘而負芻文侯曰胡為反裘而負芻對曰臣愛其毛文侯曰若不知其裏盡而毛無所恃矣明年東陽上計錢布十倍大夫畢賀文侯曰此非所以賀我也譬無異夫路人反裘而負芻也將愛其毛不知其裏盡毛無所恃也今吾田地不加廣士民不加衆而錢十倍必取之士大夫也吾聞之下不安者其上不可居此非所以賀我也齊有婦人極醜號曰無鹽女臼頭深目長壯大節卬鼻結喉肥項少髮折腰出胸皮膚若漆行年三十無所容入於是乃自詣宣王曰妾齊之不售女也聞君王之聖德願備後宮之掃除謁者以聞宣王方置酒於漸臺左右聞之莫不掩口而笑曰此天下強顏女子也於是宣王乃召而見之但揚目銜齒舉手拊肘曰殆哉殆哉如此者四宣王曰願遂聞命對曰今大王之君國也西有衡秦之患南有強楚之讎外有三國之難內聚姦臣衆人不附春秋四十壯男不立故不務衆子而務衆婦尊所好而忽所恃一旦山陵崩阤社稷不定此一殆也漸臺五重黃金白玉翡翠珠璣莫落連飾萬民疲極此二殆也賢者伏匿於山林諂諛強進於左右邪偽立於本朝諫者不得通入此三殆也酒漿沈湎以夜續朝女樂俳優從橫大笑外不修諸侯之禮內不秉國家之治此四殆也故曰殆哉殆哉於是宣王掩然無聲喟然而嘆曰痛乎無鹽君之言今乃一聞寡人之殆幾不全也於是立毀漸臺罷女樂退諂諛去雕琢選兵馬實府庫招進直言延及側陋擇吉日立太子拜無鹽君以為王后而齊國大安醜女之功也有司請事於桓公桓公曰以告仲父有司又請桓公曰以告仲父若是者三在側者曰一則告仲父二則告仲父易哉為君桓公曰吾未得仲父則難已得仲父之後則曷為其不易也故王者勞於求賢逸於得人舜舉衆賢在位垂衣裳恭己無為而天下治湯文用伊呂成王任周邵刑措不用用衆賢故也公季成謂魏文侯曰田子方雖賢人然而非有土君也君常與之齊禮假有賢於子方者君有何以加之文侯曰如子方者非成所得議也子方仁人也仁人也者國之寶也智士也者國之器也博通之士也者國之尊也故國有仁人則群臣不爭國有智士則無四鄰諸侯之患國有博通之士則人主尊固非成之所得議也公季成自退於郊孟嘗君問於白圭曰魏文侯名過於齊桓而功不及五伯者何白圭對曰文侯師子夏友田子方敬段干木此名之所以過於桓公也卜相則曰成與黃孰可此功之所以不及五伯也以私愛妨公舉在職者不堪其事故功廢也然而名號顯榮者三士翊之也如相三士則王功成豈特霸哉晉平公問於叔向曰昔齊桓公九合諸侯一匡天下不識其君之力乎其臣之力乎叔向對曰管仲善制割隰朋善削齊賓胥無善補緣桓公知衣而已亦其臣之力也師曠侍曰臣請譬之以五味管仲善斷割之隰朋善煎熬之賓胥無善齊和之羹已熟矣奉而進之而君不食誰能強之亦其君之力也晉文公田於虢遇一老夫而問曰子處此故也虢亡其有説乎對曰虢君斷則不能謀則不與也不能斷又不能用人此虢之所以亡也文公輟田而歸遇趙衰而告之衰曰古之君子聽其言而用其身今之君子聽其言而其身哀哉晉國之憂也文公乃召賞之於是晉國樂納善言文公卒以霸也晉平公過九原而歎曰嗟乎此地之蘊吾良臣多矣若使死者可起也吾將誰與歸乎叔向對曰趙武乎公曰子黨於子之師也對曰臣敢言趙武之為人也立若不勝衣言若不出口然其身所舉士於白屋下者四十六人是其無私德也臣故以為賢也平公曰善周文王作靈臺及為池沼掘地得死人之骨吏以聞於文王文王曰更葬之吏曰此無主矣文王曰有天下者天下之主也有一國者一國之主也寡人固其主又安求主遂令吏以衣棺更葬之天下聞之皆曰文王賢矣澤及朽骨又況於人乎或得寶以危國文王得朽骨以喻其意而天下歸心焉寧戚欲干齊桓公窮困無以自進於是為商旅賃車以適齊暮宿于郭門之外桓公郊迎客夜開門辟賃車寧戚飯牛於車下擊牛角疾商歌桓公聞之曰異哉此歌者非常人也命後車載之桓公反寧戚見説桓公以全境內明日復見説桓公以為天下桓公大悅將任之而群臣爭之曰客衛人去齊不遠不若使人問人而賢也用之未晚也桓公曰不然問之恐有小惡以其小惡忘人之大美此人主之所以失天下之士也且人固難全權用其長者遂舉而授之以為卿當此舉也桓公得之矣所以成霸也齊桓公見小臣稷一日三至不得見從者曰萬乘之主見布衣士一日三至而不得見亦可以止矣桓公曰不然士之傲爵祿者固輕其主其主傲霸王者亦輕其士縱夫子傲爵祿吾庸敢傲霸王乎五往而後得見天下聞之皆曰桓公猶下布衣之士而況國君乎於是相率而朝靡有不至魏文侯過段干木之閭而軾其僕曰君何為軾曰此非段干木之閭與段干木蓋賢者也吾安敢不軾且段干木光于德寡人光于地段干木富乎義寡人富乎財地不如德財不如義寡人當事之者也遂致祿百萬而時問之國人皆喜居無幾何秦興兵而欲攻魏司馬唐且諫秦君曰段干木賢者也而魏禮之天下莫不聞無乃不可加乎兵秦君以為然乃案兵而輟不攻魏文侯可謂善用兵矣夫君子之用兵也莫見其形而功已成此之謂也野人之用兵也鼓聲則似雷號呼則動地塵氣充天流矢如雨扶傷舉死履腸涉血無罪之民其死者已量於澤矣而國之存亡主之死生猶未知也其離仁義亦遠矣晉平公問於叔向曰國家之患孰為大對曰大臣重祿而不極諫近臣畏罪而不敢言下情不上通此患之大者也公曰善子張見魯哀公見七日哀公不禮託僕夫去曰臣聞君好士故不遠千里之外百舍重趼不敢休息以見君見七日而君不禮君之好士也有似葉公子高之好龍也葉公子高好龍鉤以寫龍鑿以寫龍屋室雕文以寫龍於是也天龍聞而下之窺頭於牖拖尾於堂葉公見之棄而還走失其魂魄是葉公非好龍也好夫似龍而非龍者也今臣聞君好士故不遠千里之外以見君七日不禮君非好士也好夫似士而非士者也詩曰中心臧之何日忘之敢託而去孟子見齊宣王於雪宮王左右顧曰賢者亦有此樂耶孟子對曰有人不得則非其上矣不得而非其上者非也為人之上者而不與民同樂者亦非也樂民之樂者人亦樂其樂憂人之憂者民亦憂其憂樂以天下憂以天下然而不王者未之有也鄒穆公有令食鳧鴈者必以無以粟於是倉盡而求易於民二石粟而得一石吏以費請以粟食之穆公曰去非汝所知也夫百姓暴背而耕勤而不敢惰者豈為鳥獸也哉米粟人之上食也奈何其以養鳥且汝知小利而不知大會也周諺曰囊漏貯中汝獨不聞耶夫君者人之父母也取倉之粟移之於民此非吾粟耶鳥食鄒之不害鄒之粟而已粟之在倉與在民於我何擇耶民聞之皆知其私積之與公家為一體也此之謂知富國矣齊有田巴先生者行修於內智明於外齊王聞其賢聘而將問政焉田巴先生改制新衣鬋飾冠帶顧謂其妾曰何若其妾曰佼將出門問其從者曰何若從者曰佼過於淄水自窺醜惡甚矣遂見齊王齊王問政焉對曰政在正身正身之本在於群臣今者大王召臣臣改制鬋飾將造公門問於妾妾愛臣諛臣曰佼將出門問從者從者畏臣曰佼臣臨淄水而觀影然後自知醜惡也今齊之臣妾諛王者非特二人也王能臨淄水見己之惡過而自改斯齊國治矣臧孫行猛政子贛非之臧孫召子贛而問曰我不法耶曰法矣我不廉耶曰廉矣我不能事耶曰能事矣臧孫曰三者吾唯恐不能今盡能之子尚何非耶子貢曰子法矣好以害人子廉矣好以驕上子能事矣好以陵下夫政者猶張琴瑟也大弦急則小弦絶矣是以位尊者德不可以薄官大者治不可以小地廣者制不可以狹民衆者法不可以苛天性然也故曰罰得則姦邪止矣賞得則下歡悅矣由此觀之子則賊心已見矣獨不聞夫子産之相鄭乎其論材推賢舉能也抑惡而揚善故有大略者不問其所短有德厚者不問其小疵有大功者宿惡滅息成人之美不成人之惡也其牧民之道養之以仁教之以禮使之以義修法練教必遵民所樂故從其所便而處之因其所欲而與之順其所好而勸之賞之疑者從重罰之疑者從輕其罰審其賞明其刑省其德純其治約而教化行矣治鄭七年而風俗和平災害不生國無刑人囹圄空虛及死國人聞之皆叩心流涕曰子産已死吾將安歸夫使子産命可易吾不愛家一人其生也則見愛其死也而可悲仕者哭於廷商人哭於市農人哭於野處女哭於室良人絶琴瑟大夫解佩玦婦人脫簪珥皆巷哭然則思者仁恕之道也君子之治始於不足見而終於不可及此之謂也蓋德厚者報美怨大者禍深故曰德莫大於仁而禍莫大於刻夫善不可以為求而惡不可以亂去今子方病民喜而相賀曰臧孫子已病幸其將死子之病少愈而民以相懼曰臧孫子病又愈矣何吾命之不幸也臧孫子又不死矣子之病也人以相喜生也人以相駭子之賊心亦甚深矣為政若此如之何不非也於是臧孫子慚焉退而避位子路治蒲三年孔子過之入其境曰善哉由乎恭敬以信矣入其邑曰善哉由乎忠信以寬矣至於其廷曰善哉由乎明察以斷矣子貢執轡而問曰夫子未見由而三稱其善可得聞乎孔子曰我入其境田疇盡易草萊甚闢溝洫甚深此其恭敬以信故其民盡力也入其邑牆屋甚崇樹木甚茂此忠信以寬故其民不偷也入其廷廷甚間此明察以斷故其民不擾也
