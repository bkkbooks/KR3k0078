body:
  text: 政論政論自堯舜之帝湯武之王皆賴明哲之佐博物之臣故皋陶陳謨而唐虞以興伊箕作訓而殷周用隆及繼體之君欲立中興之功者曷嘗不賴功賢之謀乎凡天下之所以不治者常由人主承平日久俗漸弊而不寤政浸衰而不改習亂安危逸不自或荒耽嗜欲不恤萬機或耳蔽箴誨厭偽忽真或猶豫岐路莫適所從或見信之佐括囊守祿或疏遠之臣言之賤廢是以王綱縱弛於上智士鬱伊於下悲夫且守文之君繼陵遲之緒譬諸乘弊車矣當求巧工使輯治之折則接之緩則契之補琢換易可復為新新不已用之無窮若遂不治因而乘之摧拉捌裂亦無可柰何矣若武丁之獲傅說宣王之得申甫是則其巧工也今朝廷以聖哲之姿龍飛天衢大臣輔政將成斷金誠宜有以滿天下望稱兆民之心年穀豐稔風俗未乂夫風俗者國之脈診也不和誠未足為休書曰雖休勿休況不休而可休乎且濟時救世之術豈必體堯蹈舜然後乃治哉期於補綻決壞枝拄邪傾隨形裁割取時君所能行要厝斯世於安寧之域而已故聖人執權遭時定制步驟之差各有云施不強人以不能背所急而慕所聞也昔孝武皇帝策書曰三代不同法所由殊路而建德一也蓋孔子對葉公以來遠哀公以臨民景公以節禮非其不同所急異務也然疾俗人拘文牽古不達權制奇瑋所聞簡忽所見策不見珍計不見信夫人既不知善之為善又將不知不善之為不善惡足與論家國之大事哉故每有言事頗合聖德者或下群臣令集議之雖有可採輒見掎奪何者其頑士闇於時權安習所見殆不知樂成況可與慮始乎心閃意舛不知所云則茍云率由舊章而已其達者或矜名嫉能恥善策不從己出則舞筆奮辭以破其義寡不勝眾遂見屏棄雖稷契復存由將困焉斯實賈生之所以排於絳灌弔屈子以舒憤者也夫以文帝之明賈生之賢絳灌之忠而有此患況其餘哉況其餘哉且世主莫不願得尼軻之倫以為輔佐卒然獲之未必珍也自非題牓其面曰魯孔某鄒孟軻殆必不見敬信何以明其然也此二者善已存於上矣當時皆見薄賤而莫能任用困厄削逐待放不追勞辱勤瘁為豎子所議笑其故獲也夫淳淑之士固不曲道以媚時不詭行以徼名恥鄉原之譽比周之黨而世主凡君明不能別異量之士而適足受譖潤之愬前君既失之於古後君又蹈之於今是以命世之士常抑於當時而見思於後人以往揆來亦何容易向使賢不肖相去如泰山之與蟻垤策謀得失相覺如日月之與螢火雖頑嚚之人猶能察焉常患賢佞難別是非倒紛始相去如毫氂而禍福差以千里故聖君明主其猶慎之夫人之情莫不樂富貴榮華美服麗飾鏗鏘眩燿芬芳嘉味者也晝則思之夜則夢焉唯斯之務無須臾不存於心猶急水之歸下下川之赴壑不厚為之制度則皆侯服王食僭至尊踰天制矣是故先王之御世也必明法度以閉民欲崇隄防以禦水害法度替而民散亂隄防墮而水泛溢頃者法度頗不稽古而舊號網漏吞舟故庸夫設藻梲之飾匹豎享方丈之饌下僭其上尊卑無別禮壞而莫救法墮而不恆斯蓋有識之士所為於邑而增歎者也律令雖有輿服制度然斷之不自其源禁之又不密今使列肆賣侈功商賈鬻僭服百工作淫器民見可欲不能不買賈人之列戶蹈踰侈矣故王政一傾普天率土莫不奢僭者非家至人告乃時勢驅之使然此則天下之患一也且世奢服僭則無用之器貴本務之業賤矣農桑勤而利薄工商逸而入厚故農夫輟耒而雕鏤工女投杼而刺文躬耕者少末作者眾生土雖皆墾乂故地功不致茍無力穡焉得有年財鬱蓄而不盡出百姓窮匱而為姦寇是以倉廩空而囹圄實一穀不登則饑餒流死上下俱匱無以相濟國以民為根民以穀為命命盡則根拔根拔則本顛此最國家之毒憂可為熱心者也斯則天下之患二也法度既墮輿服無限婢妾皆戴瑱楴之飾而被織文之衣乃送終之家亦無法度至用輀梓黃腸多藏寶貨亨牛作倡高墳大寢是可忍也孰不可忍而俗人多之咸曰健子天下跂慕恥不相逮念親將終無以奉遣乃約其供養豫修亡歿之備老親之饑寒以事淫法之華稱竭家盡業甘心而不恨窮阨既迫迫為盜賊拘執陷罪為世大戮痛乎化俗之刑陷愚民也且橘柚之貢堯舜所不嘗御山龍華蟲帝王不以為褻服今之臣妾皆餘黃甘而厭文繡者蓋以萬數矣其餘稱此不可勝記古者墓而不墳文武之兆與平地齊今豪民之墳已千坊矣欲民不匱誠亦難矣是以天戚戚人汲汲外溺奢風內憂窮竭故在位者則犯王法以聚斂愚民則冒罪戮以為健俗之壞敗乃至於斯此天下之患三也承三患之弊繼荒頓之緒而徒欲修舊修故而無匡改雖唐虞復存無益於治亂也昔聖王遠慮深思患民情之難防憂奢淫之害政乃塞其源以絕其末深其刑而重其罰夫善堙川者必杜其源善防姦者必絕其萌昔子產相鄭殊尊卑異章服而國用治豈大漢之明主曾不如小藩之陪臣在修之與不耳易曰言行君子所以動天地也仲尼曰人而無信不知其可今官之接民甚多違理茍解面前不顧先哲作使百工及從民市輒設計加以誘來之器成之後更不與直老弱凍餓痛號道路守闕告哀終不見省歷年累歲乃纔給之又云逋直請十與三此逋直豈物主之罪耶不自咎責反復滅之冤抑酷痛足感和氣既爾復平弊敗之物與之至有車輿故謁者寇賣之則莫取服之則不可其餘雜物略皆此輩是以百姓創艾咸以官為忌諱遯逃鼠竄莫肯應募因乃捕之劫以威勢心茍不樂則器械行沽虛費財用不周於事故曰上為下效然後謂之教上下相效殆如此將何以防之罰則不恕不罰則不治是以風移於詐俗易於欺獄訟繁多民好殘偽為政如此未睹其利斯皆起於典藏之吏不明為國之體茍割脛以肥頭不知脛弱亦將顛仆也禮譏聚斂之臣詩曰貪人敗類蓋傷之也傳曰工欲善其事必先利其器舊時永平建初之際去戰攻未久朝廷留意於武備財用優饒主者躬親故官兵常牢勁精利謝蔡大僕之弩及龍亭九年之劍至今擅名天下頃主者既不敕慎而詔書又誤進入之賓貪饕之吏競約其財用狡猾之工復盜竊之至以麻枲被弓弩米粥雜漆燒鎧鐵焠醯中令脆易冶孔又褊小刀牟悉鈍故邊民敢健士皆自作私兵不肯用官器凡漢所以能制胡者徒擅鎧弩之利也鎧則不堅弩則不勁永失所恃矣且夫士之身茍兵鈍甲耎不可依怙雖孟賁卞莊由有猶豫推此論之以小況大使三軍器械皆可依阻則膽強勢盛各有赴敵不旋之慮若皆弊敗不足任用亦競奮皆不避水火矣三軍皆奮則何敵不剋誠宜復申明巧工舊令除進入之課復故財用雖頗為吏工所中尚勝於自中也茍以牟利任用為故無問其他月令曰物刻工名以覆其誠功有不當必行其罪以窮其情今雖刻名之而賞罰不能又數有赦贖主者輕翫無所懲畏夫兵革國之大事宜特留意重其法罰敢有巧詐輒行之輩罪勿以赦贖除則吏敬其職工慎其業矣昔聖王之治天下咸建諸侯以臨其民國有常君君有定臣上下相安政如一家秦兼天下罷侯置縣於是君臣始有不親之舋矣我文景患其如此故令長視事至十餘年居位或長子孫永久則相習上下無所竄情加以心堅意專安官樂職圖慮久長而無茍且之政吏民供奉亦竭忠盡節而無壹切之計故能君臣和睦百姓康樂茍有康樂之心充於中則和氣應於外是以災害不生禍亂不作自頃以來政教稍改重刑闕於大臣而密罔刻於下職鼎輔不思在寬之德牧牧守守逐之各競擿微短吹毛求疵重案深詆以中傷貞良長吏或實清廉心平行潔內省不疚不肯媚曲禮不行於所屬私敬無廢於府州郡側目以為負折乃選巧文猾吏向壁作條誣覆闔門攝捕妻子人情恥令妻子就逮則不迫自去且人主莫不欲豹產之臣然西門豹治鄴一年民欲殺之子產相鄭初亦見詛三載之後德化乃洽今長吏下車百日無他異觀則州郡睥睨待以惡意滿歲寂漠便見驅逐正使豹產復在方見怨詛應時奔馳何緣得成易歌之勛垂不朽之名者哉猶馮唐評文帝之不能用李牧矣近漢世所謂良吏黃侯召父之治郡視事皆且十年然後功業乃著且以仲尼之聖由曰三年有成況凡庸之士而責以造次之效哉故夫卒成之政必有橫暴酷烈之夫而世俗歸稱謂之辦治故絀已復進棄已復用橫遷超取不由次第是以殘猛之人遂舊其毒仁賢之士劫俗為虐本操雖異驅出一揆故朝廷不獲溫良之用兆民不蒙寬惠之德則百姓之命委於酷吏之手嗷嗷之怨咎歸于上夫民善之則畜惡之則讎讎滿天下可不懼哉是以有國有家者甚畏其民既畏其怨又畏其罰故養之如傷病愛之如赤子兢兢業業懼以終始恐失群臣之和以墮先王之軌也今朝廷雖屢下恩澤之詔垂卹民之言而法度制令甚失養民之道勞思而無功華繁而實寡必欲求利民之術則宜沛然改法有以安固長吏原其小罪闊略微過取其大較惠下而已昔唐虞之制三載考績三考絀陟所以表善而簡惡盡臣力也漢法亦三年壹察治狀舉孝廉尤異宣帝時王成為膠東相黃霸為穎川太守皆且十年但就增秩賜金封關內侯以次入為公卿然後政化大行勛垂竹帛皆先帝舊法所宜因循及中興後上官象為并州刺史祭彤為遼東太守視事各十八年皆增秩中二千石近日所見或一期之中郡主易數二千石雲擾波轉潰潰紛紛吏民疑惑不知所謂及公卿尚書亦復如此且臺閣之職尤宜簡習帝時尚書但厚加賞賜希得外補是以機事周密莫有漏洩昔舜命九官自受終於文祖以至陟方五十年不聞復有改易也聖人行之於古以致時雍文宣擬式亦至隆平若不克從是羞效唐虞而恥遵先帝也昔明王之統黎元蓋濟其欲而為之節度者也凡人情之所通好則恕己而足之因民有樂生之性故分祿以頤其士制廬井以養其萌然後上下交足厥心乃靜人非食不活衣食足然後可教以禮義威以刑罰茍其不足慈親不能畜其子況君能檢其臣乎故古記曰倉廩實而知禮節衣食足而知榮辱今所使分威權御民人理獄訟幹府庫者皆群臣之所為而其奉祿甚薄仰不足以養父母俯不足以活妻子父母者性所愛也妻子者性所親也所愛所親方將凍餧雖冒刃求利尚猶不避況可令臨財御眾乎是所謂渴馬守水餓犬護肉欲其不侵亦不幾矣夫事有不疑勢有不然蓋此之類雖時有素富骨清者未能百一不可為天下通率聖王知其如此故重其祿以防其貪欲使之取足於奉不與百姓爭利故其為士者習推讓之風恥言十五之計而拔葵去織之義形矣故三代之賦也足以代其耕故晏平仲諸侯之大夫耳祿足贍五百斯非優衍之故耶昔在暴秦反道違聖厚自封寵而虜遇臣下漢興因循未改其制夫百里長吏荷諸侯之任而食監門之祿請舉一隅以率其餘一月之祿得粟二十斛錢二千長吏雖欲崇約猶當有從者一人假令無奴當復取客客庸一月千芻膏肉五百薪炭鹽菜又五百二人食粟六斛其餘財足給馬豈能供冬夏衣被四時祠祀賓客升酒之費乎況復迎父母致妻子哉不迎父母則違定省不致妻子則繼嗣絕迎之不足相贍自非夷齊孰能餓死於是則有賣官鬻獄盜賊主守之奸生矣孝宣皇帝悼其如此乃詔曰吏不平則治道衰今小吏皆勤事奉之薄欲其不侵漁百姓難矣其益吏奉百石以下什五然尚儉隘又不上逮古賦祿雖不可悉遵宜少增益以賙其匱使足代耕自供以絕其內顧念奸之心然後重其受取之罰則吏內足於財外憚嚴刑人懷羔羊之潔民無侵枉之性矣昔周之衰也大夫無祿詩人刺之暴秦之政始建薄奉亡新之亂不與吏除三亡之失異世同術我無所鑒夏后及商覆車之軌宜以為戒大赦之造乃聖王受命而興討亂除殘誅其鯨鯢赦其臣民漸染化者耳及戰國之時犯罪者輒亡奔鄰國遂赦之以誘還其逋逃之民漢承秦制遵而不越孝文皇帝即位二十三年乃赦示不廢舊章而已近永平建初之際亦六七年乃壹赦命子皆老於草野窮困懲艾比之於死頃間以來歲且壹赦百姓忸輕為奸非每迫春節徼倖之會犯惡尤多近前年一期之中大小四赦諺曰一歲再赦奴兒喑噁況不軌之民孰不肆意遂以赦為常俗初期望之過期不至亡命蓄積群輩屯聚為朝廷憂如是則劫不得不赦赦以趣姦姦以趣赦轉相驅踧兩不得息雖日赦之亂甫繁耳由坐飲多發消渴而水更不得去口其歸亦無終矣又踐祚改元際未嘗不赦每其令曰蕩滌舊惡將與士大夫更始是裒己薄先且違無改之義非所以明孝抑邪之道也昔筦子有云赦者奔馬之委轡不赦者痤疽之砭石及匡衡吳漢將相之雋而皆建言不當數赦今如欲尊先王之制宜曠然更下大赦令因明諭使知永不復赦則群下震慄莫輕犯罪縱不能然宜十歲以上乃時壹赦仲長子昌言德教者人君之常任也而刑罰為之佐助焉古之聖帝明王所以能親百姓訓五品和萬邦蕃黎民召天地之嘉應降鬼神之吉靈者實德是為而非刑之攸致也至於革命之期運非征伐用兵則不能定其業姦宄之成群非嚴刑峻法則不能破其黨時勢不同所用之數亦宜異也教化以禮義為宗禮義以典籍為本常道行於百世權宜用於一時所不可得而易者也故制不足則引之無所至禮無等則用之不可依法無常則網羅當道路教不明則士民無所信引之無所至則難以致治用之不可依則無所取正羅網當道路則不可得而避士民無所信則其志不知所定非治理之道也誠令方來之作禮簡而易用儀省而易行法明而易知教約而易從篇章既著勿復刊剟儀故既定勿復變易而人主臨之以至公行之以忠仁壹德於恆久先之用己身又使通治亂之大體者總綱紀而為輔佐知稼穡之艱難者親民事而布惠利政不分於外戚之家權不入於宦豎之門下無侵民之吏京師無佞邪之臣則天神可降地祇可出大治之後有易亂之民者安寧無故邪心起也大亂之後有易治之勢者創艾禍災樂生全也刑繁而亂益甚者法難勝避茍免而無恥也教興而罰罕用者仁義相厲廉恥成也任循吏於大亂之會必有恃仁恩之敗用酷吏於清治之世必有殺良民之殘此其大數也我有公心焉則士民不敢念其私矣我有平心焉則士民不敢行其險矣我有儉心焉則士民不敢放其奢矣此躬行之所徵者也開道塗焉起隄防焉舍我塗而不由踰隄防而橫行逆我政者也誥之而知罪可使悔遏於後矣誥之而不知罪明刑之所取者也教有道禁不義而身以先之令德者也身不能先而總略能行之嚴明者也忠仁為上勤以守之其成雖遲君子之德也譎詐以御其下欺其民而取其心雖有立成之功至德之所不貴也廉隅貞潔者德之令也流逸奔隨者行之污也風有所從來俗有所由起疾其末者刈其本惡其流者塞其源夫男女之際明別其外內遠絕其聲音激厲其廉恥塗塞其虧隙由尚有胸心之逸念睇盼之過視而況開其門導其徑者乎今嫁娶之會捶杖以督之戲謔酒醴以趣情慾宣淫佚於廣眾之中顯陰私於族親之間污風詭俗生淫長奸莫此之甚不可不斷者也漢興以來皆引母妻之黨為上將謂之輔政而所賴以治理者甚少而所坐以危亂者甚眾妙采於萬夫之望其良猶未可得而遇也況欲求之妃妾之黨取之於驕盈之家徼天幸以自獲其人者哉夫以丈夫之智猶不能久處公正長思利害耽榮樂寵死而後已又況婦人之愚而望其遵巡正路謙虛節儉深圖遠慮為國家校計者乎故其欲關豫朝政恇快私願是乃理之自然也昔趙綰白不奏事於大后而受不測之罪王章陳日蝕之變而取背叛之誅夫二后不甚名為無道之婦人猶尚若此又況呂后飛燕傅昭儀之等乎夫母之於我尊且親於其私親亦若我父之欲厚其父兄子弟也妻之於我愛且媟於其私親亦若我之欲厚我父兄子弟也我之欲盡孝順於慈母無所擇事矣我之欲效恩情於愛妻妾亦無所擇力矣而所求於我者非使我有四體之勞苦肌膚用之疾病也夫以此欬唾盼睇之閒至易也誰能違此者乎唯不世之主抱獨斷絕異之明有堅剛不移之氣然後可庶幾其不陷沒流淪耳宦豎者傳言給使之臣也拚埽是為超走是供傳延房臥之內交錯婦人之間又亦實刑者之所宜也孝宣之世則以弘恭為中書令石顯為僕射中宗嚴明二豎不敢容錯其奸心也後暨孝元常抱病而留好於音樂悉以樞機委之石顯則昏迷霧亂之政起而仇忠害正之禍成矣嗚呼父子之閒相監至近而明闇之分若此豈不良足悲耶孝桓皇帝起自蠡吾而登至尊侯覽張讓之等以亂承亂政令多門權利並作迷荒帝主濁亂海內高命士惡其如此直言正諭與相摩切被誣見陷謂之黨人靈皇帝登自解犢以繼孝桓中常侍曹節侯覽等造為維綱帝終不寤寵之日隆唯其所言無求不得凡貪淫放縱僭淩橫恣撓亂內外螫噬民化隆自順桓之時盛極孝靈之世前後五十餘年天下亦何緣得不破壞耶古之聖人立禮垂典使子孫少在師保不令處於婦女小人之間蓋猶見此之良審也和神氣懲思慮避風濕節飲食適嗜欲此壽考之方也不幸而有疾則鍼石湯藥之所去也肅禮容居中正康道德履仁義敬天地恪宗廟此吉祥之術也不幸而有災則克己責躬之所復也然而有禱祈之禮史巫之事者盡中正竭精誠也下世其本而為姦邪之階於是淫厲亂神之禮興焉侜張變怪之言起焉丹書厭勝之物作焉故常俗忌諱可笑事時世之所遂往而通人所深疾也且夫掘地九仞以取水鑿山百步以攻金入林伐木不卜日適野刈草不擇時及其搆而居之制而用之則疑其吉凶不亦迷乎簡郊社慢祖禰逆時令背大順而反求福祐於不祥之物取信誠於愚惑之人不亦誤乎彼圖家畫舍轉局指天者不能自使室家滑利子孫貴富而望其德致之於我不亦惑乎今有嚴禁於下而上不去非教化之法也諸厭勝之物非禮之祭皆所宜急除者也情無所止禮為之儉欲無所齊法為之防越禮宜貶踰法宜刑先王之所以紀綱人物也若不制此二者人情之縱橫馳騁誰能度其所極者哉表正則影直範端則器良行之於上禁之於下非元首之教也君臣士民並順私心又大亂之道也頃皇子皇女有夭折年未及殤爵加王主之號葬從成人之禮非也及下殤以上已有國邑之名雖不合古制行之可也王侯者所與共受氣於祖考幹合而支分者也性類純美臭味芬香孰有加此乎然而生長於驕溢之處自恣於色樂之中不聞典籍之法言不因師傅之良教故使其心同於夷狄其行比於禽獸也長幼相效子孫相襲家以為風世以為俗故姓族之門不與王侯婚者不以其五品不和睦閨門不潔盛耶所貴於善者以其有禮義也所賤於惡者以其有罪過也今以所貴者教民以所賤者教親不亦悖乎可令王侯子弟悉入大學廣之以他山肅之以二物則腥臊之污可除而芬芳之風可發矣有天下者莫不君之以王而治之以道道有大中所以為貴也又何慕於空言高論難行之術而臺榭則高數十百尺壁帶加珠玉之物木土被綈錦之飾不見夫之女子成市於宮中未曾御之婦人生幽於山陵繼體之君誠欲行道雖父之所興可有所壞者也雖父之美人可有所嫁者也至若門庭足以容朝賀之會同公堂足以陳千人之坐席臺榭足以覽都民之有無防闥足以殊五等之尊卑宇殿高顯敞而不加以雕采之巧錯塗之飾是自其中也苑囿池沼百里而還使芻蕘雉菟者得時往焉隨農而講事因田狩以教戰上虔郊廟下虞賓客是又自其中也嫡庶之數使從周制妾之無子與希幸者以時出之均齊恩施以廣子姓使令之人取足相供時其上下通其隔曠是又自然其中也在位之人有乘柴馬弊車者矣有食菽藿者矣有親飲食之蒸烹者矣有過客不敢沽酒市脯者矣有妻子不到官舍者矣有還奉祿者矣有辭爵賞者矣莫不稱述以為清邵非不清邵而不可以言中也好節之士有遇君子而不食其食者矣有妻子凍餧而不納善人之施者矣有茅茨蒿屏而上漏下濕者矣有窮居僻處求而不可得見者矣莫不歎美以為高潔此非不高潔而不可以言中也夫世之所以高此者亦有由然先古之制休廢時王之政不平直正不行詐偽獨售於是世俗同共知節義之難復持也乃舍正從邪背道而馳奸彼獨能介然不為故見貴也如使王度昭明祿除從古服章不中法則詰之以典制貨財不及禮則間之以志故向所稱以清邵者將欲何矯哉向所歎云高潔者欲以何厲哉故人主能使違時詭俗之行無所復剴摩困苦難為之約無所復激切步驟乎平夷之塗偃息乎大中之居人享其宜物安其所然後足以稱賢聖之王公中和人君子矣古者君之於臣無不答拜也雖王者有變不必相因猶宜存其大者御史大夫三公之列也今不為起非也為太子時太傅即位之後宜常答其拜少傅可比三公為之起周禮王為三公六卿錫衰為諸侯緦衰為大夫士疑衰及於其病時皆自問焉古禮雖難悉奉行師傅三公所不宜闕者也凡在京師大夫以上疾者可遣使修賜問之恩州牧郡守遠者其死然後有弔贈之禮也坐而論道謂之三公作而行之謂士大夫論道必求高明之士幹事必使良能之人非獨三太三少可與言也凡在列位者皆宜及焉故士不與其言何知其術之淺深不試之事何以知其能之高下與群臣言議者又非但用觀彼之志行察彼之才能也乃所以自弘天德益聖性也猶十五志學朋友講習自強不息德與年進至于七十然後心從而不踰矩況於不及中規者乎而不自勉也公卿列校侍中尚書皆九州之選也而不與之從容言議諮論古事訪國家正事問四海豪英琢磨珪璧染練金錫何以昭仁心於民物廣令聞於天下哉人主有常不可諫者五焉一曰廢后黜正二曰不節情欲三曰專愛一人四曰寵幸佞諂五曰驕貴外戚廢后黜正覆其國家者也不節情欲伐其性命者也專愛一人絕其繼嗣者也寵幸佞諂壅蔽忠正者也驕貴外戚淆亂政治者也此為疾痛在於膏肓此為傾危比於累卵者也然而人臣破首分形所不能救止也不忌初故仁也以計御情智也以嚴專制禮也豐之以財而勿與之位亦足以為恩也封之以土而勿與之權亦足以為厚也何必友年彌世惑賢亂國然後於我心乃快哉人之事親也不去乎父母之側不倦乎勞辱之事唯父母之所言也唯父母之所欲也於其體之不安則不能寢於其之不飽則不能食孜孜為此以沒其身惡有為此人父母而憎之者也人之事君也言無小大無愆也事無勞逸無所避也其見識知也則不恃恩寵而加敬其見遺忘也則不懷怨恨而加勤安危不貳其志險易不革其心孜孜為此以沒其身惡有為此人君長而憎之者也人之交士也仁愛篤恕謙遜敬讓忠誠發乎內信效著乎外流言無所受愛憎無所偏幽閑攻人之短會友述人之長有負我者我又加厚焉有疑我者我又加信焉患難必相及行潛德而不有立潛功而不名孜孜為此以沒其身惡有與此人交而憎之者也故事親而不為親所知是孝未至者也事君而不為君所知是忠未至者也與人交而不為人所知是信義未至者也父母怨咎人不以正已審其不然可違而不報也父母欲與人以官位爵祿而才實不可可違而不從也父母欲為奢泰侈靡以適心快意可違而不許也父母不好學問疾子孫之為之可違而學也父母不好善士惡子孫交之可違而友也士友有患故待己而濟父母不欲其行可違而往也故不可違而違非孝也可違而不違亦非孝也好不違非孝也好違亦非孝也其得義而已也昔高祖誅秦項而陟天子之位光武討篡臣而復已亡之漢皆受命之聖主也蕭曹丙魏平勃霍光之等夷諸呂尊太宗廢昌邑而立孝宣經緯國家鎮安社稷一代之名臣也二主數子之所以震威四海布德生民建功立業流名百世者唯人事之盡耳無天道之學焉然則王天下作大臣者不待於知天道矣所貴乎用天之道者則指星辰以授民事順四時而興功業其大略吉凶之祥又何取焉故知天道而無人略者是巫醫卜祝之伍下愚不齒之民也信天道而背人事者是昏亂迷惑之主覆國亡家之臣也問者曰治天下者壹之乎人事抑亦有取諸天道也曰所取於天道者謂四時之宜也所壹於人事者謂治亂之實也周禮之馮相保章其無所用耶曰大備於天人之道耳是非治天下之本也是非理生民之要也曰然則本與要奚所存耶曰王者官人無私唯賢是親勤卹政事屢省功臣賞錫期於功勞刑罰歸乎罪惡政平民安各得其所則天地將自從我而正矣休祥將自應我而集矣惡物將自舍我而亡矣求其不然乃不可得也王者所官者非親屬則寵幸也所愛者非美色則巧佞也以同異為善惡以喜怒為賞罰取乎麗女怠乎萬機黎民冤枉類殘賊雖五方之兆不失四時之禮斷獄之政不違冬日之期蓍龜積於廟門之中犧牲群麗碑之閒馮相坐臺上而不下祝史伏壇旁而不去猶無益於敗亡也從此言之人事為本天道為末不其然與故審我已善而不復恃乎天道上也疑我未善引天道以自濟者其次也不求諸己而求諸天者下愚之主也令夫王者誠忠心於自省專思慮於治道自省無愆治道不謬則彼嘉物之生休祥之來是我汲井而水出爨而火燃者耳何足以為賀者耶故歡於報應喜於珍祥是劣者之私情夫可謂大上之公德也
