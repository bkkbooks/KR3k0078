body:
  text: 周易周易乾元亨利貞文言備也象曰天行健君子以自強不息九三君子終日乾乾夕惕若厲無咎處下體之極居上體之下純修下道則居上之德廢純修上道則處下之禮曠故終日乾乾至于夕惕猶若厲也九五飛龍在天利見大人不行不躍而在乎天故曰飛龍也龍德在天則大人之路亨也夫位以德興德以位敘以至德而處盛位萬物之不亦宜乎上九亢龍有悔彖曰大哉乾元萬物資始乃統天雲行雨施品物流形大明終始六位時成時乘六龍以御天乾道變化各正性命大明乎終始之道故六位不失其時而成也升降無常隨時而用處則乘潛龍出則乘飛龍故曰時乘六龍也保合大和乃利貞不和而剛暴也首出庶物萬國咸寧萬物所以寧各以有君也文言曰元者善之長也亨者嘉之會也利者義之和也貞者事之幹也君子體仁足以長人嘉會足以合禮利物足以和義貞固足以幹事君子行此四德者故曰乾元亨利貞君子終日乾乾夕惕若厲無咎何謂也子曰君子進德修業忠信所以進德也修辭立其誠所以居業也是故居上位而不驕在下位而不憂居下體之上在上體之下明夫終敝故不驕也知夫至至故不憂也故乾乾因其時而惕雖危無咎矣惕怵惕之謂也飛龍在天利見大人何謂也子曰同聲相應同氣相求水流濕火就燥雲從龍風從虎聖人作而萬物亢龍有悔何謂也子曰貴而無位高而無民下無陰也賢人在下位而無輔賢人雖在下而當位不為之助是以動而有悔也君子學以聚之問以辨之以君德而處下體資納於物者也寬以居之仁以行之夫大人者與天地合其德與日月合其明與四時合其序與鬼神合其吉凶先天而天弗違後天而奉天時天且弗違而況於人乎況於鬼神乎亢之為言也知進而不知退知存而不知亡知得而不知喪其唯聖人乎知進退存亡而不失其正者其唯聖人乎坤象曰地勢坤君子以厚德載物彖曰至哉坤元萬物資生乃順承天坤厚載物德合無疆含弘光大品物咸亨文言曰坤至柔而動也剛至靜而德方含萬物而化光坤道其順乎承天而時行積善之家必有餘慶積不善之家必有餘殃君子敬以直內義以方外敬義立而德不孤屯象曰雲雷屯君子以經綸君子經綸之時彖曰天造草昧宜健侯而不寧屯體不寧故利建諸侯也屯者天地造始之時也造物之始始於冥昧故曰草昧也處造始之時所宜之善莫善於建侯蒙象曰山下出泉蒙君子以果行育德彖曰匪我求童蒙童蒙求我志應也我謂非童蒙者闇者求明者明者不諮闇故蒙之為義匪我求童蒙童蒙求我也童蒙之來求我志應故也蒙以養正聖功也師象曰地中有水師君子以容民畜眾初六師出以律否臧凶為師之始齊師者也失令有功法所不赦故師出不以律否臧皆凶也上六大君有命開國承家小人勿用處師之極師之終也大君之命不失功也開國承家以寧邦也小人勿用非其道也象曰大君有命以正功也小人勿用必亂邦也比象曰地上有水比先王以建萬國親諸侯萬國以比建諸侯以比親履象曰上天下澤履君子以辨上下定民志泰象曰天地交泰后以財成天地之道輔相天地之宜以左右民上下大通則物失其節故財成而輔相以左右民也彖曰天地交而萬物通也上下交而其志同也內君子而外小人君子道長小人道消也否象曰天地不交否君子以儉德避難不可榮以祿彖曰天地不交而萬物不通上下不交而天下無邦也內陰而外陽內柔而外剛內小人而外君子小人道長君子道消也九五休否大人吉其亡其亡繫於苞桑居否之世能全其身者唯大人耳巽為木木莫善於桑人雖欲有亡之者眾根堅固弗能拔之也同人象曰天與火同人天體於上而火炎上同人之義君子以類族辯物君子小人各得所同彖曰文明以健中正而應君子正也行健不以武而以文明用之相應不以邪而以中正應之君子正也唯君子為能通天下之志君子以文明為德者也大有象曰火在天上大有君子以遏惡揚善順天休命大有包容之象也故遏惡揚善成物之美順奉天德休物之命也彖曰柔得尊位大中而上下應之曰大有處尊以柔居中以大上下應之靡所不納大有之義也其德剛健而文明應乎天而時行是以元亨德應于天則行不失時矣剛健不滯文明不犯應天則大時行無違是以元亨也上九自天佑之吉無不利居大有之上而不累于位志尚於賢者也謙象曰地中有山謙君子以裒多益寡稱物平施多者用謙以為裒少者用謙以為益隨物而與施不失平也彖曰謙亨天道下濟而光明地道卑而上行天道虧盈而益謙地道變盈而流謙鬼神害盈而福謙人道惡盈而好謙謙尊而光卑而不可踰君子之終也初六謙謙君子用涉大川吉能體謙謙其唯君子用涉大難物無害也象曰謙謙君子卑以自牧也牧養也九三勞謙君子有終吉勞謙匪懈是以吉也象曰勞謙君子萬民服也豫象曰雷出地奮豫彖曰豫順以動故天地如之天地以順動或日月不過而四時不忒聖人以順動則刑罰清而民服豫之時義大矣哉隨象曰澤中有雷隨君子以向晦入宴息澤中有雷動悅之象也物皆悅隨可以無為不勞明監故君子向晦入宴息也彖曰隨時之義大矣哉得時則天下隨之矣隨之所施唯在於時時異而不隨否之道也故隨時之義大矣哉觀象曰風行地上觀先王以省方觀民設教彖曰順而巽中正以觀天下觀天之神道而四時不忒聖人以神道設教而天下服六四觀國之光利用賓於王居觀之時最近至尊觀國之光者也居近得位明習國儀者也故曰利用賓于王也九五觀我生君子無咎上之化下猶風靡草故觀民之俗以察己道百姓有罪在余一人君子風著己乃無咎上為化主將欲自觀乃觀民也噬嗑象曰雷電噬嗑先王以明罰整法彖曰剛柔分動而明雷電合而彰剛柔分動不溷乃明雷電並合不亂乃章皆利用獄之義也賁象曰山下有火賁君子以明庶政無敢折獄處賁之時止物以文明不可以威刑故君子以明庶政而無敢折獄也彖曰觀乎天文以察時變觀乎人文以化成天下六五賁於丘園束帛戔戔吝終吉為飾之主飾之盛者也施飾於物其道害矣施飾丘園盛莫大為故曰賁于丘園束帛乃戔戔用莫過儉泰而能約故必吝焉乃得終吉也大畜象曰天在山中大畜君子以多識前言往行以畜其德物之可畜於懷令德不散盡於此也彖曰大畜剛健篤實暉光日新其德凡物能暉光日新其德者唯剛健篤實者也頤象曰山下有雷頤君子以慎言語節飲食言語飲食猶慎而節之而況其餘乎彖曰頤貞吉養正則吉也天地養萬物聖人養賢以及萬民頤之時大矣哉習坎象曰水洊至習坎君子以常德行習教事至險未夷教不可廢故以常德行而習教事也習于坎然後能不以險難為困而德行不失常彖曰習坎重險也天險不可升也不可得升故得保其威尊地險山川丘陵也有山川丘陵故物得保以全也王公設險以守其國國之為衛恃於險也言自天地以下莫不須險也險之時用大矣哉非用之常用有時也離象曰明兩作離大人以繼明照於四方繼謂不絕彖曰離麗也麗猶著也各得所著之宜者也日月麗於天百穀草本麗乎土重明以麗乎正乃化成天下咸象曰山上有澤咸君子以虛受人以虛受人物乃感應也彖曰咸感也柔上而剛下二氣感應以相與天地感而萬物化生二氣相與乃化生也聖人感人心而天下和平觀其所感而天地萬物之情可見矣天地萬物之情見於所感也恒象曰雷風恒長陽長陰合而相與可久之道也君子以立不易方得其所久故不易也彖曰天地之道恒久而不已也得其所久故不巳也日月得天而能久照四時變化而能久成聖人久於其道而天下化成言各得所恆故皆能久長也觀其所恒而天地萬物之情可見矣天地萬物之情見於所恆也九三不恒其德或承之羞德行無恆自相違錯不可致詰故或承之羞也不恒其德無所容也遯象曰天下有山遯天下有山陰長之象也君子以遠小人不惡而嚴九五嘉遯貞吉遯而得正反制於內小人應命率正其志不惡而嚴得正之吉遯之嘉者也象曰嘉遯貞吉以正志也上九肥遯無不利最處外極無應於內超然絕志心無疑顧憂患不能累矰繳不能及是以肥遯無不利也象曰肥遯無不利無所疑也大壯象曰雷在天上大壯君子以非禮弗履壯而違禮則凶凶則失壯矣故君子以大壯而順禮也彖曰大壯利貞大者正也正大而天地之情可見矣天地之情正大而已弘正極大則天地之情可見矣晉象曰明出地上晉君子以自昭明德以順著明自顯之道明夷象曰明入地中明夷君子以眾眾顯明蔽偽百姓者也故以蒙養正以明夷眾矣用晦而明藏明於內乃得明也顯明於外乃所避也彖曰內文明而外柔順以蒙大難文王以之利艱貞晦其明也內難而能正其志箕子以之家人象曰風自火出家人由內相成熾也君子以言有物而行有恒家人之道修於近小而不妄者也故君子言必有物而口無擇言行必有恆而身無擇行也彖曰家人女正位乎內男正位乎外天地之大義也家人有嚴君焉父母之謂也父父子子兄兄弟弟夫夫婦婦而家道正正家而天下定矣睽象曰上火下澤睽君子以同而異同於通理異於職事彖曰睽火動而上澤動而下天地睽而其事同也男女睽而其志通也萬物睽而其事類也睽之時用大矣哉睽離之時非小人之所能用也蹇象曰山上有水蹇君子以反身修德除難莫若反身修德也彖曰蹇難也險在前也見險而能止智矣哉六二王臣蹇蹇匪躬之故處難之時履當其位執心不回志匡王室者也故曰王臣蹇蹇匪躬之故也履中行義以存其上處蹇以此未見其尤也象曰王臣蹇蹇終無尤也解象曰雷雨作解君子以赦過宥罪彖曰天地解而雷雨作雷雨作而百果草木皆甲坼天地否結則雷雨不作交通感散雷雨乃作也雷雨之作則險厄者亨否結者散故百果草木皆甲坼也解之時大矣哉無所而不釋也六三負且乘致寇至貞吝處非其位履非其正以附於四用夫柔邪以自媚者也乘二負四以容其身寇之來也自己所致矣雖幸而免正之所賤也損象曰山下有澤損君子以懲忿窒欲可損之善莫善損忿欲彖曰損益盈虛與時偕行自然之質各定其分損益將何加焉非道之常故必與時偕行也益象曰風雷益君子以見善則遷有過則改矣從善改過益莫大焉彖曰益損上益下民悅無疆自上下下其道大光利有攸往中正有慶五處中正自上下下故有慶也以中正有慶之德有攸往也何適而不利哉升象曰地中生木升君子以慎德積小以成高大革象曰中澤有火革彖曰革水火相息凡不合而後變生火欲上澤欲下水火相戰而後變生者也天地革而四時成湯武革命順乎天而應乎人革之時大矣哉上六君子豹變小人革面居變之終變道已成君子處之能成其文小人樂成則變面以順上也鼎象曰木上有火鼎彖曰鼎象也以木巽火亨飪也聖人以享上帝而大亨以養聖賢亨者鼎之所為也革去故而鼎成新故為亨飪調和之器也去故取新聖賢不可失也飪熟也天下莫不用之而聖人用之乃上以亨上帝下以大亨養聖賢焉震震驚百里不喪匕鬯威震驚乎百里則足可以不喪匕鬯矣七所以載鼎實鬯香酒奉宗廟之盛者也象曰洊雷震君子以恐懼修省彖曰震亨震來虩虩恐致福也震驚百里驚遠而懼邇也威震驚乎百里則惰者懼於近矣出可以守宗廟社稷以為祭主也明所以堪長子之義也不喪匕鬯則已出可以守宗廟也艮象曰兼山艮君子以思不出其位各止其所不侵官也彖曰艮止也時止則止時行則行動靜不失其時其道光明止道不可常用必施於不可以行適于其時道乃光明豐亨王假之大而亨者王之所至也勿憂宜日中豐之為義闡弘微細通夫隱滯者也為天下之主而令微隱者不亨憂未已也故至豐亨乃得勿憂也用夫豐亨不憂之德宜處天中以照者也故曰宜日中也象曰雷電皆至豐君子以折獄致刑文明以動不失情理彖曰日中則昃月盈則食天地盈虛與時消息而況於人乎況於鬼神乎豐之為用困於昃食者也施於未足則尚豐施於已盈則方溢不可以為常故具陳消息之道也兌象曰麗澤兌君子以朋友講習彖曰兌悅也剛中而柔外悅以利貞悅而違剛則諂剛而違悅則暴剛中而柔外所以悅以利貞也是以順乎天而應乎人天剛而不失悅者也悅以先民民忘其勞悅以犯難民忘其死悅之大民勸矣哉渙象曰風行水上渙九五渙汗其大號渙王居無咎處尊履正居巽之中散汗大號以盪險阨者也為渙之主唯王居之乃得無咎也節象曰澤上有水節君子以制度數議德行彖曰苦節不可貞其道窮為節過苦則物不能堪也物不能堪則不可復正也悅以行險當位以節中正以通無悅而行險過中而為節則道窮也天地節而四時成節以制度不傷財不害民中孚象曰澤上有風中孚君子以議獄緩死信發於中雖過可亮彖曰中孚柔在內而剛得中悅而巽孚有上四德然後乃孚乃化邦也信立而後邦乃化也柔在內而剛得中各當其所也剛得中則直而正柔在內則靜而順悅而以巽則乖爭不作如此則物無巧競敦實之行著而篤信發乎其中矣豚魚吉信及豚魚魚者蟲之潛隱者也豚者獸之微賤者也爭競之道不興忠信之德淳著則雖微隱之物信皆及之也中孚以利貞乃應天盛之至也小過象曰山上有雷小過君子以行過乎恭喪過乎哀用過乎儉彖曰小過小者過而亨也小者謂凡諸小事也過於小事而通者也過以利貞與時行也過而得以利貞應時宜也施過於恭儉利貞者也柔得中是以小事吉剛失位而不中是以不可大事成大事者必在剛也柔而侵大剝之道也既濟象曰水在火上既濟君子以思患而豫防之存不忘亡既濟不忘未濟也彖曰既濟亨利貞剛柔正而位當剛柔正而位當則邪不可以行矣故唯正乃利貞也九五東鄰之殺牛不如西鄰之禴祭實受其福牛祭之盛者也禴祭之薄者也居既濟之時而處尊位物皆濟矣將何為焉其所務者祭祀而已祭祀之盛莫盛修德故沼沚之毛蘋蘩之菜可羞之於鬼神黍稷非馨明德惟馨是以東鄰殺牛不如西鄰之禴祭實受其福也天尊地卑乾坤定矣卑高以陳貴賤位矣動靜有常剛柔斷矣剛動而柔止也動止得其常體則剛柔之分著矣方以類聚物以群分吉凶生矣方有類物有群則有同有異有聚有分也順其所同則吉乖其所趣則凶故吉凶生矣在天成象在地成形變化見矣象況日月星辰形況山川草木也懸象運轉以成昏明山澤通氣而雲行雨施故變化見也是故鼓之以雷霆潤之以風雨日月運行一寒一暑乾知大始坤作成物乾以易知坤以簡能天地之道不為而善始不勞而善成故曰易簡易則易知簡則易從易知則有親易從則有功有親則可久有功則可大有易簡之德則能成可久可大之功可久則賢人之德可大則賢人之業天地易簡萬物久載其形聖人不為群方各遂其業德業既成則入於形器故以賢人目其德業也易簡而天下之理得矣易與天地准作易以准天地也故能彌綸天地之道仰以觀於天文俯以察於地理知幽明之故知死生之說也幽明者有形無形之象死生者始終之數也知鬼神之情狀與天地相似德合天地故曰相似也知周乎萬物而道濟天下知周萬物則能以道濟天下也樂天知命故不憂順天之化故曰樂也範圍天地之化而不過範圍者擬範天地而周備其理也曲成萬物而不遺曲成者乘變應物不係一方者也則物得宜矣故神無方而易無體神則陰陽不測易則唯變所適不可以一方一體明也仁者見之謂之仁智者見之謂之智百姓日用而不知故君子之道鮮矣君子體道以為用者也體斯道者不亦鮮乎顯諸仁藏諸用衣被萬物故曰顯諸仁日用而不知故曰藏諸用也盛德大業至矣哉富有之謂大業廣大悉備故曰富有日新之謂盛德體化合變故曰日新生生之謂易陰陽轉易以成化生陰陽不測之謂神神也者變化之極也妙萬物而為言不可以形詰者也故曰陰陽不測也夫易廣矣大矣以言乎天地之閒則備矣廣大配天地變通配四時陰陽之義配日月易簡之善配至德易之所載配此四義也子曰易其至矣乎夫易聖人所以崇德而廣業也窮理入神其德崇也兼濟萬物其業廣也天地設位而易行乎其中矣聖人有以見天下之賾而擬諸其形容象其物宜乾剛坤柔各有其體故曰擬諸其形容也擬之而後言議之而後動擬議以成其變化擬議以動則盡變化之道也鳴鶴在陰其子和之我有好爵吾與爾縻之鶴鳴則子和修誠則物應我有好爵與物散之物亦以善應也鶴鳴乎陰氣同則和出言戶庭千里應之出言猶然況其大者乎千里或應況其邇者乎子曰君子居其室出其言善則千里之外應之況其邇者乎居其室出其言不善則千里之外違之況其邇者乎言出乎身加乎民行發乎邇見乎遠言行君子之樞機樞機制動之主樞機之發榮辱之主也言行君子之所以動天地可不慎乎同人先號咷而後笑子曰君子之道或出或處或默或語二人同心其利斷金同人終獲後笑者以有同心之應也夫所況同者豈係乎一方哉君子出處默語不違其中則其雖異道同則應也同心之言其臭如蘭藉用白茅無咎子曰茍錯諸地而可矣藉之用白茅何咎之有慎之至也勞謙君子有終吉子曰勞而不伐有功而不德厚之至也語以其功下人者也德言盛禮言恭謙也者致恭以存其位者也不出戶庭無咎子曰亂之所生也則言語為之階君不密則失臣臣不密則失身機事不密則害成是以君子慎密而不出也子曰為易者其知盜乎言盜亦乘釁而至也易曰負且乘致寇至負也者小人之事也乘也者君子之器也小人而乘君子之器盜思奪之矣上慢下暴盜思伐之矣慢藏誨盜冶容誨淫易曰負且乘致寇至盜之招也子曰易有聖人之道四焉以言者尚其辭以動者尚其變以制器者尚其象以卜筮者尚其占此四存乎器象可得而用者也是以君子將有為也將有行也問焉而以言其受命也如響無有遠近幽深遂知來物非天下之至精其孰能與於此參伍以變錯綜其數通其變遂成天下之文極其數遂定天下之象非天下之至變其孰能與於此易無思也無為也寂然不動感而遂通天下之故非天下之至神其孰能與於此夫易聖人之所以極深而研幾也唯深也故能通天下之志唯幾也故能成天下之務極未形之理則曰深適動微之會則曰幾也唯神也故不疾而速不行而至子曰易有聖人之道四焉者此之謂也四者由聖道以成故曰聖人之道也夫易開物成務冒天下之道如斯而已者也冒覆也言易通萬物之志成天下之務其道可以覆冒天下也是故聖人以通天下之志以定天下之業以斷天下之疑其孰能與於此哉古之聰明叡智神武而不殺者夫服萬物而不以威刑者也是以明於天之道而察於民之故以神明其德一闔一闢謂之變往來不窮謂之通見乃謂之象兆見曰象形乃謂之器成形曰器制而用之謂之法利用出入民咸用之謂之神法象莫大乎天地變通莫大乎四時懸象著明莫大乎日月崇高莫大乎富貴位所以一天下之動而濟萬物也備物致用立成器以為天下利莫大乎聖人探賾索隱鉤深致遠以定天下之吉凶成天下之亹亹莫善乎蓍龜子曰天之所助者順也人之所助者信也履信思乎順是以自天佑之吉無不利天地之道貞觀者也明夫天地萬物莫不保其貞以全其用也日月之道貞明者也天下之動貞夫一者也天地之大德曰生聖人之大寶曰位何以守位曰仁何以聚人曰財財所以資物生也理財正辭禁民為非曰義易曰困於石據於蒺藜子曰非所困而困焉名必辱非所據而據焉身必危子曰小人不恥不仁不畏不義不見利不勸不威不懲小懲而大誡此小人之福也易曰屨校滅趾無咎此之謂也善不積不足以成名惡不積不足以滅身小人以小善為無益而弗為也以小惡為無傷而弗去也故惡積而不可掩罪大而不可解也易曰荷校滅耳凶子曰危者安其位者也亡者保其存者也亂者有其治者也是故君子安不忘危存不忘亡治不忘亂是以身安而國家可保也易曰其亡其亡繫於苞桑子曰德薄而位尊知小而謀大力少而任重鮮不及矣易曰鼎折足覆公餗其形渥凶言不勝其任也子曰知幾其神乎君子上交不諂下交不瀆其知幾乎幾者動之微君子見幾而作不俟終日易曰介於石不終日貞吉定之於始故不待終日君子知微知彰知柔知剛萬夫之望此知幾其神者也子曰顏氏之子其殆庶幾乎有不善未嘗不知知之未嘗復行也易曰不遠復無祇悔元吉子曰君子安其身而後動易其心而後語定其交而後求君子修此三者故全也危以動則民不與也懼以語則民不應也無交而求則民不與莫之與則傷之者至矣子曰履德之基也基所蹈也謙德之柄也復德之本也恒德之固也固不傾移也損德之修也益德之裕也能益物者其德寬大也困德之辯也困而益明夫乾天下之至健也德行恒易以知險夫坤天下之至順也德行恒簡以知阻能悅諸心能研諸侯之慮諸侯物主有為者也能悅萬物之心能精為者之務也定天下之吉凶成天下之亹亹者凡易之情近而不相得則凶近況比爻也將叛者其辭慚中心疑者其辭枝吉人之辭寡躁人之辭多誣善之人其辭游失其守者其辭屈昔者聖人之作易也將以順性命之理也是以立天之道曰陰與陽立地之道曰柔與剛立人之道曰仁與義
