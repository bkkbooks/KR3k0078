body:
  text: 漢書六傳司馬相如字長卿蜀郡人也為郎嘗從上至長楊獵是時天子方好自擊熊豕馳逐野獸相如因上疏諫其辭曰臣聞物有同類而殊能者故力稱烏獲捷言慶忌勇期賁育臣之愚竊以為人誠有之獸亦宜然今陛下好陵阻險射猛獸猝然遇逸材之獸駭不存之地犯屬車之清塵輿不及還轅人不暇施巧雖有烏獲逢蒙之伎力不得施用枯木朽株盡為難矣是胡越起死回生於轂下而羌夷接軫也豈不殆哉雖萬全而無患然本非天子之所宜近也且夫清道而後行中路而馳猶時有銜橛之變況乎涉豐草騁丘墟前有利獸之樂而內無存變之意其為害也不難矣夫輕萬乘之重不以為安樂出萬有一危之塗以為娛臣竊為陛下不取蓋明者遠見於未萌知者避危於無形禍固多臧於隱微而發於人之所忽者也故鄙諺曰家纍千金坐不垂堂此言雖小可以諭大臣願陛下留意幸察上善之公孫弘菑川人也家貧牧豕海上年四十乃學春秋武帝初即位弘年六十以賢良對策焉武帝制曰蓋聞上古至治畫衣冠異章服而民不犯陰陽和五穀登六畜蕃甘露降風雨時嘉禾興朱草生山不童童無草木也澤不涸麟鳳在郊藪龜龍游於沼河洛出圖書父不喪子兄不哭弟舟車所至人跡所及跂行喙息咸得其宜朕甚嘉之今何道而臻乎此天人之道何所本始吉凶之效安所期焉仁義禮智四者之宜當安設施屬統垂業天文地理人事之紀子大夫習焉其悉意正議弘對曰臣聞上古堯舜之時不貴爵賞而民勸善不重刑罰而民不犯躬率以正遇民信也末世貴爵厚賞而民不信也夫厚賞重刑未足以勸善而禁非必信而已矣是故因能任官則分職治去無用之言則事情得不作無用之器即賦斂省不奪民時即百姓富有德者進無德者退則朝廷尊有功者上無功者下則群臣逡罰當罪則奸邪止賞當賢則臣下勸凡此八者治之本也故民者業之即不爭理得則不怨有禮則不暴愛之則親上此有天下之急者也故法不遠義則民服而不離和不遠禮則民親而不暴故法之所罰義之所去也和之所賞禮之所取也禮義者民之所服也而賞罰順之則民不犯禁矣故畫衣冠異章服而民不犯者此道素行也臣聞之氣同則從聲比則應今人主和德於上百姓和合於下故心和則氣和氣和則形和形和則聲和聲和則天地之和應矣故陰陽和風雨時甘露降五穀登山不童澤不涸此和之至也故形和則無疾無疾則不夭故父不喪子兄不哭弟德配天地明並日月則麟鳳至龜龍在郊河出圖洛出書遠方之君莫不悅義奉幣而來朝此和之至也臣聞之仁者愛也義者宜也禮者所履也智者術之原也致利除害兼愛無私謂之仁明是非立可否謂之義進退有度尊卑有分謂之禮擅殺生之柄通壅塞之塗權輕重之數論得失之道使遠近情僞必見於上謂之術凡此四者治之本道之用也皆當設施不可廢也得其要術則天下安樂法設而不用不得其術則主弊於上官亂於下此事之情屬統垂業之本也桀紂行惡受天之罰禹湯積德以王天下因此觀之天德無私親順之和起逆之害生此天文地理人事之紀也太常奏弘第居下策奏天子擢為第一拜為博士待詔金馬門後為丞相卜式河南人也以田畜為事時漢方事胸奴式上書願輸家財半助邊上使使問式欲為官乎式曰自少牧羊不習仕宦不願也使者以聞上乃召拜式為中郎賜爵左庶長田十頃布告天下尊顯以風百姓初式不願為郎上曰吾有羊在上林中欲令子牧之式既為郎布衣草蹻而牧羊歲餘羊肥息上過其羊所善之式曰非獨羊也治民亦猶是矣以時起居惡者輒去無令敗群上奇其言欲試使治民拜式緱氏令緱氏便之遷齊王大傅轉御史大夫贊曰公孫弘卜式兒寬皆以鴻漸之翼困於燕爵漸進也鴻一舉而進千里者羽翼之材也弘等皆以大材初為俗所薄若燕爵不知鴻志也遠羊豕之閒非遇其時焉能致此位乎是時漢興六十餘載海內艾安府庫充實而四夷未賓制度多闕上方欲用文武求之如弗及始以蒲輪迎枚生見主父而歎息群士慕嚮異人並出卜式拔於芻牧弘羊擢於賈豎衛青奮於奴僕日磾出於降虜斯亦曩時板築飯牛之朋已漢之得人於茲為盛儒雅則公孫弘董仲舒兒寬篤行則石建石慶質直則汲黯卜式推賢則韓安國鄭當時定令則趙禹張湯文章則司馬遷相如滑稽則東方朔枚皋應對則嚴助朱買臣歷數則唐都洛下閎協律則李延年運籌則桑弘羊奉使則張騫蘇武將率則衛青霍去病受遺則霍光金日磾其餘不可勝紀是以興造功業制度遺文後世莫及孝宣承統纂修洪業亦講論六藝招選茂異而蕭望之梁丘賀夏侯勝韋玄成嚴彭祖尹更始以儒術進劉向王以文章顯將相則張安世趙充國魏相丙吉于定國杜延年治民則黃霸王成龔遂鄭弘召信臣韓延壽尹翁歸趙廣漢嚴延年張敞之屬皆有功見述於後世參其名臣亦其次也嚴助會稽人也建元三年閩越舉兵圍東甌東甌告急太尉田蚡以為越人相攻擊其常事又數反覆不足煩中國往救也自秦時棄不屬於是助詰蚡曰特患力不能救德不能覆誠能何故棄之且秦舉咸陽棄之何但越也上乃遣助以節發兵浮海救東甌遣兩將軍將兵誅閩越淮南王安上書諫曰今聞有司舉兵將以誅越臣安竊為陛下重之越方外之地翦髮文身之民也不可以冠帶之國法度治也三代之盛胡越不與受正朔非強弗能服威弗能制也以為不居之地不牧之民不足以煩中國也自漢初定以來七十二年吳越人相攻擊者不可勝數然天子未嘗舉兵而入其地也臣聞越非有城郭邑里也處溪谷之閒篁竹之中習於水便於用舟地深昧而多水險中國之人不知其勢阻雖百不當一得其地不可郡縣也攻之不可暴取也以地圖察其山川要塞相去不過寸數而閒獨數百千里阻險林叢弗能盡著視之若易行之甚難越人名為藩臣貢酎之奉不輸大內越國僻遠珍奇之貢宗廟之祭皆不與也大內都內也一卒之用不給上事自相攻擊而陛下以兵救之是反以中國而勞蠻夷也越人愚戇輕薄負約反覆其不用天子之法度非一日之積也一不奉詔舉兵誅之臣恐後兵革無時得息也閒者數年歲比不登賴陛下德澤振救之得毋轉死溝壑今發兵行數千里資衣糧入越地輿轎而踰領轎竹輿車也嶺山嶺也不通車運轉皆擔輿也舟而入水行數百千里夾以深林叢竹水道上下擊石林中多蝮蛇猛獸夏月暑時歐泄霍亂之病相隨屬也曾未施兵接刃死傷者必衆矣前時南海王反陛下先臣使將軍閒忌將兵擊之先臣淮南厲王長也會天暑多雨樓船卒水居擊櫂未戰而病死者過半親老哭泣孤子啼號破家散業迎尸千里之外裹骸骨而歸悲哀之氣數年不息長老至今以為記曾未入其地而禍已至此矣臣聞軍旅之後必有凶年陛下德配天地明象日月恩至禽獸澤及草木一人有飢寒不終其天年而死者為之悽愴於心今方內無狗吠之警而使陛下甲卒死亡暴露中原霑漬山谷邊境之民為之早閉晏開朝不及夕臣安竊為陛下重之不習南方地形者多以越為人衆兵強能難邊城為邊城作難也臣竊聞之與中國異限以高山人絶車道不通天地所以隔外內也且越人綿力薄材不能陸戰又無車騎弓弩之用然而不可入者以保險而中國之人不能其水土也兵未血刃而病死者什二三雖舉越國而虜之不足以償所亡臣聞道路言閩越王弟甲弒而殺之甲以誅死其民未有所屬陛下使重臣臨存施德垂賞以招致之此必委質為藩臣世供貢職陛下以方寸之印丈二之組鎮撫方外不勞一卒不頓一戟而威德並行今以兵入其地此必震恐以有司為欲屠滅之也必雉兔逃入山林險阻背而去之則復相群聚留而守之歷歲經年則士卒疲倦食糧乏絶男子不得耕稼樹種婦人不得紡績織丁壯從軍老弱轉餉居者無食行者無糧民苦兵事亡逃者必衆隨而誅之不可勝盡盜賊必起兵者凶事一方有急四面皆從臣恐變故之生奸邪之作由此始也周易曰高宗伐鬼方三年而剋之鬼方小蠻夷高宗殷之盛天子也以盛天子伐小蠻夷三年而後剋言用兵之不可不重也臣聞天子之兵有征而無戰言莫敢校也如使越人蒙死徼幸以逆執事之顏行在前行故曰顏也廝輿之卒有一不備而歸者雖得越王之首臣猶竊為大漢羞之陛下四海為境九州為家八藪為囿江漢為池生民之屬皆為臣妾陛下垂德惠以覆露之使元元之民安生樂業則澤被萬世施之無窮天下之安猶泰山而四維之也夷狄之地何足以為一日之閒而煩汗馬之勞乎是時漢兵遂出踰嶺適會閩越王弟餘善殺王以降漢兵罷上嘉淮南之意吾丘壽王字子戇趙人也丞相公孫弘奏言民不得挾弓弩十賊弩百吏不敢前害寡而利多此盜賊所以繁也禁民不得挾弓弩則盜賊執短兵短兵接則衆者勝以衆吏捕寡賊其勢必得盜賊有害無利則莫犯法臣愚以為禁民無得挾弓弩便上下其議壽王對曰臣聞古者作五兵非以相害以禁暴討邪安居則以制猛獸而備非常有事則以設守衛而施行陳及至周室衰微諸侯力政強侵弱衆暴寡海內抗弊巧詐並生是以智者陷愚勇者威怯茍以得勝為務不顧義理故機變械飾所以相賊害之具不可勝數秦兼天下廢王道立私議去仁恩而任刑戮墮名城殺豪傑銷甲兵折鋒刃其後民以耰鉏箠梃相撻擊犯法滋衆盜賊不勝至於赭衣塞路群盜滿山卒以亂亡故聖王務教化而省禁防知其不足恃也今陛下昭明德建太平舉俊材興學官宇內日化方外鄉風然而盜賊猶有者郡國二千石之罪非挾弓弩之過也禮曰男子生桑弧蓬矢以舉之明示有事也大射之禮自天子降及乎庶人三代之道也愚聞聖王合射以明教未聞弓矢之為禁也且所為禁者為盜賊之以攻奪也攻奪之罪死然而不止者大奸之於重誅固不避也臣恐邪人挾之而吏不能止良民以自備而抵法禁是擅賊威而奪民救也竊以為無益於禁姦而廢先王之典使學者不得習行其禮不便書奏上以難丞相弘弘詘服焉主父偃齊國人也上書闕下所言九事其八事為律令一事諫伐胸奴曰臣聞國雖大好戰必亡天下雖平忘戰必危天下既平春搜秋獮所以不忘戰也且怒者逆德也兵者凶器也爭者末節也故聖王重之夫務戰勝窮武事未有不悔者也昔秦皇帝任戰勝之威并吞戰國海內為一功齊三代務勝不休欲攻胸奴李斯諫曰夫胸奴無城郭之居委積之守遷徙鳥舉難得而制輕兵深入糧食必絶運糧以行重不及事得其地不足以為利得其民不可調而守也不可和調勝必棄之非民父母靡斃中國甘心胸奴非完計也秦皇帝不聽遂使蒙恬將兵而攻胡卻地千里以河為境發天下丁男以守北河暴兵露師十有餘年死者不可勝數終不踰河而北是豈人衆之不足兵革之不備哉其勢不可也又使天下飛芻挽粟轉輸北河率三十鍾而致一石男子疾耕不足於糧餉女子紡績不足於帷幕百姓靡斃孤寡老弱不能相養道死者相望蓋天下始叛也及至高皇帝定天下略地於邊聞胸奴聚代谷之外而欲擊之御史成諫曰夫胸奴獸聚而鳥散從之如搏景今陛下盛德攻胸奴臣竊危之高帝不聽遂至代谷果有平城之圍高帝悔之乃使劉敬往結和親然後天下無干戈之事故兵法曰興師十萬日費千金秦常積衆數十萬人雖有覆軍殺將係虜單于適足以結怨深讎不足以償天下之費也夫胸奴行盜侵驅所以為業天性固然上自虞夏殷周禽獸畜之不比為人夫不上觀虞夏殷周之統而下循近世之失此臣之所以大恐百姓所疾苦也且夫兵久則變生事苦則慮易使邊境之民靡敝愁苦將吏相疑而外市與外國交市若章邯之比也故尉他章邯得成其私此得失之效也書奏召見乃拜為郎中偃數上疏言事歲中四遷偃說上曰古者諸侯地不過百里強弱之形易制今諸侯或連城數十地方千里緩則驕奢易為淫亂急則阻其強而合從以逆京師今以法割削則逆節萌起前日朝錯是也今諸侯子弟或十數而嫡嗣代立餘雖骨肉毋尺地封則仁孝之道不宣願陛下令諸侯得推恩分子弟以地侯之彼人人喜得所願上以德施實分其國必稍自銷弱矣於是上從其計徐樂燕人也上書曰臣聞天下之患在於土崩不在瓦解古今一也何謂土崩秦之末世是也陳涉無千乘之尊身非王公大人名族之後非有孔曾墨子之賢陶朱猗頓之富然起窮巷奮棘矜偏袒大呼天下從風此其故何也由民困而主不恤下怨而上不知俗以亂而政不修此三者陳涉之所以為資也此之謂土崩故曰天下之患在乎土崩何謂瓦解吳楚齊趙之兵是也七國謀為大逆號皆稱萬乘之君帶甲數十萬威足以嚴其境內財足以勸其士民然不能西攘尺寸之地而身為禽於中原者此其故何也非權輕於匹夫而兵弱於陳涉也當是之時先帝之德未衰而安土樂俗之民衆諸侯無境外之助此之謂瓦解故曰天下之患不在瓦解由此觀之天下誠有土崩之勢雖布衣窮處之士或首難而危海內況三晉之君或存乎天下雖未治也誠能無土崩之勢雖有強國徑兵不得還踵而身為禽也況群臣百姓能為亂乎此二體者安危之明要賢主之所留意而深察也閒者關東五穀數不登年歲未復民多窮困重之以邊境之事推數循理而觀之民宜有不安其處者矣不安故易動易動者土崩之勢也故賢主獨觀萬化之原明安危之機修之廟堂之上而銷未形之患也其要期使天下無土崩之勢而已矣臣聞圖王不成其斃足以安安則陛下何求而不得何威而不成奚征而不服哉嚴安臨菑人也以故丞相史上書曰臣聞鄒子曰政教文質者所以云救也當時則用過則舍之有易則易之故守一而不變者未睹治之至也秦王并吞戰國稱號皇帝一海內之政壞諸侯之城民得免戰國人人自以為更生鄉使秦緩其刑罰薄賦斂省徭役貴仁義賤權利上篤厚下佞巧變風易俗化於海內則世世必安矣秦不行是風循其故俗為智巧權利者進篤厚忠正者退法嚴令苛諂諛者衆日聞其美意廣心逸欲威海外當是時秦禍北搆於胡南掛於越宿兵無用之地進而不得退行十餘年丁男被甲丁女轉輸苦不聊生自經於道樹死者相望及秦皇帝崩天下大叛豪士並起不可勝載也然本皆非公侯之後無尺寸之勢起閭巷杖棘矜應時而動不謀而俱起不約而同會至乎伯王時教使然也秦貴為天子富有天下滅世絶祀窮兵之禍也故周失之弱秦失之強不變之患也今徇南夷朝夜郎降羌僰略穢州東夷也建城邑深入胸奴燔其龍城議者美之此人臣之利非天下之長策也今中國無狗吠之警而外纍於遠方之備靡弊國家非所以子民也行無窮之欲甘心快意結怨於胸奴非所以安邊也禍拿而不解兵休而復起近者愁苦遠者驚駭非所以持久也今天下鍛甲磨劍矯箭控弦轉輸軍糧未見休時此天下所共憂也夫兵久而變起事煩而慮生今外郡之地或幾千里列城數十帶脅諸侯非宗室之利也上觀齊晉所以亡公室卑削六卿大盛也下覽秦之所以滅刑嚴文刻欲大無窮也今郡守之權非特六卿之重也地幾千里非特閭巷之資也甲兵器械非特棘矜之用也以逢萬世之變則不可勝諱也天子納之賈捐之字君房賈誼之曾孫也元帝初珠又反發兵擊之諸縣更叛連年不定上與有司議大發軍捐之建議以為不當擊上使侍中王商詰問捐之曰珠內屬為郡久矣今背叛逆節而云不當擊長蠻夷之亂虧先帝功德經義何以處之捐之對曰孔子稱堯曰大哉韶曰盡善禹曰無閒以三聖之德地方不過數千里欲與聲教則治之不欲與者不強治也故君臣歌德含氣之物各得其宜武丁成王殷周之大仁也然地東不過江黃西不過氐羌南不過蠻荊北不過朔方是以頌聲並作視聽之類咸樂其生越裳氏重九譯而獻此非兵革之所能致及其衰也南征不還秦興兵遠攻貪外虛內務欲廣地不慮其害而天下潰叛賴聖漢初興平定天下至孝文皇帝閔中國未安偃武行文則斷獄數百民賦四十丁男三年而一事時有獻千里馬者詔曰鸞旗在前屬車在後吉行日五十里師行三十里朕乘千里之馬獨先安之於是還馬與道里費而下詔曰朕不受獻也其令四方無求來獻當此之時逸游之樂絶奇麗之賂塞故諡為孝文廟稱太宗至孝武皇帝太倉之粟紅腐而不可食都內之錢貫朽而不可校乃探平城之事録冒頓以來數為邊害籍兵厲馬因富民以攘服之西連諸國至於安息東過碣石以玄菟樂浪為郡北卻胸奴萬里制南海以為八郡則天下斷獄萬數民賦數百造鹽鐵酒榷之利以佐用度猶不能足當此之時寇賊並起軍旅數發父戰於前子於後女子乘亭鄣孤兒號於道老母寡婦飲泣巷哭遙設虛祭想魂乎萬里之外淮南王盜寫虎符公孫勇等詐為使者是皆廓地泰大征伐不休之故也今天下獨有關東關東大者獨有齊楚民衆久困連年流離離其城郭相枕席於道路人情莫親父母莫樂夫婦至嫁妻賣子法不能禁義不能止此社稷之憂也今陛下不忍悁悁之忿欲驅士衆擠之大海之中快心幽冥之地非所以救助飢饉保全元元也駱越之人父子同川而浴與禽獸無異本不足郡縣置也獨居一海之中多毒草蟲蛇水土之害人未見虜戰士自死又非獨珠有珠犀瑁也棄之不足惜不擊不損威其民譬猶魚何足貪也臣竊以往者羌軍言之暴師曾未一年兵出不踰千里費四十餘萬萬大司農錢盡乃以少府禁錢續之夫一隅為不善費尚如此況於勞師遠攻亡士無功乎求之往古則不合施之當今又不便臣愚以為非冠帶之國禹貢所及春秋所治皆可且無以為願遂棄珠專用恤關東為憂對奏丞相于定國以為捐之議是上乃從之遂下詔曰珠虜殺吏民背叛為逆今議者或言可擊或言可守或欲棄之其指各殊朕日夜惟思議者之言羞威不行則欲誅之狐疑避難則守屯田通於時變則憂萬民夫萬民之飢餓與遠蠻之不討危孰大焉且宗廟之祭凶年不備況避不嫌之辱哉今關東大困倉庫空虛無以相贍又以動兵非特勞民凶年隨之其罷珠郡捐之數召見言多納用時中書令石顯用事捐之數短顯以故不得官後稀復見東方朔字曼倩平原人也武帝即位待詔金馬門建元三年上始微行北至池陽西至黃山南至長楊東游宜春夜出夕還後上以為道遠勞苦又為百姓所患乃使吾丘壽王舉籍阿城以南盩厔以東宜春以西提封頃畝及其價直欲除以為上林苑屬之南山壽王奏事上大悅朔進諫曰臣聞謙遜靜愨天表之應應之以福驕溢靡麗天表之應應之以異今陛下纍郎臺恐其不高弋獵之處恐其不廣如天不為變則三輔之地盡可以為苑何必盩厔鄠杜乎奢侈越制天為之變上林雖小臣尚以為大也夫南山天下之大阻也南有江淮北有河渭其地從汧隴以東商雒以西厥壤肥饒漢興去三河之地止霸産以西都涇渭之南此所謂天下陸海之地秦之所以虜西戎兼山東者也其山出玉石金銀銅鐵豫章檀柘異類之物不可勝原此百工所取給萬民所仰足也又有稻栗桑麻竹箭之饒貧者得以人給家足無飢寒之憂故酆鎬之閒號為土膏其價畝一金今規以為苑絶陂池水澤之利而取民膏腴之地上乏國家之用下奪農桑之業棄成功就敗事損耗五穀是其不可一也且盛荊棘之林而長養麋鹿廣狐之苑大虎狼之墟又壞人冢墓發人室廬令幼弱懷土而思耆老泣涕而悲是其不可二也騎馳東西車鶩南北又有深溝大渠夫一日之樂不足以危無隄之輿不敢斥天子故言輿是其不可三也故務苑囿之大不恤農時非所以強國富人也夫殷作九市之宮紂於宮中設九市也而諸侯叛靈王起章華之臺而楚人散秦興阿房之殿而天下亂糞土愚臣忘生觸死逆盛意犯隆指罪當萬死上乃拜朔為大中大夫給事中賜黃金百斤然遂起上林苑武帝時公主貴人多踰禮制天下侈靡趨末百姓多離農畝上從容問朔朕欲化民豈有道乎朔對曰堯舜禹湯文武成康上古之事經數千載尚難言也臣不敢陳願近述孝文皇帝之時當世耆老皆聞見之貴為天子富有四海身衣弋綈足履革舄以韋帶劍莞蒲為席衣縕無文集上書囊以為殿帷以道德為麗以仁義為準於是天下望風成俗昭然化之今陛下以城中為小圖起建章左鳳闕右神明號稱千門萬戶木土衣綺繡狗馬被繢罽宮人簪瑁垂珠璣設戲車教馳逐飾文采叢珍怪撞萬石之鐘擊雷霆之鼓作俳優舞鄭女上為淫侈如此而欲使民獨不奢侈失農事之難者也陛下誠能用臣之計推甲乙之帳甲乙帳名燔之於四通之衢卻走馬示不復用則堯舜之隆宜可與比治矣易曰正其本萬事理失之豪釐差以千里願陛下留意察之朔直言切諫上常用之設非有先生之論其辭曰非有先生仕吳進不稱往古以厲主意退不揚君美以顯其功默然無言者三年矣吳王怪而問之曰談何容易夫談有悖於目咈於耳謬於心而便於身者或有悅於目順於耳快於心而毀於行者非有明王聖主孰能聽之吳王曰何為其然也中人以上可以語上先生試言寡人將聽焉先生對曰昔者關龍逢深諫於桀而王子比干直言於紂此二臣皆極慮盡忠閔主澤不下流而萬民騷動故直言其失切諫其邪者將以為君之榮除主之禍也今則不然反以為誹謗君之行無人臣之禮戮及先人為天下故曰談何容易是以輔弼之臣瓦解而邪諂之人並進遂及飛廉惡來革等二人皆紂時佞臣也二人皆詐僞巧言利口以進其身陰奉雕琢刻鏤之好以納其心務快耳目之欲以茍容為度遂往不戒身沒被戮宗廟崩阤國家為墟故卑身賤體悅色微辭愈愈詬詬終無益於主上之治則志士仁人不忍為也將儼然作矜嚴之色深言直諫上以拂主之邪下以損百姓之害則忤於邪主之心歷於衰世之法如是邪主之行固足畏也故曰談何容易於是吳王懼然易容捐薦去几危坐而聽先生曰接輿避世箕子陽狂此二子者皆避濁世以全其身者也使遇明王聖主得賜清燕之閒寬和之色發憤畢誠圖畫安危揆度得失上以安主體下以便萬民則五帝三王之道可幾而見也故伊尹蒙恥辱負鼎俎以干湯太公釣於渭之陽以見文王心合意同謀無不成計無不從深念遠慮引義以正其身推恩以廣下本仁祖義裒有德祿賢能誅惡亂總遠方一統類美風俗此帝王所由昌也上不變天性下不奪人倫則天地和洽遠方懷之故號聖王於是裂地定封爵為公侯傳國子孫名顯後世民到於今稱之以遇湯與文王也太公伊尹以如此龍逢比干獨如彼豈不哀哉故曰談何容易
