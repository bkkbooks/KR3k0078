body:
  text: 後漢書四傳延篤字叔堅南陽人也為京兆尹時皇子有疾下郡縣出珍藥而大將軍梁冀遣客齎書詣京兆并貨牛黃篤發書收客曰大將軍椒房外家而皇子有疾必應陳進醫方豈當使客千里求利乎遂殺之冀慚而不得言有司承旨欲求其事篤以疾免歸也史弼字公謙陳留人也為北軍中侯是時桓帝弟勃海王悝素行險辟僭傲多不法弼懼其驕悖為亂乃上封事曰臣聞帝王之於親戚愛雖隆必示之以威體雖貴必禁之以度如是和睦之道興骨肉之恩遂昔周襄王恣甘昭公孝景皇帝驕梁孝王二弟階寵終用慢卒周有播蕩之禍漢有爰盎之變竊聞勃海王悝憑至親之屬恃偏私之愛失奉上之節有僭慢之心外聚剽輕不逞之徒內荒酒樂出入無常所與群居皆有口無行或家之棄子或朝之斥臣必有羊勝伍被之變州司不敢彈傅相不能匡輔陛下隆於友于不忍遏絶恐遂滋蔓為害彌大乞露臣奏宣示百僚詔公卿平處其法法決罪定乃下不忍之詔如是則聖朝無傷親之譏勃海有享國之慶不然懼大獄將興使者相望於路矣不勝憤悶謹冒死以聞帝以至親不忍下其事後悝竟坐逆謀貶為癭陶王弼遷河東太守當舉孝廉弼知多權貴請託乃豫敕斷絶書屬中常侍侯覽果遣諸生齊書請之並求假鹽稅積日不得通生乃說以他事謁弼而因達覽書弼大怒曰太守忝荷重任當選士報國爾何人而詐僞無狀命左右引出楚捶數百即日考殺之侯覽大怨遂詐作飛章下司隸誣弼誹謗檻車徵下廷尉詔獄得減死罪一等陳蕃字仲舉汝南人也為太尉時小黃門趙津南陽大猾張汜等奉事中官乘勢犯法二郡太守劉成考案其罪雖經赦令而並竟考殺之宦官怨恚有司承旨遂奏鑕罪當棄市又山陽太守翟超沒入中常侍侯覽財産東海相黃浮誅殺下邳令徐宣超浮並坐髡鉗輸作左校蕃與司徒劉矩司空劉茂共諫請等帝不悅有司劾奏之矩茂不敢復言蕃乃獨上疏曰臣聞齊桓修霸務為內政今寇賊在外四支之疾內政不理心腹之患臣寢不能寐食不能飽實憂左右日親忠言以疏內患漸積外難方深陛下超從列侯繼承天位小家畜産百萬之資子孫尚恥失其先業況乃産兼天下受之先帝而欲懈怠以自輕忽乎誠不愛己不當念先帝得之勤苦邪前梁氏五侯毒遍海內天啓聖意收而戮之天下之議冀當小平明鑒未遠覆車如昨而近習之權復相扇結小黃門趙津大猾張汜等肆行貪虐奸媚左右前太原太守劉南陽太守成而戮之雖言赦後不當誅殺原其誠心在乎去惡而小人道長熒惑聖聽遂使天威為之發怒如加刑已為過甚況乃重罰令伏歐刃乎又前山陽太守翟超東海相黃浮奉公不撓疾惡如讎超沒侯覽財物浮誅徐宣之罪並蒙刑坐不逢赦恕覽之縱橫沒財已幸宣犯舋過死有餘辜昔丞相申屠嘉召責鄧通洛陽令董宣折辱公主而文帝從而請之世祖加以重賞未聞二臣有專命之誅而今左右群豎惡傷黨類妄相交搆致此刑譴聞臣是言當復啼訴陛下深宜割塞近習豫政之源引納尚書朝省之事簡練清高斥黜佞邪如是天和於上地洽於下休禎符瑞豈遠乎哉陛下雖厭毒臣言人主有自勉強敢以死陳帝得奏愈怒竟無所納朝廷衆庶莫不怨之宦官由此疾蕃彌甚李膺等以黨事下獄考實蕃因上疏諫曰臣聞賢明之君委心輔佐亡國之主諱聞直辭故湯武雖聖而興於伊呂桀紂迷惑亡在失人由此言之君為元首臣為股肱同體相須共成美惡者也伏見前司隸校尉李膺大僕杜密大尉掾范滂等正身無玷死心社稷以忠忤旨橫加考案或禁錮閉隔或死徙非所杜塞天下之口聾盲一代之人與秦焚書坑儒何以為異昔武王克殷表閭封墓今陛下臨政先誅忠賢遇善何薄待惡何優夫讒人似實巧言如簧使聽之者惑視之者昏夫吉凶之效在乎識善成敗之機在於察言人君者攝天地之政秉四海之維舉動不可以違聖法進退不可以離道規謬言出口則亂及八方何況髡無罪於獄殺無辜於市乎又青徐炎旱五穀損傷人物流遷茹菽不足而宮女積於房掖國用盡於羅紈外戚私門貪財受賂所謂祿去公室政在大夫昔春秋之末周德衰微數十年閒無復災眚者天所棄也天之於漢悢悢無已故殷勤示變以悟陛下除妖去孽實在修德臣位列台司憂責深重不敢尸祿惜生坐觀成敗如蒙採録使身首分裂異門而出所不恨也帝諱其言切託以蕃辟召非其人遂策免之靈帝即位竇太后臨期以蕃為太傅録尚書事蕃與后父大將軍竇武同心盡力徵用名賢共參政事天下之士莫不延頸想望太平而帝乳母趙嬈旦夕在太后側中常侍曹節王甫等與共交搆諂事太后太后信之數出詔命有所封拜及其支類多行貪虐蕃常疾之志誅中官會竇武亦有謀蕃乃先上疏曰臣聞言不直而行不正則為欺乎天而負乎人危言極意則群凶側目禍不旋踵鈞此二者臣寧得禍不敢欺天也今京師囂囂道路喧譁言侯覽曹節等與趙夫人諸女尚書並亂天下附從者升進忤逆者中傷方今一朝群臣如河中木耳泛泛東西耽祿畏害陛下前始攝位順天行誅蘇康管霸並伏其辜是時天地清明人鬼歡喜奈何數月復縱左右元惡大奸莫此之甚今不急誅必生變亂傾危社稷其禍難量太后不納蕃因與竇武謀之及事泄曹節等矯詔誅武等遂令收蕃即日害之論曰桓靈之代若陳蕃之徒咸能樹立風聲抗論俗而驅馳嶮坑之中與刑人腐夫同朝爭衡終取滅亡之禍者彼非不能潔情志違埃霧也愍夫世士以離俗為高而人倫莫能相恤也以遁世為非義故屢退而不去以仁心為己任雖道遠而彌厲及遭值際會協策竇武自謂萬世一遇也懍懍乎伊望之業矣功雖不終然其信義足以攜持世心漢代亂而不亡百餘年閒數公之力也竇武字游平扶風人拜城門校尉清身疾惡時國政多失內官專寵李膺杜密等為黨事考逮上疏諫曰臣聞明主不諱譏刺之言以探幽暗之實忠臣不恤諫爭之患以暢萬端之事是以君臣並熙名奮百世臣豈敢懷祿逃罪不竭其誠陛下初從藩國爰登帝祚天下逸豫謂當中興自即位以來未聞善政梁孫寇鄧雖或誅滅而常侍黃門續為禍虐欺罔陛下競行譎詐自造制度妄爵非人朝政日衰奸臣日強臣恐二世之難必將復及趙高之變不朝則夕近者奸臣牢修造設黨議遂收前司隸校尉李膺太僕杜密御史中丞陳翔太尉掾范滂等逮考連及數百人曠年拘録事無效驗臣惟膺等建忠抗節志經王室此誠陛下稷契伊呂之佐而虛為姦臣賊子之所誣枉天下寒心海內失望惟陛下留神澄省時見理出以厭人鬼喁喁之心臣聞近臣尚書令陳蕃僕射胡廣尚書朱寓荀緄劉祐魏朗劉矩尹勳等皆國之貞士朝之良佐尚書郎張淩媯皓范康楊喬邊韶戴恢等文質彬彬明達國典內外之職群才并列而陛下委任近習專樹叨餮外典州郡內幹心膂宜以次貶黜抑奪宦官欺國之封案其無狀誣罔之罪信任忠良平決臧否使邪正毀譽各得其所寶愛天官唯善是授如此咎徵可消天應可待閒者有嘉禾芝草黃龍之見夫瑞生必於嘉士福至實由善人在德為瑞無德為災陛下所行不合天意不宜稱慶書奏因以疾上還城門校尉槐里侯印綬帝不許有詔原李膺杜密等其冬帝崩靈帝立拜武為大將軍常居禁中武既輔朝政常有誅翦宦官之計太傅陳蕃亦素有謀武乃白太后曰故事黃門常侍但當給事省內典門戶主近署財物耳今乃使與政事而任權重子弟布列專為貪暴天下胸胸正以此故宜悉誅廢以清朝廷長樂五官史朱瑀盜發武奏罵曰中官放縱者自可誅耳我曹何罪而當盡見族滅因大呼曰陳蕃竇武奏白太後廢帝為大逆曹節聞之驚起白帝請出御德陽前殿拜王甫為黃門令甫將虎賁羽林追圍武武自殺梟首洛陽都亭收捕宗親賓客姻屬悉誅之遷太后於雲臺也循吏傳初光武長於民閒頗達情僞見稼穡艱難百姓病害至天下已定務用安靜解王莽之繁密還漢世之輕法身衣大練色無重綵耳不聽鄭衛之音手不持珠玉之玩宮房無私愛左右無偏恩建武十三年異國有獻名馬者日行千里又進寶劍價兼百金詔以馬駕鼓車劍賜騎士損上林池之官廢騁望弋獵之事數引公卿郎將列于禁坐廣求民瘼觀納風謠故能內外匪懈百姓寬息自臨宰邦邑者競能其官若杜詩守南陽號為杜母任延錫光移變邊俗斯其績用之章章者也又第五倫宋均之徒亦足有可稱談然建武永平之閒吏事刻深亟以謠言單辭轉易守長故朱浮數上諫書針切峻政鍾離意等亦規諷殷勤以長者為言而不能得也所以中興之美蓋未盡焉任延字長孫南陽人也拜會稽都尉時年十九迎官驚其壯及到靜泊無為唯先遣饋祠延陵季子聘請高行如董子儀嚴子陵等敬待以師友之禮掾吏貧者輒分奉祿以賑給之是以郡中賢士大夫爭往官焉建武初延上書乞骸骨歸拜王庭詔徵為九真太守九真俗以射獵為業不知牛耕民常告糴交址每致困乏延乃鑄作田器教之墾闢百姓充給又駱越之民無嫁娶禮法各因淫好不識父子之性夫婦之道延乃使男女皆以年齒相配其貧無禮聘令長吏以下各省奉祿以賑助之同時相娶者二千餘人是歲風雨順節穀稼豐衍其産子者始知種姓咸曰使我有是子者任君也多名子為任於是徼外蠻夷夜郎等慕義保塞延遂止罷偵候戍卒初平帝時漢中錫光為交址太守教導民夷漸以禮義化聲侔於延王莽末閉境拒守建武初遣使貢獻封鹽水侯嶺南革風始於二守焉延視事四年徵詣洛陽九真吏民生為立祠拜武威太守帝親見戒之曰善事上官無失名譽延對曰臣聞忠臣不私私臣不忠履正奉公臣子之節上下雷同非陛下之福也善事上官臣不敢奉詔帝歎息曰卿言是也董宣字少平陳留人也為洛陽令時湖陽公主蒼頭白日殺人因匿主家吏不能得及主出行以奴驂乘宣於夏門亭候之乃駐車叩馬數主之失叱奴下車因挌殺之主即還宮訴帝帝大怒召宣欲箠殺之宣曰陛下聖德中興而縱奴殺良民將何以治天下乎臣不須箠請得自殺即以頭擊楹流血被面帝令小黃門持之使宣叩頭謝主宣不從帝強使頓之宣兩手據地終不肯俯主曰文叔為白衣時臧亡匿死吏不敢至門今為天子威不能行一令乎帝笑曰天子不與白衣同因敕強項令出賜錢三十萬搏擊豪強莫不震栗京師號為臥虎歌之曰枹鼓不鳴董少平也論曰古者敦厖善惡易分至畫衣冠異服色而莫之犯叔世偷薄上下相蒙德義不足以相洽化導不能以懲違乃嚴刑痛殺以暴治奸倚疾邪之公直濟忍苛之虐情與夫斷斷守道之吏何工否之殊乎故嚴君蚩黃霸之術密民笑卓茂之政猛既窮矣而猶或未勝然朱邑不以笞辱加物袁安未嘗鞫人臧罪而猾惡自禁民不欺犯何者以為威辟既用而茍免之行興仁信道孚故感被之情著茍免者威則奸起感被者人亡而思存由一邦以言天下則刑訟繁措可得而求矣宦者傳周禮閽者守中門之禁寺人掌女宮之戒然宦人之在王朝其來舊矣漢興仍襲秦制置中常侍官然亦引用士人以參其選及高后稱制乃以張卿為大謁者出入臥內受宣詔命至於孝武數宴後庭潛游離宮故請奏機事多以宦人主之元帝之世史游為黃門令勤心納忠有所補益其後弘恭石顯以佞險自進卒有蕭周之禍損穢帝德焉中興之初宦官悉用閹人自明帝以後委用漸大非復掖庭永巷之職閨牖房闥之任也其後孫程定立順之功曹騰參建桓之策因公正恩固主心故中外服從上下屏氣舉動回山海呼吸變霜露阿旨曲求則光寵三族直情忤意則參夷五宗漢之綱紀大亂矣若夫高冠長劍紆朱懷金者布滿宮闈苴茅分虎南面臣民者蓋以十數府署第館列於都鄙子弟支附過半於州國南金和寶冰紈霧縠之積盈仞珍藏嬙媛侍兒歌童舞女之玩充備綺室狗馬飾雕文土木被緹繡皆剝割萌黎競恣奢欲搆害明賢專樹黨類敗國蠹政之事不可單書所以海內嗟毒志士窮棲寇劇緣閒搖亂區夏雖忠良懷憤時或奮發而言出禍從旋見孥戮凡稱善士莫不離被災毒斯亦運之極乎單超河南人徐璜下邳人具瑗魏郡人左悺河南人唐衡潁川人也桓帝初超璜瑗為中常侍悺衡為小黃門史初梁冀兩妹為順桓二帝皇后冀代父商為大將軍再世權戚威振天下冀自誅李固杜喬等驕橫益甚皇后乘勢忌恣多所鴆毒上下鉗口莫有言者帝逼畏久恆懷不平延熹二年皇后崩帝因如廁獨呼衡問左右與外舍不相得者皆誰乎衡對單超左悺徐璜具瑗常私忿疾外舍放橫口不敢道於是帝呼超悺璜瑗等五人遂定其議詔收冀及宗親黨與誅之悺衡遷中常侍封超新豐侯二萬戶璜武原侯瑗東武陽侯各萬五千戶賜錢各千五百萬悺上蔡侯衡汝陽侯各萬三千戶賜錢各千三百萬五人同日封故世謂之五侯又封小黃門劉普趙忠等八人為鄉侯自是權歸宦官朝廷日亂矣超疾病帝遣使者就拜車騎將軍薨賜東園祕器棺中玉具贈侯將軍印綬使者治喪及葬發五營騎士侍御史護喪將作大匠起冢塋其後四侯轉橫天下為之語曰左回天具獨坐徐臥虎唐兩墮皆競起第宅樓觀壯麗窮極伎巧金銀罽毦施於犬馬多取良人美女以為姬妾皆珍飾華侈擬則宮人其僕從皆乘牛車而從列騎又養其疏屬或乞嗣異姓或買蒼頭為子並以傳國襲封兄弟姻戚皆宰州臨郡辜駮百姓與盜賊無異五侯宗族賓客虐遍天下民不堪命起為寇賊衡卒亦贈車騎將軍如超故事司隸校尉韓演奏悺罪惡及其兄大僕南鄉侯稱請託州郡聚斂為姦賓客放縱侵犯吏民悺稱皆自殺演又奏瑗兄沛相恭贓罪徵詣廷尉瑗詣獄謝貶為都鄉侯卒於家超及璜衡襲封者並降為鄉侯子弟分封者悉奪爵土劉普等貶為關內侯侯覽者山陽人也桓帝初為中常侍以佞猾進倚藝貪放受納貨遺以巨萬計爵關內侯又託以與議誅梁冀功進封高鄉侯覽兄參為益州刺史民有豐富者輒誣以大逆皆誅滅之沒入財物前後纍億計大尉楊秉奏參檻車徵於道自殺參車重三百餘兩皆金銀錦帛珍玩不可勝數覽坐免旋復復官建寧二年喪母還家大起塋冢督郵張儉因舉奏覽貪侈奢縱前後請奪人宅三百八十一所田百一十八頃起立第宅十有六區皆有高樓池苑堂閣相望飾以綺畫丹漆之屬制度深廣僭類宮省又豫作壽冢石槨雙闕高廡百尺破人居室發掘墳墓虜奪良民妻略婦子及諸罪舋請誅之而覽伺候遮截章竟不上儉遂破覽冢宅籍沒資財具言罪狀又奏覽母生時交通賓客干亂郡國復不得御覽遂誣儉為鉤黨及故長樂少府李膺太僕杜密等皆夷滅之遂領長樂太僕熹平元年有司舉奏覽專權驕奢策收印綬自殺阿黨者皆免曹節字漢豐南陽人也建寧元年持節將中黃門虎賁羽林千人北迎靈帝陪乘入宮及即位以定策封長安鄉侯時竇太后臨朝后父大將軍武與太傅陳蕃謀誅中官節與長樂五官史朱瑀從官史張亮中黃門王尊等十七人共矯詔以長樂食監王甫為黃門令將兵誅武蕃等節遷長樂衛尉封育陽侯甫遷中常侍黃門令如故瑀封都鄉侯亮等五人各三百戶餘十一人皆為關內侯歲食租二千斛賜瑀錢五千萬餘各有差後更封華容侯二年節病困詔拜為車騎將軍有頃疾瘳復為中常侍位特進秩中二千石尋轉大長秋熹平元年竇太后崩有何人書朱雀闕言天下大亂曹節王甫幽殺太后常侍侯覽多殺黨人公卿皆尸祿無有忠言者於是詔司隸校尉劉猛逐捕猛以誹書言直不肯急捕月餘主名不立猛坐右轉諫議大夫以禦史中丞段熲代猛乃四出逐捕及太學遊生擊者千餘人節等怨猛不已使熲以他事奏猛抵罪輸左校節遂與王甫等誣奏桓帝弟勃海王悝謀反誅之以功封者十二人甫封冠軍侯節亦增邑四千六百戶父兄子弟皆為公卿列校牧守令長布滿天下也呂強字漢盛河南人也少以宦者小黃門遷中常侍清忠奉公靈帝時例封宦者以強為都鄉侯強辭讓懇惻帝乃聽之因上疏陳事曰臣聞諸侯上象四七下裂王土高祖重約非功臣不侯所以重天爵明勸戒也伏聞中常侍曹節王甫等並為列侯節等讒諂媚主佞邪徼寵放毒人物嫉忠良有趙高之禍未被轘裂之誅掩朝廷之明成私樹之黨而陛下不悟妄授茅土世為藩輔受國重恩不念爾祖述修厥德而交結邪黨下比群佞陛下惑其瑣才特蒙恩澤又授位乖越陽陽乖刺罔不由茲臣誠知封事已行言之無逮所以冒死幹觸陳愚忠者實願陛下捐改既謬從此一止又今外戚四姓貴幸之家及中官公族無功德者造起館舍凡有萬數雕刻之飾不可單言喪葬踰制奢麗過禮競相放效莫肯矯拂上之化下猶風之靡草今上無去奢之儉下有縱欲之斃至使禽獸食民之甘木土衣民之帛昔師曠諫晉平公曰梁柱衣繡民無褐衣池有棄酒士有渴死廄馬秣粟民有飢色近臣不敢諫遠臣不得暢此之謂也又聞前召議郎蔡雍對問於金商門而令中常侍曹節王甫詔書喻旨雍不敢懷道迷國而切言極對毀刺貴臣譏呵豎宦陛下不密其言至令宣露群邪競欲咀嚼造作飛條陛下回受誹謗致雍刑罪室家徙放老幼流離豈不負忠臣哉今群臣皆以雍為戒上畏不測之難下懼劍客之害臣知朝廷不復得聞忠言矣夫立言無顯過之咎明鏡無見玼之尤如惡立言以記過則不當學也不欲明鏡之見玼則不當照也願陛下詳思臣言不以記過見玼為責張讓潁川人趙忠安平人也少時給事省中靈帝時讓忠並遷中常侍封列侯與曹節王甫等相為表裏節死後忠領大長秋讓有監奴典任家事交通貨賂威形喧赫扶風人孟他資産饒贍與奴朋結傾竭饋問無所遺愛奴咸德之問他曰君何所欲力能辦也他曰吾望汝曹為我一拜耳時賓客求謁讓者車恆數百千兩他時詣讓後至不得進監奴乃率諸蒼頭迎拜於路遂輿車入門賓客咸驚謂他善於讓皆爭以珍玩賂之他分以遺讓讓大喜遂以他為涼州刺史是時讓忠及夏惲郭勝孫璋畢嵐栗嵩段圭高望張恭韓悝宋典十二人皆為中常侍封侯貴寵父兄子弟布列州郡所在貪殘為人蠹害黃巾既作盜賊糜沸郎中中山張鈞上書曰竊惟張角所以能興兵作亂萬民所以樂附之者其源皆由十常侍多放父兄子弟婚親賓客典據州郡辜榷財利侵掠百姓百姓之冤無所告訴故謀議不軌聚為盜賊宜斬十常侍懸頭南郊以謝百姓又遺使者布告天下可不須師旅而大寇自消天子以鈞章示讓等皆免冠徒跣頓首乞自致洛陽詔獄並出家財以助軍費有詔皆冠履視事如故帝怒鈞曰此真狂子也鈞復重上猶如前章輒寢不報詔使廷尉侍御史考為張角道者御史承讓等旨遂誣奏鈞學黃巾道收掠死獄中后中常侍封諝徐奏事獨發覺坐誅帝因怒詰讓等曰汝曹常言黨人欲為不軌皆令禁錮或有伏誅今黨人更為國用汝曹反與張角通為可斬未皆叩頭云故中常侍王甫侯覽所為帝乃止明年南宮災讓忠等說帝令斂天下田畝稅十錢以修宮室發大原河東狄道諸郡材木及文石每州郡部送至京師黃門常侍輒令譴呵不中者因強折賤買十分雇一因復貨之於宦官復不為即受材木遂至腐積宮室連年不成刺史太守復增私調百姓呼嗟凡詔所徵求皆令西園騶密約敕號曰中使恐動州郡多受賕賂刺史二千石及茂才孝廉遷除皆責助軍修宮錢大郡至二三千萬餘各有差當之官者皆先至西園諧價然後得去有錢不畢者或至自殺其守清者乞不之官皆迫遣之時巨鹿太守河內司馬直新除以有清名減責三百萬直被詔悵然曰為民父母而反割剝百姓以稱時求吾不忍也辭疾不聽行至孟津上書極陳當世之失古今禍敗之戒即吞藥自殺書奏帝為暫時絶修宮錢又造萬金堂於西園引司農金錢繒帛仞積其中又還河閒買田宅起第觀帝本侯家宿貧每歎桓帝不能作家居故聚為私藏復寄小黃門常侍錢各數千萬常云張常侍是我父趙常侍是我母官得志無所憚畏並起第宅擬則宮室帝常登永安候臺宦官恐其望見居處乃使中大夫尚但諫曰天子不當登高登高則百姓虛散自是不敢復升臺榭復以忠為車騎將軍帝崩中軍校尉袁紹說大將軍何進令誅中官謀泄讓忠等因進入省遂共殺進而紹勒兵斬忠捕宦官無少長悉斬之讓等數十人劫質天子走之河上追急皆投河而死也儒林傳序昔王莽更始之際天下散亂禮樂分崩典文殘落及光武中興愛好經術未及下車而先訪儒邪採求闕文補綴漏逸先是四方學士多懷挾圖書遁逃林藪自是莫不抱負墳策雲會京師於是立五經博士各以家法教授太常差次總領焉建武五年乃修起太學稽式古典籩豆干戚之容備之於其列服方領習矩步者委他乎其中中元元年初建三雍明帝即位親行其禮天子始冠通天衣日月備法物之駕盛清道之儀坐明堂而朝群後登靈臺以望雲物袒割辟雍之上尊養三老五更後復為功臣子孫四姓末屬別立校舍搜選高能以授其業自期門羽林之士悉令通孝經章句胸奴亦遣子入學濟濟乎洋洋乎盛於永平矣建初中大會諸儒於白虎觀考詳同異連月乃罷肅宗親臨稱制如石渠故事孝和亦數幸東觀覽閲書林及鄧後稱制學者頗懈安帝覽政薄於藝文博士倚席不講朋徒相視怠散學舍頽敝鞠為園蔬牧兒蕘豎至薪刈其下順帝感翟酺之言乃更修黌宇試明經下第補弟子除郡國耆儒皆補郎舍人本初元年詔曰大將軍下至六百石悉遣子就學每歲輒於鄉射月一饗會之自是遊學增盛至三萬餘生然章句漸疏而多以浮華相尚儒者之風蓋衰矣熹平四年靈帝乃詔諸儒正定五經刊於石碑為古文篆隸三體書法以相參檢樹之學門使天下咸取則焉逸民傅周黨字伯況太原人也世祖引見黨伏而不謁自陳願守所志帝乃許焉博士范升奏毀黨曰臣聞堯不須許由巢父而建號天下周不待伯夷叔齊而王道以成伏見太原周黨陛見帝庭不以禮屈伏而不謁偃蹇驕悍誇上求高皆大不敬書奏天子以示公卿詔曰自古明王聖主必有不賓之士伯夷叔齊不食周粟太原周黨不受朕祿亦各有志焉其賜帛四十匹黨遂隱居嚴光字子陵會稽人也少有高名與世祖同遊學及世祖即位光乃變名姓隱身不見帝乃令以物色訪之至舍於北軍給床褥大官朝夕進膳車駕幸其館光臥不起帝即其臥所撫光腹曰咄咄子陵不可相助為治耶光臥不應良久乃張目熟視曰昔唐堯著德巢父洗耳士故有志何至相迫乎帝曰子陵我竟不能下汝耶於是升輿歎息而去復引光入論道舊故相對纍日除為諫議大夫不屈乃耕於富春山年八十終於家帝傷惜之賜錢百萬穀千斛漢濱老父者不知何許人也桓帝延熹中幸竟陵過雲夢臨沔水百姓莫不觀者有老父獨耕不輟尚書郎南陽張溫異之使問曰人皆來觀老父獨不輟何也父笑而不對溫自與言老父曰我野人耳不達斯語請問天下亂而立天子耶理而立天子耶立天子以父天下耶役天下以奉天子耶昔聖王宰世茅茨採椽而萬民以寧今子之君勞民自縱逸遊無忌吾為子羞之子何忍欲人觀之乎溫大慚問其名姓不告而去西羌建武九年司徒掾班彪上言今涼州部郡皆有降羌羌胡被髮左衽而與漢人雜處習俗既異言語不通數為小吏黠民所侵奪窮恚無聊故悉致反叛夫蠻夷寇亂皆為此也宜明威防世祖從之十一年夏先零種復寇臨洮隴西太守馬援破降之徙置天水隴西扶風三郡明年武都參狼羌反援又破降之永平元年復遣捕虜將軍馬武等擊滇吾滇吾遠去餘悉散降徙七千口置三輔章和十二年金城太守侯霸與迷唐戰羌衆折傷種人瓦解降者六千餘口分徙漢陽安定隴西永初中諸降羌布在郡縣皆為吏民豪右所徭役積以愁怨同時奔潰大為寇掠斷隴道時羌歸附既久無復器甲或持竹竿木枝以代戈矛或負板案以為楯或執銅鏡以象兵郡縣不能制遣車騎將軍鄧征西校尉任尚副將五營及三輔兵合五萬人屯漢陽使尚率諸郡兵與滇零等戰於平襄尚軍大敗於是滇零自稱天子於北地招集武都參狼上郡西河諸雜種衆遂大盛東犯趙魏南入益州寇鈔三輔斷隴道湟中諸縣粟石萬錢百姓死亡不可勝數朝廷不能制而轉運難劇遂詔還師留任尚屯漢陽復遣騎都尉任仁督諸郡屯兵仁戰每不利衆羌乘勝漢兵數挫羌遂入寇河東至河內百姓相驚多奔南度河使北軍中候朱寵將五營士屯孟津詔魏郡趙國常山中山繕作塢候六百一十六所羌既轉盛而二千石令長並無守戰意皆爭上徙郡縣以避寇難朝廷從之遂移隴西徙襄武安定徙美陽北地徙池陽上郡徙衙百姓戀土不樂去舊遂乃刈其禾稼發徹室屋夷營壁破積聚時連旱蝗饑荒而驅蹙劫略流離分散隨道死亡或棄捐老弱或為人僕妾喪其大半自羌叛十餘年閒兵連師老不暫寧息軍旅之費轉運委輸用二百四十餘億府帑空竭延及內郡邊民死者不可勝數并涼二州遂至虛耗論曰中興以後邊難漸大朝規失綏御之和戎師騫然諾之信其內屬者或倥於豪右之手或屈折於奴僕之勤塞候時清則憤怒而思禍桴革暫動則屬鞬而鳥驚故永初之閒群種蜂起自西戎作逆未有淩斥上國若斯其熾者也嗚呼昔先王疆理九土判別畿荒知夷貊殊性難以道御故斥遠諸華薄其貢職唯與辭要而已若二漢御戎之方失其本矣何則先零侵境趙充國遷之內地當煎作寇馬援徙之三輔貪其暫安之勢信其馴服之情計日用之權宜忘經世之遠略豈夫識微者之為乎故微子垂泣於象箸辛有浩歎於伊川也鮮卑熹平三年夏育為護烏桓校尉六年夏鮮卑寇三邊秋育上言請徵幽州諸郡兵出塞擊之帝乃拜田晏為破鮮卑中郎將大臣多有不同乃召百官議議郎蔡雍議曰書載猾夏易伐鬼方周有獫狁蠻荊之師漢有闐顏瀚海之事征討殊類所由尚矣然而時有同異勢有可否故謀有得失事有成敗不可齊也武帝情存遠略志闢四方南誅百越北討強胡西征大宛東并朝鮮因文景之蓄積藉天下之餘饒數十年閒官民俱匱既而覺悟乃息兵罷役封丞相為富民侯故主父偃曰夫務戰勝窮武事未有不悔者也夫以武帝神武將師良猛財富充實所拓廣遠猶有悔焉況今人財並乏事劣昔時乎昔段熲良將習兵善戰有事西羌猶十餘年今育晏才策未必過熲鮮卑種衆不弱于前而虛計二載自許有成若禍結兵連豈得中休當復徵發衆人轉運無已是為耗竭諸夏並力蠻夷夫邊垂之患手足之蚧搔中國之困胸背之瘭疽也昔高祖忍平城之恥呂后棄慢書之詬方之於今何者為甚天設山河秦築長城漢起塞垣所以別內外異殊俗也茍無蹙國內侮之患則可矣豈與蟲蟻校寇計爭往來哉雖或破之豈可殄盡而方令本朝為之旰食乎昔淮南王安諫伐越曰如使越人蒙死以逆執事廝輿之卒有一不備而歸者雖得越王之首猶為大漢羞之而欲以齊民易醜虜皇威辱外夷就如其言猶巳危矣況乎得失不可量耶昔珠崖郡反孝元皇帝納賈捐之言而下詔罷珠崖郡此元帝所以發德音也夫恤人救急雖成郡列縣尚猶棄之況障塞之外未曾為民居者乎守邊之術李牧善其略保塞之論嚴尤申其要遺業猶在文章具存循二子之策守先帝之規臣曰可矣帝不從遂遣夏育出高柳田晏出雲中胸奴中郎將臧旻率南單于出鴈門檀石槐命三部大人各師衆逆戰育等大敗喪其節傳輜重各將數千騎奔還死者十七八緣邊莫不被毒也
