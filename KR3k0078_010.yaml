body:
  text: 孝經仲尼居仲尼孔子字曾子侍曾子孔子弟子也子曰先王有至德要道子者孔子以順天下民用和睦上下無怨以用也睦親也至德以教之要道以化之是以民用和睦上下無怨也汝知之乎曾子避席曰參不敏何足以知之參名也參不達子曰夫孝德之本也人之行莫大於孝故曰德之本也教之所由生也教人親愛莫善於孝故言教之所由生復坐吾語汝身體髮膚受之父母不敢毀傷孝之始也立身行道揚名於後世以顯父母孝之終也夫孝始於事親中於事君終於立身大雅云無念爾祖聿脩厥德大雅者詩之篇名無念無忘也聿述也脩治也為孝之道無敢忘爾先祖當脩治其德矣孝經子曰愛親者不敢惡於人愛其親者不敢惡於他人之親敬親者不敢慢於人已慢人之親人亦慢已之親故君子不為也愛敬盡於事親盡愛於母盡敬於父而德教加於百姓敬以直內義以方外故德教加於百姓也形於四海形見也德教流行見四海也蓋天子之孝也呂刑云一人有慶兆民賴之呂刑尚書篇名一人謂天子天子為善天下皆賴之在上不驕高而不危諸侯在民上故言在上敬上愛下謂之不驕故居高位而不危殆也制節謹度滿而不溢費用約儉謂之制節奉行天子法度謂之謹度故能守法而不驕逸也高而不危所以長守貴也居高位能不驕所以長守貴也滿而不溢所以長守富也雖有一國之財而不奢泰故能長守富富貴不離其身富能不奢貴能不驕故云不離其身然後能保其社稷上能長守富貴然後乃能安其社稷而和其民人薄賦斂省傜役是以民人和也蓋諸侯之孝也詩云戰戰兢兢如臨深淵如履薄冰戰戰恐懼兢兢戒慎如臨深淵恐墜如履薄冰恐陷非先王之法服不敢服非先王之法言不敢道不合詩書不敢道非先王之德行不敢行不合禮樂則不敢行是故非法不言非詩書則不言非道不行非禮樂則不行口無擇言身無擇行言滿天下無口過行滿天下無怨惡三者備矣然後能守其宗廟法先王服言先王道行先王德則為備矣蓋卿大夫之孝也詩云夙夜匪懈以事一人夙早也夜暮也一人天子也唧大夫當早起夜臥以事天子勿懈惰資於事父以事母而愛同事父與母愛同敬不同也資於事父以事君而敬同事父與君敬同愛不同故母取其愛而君取其敬兼之者父也兼并也愛與母同敬與君同并此二者事父之道也故以孝事君則忠移事父孝以事於君則為忠也以敬事長則順移事兄敬以事於長則為順矣忠順不失以事其上事君能忠事長能順二者不失可以事上也然後能保其祿位而守其祭祀蓋士之孝也詩云夙興夜寐無忝爾所生忝辱也所生謂父母士為孝當早起夜臥無辱其父母也因天之道春生夏長秋收冬藏順四時以奉事天道分地之利分別五士視其高下此分地之利謹身節用以養父母行不為非為謹身富不奢泰為節用度財為費父母不乏也此庶人之孝也故自天子至於庶人孝無終始而患不及己者未之有也總說五孝上從天子下至庶人皆當孝無終始能行孝道故患難不及其身未之有者言未之有也曾子曰甚哉孝之大也上從天子下至庶人皆當為孝無終始曾子乃知孝之為大子曰夫孝天之經也春秋冬夏物有死生天之經也地之義也山川高下水泉流通地之義也民之行也孝悌恭敬民之行也天地之經而民是則之天有四時地有高下民居其閒當是而則之則天之明則視也視天四時無失其早晚也因地之利因地高下所宜何等以順天下是以其教不肅而成以用也用天四時地利順治天下下民皆樂之是以其教不肅而成也其政不嚴而治政不煩苛故不嚴而治也先王見教之可以化民也見因天地教化民之易也是故先之以博愛而民莫遺其親先修人事流化於民也陳之以德義而民興行上好義則民莫敢不服也先之以敬讓而民不爭若文王敬讓於朝虞芮推畔於野上行之則下效法之道之以禮樂而民和睦上好禮則民莫敢不敬示之以好惡而民知禁善者賞之惡者罰之民知禁不敢為非也子曰昔者明王之以孝治天下不敢遺小國之臣古者諸侯歲遣大夫聘問天子天子待之以禮此不遺小國之臣者也而況於公侯伯子男乎古者諸侯五年一朝天子天子使世子郊迎芻禾百車以客禮待之故得萬國之歡心以事其先王諸侯五年一朝天子各以其職來助祭宗廟是得萬國之歡心事其先王也治國者不敢侮於鰥寡而況於士民乎治國者諸侯也故得百姓之歡心以事其先君治家者不敢失於臣妾之心而況於妻子乎故得人之歡心以事其親夫然故生則親安之養則致其樂故親安之也祭則鬼饗之祭則致其嚴故鬼饗之是以天下和平上下無怨故和平災害不生風雨順時百榖成熟禍亂不作君惠臣忠父慈子孝是以禍亂無緣得起也故明王之以孝治天下也如此故上明王所以災害不生禍亂不作以其孝治天下故致於此詩云有覺德行四國順之覺大也有大德行四方之國順而行之也曾子曰敢問聖人之德無以加於孝乎子曰天地之性人為貴貴其異於萬物也人之行莫大於孝孝者德之本又何加焉孝莫大於嚴父莫大尊嚴其父嚴父莫大於配天尊嚴其父莫大於配天生事愛敬死為神主也則周公其人也尊嚴其父配食天者周公為之昔者周公郊祀后稷以配天郊者祭天名后稷者周公始祖宗祀文王於明堂以配上帝文王周公之父明堂天子布政之宮上帝者天之別名是以四海之內各以其職來祭周公行孝朝越裳重譯來貢是得萬國之歡心也夫聖人之德又何以加於孝乎孝悌之至通於神明豈聖人所能加聖人因嚴以教敬因親以教愛因人尊嚴其父教之為敬因親近於其父教之為愛順人情也聖人之教不肅而成聖人因人情而教民民皆樂之故不肅而成也其政不嚴而治其身正不令而行故不嚴而治其所因者本也本謂孝也父子之道天性也性常也君臣之義也君臣非有天性但義合耳父母生之續莫大焉父母生子骨肉相連屬復何加焉君親臨之厚莫重焉君親擇賢顯之以爵寵之以祿厚之至也故不愛其親而愛他人者謂之悖德人不能愛其親而愛他人親者謂之悖德不敬其親而敬他人者謂之悖禮不能敬其親而敬他人之親者謂之悖禮也以順則逆以悖為順則逆亂之道也民無則焉則法不在於善而皆在於凶德惡人不能以禮為善乃化為惡若桀紂是也雖得之君子所不貴不以其道故君子不貴君子則不然言思可道君子不為逆亂之道言中詩書故可傳道也行思可樂動中規矩故可樂也德義可尊可尊法也作事可法可法則也容止可觀威儀中禮故可觀進退可度難進而盡忠易退而補過以臨其民是以其民畏而愛之畏其刑罰愛其德義則而象之故能成其德教而行其政令詩云淑人君子其儀不忒淑善也忒差也善人君子威儀不差可法則也子曰孝子之事親居則致其敬養則致其樂樂竭歡心以事其親病則致其憂喪則致其哀祭則致其嚴五者備矣然後能事親事親者居上不驕雖尊為君而不驕也為下不亂為人臣下不敢為亂也在醜不爭醜類也以為善不忿爭居上而驕則亡富貴不以其道是以取亡也為下而亂則刑為人臣下好作亂則刑罰及其身在醜而爭則兵朋友中好為忿爭者惟兵刃之道三者不除雖日用三牲之養猶為不孝夫愛親者不敢惡於人之親今反驕亂分爭雖日致三牲之養豈得為孝子子曰五刑之屬三千五形者謂墨劓臏宮大辟也而罪莫大於不孝要君者無上事君先事而後食祿今反要君此無尊上之道非聖人者無法非侮聖人者不可法非孝者無親已不自孝又非他人為孝不可親此大亂之道也事君不忠侮聖人言非孝者大亂之道也子曰教民親愛莫善於孝教民禮順莫善於悌移風易俗莫善於樂夫樂者感人情樂正則心正樂淫則心淫也安上治民莫善於禮上好禮則民易使禮者敬而已矣敬禮之本有何加焉故敬其父則子悅敬其兄則弟悅敬其君則臣悅敬一人而千萬人悅所敬者寡悅者眾所敬一人是其少千萬人悅是其眾此之謂要道也孝悌以教之禮樂以化之此謂要道也子曰君子之教以孝非家至而日見之也但行孝於內流化於外也教以孝所以敬天下之為人父者也天子父事三老所以敬天下老也教以悌所以敬天下之為人兄者也天子兄事五更所以教天下悌也教以臣所以敬天下之為人君者也天子郊則君事天廟則君事尸所以教天下臣詩云愷悌君子民之父母以上三者教於天下真民之父母非至德其孰能順民如此其大者乎至德之君能行此三者教於天下也子曰君子之事親孝故忠可移於君欲求忠臣出孝子之門故可移於君事兄悌故順可移於長以敬事兄則順故可移於長也居家理故治可移於官君子所居則化所在則治故可移於官也是以行成於內而名立於後世矣曾子曰若夫慈愛恭敬安親揚名則聞命矣敢問子從父之命可謂孝乎子曰是何言與是何言與昔者天子有爭臣七人雖無道不失其天下七人者謂大師大保大傅左輔右弼前疑後丞維持王者使不危殆諸侯有爭臣五人雖無道不失其國大夫有爭臣三人雖無道不失其家尊卑輔善未聞其官士有爭友則身不離於令名令善也士卑無臣故以賢友助已父有爭子則身不陷於不義故當不義則爭之從父之命又焉得為孝乎委曲從父命善亦從善惡亦從惡而心有隱豈得為孝乎子曰昔者明王事父孝故事天明盡孝於父則事天明事母孝故事地察盡孝於母能事地察其高下視其分察也長幼順故上下治卑事於尊幼順於長故上下治天地明察神明彰矣事天能明事地能察德合天地可謂彰也故雖天子必有尊也言有父也雖貴為天子必有所尊事之若父三老是也必有先也言有兄也必有所先事之若兄五更是也宗廟致敬不忘親也設宗廟四時齋戒以祭之不忘其親脩身慎行恐辱先也脩身者不敢毀傷慎行者不歷危殆常恐其辱先也宗廟致敬鬼神著矣事生者易事死者難聖人慎之故重其文孝悌之至通於神明光於四海無所不通孝至於天則風雨時孝至於地則萬物成孝至於人則重譯來貢故無所不通也詩云自西自東自南自北無思不服孝道流行莫敢不服子曰君子之事上也進思盡忠退思補過將順其美匡救其惡故上下能相親也君臣同心故能相親有子曰孔子弟子有若也君子務本本立而道生孝悌也者其仁之本與先能事父兄然後仁可成子曰巧言令色鮮矣仁子孔子巧言好其言語令色善其顏色皆欲令人悅之少能有仁也曾子曰孔子弟子曾參也吾日三省吾身為人謀而不忠乎與朋友交而不信乎傳不習乎言凡所傳之事得無素不講習而傳之者也子曰導千乘之國導謂為之政教也敬事而信為國者舉事必敬慎與民必誠信也節用而愛人節用不奢侈也國以民為本故愛養之使民以時不妨奪農務也子曰弟子入則孝出則悌謹而信汎愛眾而親仁行有餘力則以學文文者古之遺文子夏曰孔子弟子卜商也事父母能竭其力事君能致其身盡忠節不愛其身也與朋友交言而有信雖曰未學吾必謂之學矣子曰君子不重則不威學則不固主忠信無友不如己者過則勿憚改主親也憚難也曾子曰慎終追遠民德歸厚慎終者喪盡其哀追遠者祭盡其敬人君行此二者民化其德皆歸於厚也有子曰禮之用和為貴先王之道斯為美小大由之有所不行知和而和不以禮節之亦不可行也人知禮貴和而每事從和不以禮為節亦不可行也為政子曰為政以德譬如北辰居其所而眾星共之德者無為猶北辰之不移而眾星共之子曰詩三百篇之大數一言以蔽之曰思無邪歸於正也子曰導之以政政謂法教齊之以刑民免而無恥茍免導之以德德謂道德齊之以禮有恥且格格正也子曰君子周而不比忠信為周阿黨為比小人比而不周哀公問曰何謂則民服哀公魯君謚也孔子對曰舉直錯諸枉則民服錯置也舉正直之人用之廢置邪枉之人則民服其上舉枉錯諸直則民不服季康子問使民敬忠以勸如之何康子魯唧季孫肥也子曰臨之以莊則敬莊嚴也君臨民以嚴則民敬上也孝慈則忠君能上孝於親下慈於民則民忠矣舉善而教不能則勸舉用善人而教不能則民勸子曰人而無信不知其可也無信其餘終無可也大車無輗小車無軏其何以行之哉大車牛車輗轅端橫木以縛軛者小車駟馬車軏轅端上曲鉤衡者也林放問禮之本林放魯人子曰禮與其奢也寧儉喪與其易也寧戚易和易言禮之本意失於奢不如儉也喪失於和易不如哀戚祭如在言事死如事生祭神如神在謂祭百神定公問君使臣臣事君如之何定公魯君謚孔子對曰君使臣以禮臣事君以忠子曰居上不寬為禮不敬臨喪不哀吾何以觀之哉里仁子曰君子無終食之閒違仁造次必於是顛沛必於是造次急遽也顛沛僵仆也雖急遽僵仆不違仁也子曰民之過也各於其黨觀過斯知仁矣此黨謂族親也過厚則仁過薄則不仁也子曰朝聞道夕死可矣子曰能以禮讓為國乎何有何有者言不難也不能以禮讓為國乎如禮何如禮何者言不能用禮也子曰見賢思齊焉見不賢而內自省也子曰以約失之者鮮矣俱不得中奢則驕溢招禍儉約則無憂患也子曰君子欲訥於言而敏於行訥遲鈍也言欲遲行欲疾公冶長子貢問曰孔文子何以謂之文孔文子衛大夫孔圉子曰敏而好學不恥下問是以謂之文敏者識之疾也子謂子產有君子之道四焉子產公孫僑也其行已也恭其事上也敬其養民也惠其使民也義子曰巧言令色足恭足恭便僻貌也左丘明恥之丘亦恥之丘明魯大史也子曰已矣乎吾未見能見其過而內自訟者也訟猶責也言人有過莫能自責也雍也哀公問弟子孰為好學孔子對曰有顏回者好學不遷怒不貳過不幸短命死矣顏回孔子弟子也遷者移也不貳過有不善未嘗復行也述而子曰德之不修學之不講聞義不能徙也不善不能改也是吾憂也夫子常以此四者為憂也子之所慎齊戰疾慎齊尊祖考慎戰重民命慎疾愛性命也子曰我三人行必得我師焉擇其善者而從之其不善者而改之言我三人行本無賢愚擇善從之不善改之故無常師子曰仁遠乎哉我欲仁斯仁至矣仁道不遠行之則是太伯子曰恭而無禮則勞慎而無禮則葸葸畏懼之貌也言慎而不以禮節之則常畏懼勇而無禮則亂直而無禮則絞絞刺君子篤於親則民興於仁故舊不遺則民不偷興起也能厚於親屬不遺忘其故舊行之美者也則皆化之起為仁厚之行不偷薄曾子曰士不可以不弘毅任重而道遠弘大也毅強而能斷也士弘毅然後能負重任致遠路也仁以為己任不亦重乎死而後已不亦遠乎仁以為己任重莫重焉死而後已遠莫遠焉子曰如有周公之才之美使驕且其餘不足觀也已子曰不在其位不謀其政欲各專一於其職也子曰學如不及猶恐失之言此者勉人學也子曰巍巍乎舜禹有天下而不與焉美其有成功能擇任賢臣子曰大哉堯之為君也巍巍乎唯天為大唯堯則之則法也美堯能法天而行化也蕩蕩乎民無能名焉蕩蕩廣遠之稱也言布其德廣遠民無能識名焉煥乎其有文章也煥明也其立文垂制又著明舜有臣五人而天下治禹稷契皋陶伯益也武王曰予有亂臣十人亂治也治官者十人謂周公召公太公畢公榮公大顛閎天散宜生南宮适其一人謂文母也孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而已斯此也言堯舜交會之閒比於此周周盛多賢然尚有一婦人其餘九人而已人才難得豈不然乎子曰禹吾無閒然矣菲飲食而致孝乎鬼神惡衣服而致美於黻冕卑宮室而盡力溝洫禹吾無閒然矣閒非也菲薄也致孝子鬼神謂祭祀豐潔也黻祭服之衣冕冠名也子罕子曰譬如為山未成一簣止吾止也簣土籠也此勸人於道德也為山者其功雖已多未成一籠而中道止者我不以其前功多而善之見其志不遂故不與也譬如平地雖覆一簣進吾往也平地者將進加功雖始覆一簣我不以其功少而簿之據其欲進而與之顏淵顏淵問仁子曰克己復禮為仁克己約身一日克己復禮天下歸仁焉一日猶見歸況終身乎為仁由己而由人乎哉行善在己不在人曰請問其目知其必有條目故請問之子曰非禮勿視非禮勿聽非禮勿言非禮勿動此四者克己復禮之目曰回雖不敏請事斯語矣敬事此語必行之仲弓問仁子曰出門如見大賓使民如承大祭仁之道莫尚乎敬己所不欲勿施於人在邦無怨在家無怨在邦為諸侯在家為卿大夫子張問明子曰浸潤之譖膚受之愬不行焉可謂明也已子張孔子弟子顓孫師也譖人之言如水之浸潤以漸成之膚受皮膚外語非其內實也浸潤之譖膚受之愬不行焉可謂遠也已無此二者非但為明其德行高遠人莫之及也子貢問政子曰足食足兵民信之矣子貢曰必不得已而去於斯三者何先曰去兵曰必不得已而去於斯二者何先曰去食自古皆有死民無信不立死者古今常道人皆有之治邦不可失信哀公問於有若曰年饑用不足如之何對曰盍徹乎盍何不也周法什一而稅謂之徹也曰二吾猶不足如之何其徹也二謂什二而稅對曰百姓足君孰與不足百姓不足君孰與足子張問崇德辨惑辨別子曰主忠信徙義崇德也徙義見義則徙意從之愛之欲其生惡之欲其死既欲其生又欲其死是惑也愛惡當有常一欲生之一欲死之是心惑也子曰聽訟吾猶人與人等必也使無訟乎化之在前子曰君子成人之美不成人之惡小人反是季康子問政孔子孔子對曰政者正也子帥而正孰敢不正康子魯上卿諸臣之帥季康子患盜問孔子孔子對曰茍子之不欲雖賞之不竊言民化於上不從其令從其所好季康子問於孔子曰如殺無道以就有道何如就成也欲多殺以止姦也對曰子為政焉用殺子欲善而民善矣君子之德風也小人之德草也草上之風必偃亦欲康子先自正也偃仆也加草以風無不仆者猶民之化於上也樊遲曰敢問崇德修慝辨惑孔子弟子樊須也慝惡也修治也治惡為善子曰先事後得非崇德與先勞於事然後得報攻其惡毋攻人之惡非修慝與一朝之忿忘其身以及其親非惑與樊遲問智曰知人樊遲未達子曰舉直措諸枉能使枉者直舉正直之人用之廢邪枉之人則皆化為直也樊遲退見子夏曰何謂也子夏曰舜有天下選於眾舉皋陶不仁者遠矣湯有天下選於眾舉伊尹不仁者遠矣言舜湯有天下選擇於眾舉皋陶伊尹則不仁者遠仁者至矣子路子路問政子曰先之勞之孔子弟子仲由也先導之以德使人信之然後勞之易曰悅以使民民忘其勞請益曰毋倦子路嫌其少故請益曰無倦者行此上事無倦則可矣仲弓為季氏宰問政子曰先有司孔子弟子冉雍也言為政當先任有司而後責其事也赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸汝所不知者人將自舉之各舉其所知則賢才無遺矣子路曰衛君待子而為政子將奚先問往將何所先行之也子曰必也正名乎正百事之名也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中禮以安上樂以移風二者不行則有淫刑濫罰矣刑罰不中則民無所措手足故君子名之必可言言之必可行也所名之事必可得而明言也所言之事必可得而遵行子曰上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情情情實也言民化上各以實應也夫如是則四方之民襁負其子而至矣子曰其身正不令而行其身不正雖令不從令教令也子適衛冉子僕冉有御也子曰庶矣哉庶眾也言衛民多也冉有曰既庶矣又何加焉曰富之曰既富矣又何加焉曰教之子曰善人為邦百年亦可以勝殘去殺矣勝殘勝殘暴之人使不為惡也去殺不用刑殺也誠哉是言也古有此言孔子信之子曰如有王者必世而後仁三十年曰世如有受命王者必三十年仁政乃成子曰茍正其身於從政乎何有不能正其身如正人何定公問一言而可以興國有諸孔子對曰言不可以者是其幾也以其大要一言不能興國也幾近也有近一言興國也人之言曰為君難為臣不易如知為君之難也不幾乎一言而興邦乎事不可一言而成知如此則可近之曰一言而喪邦有諸孔子對曰言不可以若是其幾也人之言曰予無樂乎為君唯其言而莫予違也言無樂於為君所樂者唯樂其言而不見違也如善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎人君所言善無違之者則善也所言不善而無敢違之者則近一言而喪國矣葉公問政葉公名諸梁子曰近者悅遠者來子夏為莒父宰問政莒父魯下邑也子曰毋欲速毋見小利欲速則不達見小利則大事不成事不可以速成而欲其速則不達矣小利妨大則大事不成矣樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也雖之夷狄無禮義之處猶不可棄去而不行之子曰南人有言曰人而無恒不可以作巫醫南國之人也言巫醫不能治無常之人善夫善南人之言也子曰君子和而不同小人同而不和君子心和然其所見各異故曰不同小人所嗜好者同然各爭利故曰不和也子貢問曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之善人善己惡人惡己是善善明惡惡著也子曰君子易事而難悅也不責備於一人故易事也悅之不以道不悅也及其使人也器之度才而官之小人難事而易悅也悅之雖不以道悅也及其使人也求備焉子曰君子泰而不驕小人驕而不泰君子自縱泰似驕而不驕小人拘忌而實自驕矜也子曰以不教民戰是謂棄之言用不習之民使之戰必破敗是為棄之憲問子曰有德者必有言有言者不必有德仁者必有勇有勇者不必有仁子曰君子而不仁者有矣夫未有小人而仁者也雖曰君子猶未能備也子問公叔文子於公明賈曰信乎夫子不言不笑不取公叔文子衛大夫對曰以告者過也夫子時然後言人不厭其言也樂然後笑人不厭其笑義然後取人不厭其取也子謂衛靈公之無道也季康子曰夫如是奚而不喪孔子曰仲叔圉治賓客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪言雖無道所任者各當其才何為當亡也子路問事君子曰勿欺而犯之事君之道義不可欺當犯顏諫爭子曰不逆詐不億不信抑亦先覺者是賢乎有人來不逆之以為詐不億疑之以為有不信然而人有詐不信有以先發知之是人賢逆詐億不信所以恨恥之也子路問君子子曰修己以敬敬其身也曰如斯而已乎曰修己以安百姓修己以安百姓堯舜其猶病諸病猶難也衛靈公子曰無為而治者其舜也與夫何為哉恭己正南面而已矣言任官得其人故無為也子張問行子曰言忠信行篤敬雖蠻貊之邦行矣言不忠信行不篤敬雖州里行乎哉行乎哉言不可行也子張書諸紳紳大帶也子曰志士仁人無求生以害仁有殺身以成仁無求生而害仁死而後成仁則志士仁人不愛其身也顏淵問為邦子曰行夏之時據見萬物之生以為四時之始取其易知也乘殷之輅大輅越席昭其儉也服周之冕取其黈纊塞耳不任視聽樂則韶舞韶舜樂也盡善盡美故取之放鄭聲遠佞人鄭聲淫佞人危俱能惑人心使淫亂危殆故當放遠之也子曰人而無遠慮必有近憂子曰臧文仲其竊位者與知柳下惠之賢而不與立也文仲魯大夫也柳下惠展禽也知賢不舉為竊位也子曰躬自厚而薄責於人則遠怨矣責己厚責人薄所以遠怨咎也子曰君子求諸己小人求諸人君子責己小人責人子曰君子不以言舉人有言者不必有德故不可以言舉人也不以人廢言子貢問曰有一言而可終身行者乎子曰其恕乎己所不欲勿施於人子曰巧言亂德小不忍亂大謀巧言利口則亂德義小不忍則亂大謀子曰眾惡之必察焉眾好之必察焉或眾阿黨比周或其人特立不群故好惡不可不察也子曰人能弘道非道弘人材大者道隨大材小者道隨小故不能弘人也子曰過而不改是謂過矣子曰吾嘗終日不食終夜不寢以思無益不如學也季氏季氏將伐顓臾冉有季路見於孔子孔子曰求無乃爾是過與冉有曰夫子欲之吾二臣者皆不欲也歸咎於季氏孔子曰求周任有言曰陳力就列不能者止周任古之良史也言當陳才力度已所任以就其位不能則當止危而不持顛而不扶則將焉用彼相矣言輔相人者當能持危扶顛若不能何用相為也且爾言過矣虎兕出於柙龜玉毀於櫝中是誰之過與柙檻也櫝櫃也失虎毀玉非典守者過耶冉有曰今夫顓臾固而近於費固城郭完堅兵甲利也費季氏邑今不取後世必為子孫憂孔子曰求君子疾夫疾如汝言舍曰欲之而必為之辭舍其貪利之說而更作他辭是所疾丘也聞有國有家者不患寡而患不均不患土地人民之寡少患政治之不均平不患貧而患不安憂不能安民耳民安國富蓋均無貧和無寡安無傾政教均平則不患貧矣上下和同則不患寡矣大小安寧不傾危矣夫如是故遠人不服則修文德以來之既來之則安之今由與求也相夫子遠人不服而不能來也邦分崩離析而不能守也而謀動干戈於邦內吾恐季孫之憂不在顓臾而在蕭牆之內也蕭之言肅也牆謂屏也君臣相見之禮至屏而加肅敬焉是以謂之蕭牆後季氏家臣陽虎果囚季桓子也孔子曰益者三友損者三友友直友諒友多聞益矣友便辟便辟巧避人所忌以求容媚友善柔面柔者也友便佞損矣便辯也謂佞而辯孔子曰益者三樂損者三樂樂節禮樂動則得禮樂之節樂道人之善樂多賢友益矣樂驕樂恃尊貴以自恣樂佚遊佚遊出入不節樂宴樂損矣宴樂沈荒淫黷也三者自損之道孔子曰侍於君子有三愆言未及之而言謂之躁躁不安靜言及之而不言謂之隱隱匿不盡情實未見顏色而言謂之瞽未見君子顏色所趨向而便逆先意語者猶瞽者也孔子曰君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛戒之在及其老也血氣既衰戒之在得得貪得也孔子曰君子有三畏畏天命順吉逆凶天之命畏大人大人即聖人與天地合德也畏聖人之言小人不知天命而不畏狎大人侮聖人之言孔子曰生而知之者上也學而知之者次也困而學之又其次也困謂有所不通也困而不學民斯為下矣孔子曰君子有九思視思明聽思聰色思溫貌思恭言思忠事思敬疑思問忿思難見得思義孔子曰見善如不及見不善如探湯齊景公有馬千駟死之日民無得而稱焉千駟四千疋也伯夷叔齊餓於首陽之下首陽山名民到於今稱之其斯之謂與此所謂以德為稱陽貨子曰性相近也習相遠也君子慎所習子張問仁於孔子孔子曰能行五者於天下為仁矣請問之曰恭寬信敏惠恭則不侮不見侮也寬則得眾信則人任焉敏則有功應事疾則多成功惠則足以使人子曰由汝聞六言六蔽乎對曰未居吾語汝好仁不好學其蔽也愚仁者愛物不知所以裁之則愚也好智不好學其蔽也蕩蕩無所適守好信不好學其蔽也賊父子不知相為隱之輩好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂狂妄抵觸人也子曰禮云禮云玉帛云乎哉言禮非但崇此玉帛而已所貴者乃貴其安上治民樂云樂云鍾鼓云乎哉樂之所貴者移風易俗也非但謂鐘鼓而已子曰鄙夫可與事君也哉言不可與事君其未得之也患得之患得之者患不能得之既得之患失之茍患失之無所不至矣無所不至者言邪媚無所不為子曰惡紫之奪朱也惡其邪好而奪正色惡鄭聲之亂雅樂也惡其邪音而亂雅樂惡利口之覆邦家也利口之人多言少實茍能悅媚時君傾覆國家也子貢曰君子亦有惡乎子曰有惡惡稱人惡者好稱說人惡所以為惡也惡居下流而訕上者訕謗毀也惡勇而無禮者惡果敢而窒者窒塞曰賜也亦有惡乎惡徼以為智者徼抄也抄人之意以為己有惡不遜以為勇者惡訐以為直者訐謂攻發人之陰私柳下惠為士師士師典獄之官也三黜人曰子未可以去乎曰直道而事人焉往而不三黜茍直道以事人所至之國俱當復三黜枉道而事人何必去父母之邦周公謂魯公魯公周公之子伯禽也曰君子不施其親施易也不以他人之親易己之親不使大臣怨乎不以以用也怨不見聽用也故舊無大故則不棄也無求備於一人大故謂惡逆之事也子張子夏曰小人之過也必文文飾其過不言情實也子夏曰君子信而後勞其民未信則以為厲己也厲病信而後諫未信則以為謗己也孟氏使陽膚為士師陽膚曾子弟子也士師典獄官也問於曾子曾子曰上失其道民散久矣如得其情則哀矜而勿喜民之離散為輕漂犯法乃上之所為非民之過也當哀矜之勿自喜能得其情也子貢曰紂之不善也不如是之甚也是以君子惡居下流天下之惡皆歸焉紂為不善以喪天下後世憎之甚皆以天下之惡歸之於紂也子貢曰君子之過也如日月之食焉過也人皆見之更也人皆仰之更改也堯曰朕躬有罪無以萬方萬方有罪罪在朕躬無以萬方萬力不與也萬方有罪我身之過雖有周親不如仁人親而不賢不忠則誅之管蔡是也仁人箕子微子來則用之百姓有過在予一人謹權量審法度修廢官四方之政行焉權秤也量斗斛興滅國繼絕世舉逸民天下之民歸心焉所重民食喪祭重民國之本也重食民之命也重喪所以盡哀也重祭所以致敬也寬則得眾敏則有功公則悅言政公平則氏悅矣凡此五帝三王所以治故傳以示後世也子張問政於孔子曰何如斯可以從政矣子曰尊五美屏四惡斯可以從政矣屏除也子張曰何謂五美子曰君子惠而不費勞而不怨欲而不貪泰而不驕威而不猛子張曰何謂惠而不費子曰因人所利而利之不亦惠而不費乎利民在政無費於財擇可勞而勞之又誰怨欲仁而得仁又焉貪君子無眾寡無小大無敢慢言君子不以寡小而慢之斯不亦泰而不驕乎君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎子張曰何謂四惡子曰不教而殺謂之虐不戒視成謂之暴不宿戒而責目前成為視成也慢令致期謂之賊與民無信而虛刻期猶之與人也出納之吝謂之有司謂財物俱當與人而吝嗇於出內惜難之此有司之任耳非人君之道
