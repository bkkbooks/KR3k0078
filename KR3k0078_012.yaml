body:
  text: 史記上本紀黃帝者少典之子姓公孫有熊國君少典之子也名曰軒轅生而神靈弱而能言幼而徇齊徇疾也齊速也言聖德幼而疾速也長而敦敏成而聰明神農氏世衰諸侯相侵伐而神農氏弗能征於是軒轅乃習用干戈修德振兵以與炎帝戰於阪泉之野阪泉地名三戰然後得其志蚩尤作亂乃殺蚩尤而代神農氏是為黃帝東至于海西至于空桐山名也在隴右南至于江北逐葷粥獫狁也邑于涿鹿之阿遷徙往來無常處以師兵為營衛置左右大監監于萬國舉風后力牧常先大鴻以治民順天地之紀時播百穀勞勤心力耳目節用水火材物有土德之瑞故號黃帝帝王世紀曰神農氏衰蚩尤氏叛不用帝命黃帝於是脩德撫民始垂衣裳以班上下刳木為舟剡木為楫舟楫之利以濟不通服牛乘馬以引重致遠重門擊柝以待暴客斷木為杵掘地為臼杵臼之用以利萬人弦木為弧剡木為矢弧矢之利以威天下諸侯咸叛神農而歸之討蚩尤氏禽之于涿鹿之野諸侯有不服者從而征之凡五十二戰而天下大服俯仰天地置眾官故以風后配上台天老配中台五聖配下台謂之三公其餘地典力牧常先大鴻等或以為師或以為將分掌四方各如已視故號曰黃帝四目又使岐伯嘗味草木典醫疾今經方本草之書咸出焉其史倉頡又象鳥始作文字自黃帝以上穴居而野處死則厚衣以薪葬之中野結繩以治及至黃帝為築宮室上棟下宇以待風雨而易以棺槨制以書契百官以序萬民以察神而化之使民不倦後作雲門咸池之樂周禮所謂大咸者也於是人事畢具黃帝在位百年而崩年百一十歲矣或傳以為仙或言壽三百年故宰我疑以問孔子孔子曰民賴其利百年而崩民畏其神百年而亡民用其教百年而移故曰三百年帝顓頊高陽者黃帝之孫昌意之子也養材以任地載時以象天依鬼神以制義治氣以教化絜誠以祭祀北至于幽陵南至于交趾西濟于流沙東至于蟠木東海中有山焉名度索上有大桃樹屈蟠三千里也動靜之物大小之神日月所照莫不砥屬砥平也四遠皆平而來服屬也帝王世紀曰帝顓頊平九黎之亂使南正重司天以屬神火正黎司地以屬民於是民神不雜萬物有序帝嚳高辛者高陽高辛皆所興地名也顓頊與嚳以字為號上古質故也黃帝之曾孫也生而神靈聰以知遠明以察微仁而威惠而信修身而天下服取地之財而節用之撫教萬民而利誨之歷日月而迎送之明鬼神而敬事之其色郁郁其德嶷嶷其動也時其服也士日月所照風雨所至莫弗從服帝王世紀曰帝嚳以人事紀官故以句芒為木正祝融為火正蓐收為金正玄冥為水正后土為土正是五行之官分職而治帝堯放勛其仁如天其智如神就之如日望之如雲富而不驕貴而不舒帝王世紀曰帝堯置欲諫之鼓命羲和四子羲仲羲叔和仲和叔分掌四時方嶽之職故名徵天下大和百姓無事有五老人擊壤於道觀者歎曰大哉堯之德也老人曰日出而作日入而息鑿井而飲耕田而食帝力何有於我哉墨子以為堯堂高三尺土階三等茅茨不翦採椽不斲夏服葛衣冬服鹿裘虞舜名曰重華父瞽叟頑母嚚弟象傲皆與殺舜舜順適不失子道以孝聞於是堯乃以二女妻舜以觀其內使九男與處以觀其外二女不敢以貴驕九男皆益篤舜耕歷山歷山之人皆讓畔漁雷澤雷澤上人皆讓居陶河濱河濱器皆不苦窳窳病也一年而所居成聚二年成邑三年成都於是堯乃試舜五典百官皆治以揆百事莫不時序流四凶族以禦螭魅堯乃使舜攝行天子政堯崩天下歸舜帝王世紀曰舜立誹謗之木論曰孔子稱古者三皇五帝設防而不犯故無陷刑之民是以或結繩而治或象畫而化自庖犧至於堯舜神道設教可謂至政無所用刑矣夫三載考績黜陟幽明善無微不著惡無隱不章任自然以誅賞委群心以就制故能造御乎無為運道於至和百姓日用而不知含德若自有者也詩云上天之載無聲無臭其斯之謂乎夏禹名曰文命當堯之時洪水滔天舜登用乃命禹平水土勞身焦思居外十三年過家門不敢入薄衣食致孝于鬼神卑宮室致費於溝洫以開九州通九道陂九澤度九山行相地宜所有以貢東漸于海西被于流沙朔南暨朔北方也聲教訖于四海於是帝錫禹玄圭以告成功於天下於是大平治帝舜薦禹於天舜崩遂即天子位國號曰夏后十七世帝履癸立是為桀不務德而武傷百姓百姓弗堪湯脩德諸侯皆歸湯湯遂伐桀桀走鳴條南夷地名遂放而死湯始居亳征諸侯為夏方伯得專征伐葛伯不祀湯始伐之湯曰予有言人視水視形視民知治不伊尹曰明哉言能聽道迺進君國子民為善者在王官勉哉勉哉湯出見野張網四面祝曰自天下四方皆入吾網湯曰嘻盡之矣乃去其三面祝曰欲左左欲右右不用命乃入吾網諸侯聞之曰湯德至矣及禽獸當是時夏桀為虐政淫荒湯乃伐桀踐天子位帝太戊立伊陟為相伊陟伊尹子也毫有祥桑穀共生於朝一暮大拱祥妖怪也二木合生不恭之罰太戊懼問伊陟曰臣聞妖不勝德帝之政其有闕與帝其修德太戊從之而祥桑枯死殷復興故稱中宗帝辛立天下謂之紂帝紂資辨捷疾聞見甚敏材力過人手格猛獸智足以拒諫飾是非之端矜人臣以聲以為皆出已之下好酒淫樂嬖於婦人愛妲己有蘇氏美女也妲己之言是從於是使師涓作新淫聲北里之舞靡靡之樂厚賦稅以實鹿臺之錢鹿臺在朝歌城中也而盈鉅橋之粟鉅橋鹿水之大橋也有漕粟益收狗馬奇物充仞宮室益廣沙丘苑臺沙丘在鉅鹿東北多取野獸飛鳥置其中慢於鬼神以酒為池懸肉為林使男女相逐其間為長夜之飲百姓怨望而諸侯有叛者於是紂迺重辟刑有炮烙之法膏銅柱加之炭上令有罪者行焉輒墮炭中妲己笑名曰炮烙之刑也以西伯昌九侯鄴縣有九侯城鄂侯為三公九侯有好女入之紂九侯女不淫紂怒殺之而醢九侯鄂侯爭之強并脯鄂侯西伯昌聞之竊歎紂囚西伯羑里河內湯陰有羑里城西伯之臣閎夭之徒求美女奇物善馬以獻紂紂迺赦西伯用費中為政費中善諛好利殷人弗親又用惡來善毀讒諸侯以此益疏多叛紂微子數諫不聽迺遂去比干強諫紂怒剖比干觀其心箕子懼迺詳狂為奴紂又囚之周武王於是遂率諸侯伐紂紂走衣其寶玉衣赴火而死武王遂斬紂頭懸之白旗殺妲己殷民大悅周后稷名棄好耕農天下得其利有功封於邰曾孫公劉修后稷之業民賴其慶古公復修后稷公劉之業積德行義國人皆戴之古公卒季歷立季歷卒子昌立是為西伯西伯遵后稷公劉之業則古公之法敬老慈少禮下賢者日中不暇食以待士士以此多歸之諸侯皆來決平於是虞芮之人有獄不能決乃如周入界耕者皆讓畔民俗皆讓長虞芮皆慚俱讓而去諸侯聞之曰西伯蓋受命之君也武王即位太公望為師周公旦為輔召公畢公之徒左右王師修文王緒業聞紂昏亂暴虐滋甚於是伐紂紂師皆倒兵以戰武王遂入斬紂散鹿臺之錢發鉅橋之粟以振貧弱封諸侯班賜殷之器物縱馬於華山之陽放牛於桃林之墟偃干戈振兵釋旅入曰振旅也示天下不復用成康之際天下安寧刑措四十餘年不用措者置也民不犯法無所置刑也穆王即位將征犬戎祭公謀父諫祭畿內之國為王卿士謀父字也曰不可先王耀德不觀兵戢而時動動則威觀則玩玩則無震震懼也先王之於民也茂正其德而厚其性阜其財求而利其器用明利害之鄉鄉方也以文修之使務利而避害懷德而畏威故能保世以滋大昔我先王世后稷以服事虞夏奕世載德不忝前人至於文王武王昭前之光明而加之以慈和事神保民無不欣喜商王帝辛大惡於民庶民不忍欣戴武王以致戎于商牧非務武也勤恤民隱而除其害也夫先王之制邦內甸服邦外侯服侯衛賓服此總言之也侯侯圻衛衛圻夷蠻要服戎狄荒服甸服者祭供日祭也侯服者祀供月祀也賓服者享供時享也要服者貢供歲貢也荒服者王詩云莫敢不來王也日祭月祀時享歲貢終王先王之順祀外傳云先王之訓也有不祭則修意先修志意以自責也有不祀則修言言號令也有不享則修文文典法也有不貢則修名名謂尊卑職貢之名號也有不王則修德遠人不服則修文德以來之也序成而有不至則修刑序成謂上五者次序已成不至則有刑罰也於是有刑不祭伐不祀征不享讓不貢告不王於是有刑罰之辟有攻伐之兵有征討之備有威讓之命有文告之辭布令陳辭而有不至則增脩於德無勤民於遠是以近無不聽遠無不服今犬戎氏以其職來王天子曰予必以不享征之且觀之兵無乃廢先王之訓而幾頓乎王遂征之得四白狼四白鹿以歸自是荒服者不至諸侯有不睦者厲王即位好利近榮夷公芮良夫諫曰王室其將卑乎夫榮公好專利而不知大難夫利百物之所生也天地之所載也而有專之其害多矣天地百物皆將取焉何可專也所怒甚多而不備大難以是教王王其能久乎夫王人者將道利而布之上下者也使神人百物無不得極極中也猶日怵惕懼怨之來今王學專利其可乎匹夫專利猶謂之盜王而行之其歸鮮矣榮公有用周必敗王不聽卒以榮公為卿士用事王行暴虐侈傲國人謗王召公諫召穆公也曰民不堪命矣王怒得衛巫衛國之巫使監謗者以告則殺之其謗鮮矣諸侯不朝王益嚴國人莫敢言道路以目以目相眄而已王喜告召公曰吾能弭謗矣乃不敢言召公曰是鄣之也防民之口甚於防水水壅而潰傷人必多民亦如之是故為水者決之使導為民者宣之使言故民之有口猶土之有山川也財用於是乎出猶其有原隰衍沃也衣食於是乎生口之宣言也善敗於是乎興夫民慮之心而宣之口成而行之若壅其口其與能幾何王不聽於是國莫敢出言三年乃相與叛襲王王出奔于彘宣王即位脩政法文武成康遺風諸侯復宗周幽王嬖愛姒欲廢后並去太子用姒為后以其子伯服為太子姒不好笑幽王欲其笑萬方故不笑幽王為舉烽火諸侯悉至至而無寇姒乃大笑幽王欲悅之為數舉烽火其後不信益不至王之廢后去太子也申侯怒乃與繪西夷犬戎共攻王王舉烽火徵兵兵莫至遂殺幽王驪山下秦繆公與晉惠公合戰為晉軍所圍於是岐下食善馬者三百人馳冒晉軍解圍遂脫繆公而反生得晉君初繆公亡善馬岐下野人共得而食之者三百餘人吏逐得欲法之繆公曰君子不以畜產害人吾聞食善馬肉不飲酒傷人乃皆賜酒而赦之三百人者聞秦擊晉皆求從從而見繆公窘亦皆推鋒爭死以報食馬之德於是繆公虜晉君以歸戎王使由余於秦繆公示以宮室積聚由余曰使鬼為之則勞神矣使人為之則苦民矣繆公怪之問曰中國以詩書禮樂法度為政然尚時亂今戎夷無此何以為治不亦難乎由余笑曰此乃中國所以亂也夫自上聖黃帝作為禮樂法度身以先之僅以小治及其後世日以驕淫阻法度之威以責督於下下疲極則以仁義怨望於上上下交爭怨而相篡弒至於滅宗皆以此類也夫戎夷不然上含淳德以遇其下下懷忠信以事其上一國之政猶一身之治不知所以治此真聖人之治也於是繆公退而問內史廖曰孤聞鄰國有聖人敵國之憂也今由余賢寡人之害將奈何廖曰戎王處僻匿未聞中國之聲君試遺其女樂以奪其志為由余請以疏其閒君臣有閒乃可虜也繆公曰善因以女樂二八遺戎王戎王受而悅之於是秦乃歸由余由余數諫不聽遂去降秦繆公以客禮禮之用由余謀伐戎王益國十二開地千里遂霸西戎秦始皇帝莊襄王子也名政二十六年初并天下自號曰皇帝事皆決於法刻削無仁恩收天下兵聚之咸陽銷以為鐘鐻金人十二置廷宮中每破諸侯寫放其宮室作之咸陽北上在長安西北別名渭城南臨渭自雍門在高陵縣以東至涇渭殿屋複道周閣相屬所得諸侯美人鐘鼓以充入之三十二年燕人盧生奏錄圖書曰亡秦者胡也胡胡亥秦二世名也秦見圖書不知此為人名反備北胡始皇乃使將軍蒙恬發兵三十萬人北擊胡三十四年始皇置酒咸陽宮僕射周青臣曰他時秦地不過千里賴陛下神靈明聖平定海內日月所照莫不賓服以諸侯為郡縣人人自安樂無戰爭之患傳之萬世自上古不及陛下威德始皇悅博士齊人淳于越進曰臣聞殷周王千餘歲封子弟功臣自為枝輔今陛下有海內而子弟為匹夫卒有田常六卿之臣無輔弼何以相救哉事不師古而能長久者非所聞也今青臣又面諛以重陛下之過非忠臣也始皇下其議丞相斯曰五帝不相復三代不相襲各以治非其相反時變異也今陛下創大業建萬世之功固非愚儒所知也且越言乃三代之事何足法也今諸生不師今而學古以非當世惑亂黔首聞令下則各以其學議之入則心非出則巷議率群下以造謗如此弗禁則主勢降於上黨與成乎下禁之便臣請史官非秦記皆燒之天下敢有藏詩書百家語者悉詣守尉雜燒之有敢偶語詩書棄市禁民聚語畏其謗也以古非今者族吏見知不舉與同罪令下三十日不燒黥為城旦若欲有學法令以吏為師三十五年作前殿阿房東西五百步南北五十丈上可以坐萬人下可以建五丈旗周馳為閣道自殿下直抵南山表南山之顛以為闕為複道自阿房渡渭屬之咸陽以象天極閣道絕漢抵營室也隱宮徒刑者七十餘萬人分作阿房宮或作驪山發北山石乃寫蜀荊地材皆至關中計宮三百關外四百餘於是立石東海上以為秦東門因徙三萬家驪邑五萬家雲陽皆復不事十歲盧生說始皇曰臣等求芝奇藥仙者常弗遇類物有害之者人主所居而人臣知之則害於神願上所居宮無令人知然後不死之藥殆可得也於是始皇乃令咸陽之旁二百里內宮觀二百七十複道甬道相連帷帳鐘鼓美人充之案署不移徙行所幸有言其處者罪死自是後莫知行所在侯生盧生相與謀曰始皇為人天性剛戾以為自古莫及己專任獄吏獄吏得親幸博士雖七十人特備員弗用樂以刑殺為威天下畏罪持祿莫敢盡忠上不聞過而日驕下懾伏謾欺以取容天下之事無小大皆決於上貪於權勢至如此未可為求仙藥於是乃亡去始皇聞亡乃大怒曰盧生等吾尊賜之甚厚今乃誹謗我也諸生在咸陽者或為訞言以亂黔首於是使御史悉案問諸生諸生傳相告引犯禁者四百六十餘人皆坑之咸陽使天下知之以懲後長子扶蘇諫始皇怒使扶蘇北監蒙恬於上郡三十六年熒惑守心有墜星下東郡至地為石黔首或刻其石曰始皇帝死而地分始皇聞之遣御史逐問莫服盡取石旁居人誅之三十七年始皇出遊丞相斯少子胡亥從至平原津而病病益甚乃為璽書賜公子扶蘇曰與喪會咸陽而葬始皇崩趙高乃與胡亥李斯陰謀更詐為始皇遺詔立子胡亥為太子賜扶蘇蒙恬死二世皇帝元年趙高為郎中令掌宮殿門戶任用事二世與高謀曰先帝巡行郡縣以示強威服海內今晏然不巡行即見弱無以臣畜天下二世東行郡縣遵用趙高乃陰與高謀曰大臣不服官吏尚強及諸公子必與我爭為之柰何高曰臣固願言而未敢也先帝之大臣皆天下累世名貴人也積功勞世以相傳久矣今高素小賤陛下幸稱舉令在上位管中事大臣鞅鞅特以貌從臣其心實不服也今上出不因此時案郡縣守尉有罪者誅之上以振威天下下以除上生平所不可者今時不師文而決於武力願陛下遂從時無疑即群臣不及謀矣明主收舉餘民賤者貴之貧者富之遠者近之則上下集而國安矣二世曰善乃行誅大臣及諸公子以罪過連逮無得立者而六公子戮死於杜群臣諫者以為誹謗大吏持祿取容黔首振恐戍卒陳勝等反山東郡縣皆殺其守尉令丞反以應陳涉不可勝數也謁者使東方來以反者聞二世怒下吏後使者至上問對曰群盜郡守尉方逐捕今盡得不足憂上悅三年章邯等圍鉅鹿邯等數卻二世使人讓邯邯使長史欣請事趙高弗見又弗信欣恐亡去欣見邯曰趙高用事於中將軍有功亦誅無功亦誅邯等遂以兵降諸侯趙高欲為亂恐群臣不聽乃先設驗持鹿獻於二世曰馬也二世笑曰丞相誤耶謂鹿為馬問左右左右或言馬以阿順趙高或言鹿高因陰中以法後群臣畏高高前數言關東盜無能為及項羽虜將王離等自關以東大氐盡叛高恐二世怒誅及其身乃謝病不朝見二世夢白虎齧其驂馬殺之心不樂怪問占夢卜涇水為祟二世乃齊望夷宮欲祠涇沈四白馬使使責讓高以盜賊事高懼乃陰與其咸陽令閻樂其弟趙成謀使郎中令為內應詐為有大賊令樂召發吏卒追樂將吏卒千餘人至望夷宮前即二世數曰足下驕恣誅殺無道天下叛足下足下其自為計二世曰丞相可得見否樂曰不可二世曰吾願得一郡為王弗許又曰願為萬戶侯弗許曰願與妻子為黔首比諸公子閻樂曰臣受命於丞相為天下誅足下足下雖多言臣不敢報二世自殺趙高乃立二世之兄子公子嬰為秦王令子嬰齋當廟見受玉璽齋五曰子嬰稱病不行高自往曰宗廟重事王奈何不行子嬰遂刺殺高於齋宮三族高家以徇咸陽子嬰為秦王四十六日沛公破秦軍至霸上子嬰奉天子璽符降軹道旁諸侯兵至項籍殺子嬰及秦諸公子宗族遂屠咸陽燒其宮室虜其子女收其珍寶貨財諸侯共分之太史公曰秦自穆公以來稍蠶食諸侯竟成始皇始皇自以為功過五帝地廣三王而羞與之侔足已不問遂過而不變二世受之因而不改暴虐以重禍子嬰孤立無親危弱無輔三主惑而終身不悟亡不亦宜乎當此時也世非無深慮知化之士也然所以不敢盡忠拂過者秦俗多忌諱之禁忠言未卒於口而身為戮沒矣故使天下之士傾耳而聽重足而立鉗口而不言是以三主失道忠臣不敢諫智士不敢謀天下已亂姦不上聞豈不哀哉先王知雍蔽之傷國也故置公卿大夫士以飭法設刑而天下治其強也禁暴誅亂而天下服其弱也五伯征而諸侯從其削也內守外附而社稷存故秦之盛也繁法嚴刑而天下振及其衰也百姓怨而海內叛矣故周得其道千餘歲不絕秦本末並失故不長久由此觀之安危之統相去遠矣野諺曰前事之不忘後事之師是以君子為國觀之上古驗之當世參以人事察盛衰之理審權勢之宜去就有序變化應時故曠日長久而社稷安矣秦孝公據殽函之固擁雍州之地君臣固守而窺周室有席卷天下包舉宇內囊括四海之意并吞八荒之心當是時商君佐之內立法度務耕織修守戰之備外連衡而諸侯於是秦人拱手而取西河之外惠王武王蒙故業因遺冊南兼漢中西舉巴蜀東割膏腴之地收要害之郡諸侯恐懼會盟而謀弱秦不愛珍器重寶肥美之地以致天下之士合從締交締結也相與為一當是時齊有孟嘗趙有平原楚有春申魏有信陵此四君者皆明智而忠信寬厚而愛人尊賢而重士約從離衡并韓魏燕趙宋衛中山之眾於是六國之士有寧越徐尚蘇秦杜赫之屬為之謀陳軫樓緩蘇厲樂毅之徒通其意吳起孫臏田忌廉頗之朋制其兵常以十倍之地百萬之眾叩關而攻秦秦人開關延敵九國之師逡巡而不敢進秦無亡矢遺鏃之費而天下諸侯已困矣於是從散約解爭割地而奉秦秦有餘力而制其弊因利乘便宰割天下分裂河山強國請服弱國入朝及至秦王續六世之餘烈孝公惠文王武王昭王孝文王莊襄王振長策而御宇內吞二周而亡諸侯履至尊而制六合執棰拊拊拍也一作槁村以鞭笞天下威振四海南取百越之地北築長城胡人不敢南下而牧馬士不敢彎弓而報怨於是廢先王之道焚百家之言以愚百姓隳名城殺豪俊收天下之兵聚之咸陽銷鋒鑄鐻以為金人十二以弱黔首之民然後斬華為城斷華山為城也因河為津據億丈之城臨不測之谿以為固良將勁弩守要害之處信臣精卒陳利兵而誰何何猶問也秦王之心自以為關中之固金城千里子孫帝王萬世之業也秦王既沒餘威振殊俗陳涉罋牖繩樞之子以繩繫戶樞瓦罋為窗也甿隸之人甿民才能不及中人非有仲尼墨翟之賢陶朱猗頓之富躡足行伍之閒出倔起什佰之中首出十長佰長中也率疲散之卒將數百之眾斬木為兵揭竿為旗天下雲集響應贏糧而景從山東豪俊遂並起而亡秦族矣且夫天下非小弱也雍州之地殽函之固自若陳涉之位非尊於齊楚韓魏之君鉏耰棘矜以鉏柄及棘作矛也耰椎塊椎也非錟於長鎩矛戟長刃矛也適戍之眾非抗於九國之師深謀遠慮行軍用兵之道非及向時之士也然而成敗異變功業相反試使山東之國與陳涉度長絜大絜束之絜比權量力則不可同年而語矣然秦以區區之地千乘之權招八州而朝同列百有餘年矣然後以六合為家殽函為宮一夫作難而七廟墮身死人手為天下笑者仁義不施而攻守之勢異也秦兼諸侯南面稱帝天下之士斐然向風元元之民冀得安其性命莫不虛心而仰上當此之時守威定功安危之本在於此矣秦王懷貪鄙之心行自奮之智不信功臣不親士民廢王道立私權禁文書而酷刑法先詐力而後仁義以暴虐為天下始孤獨而有之故其亡可立而待借使秦王計上世之事並殷周之以制御其政後雖有淫驕之主而末有傾危之患也故三王之建天下名號顯美功業長久今秦二世立天下莫不引領而觀其政夫寒者利短褐小儒也而飢者甘糟糠天下之嗷嗷斯新主之資也此言勞民之易為仁也向使二世有庸主之行而任忠賢臣主一心而憂海內之患縞素而正先帝之過裂地分民以封功臣之後建國立君以禮天下虛囹圄而免刑戮除去收帑汙穢之罪使各反其鄉里發倉廩散財幣以振孤獨窮困之士輕賦少事以佐百姓之急約法省刑以持其後使天下之人皆得自新更節修行各慎其身塞萬民之望而以威德與天下天下集矣即四海之內皆讙然各自安樂其處唯恐有變雖有狡猾之民無離上之心則不軌之臣無以飾其智而暴亂之姦止矣二世不行此術而重之以無道更始作阿房之宮繁刑嚴誅賦斂無度天下多事百姓困窮然後姦偽並起而上下相遁蒙罪者眾而天下苦之自君卿以下至于眾庶人懷自危之心咸不安其位故易動也是以陳涉不用湯武之賢不藉公侯之尊奮臂於大澤而天下響應者其民危也故先王見始終之變知存亡之機是以牧民之道務在安之而已天下雖有逆行之臣必無響應之助矣故曰安民可與行義而危民易與為非此之謂也貴為天子富有天下身不免於戮殺者正傾非也是二世之過也世家齊釐公同母弟夷仲年死其子曰公孫無知釐公愛之令其秩服奉養比太子襄公立絀無知秩服無知怨數欺大臣群弟子糾奔魯管仲召忽傅之小白奔莒鮑叔傅之及雍林人殺無知高國先陰召小白於莒魯亦發兵送子糾而使管仲將兵遮莒道射中小白帶鉤小白已立欲殺管仲鮑叔曰君將治齊則高傒與叔牙足矣君且欲霸王非管夷吾不可於是桓公厚禮以為大夫任政齊人皆悅於是始霸焉管仲病桓公問曰群臣誰可相者管仲曰知臣莫如君公曰易牙何如對曰殺其子以適君非人情也不可公曰開方何如對曰背親以適君非人情也難近衛公子開方也公曰豎刁何如對曰自宮以適君非人情也難親管仲死而桓公不用管仲言卒近用三子三子專權桓公卒易牙與豎刁因內寵殺群吏群吏諸大夫也內寵內官之有權寵者而立公子無詭為君太子昭奔宋桓公病五公子各樹黨爭立及桓公卒宮中空莫敢棺桓公屍在床上六十七日屍蟲出于戶周公旦者周武王弟也封於魯成王使其子伯禽代就封於魯周公戒伯禽曰我文王之子武王之弟成王之叔父我於天下亦不賤矣然我一沐三捉髮一飯三吐哺起以待士猶恐失天下之賢人子之魯慎無以國驕人武公與長子括少子戲朝宣王宣王愛戲欲立為魯大子仲山父諫曰廢長立少不順不順必犯王命犯王命必誅之故出令不可不順也令之不行政之不立令不行則政不立也今天子建諸侯立其少是教民逆也若魯從之諸侯效之王命將有所壅言先王立長之命將壅塞不行也若弗從而誅之是自誅王命也先王之命立長今魯亦立長若誅之是自誅王命也誅之亦失不誅亦失誅之誅王命不誅則王命廢也王其圖之弗聽卒立戲為太子是為懿公括之子伯御攻弒懿公宣王伐魯殺伯御自是後諸侯多叛王命燕昭王於破燕之後即位卑身厚幣以招賢者謂郭隗曰齊因孤之國亂而襲破燕孤極知燕小力少不足報然得賢士與共國以雪先王之恥孤之願也先生視可者得身事之郭隗曰王必欲致士先從隗始況賢於隗者豈遠千里哉於是昭王為隗改築宮而師事之樂毅自魏往鄒衍自齊往劇辛自趙往士爭趨燕燕王遂以樂毅為上將軍與秦楚三晉合謀以伐齊齊兵敗湣王出亡於外燕兵獨追北入至臨淄盡取齊寶燒其宮室宗廟齊城之不下者唯獨聊莒即墨其餘皆屬燕昭王卒惠王為太子時與樂毅有隙及即位疑毅使騎劫代將樂毅亡走趙齊田單以即墨擊敗燕軍騎劫死燕兵引歸齊悉復得其故城微子開者紂之庶兄也紂既立不明淫亂於政微子數諫箕子者紂親戚也紂為象箸箕子歎曰彼為象箸必為玉杯為玉杯則必思遠方珍怪之物而御之矣輿馬宮室之漸自此始不可振也紂為淫泆箕子諫不聽乃被髮詳狂王子比干見箕子諫不聽乃直言諫紂紂怒曰吾聞聖人之心有七竅信有諸乎乃遂殺王子比干刳視其心微子曰人臣三諫不聽則其義可以去矣於是遂行周公誅武庚乃命微子代殷後奉其先祀曰宋唐叔虞者周成王弟也成王與叔虞戲削桐葉為珪以與叔虞曰以此封若史佚因請擇日立叔虞成王曰吾與之戲耳史佚曰天子無戲言言則史書之禮成之樂歌之於是遂封叔虞於唐趙烈侯好音謂相國公仲連曰寡人有愛可以貴之乎公仲曰富之可貴之則否烈侯曰然夫鄭歌者槍石二人吾賜之田人萬畝公仲曰諾不與居一月烈侯從代來問歌者田公仲曰求未有可者有頃烈侯復問公仲終不與乃稱疾不朝番吾君常山有番吾縣自代來謂公仲曰君實好善未知所持今公仲相趙於今四年亦有進士乎公仲曰未也番吾君曰牛畜荀欣徐越皆可公仲乃進三人及朝烈侯復問歌者田何如公仲曰方使擇其善者牛畜侍烈侯以仁義約以王道明日荀欣侍以選練舉賢任官使能明日徐越侍以節財儉用察度功德所與無不充君悅烈侯使使謂相國曰歌者之田且止官牛畜為師荀欣為中尉徐越為內史賜相國衣二襲單複具為一襲也魏文侯受子夏經藝客段干木過其閭未嘗不軾也秦嘗欲伐魏或曰魏君賢人是禮國人稱仁上下和合未可圖也文侯由此得譽於諸侯文侯謂李克曰先生嘗教寡人曰家貧則思良妻國亂則思良相今所置非成則璜文侯弟名成也二子何如對曰君不察故也居視其所親富視其所與達視其所舉窮視其所不為貧視其所不取五者足以定之矣何待克哉文侯曰寡人相定矣李克曰魏成子為相矣翟璜忿然作色曰以耳目之所睹記臣何負於魏成子西河之守臣之所進也君內以鄴為憂臣進西門豹君謀欲伐中山臣進樂羊中山已拔無使守之臣進先生君之子無傅臣進屈侯鮒臣何以負於魏成子李克曰且子之言克於子之君者豈將比周以求大官哉且子安得與魏成子比乎魏成子以食錄千鍾什九在外什一在內是以東得卜子夏田子方段干木此三人者君皆師之子所進五人者君皆臣之子惡得與魏成子比也翟璜逡巡再拜曰璜鄙人也失對願卒為弟子矣齊威王初即位九年之閒諸侯並伐國人不治於是威王召即墨大夫語之曰自子之居即墨也毀言日至然吾使人視即墨田野開民人給官無留事東方以寧是子不事吾左右以求譽也封之萬家召阿大夫語之曰自子之守阿譽言日聞然使使視阿田野不開民貧苦昔日趙攻甄子弗能救衛取薛陵而子弗知是子以幣厚吾左右以求譽也是日烹阿大夫及左右嘗譽者皆并烹之遂起兵西擊趙衛敗魏於濁澤於是齊國震懼人人不敢飾非務盡其誠齊國大治諸侯聞之莫敢致兵於齊二十四年與魏王會田於郊魏王問曰王亦有寶乎威王曰無有梁王曰若寡人國小也尚有徑寸之珠照車前後各十二乘者十枚奈何以萬乘之國而無寶乎威王曰寡人之所以為寶與王異吾臣有檀子者使守南城則楚人不敢為寇東取泗上十二諸侯皆來朝吾臣有盼子者使守高唐則趙人不敢東漁於河吾吏有黔夫者使守徐州則燕人祭北門趙人祭西門齊之北門西門也言燕趙之人畏見侵伐故祭以求福也徙而從者七千餘家吾臣有種首者使備盜賊則道不拾遺將以照千里豈特十二乘哉梁惠王慚不懌而去
