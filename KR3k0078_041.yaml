body:
  text: 韓子十過一曰行小忠則大忠之賊也二曰顧小利則大利之殘也三曰行僻自用無禮諸侯則亡身之至也四曰不務聽治而好五音則窮身之事也五曰貪愎喜利則滅國殺身之本也六曰耽於女樂不顧國政則亡國之禍也七曰離內遠遊忽於諫士則危身之道也八曰過而不聽於忠臣而獨行其意則滅高名為人笑之始也九曰內不量力外恃諸侯則削國之患也十曰國小無禮不用諫臣則絶世之勢也説難昔者彌子瑕有寵於衛君衛國之法竊駕君車者罪彌子母病人間有夜告彌子彌子矯駕君車以歸君曰孝哉為母故犯罪異日與君遊於果園食桃而甘不盡以其半啖君君曰愛我哉忘其口而啖寡人及彌子色衰愛弛得罪於君君曰是故嘗矯駕吾車又嘗啖我以餘桃故彌子之行未移於初也而前所以見賢後獲罪者人主愛憎之變也故有愛於主則智當而加親有憎於主則智不當而加疏解老工人數變業則失其功作者數搖徙則亡其功一人之作日亡半日十日則亡五人之功萬人之作日亡半日十日則亡五萬人之功然則數變業其民彌衆其虧彌大矣凡法令更則利害易利害易則民務變民務變謂之變業故以理觀之事大衆而數搖之則少成功藏大器而數徙之則多敗傷烹小鮮而數橈之則賊其宰治大國而數變法則民苦之是以有道之君貴虛靜而重變法故曰治大國者若烹小鮮説林上樂羊為魏將攻中山其子在中山中山之君烹其子而遺之樂羊盡一杯文侯謂堵師贊白樂羊以我故食其子之肉答曰其子而食之且誰不食樂羊罷中山文侯賞其功而疑其心孟孫獵得麑使秦西巴持之以歸其母隨而呼秦西巴以不忍而與之孟孫大怒逐之居三月復召為其子傅其御曰曩將罪之今使傅子何也孟孫曰夫不忍麑又且忍吾子乎故曰巧詐不如拙誠樂羊以有功見疑秦西巴以有罪益信觀行古之人目短於自見故以鏡觀面智短於自知故以道正己目失鏡則無以正鬚眉身失道則無以知迷惑西門豹之性急故佩韋以緩己董閼于之心緩故佩絃以自急故以有餘補不足以長續短之謂明主天下有信數三一曰智有所不能立二曰力有所不能攀三曰強有所不能勝故雖有堯之智而無衆人之助大功不立有烏獲之徑而不得人助不能自舉有賁育之強而無術法不得長生故勢有不可得事有不可成故烏獲輕千鈞而重其身非其身重於千鈞也勢不便也離婁易百步而難眉睫非百步近而眉睫遠也道不可也故明主不窮烏獲以其不能自舉不困離婁以其不能自見因可勢求易道故用力寡而功名立用人釋法術而心治堯不能正一國去規矩而妄意奚仲不能成一輪使中主守法術拙匠執規矩則萬不失也君人者能去賢巧之所不能而守中拙之所萬不失則人力盡而功名立功名明君之所以立功成名者四一曰天時二曰人心三曰伎能四曰勢位非天時雖十堯不能冬生一穗逆人心雖賁育不能盡人力故得天時則不務而自生得人心則不趣而自勸因伎能則不急而自疾得勢位則不進而成名若水之流若船之浮守自然之道行毋窮之令故曰明主大體古之全大體者望天地觀江海因山谷日月照四時行雲布風動不以智纍心不以心纍己寄治亂於法術託是非於賞罰屬輕重於權衡不逆天理不傷情性不吹毛而求小疵不灑垢而察難知守成理因自然榮辱之責在乎己而不在乎人上不天則下不覆心不地則物不畢載大山不立好惡故能成其高江海不擇小助故能成其富故大人寄形於天地而萬物備措心於山海而國家富上無忿怒之志下無伏怨之患故長利積大功立名成於前德垂於後治之至也外儲説左上文公反國至河令籩豆捐之席蓐捐之手足胼胝面目梨黑者後之咎犯聞之而夜哭文公曰咎氏不欲寡人之反國耶對曰籩豆所以食也而君捐之席蓐所以臥也而君棄之手足胼胝面目梨黑勞有功者也而君後之今臣與在後中不勝其哀故哭也且臣為君行詐偽以反國者衆矣臣尚自惡也而況於君乎再拜而辭文公止之乃解左驂而盟於河魏文侯與虞人期獵明日會疾風左右止文侯不聽曰可以疾風之故而失信吾不為也遂自驅車往犯風而罷虞人曾子妻之市其子隨而泣其母曰汝還顧反為汝殺彘妻道市來曾子欲捕彘殺之其妻止之曰特與嬰兒戲也曾子曰嬰兒者非有知也待父母而學之者也今子欺之是教子欺也母欺子子而不信其母非所以成教也遂殺彘外儲説左下文王伐崇至黃鳳墟而繫解左右顧無可令結繫文王自結之太公曰君何為自結繫文王曰吾聞上君之所與處者盡其師也中君之所與處者盡其友也下君之所與處者盡其使也今寡人雖不肖所與處者皆先君之人也故無可令結之者也解狐與邢伯柳為怨趙簡主問於解狐曰孰可為上黨守對曰邢伯柳可簡主曰非子之讎乎對曰臣聞忠臣之舉賢也不避仇讎其廢不肖也不阿親近簡主曰善遂以為守邢伯柳聞之乃見解狐謝解狐曰舉子公也怨子私也往矣怨子如異日難勢夫良馬固車使臧獲御之則為人笑王良御之而日取千里車馬非異也或至乎千里或為人笑則巧拙相去遠矣今以國為車以勢為馬以號令為轡銜以刑罰為鞭策堯舜御之則天下治桀紂御之則天下亂則賢不肖相去遠矣夫欲追遠致速不知任王良欲進利除害不知任賢能此則不知類之患也夫堯舜亦民之王良也明主之治國也適其時事以致財物論其稅賦以均貧富厚其爵祿以盡賢能重其刑罰以禁姦邪使民以力得富以事致貴以過受罪以功置賞而不望慈惠之賜此帝王之政也姦劫弒臣凡姦臣者皆欲順人主之心以取信幸之勢者也是以主有所善臣從而譽之主有所憎臣因而毀之凡人之大體取舍同則相是也取舍異則相非也今人臣之所譽者人主之所是也此之謂同取人臣之所毀者人主之所非也此之謂同舍夫取舍合同而相與逆者未嘗聞也此人臣之所取信幸之道也夫姦臣得乘信幸之勢以毀譽進退群臣者也人主非有術數以御之非有參驗以審之必將以曩之合已信今之言此幸臣之所以得欺主成私者也故主必蔽於上臣必重於下矣此之謂擅主之臣國有擅主之臣則群下不得盡智力以陳其忠百官之吏不得奉令以致其力矣何以明之夫安利者就之危害者去之此人之情也人主者非目若離婁乃為明也非耳若師曠乃為聰也不任其數而待目以為明所見者少矣非不蔽之術也不因其勢而待耳以為聰所聞者寡矣非不欺之道也明主者使天下不得不為己視使天下不得不為己聽故身在深宮之中明燭四海之內而天下弗能蔽弗能欺也三略夫主將之法務在於攬英雄之心攬結也賞祿有功通志於衆凡為人主患在驕志盈不通下故誡也故與衆同好靡不成與衆同惡靡不傾治國安家得人者也人謂賢人也伊尹赴而湯隆寧戚到而齊興亡國破家失人者也微子去而殷滅伍員奔而楚亡是以明君賢臣屈己而申人夫用兵之要在於崇禮而重祿禮崇則智士至祿重則義士輕其死故祿賢不愛財賞功不逾時則下力并而敵國削矣用人之道尊之以爵贍之以財則士自來易曰何以聚人曰財接之以禮厲之以辭崇接士之禮厲士以見危授命之辭則士死之夫將帥者必與士卒同滋味而共安危敵乃可加養士如此乃可加兵於敵也昔者良將之用兵也人有饋一簞醪者使投諸河與士卒逆流而飲之夫一簞之醪不能味一河之水而三軍之士思為致死者以滋味之及己也軍井未達將不言渴達徹也軍幕未辦將不言倦冬不服裘夏不操扇與衆同也是謂禮將是謂達禮之將與之安與之危故其衆可合而不可離將與士同禍福共安危衆如一體而不可離也可用而不可疲不疲者以主恩養素積策謀和同也故曰畜恩不倦以一取萬夫恩以接下則士歸之養一人可以致萬人燕養郭隗以致樂毅是也良將之統軍也恕己而治人推惠施恩士力日新推此之樂惠而施恩於人皆忠恕之道將士用力故目益新戰如風發攻如河決故其衆可望而不可當可下而不可勝以身先人故兵為天下雄賞罰明則將威行官人得則士卒服所任賢則敵國振所得賢則敵國畏威而振怖也賢者所適其前無敵故士可下而不可驕將者國之命將能制勝國家安定將拒諫則英雄散策不從則謀士叛善惡同則功臣倦將專己則下歸咎將自臧則下少功臧善也將受讒則下有離心將貪財則姦不禁上貪則下盜也將內顧則士卒慕內顧思妻妾也將有一則衆不服自拒諫以下將犯此一條則衆不服以其違主道有二則軍無式式法也有三則軍乖背有四則禍及國衆乖散則國亡故曰禍及國也軍無財則士不來軍無賞則士不往香餌之下必有懸魚重賞之下必有勇夫故禮者士之所歸賞者士之所死招其所歸示其所死則所求者至求賢材士至求戰則致死故曰所求者至故禮而後悔者則士不止賞而後悔者則士不使禮賞不倦則士爭死矣姦雄相稱鄣蔽主明毀譽並興壅塞主聽各阿所私令主失忠故主察異言乃其萌主聘儒賢姦雄乃遁主任舊齒萬事乃理主聘巖穴士乃得實故傅説陟而殷道興四至而漢祚長得治之實也軍勢曰出軍行師將不得專進退由內御之則功難成凡師出專制不稟命於內稟命則無威無威則士不用命士不用命則功不成夫能扶天下之危者則據天下之安能持天下之危故天下樂安之能除天下之憂者則享天下之樂天下願奉而安樂之能救天下之禍者則得天下之福除天下禍故天下樂福之故澤及人民則賢歸之恩澤洽人民和則賢者至澤及昆蟲則聖歸之萬物得其所則聖人至也賢人所歸則其國強聖人所歸則六合同賢者之政降人以禮禮服道化揖讓恭謹故曰降人以禮者也聖人之政降人以心心服教令故降人以心也禮降可以圖始禮服道化者可與謀始也心降可以保終心服道化天下和親故可保終也降禮以禮降心以心釋近而謀遠者勞而無功釋遠而謀近者逸而有終逸政多忠臣勞政多怨民故曰務廣地者荒不修德政而務廣地荒之道務廣德者強也務崇節檢廣其德教強之道也荒國者無善政廣德者其下正君德廣於上則兆庶正於下也廢一善則衆善衰賞一惡則衆惡多善者得其祐惡者受其誅則國安而衆善到矣一令逆者則百令失君令一逆民不從故百令皆廢也一惡施者則百惡結一惡得施則百惡結而相從也故令施於順民惡加於凶人教令施於順化之民刑惡加於凶逆之人則令行而不怨群下附親矣教令當刑法值百姓悅之親附之也有清白之志者不可以爵祿得四皓是也有守節之志者不可以威刑晏嬰季子是也故明君求臣必視其所以為人者而致焉視其為人所執之志而求之也致清白之士修其禮四皓亢志不屈於革命之主太子修禮卑辭而降其節焉致守節之士修其道不可以非道屈也而後士可致而名可保保猶全也聖王之用兵也非好樂之將以誅暴討亂夫以義而誅不義若決江河而溉熒火臨不測而擠欲墜其克之必也所以必優遊恬惔者何重傷人物兵者凶器戰者危事相殺傷之道故不果為也是天道也天道樂生也夫人之有道者若魚之有水得水而生失水而死人失道而亡得道而存也故君人者畏懼而不敢失道賢聖內則邪臣外舜舉皋陶湯舉伊尹不仁者遠矣隨會在朝則姦邪外奔是邪臣內則賢聖斃惡來任而比干死無忌用而伍奢戮故曰斃內外失宜禍亂傳世茍失內外之宜為子孫之禍故曰傳世也傷賢者殃及三世蔽賢者身受其害進賢者德流子孫昔鮑叔進管仲以身下之子孫世祿於齊有封邑者十餘世常為名大夫故曰德流子孫也賢者名不全昔龐涓孫臏身死於白木故曰名不全也故君子急於求賢而美名章矣利一害百民去城郭利一害萬國乃思散去一利百民乃慕澤慕思君之恩澤也去一利萬政乃不亂刑以止刑殺以止殺政得其所亂無由生也新語夫居高者自處不可以不安履危者任杖不可以不固自處不安則墜任杖不固則仆是以聖人居高處上則以仁義為巢乘危履傾則以聖賢為杖故高而不墜危而不仆昔者堯以仁義為巢舜以稷契為杖故高而益安動而益固處宴安之臺承克讓之塗德配天地光被八極功垂於無窮名傳於不朽蓋自處得其巢任杖得其人也秦以刑罰為巢故有覆巢破卵之患以李斯趙高為杖故有頓仆跌傷之禍何者所任者非也故杖聖者帝杖賢者王杖仁者霸杖智者強杖讒者滅杖賊者亡詩云讒人罔極交亂四國衆邪合心以傾一君國危民失不亦宜乎道莫大於無為行莫大於謹敬何以言之昔舜治天下也彈五絃之琴歌南風之詩寂若無治國之意漠若無憂天下之心然而天下大治故無為者乃有為者也秦始皇設刑法為車裂之誅築長城以備胡越蒙恬討亂於外李斯治法於內事愈煩下愈亂法愈衆姦愈縱秦非不欲治也然失之者舉措大衆刑罰大極故也君子尚寬舒以其身行身中和以致疏遠民畏其威而從其化懷其德而歸其境美其治而不敢違其政民不罰而畏不賞而勸漸漬於道德而被中和之所致也夫法令所以誅暴也故曾閔之孝夷齊之廉此寧畏法教而為之者哉故堯舜之民可比屋而封桀紂之民可比屋而誅何者化使其然也故近河之地溼而近山之木長者以類相及也高山出雲丘阜生氣四瀆東流百川無西行者小象大而少從多也夫南面之君乃百姓之所取法則者也舉措動作不可以失法度故上之化下由風之靡草也王者尚武於朝則農夫繕甲兵於田故君子之御下也民奢應之以儉驕淫者統之以理未有上仁而下賊讓行而爭路者也故孔子曰移風易俗豈家令人視之哉亦取之於身而已矣衆口毀譽浮石沈木群邪相抑以直為曲以白為黑曲直之異形白黑之殊色天下之易見也然而目繆心惑者衆邪誤之秦二世之時趙高駕鹿而從行王曰丞相何為駕鹿高曰馬也於是乃問群臣群臣半言馬半言鹿當此時秦王不敢信其直目而從邪臣之言鹿與馬之異形乃衆人之所知也然不能別其是非況於暗昧之事乎人有與曾子同姓名者殺人有人告曾子母曰參乃殺人母方織如故有頃人復告之若是者三曾子母投杼踰垣而去夫流言之並至衆人之所是非雖賢智不敢自畢況凡人乎質美者以通為貴才良者以顯為大楩梓豫章天下之名木也生深山之中溪谷之旁立則為衆木之珍仆則為世用因江河之道而達于京師因斧斤之功得舒其文色上則備帝王御物下則賜公卿庶賤而得以備器械及其戾於山陵之阻隔於九派之間仆於塊磊之津頓於窈窕之溪廣者無舟車之道狹者無徒步之蹊知者所不見見者所不知當斯之時尚不如道傍之枯楊生於大都之廣地近於大匠之名工材器制斷規矩度量賢者補朽短者接長大者治樽小者治觴彼則枯稿而遠棄此則為宗廟之瑚璉者通與不通也人亦猶此夫窮澤之民據接耜之士或懷不羈之能有禹皋陶之美然身不容於世無紹介通之者也公卿之子弟貴戚之黨友雖無過人之能然身在尊重之處輔之者強而飾之衆也夫欲富國強威闢地服遠者必得之於民欲建功興譽垂名烈流榮華者必取之於身故據千乘之衆持百姓之命苞山澤之饒主士衆之力而功不存乎身名不顯於世者統理之非也天地之性萬物之類懷德者衆歸之恃刑者民畏之歸之則充其側畏之則去其城故設刑者不厭輕為德者不厭重行罰不患薄布賞不患厚所以親近而致遠也夫刑重者則心煩事衆者則身勞心煩者則刑罰縱橫而無所立身勞者則百端回邪而無所就是以君子之為治也混然無事寂然無聲官府若無人亭落若無吏郵無夜行之卒鄉無夜召之征犬不夜吠雞不夜鳴耆老甘味於堂丁男耕藝於野在朝忠於君在家孝於親於是雖不言而信誠不怒而威行豈待堅甲利兵深牢刻令朝夕切切而後行哉昔者晉厲齊莊楚靈宋襄乘大國之權杖衆民之威軍師橫出陵鑠諸侯外驕敵國內刻百姓鄰國之讎結於外群臣之怨積於內而欲建金石之統繼不絶之世豈不難哉故宋襄死於泓之戰三君殺於臣之手皆輕師尚威以致於斯故春秋重而書之嗟嘆而傷之三君強其威而失其國急其刑而自賊斯乃去事之戒來事之師也魯莊公一年之中以三時興築作之役規虞山林草澤之利與民爭田漁薪採之饒刻桷丹楹眩靡麗收民十二之稅不足以供邪曲之欲繕不足好以快婦人之目財盡於驕淫力疲於不急上困於用下飢於食於是為齊衛陳宋所伐賢臣出邪臣亂子般殺魯國危也故為威不強還自亡立法不明還自傷莊公之謂也治以道德為上行以仁義為本故尊於位而無德者絀富於財而無義者刑賤而好道者尊貧而有義者榮夫酒池可以運舟糟丘可以遠望豈貧於財哉統四海之權主九州之衆豈弱於武力哉然功不能自存而威不能自守非貧弱也乃道德不存乎身仁義不加於下也故察於利而惛於道者衆之所謀也果於力而寡於義者兵之所圖也君子篤於義而薄於利敏於行而慎於言所廣功德也故曰不義而富且貴於我如浮雲夫懷璧玉要環珮服名寶藏珍怪玉斗酌酒金罍刻鏤所以夸小人之目者也高臺百仞金城文畫所以疲百姓之力者也故聖人卑宮室而高道德惡衣服而勤仁義不損其行以好其容不虧其德以飾其身國不興不事之功家不藏不用之器所以稀力役而省貢獻也璧玉珠璣不御於上則玩好之物棄於下雕琢刻畫之類不納於君則淫伎曲巧絶於下夫釋農桑之事入山海採珠璣捕豹翠消筋力散布帛以極耳目之好快淫侈之心豈不謬哉君明於德可以及於遠臣篤於義可以至於大何以言之昔湯以七十里之封升帝王之位周公自立三公之官比德於五帝三王斯乃口出善言身行善道之所致也故安危之效吉凶之符一出於身存亡之道成敗之事一起於善行堯舜不易日月而興桀紂不易星辰而亡天道不改而人道易也夫持天地之政操四海之綱屈申不可以失法動作不可以離度謬誤出口則亂及萬里之外何況刑無罪於獄而誅無辜於市哉故世衰道失非天之所為也乃君國者有以取之惡政生惡氣惡氣生災異螟蟲之類隨氣而生虹霓之屬因政而見治道失於下則天文變於上惡政流於民則螟蟲生於野夫善道存乎心無遠而不至也惡行著乎己無近而不去也周公躬行禮義郊祀后稷越裳奉貢而至麟鳳白雉草澤而應殷紂無道微子棄骨肉而亡行善者則百姓悅行惡者則子孫怨是以明者可以致遠否者以失近夫長於變者不可窮以詐通於道者不可驚以怪審於辭者不可惑以言遠於義者不可動以利是以君子博思而廣聽進退順法動作合度聞見欲衆而採擇欲謹學問欲博而行己欲敦見邪而知其直見華而知其實目不淫於炫耀之色耳不亂於阿諛之辭雖利之以齊魯之富而志不移談之以王喬赤松之壽而行不易然後能一其道而定其操致其事而立其功也凡人則不然目放於富貴之榮耳亂於不死之道故多棄其所長而求其所短不得其所無而失其所有是以吳王夫差知艾陵之可以取勝而不知檇李之可以破亡也故事或見可利而喪萬機取一福而致百禍聖人因變而立功由異而致太平堯舜承蚩尤之失而思欽明之道君子見惡於外則知變於內矣今之為君者則不然治不以五帝之術則曰今之世不可以道治也為臣者不師稷契則曰今之民不可以仁正義也為子者不執曾閔之質朝夕不休而曰家人不和也學者不操回賜之精晝夜不懈而曰世所不行也自人君至於庶人未有不法聖道而師賢者也易曰豐其屋蔀其家窺其戶闃其無人無人者非無人也言無聖賢以治之也故仁者在位而仁人來義者在朝而義士至是以墨子之門多勇士仲尼之門多道德文王之朝多賢良秦王之庭多不詳故善者必有所主而至惡者必有所因而來夫善惡不空作禍福不濫生唯心之所向志之所行而已矣賈子梁嘗有疑獄群臣半以為當罪半以為無罪梁王曰陶之朱叟以布衣而富侔國是必有奇智乃召朱公而問之朱公曰臣鄙民也不知當獄雖然臣之家有二白璧其色相如也其徑相如也其澤相如也然其價一者千金一者五百金王曰徑與色澤皆相如也一者千金一者五百金何也朱公曰側而視之其一者厚倍之是以千金梁王曰善故獄疑則從去嘗疑則從與梁國大悅墻薄亟壞繒薄亟裂器薄亟毀酒薄亟酸夫薄而可以曠日持久者殆未有也故有國畜民施政教也臣竊以為厚之而可耳楚惠王食寒菹而得蛭因遂吞之腹有疾而不能食令尹入問曰王安得此疾也王曰我食寒菹而得蛭念譴之而不行其罪是法廢而威不立也譴而行其誅則脆嘗監食者法皆當死心又不忍也故吾恐蛭之見也因遂吞之令尹避席再拜而賀曰臣聞天道無親唯德是輔王有仁德天之所奉也病不為傷是昔也惠王之後而蛭出心腹之積皆愈鄒穆公食不衆味衣不雜采自刻以廣民親賢以定國親民猶子臣下順從若手之投心也故以鄒之細魯衛不敢輕齊楚不能穆公死鄒之百姓若失慈父四境之鄰於鄒者士民向方而道哭琴瑟無音期年而後始復故愛出者愛反福往者福來宋康王之時有雀生鸇於城之陬使史占之曰小而生大必霸天下康王大喜於是滅滕伐諸侯取淮北之地乃愈自信欲霸之亟成射天笞地斬社稷而焚之國老之諫者為無頭之冠以示有勇國人大駭齊王聞而伐之民散城不守王乃逃而死故見祥而為不可祥必為禍懷王問於賈君曰人之謂知道者為先生何也對曰此博號也大者在人主中者在卿大夫下者在布衣之士乃其正名非為先生也為先醒也彼世主未學道理則默然惛於得失不知治亂存亡之所以然忙忙猶醉也而賢主者學問不倦好道不厭慧然先達於道理矣故未治也知所以治未亂也知所以亂未安也知所以安未危也知所以危故昭然先寤乎所以存亡矣故曰先醒譬猶俱醉而獨先發也故世主有先醒者有後醒者有不醒者昔楚莊王與晉人戰大克歸過申侯之邑申侯進飯日中而王不食申侯請罪王喟然嘆曰非子之罪也吾聞之曰其君賢君也而又有師者王其君中君也而有師者霸其君下君也而群臣又莫若者亡今我下君也而群臣又莫若也吾聞之世不絶賢天下有賢而我獨不得若吾生者何以食為故莊王戰服大國義從諸侯思得賢佐日中忘飯可謂明君矣此之謂先寤所以存亡此先醒者也昔宋昭公出亡至乎境喟然歎曰嗚呼吾知所以亡失矣被服而立侍御者數百人無不曰吾君聖者內外不聞吾過吾是以至此吾困宜矣於是革心易行晝學道而昔講之二年而美聞宋人迎而復之卒為賢君諡為昭公既亡矣而乃寤所以存亡此後醒者也昔者虢君驕恣自伐諂諛親貴諫臣誅逐政治踳亂國人不服晉師伐之虢君出走至於澤中曰吾渴而欲飲其御乃進清酒曰吾飢而欲食御進腶脯梁糗虢君喜曰何給也御曰儲之久矣曰何故儲之對曰為君出亡而道飢渴也君曰子知寡人之亡也對曰知之曰知之何不以諫對曰君好諂諛而惡至言臣願諫恐先亡虢君作色而怒御謝曰臣之言過也君曰吾所以亡者誠何也其御曰君不知也君之所亡者以大賢也虢君曰賢人之所以存也乃亡何也對曰天下之君皆不肖疾君之獨賢也故亡虢君喜笑曰嗟賢故若是苦耶遂徒行而逃於山中飢倦枕御膝而臥御以塊自代而去君遂餓死為禽獸食此已亡矣猶不寤所以存亡此不醒者也梁大夫有宋就者為邊縣令與楚鄰界梁之邊亭與楚之邊亭皆種瓜梁之邊亭劬力而數灌其瓜瓜美楚人窳而希灌其瓜瓜惡楚令怒其亭瓜之惡也楚亭惡梁亭之賢己因往夜竊搔梁亭之瓜皆有華焦者矣宋就令人往竊為楚亭夜善灌其瓜其瓜日以美楚亭怪而察之則乃梁亭也楚王聞之悅梁之陰讓也乃謝以重幣而請交於梁王故梁楚之歡由宋就始語曰轉敗而為功因禍而為福老子曰報怨以德此之謂也翟王使者之楚王欲夸之故饗客於章華之臺上者三休乃至其上楚王曰翟國亦有此臺乎使者對曰不翟窶國也惡見此臺翟王之自為室也堂高三尺萯葺弗翦采椽不刮然且翟王猶以為作之者大苦居之者大逸翟國惡見此臺也楚王愧焉王者官人有六等一曰師二曰友三曰大臣四曰左右五曰侍御六曰廝役智足以為原泉行足以為表儀問焉則應求焉則得入人之家足以重人之家入人之國足以重人之國者謂之師智足以為礱厲行足以為輔助明於進賢敢於退不肖內相匡正外相揚美謂之友智足以謀國事行足以為民率仁足以合上下之歡國有法則而退守之君有難則能死之職之所守君不以阿私託者大臣也修身正行不怍於鄉曲道路談説不怍於朝廷執戟居前能舉君之失過不難以死持之者左右也不貪於財不淫於色事君不敢有二心君有失過雖不能正諫以死持之愁悴有憂色不勸聽從者侍御也柔色傴僂唯諛之行唯言之聽以睚眥之間事君者廝役也故與師為國者帝與友為國者王與大臣為國者霸與左右為國者強與侍御為國者若存若亡與廝役為國者亡可立而待聞之於政民無不為本也國以為本君以為本吏以為本故國以民為安危君以民為威侮吏以民為貴賤此之謂民無不為本也民無不為命也國以為命君以為命吏以為命故國以民為存亡君以民為盲明吏以民為賢不肖此之謂民無不為命也民無不為功也故國以為功君以為功吏以為功故國以民為興壞君以民為強弱吏以民為能否此之謂民無不為功也故夫民者至賤而不可簡也至愚而不可欺也故自古而至於今與民為仇者有遲有速而民必勝之矣道也者福之本也祥也者福之榮也無道者必禍之本不祥者必失福之榮矣故行而不緣道者其言也必不顧義矣故紂自謂天王也而桀自謂天子也已滅之後民以也以此觀之則位不足以為尊而號不足以為榮矣故君子之貴也士民貴之故謂之貴故君子之富也士民榮之故謂之富故君子之貴也與民以福故士民貴之故君子之富也與民以財故士民樂之君能為善則吏必能為善矣吏能為善則民必能為善矣故民之不善吏之罪也吏之不善君之過也嗚呼戒之戒之故夫士民者率之以道然後士民道也率之以義然後士民義也率之以忠然後士民忠也率之以信然後士民信也故為人君者出其令也其如聲士民學之其如響曲折而從君其如影渚澤有枯水而國無枯士矣故有不能求士之君而無不可得之士故有不能治民之吏而無不可治之人故君明而吏賢矣吏賢而民治矣故見其民而知其君矣故君功見於選士吏功見於治民王者有易政而無易國有易吏而無易民故因是國也而為安因是民也而為治是以湯以桀之亂民為治武王以紂之北卒為強周武王問鬻子曰寡人願守而必存攻而必得戰而必勝則吾為此奈何鬻子對曰攻守戰勝同道而和與嚴其備也故曰和可以守而嚴可以守嚴不若和之固也和可以攻而嚴可以攻嚴不若和之得也和可以戰而嚴可以戰嚴不若和之勝也則唯由和而可也故諸侯發政施令政平於人者謂之文政矣諸侯接士而使吏禮恭於人者謂之文禮矣諸侯聽獄斷治刑仁於人者謂之文誅矣故三文行於政立於治陳於行其由此守而不存攻而不得戰而不勝者自古而至於今未之嘗聞也今也君王欲守而必存攻而必得戰而必勝則唯由此為可也武王曰受命矣周成王寡人聞之聖在上位使民富且壽云若夫富則可為也壽則不在天乎鬻子對曰聖人在上位則天下無軍兵之事民不私相殺則民免於一死而得一生矣君積於道而吏積於德而民積於用力故婦人為其所衣丈夫為其所食則民無凍餓則民免於二死而得二生矣君積於仁而吏積於愛而民積於財刑罰廢矣而民無夭竭之誅則民免於三死而得三生矣使民有時而用之有節則民無厲疾則民免於四死而得四生矣興賢良以禁邪惡賢人必用不肖人不作則民得其命矣故夫富且壽者聖王之功也王曰受命矣殷湯放桀武王殺紂此天下之所同聞也為人臣而放其君為人下而殺其上天下之至逆也而所以長有天下者以其為天下開利除害以義繼之也故聲名稱於天下而傳於後世以其後世之隱其惡而揚其德美立其功烈而傳於久遠故天下皆稱聖帝至治其道之也當矣
