body:
  text: 孟子梁惠王孟子見於梁惠王王曰叟不遠千里而來亦將有以利吾國乎孟子對曰王何必曰利亦曰仁義而已矣王何必以利為名乎亦唯有仁義之道可以為名耳以利為名則有不利之患矣王曰何以利吾國大夫曰何以利吾家士庶人曰何以利吾身上下交征利而國危矣征取也從王至庶人各欲取利必至於篡弒未有仁而遺其親者也未有義而後其君者也梁惠王曰寡人願安承教願安意承受孟子之教命孟子對曰殺人也以梃與刃有以異乎梃杖也曰無以異也以刃與政有以異乎曰無以異也以刃與政殺人無異也庖有肥肉廄有肥馬民有飢色野有餓殍此率獸而食人也獸相食且人惡之為民父母行政不免率獸而食人惡在其為民父母也為政乃若率禽獸食人安在其為民父母之道齊宣王問曰文王之囿方七十里有諸孟子曰有之曰若是其大乎王怪其大曰民猶以為小也曰寡人之囿方四十里耳民猶以為大何也曰文王之囿方七十里蕘者往焉雉菟者往焉與民同之民以為小不亦宜乎臣聞郊關之內有囿方四十里殺其麋鹿者如殺人之罪郊關齊四境之郊皆有關也則是方四十里為阱於國中也民以為大不亦宜乎設陷阱者丈尺之間耳今陷阱乃方四十里民患其大不亦宜乎公孫丑孟子曰人皆有不忍人之心言人人皆有不忍加惡於人之心也先王有不忍人之心斯有不忍人之政矣以不忍人之心行不忍人之政治天下可運之於掌上先王推不忍害人之心以行不忍傷民之政以是治天下亦易於轉丸於掌上也所以謂人皆有不忍人之心者今有乍見孺子將入於井則皆有怵惕惻隱之心由此觀之無惻隱之心非人也無羞惡之心非人也無辭讓之心非人也無是非之心非人也言無此四者當若禽獸非人之心也惻隱之心仁之端也羞惡之心義之端也辭讓之心禮之端也是非之心智之端也端者首也人之有是四端也猶其有四體也有是四端而自謂不能者自賊者也自賊害其性使為不善謂其君不能者賊其君者也謂其君不能為善而不匡正者賊其君使陷惡者也孟子曰矢人豈不仁於函人哉矢人唯恐不傷人函人唯恐傷人巫匠亦然故術技不可不慎也矢箭也函鎧也作箭之人其性非獨不仁於作鎧之人也術使之然巫欲祝活人匠作棺欲其早售利在人死也故治術不可不慎修其善者也孟子曰子路人告之以其過則喜禹聞善言則拜大舜又甚焉善與人同舍己從人樂取於人以為善自耕稼陶漁以至為帝無非取於人者取諸人以為善是與人為善也故君子莫大乎與人為善舜從耕於歷山及陶漁皆取人之善謀而從之故曰莫大乎與人為善也滕文公陳相見孟子道許行之言曰賢者與民並耕而食孟子曰治天下有大人之事有小人之事或勞心或勞力勞心者治人勞力者治於人故治於人者食人不能治人者食於人天下之通義也勞心者君也勞力者民也君施教以治之民竭力治公田以奉食其上天下通義所常行也當堯之時洪水橫流泛濫於天下堯獨憂之舉舜而治焉舜使禹疏九河決汝漢八年於外三過其門而不入雖欲耕得乎堯以不得舜為己憂舜以不得禹皋陶為己憂分人以財謂之惠教人以善謂之忠為天下得人謂之仁是故以天下與人易為天下得人難離婁孟子曰離婁子之明公輸子之巧不以規矩不能成方圓師曠之聰不以六律不能正五音堯舜之道不以仁政不能平治天下言當行仁恩之政天下乃可平今有仁心仁聞而民不被澤不可法於後世者不行先王之道也仁心性仁也仁聞仁聲遠聞也雖然猶須行先王之道使百姓被澤乃可為後世法也故曰徒善不足以為政徒法不能以自行但有善心而不行之不足以為政但有善法度而不施之法度亦不能獨自行聖人既竭耳力焉繼之以規矩準繩以為方圓既竭耳力焉繼之以六律正五音既竭心思焉繼之以不忍人之政而仁覆天下也故為高必因丘陵為下必因川澤為政不因先王之法可謂智乎言因自然即用力少而成功多是以惟仁者宜在高位不仁而在高位是播惡于衆也仁者能由先王之道不仁者逆道則播揚其惡於衆人也孟子曰三代之得天下也以仁其失天下也以不仁國家之所以廢興存亡者亦然天子不仁不保四海之內諸侯不仁不保社稷卿大夫不仁不保宗廟士庶人不仁不保四體今惡死亡而樂不仁猶惡醉而強酒孟子告齊宣王曰君之視臣如手足則臣之視君如腹心君之視臣如犬馬則臣之視君如國人君之視臣如土芥則臣之視君如寇讎芥草芥也臣緣君恩以為差等告子孟子曰今有無名之指屈而不申非疾痛害事如有能申之者則不遠秦楚之路為指之不若人也無名之指手第四指也餘指皆有名無名指非手之用指也指不若人則知惡之心不若人則不知惡此之謂不知類心不若人可惡之大者也而反惡指故曰不知類類事也孟子曰仁之勝不仁也猶水之勝火也今之為仁者猶以一杯水救一車薪之火也不息則謂水不勝火者此與於不仁之甚者也孟子曰五穀種之美者也茍為不熟不如荑稗夫仁亦在熟之而已矣熟成也盡心孟子曰以佚道使民雖勞不怨謂教民趣農役有常時不使失業當時雖勞後獲其利則逸矣以生道殺民雖死不怨殺者殺此罪人者其意欲生人也故雖伏罪而死不怨殺者也慎子天有明不憂人之暗也地有財不憂人之貧也聖人有德而不憂人之危也天雖不憂人之暗也闢戶牖必取己明焉則天無事也地雖不憂人之貧也伐木刈草必取己富焉則地無事矣聖人雖不憂人之危也百姓準上而比於其下必取己安焉則聖人無事矣故聖人處上能無害人不能使人無己害也則百姓除其害矣聖人之有天下也受之也非取之也有光明之德故百姓推而與之耳豈其心哉百姓之於聖人也養之也非使聖人養己也則聖人無事矣毛嬙西施天下之至姣也衣之以皮僛則見之者皆走荀卿曰仲尼之狀面若蒙僛易之以玄緆則行者皆止緆謂細布由是觀之則玄緆色之助也姣者辭之則色厭矣走背跋窮谷野走千里藥也走背辭藥則足廢理有相須而作事有待具而成故雖資傾城之觀必俟衣裳之飾雖挺越常之足必假藥物而疾故有才無勢將顛墜於溝壑有勢無才亦騰乎風雲萬動云云咸皆然耳故騰蛇遊霧飛龍乘雲雲罷霧霽與蚯蚓同則失其所乘也故賢而屈於不肖者權輕也不肖而服於賢者位尊也堯為匹夫不能使其鄰家至南面而王則令行禁止由此觀之賢不足以服不肖而勢位足以服不肖而勢位足以屈賢矣故無名而斷者權重也弩弱而矰高者乘於風也身不肖而令行者得助於衆也故舉重越高者不慢於藥愛赤子者不漫於保絶險歷遠者不慢於御此得助則成釋助則廢矣夫三王五伯之德參於天地通於鬼神周於生物者其得助博也古者工不兼事士不兼官工不兼事則事省事省則易勝士不兼官則職寡職寡則易守故士位可世工事可常古之宰物皆用其一能以成其一事是以用無棄人使無棄才若乃任使於過分之中役物於異便之地則上下顛倒事能淆亂矣百工之子不學而能者非生巧也言有其常事也今也國無常道官無常法是以國家日繆教雖成官不足官不足則道理匱道理匱則慕賢智慕賢智則國家之政要在一人之心矣人之情也莫不自賢則不相推政要在一人從一人之所欲不必善則政教陵遲矣古者立天子而貴之者非以利一人也曰天下無一貴理無由通通理以為天下也故立天子以為天下也非立天下以為天子也立國君以為國也非立國以為君也立官長以為官也非立官以為長也法雖不善猶愈於無法所以一人心也夫投鉤分財投策分馬非鉤策為均也使得美者不知所以賜得惡者不知所以怨此所以塞怨望使不上也明君動事必由惠定罪分財必由法行德制中必由禮法者所以愛民禮者所以便事故欲不得干時必於農也愛不得犯法當官而行貴不得踰規祿不得踰位惠不得兼官工不得兼事以能受事以事受利若是者上無羡賞民無羡財羡猶溢也天道因則大因百姓之情遂自然之事則其功至高其道至大也化則細化使從我物所樂其理禍狹其德細小也因也者因人之情也人莫不自為也化而使之為我則莫可得而用矣違性矯情引彼就我則忿戾乖違莫有從之者矣是故先王不受祿者不臣祿不厚者不與入雜人不得其所以自為也則上不取用焉夫君上取用必須天機之動性分之通然後上下交泰經世可久耳故放使自為則無不得仕而使之則無不失矣故用人之自為不用人之為我則莫不可得而用矣此之謂因民雜民雜處而各有所能所能者不同此民之情也故聖人不求備於一人也大君者大上也兼畜下者也下之所能不同而皆上之用也是以大君因民之能為資盡苞而畜之無能去取焉夫人君之御世也皆曲盡百姓之能兼羅萬物之分因其長短就而用之使能文者為文能武者為武聾者使其聽盲者使其視故理有盡用物無棄財是故不設一方以求於人故所求者無不足也大君不擇其下故足也不擇其下則易為下矣易為下則下莫不容莫不容故多下多下之謂大上其下既多故在上者大君臣之道臣事事言事其所事而君無事百官之屬各有所司君逸樂而臣任勞臣盡智力以善其事而君無與焉仰成而已故事無不治人君自任而務為善以先下則是代下負任蒙勞也臣反逸矣故曰君人者好為善以先下則不敢與君爭為善以先君矣君好見其善則群下皆淫善於君矣上以一方之善而施於衆方之中求其為瞻偏已多矣君偏既多而臣韜其善則天下亂矣皆私其所知以自覆掩有過則臣反責君逆亂之道夫所以置三公而列百官者將使群臣各進所知以康庶績耳若乃君顯其善而臣藏其能百事從君而出衆端自上而下則臣善不用而歸惡有在矣君之智未必最賢於衆也以未最賢而欲以善盡被下則不贍矣假使其賢猶不可推一己之智以察群下而況不最賢若使君之智最賢以一君而盡贍下則勞勞則有倦倦則衰衰則復反於不贍之道也是以人君自任而躬事則臣不事事矣言君之專荷其事則臣下不復以事為事矣是君臣易位也謂之倒逆倒逆則亂矣人君任臣而勿自躬則臣事事矣是君臣之順治亂之分不可不察所謂任人者逸自任者勞也知忠亂世之中亡國之臣非獨無忠臣也治國之中顯君之臣非獨能盡忠也治國之人忠不偏於其君亂世之人道不偏於其臣然而治亂之世同世有忠道之人臣之欲忠者不絶世而君未得寧其上夫滅亡之國皆有忠臣耳然賢君千載一會忠臣世世有之值其一隆之時則相與而交興矣遇其昏亂之主則相與而俱已矣無遇比干子胥之忠而毀瘁主君於暗墨之中遂染溺滅名而死由是觀之忠未足以救亂世而適足以重非何以識其然也曰父有良子而舜放瞽叟桀有忠臣而過盈天下然則孝子不生慈父之義六親不和有孝慈也而忠臣不生聖君之下國家昏亂有貞臣也故明主之使其臣也忠不得過職而職不得過官是以過修於身而下不敢以善驕矜守職之吏人務其治而莫敢淫偷其事官正以敬其業和吏人務其治而莫敢淫偷其事官正以順以事其上如此則至治已此五帝三王之業也亡國之君非一人之罪也惡不衆則不足以亡其國也治國之君非一人之力也善不多則不足以興治也將治亂在乎賢使任職而不在於忠也故智盈天下澤及其君忠盈天下害及其國故桀之所以亡堯不能以為存然而堯有不勝之善言其善道不可勝言也而桀有運非之名天下之惡皆歸之也則得人與失人也故廊廟之材蓋非一木之枝也狐白之裘蓋非一狐之皮也治亂安危存亡榮辱之施非一人之力也德立立天子者不使諸侯疑焉立諸侯者不使大夫疑焉立正妻者不使嬖妾疑焉立嫡子者不使庶孽疑焉疑則動兩則爭雜則相傷害在有與不在獨也故臣有兩位者國必亂臣兩位而國不亂者君猶在也恃君而不亂失君必亂子有兩位者家必亂子有兩位而家不亂者親猶在也恃親而不亂失親必亂臣疑其君無不危之國孽疑其宗無不危之家君人君人者舍法而以身治則誅賞奪與從君心出矣然則受賞者雖當望多無窮受罰者雖當望輕無已民之所信者法也今在賞者欲多在罰者欲少無法以限之則不知所論矣雖極聰明以窮輕重盡心以班奪與夫何解於怨望哉君舍法而以心裁輕重則是同功而殊罰也怨之所由生也是以分馬者之用策分田者之用鉤也非以鉤策為過人智也所以去私塞怨也故曰大君任法而弗躬為則事斷於法矣法之所加各以其分蒙其賞罰而無望於君也是以怨不生而上下和矣為人君者不多聽物有本事有原據法倚數以觀得失無法之言不聽於耳無法之勞不圖於功無勞之親不任於官官不私親法不遺愛上下無事唯法所在法令者生民之命至治之令天下之程式萬事之儀表智者不得過愚者不得不及焉大道古人以度審長短以量受少多以衡平輕重以律均清濁以名稽虛實以法定治亂以簡制煩惑以易御險難萬事皆歸於一百度皆準於法歸一者簡之至準法者易之極如此則頑嚚聾瞽可與察惠聰明同治矣天下萬事不可備能責其備能於一人則賢聖其猶病諸設一人能備天下之事則左右前後之宜遠近遲疾之間必有不兼者焉茍有不兼於治闕矣全治而無闕者大小多少各當其分農商工仕不易其業則處上有何事哉故有理而無益於治者君子不言有能而無益於事者君子弗為君子非樂有言有益於治不得不言君子非樂有為有益於事不得不為故所言者不出於名法權術所為者不出於農稼軍陳周務而已故明主任之治外之理小人之所必言事外之能小人之所必為小人亦知言有損於治而不能不言小人亦知能有損於治而不能不為故所言者極於儒墨是非之辨所為者極於堅偽偏抗之行求名而已故明主誅之故古語曰不知無害為君子知之無損為小人工匠不能無害於巧君子不知無害於治此言信矣為善使人不能得從為巧使人不能得為此獨善獨巧者也未盡巧善之理為善與衆行之為巧與衆能之此善之善者巧之巧者也故所貴聖人之治不貴其獨治貴其能與衆共治也所貴工倕之巧不貴其獨巧貴其與衆共巧也今世之人行欲獨賢事欲獨能辨欲出群勇欲絶衆獨行之賢不足以成化獨能之事不足以周務出群之辨不可為戶説絶衆之勇不可與征陳凡此四者亂之所由生是以聖人任道以通其嶮立法以理其差使賢愚不相棄能鄙不相遺能鄙不相遺則能鄙齊功賢愚不相棄則賢愚等慮此至治之術也名定則物不競分明則私不行物不競非無心由名定故無所厝其心私不行非無欲由分明故無所厝其欲然則心欲人人有之而得同於無心無欲者制之有道也彭蒙曰雉菟在野衆人逐之分未定也雞豕滿市莫有志者分定故也圓者之轉非能轉而轉不得不轉也方者之止非能止而止不得不止也因圓者之自轉使不得止因方者之自止使不得轉何苦物之失分故因賢者之有用使不得不用因愚者之無用使不得用用與不用皆非我也因彼可用與不可用而自得其用也自得其用奚患物之亂也道行於世則貧賤者不怨富貴者不驕愚弱者不懾智勇者不矜足於分也法行於世則貧賤者不敢怨富貴富貴者不敢淩貧賤愚弱者不敢冀智勇智勇者不敢鄙愚弱此法之不及道也世之所貴同而貴之謂之俗世之所用同而用之謂之物茍違於人俗所不與茍忮於衆俗所共去故人心皆殊而為行若一所好各異而資用必同此俗之所齊物之所飾故所齊不可不慎所飾不可不擇昔齊桓好衣紫合境不鬻異綵楚莊愛細腰一國皆有飢色上之所以率下乃治亂之所由也國亂有三事年飢民散無食以聚之則亂治國無法則亂有法而不能用則亂有食以聚民有法而能行國不治未之有也聖人仁義禮樂名法刑賞凡此八者五帝三王治世之術也故仁以導之義以宜之禮以行之樂以和之名以正之法以齊之刑以威之賞以勸之故仁者所以博施於物亦所以生偏私義者所以立節行亦所以成華偽禮者所以行謹敬亦所以生惰慢樂者所以和情志亦所以生淫放名者所以正尊卑亦所以生矜篡法者所以齊衆異亦所以生乖分刑者所以威不服亦所以生陵暴賞者所以勸忠能亦所以生鄙爭凡此八術無隱於人而常存於世非自顯於堯湯之時非故逃於桀紂之朝用得其道則天下治用失其道則天下亂過此而往雖彌綸天地纏絡萬品治道之外非群生所挹聖人措而不言也凡國之將存亡有六徵有衰國有亂國有亡國有昌國有強國有治國所謂亂亡之國者凶虐殘暴不與焉所謂強治之國者威力仁義不與焉君年長多妾媵少子孫疏宗強衰國也君寵臣臣愛君公法廢私欲行亂國也國貧小家富大君權輕臣勢重亡國也凡此三徵不待凶虐殘暴而後弱也雖曰見存吾必謂之亡者也內無專寵外無近習支庶繁息長幼不亂昌國也農桑以時倉廩充實兵甲徑利封疆修理強國也上不能勝其下下不能犯其上上下不相勝犯故禁令行人人無私雖經嶮易而國不可侵治國也凡此三徵不待威力仁義而後強雖曰見弱吾必謂之存者也語曰佞辨可以熒惑鬼神探人之心度人之欲順人於嗜好而弗敢逆納人於邪惡而求利人喜聞己之美也善能揚之惡聞己之過也而善能飾之得之於眉睫之間承之於言行之先世俗之人聞譽則悅聞毀則戚此衆人之大情有同己則喜異己則怒此人之大情故佞人善為譽者也善順從者也人言是亦是之人言非亦非之從人之所愛隨人之所憎故明君雖能納正直未必親正直雖能遠佞人未必能疏佞人故舜禹者以能不用佞人亦未必憎佞人語曰佞辨惑物舜禹不能得憎不可不察乎老子曰民不畏死如之何其以死懼之凡人之不畏死由刑罰過刑罰過則民不賴其生生無所賴視君之威未如也刑罰中則民畏死畏死由生之可樂故可以死懼矣此人君之所宜執臣下之所宜懼之田子曰人皆自為而不能為人故君人者之使人使其自為用而不使為我用魏下先生曰善哉田子之言古者君之使臣求不私愛於己求顯忠於己而居官者必能臨陳者必勇祿賞之所勸名法之所齊不出於己心不利於己身語曰祿薄者不可與經亂賞輕者不可與入難此處上者所宜慎者也父之於子也令有必行者有不必行者去貴妻賣愛妾此令必行者也因曰汝無敢恨汝無敢思令必不行者也故為人上者必慎所令焉人貧則怨人富則驕人怨人者苦人之不祿施於己也起於情所難安而不能安猶可恕也驕人者無所苦而無故驕人此情所易制弗能制不可恕矣貧賤之望富貴甚微而富貴不能酬其甚微之望夫富者之所惡貧者之所美貴者之所輕賤者之所榮然而弗酬不與同苦樂故也雖不酬之於我弗傷今萬民之望人君亦如貧賤者之望富貴其所望者蓋欲料長幼平賦斂時其飢寒省其疾痛賞罰不濫使役以時如此而已則於人君弗損也然而弗酬弗與同勞逸故也故為人君不可不與人同勞逸焉故富貴者不可不酬貧賤而人君不可不酬萬民則萬民之所不願戴所不願戴君位替矣危莫甚焉禍莫大焉胠篋昔者容成氏大庭氏伯皇氏中央氏栗陸氏驪畜氏軒轅氏赫胥氏尊盧氏祝融氏伏戲氏神農氏當是之時民結繩而用之足以紀要而已甘其食美其服適故常甘當故常美若思夫侈靡則無時慊意矣樂其俗安其居鄰國相望雞犬之音相聞人至老死而不相往來無求之至若此之時則至治已今遂至使民延頸舉踵曰某所有賢者贏糧而趣之則內棄其親而外棄其主之事足接乎諸侯之境車軌結乎千里之外至治之猶致斯弊則是上好智之過也上謂至治之君智而好之則有斯過矣上誠好智而無道天下大亂矣何以知其然耶夫弓弩畢戈機變之智多則鳥亂於上矣鉤餌罟罾笱之智多則魚亂於水矣削格羅落罝罘之智多則獸亂於澤矣攻之逾密避之逾巧則雖禽獸猶不可圖之以智而況人哉故治天下者唯不任知任知則無妙也智詐同異之變多則俗惑於辨矣上之所多者下不能安其少也性少而以逐多則迷矣天地堯觀乎華華封人曰嘻聖人請祝聖人使聖人壽堯曰辭使聖人富堯曰辭使聖人多男子堯曰辭封人曰壽富多男子人之所欲也汝獨不用何堯曰多男子則多懼富則多事壽則多辱是三者皆非所以養意故辭封人曰始也以汝為聖人也今然君子也天生蒸民必授之職多男子而授之職則何懼之有物皆得所而志定富而使分之則何事之有寄之天下故無事也聖人鶉居無事而斯安也而鷇食仰物而足鳥行而無章率性而動無常也天下有道則與物皆昌天下無道則修德就間雖湯武之事茍順天應人未為不間故無為而無不為者非不間也千歲厭世去而上仙夫至人極壽命之長任窮通之變其生也天行其死也物化故云厭世而上仙乘彼白雲至于帝鄉氣之散無不至之三患莫至身常無殃則何辱之有堯治天下伯成子高立為諸侯堯授舜舜授禹伯成子高辭為諸侯而耕禹往見之則耕在野禹趨就下風立而問焉曰昔堯治天下吾子立為諸侯堯授舜舜授豫而吾子辭為諸侯而耕敢問其故何也子高曰昔堯治天下不賞而民勸不罰而民畏今子賞罰而民且不仁德自此衰刑自此立後世之亂自此始矣天道夫帝王之德以天地為宗以道德為主以無為為常無為也則用天下而有餘有餘者間暇之謂也有為也則為天下用而不足不足者汲汲然欲為物用者也欲為物用故可得而以也故古之人貴夫無為也上無為也下亦無為也是下與上同德也下與上同德則不臣下有為也上亦有為也是上與下同道也上與下同道則不主夫工人無為於刻木而有為於用斧主上無為於親事而有為於用臣臣能親事主能用臣斧能刻木而工能用斧各當其能則天理自然非有為也若乃主代臣事則非主矣臣秉主用則非臣也故各司其任則上下咸得而無為之理至矣上必無為而用天下下必有為為天下用此不易之道也故古之王天下者智雖落天地不自慮也辨雖雕萬物而不自説也能雖窮海內不自為也夫在上者患於不能無為也而代人臣之所司使咎繇不得行其明斷后稷不得施其播殖則群才失其任而主上困於役矣冕旒垂目而付之天下天下皆得其自為斯乃無為而無不為者也故上下皆無為矣但上之無為則用下下之無為則自用矣天不産而萬物化地不長而萬物育所謂自爾帝王無為而天下功成功自彼成故曰莫神於天莫富於地莫大於帝王故曰帝王之德配天地同乎天地之無為也此乘天地馳萬物而用人群之道也本在於上末在於下要在於主詳在於臣三軍五兵之運德之末也賞罰利害五刑之辟教之末也禮法數度刑名比詳治之末也鐘鼓之音羽旄之容樂之末也哭泣衰絰降殺之服哀之末也此五末者須精神之運心術之動然後從者也夫精神心術者五末之本也任自然而運動則五事之末不振而自舉也末學者古之人有之而非所以先也所先者本也君先而臣從長先而少從男先而女從夫尊卑先後天地之行也故聖人取象焉言此先後雖是人事然皆在至理中來非聖人之所作也天尊地卑神明之位也春夏秋冬四時之序也萬物化作盛衰之殺變化之流也夫天地至神也而有尊卑先後之序而況人道乎明夫尊卑先後之序固有物之所不能無也宗廟尚親朝廷尚尊鄉黨尚齒行事尚賢大道之序也言非但人倫之所尚也愚智處宜貴賤履位官各當其才也必分其能無相易業必由其名名當其實故由名而實不濫也以此事上以此畜下以此治物以此修身智謀不用必歸其天此之謂太平治之至也禮法數度刑名比詳古之人有之此下之所以事上非上之所以畜下也寄此事於群下斯乃畜下者也昔者舜問於堯曰天王之用心何如堯曰吾不傲無告無告者所謂頑民也不廢窮民恆加恩也苦死者嘉孺子而哀婦人此吾所以用心已舜曰美則美矣而未大也堯曰然則何如舜曰天德而出寧與天合德則雖出而靜也日月照而四時行若晝夜之有經雲行雨施矣此皆不為而自然者也堯曰子天之合也我人之合也夫天地者古之所大也而黃帝堯舜之所共美也故古之王天下者奚為哉天地而已矣聖人行不言之教任其自行斯不言之教也道不可致也道在自然非可言致也失道而後德失德而後仁失仁而後義失義而後禮禮者道之華亂之首也禮有常則故矯效之所由生也故曰為道者日損損華偽也損之又損之以至於無為無為而無不為也華去而朴全則雖為而非為也天地有大美而不言四時有明法而不議萬物有成理而不説此孔子之所云豫欲無言至人無為任其自為而已大聖不作唯因在也觀於天地之謂也觀其形容象其物宜與天地無異者徐無鬼黃帝將見大隗乎具茨之山方明為御昌寓驂乘張苦謵前馬見閽滑稽後車至襄城之野七聖皆迷無所問塗適遇牧馬童子問塗焉曰若知具茨之山乎曰然曰知大隗之所存乎曰然黃帝曰異哉小童非徒知具茨之山又知大隗之所存請問為天下小童曰夫為天下者亦何以異乎牧馬者哉亦去其害馬者而已矣馬既過分為害黃帝再拜稽首稱天師而退天官梁惠王問尉繚子曰吾聞黃帝有刑德可以百戰百勝其有之乎尉繚曰不然黃帝所謂刑德者以刑伐之以德守之非世之所謂刑德也世之所謂刑德者天官時日陰陽向背者也黃帝者人事而已矣何以言之今有城於此從其東西攻之不能取從其南北攻之不能取此四者豈不得順時乘利者哉然不能取者何城高池深兵戰備具謀而守之也若乃城下池淺守弱可取也由是觀之天官時日不若人事也故按刑德天官之陳曰背水陳者為絶地向陳者為廢軍武王之伐紂也背濟水向山之阪以萬二千人擊紂之億有八萬人斷紂頭懸之白旗紂豈不得天官之陳哉然不得勝者何人事不得也黃帝曰先稽己智者謂之天官以是觀之人事而已矣兵談王者民望之如日月歸之如父母歸之如流水故曰明乎禁舍開塞其取天下若化故曰國貧者能富之地不任者任之四時不應者能應之故夫土廣而任則其國不得無富民衆而制則其國不得無治且富治之國兵不發刃甲不出暴而威服天下矣故曰兵勝於朝廷勝於喪絶勝於土功勝於市井暴甲而勝將勝也戰而勝臣勝也戰再勝當一敗十萬之師出費日千金故百戰百勝非善之善者也不戰而勝善之善者也戰威令所以一衆心也不審所出則數變數變則令雖出衆不信也出令之法雖有小過毋更小疑毋申事所以待衆力也不審所動則數變數變則事雖起衆不安也動事之法雖有小過毋更小難毋戚故上無疑令則衆不二聽動無疑事則衆不二志古率民者未有不能得其心而能得力者也未有不能得其力而能致其死者也故國必有禮信親愛之義而後民以飢易飽國必有孝慈廉恥之俗而後民以死易生故古率民者必先禮信而後爵祿先廉恥而後刑罰先親愛而後託其身焉民死其上如其親而後申之以制古為戰者必本氣以厲志厲志以使四枝四枝以使五兵故志不厲則士不死節士不死節雖衆不武厲士之道民之所以生不可不厚也爵列之等死喪之禮民之所以營也不可不顯也必因民之所生以制之因其所營以顯之因其所歸以固之田祿之實飲食之糧親戚同鄉鄉里相勸死喪相救丘墓相從民之所以歸不可不速也如此故什伍如親戚阡陌如朋友故止如堵牆動如風雨車不結軌士不旋踵此本戰之道也地所以養民也城所以守地也戰所以守城也故務耕者其民不飢務守者其地不危務戰者其城不圍三者先王之本務也而兵最急矣故先王務尊於兵尊於兵其本有五委積不多則事不行賞祿不厚則民不勸武士不選則士不強備用不便則士橫刑誅不必則士不畏先王務此五者故靜能守其所有動能成其所欲王國富民霸國富士僅存之國富大夫亡國富倉府是謂上溢而下漏故患無所救故曰舉賢用能不時日而事利明法審令不卜筮而事吉貴政養勞不禱祠而得福故曰天時不如地利地利不如人事聖人所貴人事而已矣勤勞之事將必從己先故暑不立蓋寒不重裘有登降之險將必下步軍井通而後飲軍食熟而後食壘成而後舍軍不畢食亦不火食飢飽勞逸寒暑必身度之如此則師雖久不老雖老不弊故軍無損卒將無惰志兵令兵者凶器也戰者逆德也爭者事之末也王者所以伐暴亂而定仁義也戰國所以立威侵敵也弱國所以不能廢兵者以武為植以文為種以武為表以文為裏以武為外以文為內能審此二者知所以勝敗矣武者所以淩敵分死生也文者所以視利害觀安危武者所以犯敵也文者所以守之也兵用文武也如響之應聲也如影之隨身也將有威則生無威則死有威則勝無威則敗卒有將則無將則北有將則死無將則辱威者賞罰之謂也卒畏將甚於敵者戰勝卒畏敵甚於將者戰北夫戰而知所以勝敗者固稱將於敵也敵之與將也猶權衡也將之於卒也非有父母之惻血膚之屬六親之私然而見敵走之如歸前雖有千仞之溪不測之淵見入湯火如蹈者前見全明之賞後見必死之刑也將之能制士卒其在軍營之內行陳之間明慶賞嚴刑罰陳斧鉞飾章旗有功必賞犯令必死及至兩敵相至行陳薄近將提枹而鼓之存亡生死存枹之端矣雖有天下善兵者不能圖大鼓之後矣
