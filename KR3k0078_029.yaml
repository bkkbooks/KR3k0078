body:
  text: 吳志下吳志下陸遜字伯言吳郡人也為鎮西將軍劉備大率衆來權命遜為大都督拒之備衆奔潰拜上大將軍右都護遜雖身在外乃心於國上疏陳時事曰臣以為科法嚴峻下犯者多頃年以來將吏罹罪雖不慎可責然天下未一當圖進取小宜恩貸以安下情且世務日興良能為先自不奸穢入身難忍之過乞復顯用展其力效此乃聖王忘過記功以成王業也昔漢高舍陳平之用其奇略終建勳祚功垂千載夫峻法嚴刑非帝王之隆業有罰無恕非懷遠之弘規也赤烏七年為丞相先是二宮並闕中外職司多遣子弟給侍全琮報遜遜以為子弟茍有才不憂不用不宜私出以要榮利若其不佳終為取禍且聞二宮勢敵必有彼此此古人之厚忌也琮子寄果阿附魯王輕為交搆遜書與琮曰卿不師日磾而宿留阿寄終為足下門戶致禍矣琮既不納更以致及太子有不安之議遜上疏陳太子正統宜有盤石之固魯王藩臣當使寵秩有差彼此得所上下獲安謹叩頭流血以聞書三四上及求詣都欲口論嫡庶之分以匡得失既不聽許而遜外甥顧談顧承姚信並以親附太子枉見流徙太子太傅吾粲坐數與遜交書下獄死權纍遣中使責讓遜遜憤恚致卒也子抗字幼節遷立節中郎將權謂曰吾前聽用讒言與汝父大義不篤以此負汝前後所問一焚滅之莫令人見也孫即位加鎮軍大將軍督信陵等軍事抗聞都下政令多闕時何定弄權閹官與政抗上疏曰臣聞開國承家小人勿用靖譖庸回唐書攸戒是雅人所以怨剌仲尼所為歎息也春秋已來爰及秦漢傾覆之舋未有不由斯者也小人所見既淺雖使竭情盡節猶不足任況其姦心素篤而憎愛移易哉茍患失之無所不至今委以聰明之任假以專制之威而冀雍熙之聲作肅清之化立不可得也方今見吏殊才雖少然或冠冕之胄少漸道教或清苦自立資能足用自可隨才授職抑黜群小然後俗化可清庶政無穢聞薛瑩徵下獄抗上疏曰夫俊乂者國家之良寶社稷之貴資庶政所以倫敘四門所以穆清也故大司農樓玄散騎中常侍王蕃少府李勗皆當世秀穎一時顯器既蒙初寵從容列位而並旋受誅殛或圮族替祀或投棄荒裔蓋周禮有赦賢之辟春秋有宥善之義書曰與其殺不辜寧失不經而蕃等罪名未定大辟以加心經忠義身被極刑豈不痛哉且已死之形固無所識至乃焚爍流漂棄之水濱懼非先王之正典或甫侯之所戒也是以百姓哀聳士民同戚蕃勗永已悔亦靡及誠望陛下赦召玄出而頃聞薛瑩卒見逮録瑩父綜納言先帝傅弼文皇及瑩承基內厲名行今之所坐罪在可宥臣懼有司未詳其事如復誅戮益失民望乞垂天恩原赦瑩罪哀矜庶獄清澄刑網則天下幸甚孫登字子高權長子也權為吳王立登為太子選置師傅銓簡秀士以為賓友登或射獵遠避良田不踐苗稼至所頓息又擇空間之地其不欲煩民如此嘗乘馬出有彈丸過左右求之有一人操彈佩丸咸以為是亂對不服從者欲捶之登不聽使求過丸比之非類乃見釋又失盛水金馬盂覺得其主左右所為不忍致罰呼責數之長遣歸家敕親近勿言孫和字子孝立為太子常言當世士人宜講修術學校習射御以周世務而但交遊博奕以妨事業非進取之謂後群寮侍宴言及博奕以為妨事費日而無益於用勞精損思而終無所成非所以進德修業積纍功緒也且志士愛日惜力君子慕其大者凡所患者在於人情所不能絶誠能絶無益之欲以奉德義之塗棄不急之務以修功業之基其於名行豈不善哉夫人情猶不能無嬉娛嬉娛之好亦在於飲宴琴書射御之閒何必博奕以為歡乃命侍坐者八人各著論以矯之於是中庶子韋曜退而論奏和以示賓客時蔡穎好奕直事在署者頗效焉故以此諷之是後王夫人與全公主有隙權嘗寢疾和祠祭於廟和妃叔父張休居近廟邀和過所居全公主使人覘因言太子不在廟中專就妃家計議又言王夫人見上寢疾有喜色權由是發怒夫人憂死和寵稍損懼於廢黜魯王霸覬覦滋甚陸遜吾粲顧談等數陳適庶之義理不可奪全寄楊竺等為霸支黨譖訴日興粲遂下獄誅談徙交州權沈吟者歷年殷基通語曰初權既立和為太子而封霸為魯王初拜猶同宮室禮秩未分群公之議以為太子國王禮秩宜異於是分宮別僚而隙端開矣自侍御賓客造為二端仇黨疑二中外官僚將相大臣舉國中分權患之於是有改嗣之規矣後遂幽閉和於是驃騎將軍朱據尚書僕射屈晃率諸將吏泥頭自縛連日詣闕請和權甚惡之無難督陳正五營督陳象上書稱引晉獻公殺申生立奚齊晉國擾亂又據晃固諫不止權大怒族誅正象牽晃入殿杖一百吳曆曰晃入日諫曰太子仁明顯聞四海今三方鼎峙實不宜搖動太子以生衆心願陛下少垂聖慮老臣雖死猶生之年叩頭流血辭氣不撓諱晃言斥還田里竟徙和於故鄣群司坐諫誅放者十數衆咸冤之吳書曰權寢疾意頗感寤欲徵和還立之全公主及孫峻孫弘等固爭之乃止封和為南陽王遣之長沙諸葛恪被誅孫峻遣使者賜死舉邦傷焉孫霸字子威和弟也和為太子霸為魯王寵愛崇特與和無殊頃之和霸不穆之聲聞於權耳權禁斷往來時全寄吳安孫奇楊竺等陰共附霸圖危太子譖毀既行太子以敗霸亦賜死流竺尸於江又誅寄安奇等咸以黨霸構和故也潘濬字承明武陵人也權稱尊號拜為少府江表傳曰權數射雉濬諫權權曰相與別後時時暫出耳不復如往日之時濬曰天下未定萬機務多射雉非急弦絶括破皆能為害乞特為臣故息置之濬出見雉翳故在乃手自撤壞之權由是不復射雉遷太常時校事呂一操弄威柄奏按丞相顧雍左將軍朱據等皆見禁止濬求朝欲盡辭極諫至聞太子登已數言之而不見從濬乃大請百寮欲因會手刃殺一以一身當之為國除患一密聞知稱疾不行濬每進見無不陳一之姦險也由此一寵漸衰後遂誅戮權引咎責躬也陸凱字敬風吳郡人也孫立為左丞相時徙都武昌楊土百姓泝流供給以為患苦又政事多謬黎元窮匱凱上疏曰臣聞有道之君以樂樂民無道之君以樂樂身樂民者其樂彌長樂身者不久而亡夫民者國之根也誠宜重其食愛其命民安則君安民樂則君樂自頃年以來君威傷於桀紂君明暗於奸雄君惠閉於群孽無災而民命盡無為而國財空辜無罪賞無功使君有謬誤之愆天為作妖而諸公卿媚上以求愛困民以求饒導君於不義敗政於淫俗臣竊為痛心今鄰國交好四邊無事當務息役養士實其府庫以待天時而更傾動天心搔擾萬姓使民不安大小呼嗟此實非保國養民之術也昔秦所以亡天下者但坐賞輕而罰重刑政錯亂民力盡於奢侈目眩於美色志濁於財寶邪臣在位賢哲隱藏百姓業業天下苦之是以遂有覆巢破卵之憂漢所以彊者躬行誠信聽諫納賢惠及負薪躬請巖穴廣採博察以成其謀此往事之明證也近者漢衰三家鼎立曹失綱紀晉有其政又益州危險兵多精強閉門固守可保萬世而劉氏與奪乖錯賞罰失所君恣意於奢侈民力竭於不急是以為晉所伐君臣見虜此目前之明驗也臣暗於大理文不及義智慧淺劣無復冀望竊為陛下惜天下耳臣謹奏耳目所聞見百姓所為煩苛刑政所為錯亂願陛下息大功損百役務寬蕩忽苛政又武昌土地實危險而塉埆非王都安國養民之處且童謠言寧飲建業水不食武昌魚寧還建業死不止武昌居臣聞童謠之言生於天心乃以安居而比死足明天意知民所苦也臣聞國無三年之儲謂之非國而今無一年之畜此臣下之責也而諸公卿位處人上祿延子孫曾無致命之節匡救之術茍進小利於君以求容媚荼毒百姓不為君計也自從孫弘造義兵以來耕種既空廢所在無復輸入而分一家父子異役廩食日張畜積日耗民力困窮鬻賣兒子調賦相仍日以疲極加有監官務行威勢所在搔擾更為煩苛民苦二端財力再耗此為無益而有損也願陛下一息此輩以鎮撫百姓之心此猶魚得免毒螫之淵鳥獸得離羅網之綱四方之民繈負而至矣如此民可得保先王之國存焉臣聞明王聖主取士以賢非求顏色而取好服捷口容悅者也臣伏見當今內寵之臣位非其人任非其量不能輔國匡時群黨相扶害忠隱賢願陛下簡文武之臣各盡其忠拾遺萬一則康哉之歌作刑錯之理清願陛下留神思臣愚言時殿上列將何定佞巧便僻貴幸任事凱面責定曰卿見前後事主不忠傾亂國政寧有得以壽終者何以專為姦邪穢塵天聽宜自改厲不然方見卿有不測之禍矣定大恨凱思中傷之凱終不以為意乃心公家義形於色疾病遣中書令董朝問所欲言凱陳何定不可任用宜授外任不宜幹與事姚信樓玄賀邵張悌郭逴薛瑩或清白忠勤或姿才卓茂皆社稷之楨幹國家之良輔願陛下重留神思訪以時務遣親近趙欽口詔報凱曰孤動遵先帝有何不平君所諫非也又建業宮不利故避之而宮室衰耗何以不可徙乎凱上疏曰臣竊見陛下執政事以來陰陽不調五星失晷職司不忠姦黨相扶是陛下不遵先帝之所致也夫王者之興受之於天修之由德豈在宮乎而陛下不咨之公輔便盛意驅馳六軍流離就令陛下身得安百姓愁勞何以用治此不遵先帝一也臣聞有國以賢為本夏殺龍逢殷獲伊摯斯前世之明效今日之師表也中常侍王蕃黃中通理處朝忠譽斯社稷之重鎮大吳之龍逢也而陛下忿其苦辭惡其直對梟之殿堂尸骸暴棄邦內傷心有識悲悼咸以吳國夫差復存先帝親賢陛下反之是不遵先帝二也臣聞宰相國之柱也不可不強是故漢有蕭曹之佐先帝有顧步之楷而萬彧瑣才凡庸之質昔從家隸超步紫闥於彧已豐於器已溢而陛下愛其細介不訪大趣榮以尊輔越尚舊臣賢良憤惋智士赫是不遵先帝三也先帝愛民過於嬰孩民無妻者以妾妻之見單衣者以帛給之枯骨不收而取埋之而陛下反之是不遵先帝四也昔桀紂滅由妖婦幽厲亂在嬖妾先帝覽之以為身戒故左右不置淫邪之色後房無曠積之女今中宮萬數不備嬪嬙外多鰥夫女吟於中是不遵先帝五也先帝憂勞萬機猶懼有失陛下臨祚以來遊戲後宮眩惑婦女乃令庶事多矌下吏容奸欺是不遵先帝六也先帝篤尚朴素服不純麗宮無高臺物無雕飾而陛下徵調州郡竭民財力土被玄黃宮有朱紫是不遵先帝七也先帝外杖顧陸朱張內近胡綜薛瑩是以庶績雍熙邦內清肅今者外非其任內非其人陳聲曹輔斗筲小吏先帝之所棄而陛下幸之是不遵先帝八也先帝每宴見群臣抑損醇醲臣下終日無失慢之尤而陛下拘以視瞻之敬懼以不盡之酒無異商辛長夜之飲是不遵先帝九也昔漢之桓靈親近宦豎大失民心今高通羊度黃門小人而陛下賞以重爵權以戰兵若江渚有難則度等之武不能禦侮明矣是不遵先帝十也今宮女曠積而黃門復走州郡條牒民女有錢則捨無錢則取怨呼道路母子死訣是不遵先帝十一也先帝在時亦養諸王太子若取乳母其夫復役賜與錢財時遣歸來視其弱息今則不然夫婦生離夫故作役兒從後死家為空戶是不遵先帝十二也先帝歎曰國以民為本民以食為天衣其次也三者孤存之於心今則不然農桑並廢是不遵先帝十三也先帝簡士不拘貴賤任之鄉閭效之於事舉者不虛受者不妄今則不然浮華者登朋黨者進是不遵先帝十四也先帝戰士不給他役江渚有事責其死效今之戰士供給衆役廩賜不贍是不遵先帝十五也夫賞以勸功罰以禁邪賞罰不中則士民散失今江邊將士死不見哀勞不見賞是不遵先帝十六也今在所監司已為煩猥兼有內使擾亂其中一民十吏何以堪命是不遵先帝十七也夫校事吏民之仇先帝末年雖有呂一錢欽等皆誅夷以謝百姓今復張立校曹縱吏言事是不遵先帝十八也先帝時居官者咸久於其位然後考績黜陟今州郡職司或政無幾便徵召遷轉紛紜道路傷財害民於是為甚是不遵先帝十九也先帝每察竟解之奏常留心推接是以獄無冤囚死者吞聲今則違之是不遵先帝二十也若臣言可録藏之盟府如其虛妄治臣之罪願陛下留意江表傳曰所行彌暴凱知其將亡上表曰臣聞惡不可積過不可長是以古人懼不聞非立敢諫之鼓武公九十思聞警誡臣察陛下無思警誡之義而有積惡之漸臣深憂之故略陳其要陛下宜克己復禮述履前德不可捐棄臣言而放奢意意日奢情日至吏日欺民日離則上不信下下當疑上骨肉相刻公子將奔臣雖愚暗於天命以心審之敗不過二十稔也臣常忿亡國之人夏桀殷紂亦不可使後人復忿陛下也臣受國恩奉朝三世復以餘年值遇陛下不能循俗與衆沈浮若比干伍員以忠見戮以正見疑自謂畢足無所餘恨灰身泉壤無負先帝願陛下九思社稷存為初皓始起宮凱上表諫不聽凱重表曰臣聞宮功當起夙夜反側是以頻煩上事往往留中不見省報於邑歎息昨食時被詔曰君所陳誠是大趣然未合鄙意如何此宮殿不利宜當避之乃可以妨勞役長坐不利宮平父之不安子亦何倚臣伏讀一周不覺氣結於胸而涕泣雨集臣年已六十九榮祿已重於臣過望復何所冀所以勤勤數進苦言者臣伏念大皇帝創基立業勞苦勤至今強敵當塗西州傾覆孤疲之民宜當畜養廣力肆業以備其虞且始徙都屬有軍征戰士流離州郡搔擾而大功復起徵召四方斯非保國致治之漸也臣聞為人主者攘災以德除咎以義今宮室之不利但當克己復禮篤祖宗之至道愍黎庶之困苦何憂宮之不安災之不銷乎陛下不務修德而築宮若德之不修行之不貴雖殷辛之瑤臺秦始之阿房何止而不喪身覆國宗廟作墟乎夫興土功高臺榭既致水旱民又多疾其不疑也為父長安使子無倚此乃子離於父臣離於陛下之象也臣子一離雖念刮骨肉茅茨不翦復何益焉大皇帝之時寇鈔懾威南州無事尚猶沖讓未肯築宮況陛下危側之世乏大皇帝之德可不思哉可不慮哉願陛下留意臣不虛言也樓玄字承先沛郡人也孫即位為大司農主殿中事應對切直漸見責怒後人誣白玄與賀邵相逢駐共耳語大笑謗訕政事遂被詔詰責送付廣州徙交趾別敕令殺之賀邵字興伯會稽人也孫時遷中書令凶暴驕矜政事日弊邵上疏諫曰古之聖王所以潛處重闈之內而知萬里之情垂拱衽席之上而明照八極之際者任賢之功也陛下宜旌賢表善以康庶政自頃年已來朝列紛錯真僞相貿上下空任文武曠位外無山嶽之鎮內無拾遺之臣佞諛之徒撫翼天飛干弄朝威盜竊榮利而忠良排墜信臣被害是以正士摧方而庸臣茍媚遂使清流變濁忠臣結舌陛下處九天之上隱百重之室言出風靡令行景從媾近寵媚之臣日聞順意之辭將謂此輩實賢而天下已平也臣心所不安敢不以聞臣聞興國之君樂聞其過荒亂之主樂聞其譽聞其過者過日消而福臻聞其譽者譽日損而禍至是以古之人君揖讓以進賢虛己以求過譬天位於乘奔以虎尾為警戒至於陛下嚴刑法以禁直辭黜善士以逆諫臣眩耀毀譽之實沈淪近習之言故常侍王蕃忠恪在公才任輔弼以酲酒之閒加之大戮近鴻臚葛奚先帝舊臣偶有逆忤昏醉之言耳三爵之後禮所不諱陛下猥發雷霆謂之輕慢飲之醇酒中毒殞命自是之後海內悼心朝臣失圖仕者以退為幸居者以出為福誠非所以保光洪緒熙隆道化也又何定本趨走小人僕隸之下身無錙銖之行能無鷹犬之用而陛下愛其佞媚假其威柄使定恃寵放姿自擅威福口正國議手弄天機上虧日月之明下塞君子之路臣竊觀天變自比年已來陰陽錯謬四時逆節日蝕地震中夏殞雹參之典籍皆陰氣陵陽小人弄勢之所致也臣嘗覽書傳驗諸行事災祥之應可為寒栗昔高宗修已以消鼎雉之異宋景崇德以退熒惑之變願陛下上懼皇天告之誚下追二君攘災之道遠覽前代任賢之功近寤今日謬授之失清澄朝位旌敘俊乂放退佞邪抑奪奸勢廣延淹滯容受直辭祗承乾指敬奉先業則大化光敷天人望塞矣傳曰國之興也視民如傷其亡也以民為草芥陛下昔韜神光潛德東夏以望哲茂姿龍飛應天四海延頸八方拭目以成康之化必隆於旦夕也自文興已來法禁轉苛賦調益繁在所長吏迫畏罪負嚴法峻刑蹙民求辦是以人力不堪家戶離散呼嗟之聲感傷和氣又江邊戍兵宜時優育以待有事而徵發賦調煙至雲集衣不全短褐食不贍朝夕出當鋒鏑之難入抱無聊之戚是以父子相棄叛者成行願陛下寬賦除煩省諸不急夫民者國之本也食者民之命也今國無一年之儲家無經月之畜而後宮坐食萬有餘人內有離曠之怨外有損耗之費使庫廩空於無用士民飢於糟糠又北敵注目伺國盛衰陛下不恃己之威德而怙敵之不來忽四海之困窮而輕虜之不為難誠非長策廟勝之要也昔大皇帝創基南夏割據江山雖承天贊實由人力餘慶遺祚至於陛下陛下宜勉崇德器以光前烈何可忽顯祖之功勤輕難得之大業哉臣聞否泰無常吉凶由人長江之限不可久恃茍我不守一葦可航也昔秦建皇帝之號據殽函之阻德化不修法政苛酷毒流生民忠臣杜口是以一夫大呼社稷傾覆近劉氏據三關之嶮守重山之固可謂金城石室萬世之業任授失賢一朝喪沒君臣繫頸共為羈僕此當世之明鑒目前之炯戒也願陛下遠考前事近鑒世變豐基強本割情從道則成康之治興而聖祖之祚隆矣書奏深恨之邵奉公貞正親近所憚乃共譖邵與樓玄謗毀國事俱被詰責玄見送南州邵原復職後邵中惡風口不能言去職數月疑其託疾掠考千所卒無一言竟殺之家屬徙臨海並下詔誅玄子孫韋曜字弘嗣吳郡人也遷太子中庶子時蔡穎亦在東宮性好博奕太子和以為無益命曜論之其辭曰蓋聞君子恥當年而功不立疾沒世而名不稱故曰學如不及猶恐失之是以古之志士悼年齒之流邁而懼名稱之不建也故勉精厲操不遑寧息且以西伯之聖姬公之才猶有日昃待旦之勞故能隆王道垂名億載況在臣庶而可以已乎歷觀古今功名之士皆有積纍殊異之勞身苦體契闊勤思平居不惰其業窮困不易其素是以卜式立志於耕牧而黃霸受道於囹圄終有崇顯之福以成不朽之名故山甫勤於夙夜而吳漢不離公門豈有遊惰哉而今之人多不務經術好玩博奕廢事棄業忘寢與食窮日盡明繼以脂燭當其臨局交爭雌雄未決專精鋭意心勞體倦人事曠而不修賓旅闕而不接雖有太牢之饌韶夏之樂不暇存也或至賭及衣物徙碁易行廉恥之意弛而忿戾之色發其所志不出一枰之上所務不過方罫之閒勝敵無封爵之賞獲地無兼土之實技非六藝用非經國立身者不階其術徵選者不由其道求之於戰陳則非孫吳之倫也考之於道藝則非孔氏之門也以變詐為務則非忠信之事也以劫殺為名則非仁者之意也而空妨日廢業終無補益是何異設木而擊之置石而投之哉且君子之居室也勤身以致養其在朝也竭命以納忠臨事且猶旰食而何博奕之足耽乎夫然故孝友之行立貞純之名彰也方今大吳受命海內未平聖朝乾乾務在得人勇略之士則受熊虎之任儒雅之徒則處龍鳳之署百行兼苞文武並騖博選良才旌簡髦俊設程試之科垂金爵之賞誠千載之嘉會百世之良遇也當世之士宜勉思至道愛功惜力以佐明時使名書史籍勳在盟府乃君子之上務當今之先急也夫一木之枰孰與方國之封枯碁三百孰與萬人之將袞龍之服金石之樂足以兼局而貿博奕矣設令世士移博奕之力而用之於詩書是有顏閔之志也用之於智計是有良平之思也用之於資貨有猗頓之富也用之於射御是有將帥之備也如此則功名立而鄙賤遠矣孫即位為侍中常領左國史時在所承指數言瑞應以問曜曜答曰此人家筐篋中物耳又欲為父和作紀曜執以和不登帝位宜名為傳如是者非一漸見責怒曜益憂懼自陳衰老求去終不聽每饗宴無不竟日坐席無能否率以七升為限雖不悉入口皆澆灌取盡曜素飲酒不過二升初見禮時常為裁減或密賜菜茗以當酒至於寵衰更見逼強輒以為罪又於酒後使侍臣難折公卿以嘲弄侵刻發摘私短以為歡時有愆過或誤犯諱輒見收縛至於誅戮曜以為外相毀傷內長尤恨使不濟濟非佳事也故但示難問經義言論而已以為不承用詔命意不忠盡遂積前後嫌忿收曜付獄華核連上疏救曜不許遂誅曜也華核字永先吳郡人也為中書丞孫更營新宮制度弘廣飾以珠玉所費甚多時盛夏興功農守並廢核上疏諫曰臣聞漢文之世九州晏然當此之時皆以為泰山之安無窮之基也至於賈誼獨以為可痛哭及流涕者三長大息者六乃曰方今之勢何異抱火措之積薪之下而寢其上竊以曩時之事揆今之勢誼云復數年閒諸王方剛欲以此為治雖堯舜不能安而今大敵據九州之地有大半之衆習攻戰之餘術乘戎馬之舊勢非徒漢之諸王淮南濟北而已誼之所欲痛哭比今為緩抱火臥薪之喻於今為急誠宜住建立之役先備豫之計勉墾植之業為飢乏之救若捨此急盡力功作卒有風塵不虞之變當委版築之役應烽燧之急驅怨苦之衆越白刃之難此乃大敵所因為資也如但固守曠日持久則軍糧必乏不待接刃而戰士已困矣王者以九域為宅天下為家不與編戶之民轉徙同也今之宮室先帝所營卜土立基非為不祥又楊市土地與宮連接若大功畢竟輿駕遷住門行之神皆當轉移猶恐長久未必勝舊屢遷不可留則有嫌此乃愚臣所以夙夜為憂灼也臣省月令季夏之月不可以興土功不可以會諸侯不可以起兵動衆舉大事必有大凶六月戊巳土行正王既不可犯加又農月時不可失昔魯隱夏城中丘春秋書之垂為後戒今築宮為長世之洪基而犯天地之大禁襲春秋之所書廢敬授之上務臣以愚管竊所不安又恐所召離民或有不至討之則廢役興事不討則日月滋蔓若悉並到大衆聚會希無疾病且人心安則思善苦則怨叛今當角力中原以定強弱正於際會彼益我損此乃雄夫智士所以深憂也臣聞先王治國無三年之儲曰國非其國安寧之世戒備如此況敵強大而忽農忘畜若上下空乏運漕不供北敵犯疆使周邵更生良平復出不能為陛下計明矣書奏不納後遷東觀令領右國史時倉廩無儲世俗滋侈核上疏曰今寇虜充斥征伐未已居無積年之儲出無應敵之畜此乃有國者所宜深憂也夫財穀所生當出於民趨時務農國之上務而都下諸官所掌別異各自下調不計民力輒與近期長吏畏罪晝夜催民委舍田事遑赴會日定送到都或蘊積不用而徒使百姓消力失時到秋收月督其限入奪其播殖之時而責其今年之稅如有逋懸則籍沒財物故家戶貧困衣食不足宜暫息衆役一心農桑古人稱一夫不耕或受其饑一女不織或受其寒是以先王治國唯農是務軍興已來已向百載農人廢南畝之務女工失機杼之業推此揆之則蔬食而長飢薄衣而履冰者固不少矣臣聞主之所求於民者二民之所望於主者三二謂求其為己勞也求其為己死也三謂飢者能食之勞者能息之有功者能賞之民已致其二事而主失其三望者則怨心生而功不建今帑藏不實民勞役猥主之二求已備民之三望未報且飢者不待備羞而後飽寒者不俟狐貉而後溫為味者口之奇文繡者身之飾也今事多而役繁民窮而俗奢百工作無用之器婦人為綺靡之飾不勤麻枲並繡文黼黻轉相倣效恥獨無有兵民之家猶復逐俗內無擔石之儲而出有綾綺之服至於富賈商販之家奢恣尤甚天下未平百姓不贍宜一生民之原豐穀帛之業而棄功於浮華之巧妨日於侈靡之事上無尊卑等級之差下有耗財費力之損且美貌者不待華采以崇好豔姿者不待文綺以致愛五色之飾足以麗矣若極粉黛窮盛服未必無醜婦廢華采去文繡未必無美人也若實如所論有之無益廢之無損者何愛而不暫禁以充府藏之急乎此救乏之上務富國之本業也使管晏復生無以易此漢之文景承平繼統天下已定四方無虞猶以雕文之傷農事錦繡之害女工開國家之利杜飢寒之本況今六合分乖豺狼充路兵不離疆甲不解帶而可以不廣生財之原充府藏之積哉
