body:
  text: 史記下列傳管仲夷吾者潁上人也少時常與鮑叔牙遊鮑叔知其賢管仲貧困常欺鮑叔鮑叔終善遇之已而鮑叔事齊公子小白管仲事公子糾及小白立公子糾死管仲囚焉鮑叔遂進管仲管仲既用任政於齊桓公以霸九合諸侯一匡天下管仲之謀也鮑叔既進管仲以身下之子孫世祿於齊常為名大夫世不多管仲之賢而多鮑叔能知人也晏平仲嬰者萊人也萊者今東萊地也事齊靈公莊公景公以節儉力行重於齊其在朝君語及之則危言語不及則危行國有道則順命無道則衡命以此三世顯名於諸侯太史公曰吾讀晏子春秋詳哉其言之也至其諫説犯君之顏此所謂進思盡忠退思補過者哉韓非者韓之諸公子也作孤憤五蠹內外儲説林説難十餘萬言人或傳其書至秦秦王見之曰嗟乎寡人得見此人與之遊死不恨矣秦因急攻韓韓王乃遣非使秦秦王悅之未信用李斯姚賈害之毀之曰韓非韓之諸公子也今王欲并諸侯非終為韓不為秦此人情也今王不用久留而歸之此自遺患也不如以過法誅之秦王以為然下吏治非李斯使人遺非藥使早自殺韓非欲自陳不得見王後悔使人赦之非已死矣司馬穰苴者田完之苗裔也齊景公時晉伐阿甄而燕侵河上齊師敗績景公患之晏嬰乃薦田穰苴景公以為將軍將兵扞燕晉之師穰苴曰臣素卑賤君擢之閭伍之中加之大夫之上士卒未附百姓不信願得君之寵臣國之所尊以監軍乃可於是景公使莊賈往穰苴既辭與莊賈約曰且日日中會於軍門穰苴先馳至軍立表下漏待賈賈素驕貴親戚左右送之留飲夕時乃至穰苴曰何後期為賈謝曰大夫親戚送之故留穰苴曰將受命之日則忘其家臨軍約束則忘其親援枹鼓之急則忘其身今敵深侵邦內騷動士卒暴露於境君寢不安席食不甘味百姓之命皆懸於君何謂相送乎於是遂斬莊賈以徇三軍之士皆振栗然後行士卒次舍井飲食問疾醫藥身自拊循之悉取將軍之資糧享士卒平分糧食比其羸弱者三日而後勒兵病者求行爭奮赴戰晉師聞之為罷去燕師聞之渡易水而解於是追擊之遂取所亡故境而歸立為大司馬孫武者齊人也以兵法見於吳王闔廬闔廬曰子之十三篇吾盡觀之矣可小試勒兵乎對曰可闔廬曰可試以婦人乎曰可於是許之出宮中美人得百八十人孫子分為二隊以王之寵姬二人各為隊長令之曰汝知而心與左右手背乎婦人曰知之孫子曰前則視心左則視左手右則視右手後則視背婦人曰諾乃設鈇鉞三令而五申之於是鼓之右婦人大笑孫子曰約束不明申令不熟將之罪也復三令而五申之鼓之左婦人復大笑孫子曰約束不明申令不熟將之罪也既已明而不如法者吏士之罪也乃欲斬左右隊長吳王從臺上觀見且斬愛姬大駭趣使下令曰寡人已知將軍能用兵矣寡人非此二姬食不甘味願勿斬也孫子曰臣已受命將將在軍君命有所不受遂斬隊長二人以徇用其次為隊長於是復鼓之婦人左右前後跪起皆中規矩繩墨無敢出聲者於是孫子使使報曰兵已整唯王所欲用之雖赴水火猶可也吳王曰將軍罷休就舍寡人不願下觀孫子曰王徒好其言不能用其實於是闔廬知孫子能用兵也卒以為將西破楚入郢北威齊晉顯名諸侯吳起者衛人也魏文侯以為將與士卒下者同衣食臥不設席行不騎乘親裹糧與士卒分勞卒有病疽者吳起為吮之卒母哭之人曰子卒也而將軍自吮其疽何哭為母曰不然也往年吳公吮其父其父戰不旋踵而遂死於敵今又吮此子妾不知其死處矣是以哭之文侯既卒事武侯武侯浮西河而下中流顧而謂起曰美哉山河之固此魏國之寶也起對曰在德不在險昔三苗氏左洞庭而右彭蠡德義不修而禹滅之夏桀之居左河濟右太華伊闕在其南羊腸在其北羊腸在大原修政不仁而湯放之殷紂之國左孟門右太行常山在其北大河經其南修政不德武王殺之由此觀之在德不在險若君不修德船中之人盡敵國也武侯曰善甘茂者下蔡人也秦武王以為左丞相謂茂曰寡人欲容車通三河以窺周室而寡人死不朽矣茂曰請之魏約以伐韓而令向壽輔行茂謂向壽子歸言之於王曰魏聽臣矣然願王勿伐也壽歸以告王王迎茂於息壤茂至王問其故對曰宜陽大縣也雖名曰縣其實郡也今王倍數險行千里攻之難昔曾參之處費魯人有與曾參同姓名殺人人告其母曰曾參殺人其母織自若也頃然一人又告其母尚織自若也頃然一人又告之其母投杼下機踰牆而走夫以曾參之賢與其母信之也三人疑之其母懼焉今臣之賢不若曾參王之信臣又不如曾參之母信曾參也疑臣者非特三人臣恐大王之投杼也始張儀西并巴蜀之地北開西河之外南取上庸天下不以多張子而賢先王魏文侯令樂羊將而攻中山三年而拔之樂羊返而論功文侯示之謗書一篋樂羊再拜稽首曰此非臣功主君之力也今臣羈旅之臣樗里子公孫奭二人者挾韓而議王必聽之王欺魏而臣受公仲侈之怨也王曰寡人不聽也請與子盟卒使茂將兵伐宜陽五月而不拔樗里子公孫奭果爭之武王召茂欲罷兵茂曰息壤在彼王曰有之因大悉起兵使茂擊之遂拔宜陽韓襄王使公仲侈入謝白起者郿人也善用兵事秦昭王昭王使白起為上將軍前後斬首虜四十五萬人趙人大震使蘇代厚幣説秦相應侯曰武安君所為秦戰勝攻取者七十餘城南定鄢郢漢中北禽趙括之軍雖周召呂望之功不益於此矣今趙亡秦王王則武安君必為三公君能為之下乎雖無欲為之下固不得已矣秦嘗攻韓圍邢丘困上黨上黨之人皆反為趙天下不樂為秦民之日久矣今亡趙北地入燕東地入齊南地入韓魏則君之所得民亡幾何人故不如因而割之無以為武安君功也於是應侯言秦王曰秦兵勞請許韓趙之割地以和且休士卒王聽之皆罷兵武安君由是與應侯有隙秦復發兵使王陵攻趙陵戰少利秦王欲使武安君代陵將武安君言曰秦雖破長平軍而秦卒死者亦過半國內空遂遠絶河山而爭人國都趙應其內諸侯攻其外破秦軍必矣不可秦王強起武安君武安君遂稱病篤應侯請之不起於是免為士伍遷之陰密屬安定武安君病未能行秦王乃使人遣白起不得留咸陽中武安君既行出咸陽西門十里至杜郵秦昭王與應侯群臣議曰白起之遷其意尚怏怏不服有餘言秦王乃使使者賜之劍自裁武安君遂自殺秦人憐之鄉邑皆祭祀焉樂毅聞燕昭王屈身下士先禮郭隗以招賢者毅為魏使燕遂委質為臣昭王以為亞卿時齊湣王強自矜百姓弗堪於是昭王使毅約趙楚魏以伐齊昭王悉起兵使毅為上將軍并護趙楚韓魏燕之兵以伐齊破之濟西諸侯兵罷歸而毅獨追入臨災盡取齊寶財物輸之燕昭王大悅封樂毅於昌國齊七十餘城皆為郡縣以屬燕唯獨莒即墨未服會燕昭王卒惠王自為太子時嘗不快於毅及即位齊之田單聞之乃縱反間於燕曰齊城不下者兩城耳然所以不早下者聞樂毅與燕新王有隙欲連兵且留齊南面而王齊齊之所患唯恐他將之來惠王固已疑毅得齊間乃使騎劫代將而召毅毅知惠王之弗善代之遂西降趙齊田單遂破騎劫盡復得齊城廉頗者趙之良將也藺相如者趙人也趙王與秦王會澠池秦王飲酒酣曰寡人竊聞趙王好音請秦瑟趙王鼓瑟秦御史前書曰某年某月秦王與趙王會飲令趙王鼓瑟相如前曰趙王竊聞秦王善為秦聲請奉盆以相樂秦王怒不許於是相如前進因跪請秦王不肯擊相如曰五步之內相如請得以頸血濺大王矣左右欲刃相如相如如張目叱之左右皆靡於是秦王不懌為一擊相如顧召趙御史書曰某月秦王為趙王擊秦之群臣曰請以趙十五城為秦王壽相如亦曰請以秦之咸陽為趙王壽秦王竟酒終不能加勝於趙既罷歸國以相如功大拜為上卿位在廉頗之右頗曰我為趙將有攻城野戰之功而藺相如徒以口舌為勞而位居我上且相如素賤人吾羞不忍為之下宣言曰我見相如必辱之相如聞每朝常稱病已而相如出望見廉頗引車避匿於是舍人相與諫曰臣所以去親戚而事君者徒慕君之高義也今君與廉君同列廉君宣惡言而君畏匿之恐懼殊甚且庸人尚羞之況於將相乎臣等不肖請辭去相如固止之曰公之視廉將軍孰與秦王曰不若也相如曰夫以秦王之威而相如廷叱之辱其群臣相如雖駑獨何畏廉將軍哉顧吾念之強秦之所以不敢加兵於趙者徒以吾兩人在也今兩虎其勢不俱生吾所以為此先公家之急而後私讎也頗聞之肉袒負荊因賓客至相如門謝罪曰鄙賤之人不知將軍寬之至此也卒相與歡為刎頸之交趙奢者趙之田部吏也收稅而平原君家不肯出奢以法治之殺平原君用事者九人平原君怒將殺奢因説曰君於趙為貴公子今縱君家而不奉公則法削法削則國弱國弱則諸侯加兵諸侯加兵是無趙也君安得有此富乎以君之貴奉公如法則上下平上下平則國強國強則趙固而君為貴戚豈輕於天下邪平原君以為賢言之王王用之治國賦國賦大治民富而府庫實秦伐韓軍閼與王乃令奢將救之大破秦軍惠文王賜奢爵號為馬服君孝成王立秦與趙兵相距長平使廉頗將固壁不戰秦之間言曰秦之所惡獨畏趙奢之子趙括為將耳趙王因以括為將代廉頗括自少時學兵法言兵事以天下莫能當嘗與其父奢言兵事奢不能難然不謂之善括母問其故奢曰兵死地也而括易言之使趙不將括則已若必將之破趙軍者必括也及括將行其母上書曰括不可使將王曰何以對曰始妾事其父時為將身所奉飯而進食者以十數所友者以百數大王及宗室所賞賜者盡以與軍吏士大夫受命之日不問家事今括一旦為將東向而朝軍吏無仰視之者王所賜金帛歸藏家而日視便利田宅可買者王以為何如其父父子異心願王勿遣王曰母置之吾已決矣終遣之括既代廉頗悉更約束易置軍吏秦將白起聞之縱奇兵射殺括數十萬之衆遂降秦秦悉坑之李牧者趙之北邊良將也常居代鴈門備胸奴日饗士習騎射謹烽火多間諜厚遇戰士為約曰胸奴即入盜急入收保有敢捕虜者斬如是數歲亦不亡失然胸奴以李牧為怯雖趙邊兵亦以為吾將怯趙王讓牧牧如故趙王怒召之使他人代將歲餘胸奴每來出戰戰數不利失亡多邊不得田畜復請牧牧固稱疾趙王乃復強起使將兵牧曰王必用臣如前乃敢奉令王許之牧至如故約胸奴數歲無所得終以為怯邊士日得賜而不用皆願得一戰於是悉勒習戰大縱畜牧人民滿野胸奴小入佯北不勝以數千人委之單于聞之大率衆來入牧多為奇陳張左右翼擊之大破殺胸奴十餘萬騎破東胡單于奔走胸奴不敢近趙邊屈原者名平楚之同姓也為楚懷王左徒博聞強志明於治亂嫺於辭令入則與王圖議國事以出號令出則接遇賓客應對諸侯王甚任之上官大夫與之同列而心害其能懷王使平造為憲令平屬草未定上官大夫見而欲奪之平不與因讒之曰王使屈平為令衆莫弗知每一令出屈平伐其功以為非我莫能為也王怒而疏平平疾王聽之不聰也讒諂之蔽明也邪曲之害公也方正之不容也故憂愁幽思而作離騷平既絀其後秦大破楚師懷王入秦而不反平雖放流眷顧楚國冀幸君之一悟俗之一改也令尹子蘭卒使上官大夫短原於頃襄王頃襄王怒而遷之遷於江南遂自投汨羅以死汨水在羅故曰汨羅原既死之後楚日以削竟為秦所滅豫讓者晉人也故嘗事范氏及中行氏而無所知名去而事智伯智伯甚尊寵之及智伯伐趙趙襄子與韓魏合謀滅智伯三分其地襄子漆智伯頭以為飲器豫讓遁逃山中變名易姓為刑人入宮塗廁欲以刺襄子襄子如廁心動執問塗廁之刑人豫讓內持刀兵曰欲為智伯報讎左右欲誅之襄子曰彼義人也吾謹避之耳釋去之居頃之豫讓又漆身為厲吞炭為啞行乞於市其妻不識行見其友其友識之曰以子之材委質而臣事襄子襄子必近幸子近幸子乃為所欲顧不易邪何乃殘身苦形欲以求報襄子不亦難乎豫讓曰既已委質臣事人而殺之是懷二心以事君也且吾所為者極難耳然所以為此者將以愧天下後世之為人臣懷二心以事其君也頃之襄子當出豫讓伏於所當過之橋下襄子至橋馬驚曰此必是豫讓也使人問之果豫讓也於是趙襄子數豫讓曰子不嘗事范中行氏乎智伯盡滅之而子不為報讎反委質臣於智伯智伯亦已死矣而子獨何以為之報讎之深也豫讓曰臣事范中行氏范中行氏皆衆人遇我我故衆人報之至於智伯國士遇我我故國士報之李斯者楚上蔡人也為丞相始皇出遊會稽斯及中車府令趙高皆從始皇有二十餘子長子扶蘇以數直諫使監兵上郡蒙恬為將少子胡亥從始皇帝至沙丘疾甚令趙高為書賜公子扶蘇曰以兵屬蒙恬與喪會咸陽而葬書已封未授使者始皇崩於是斯高相與謀詐為受始皇詔立子胡亥為太子更為書賜扶蘇劍以自裁將軍恬賜死至咸陽發喪太子立為二世皇帝以趙高為郎中令常侍中用事二世燕居乃召高與謀謂高曰夫人生世間也譬猶騁六驥過決隙也吾既已臨天下矣欲悉耳目之所好窮心志之所樂以安宗廟而樂萬姓長有天下終吾年壽其道可乎高曰此賢主之所能行而昏亂主之所禁也臣請言之願陛下少留意焉夫沙丘謀諸公子至大臣皆疑焉而諸公子盡帝兄大臣又先帝之所置也今陛下初立此其屬意怏怏皆不服恐為變且蒙恬已死蒙毅將兵居外臣戰戰栗栗唯恐不終且陛下安得為此樂乎二世曰為之奈何趙高曰嚴法而刻刑令有罪者相坐誅至收族滅大臣而遠骨肉貧者富之賤者貴之盡除去先帝之故臣更置陛下之所親信者近之此則陰德歸陛下害除而姦謀塞群臣莫不被潤澤蒙厚德陛下則高枕肆志寵樂矣計莫出於此二世然高之言乃更為法律群臣諸公子有罪輒下高令治之誅殺大臣蒙毅等公子十二人戮死咸陽市十公主矺死於杜相連坐者不可勝數公子高欲奔恐收族乃上書曰先帝無恙時臣入則賜食出則乘輿御府之衣臣得賜之中廄之寶馬臣得賜之臣請從死願葬驪山之足書上胡亥大悅召趙高而示之曰此可謂急乎高曰人臣當憂死不暇何變之得謀胡亥可其書賜錢十萬以葬法令誅罰日益刻深群臣人人自危欲叛者衆又作阿房之宮治直道馳道賦斂愈重戍徭無已於是楚戍卒陳勝吳廣等乃作亂斯數欲請間諫二世不許而二世責問斯曰吾有私議而有所聞於韓子也曰堯之有天下堂高三尺茅茨不翦雖逆旅之宿不勤於此矣粢糲之食藜藿之羹飯土匭啜士鉶雖監門之養不觳於此矣禹鑿龍門疏九河手足胼胝面目黎黑臣虜之勞不烈於此矣然則夫所貴於有天下者豈欲苦形勞神身處逆旅之宿口食監門之養手持臣虜之作哉此不肖人之所勉也非賢者之所務也夫所謂賢人者必將能安天下而治萬民也今身且弗能利將惡能治天下哉故吾願肆志廣欲長享天子而無害為之奈何斯子由為三川守群盜吳廣等西略地過去弗能禁李斯恐懼不知所出乃阿二世意欲求容以書對曰夫賢主者必且能全道而行督責之術者督責之則臣不敢不竭能以徇其主矣臣主之分定上下之義明則天下賢不肖莫敢不盡力竭任以徇其君矣是故主獨制於天下而無所制也能窮樂之極矣賢明之主也可不察邪故申子曰有天下而不恣睢命之曰以天下為桎梏者無他焉不能督責而顧以其身勞於天下之民若堯禹然故謂之桎梏也夫不能修申韓之明術行督責之道專以天下自適也而徒務苦形勞神以身徇百姓則是黔首之役非畜天下者也何足貴哉夫以人徇己則己貴而人賤以己徇人則己賤而人貴故徇人者賤而所徇者貴自古及今未有不然者也凡古之所謂尊賢者為其貴也而所為惡不肖者為其賤也夫堯禹以身徇天下者也可謂大繆矣謂之為桎梏不亦宜乎不知督責之過也故韓子曰慈母有敗子而嚴家無格虜者何也則能罰之加焉必也故商君之法刑棄灰於道者夫棄灰薄罪也而被刑重罰也彼唯明主為能深督輕罪夫輕罪且督深而況有重罪乎故民弗敢犯也明主聖王之所以能久處尊位長執重勢而獨擅天下之利者非有異道也能獨斷而審督責必深罰故天下弗敢犯也今不務所以不犯而事慈母之所以敗子也則亦不察於聖人之論矣凡賢主者必將能拂世摩俗而廢其所惡立其所欲故生則有尊重之勢死則有賢明之諡也是以明君獨斷故權不在臣也然後能滅仁義之塗掩馳説之口困烈士之行塞聰掩明內獨視聽故外不可傾以仁義烈士之行而內不可奪以諫説忿爭之辨故能犖然獨行恣睢之心而莫敢逆若此然後可謂能明申韓之術而修商君之法法修術明而天下亂者未之有也故督責之術設則所欲無不得矣群臣百姓救過不給何變之敢圖若此則帝道備而可謂能明君臣之術矣雖申韓復生弗能加也書奏二世悅於是行督責益嚴稅民深者為明吏二世曰若此則可謂能責矣刑者相半於道而死人日成積於市殺人衆者為忠臣二世曰若此則可謂能督矣初趙高為郎中令所殺及報私怨衆多恐大臣入朝奏事毀惡之乃説二世曰天子所以貴者以聞聲群臣莫得見其面故號曰朕且陛下富於春秋未必盡通諸事今坐朝廷譴舉有不當者則見短於大臣非所以示神明於天下且陛下深拱禁中與臣及侍中習法者待事事來有以揆之如此則大臣不敢奏疑事天下稱聖主矣二世用其計乃不坐廷見大臣居禁中趙高常侍中用事事皆決於高高聞斯以為言乃見丞相曰關東群盜多今上急益發繇治阿房聚狗馬無用之物臣欲諫為位賤此真君侯之事君何不諫斯曰固也吾欲言之久矣今時上不坐朝廷上居深宮吾所欲言者不可傳也欲見無間高謂曰君誠能諫請為君侯上間語君於是趙高待二世方宴樂婦女居前使人告丞相上方間可奏事丞相至宮門上謁如此者三二世怒曰吾常多間日丞相不來吾方宴私丞相輒來請事丞相豈少我且固我哉越高因曰此殆矣夫沙丘之謀丞相與焉今陛下已立為帝而丞相貴不益此其意亦望裂地而王矣且陛下不問臣臣不敢言丞相長男由為三川守楚盜陳勝等皆丞相傍縣之子以故楚盜公行過三川城守不肯擊高聞其文書相往來未得其審故未敢以聞且丞相居外權重於陛下二世以為然欲案丞相恐其不審乃使人案驗三川守與盜通狀斯聞之因上書言高短曰臣聞之臣疑其君無不危國妾疑其夫無不危家今高有邪佚之志危反之行陛下不圖臣恐其為變也二世曰何哉夫高故宦人也然不為安肆志不以危易心潔行循善自使至此以忠得進以信守位朕實賢之而君疑之何也且朕少失先人無識不習治而君又老恐與天下絶矣朕非屬趙君當誰任哉且趙君為人精廉強力下知民情上能適朕君其勿疑李斯曰不然夫高故賤人也無識於理貪欲無饜求利不止烈勢次主求欲無窮臣故曰殆二世乃私告趙高高曰丞相所患者獨高高已死丞相欲為田常所為於是二世責斯與子由謀反狀皆收捕宗族賓客高治斯榜掠千餘不勝痛自誣服斯所以不死者自負有功實無反心上書自陳幸二世之寤高使吏棄去弗奏曰囚安得上書使其客十餘輩詐為御史謁者侍中更往覆訊斯斯更以其實對輒使人復榜之後二世使人驗斯斯以為如前終不敢更言辭服奏當上二世喜曰微趙君幾為丞相所賣具斯五刑論腰斬咸陽市遂夷三族李斯已死二世拜高為中丞相事無大小輒決於高高自知權重乃獻鹿謂之馬二世問左右此乃鹿也左右曰馬也二世驚自以為惑乃召太卜令卦之太卜曰陛下春秋郊祀奉宗廟鬼神齋戒不明故至于此可依盛德而明齋戒於是乃入上林齋戒日遊弋獵有行人二世自射殺之高乃諫二世天子無故賊殺不辜人此上帝之禁天且降殃當遠避宮以禳之二世乃出居望夷之宮留三日高劫令自殺也田叔者趙人也趙王張敖以為郎中高祖過趙貫高等謀弒上發覺詔捕趙王趙有敢隨王者罪三族唯孟舒田叔等自髡鉗隨王至長安敖得出叔為漢中守文帝召叔問曰公知天下長者乎叔曰故雲中守孟舒長者上曰先帝置舒雲中十餘年矣虜曾一入舒不能堅守無故士卒戰死者數百人長者固殺人乎叔曰是乃孟舒所以為長者也漢與楚相距士卒疲弊胸奴冒頓新服北夷來為邊害孟舒知士卒疲弊不忍出言士爭臨城死敵如子為父弟為兄以故死者數百人孟舒豈故驅戰之哉是乃孟舒所以為長者也於是上曰賢哉孟舒復以為雲中守景帝以田叔為魯相魯王好獵相常從入苑中王輒休相就館舍相出常暴坐待王苑外王數使人請相曰休終不休曰我王暴露苑中我獨何為就舍魯王以故不大出遊循吏傳太史公曰法令所以導民也刑罰所以禁姦也文武不備良民懼然身修者官未嘗亂也奉職循理亦可以為治何必威嚴哉公儀休為魯相奉法循理無所變更百官自正使食祿者不得與下民爭利受大者不得取小客有遺相魚者不受也客曰聞君嗜魚遺君魚何故不受也相曰以嗜魚故不受也今為相能自給魚今受魚而免誰復給我魚者吾故不受也食茹而美拔其園葵而棄之見其家織布好而疾出其家婦燔其機云欲令農士工女安所讎其貨乎酷吏傳孔子曰導之以政齊之以刑民免而無恥導之以德齊之以禮有恥且格格正老氏稱法令滋章盜賊多有太史公曰信哉是言也法令者治之具而非制治清濁之源也昔天下之網嘗密矣然姦偽萌起其極也上下相遁至於不振當是之時吏治若救火揚沸非武健嚴酷惡能勝其任而愈快乎言道德者溺於職矣故曰聽訟吾猶人也必也使無訟乎下士聞道大笑之非虛言也漢興破觚而為圓觚方斫雕而為朴網漏於吞舟之魚而吏治蒸蒸不至於姦黎民艾安由是觀之在彼不在此在道德不在嚴酷也滑稽傳優孟者楚優人也莊王之時有愛馬衣以文繡置之華屋之下席以露床啖以棗脯馬病肥死使以大夫禮葬之下令有諫者死優孟入門大哭曰馬者王之所愛也以楚國堂堂之大何求不得而以大夫禮葬之薄請以人君禮葬之以雕玉為棺文梓為槨發卒穿壙老弱負土廟食太牢奉以萬戶諸侯聞之皆知大王賤人而貴馬王曰寡人過一至此乎為之奈何孟曰請為大王六畜葬之人腹腸於是王乃使以馬屬大官無令天下久聞也楚相孫叔敖死其子窮困負薪孟即為敖衣冠抵掌談語抵掌談説之容則也歲餘像孫叔敖王大驚以為叔敖復生也欲以為相孟曰楚相不足為也如孫叔敖之為楚相盡忠為廉以治楚遊楚得以霸今死其子無立錐之地貧困負薪以自飲食楚相不足為也於是莊王謝優孟乃召叔敖子封之寢丘優旃者秦倡侏儒也善為笑言然合大道秦始皇帝議欲大苑囿東至函谷關西至雍陳倉優旃曰善多縱禽獸於其中寇從東方來令糜鹿觸之足矣始皇以故輟止二世立又欲漆其城優旃曰善漆城雖於百姓愁費然佳哉漆城蕩蕩寇來不能上即欲就之易為漆耳顧難為蔭室於是二世笑之以其故止魏文侯時西門豹為鄴令鄴三老廷掾常歲賦斂百姓收取其錢得數百萬用其二三十萬為河伯娶婦與祝巫共分其餘錢人家有好女者持女逃亡以故城中益空無人又困貧俗曰不為河伯娶婦水來漂沒至為河伯娶婦送女河上豹往會之曰是女不好煩大巫嫗入報更求好女後日送之即使吏卒共抱大巫嫗投之河中有頃曰巫嫗何久也弟子趣之復以弟子一人投河中有頃曰弟子何久也復使投之凡投三弟子也豹曰巫嫗弟子女子也不能白事煩三老為入白之復投三老豹曰巫嫗三老不來奈何欲復使掾趣之皆叩頭破額血流豹曰若皆罷歸去吏民大驚恐從是已後不敢言為河伯娶婦豹發民鑿十二渠引河水灌田民煩苦不欲豹曰民可與樂成不可與慮始今雖患苦然期令子孫思我至今皆得水利民人以給足故豹為鄴令澤流後世無絶巳時子産治鄭民不能欺子賤治單父人不忍欺西門豹治鄴人不敢欺三子之才能誰賢哉辨治者當能別之魏文帝問群臣三不欺於君德孰優太尉鍾繇司徒華歆司空王朗對曰臣以為君任德則臣感義而不忍欺君任察則臣畏覺而不能欺君任刑則臣畏罪而不敢欺任德感義與夫導德齊禮有恥且格等同歸者也孔子曰為政以德譬如北辰居其所而衆星拱之考以斯言論以斯義臣等以為不忍欺不能欺優劣之縣在權衡非徒低昂之差乃鈞銖之覺也且前志稱仁者安仁智者利仁畏罪者強仁校其仁者功則無以殊核其為仁者則不得不異安仁者性善者也利仁者力行者也強仁者不得已者也三仁相比則安者優矣易稱神而化使民宜之若君化然也然則安仁之化與夫強仁之化優劣亦不得不相懸絶也然則三臣之不欺雖同所以不欺異則純以恩義崇不欺與以威察成不欺既不得同概而比量又不得錯綜而易處吳越春秋吳王夫差聞孔子與子貢遊於吳出求觀其形變服而行為或人所戲而傷其指夫差還發兵索於國中欲誅或人子胥諫曰臣聞昔上帝之少子下遊青泠之淵化為鯉魚隨流而戲漁者豫沮射而中之上欣天帝天帝曰汝方遊之時何衣而行少子曰我為鯉魚上帝曰汝乃白龍也而變為魚漁者射汝是其宜也又何怨焉今夫大王棄萬乘之服而從匹夫之禮而為或人所刑亦其宜也於是吳王默然不言吳王夫差興兵伐齊掘為漁溝通於商魯之間北屬之沂西屬之濟欲以會晉恐群臣之諫也乃令於邦中曰寡人伐齊敢有諫者死太子友乃風諫以發激吳王之心以清朝時懷丸挾彈從後園而來衣洽履濡吳王怪而問之曰可為如此也友曰遊於後園聞秋蟬之鳴往而觀之夫秋蟬登高樹飲清露其鳴悲吟自以為安不知蟷蜋超枝緣條申要舉刃纆其形也夫蟷蜋愈心財進志在利蟬不知黃雀徘徊枝葉欲啄之也夫黃雀但知伺蟷蜋不知臣飛丸之集其背也但臣知虛心念在黃雀不知坎在於前掩忽陷墜於深井也王曰天下之愚莫過於斯知貪前之利不睹其後之患也對曰天下之愚非但直於是也復有甚者王曰豈復有甚於是者乎友曰夫魯守文抱德無欲於鄰國而齊伐之齊徒知舉兵伐魯不知吳悉境內之士盡府庫之財暴師千里而攻之也吳徒知踰境貪敵往伐齊不知越王將選其死士出三江之口入五湖之中屠滅吳國也臣竊觀禍之端天下之危莫過於斯也王喟然而歎默無所言遂往伐齊不用太子之諫越王勾踐聞吳王北伐乃帥軍泝江以襲吳遂入吳國焚其姑蘇之臺
