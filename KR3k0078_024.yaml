body:
  text: 後漢書三傳楊震字伯起弘農人也遷東萊太守道經昌邑故所舉茂才王密為昌邑令謁見至夜懷金十斤以遺震震曰故人知君君不知故人何也密曰暮夜無知者震曰天知神知我知子知何謂無知密愧而出後轉涿郡太守性公廉子孫常蔬食步行故舊長者或欲令為開產業震曰使後世稱為清白吏子孫以此遺之不亦厚乎為司徒安帝乳母王聖因保養之勤緣恩放恣聖子女伯榮出入宮掖傳通奸賂震上疏曰臣聞政以得賢為本理以去穢為務是以唐虞俊乂在官四凶流放天下咸服以致雍熙方今九德未事嬖倖允庭阿母王聖出自至微得遭干載奉養聖躬雖有推燥居濕之勤前後賞惠過報勞苦而無厭之心不知紀極外交屬託擾亂天下損辱清朝塵點日月書誡牝雞牡鳴詩刺哲婦喪國夫女子小人實為難養宜速出阿母令居外舍斷絕伯榮莫使往來令恩德兩隆上下俱美惟陛下絕婉孌之私割不忍之心留神萬機誡慎拜爵減省獻御損節徵發令野無鶴鳴之歎朝無小明之悔大東不興於今勞止不怨於下擬蹤往古比德哲王豈不休哉奏御帝以示阿母等內倖皆懷忿恚而伯榮驕淫尤甚與故朝陽侯劉護再從兄環交通環遂以為妻得襲護爵位至侍中震深疾之復詣闕上疏曰臣聞高祖與群臣約非功臣不得封故經制父死子繼兄亡弟及以防篡也伏見詔書封故朝陽侯劉護再從兄環襲護爵為侯護同產弟威今猶見在臣聞天子專封封有功諸侯專爵爵有德今無他功行但以配阿母女一時之間既忝侍中又至封侯不稽舊制不合經義行人諠譁百姓不安陛下宜覽鏡既往順帝之則書奏不省時詔遣使者大為阿母治第中常侍樊豐及侍中周廣謝惲等更相扇動傾搖朝廷震復上疏曰臣伏念方今災害發起百姓空虛不能自贍重以螟蝗羌虜抄掠三邊震擾兵甲軍糧不能復給大司農帑藏匱乏殆非社稷安寧之時伏見詔書為阿母興起津城門內第舍合兩為一連里竟街雕治繕飾窮極巧技轉相迫促為費巨億周廣謝惲兄弟與國無肺腑枝葉之屬依倚近倖分威共權屬託州郡傾動大臣宰司辟召承望旨意招來海內貪汙之人受其貨賂至有贓錮棄世之徒復得顯用白黑溷淆清濁同源天下諠譁為朝結譏臣聞師言上之所取財盡則怨力盡則叛怨叛之民不可復使惟陛下度之豐惲等見震連切諫不從無所顧忌遂詐作詔書調發司農錢穀大匠見徒材木各起家舍園池廬觀役費無數震因地震復上疏前後所上轉有切至帝既不平之而樊豐等皆側目憤怨俱以其大儒未敢加害尋有河間男子趙騰詣闕上書指陳得失帝發怒遂收攷詔獄結以罔上不道震復上疏救之曰臣聞堯舜之世諫鼓謗木立之於朝殷周哲王小人怨詈則洗目改聽所以達聰明開不諱博採負薪盡極下情也今趙騰所坐激訐謗語為罪宜與手刃犯法有差乞為虧除全騰之命以誘芻蕘輿人之言帝不省騰竟伏尸都市會東巡岱宗樊豐等因乘輿在外競治第宅震部掾高舒召大匠令史攷校之得豐等所詐下詔書具奏須行還上之豐等聞惶怖遂共譖震云自趙騰死後深用怨懟且鄧氏故吏有恚恨心及車駕行還遣使者策收震太尉印綬震於是柴門絕賓客豐等復惡之乃請大將軍耿寶奏震大臣不服罪懷恚望有詔遣歸本郡震行至城西夕陽亭乃慷慨謂其諸子門人曰死者士之常分吾蒙恩居上司疾姦臣狡猾而不能誅惡嬖女傾亂而不能禁何面目復見日月身死之日以雜木為棺布單被裁足蓋形勿歸冢次勿設祭祠因飲酖因卒震中子秉字叔節延熹五年為太尉是時宦官方熾中常侍侯覽弟參為益州刺史累有臧罪暴虐一州秉劾奏參檻車徵詣廷尉參自殺秉因奏覽及中常侍具瑗免覽而削瑗國每朝廷有得失輒盡忠規諫多見納用秉性不飲酒嘗從容言曰我有三不惑酒色財也秉子賜字伯獻為司徒坐辟黨人免復拜光祿大夫光和元年有虹蜺書降於嘉德殿前帝惡之引賜入金商門使中常侍曹節王甫問以祥異禍福所在賜仰天而歡謂節等曰吾每讀張禹傳未嘗不憤恚歎息既不能竭忠盡情極言其要而反留意少子乞還女至令朱游欲得尚方斬馬劍以治之固其宜也吾以微薄之學充師傅之末累世見寵無以報國猥當大問死而後已乃手書對曰臣聞之經傳或得神以昌或得神以亡國家休明則鑑其德邪辟昏亂則視其禍今殿前之氣應為虹蜺皆妖邪所生不正之象詩人所謂蝃蝀者也今內多嬖倖外任小臣上下並怨諠譁盈路是以災異屢見前後丁寧今復投蜺可謂孰矣易曰天垂象見吉凶聖人則之今妾媵嬖人閹尹之徒共專國朝欺罔日月又鴻都門下招會群小造作賦說以蟲篆小技見寵於時如讙兜共工更相薦說旬月之間并各拔擢樂松處常伯任芝居納言儉梁鵠以便辟之性佞辯之心各受豐爵不次之寵而令搢紳之徒委伏畎畝口誦堯舜之言身蹈絕俗之行棄捐溝壑不見逮及冠履倒易陵谷代處從小人之邪意順無知之私欲不念板蕩之作虺蜴之誡殆哉之危莫過於今幸賴皇天垂象譴告周書曰天子見怪則修德諸侯見怪則修政惟陛下慎經典之誡圖變復之道斥遠佞巧之臣速徵鶴鳴之士內親張仲外任山甫斷絕尺一抑止盤游留思庶政無敢怠遑冀上天還威眾變可弭老臣過受師傅之任數蒙寵異之恩豈敢愛惜垂沒之年而不盡其慺慺之心哉張皓字叔明犍為人也子綱字文紀為侍御史時順帝委縱宦官有識危心綱常感激慨然歡曰穢惡滿朝不能奮身出命歸國家之難雖生吾不願也退而上書曰詩云不愆不忘率由舊章尋大漢初隆及中興之世文明二帝德化尤盛觀其治為易循易見但恭儉守節約身尚德而已中官常侍不過兩人近倖賞賜裁滿數金惜費重民故家給人足而頃者以來不遵舊典無功小人皆有官爵富之驕之而復害之非愛民重器承天順道者也伏願陛下割損左右以奉天心書奏不省漢安元年選遣八使巡行風俗皆耆儒知名多歷顯位唯綱年少官次最微餘人受命之部而綱獨埋其車輪於洛陽都亭曰豺狼當路安問狐貍遂奏曰大將軍冀河南尹不疑蒙外戚之援荷國厚恩以芻蕘之資居阿衡之任不能敬敷揚五教翼讚日月而專為封豕長蛇肆其貪叨甘心好貨縱恣無底多樹謅諛以害忠良誠天威所不赦大辟所宜加也謹條其無君之心十五事斯皆臣子所以切齒者也書奏御京師震竦時冀妹為皇后內寵方盛諸梁姻族滿朝帝雖知綱言直終不忍用時廣陵賊張嬰等眾數萬人殺刺史二千石寇亂楊徐閒積十余年朝廷不能討冀乃諷尚書以綱為廣陵太守因欲以事中之前遣郡守率多求兵馬綱獨請單車之職既到乃將吏卒十余人徑造嬰壘申示國恩嬰初大驚既見綱誠信乃出拜謁綱延置上坐問所疾苦乃譬之曰前後二千石多肆貪暴故致公等懷憤相聚二千石信有罪矣然為之者又非義也今主上仁聖欲以文德服叛故遣太守思以爵祿相榮不願以刑罰相加今誠轉禍為福之時也若聞義不服天子赫然震怒荊楊兗豫大兵雲合豈不危乎若不料疆弱非明也棄善取惡非智也去順效逆非忠也身絕血嗣非孝也背正從邪非直也見義不為非勇也六者成敗之幾利害所從公其深計之嬰聞之泣下曰荒裔愚民不能自通朝廷不堪侵枉遂復相聚偷生若魚游釜中喘息須臾閒耳今聞明府之言乃嬰等更生之晨也既自陷不義實恐投兵之日不免孥戮綱約之以天地誓之以日月嬰深感悟乃辭還營明日將所部萬余人與妻子面縛歸降綱乃單車入嬰壘大會置酒為樂散遣部眾任從所之親為卜居宅相田疇子弟欲為吏者皆引召之民情悅服南州晏然朝廷論功當封梁冀遏絕乃止天子嘉美欲擢用綱而嬰等上書乞留乃許之綱在郡一年卒百姓老幼相攜詣府赴哀者不可勝數綱自被疾吏民咸為祠祀求福皆言千秋萬歲何時復見此君張嬰等五百餘人制服行喪送到犍為負土成墳詔拜綱子續為郎中賜錢百萬种暠字景伯河南人也舉孝廉順帝擢暠監太子於承光宮中常侍高梵從中單駕出迎太子時太傅杜喬等疑不欲從惶惑不知所為暠乃手劍當車曰太子國之儲副民命所系今常侍來無詔信何以知非奸邪今日有死而已梵辭屈馳命奏之詔報太子乃得去喬退而嘆息愧暠臨事不惑帝亦嘉其持重稱善者良久出為益州刺史宣恩遠夷開曉殊俗岷山雜落皆懷服漢德焉劉陶字子奇一名偉潁川人也時大將軍梁冀專朝而桓帝無子連歲荒饑災異數見陶時游大學乃上疏陳事曰臣聞人非天地無以為生天地非人無以為靈是故帝非民不立民非帝不寧夫天之與帝帝之與民猶頭之與足相須而行也伏惟陛下襲常存之慶循不易之制目不視鳴條之事耳不聞檀車之聲天災不有痛于肌膚震食不即損於聖體故蔑三光之謬輕上天之怒伏念高祖之起始自布衣合散扶傷克成帝業功既顯矣勤亦至矣流福遺祚至于陛下陛下既不能增明烈考之軌而忽高祖之勤妄假利器委授國柄使群醜刑隸芟刈小民雕敝諸夏虐流遠近故天降眾異以戒陛下陛下不悟而競令虎豹窟于麑場豺狼乳于春囿斯豈唐咨禹稷益典朕虞之意哉又今牧守長吏上下交競封豕長蛇蠶食天下貨殖者為窮冤之魂貧餒者作饑寒之鬼高門獲東觀之辜豐室羅妖叛之罪死者悲於窀穸生者戚於朝野是愚臣所為咨嗟長懷歎息者也且秦之將亡正諫者誅諛進者賞嘉言結於忠舌國命出於讒口擅閻樂於咸陽授趙高以車府權去已而不知威離身而弗顧古今一揆成敗同執願陛下遠覽彊秦之傾近察哀平之變得失昭然禍福可見臣敢吐不時之議於諱言之朝猶冰霜見日必至消滅臣始悲天下之可悲今天下亦悲臣之愚惑也書奏不省是時天下日危寇賊方熾陶復上疏曰臣聞事之急者不能安言心之痛者不能緩聲竊見天下前遇張角之亂後遭邊章之寇每聞羽書告急之聲心灼內熱四體驚竦今西羌逆類曉習戰陳變詐萬端軍吏士民悲愁相守人有百走退死之心而無一前生之計西羌侵前去營咫尺胡騎分布已至諸陵將軍張溫天性精勇而主者旦夕迫促軍無後殿假令失利其敗不救臣自知言數見厭而言不自裁者以為國安則臣蒙其慶國危則臣亦先亡也謹復陳當今要急八事乞須臾之閒深垂納省其八事大較言大亂皆由宦官宦官事急共讒陶曰前張角事發詔書示以威恩自此以來各各改悔今者四方安靜而陶疾害聖政專言妖州郡不上陶何緣知疑陶與賊通情於是收陶下獄掠治日急陶自知必死對使者曰朝廷前封臣云何今反受邪譖恨不與伊呂同疇而以三仁為輩遂閉氣而死天下莫不痛之李雲字行祖甘陵人也舉孝廉遷白馬令桓帝誅大將軍梁冀而中常侍單超等五人皆以誅冀功並封列侯專權選舉又立掖庭人女亳氏為皇后數月閒后家封者四人賞賜巨萬是時地數震裂眾災頻降雲素剛憂國將危心不能忍乃露布上書移副三府曰臣聞皇后天下之母德配坤靈得其人則五氏來備不得其人則地動搖宮比年災異可謂多矣皇天下之戒可謂至矣舉厝至重不可不慎班功行賞宜應其實梁冀雖持權專擅虐流天下今以罪行誅猶召家臣搤殺之耳而猥封謀臣萬戶以上高祖聞之得無見非西北列將得無解體耶孔子曰帝者諦也今官位錯亂小人諂進財貨公行政治日損尺一拜用不經御省是帝欲不諦乎帝得奏震怒下有司逮雲送獄使中常侍管霸與御史廷尉雜考之時弘農五官掾杜眾傷雲以忠諫獲罪上書願與雲同日死帝愈怒遂并下廷尉大鴻臚陳蕃上疏救雲曰李雲所言雖不識禁忌干上逆旨其意歸於忠國而已昔高祖忍周昌不諱之諫成帝赦朱雲腰領之誅今殺雲臣恐剖心之譏復議於世矣故敢觸龍鱗冒昧以請太常楊秉洛陽市長沐茂郎中上官資並上疏請雲帝恚甚有司皆奏以為大不敬詔切責蕃秉免歸田里茂資貶秩二等雲眾皆死獄中劉瑜字季節廣陵人也舉賢良方正及到京師上書陳事曰臣在下土聽聞歌謠驕臣虐政之事遠近呼嗟之音竊為辛楚泣血連如誠願陛下且以須臾之慮覽今往之事民何為咨嗟天曷為動變邪蓋諸侯之位上法四七關之盛衰者也今中官司邪孽比肩裂士皆競立胤嗣繼體傳爵或乞子疏屬或買兒市道殆乖開國承家之義古者天子一娶九女娣姪有序今女嬖令色充積閨帷皆當盛其玩飾食空宮勞散精神生長六疾此國之費也性之傷也且天地之性陰陽正紀隔絕其道則水旱為災又常侍黃門亦廣妻娶怨毒之氣結成妖眚行路之人言官發略人女取而復置轉相驚懼孰不悉然無緣空生此謗也鄒衍匹夫氏匹婦尚有城崩霜霣之異況乃群輩咨嗟能無感乎昔秦作阿房國多刑人今第舍增多窮極奇巧掘山攻石不避時令促以嚴刑威以峻法民無罪而覆入之民有田而覆奪之民愁鬱結起入賊黨官輒興兵誅討其罪貧困之民或有賣其首級以要酬賞父兄相伐殘身妻孥相視分裂窮之如彼伐之如此豈不痛哉又陛下以北辰之尊神器之寶而微行近習之家私幸宦官之舍賓客市買熏灼道路因此暴縱無所不容今三公在位皆博達道藝而莫或匡益者非不智也畏死罰也惟陛下設置七臣以廣諫道遠佞邪之人放鄭衛之聲則治致和平德感祥風矣於是特詔召瑜拜為議郎虞詡字升卿陳國人也永建元年為司隸校尉時中常侍張防特用權埶每請托受取詡輒案之而屢寑不報詡不勝其憤乃自繫廷尉奏言曰昔孝安皇帝任用樊豐遂交亂嫡統幾亡社稷今者張防復弄威柄國家之禍將重至矣臣不忍與防同朝謹自系以聞無令臣襲楊震之跡書奏防流涕訴帝詡坐輪輸左校防必欲害之二日之中傳考四獄宦者孫程等知詡以忠獲罪乃相率奏曰陛下始與臣等造事之時常疾奸臣知其傾國今者即位而復自為何以非先帝乎司隸校尉虞詡為陛下盡忠而更被拘擊常侍張防臧罪明正反搆忠良今客星守羽林其占宮中有奸臣宜急收防送獄以塞天變防坐徒邊即日赦出詡拜議郎遷尚書僕射先是寧陽主簿詣闕訴其縣令之枉積六七歲不省主簿乃上書曰臣為陛下子陛下為臣父臣章百上終不見省臣豈可北詣單于以告怨乎帝大怒持章示尚書尚書遂劾以大逆詡駮曰主簿所訟乃君父之怨百上不達是有司之過愚惷之民不足多誅帝納詡言笞之而已詡好刺舉無所回容數忤權戚遂九見譴考三遭刑罰而剛正之性終老不屈遷尚書令傅變字南容北地人也為護軍司馬與左中郎皇甫嵩俱討賊張角燮素疾中官既行因上疏曰臣聞天下之禍不由於外皆興於內是故虞舜升朝先船四凶然後用十六相明惡人不去則善人無由進也今張角起於趙魏黃巾亂於六州此皆釁發蕭牆而禍延四海也臣受戎任奉辭伐罪始到潁川戰無不克黃巾雖盛不足為廟堂憂也臣之所懼在于治水不息其源末流彌增其廣耳陛下仁德寬容多所不忍故閹豎擅權忠臣不進誠使張角梟夷黃巾變服臣之所憂愈益深耳何者夫邪正之人不宜共國亦猶冰炭不可同器彼知正人之功顯而危亡之兆見皆將巧辭飾說共長虛偽夫孝子疑於屢至市虎成於三夫若不詳察真偽忠臣將復有杜郵之戮矣陛下宜思虞舜四罪之舉速行讒佞放殛之誅則善人思進姦兇自去矣臣聞忠臣之事君猶孝子之事父也子之事父焉得不盡其情使臣身備鈇鋮之戮陛下少用其言國之福也書奏宦者趙忠見而忿惡及破張角燮功多當封忠訴譖之竟亦不封以為安定都尉頃之趙忠為車騎將軍詔忠論討黃巾之功執金吾甄舉等謂忠曰傅南容前在東軍有功不侯故天下失望今將軍當重任宜進賢理屈以副眾心忠遣弟延致殷勤延謂燮曰南容少答我常侍萬戶侯不足得也燮正色拒之曰遇與不遇命也有功不論時也傅燮豈求私賞哉忠愈懷恨權貴亦多疾之是以不得留出為漢陽太守賊圍漢陽城中兵少糧盡燮猶固守時北地胡騎數千隨賊攻郡皆夙懷燮恩共於城外叩頭求送燮歸鄉里子幹進曰國家昏亂遂令大人不容於朝今天下已叛而兵不足自守鄉裏羌胡先被恩德欲令棄郡而歸願必許之言未終燮慨然而歎曰蓋聖達節次守節且殷紂之暴伯夷不食周粟而死今朝廷不甚殷紂吾德亦豈絕伯夷世亂不能養浩然之志食祿人閒欲避其難乎吾行何之遂麾左右進兵臨陳戰歿謚曰壯節侯蓋勳字元固敦煌人也為漢陽長史時武威太守倚恃權埶恣行貪橫從事武都蘇正和案致其罪涼州刺史梁鵠畏懼貴戚欲殺正和以免其負乃訪之於勳勳素與正和有仇乃諫鵠曰夫紲食鷹鳶欲其鷙鷙而亨之將何用哉鵠從其言正和喜於得免而詣勳求謝勳不見曰吾為梁使君謀不為蘇正和怨之如初徵拜討虜校尉靈帝召見問天下何苦而反亂如此勳曰倖臣子弟擾之時宦者上軍校尉蹇碩在坐帝顧問碩碩懼不知所對而以此恨勳司隸校尉張溫舉勳為京兆尹帝方欲延接勳而蹇碩等心憚之並勸從溫奏遂拜京兆尹時長安令揚黨史父為中常侍恃勢貪放勳案得其臧千餘萬貴戚鹹為之請勳不聽具以事聞并連黨父有詔窮治威震京師時小黃門京兆高望為尚藥監倖於皇太子太子因蹇碩屬望子進為孝廉勳不肯用或曰皇太子副主望其所愛碩帝之寵臣而子違之所謂三怨成府者也勳曰選賢所以報國也非賢不舉死亦何悔董卓廢少帝殺何太后勳與書曰昔伊尹霍光權以立功猶可寒心足下小醜何以終此賀者在門弔者在廬可不慎哉卓得書意甚憚之徵為議郎自公卿以下莫不卑下於卓唯勳長揖爭禮見者皆為失色勳雖彊直不屈而內厭於卓不得意疽發背卒遺令勿受卓賻贈蔡邕字伯喈陳留人也靈帝時信任閹豎災變數見天子引咎詔群臣各陳政要邕上封事曰臣聞古者取士諸侯歲貢孝武之世郡舉孝廉又有賢良文學之選於是名臣輩出文武並興漢之得人數路而已夫書畫辭賦才之小者匡國理政未有其能陛下即位之初先涉經術聽政餘日觀省篇章聊以游意當代博奕非以為教化取士之本也而諸生競利作者鼎沸其高者頗引經訓風喻之言下則連偶俗語有類俳優或竊成文虛冒名氏臣每受詔於盛化門差次錄第其未及者亦複隨輩皆見拜擢既加之恩難復收改但守奉祿於義已弘不可復使治民及仕州郡昔孝宣會諸儒於石渠章帝集學士於白虎通經義釋其事優大文武之道所宜從之若乃小能小善雖有可觀孔子以為致遠則泥君子故當志其大者也又特詔問曰比災變互生未知厥咎朝廷焦心載懷恐懼每訪群公庶聞忠言而各存括囊莫肯盡心以邕經學深奧故密特稽問宜披露失得指陳政要勿有依違自生疑諱邕對曰臣伏思諸異皆亡國之怪也天於大漢殷勤不已故屢出妖變以當譴責欲令人君感悟改危即安今災眚之發不於他所遠則門垣近在寺署其為監戒可謂至切蜺墮雞化皆婦人幹政之所致也前者乳母趙嬈貴重天下生則貲藏侔於天府死則丘墓踰於園陵兩子受封兄弟典郡續以永樂門史霍玉依阻城社又為奸邪今者道路紛紛復云有程大人者察其風聲將為國患宜高為堤防明設禁令深惟趙霍以為至戒今聖意勤勤思明邪正而聞太尉張顥為玉所進光祿勳偉璋有名貪濁又長水校尉趙玹屯騎校尉蓋升並叨時幸榮富優足宜念小人在位之咎退思引身避賢之福伏見廷尉郭禧純厚老成光祿大夫橋玄聰達方直故太尉劉寵忠實守正並宜為謀主數見訪問夫宰相大臣君之四體委任責成優劣已分不宜聽納小吏雕琢大臣也又尚方工技之作鴻都篇賦之文可且消息以示惟憂詩云畏天之怒不敢戲豫天戒誠不可戲也夫君臣不密上有漏言之戒下有失身之禍願寢臣表無使盡忠之吏受怨奸仇章奏帝覽而歎息因起更衣曹節於後視之悉宣語左右事遂漏露其為邕所裁黜者皆側目思報初邕與司徒劉郃素不相平而叔父衛尉質又與將作大匠陽球有隙球即中常侍程璜女夫也璜遂使人飛章言邕質數以私事請託於郃郃不聽邕含隱切志欲相中傷於是下邕質於洛陽獄劾以仇怨奉公議害大臣大不敬棄市事奏中常侍呂彊愍邕無罪請之帝亦更思其章有詔減死一等與家屬鉗徙朔方不得以赦令除左雄字伯豪南郡人也舉孝廉拜議郎時順帝新立朝多闕政雄數言事其辭深切尚書僕射虞詡以雄有忠公節上疏薦之曰臣見方今公卿以下類多拱默以樹恩為賢盡節為愚至相戒曰白璧不可為容容多後福伏見議郎左雄數上封事至引陛下身遭難厄以為敬戒實有王臣蹇蹇之節周公謨成王之風宜擢在喉舌之官必有匡弼之益由是拜尚書令上疏陳事曰臣聞柔遠和邇莫大寧民寧民之務莫重用賢用賢之道必存考黜大漢受命雖未復古然至於文景天下康乂誠由玄靖寬柔克慎官人故也降及宣帝興於仄陋綜覈名實知世所病以為吏數變易則下不安業久於其事則民服教化其有治理者輒以璽書勉勵增秩賜金是以吏稱其職民安其業漢世良吏於茲為盛故能降來儀之瑞建中興之功漢初至今三百餘年俗浸彫敝巧偽滋萌下飾其詐上肆其殘典城百里轉動無常各懷一切莫慮長久謂殺害不辜為威風聚歛整辯為賢能以修己安民為劣弱奉法循理為不治髡鉗之戮生於睚眥覆屍之禍成於喜怒視民如寇讎稅之如豺虎監司見非不舉聞惡不察觀政於亭傳責成於期月言善不稱德論功不據實虛誕者獲譽拘檢者離毀州宰不覆競共辟召或考奏捕治而亡不受罪會赦行賂復見洗滌朱紫同色清濁不分故使奸猾枉濫輕忽去就拜除如流缺動百數特選橫調紛紛不絕送迎煩費損政傷民和氣未洽災眚不消咎皆在此臣愚以為鄉部親民之吏皆用儒生清白任從政者寬其負算增其秩祿吏職滿歲宰府州郡乃得辟舉如此威福之路塞虛偽之端絕送迎之役損賦斂之源息循理之吏得成其化率土之民各寧其所帝感其言申下有司考其真偽雄之所言皆明達治體而宦豎擅權終不能用雄復諫曰臣聞人君莫不好忠正而惡讒諛然而歷世之患莫不以忠正得罪讒諛蒙倖者蓋聽忠難從諛易也夫刑罪人情之所甚惡貴寵人情之所甚欲是以世俗為忠者少而習諛者多故令人主數聞其美稀知其過迷而不悟至於危亡也周舉字宣光汝南人也為尚書時三輔大旱五穀災傷天子親自策問舉對曰夫陰陽閉隔則二氣否塞二氣否塞則人物不昌人物不昌則風雨不時風雨不時則水旱成災陛下處唐虞之位未行堯舜之政變文帝世祖之法而循亡秦奢侈之欲內積怨女外有曠夫今皇嗣不興東宮未立傷和逆理斷絕人倫之所致也非但陛下行此而已堅宦之人亦復虛以形勢威侮良家取女閉之至有白首歿無配偶逆於天心昔武王入殷出傾宮之女成湯遭災以六事克己自枯旱以來彌歷年歲未聞陛下改過之效徒勞至尊暴露風塵誠無益也又下州郡祈神致請昔齊有大旱景公欲祀河伯晏子諫曰夫河伯以水為城國魚為人民水盡魚枯豈不欲雨自是不能致也陛下所行但務其華不尋其實猶緣木希魚卻行求前也誠宜推信革政崇道變惑出後宮不御之女理天下冤枉之獄除大官重膳之費臣才薄智淺不足以對惟陛下留神裁察以舉為司徒李固字子堅漢中人也陽嘉二年有地動山崩火災之異公卿舉固對策詔又特問當世之敝為政所宜固對曰臣聞王者父天母地寶有山川王道得則陰陽和理政化乖則崩震為災斯皆關之天心效於成事者也夫治以職成官由能理古之進者有德有命今之進者唯財與力伏聞詔書務求寬博疾惡嚴暴而今長吏多殺伐致聲名者必加遷賞其存寬和無黨援者輒見斥逐是以淳厚之風不宣雕薄之俗未革雖繁刑重禁何能有益前孝安皇帝變亂舊典封爵阿母因造妖孽使樊豐之徒乘權放恣侵奪主威改亂適嗣至令聖躬狼狽親遇其難既拔自困殆龍興即位天下喁喁屬望風政積弊之後易致中興誠當沛然思惟善道而論者猶云方今之事復同於前臣伏從山草痛心傷臆今宋阿母雖有大功勤謹之德但加賞賜足以酬其勞苦至于裂土開國實乖舊典夫妃后之家所以少完全者豈天性當然但以爵位尊顯專總權柄天道惡盈不知自損故至顛仆先帝寵遇閻氏位號太疾故其受禍曾不旋時今梁氏戚為椒房禮所不臣尊以高爵尚可然也而子弟群從榮顯兼加永平建初故事殆不如此宜令步兵校尉冀及諸侍中還居黃門之官使權去外戚政歸國家豈不休乎又宜罷退宦官去其權重裁置常侍二人省事左右小黃門五人給事殿中如此則論者厭塞升平可致也順帝覽其對多所納用即時出阿母還第舍諸常侍悉叩頭謝罪朝廷肅然以固為議郎沖帝即位為大尉與梁冀參錄尚書事帝崩固以清河王蒜年長有德欲立之梁冀不從乃立樂安王子纘是為質帝冀忌帝聰惠恐為後患遂令左右進鴆帝崩固伏屍號哭推舉侍醫冀慮其事泄大惡之因議立嗣固與司徒胡廣司空趙戒大鴻臚杜喬皆以為清河王蒜明德著聞又屬尊親宜立為嗣先是蠡吾侯志取冀妹冀欲立之眾論既異憤憤不得意而未有以相奪中常侍曹勝等聞而夜往說冀曰將軍累世有椒房之親秉攝萬機賓客縱橫多有過差清河王嚴明若果立則將軍受禍不久矣不如立蠡吾侯富貴可長保也冀然其言明日重會公卿冀意氣凶凶而言辭激切自胡廣趙戒以下莫不懾憚之皆曰惟大將軍令而固獨與杜喬堅守本議冀厲聲罷會固復以書勸冀愈激怒乃說太後先策免固竟立蠡吾侯是為桓帝後歲餘甘陵劉文魏郡劉鮪各謀立蒜為天子梁冀因此誣固與文鮪共為妖言下獄門生勃海王調貫械上書證固之枉河內趙承等數十人亦腰鈇鑕詣闕通訴太后明之乃赦焉及出獄京師市里皆稱萬歲冀聞之大驚畏固名德終為己患乃更據奏前事遂誅之臨命與胡廣趙戒書曰固受國厚恩是以竭其股肱不顧死亡志欲扶持王室此隆文宣何圖一朝梁氏迷謬公等曲從以吉為凶成事為敗乎漢家衰微從此始矣公等受主厚祿顛而不扶傾覆大事後之良史豈有所私固身已矣於義得矣夫復何言廣戒得書悲慚長歎流涕州郡收固二子基慈皆死獄中杜喬字叔榮河內人也漢安元年以喬守光祿大夫梁冀子弟五人及中常侍等以無功並封喬上書諫曰陛下越從藩臣龍飛即位天人屬心萬邦攸賴不急忠賢之禮而先左右之封傷善害德興長佞諛臣聞古之明君罰必以功過末代闇主誅賞各緣其私今梁氏一門宦者微孽並帶無功之紱裂勞臣之土其為乖濫胡可勝言夫有功不賞為善失其望奸回不詰為惡肆其凶故陳質斧而民靡畏班爵位而物無勸茍遂斯道豈伊傷政為亂而已喪身亡國可不慎哉書奏不省先是李固見廢內外喪氣群臣側足而立唯喬正色無所回橈由是朝野瞻望焉冀愈怒遂白執擊之死獄中與李固俱暴屍於城北論曰順桓之閒國統三絕太后稱制賊臣虎視李固據位持重以爭大義確乎而不可奪豈不知守節之觸禍恥夫覆折之傷任也觀其發正辭及所遺梁冀書雖機失謀乖猶戀戀而不能已至矣哉社稷之心乎其顧視胡廣趙戒猶糞土也
