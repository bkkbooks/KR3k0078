body:
  text: 毛詩周南關雎后妃之德也風之始也所以風天下而正夫婦也故用之鄉人焉用之邦國焉風諷也教也風以動之教以化之詩者志之所之也在心為志發言為詩情動於衷而形於言言之不足故嗟歎之嗟歎之不足故詠歌之詠歌之不足不知手之舞之足之蹈之也情發於聲聲成文謂之音發猶見也聲謂宮商角徵羽聲成文者宮商上下相應也治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困故正得失動天地感鬼神莫近於詩先王以是經夫婦成孝敬厚人倫美教化移風易俗故詩有六義焉一曰風二曰賦三曰比四曰興五曰雅六曰頌上以風化下下以風刺上言之者無罪聞之者足以自誡故曰風以一國之事繫一人之本謂之風言天下之事形四方之風謂之雅雅者正也言王政之所由廢興也政有小大故有小雅焉有大雅焉頌者美盛德之形容以其成功告於神明者也是謂四始詩之至也始者王道興衰之所由也至於王道衰禮義廢政教失國異政家殊俗而變風變雅作矣周南邵南正始之道王化之基是以關雎樂得淑女以配君子憂在進賢不婬其色哀窈窕思賢才而無傷善之心焉是關睢之義也關關雎鳩在河之洲興也關關和聲也雎鳩王睢也鳥摯而有別后妃悅樂君子之德無不和諧又不淫其色若雎鳩之有別焉然後可以風化天下夫婦有別則父子親父子親則君臣敬君臣敬則朝廷正朝廷正則王化成也窈窕淑女君子好仇窈窕幽閑也淑善也仇逑也后妃有關睢之德是幽閑貞專之善女宜為君子仇逑也參差荇菜左右流之荇接荼也流求也后妃有關雎之德乃能供荇菜備庶物以事宗廟也左右助之言三夫人九嬪以下皆樂后妃之事也窈窕淑女寤寐求之寤覺也寐寢也言后妃覺寐則常求此賢女欲與之共己職求之不得寤寐思服服事也求賢女而不得覺寐則思己職事當與誰共之也悠哉悠哉展轉反側悠思也言己誠思之也臥而不周曰展也卷耳后妃之志也又當輔佐君子求賢審官知臣下之勤勞內有進賢之志而無險詖私謁之心朝夕思念至於憂勤謁請也采采卷耳不盈傾筐憂者之興也采采事采之也卷耳苓耳也傾筐畚屬也易盈之器也器之易盈而不盈者志在輔佐君子憂思深也嗟我懷人寘彼周行懷思也寘置也行列也思君子官賢人置之周之列位也周之列位謂朝廷之臣也邵南甘棠美邵伯也邵伯之教明于南國邵伯姬姓名奭作上公為二伯蔽芾甘棠勿翦勿伐邵伯所苃蔽芾小貌甘棠杜也苃草舍也邵伯聽男女之訟不重煩勞百姓止舍小棠之下而聽斷焉國人被其德悅其化敬其樹也何彼穠矣美王姬也雖則王姬亦下嫁於諸侯車服不繫其夫下王后一等猶執婦道以成肅雍之德何彼穠矣唐棣之華興也穠猶戎戎也唐棣栘也云何乎彼戎戎者乃栘之華興者喻王姬顏色之美盛也曷弗肅雍王姬之車肅敬也雍和也曷何也之往也何不敬和乎王姬往乘車言其嫁時始乘車則已敬和矣鄁風柏舟言仁而不遇也衛頃公時仁人不遇小人在側汎彼柏舟亦汎其流興也汎汎流貌也柏木所以宜為舟也汛其流不以濟渡也舟載渡物也今不用而與眾物汎汎然俱流水中興者喻仁人之不用與群小人並列亦猶是也耿耿不寐如有隱憂耿耿猶儆儆也隱痛也仁人既不遇憂在見侵害也憂心悄悄慍于群小悄悄憂貌也慍怒也覯閔既多受侮不少閔病也谷風剌夫婦失道也衛人化其上淫於新婚而棄其舊室夫婦離絕國俗傷敗焉習習谷風以陰以雨興也習習和舒之貌東風言之谷風陰陽和而谷風至夫婦和則室家成也黽勉同心不宜有怒言黽勉思與君子同心也所以黽勉者以為見譴怒非夫婦之宜也采葑采菲無以下體葑蕦也菲芴也下體根莖也二菜皆上下可食然而其根有美時有惡時采之者不可以根惡之時并棄其葉喻夫婦以禮義合以顏色親亦不可以顏色衰而棄其相與之禮德音莫違及爾同死莫無也及與也夫婦之言無相違者則可長相與處至死顏色斯須之有也鄘風相鼠刺無禮也衛文公能正其群臣而刺在位承先君之化無禮儀也相鼠有皮人而無儀相視也儀威儀也視鼠有皮雖居高顯之處偷食茍得不知廉恥亦與人無威儀者同也人而無儀不死胡為人以有威儀為貴今反無之傷化敗俗不如其死無所害也相鼠有體人而無禮體支體也人而無禮胡不遄死干旄美好善也衛文公之臣子多好善賢者樂告以善道也賢者時處士也孑孑干旄在浚之郊孑孑干旄貌注旄於干首大夫之旗也浚衛邑時有建此旄來至浚之郊卿大夫好善者也素絲紕之良馬四之紕所以織組也總紕於此成文於彼願以素絲紕組之法御四馬也彼姝者子何以畀之姝順猊畀與時賢者既悅此大夫有忠順之德又欲以善道與之誠愛厚之至焉衛風淇澳美武公之德也有文章又能聽規諫以禮自防故能入相于周美而作是詩瞻彼淇澳綠竹猗猗興也猗猗美貌也武公質美德盛有康叔之餘烈也有斐君子如切如瑳如琢如磨斐文章貌治骨曰切象曰瑳玉曰琢石曰磨道其學而成也聽其規諫以禮自修飾如玉石之見琢磨芄蘭刺惠公也驕而無禮大夫刺之惠公以幼童即位自謂有才能而驕慢於大臣但習威儀不知為政以禮也芄蘭之支興也芄蘭草柔弱恆延蔓於地有所依緣則起興者喻幼之君任用大臣乃能成其政也童子佩觿觿所以解結成人之佩也人君治成人事雖童子猶佩觿以早成其德也雖則佩觿能不我知此幼稚之君雖佩觿焉其才能實不如我眾臣之所知為也惠公自謂有才能而驕慢所以見刺也王風葛虆王族刺桓王也周室道衰棄其九族焉綿綿葛虆在河之滸水涯曰滸葛也虆也生河之涯得其潤澤以長而不絕興者喻王之同姓得王恩施以生長其子終遠兄弟謂他人父兄弟族親也王寡於恩施今以遠棄族親矣是我以他人為己父也采葛懼讒也桓王之時政事不明臣無大小使出者則為讒人所毀故懼之也彼采葛兮一日不見如三月兮興也葛所以為絺也事雖小一日不見於君憂懼於讒矣興者以采葛喻臣以小事使出者也鄭風風雨思君子也亂世則思君子不改其度焉風雨淒淒雞鳴喈喈興也風且雨淒淒然雞猶守時而鳴喈喈然興者喻君子雖居亂世不改其節度也既見君子云胡不夷夷悅也思而見之云何不悅也子衿刺學校廢也亂世則學校不修青青子衿悠悠我心青衿青領學子之所服學子而俱在學校之中已留彼去故隨而思之縱我不往子寧不嗣音嗣續也汝曾不傳聲問我我以恩責其忘己也齊風鳴思賢妃也哀公荒淫怠慢故陳賢妃貞女夙夜警戒相成之道焉既鳴矣朝既盈矣雞鳴朝盈夫人也君也可以起之常禮也匪則鳴蒼蠅之聲夫人以蠅聲為雞鳴則以作早於常時敬也甫田大夫刺襄公也無禮義而求大功不修其德而求諸侯志大心勞所以求者非其道也無田甫田維莠驕驕興也甫大也大田過度而無人功終不能獲興者喻人君欲立功致治必勤身修德積小以成高大也無思遠人勞心忉忉忉忉憂勞此言無德而求諸侯徒勞其心忉忉然魏風伐檀刺貪也在位貪鄙無功而受祿君子不得進仕爾坎坎伐檀兮寘之河之干兮河水清且漣漪伐檀以俟世用若俟河水清且漣漪是謂君子之人不得進仕也不稼不穡胡取禾三百廛兮不狩不獵胡瞻爾庭有懸貆兮一夫之居曰廛貆獸名也彼君子兮不素餐兮素空彼君子者斥伐檀之人仕有功乃肯受祿碩鼠刺重斂也國人刺其君之重斂蠶食於民不修其政貪而畏人若大鼠也碩鼠碩鼠無食我黍三歲貫汝莫我肯顧碩大也大鼠大鼠者斥其君汝無復食我黍疾其君稅斂之多我事汝已三歲矣曾無教令恩德來顧眷我又疾其不修德政逝將去汝適彼樂土往矣將去汝與之訣別之辭樂土有德之國也唐風杕杜刺時也君不能親其宗族骨肉離散獨居而無兄弟將為沃所并爾有杕之杜其葉湑湑興也杕特生貌杜赤棠也湑湑枝葉不相次比之貌獨行踽踽豈無他人不如我同父踽踽無所親也他人謂異姓也言昭公遠其宗族獨行國中踽踽然此豈無異姓之臣乎顧恩不如同姓之親親耳秦風晨風刺康公也忘穆公之業始棄其賢臣焉鴥彼晨風鬱彼北林興也鴥疾飛貌也晨風鸇也鬱積也先君招賢人賢人歸往之駛疾如晨風之飛入北林也未見君子憂心欽欽言穆公始未見君子之時思望而憂欽欽然也如何如何忘我實多此言穆公之意責康公如何乎如何乎汝忘我之事實多大也渭陽康公念母也康公之母晉獻公之女文公遭孋姬之難未反而秦姬卒穆公納文公康公時為太子贈送文公于渭之陽念母之不見也我見舅氏如母存焉及其即位思而作是詩也我送舅氏曰至渭陽渭水名也何以贈之路車乘黃贈送也乘黃駟馬皆黃也我送舅氏悠悠我思何以贈之瓊瑰玉佩瓊瑰美石而次玉者也權輿刺康公也忘先君之舊臣與賢者有始而無終也於我乎夏屋渠渠夏大也屋具也渠渠猶勤勤也言君始於我厚設禮食大具以食我其意勤勤然今也每食無餘此言君今遇我薄其食我裁足也于嗟乎不承權輿承繼也權輿始也曹風蜉蝣刺奢也昭公國小而迫無法以自守好奢而任小人將無所依焉蜉蝣之羽衣裳楚楚興也蜉蝣渠略也朝生夕死猶有羽翼以自修飾楚楚鮮明貌興者喻昭公之朝其群臣皆小人也徒整飾其衣裳不知國將追脅君臣死亡之無日如渠略然也心之憂矣於我歸處歸依歸也君當於何依歸言有危亡之難將無所就往也候人刺近小人也共公遠君子而好近小人焉彼候人兮荷戈與祋候人道路送迎賓客者也荷揭也祋殳也言賢者之官不過候人也彼其之子三百赤芾芾也大夫以上赤芾乘軒之子是子也佩赤芾者三百人小雅鹿鳴燕群臣嘉賓也既飲食之又實幣帛筐篚以將其厚意然後忠臣嘉賓得盡其心矣呦呦鹿鳴食野之苹興也苹大萍也鹿得苹草呦呦然鳴而相呼懇誠發于中以興嘉樂賓客當有懇誠相招呼以成禮也我有嘉賓鼓瑟吹笙吹笙鼓簧承筐是將筐篚屬所以行幣帛也承猶奉也皇皇者華君遣使臣也送之以禮樂言遠而有光華也言臣出使能揚君之美以延其譽於四方則為不辱君命也皇皇者華于彼原隰皇皇猶煌煌也忠臣奉使能光君命無遠無近如華不以高下易其色矣無遠無近惟所之則然也駪駪征夫每懷靡及駪駪眾多之貌也征夫行人也眾行夫既受君命當速行每人懷其私相稽留則於王事將無所及也常棣燕兄弟也閔管蔡之失道故作常棣焉周公弔二叔之不咸而使兄弟之恩疏召公為作是詩而歌之以親之常棣之華萼不煒煒承華者曰萼不當作跗跗萼足也萼足得華之光明煒煒然也興者喻弟以敬事兄兄以榮覆弟恩義之顯亦煒煒然也凡今之人莫如兄弟人之恩親無如兄弟之最厚鶺鴒在原兄弟急難鶺鴒雍渠也飛則鳴行則搖不能自舍爾急難言兄弟之相救於急難矣每有良朋況也永歎況茲也永長也每雖也良善也當急難之時雖有善同門來茲對之長歎而已兄弟鬩于牆外禦其侮鬩狠也禦禁也兄弟雖內鬩外猶禦侮也伐木燕朋友故舊也自天子以下至于庶人未有不須友以成者親親以睦友賢不棄不遺故舊則民德歸厚矣伐木丁丁鳥鳴嚶嚶丁丁嚶嚶相切直也言昔日未居位與友生於山巖伐木為勤苦之事猶以道德相切正也嚶嚶兩鳥聲也其鳴之志似於有朋友道然故連言之出自幽谷遷于喬木遷徙也謂嚮時之鳥出從深谷今移處高木也嚶其鳴矣求其友聲君子雖遷處於高位不可以忘其朋友也相彼鳥矣猶求友聲矧伊人矣不求友生矧況也相視也鳥尚知居高木呼其友況是人乎可不求乎天保下報上也君能下下以成其政則臣亦歸美以報其上焉天保定爾俾爾戩穀罄無不宜受天百祿保安也爾汝也戩福也穀祿也罄盡也天使汝所福祿之人謂群臣也其舉事盡得其宜受天之多福祿如月之恆如日之昇恆弦也昇出也言俱進也月上弦而就盈日始出而就明也如南山之壽不騫不崩騫虧如松柏之茂無不爾或承或之言有也如松柏之枝葉常茂盛青青相承無衰落也南山有臺樂得賢也得賢者則能為邦家立太平之基矣人君得賢者則其德廣大堅固如山之有基趾也南山有臺北山有萊臺夫須也興者山之有草木以自覆蓋成其高大喻人君有賢臣自以尊顯也樂只君子邦家之基基本也只之言是也人君既得賢者置之於位又尊敬以禮樂樂之則能為國家之本也蓼蕭澤及四海也蓼彼蕭斯零露湑兮興也蓼長大貌蕭蒿也湑湑然蕭上露貌興者蕭香物之微者喻四海之諸侯亦國君之賤者露天所以潤萬物喻王者恩澤不為遠國則不及之既見君子我心寫兮既見君子者遠國之君朝見於天子也我心寫者舒其情意無留恨者燕笑語兮是以有譽處兮天子與之燕而語則遠國之君各得其所是以稱揚德美使聲譽常處天子也湛露天子燕諸侯也湛湛露斯匪陽不晞晞乾也露雖湛湛然見陽則乾興者露之在物湛湛然使物柯葉低垂喻諸侯受燕爵其威儀有似醉之貌唯天子賜爵則自變肅敬承命有似露見日而晞也厭厭夜飲不醉無歸厭厭安也六月宣王北伐也鹿鳴廢則和樂缺矣四牡廢則君臣缺矣皇皇者華廢則忠信缺矣常棣廢則兄弟缺矣伐木廢則朋友缺矣天保廢則福祿缺矣采薇廢則征伐缺矣出車廢則功力缺矣杕杜廢則師眾缺矣魚麗廢則法度缺矣南陔廢則孝友缺矣白華廢則廉恥缺矣華黍廢則畜積缺矣由庚廢則陰陽失其道理矣南有嘉魚廢則賢者不安下民不得其所矣崇丘廢則萬物不遂矣南山有臺廢則為國之基墜矣由儀廢則萬物失其道理矣蓼蕭廢則恩澤乖矣湛露廢則萬國離矣彤弓廢則諸夏衰矣菁菁者莪廢則無禮儀矣小雅盡廢則四夷交侵中國微矣六月棲棲戎車既棲棲簡閱貌飭正也記六月者盛夏出兵明其急也玁狁孔熾我是用急熾盛也孔甚也此序吉甫之意也北狄來侵甚熾故王以是急遣我也車攻宣王復古也宣王能內修政事外攘夷狄復文武之境土修車馬備器械復會諸侯於東都因田獵而選車徒焉東都王城我車既攻我馬既同攻堅也同齊也四牡龐龐駕言徂東龐龐充實東雒邑也蕭蕭馬鳴悠悠旌言不讙譁也之子于征有聞無聲有善聞而無讙譁鴻鴈美宣王也萬民離散不安其居而能勞來還定安集之至乎鰥寡無不得其所焉宣王承厲王衰亂之獘而興復先王之道以安集眾民為始鴻鴈于飛集于中澤中澤澤中鴻鴈之性安居澤中今飛而又集于澤之中猶民去其居而離散今見還定安集之也之子于垣百堵皆作侯伯卿士又於壞滅之國徵民起屋舍築牆壁百堵同時起言趨事也雖則劬勞其究安宅此勸萬民之辭汝今雖病勞終有所安居也白駒大夫刺宣王也刺其不能留賢也皎皎白駒食我場苗縶之維之以永今朝宣王之末不能用賢賢者有乘白駒而去者縶絆也維繫也永久也願此去者乘白駒而來使食我場中之苗我則絆之繫之以久今朝愛之欲留也所謂伊人於焉逍遙乘白駒而去之賢人今於何游息乎思之甚矣節南山家父刺幽王也家父字周大夫也節彼南山維石巖巖興也節高峻貌巖巖積石貌興者喻三公之位人所尊嚴也赫赫師尹民具爾瞻師大師周之三公尹氏為大師具俱也此言尹氏汝居三公之位天下之民俱視汝之所為也國既卒斬何用不監卒盡也斬斷也監視也天下之諸侯日相侵伐其國已盡絕滅汝何用為職不監察之正月大夫刺幽王也正月繁霜我心憂傷正月憂之四月也繁多也夏之四月霜多急恆寒若之異傷害萬物故我心為之憂傷也民之訛言亦孔之將將大也訛偽也人以偽言相陷入使王行酷暴之刑致此災異故言甚大謂天蓋高不敢不局謂地蓋厚不敢不蹐局曲也蹐累足也此民疾苦王政上下皆可畏之言也哀今之人胡為虺蜴虺蜴之性見人則走哀哉今之人何為如是傷時政也燎之方揚寧或之之以水也燎之方盛之時炎熾熛怒寧有能滅息之者乎言無有也以無有喻有之者為甚也赫赫宗周姒之宗周鎬京也國名也姒姓也滅也有之女幽王惑焉而以為后詩人知其必滅周也十月之交大夫刺幽王也十月之交朔日辛卯日有蝕之亦孔之醜之交日月之交會也醜惡也周十月夏之八月也日食陰侵陽臣侵君之象也日為君辰為臣辛金也卯木也又以卯侵辛故甚惡之彼月而蝕則維其常此日而蝕于何不臧臧善也百川沸騰山冢崒崩沸出也騰乘也山頂曰崒者崔嵬也百川沸出相乘淩者由貴小人也山頂崔嵬者崩喻君道壞也高岸為谷深谷為陵言君子居下小人處上也哀今之人胡憯莫懲憯曾也變異如此禍亂方至哀哉今在位之人何曾無以道德止之黽勉從事不敢告勞詩人賢者見時如是自勉以從王事雖勞不敢自謂勞畏刑罰也無罪無辜讒口囂囂囂囂眾多貌也時人非有辜罪其被讒口見椓譖囂囂然小旻大夫刺幽王也謀臧不從不臧覆用臧善也謀之善者不從之其不善者反用之我龜既厭不我告猶猶圖也卜筮數而瀆龜龜靈厭之不復告其所圖之吉凶謀夫孔多是用不集集就也謀事者眾多而非賢者是非相奪莫適可從故所為不成也發言盈庭誰敢執其咎謀事者眾滿庭而無能決當是非事若不成誰云已當受其咎責者言小人爭智而讓過如彼築室于道謀是用不潰于成潰遂也如當路築室得人而與之謀所為路人之意不同故不得遂成也不敢暴虎不敢馮河人知其一莫知其他馮凌也人皆知暴虎馮河立至之害而無知當畏慎小人能危亡己也小宛大夫刺幽王也溫溫恭人溫溫和柔貌如集于木恐墜也惴惴小心如臨于谷恐隕戰戰兢兢如履薄冰衰亂之世賢人君子雖無罪猶恐懼也小弁刺幽王也太子之傅作焉踧踧周道鞠為茂草踧踧平易貌周道周室之通道也鞠窮也我心憂傷惄焉如擣假寐永歎維憂用老心之憂矣疢如疾首惄思也擣心疾也不脫冠衣而寐曰假寐疢猶病也維桑與梓必恭敬止父之所樹已尚不敢不恭敬也靡瞻匪父靡依匪母不屬于毛不離于裏此言人無不瞻仰其父取法則者無不依恃其母以長大者今我太子獨不受父之皮膚之氣乎不處母之胞胎乎何曾無恩於我也無逝我梁無發我笱逝之也之人梁發人笱此必有盜魚之罪以言姒以淫色來嬖於王盜我太子母子之寵也我躬不閱遑恤我後念父孝也念父孝者太子念王將受讒言不止我死之後懼復有被讒者無如之何故自決云身尚不能得自容何暇乃憂我死之後乎巧言刺幽王也大夫傷於讒而作是詩亂之初生僭始既涵僭不信也涵同也王之初生亂萌群臣之言信與不信盡同之不別亂之又生君子信讒君子斥在位者信讒人言是復亂之所生君子信盜亂是用暴盜謂小人盜言孔甘亂是用餤餤進也巷伯刺幽王也寺人傷於讒而作是詩巷伯奄官寺人內小臣萋兮斐兮成是貝錦興也萋斐文章貌貝錦錦文興者喻讒人集作己過以成於罪猶女工之集采色成錦文也彼譖人者亦已太甚太甚者謂使己得重罪取彼譖人投畀豺虎豺虎不食投畀有北北方寒涼而不毛也有北不受投畀有昊昊昊天也與昊天使制其罪也谷風刺幽王也天下俗薄朋友道絕焉習習谷風維風及雨與也風雨相感朋友相須風而有雨則潤澤行喻朋友同志則恩愛成將恐將懼維予與汝將且也恐懼喻遭厄難也將安將樂汝轉棄予汝今已志達而安樂而棄恩忘舊薄之甚也忘我大德思我小怨大德切嗟以道相成之謂也蓼莪刺幽王也民人勞苦孝子不得終養爾蓼蓼者莪匪莪伊蒿興也蓼蓼長大貌也莪已蓼蓼長大我視之反謂之蒿興者喻憂思心不精識其事也哀哀父母生我劬勞哀哀者恨不得終養父母報其生長己之苦也無父何怙無母何恃出則銜恤入則靡至恤憂也孝子之心怙恃父母依依然以為不可斯須無也出門則思之憂旋入門又不見如入無所至也父兮生我母兮鞠我拊我畜我長我育我顧我復我出入腹我鞠養也顧旋視也復反覆也腹懷抱欲報之德昊天罔極之猶是也我欲報父母是德昊天乎我心無極也北山大夫刺幽王也役使不均已勞於從事而不得養其父母焉溥天之下莫非王土率土之濱莫非王臣此言王之土地廣大矣王之臣又眾矣何求而不得何使而不行乎大夫不均我從事獨賢賢勞也或燕燕以居息燕燕安息貌也或盡瘁以事國盡力勞病以從國事或息偃在床或不已于行不已猶不止也或棲遲偃仰或王事鞅掌鞅猶荷也掌謂捧持之也負荷捧持以趨走言促遽也或耽樂飲酒或慘慘畏咎咎猶罪過青蠅大夫刺幽王也營營青蠅止于樊興也營營往來貌樊藩也興者蠅之為蟲污白使黑污黑使白喻讒佞之人變亂善惡也止於藩欲外之令遠物也愷悌君子無信讒言愷悌樂易也營營青蠅止于棘讒人罔極交亂四國極猶已也賓之初筵衛武公刺時也幽王荒廢媟近小人飲酒無度天下化之君臣上下沈湎淫液武公既入而作是詩也淫液者飲酒時情態也言武公入者入為王卿士也賓之初筵溫溫其恭溫溫和柔也其未醉止威儀反反曰既醉止威儀幡幡舍其坐遷屢舞僊僊反反言重慎也幡幡失威儀也仙仙也此言賓初即筵之時自敕戒以禮至於旅酬而小人之態出也賓既醉止載號載呶亂我籩豆屢舞僛僛是曰既醉不知其郵側弁之俄屢舞傞傞號呶號呼讙呶也僛僛不能自正也傞傞不止也郵過也側傾也俄傾貌也采菽刺幽王也侮慢諸侯諸侯來朝不能錫命以禮數徵會之而無信義君子見微而思古焉采菽采菽筐之筥之菽所以芼大牢而待君子也君子來朝何錫與之雖無與之路車乘馬君子謂諸侯也賜諸侯以車馬言雖無與之尚以為薄也角弓父兄刺幽王也不親九族而好讒佞骨肉相怨故作是詩也騂騂角弓翩其反矣興也騂騂調和也不善紲檠巧用則翩然而反興者喻王與九族不以恩禮御待之則使之多怨心兄弟婚姻無胥遠矣胥相也骨肉之親當相親無相疏遠相疏遠則以親親之望易以成怨也爾之遠矣民胥然矣爾之教矣民胥效矣爾汝爾幽王也胥皆也言王汝不親骨肉則天下之人皆如斯汝之教令無善無惡所尚者天下之人皆學之言上之化下不可不慎也菀柳刺幽王也暴虐而刑罰不中諸侯皆不欲朝言王者之不可朝事也有菀者柳不尚息焉尚庶幾也有菀然枝葉茂盛之柳行路之人豈有不庶幾欲就之止息乎興者喻王有盛德則天下皆庶幾願往朝焉憂今不然也俾予靖之後予極焉靖謀也俾使也極誅也假使我朝王王留我使我謀政事王信讒不察功考績後反誅放我是言王刑罰不中不可朝事隰桑刺幽王也小人在位君子在野思見君子盡心以事之也隰桑有阿其葉有難隰中之桑枝條阿然長美其葉又茂盛可以庇廕人興者喻時賢人君子不用而野處有覆養之德也既見君子其樂如何思在野之君子而得見其在位我喜樂無度也心乎愛矣遐不謂矣中心臧之何日忘之遐遠也謂勤也臧善也我心愛此君子雖遠在野豈能不勤思之乎我心善此君子又誠不能忘也白華周人刺幽后也幽王娶申女以為后又得姒而黜申后故下國化之以妾為妻以孽代宗而王弗能治申姜姓之國孽支庶也宗適子也王不能治己不正故也英英白雲露彼菅茅英英白雲貌白雲下露養彼可以為菅之茅使與白華之菅可相亂易猶天之下妖氣生姒使申后見黜也天步艱難之子不猶步行也猶圖也天行此艱難之妖久矣王不圖其變之所由昔夏之衰有二龍之妖卜藏其漦周厲王發而觀之化為玄黿童女遇之當宣王之時而生女懼而棄之後褒人有獄而入之幽王幽王嬖之是謂姒鼓鐘于宮聲聞于外王失禮於內而下國聞知而化之王弗能治如鳴鐘鼓於宮中而欲使外人不聞亦不可得也念子懆懆視我邁邁邁邁不悅也言申后之忠於王也念之懆懆然欲諫正之王反不悅於其所言何草不黃下國刺幽王也四夷交侵中國背叛用兵不息視民如禽獸君子憂之故作是詩也何草不黃何日不行用兵不息軍旅自歲始草生而出至歲晚矣何草而不黃乎草皆黃矣於是閒將率何日不行乎言常行勞苦甚也何人不將經營四方言萬民無不從役者也匪兕匪虎率彼曠野兕虎野獸也曠空也兕虎者以比戰士也哀我征夫朝夕不暇大雅文王文王受命作周也受命受天命而王天下制立周邦文王在上於昭于天在上在民上也於歎辭也昭見文王初為西伯有功於民其德著見於天故天命之以為王也周雖舊邦其命惟新乃新在文王也濟濟多士文王以寧濟濟多威儀也商之孫子其麗不億上帝既命侯于周服麗數也商之孫子其數不徒億多言之也至天已命文王之後乃為君於周之九服之中言眾之不如德也侯服于周天命靡常則見天命之無常也無常者善則就之惡則去之殷士膚敏祼將于京殷士殷侯也膚美也敏疾也祼灌鬯也將行也殷之臣壯美而敏來助周祭也大明文王有明德故天復命武王也二聖相承其明德日廣大故曰大明也明明在下赫赫在上明明察也文王之德明明在於下故赫赫然著見於天天難忱斯不易維王天位殷嫡使不挾四方忱信也挾達也天意難信矣不可改易者天子也今紂居王位而又殷之正嫡以其為惡乃絕棄之使教令不行於四方四方共叛之是天命無常唯德是與耳維此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國回違也小心翼翼恭慎貌也聿述也懷思也方國四方來附者也思齊文王所以聖也言其非但天性德有所由成也思齊大任文王之母思媚周姜京室之婦齊莊也媚愛也周姜大姜京室王室也常思莊敬者太任也乃為文王之母又常思愛大姜之配大王之禮以為京室之婦言其德行純備以生聖子大姒嗣徽音則百斯男大姒文王之妃也大姒十子眾妾則宜百子也徽美也嗣大任之美音謂續行其善教令刑于寡妻至于兄弟以御于家邦刑法也寡妻寡有之妻言賢也御治也文王以禮法接待其妻至于其宗族以此又能為政治於家邦靈臺民始附也文王受命而民樂其有靈德以及鳥獸昆蟲焉文王受命而作邑于豐立靈臺也經始靈臺經之營之庶民攻之不日成之文王應天命度始靈臺之基趾營表其位眾民則築作不設期日而成之言說文王之德勸其事忘己勞也經始勿亟庶民子來亟急也經始靈臺之基趾非有急成之意眾民各以子成父事而來攻之行葦忠厚也周家忠厚仁及草木故能內睦於九族外尊事黃耇養老乞言以成其福祿焉乞言從求善言可以為政者也敦彼行葦羊牛勿踐履方苞方體維葉泥泥敦聚貌也行道也葉初生泥泥然苞茂也體成形也敦敦然道旁之葦牧羊牛者無使蹈履折傷之草物方茂盛以其終將為人用故周之先王為此愛之況於其人乎黃耇台背以引以翼台之言鮐也大老則背有鮐文也既告老人及其來也以禮引之以禮翼之在其前曰引在其旁曰翼也壽考維祺以介景福祺吉介助也養老人而得吉所以助大福也假樂嘉成王也假樂君子顯顯令德宜民宜人受祿于天假嘉也宜民宜人宜安民宜官人也天嘉樂成王有光光之善德安民官人皆得其宜以受福祿於天也于祿百福子孫千億穆穆皇皇宜君宜王宜君王天下也干求也成王行顯顯之令德求祿得百福其子孫亦勤行而求之得祿千億故或為諸侯或為天子言皆相勗以道也不愆不忘率由舊章愆過也率循也成王之令德不過誤不遺失循用舊典之文章謂周公之禮法民勞召穆公刺厲王也民亦勞止汔可小康惠此中國以綏四方汔幾也康綏皆安也惠愛也今周民疲勞矣王幾可小安之乎愛此京師之人以安天下京師者諸夏之根本也板凡伯刺厲王也上帝板板下民卒癉出話不然為猶不遠板反也上帝以稱王者癉病也話善言也猶謀也王為政反先王與天之道天下民盡癉其出善言而不行之也以此為謀不能遠圖不知禍之將至也猶之不遠是用大諫王之謀不能圖遠用是故我大諫王也介人維藩太師維垣大邦維屏太宗維翰介善也藩屏也垣牆也翰幹也太師三公也大邦成國諸侯也太宗王之同姓世嫡子也王當用公卿諸侯及宗室之貴者為藩屏垣幹為輔弼無疏遠之也懷德維寧宗子維城無俾城壞無獨斯畏懷和也斯離也和汝德無行酷暴之政以安汝國以是為宗子之城使免於難宗子城壞則乖離而汝獨居而畏矣宗子適子也蕩召穆公傷周室大壞也厲王無道天下蕩蕩無綱紀文章故作是詩也蕩蕩上帝下民之辟上帝以託君王也辟君也蕩蕩言法度廢壞之貌也厲王乃以此居人上為天下之君言其無可則像之甚也疾威上帝其命多僻疾病人矣威罪人矣疾病人者重賦斂也威罪人者峻刑法也其政教又多邪僻不由舊章也天生烝民其命匪諶靡不有初鮮克有終天之生此眾民其教道之非當以誠信使之忠厚乎今則不然民始皆庶幾於善道後更化於惡俗也既愆爾止靡明靡晦式號式呼俾晝作夜使晝為夜也愆過也汝既過於沈湎矣又不為明晦有止息也醉則號呼相效用晝日作夜不視政事也文王曰咨咨汝殷商匪上帝不時殷不用舊此言紂之亂非其生不得其時乃不用先王之故法之所致也雖無老成人尚有典刑老成人謂若伊尹伊陟臣扈之屬也雖無此臣猶有常事故法可案用曾是莫聽大命以傾莫無也朝廷君臣皆任喜怒曾無用典刑治事者以至誅滅也殷鑒不遠在夏后之世此言殷之明鏡不遠也近在夏后之世謂湯誅桀也後武王誅紂今之王何以不用為戒乎抑衛武公刺厲王也亦以自警也無兢維人四方其訓之有覺德行四國順之無競競也訓教也覺直也競強也人君為政無強於得賢人得賢人則天下教化於其俗有大德行則天下順從其政言在上所以倡道之敬慎威儀維民之則則法也慎爾出話敬爾威儀無不柔嘉話善言也謂教令也白圭之玷尚可磨也斯言之玷不可為玷缺也斯此也玉之玷缺尚可磨鑢而平人君政教一失誰能反復之也桑柔芮伯刺厲王也芮伯王卿士也憂心殷殷念我土宇我生不辰逢天僤怒自西徂東靡所定處宇居也僤厚也此士卒從軍久不息勞苦自傷之言也人亦有言進退維谷谷窮也前無明君卻迫罪役故窮也維此良人弗求弗迪維彼忍心是顧是復迪進也良善也國有善人王不求索不進用之有忍為惡之心者王反顧念而重復之言其忽賢者愛小人也大風有隧貪人敗類聽言則對誦言如醉類猶等夷也貪惡之人見道聽之言則應荅之見誦詩書之言則眠臥如醉君居上位而行如此人或效之也雲漢仍叔美宣王也宣王承厲王之烈內有撥亂之志遇災而懼側身修行欲消去之天下喜於王化復行百姓見憂故作是詩也仍叔周大夫也倬彼雲漢昭回于天雲漢謂天河也昭光也倬然天河水氣也精光轉運於天時旱渴雨故宣王夜仰視天河望其候也王曰於乎何辜今之人天降喪亂飢饉薦臻薦重也臻至也辜罪也王憂旱而嗟歎云何罪與今時天下之人天仍下旱災亡亂之道飢饉之害復重至也靡神不舉靡愛斯牲圭璧既卒寧莫我聽靡莫皆無也言王為旱之故求於群神無不祭也無所愛于三牲也禮神之圭璧又已盡矣曾無聽聆聆我之精誠而興雲雨者與崧高尹吉甫美宣王也天下復平能建國親諸侯賞申伯焉尹吉甫申伯皆周之卿士也維嶽降神生甫及申維申及甫維周之翰翰幹也申申伯也甫甫侯也皆以賢知入為周之楨幹之臣也申伯之德柔惠且直揉此萬邦聞于四國揉順也四國猶言四方也烝民尹吉甫美宣王也任賢使能周室中興焉天生烝民好是懿德天之生眾民莫不好有美德之人也天監有周昭假于下保茲天子生仲山甫監視也假至也天視周室之政教其光明乃至於下謂及於眾民也天安愛此天子宣王故生仲山甫使佐也仲山甫之德柔嘉維則令儀令色小心翼翼嘉美也令善也善威儀善顏色容貌翼翼然恭敬也肅肅王命仲山甫將之邦國若否仲山甫明之將行也若順也順否猶臧否謂善惡也既明且哲以保其身夙夜匪懈以事一人夙早也匪非也一人斥天子也人亦有言柔則茹之剛則吐之維仲山甫柔亦不茹剛亦不吐不侮鰥寡不畏強御人亦有言德輶如毛民鮮克舉之我儀圖之輶輕也儀疋也人之言云德甚輕然而眾人寡能獨舉之以行者言政事易耳人不能行者無其志也我與倫疋圖之而未能為也維仲山甫舉之仲由甫能獨舉是德而行之袞職有闕維仲山甫補之王之職有缺輒能補之者仲山甫也瞻仰凡伯刺幽王大壞也瞻仰昊天降此大厲昊天斥王也厲惡也邦靡有定士民其瘵瘵病也人有土田汝反有之人有民人汝覆奪之此言王削黜諸侯及卿大夫無罪者也覆猶反也此宜無罪汝反收之彼宜有罪汝覆說之收拘收也說放赦也哲夫成城哲婦傾城哲謂多謀慮也城猶國也懿厥哲婦為梟為鴟懿有所痛傷之聲也梟鴟惡聲之鳥也喻褒姒之言無善也婦有長舌維厲之階亂匪降自天生自婦人匪教匪誨時維婦寺寺近也長舌喻多言語也今王之有此亂政非從天而下但從婦人出耳又非有人教王為亂語王為惡者是維近愛婦人用其言是故致亂也如賈三倍君子是識婦無公事休其蠶織婦人無與外政雖王后猶以蠶織為事識知也賈而有三倍之利者小人所宜知也而君子反知之非其宜也今婦人休其蠶桑織紝之事而與朝廷之事其為非宜亦猶是也不弔不祥威儀不類人之云亡邦國殄瘁弔至也王之為政德不能至於天矣不能致徵祥於神矣威儀又不善於朝廷矣賢人皆言奔亡則天下邦國將盡困病也周頌清廟祀文王也周公既成雒邑朝諸侯率以祀文王焉清廟者祭有清明之德者之宮也謂祭文王也天德清明文王象也故祭之而歌此詩也於穆清廟肅雍顯相於歎之辭也穆美也肅敬也雍和相助也顯光也於乎美哉周公之祭清廟也其禮敬且和又諸侯有光明著見之德者來助祭之也濟濟多士秉文之德對越在天對配也越於也濟濟之眾士皆執行文王之德文王精神已在天矣猶配順其素行如生存焉振鷺二王之後來助祭也二王夏殷也其後宋也振鷺于飛于彼西雍我客戾止亦有斯容興也振群飛之貌也鷺白鳥也雍澤也客二王之後也白鳥集於西雍之澤言所集得其處也興者喻宋之君有潔白之德來助祭於周之廟得禮之宜也其至止亦有此容言威儀之善如鷺鳥然也雍禘大祖也禘大祭大祖謂文王有來雍雍至止肅肅相維辟公天子穆穆相助也雍雍和也肅肅敬也有是來時雍雍然既至而肅肅然者乃助王禘祭百辟與諸侯也天子是時穆穆然言得天下之歡心也有客微子來見於祖廟也微子代殷後既受命來朝見之也有客有客亦白其馬殷尚白也敬之群臣進戒嗣王也敬之敬之天維顯思命不易哉無曰高高在上陟降厥士日監在茲顯光也監視也群臣見王謀即政之事故因此時戒之曰敬之哉敬之哉天乃光明去惡與善其命吉凶不變易也無謂天高又高在上遠人而不畏也天上下其事謂轉運日月施其所行日視瞻近在此也魯頌閟宮頌僖公之能復周公之宇也宇居王曰叔父建爾元子俾侯于魯大啟爾宇為周室輔王成王也元首也宇居也成王告周公叔父我立汝首子使為君於魯謂欲封伯禽也以為周公後也大開汝居以為周家輔謂封以方七百里也乃命魯公俾侯于東賜之山川土田附庸既告周公乃策命伯禽使為君於東加賜之以山川土田及附庸令專統之也商頌長發大禘也大禘郊祭天也湯降不遲聖敬日躋昭假遲遲上帝是祗帝命式于九圍不遲言疾也躋升也九圍九州也降下也假暇也祗敬也式用也湯之下士尊賢甚疾其聖敬之德日進然而能以其聰明寬暇天下之人遲遲然言其急於已而緩於人也天用是故愛敬之天於是又命之使用事於天下言王之不兢不絿不剛不柔敷政優優百祿是遒絿急也優優和也遒聚也殷武祀高宗也天命降監下民有嚴不僭不濫不敢怠遑命于下國封建厥福不僭不濫賞不僭刑不濫也封大也遑暇也天命乃下視下民有嚴顯之君能明德慎罰不敢怠惰自暇於政事者則命之於小國以為天子大立其福謂命湯使由七十里王天下也商邑翼翼四方之極商邑京師也極中也商邑之禮俗翼翼然可則傚乃四方之中正也
