body:
  text: 老子聖人處無為之事以道治也行不言之教以身帥道之也萬物作焉各自動作而不辭不辭謝而逆止之也生而不有元氣生萬物而不有為而不恃道所施為不恃望其報也不尚賢賢謂世俗之賢者不貴之也使民不爭不爭功名反自然也不貴難得之貨使民不為盜上化清靜下無貪人不見可欲放鄭聲遠美人使心不亂不邪淫也是以聖人之治謂聖人治國猶治身也常使民無知無欲反樸守淳使夫知者不敢為也思慮深不輕言為無為不造作動因循則無不治德化厚百姓安也天地不仁天施地化不以仁恩任自然也以萬物為芻狗天地生萬物視之如芻草狗畜不責望其報聖人不仁聖人愛養萬民不以仁恩法天地行自然以百姓為芻狗道經金玉滿堂莫之能守嗜欲傷神財多累身富貴而驕還自遺咎夫富當振貧貴當憐賤而反驕恣必被禍患也功成名遂身退天之道也言人所為功成事立名稱遂不退身避位則遇於害此乃天之常道譬如日中則移月滿則虧物盛則衰樂極則哀也五色令人目盲貪淫好色則傷精失明五音令人耳聾好聽五音則和氣去心也五味令人口爽爽妄也人嗜於五味則口妄言失於道馳騁田獵令人心發狂人精神好安靜馳騁呼吸精神散亡故發狂也難得之貨令人行妨妨傷也難得之貨謂金銀珠玉心貪意欲則行傷身辱也太上下知有之太上謂太古無名之君也下知有之者下知上有君而不臣事質朴淳也其次親之譽之其德可見恩惠可稱故親愛而譽之其次畏之設刑法以治之其次侮之禁多令煩不可歸誠故欺侮之也信不足焉有不信焉君信不足於下下則應之以不信而欺其君也絕巧絕巧詐也棄利塞貪路也盜賊無有上化公正無邪私也以為文不足文不足以教民也見素抱樸見素守真抱其質朴少私寡欲曲則全曲己從眾不自專則全也枉則直窪則盈地窪下水流之人謙下德歸之弊則新自受弊薄後己先人天下敬之久久自新少則得自受少則得多多則惑財多者惑於守身學多者惑於所聞也是以聖人抱一為天下式抱守也式法也聖人守一乃知萬事故能為天下法式也不自見故明聖人因天下之目以視故能明達不自是故彰聖人不自為是而非人故能彰顯於世不自伐故有功聖人德化流行不自取其美故有功於天下也不自矜故長聖人不自貴大故能長久不危也夫唯不爭故天下莫能與之爭此言天下賢與不肖無能與不爭者爭飄風不終朝驟雨不終日飄風疾風也驟雨暴雨也言疾不能長暴不能久也孰為此者天地也孰誰也天地尚不能久而況於人乎天地至神合為飄風暴雨尚不能使終朝至暮況人欲為暴卒者乎故從事於道人為事當如道安靜不當如飄風驟雨也自見者不明人自見其形容以為好自見所行以為應道不自知其形醜操行之鄙也自是者不彰自以為是而非人眾人共蔽之使不得彰明也自伐者無功所為輒自伐即失有功也自矜者不長好自矜者不以久長故有道者不處道大道大者無不容也天大地大王亦大天大者無不蓋地大者無不載王大者無不制域中有四大而王居其一焉八極之內有四大王居其一也人法地人當法地安靜和柔也勞而不怨有功而不宣地法天施而不求報生長萬物無所收取天法道清靜不言萬物自成道法自然道性自然無所法也重為輕根人君不重則不尊治身不重則失神靜為躁君人君不靜則失威治身不靜則身危柰何萬乘之主柰何者疾時主傷痛之也而以身輕於天下疾時王奢恣輕淫也輕則失臣王者輕淫則失其臣治身輕淫則失其精躁則失君王者行躁疾則失其君位治身躁疾則失其精神也聖人常善救人聖人所以常教人忠孝者欲以救人性命也故無棄人使貴賤各得其所也常善救物聖人所以常教民順四時者以救萬物之殘傷也故無棄物不賤石而貴玉善人者不善人之師也人之行善者聖人即以為人師也不善人者善人之資也資用也人行不善聖人教道使為善得以為給用貴其師不愛其資無所使也雖智大迷雖自以為智言此人乃大迷惑是謂要妙能通此意是謂知微妙要道知其雄守其雌為天下谿雄以喻尊雌以喻卑人雖自知尊顯當復守之以卑微去雄之強梁就雌之柔和如是則天下歸之如水之流入深谿為天下谿常德不離人能謙下如深溪則德常在不復離己知其白守其黑為天下式白以喻昭昭黑以喻默默人雖自知昭昭明達當復守之以默默如闇昧無所見如是則可為天下法式也為天下式常德不忒人能為天下法式則德常在於己不復差忒也知其榮守其辱為天下谷知己之有榮貴當守之以污濁如是則天下歸之如水流深谷也將欲取天下欲為天下主也而為之欲以有為治民也吾見其不得已我見其不得天道人心已明矣天道惡煩濁人心惡多欲天下神器不可為也器物也人乃天下之神物也神物好安靜不可以有為治也為者敗之以有為治之則敗其質性也執者失也強執教之則失其情實生於詐偽也是以聖人去甚去奢去泰甚謂貪淫聲色也奢謂服飾飲食也泰謂宮室臺榭也去此三者處中和行無為則天下自化也以道佐人主謂人主能以道自輔佐不以兵強於天下順天任德敵人自服也師之所處荊棘生焉農事廢田不脩大軍之後必有凶年天應之以惡氣即害五穀也善者果而已行善者當果敢而已不休也不敢以取強焉不敢以果敢取強大之名果而勿矜當果敢謙卑勿自矜大果而勿伐當果敢推讓勿自伐也果而勿驕驕欺勿以驕欺也果而勿強果敢勿以為強以侵淩人也兵者不祥之器兵革者不善之器也非君子之器不得已而用之謂遭衰逢亂乃用之以自守也恬惔為上不貪土地利人財寶勝而不美雖得勝不以為利美而美之者是樂殺人也美得勝者是為樂殺人也夫樂殺人者則不可以得志於天下矣吉事上左左生位凶事上右陰道殺也偏將軍處左偏將軍卑而居陽者以其不專殺也上將軍處右上將軍尊而居右者以其主殺也言以喪禮處之喪禮上右殺人眾多以悲哀泣之傷己德薄不能以道化人而害無辜之民戰勝則以喪禮處之古者戰勝將軍居喪主之位素服而哭之明君子貴德而賤兵不得已誅不祥心不樂之比於喪也知人者智能知人好惡是智自知者明人能自知賢不肖是為反聽無聲內視無形故為明也勝人者有力能勝人者不過以威力也自勝者強人能自勝己情欲則天下無有能與己爭者故為強也知足者富人能知之為足則保福祿故為富也強行者則有志人能強力行善則為有意於道不失其所者久人能自節養不失其所則可以久也死而不妄者壽目不妄視耳不妄聽口不妄語則無怨惡於天下故長壽也道常無為而無不為道以無為為常也侯王而能守之萬物將自化言侯王而能守道萬物將自化效於己也上德不德上德謂太古無名號之君德大無名故言上德也因循自然養人性命其德不見故言不德也是以有德言其德合於天地和氣流行民得以全也下德不失德下德謂號謚之君德不及上德故言下德也不失德者其德可見其功可稱也是以無德以有名號及其身故也上德無為言法道安靜無所改為也而無以為言無以名號為也下德為之言為教令施政事也而有以為言以為已取名號前識者道之華不知而言知為前識也此人失道之實得道之華而愚之始也言前識之人愚闇之唱始也是以大丈夫處其厚大丈夫謂道德之君也處其厚者處身於敦樸不處其薄不處身違道為世煩亂也處其實處忠信也不處其華不上言也昔之得一者昔往也一無為天得一以清地得一以寧言天得一故能垂象清明地得一故能安靜不動搖神得一以靈言神得一故能變化無形谷得一以盈言谷得一故能盈滿而不絕萬物得一以生言萬物皆須道生成也侯王得一以為天下貞言侯王得一故能為天下平正也天無以清恐將裂言天當有陰陽晝夜不可但欲清明無已時將恐分裂不為天也地無以寧將恐發言地當有高下剛柔不可但欲安靜無已時將恐發泄不為地神無以靈將恐歇言神當有王相休廢不可但欲靈無已時將恐虛歇不為神谷無以盈將恐竭言谷當有盈縮虛實不可但欲盈滿無已時將恐枯竭不為谷萬物無以生將恐滅言萬物當隨時死生不可但欲常生無已時將恐滅亡不為物也侯王無以貴高將恐蹶言侯王當屈己下人汲汲求賢不可但欲貴高於人將恐顛蹶失其位也故貴必以賤為本言必欲尊貴當以薄賤為本若禹稷躬稼舜陶河濱周公下曰屋也高必以下為基言必欲尊貴當以下為本是以侯王自稱孤寡不轂孤寡喻孤獨不轂喻下能如車轂為眾輻所湊也此其以賤為本侯王至尊貴能以孤寡自稱此非以賤為本乎德經人之所惡唯孤寡不轂而王公以為稱孤寡不轂不祥之名而王公以為稱者虛謙法空虛和柔故物或損之而益引之不得推讓必還或益之而損夫增高者崩貪富者得患人之所教謂眾人所以教去弱為強去柔為剛也我亦教人言我教眾人使去強為弱去剛為柔也強梁者不得其死梁強者尚勢任力為天所絕兵刃所伐不得以命死也吾將以為教父父始也老子以強梁之人為教式之始天下之至柔馳騁天下之至堅至柔者水也至堅者金石也水能貫堅入剛無所不通也無有入於無閒無有謂道也道無形質故能出入無間通神群生不言之教法道不言帥之以身也無為之益法道無為治身則有益精神治國則有益萬民不勞煩天下希及之天下謂人主也希能有及道無為之治無為之治治身治國也甚愛必大費甚愛色者費精神甚愛財者遇禍患所愛者少所亡者多故言大費多藏必厚亡生多藏於府庫死多藏於丘墓生有攻劫之憂死有發掘之患也知足不辱知足之人絕利去欲不辱於身也知止不殆知可止則止財利不累於身聲色不亂於耳目則終身不危殆可以長久人能知止足則福祿在己治身者神不勞治國者人不擾故可長久也大成若缺謂道德大成之君也如缺者滅名藏譽如毀缺不備其用不弊其用心如是則無弊盡時也大盈若沖謂道德大盈滿之君也如沖者貴不敢驕富不敢奢也其用不窮其用心如是則無窮盡大直若屈大直謂脩道法度正直如一也如屈者不與俗人爭如可屈折也大巧若拙大巧謂多才術也如拙者亦不敢見其能也大辯若訥大辯知無疑也如訥者無口辭也清靜以為天下正能清能靜則為天下長持正則無終已時也天下有道謂人主有道也卻走馬以糞糞者治田也兵甲不用卻走馬以治農田也天下無道謂人主有道也戎馬生於郊戰伐不止戎馬生於郊境之上久不還也罪莫大於可欲好淫色也禍莫大於不知足富貴不能自禁止也咎莫大於欲得欲得人物利且貪故知足之足常足矣無欲心也不出戶以知天下聖人不出戶以知天下者以己身知人身以己家知人家所以見天下矣不窺牖以見天道天道與人道同人君清靜天氣自正人君多欲天氣煩濁吉凶利害皆由於己也其出彌遠其知彌少謂去其家觀人家去其身觀人身所觀益遠所知益少也是以聖人不行而知不見而名上好道下好德上好武下好力聖人原小知大察內知外也不為而成上無所為則下無事家給人足物自化也損之又損之損情欲又損之所以漸去之以至於無為無為而無不為情欲斷絕德與道合則無所不施無所不為取天下常以無事取治也治天下常當以無事不當勞煩民也及其有事不足以取天下及其好有事則政教煩民不安故不足以治天下也聖人無常心聖人重改更貴因循若自無心也以百姓心為心百姓心之所便因而從之善者吾善之百姓為善聖人因而善之不善者吾亦善之百姓為不善聖人化之使善信者吾信之百姓為信聖人因而信之不信者吾亦信之百姓為不信聖人化之使信也生而不有道生萬物不有取以為利為而不恃道所施為不恃望其報也長而不宰道長養萬物不宰割以為利用也是謂玄德道之所行恩德玄闇不可得見也天道甚夷夷平易也而民好徑徑邪不平也大道甚平易而人好從邪不平正朝甚除高臺榭宮室脩田甚蕪農事廢不耕治倉甚虛五穀傷害國無儲也服文采好飾偽貴外華帶利劍尚剛強武且奢厭飲食財貨有餘多嗜欲無足時是謂盜夸百姓不足而君有餘者是猶劫盜以為服飾持行夸人不知身死家破親戚并隨之也非道也哉人君所行如是此非道也善建者不拔建立也善以道立身立國者不可得引而拔也脩之於身其德乃真脩道於身愛氣養神其德如是乃為真人脩之於家其德乃餘脩道於家父慈子孝兄孝弟順夫信妻貞其德如是乃有餘慶脩之於鄉其德乃長脩道於鄉尊敬長老愛養幼少其德如是乃無不覆及脩之於國其德乃豐脩道於國則君信臣忠政平無私其德如是乃為豐厚脩之於天下其德乃普人主脩道於天下不言而化不教而治下之應上信如影響其德如是乃為普博天下多忌諱而民彌貧天下謂人主也忌諱者防禁也令煩則姦生禁多則下詐相殆故貧也民多利器國家滋昏利器者權也民多權則視者眩於目聽者惑於耳上下不親故國家昏亂也人多伎巧奇物滋起人謂人君也多伎巧刻畫宮觀彫琢章服下則化上日以滋起也法物滋彰盜賊多有法好也珍好之物滋生彰著則農事廢飢寒並至故盜賊多有我無為而民自化無所改作而民自化成我好靜而民自正我不言不教民皆自忠正也我無事而民自富我無徭役故皆自富我無欲而民自樸我去華文民則隨我為質樸其政悶悶其政教寬大悶悶昧昧似若不明也其民醇醇政教寬大故民醇醇富厚相親睦也其政察察其政教急疾言決於口聽決於耳其民缺缺民不聊生故缺缺日以疏薄禍兮福之所倚倚因夫福因禍而生人遭禍而能悔過責已脩善行道則禍去福來福兮禍之所伏禍伏匿於福中人得福而為驕恣則福去禍來孰知其極禍福更相生無知其窮極時也治大國若烹小鮮鮮魚也烹小魚不敢撓恐其糜也治國煩則下亂治身煩則精去也以道天下者其鬼不神以德德居位治天下則鬼不敢見其精神以犯人也非其鬼不神其神不傷人其鬼非無精神邪不入正不能傷自然之民也非其神不傷人聖人亦不傷人非鬼神不能傷害人以聖人在位不傷害人故鬼不敢干也道者萬物之奧奧藏也道為萬物之藏無所不容善人之寶也善人以道為身寶不敢違不善人之所保道者不善人之所保倚也遭患逢急猶知自悔卑下故為天下貴無不覆濟恬然無為故可為天下貴為無為無所造作事無事除煩省事味無味深思遠慮味道意也報怨以德脩道行善絕禍於未生也圖難於其易欲圖難事當於易時未及成也為大於其細欲為大事必作於小禍亂從小來也天下難事必作於易天下大事必作於細是以聖人終不為大處謙虛也故能成其大天下共歸之也夫輕諾必寡信不重言也多易必多難不慎患也是以聖人猶難之聖人動作舉事猶進退重難之欲塞其源也故終無難聖人終身無患難之事由避害深也其安易持治身治國安靜者易守持也其未兆易謀情欲禍患未有形兆時易謀正其易破禍亂未動於朝情欲未見於色如弱易破除也其微易散其未彰著微小易散去也為之於未有欲有所為當以未有萌牙之時塞其端也治之於未亂治身治國於未亂之時當豫閉其門也合抱之木生於毫末從小成大也九層之臺起於累土從卑至高千里之行始於足下從近至遠為者敗之有為於事廢於自然執者失之執利遇患堅持不得推讓反還聖人無為故無敗聖人不為華文不為利色故無敗壞也民之從事常於幾成而敗之從為也民人為事常於其功德幾成而貪位好名奢泰盈滿而敗之也慎終如始則無敗事終當如始不當懈怠是以聖人欲不欲聖人欲人所不欲人欲文飾聖人欲質樸人欲於色聖人欲於德不貴難得之貨聖人不賤石而貴玉也學不學聖人學人所不能學人學智詐聖人學自然人學治世聖人學治身復眾人之所過眾人學問反過本為末過實為華復之者使反本以輔萬物之自然教人反本實者欲以輔萬物自然之性也而不敢為焉聖人動作因循不敢有所造為恐違本古之善為道者說古之善以道治身及治國者非以明民非以道教民明知奸巧將以愚之將以道德教民使質樸不詐偽也民之難治以其智多以其智太多而為巧偽也以智治國國之賊使智慧之人治國必遠道德妄作威福為國之賊不以智治國國之福不使智惠之人知國之政事則民守正直上下相親故為國之福也江海所以能為百谷王以其善下之江海以卑下故眾流歸之若民歸就王者是以聖人欲上人欲在民之上也必以言下之法江海處謙虛欲先民欲在民之前也必以身後之先人而後己也是以聖人處上而民不重聖人在民上為主不以尊貴虐下故民戴仰不以為重也處前而民不害聖人在民前不以光明蔽後親之若父母無有欲害之者我有三寶持而保之老子言我有三寶抱持而保倚之一曰慈愛百姓若赤子二曰儉賦斂若取之於己三曰不敢為天下先執謙退不為唱也慈故能勇以慈仁故能勇於忠孝儉故能廣身能節儉故民日用寬廣也不敢為天下先故能成器長成器長謂得道人也我能為道人之長也今舍慈且勇今世人舍慈仁但為勇武舍儉且廣舍其儉約但為奢泰舍後且先舍其後己但為人先死矣所行如此動入死道夫慈以戰則勝以守則固夫慈仁者百姓親附故戰則勝敵以守衛則堅固也用兵有言陳用兵之道老子疾時用兵故託己設其義也吾不敢為主主先也不敢先舉兵也而為客客者和而不唱用兵當承天而後動也不敢進寸而退尺侵人境界利人財寶為進閉門守城為退也禍莫大於輕敵夫禍亂之害莫大於欺輕敵家侵取不休輕戰貪財也輕敵幾喪吾寶幾近也寶身欺輕敵家近喪身也故抗兵相加哀者勝矣哀者慈仁士卒不遠於死也吾言甚易知甚易行先子言吾所言省而易知約而易行天下莫能知莫能行人惡柔弱好剛強也夫唯無知是以不我知夫唯世人也是我德之闇不見於外窮微極妙故無知也知我者稀則我貴矣稀少也唯達道乃能知我故為貴也是以聖人被褐懷玉被褐者薄外懷玉者厚內也匿寶藏德為貴也天道不爭而善勝天不與人爭貴賤而人畏之也不言而善應天不言萬物自動以應時不召而自來天不呼召萬物皆負陰而向陽也繟然而謀善繟寬也天道雖寬博善謀慮人事脩善行惡各蒙其報天網恢恢疏而不失天所羅網恢恢甚大雖疏遠司察人善惡無有所失民不畏死治國者刑罰酷深民不聊生故不畏死也治身者嗜欲傷神貪財殺身不知畏之柰何以死懼之人君不寬其刑罰教人去情欲柰何設刑罰法以死懼之若使民常畏死當除己之所殘刻教民去利欲而為奇者吾得執而殺之孰敢矣以道教化而民不從反為奇巧乃應王法執而殺之誰敢有犯者老子傷時王不先道德化之而先刑罰也民之飢以其上食稅之多人民所以飢寒者以其君上稅食下太多是以飢民之難治以其上之有為人民不可治者以其君上多欲好有為是以難治其民化上有為情偽難治也人之輕死以其求生之厚人民所以輕犯死者以其求生活之道太厚貪利以自危也是以輕死以求生太厚之故輕入死地夫唯無以生為者是賢於貴生也夫唯獨無以生為務者爵祿不干於意財利不入於身天子不得臣諸侯不得使則賢於貴生者也聖人執左契古者聖人無文書法律刻契合符以為信也而不責於人但執刻契信不責人以他事也有德司契有德之君司察契信而已無德司徹無德之君背其契信司人所失也天道無親常與善人天道無有親疏唯與善人則與司契者也小國寡民聖人雖治大國猶以為小儉約不奢泰民雖眾猶若寡乏不敢勞也使民重死君能為人興利除害各得其所則民重死而貪生也而不遠徙政令不煩則民安其業故不遠遷離其常處也雖有舟輿無所乘之清靜無為不好出入雖有甲兵無所陳之無怨惡於天下甘其食甘其蔬食不漁食百姓也美其衣美其惡衣不貴五色安其居安其茅茨不好文飾之屋樂其俗樂其質樸之俗鄰國相望雞狗之聲相聞相去近也民至老死不相往來無情欲也聖人不積聖人積德不積財有德以教愚有財以與貧既以為人己愈有既以財賄布施與人財益多如日月之光無有盡時天之道利而不害天生萬物愛育之令長大無所害也聖人之道為而不爭聖人法天所施為化成事就不與下爭功名故能全其聖功也博選博選者序德程俊也道凡四稽一曰天二曰地三曰人四曰命人有五至一曰百己二曰十己三曰若己四曰役五曰徒隸所謂天者理物情者也所謂地者常弗去者也所謂人者惡死樂生者也所謂命者靡不在君者也君者端神明者也神明者以人為本人者以賢聖為本賢聖者以博選為本博選者以五至為本故北面事之則百己者至先趍而後息先問而後默則十己者至人趍己趍則若己者至馮几據杖指麾而使則役者至噫唶叱則徒隸人至矣故帝者與師處王者與交處亡主與役處著希夫君子者易親而難狎畏禍而難劫嗜利而不為非時動靜而不茍作體雖安之而弗敢處然後禮生焉心雖欲之而弗敢言然後義生焉夫義節欲而治禮反情而辨者也世賢悼襄王問龐煖曰夫君人者亦有為其國乎龐煖曰王獨不聞俞拊之為醫乎己識必治神避之昔堯之任人也不用親戚而必使能其治病也不任所愛必使舊醫襄王曰善龐煖曰王其忘之乎昔伊尹醫殷太公醫周百里醫秦申麃醫郢原季醫晉范蠡醫越管仲醫齊而立五國霸其善一也然道不同數襄王曰願聞其數煖曰王獨不聞魏文侯之問扁鵲邪曰子昆弟三人其孰最善為醫扁鵲曰長兄最善中兄次之扁鵲最為下也文侯曰可得聞邪扁鵲曰長兄於病視神未有形而除之故名不出於家中兄治其在毫毛故名不出於閭若扁鵲者鑱血脈投毒藥割肌膚而名出聞於諸侯文侯曰善使管子行醫術以扁鵲之道則桓公幾能成其霸乎天瑞子列子曰天地無全功聖人無全能萬物無全用全猶備也故天職生覆地職形載聖職教化物職所宜職主也生各有性性各有宜然則天有所短地有所長聖有所否物有所通夫職適於一方者餘塗則罔矣形必有所分聲必有所屬若溫也則不能涼若宮也則不能商何則生覆者不能形載形載者不能教化教化者不能違所宜宜定者不出所位皆有素分不可逆也故天地之道非陰則陽聖人之教非仁則義萬物之宜非剛則柔此皆隨所宜而不能出所位者也方圓靖躁理不得兼殷湯問大禹曰六合之閒四海之內照之以日月經之以星辰紀之以四時要之以太歲神靈所生其物異形或夭或壽唯聖人能通其道聖人順天地之道因萬物之性任其所適通其所逆使群異各得其方壽夭盡其分力命管夷吾有病小白問之曰仲父之病病矣至於大病則寡人惡乎屬國而可夷吾曰公誰欲歟小白曰鮑叔牙可曰不可其為人潔廉善士清己而已其於不己若者不比之人欲以己善齊物也一聞人之過終身不忘不能棄瑕錄善使之治國上且鉤乎君下且逆乎民必引君令其道不弘道茍不弘則逆民而不能納矣其得罪於君將弗久矣小白曰然則孰可對曰勿已則隰朋可其為人也愧不若黃帝而哀不己若者慚其道之不及聖矜其民不以逮已故能無棄人也以德分人謂之聖人化之使合道而不宰割以財分人謂之賢人既以與人已愈有也以賢臨人者未有得人者也求備於人則物所不與也以賢下人者未有不得人者也與物升降者物必歸之也其於國有不聞也其於家有不見也道行則不賴聞見故曰不瞽不聾不能成功勿已則隰朋可若有聞見則事鍾於己而群生無所措手足故遺之可未能盡道故僅可耳然則管夷吾非薄鮑叔也不得不薄非厚隰朋也不得不厚厚薄之去來弗由我也皆天理也晉國苦盜有卻雍者能視盜之貌察其眉睫之閒而得其情晉侯使視盜千百無遺一焉晉侯大喜告趙文子曰吾得一人而一國盜為盡奚用多為文子曰吾君恃伺察而得盜盜不盡矣且卻雍必不得其死焉俄而群盜謀曰吾所窮者卻雍也遂共盜而戕殺之也晉侯聞而大駭召文子而告之曰果如子言卻雍死死取盜何方文子曰周諺有言察見淵魚者不祥智料隱匿者有殃且君欲無盜莫若舉賢而任之使教明於上化行於下人有恥心則何盜之為於是用隨會知政而群盜奔秦焉用聰明以察是非者群詐之所逃用少識以擿奸伏者眾惡之所疾智之為患豈虛也哉孔子自衛反魯息駕乎河梁而觀焉其懸水三十仞圜流九十里魚弗能游黿鼉弗能居有丈夫方將厲之孔子使人止之曰此懸水三十仞圜流九十里魚黿鼉弗能居也意者難可以濟乎丈夫不以措意遂度而出孔子問之曰巧乎有道術乎所以能入而出者何也丈夫對曰始吾之入也先以忠信吾之出也又從以忠信措吾軀於波流而吾不敢用私所以能入而復出者以此也孔子謂弟子曰二三子識之水且猶可以忠信親之而況人乎楚莊王問詹何曰治國柰何詹何蓋隱者也詹何對曰何明於治身而不明於治國也楚王曰寡人得奉宗廟社稷願學所以守之詹何對曰臣未嘗聞身治而國亂者也又未嘗聞身亂而國治者也故本在身不敢對以末楚王曰善所染子墨子見染絲者而歎曰染於蒼則蒼染於黃則黃所入者變其色亦變故染可不慎耶非獨染絲然也國亦有染舜染於許由伯陽禹染於皋陶伯益湯染於伊尹仲虺武王染於太公周公此四王者所染當故王天下立為天子功名蔽天地舉天下之仁義顯人必稱此四王者夏桀染於干辛推哆殷紂染於崇侯惡來厲王染於厲公長文榮夷終幽王染於傅公幾蔡公穀此四王者所染不當故國殘身死為天下戮舉天下不義辱人必稱此四王者齊桓公染於管仲晉文公染於咎犯楚莊染於孫叔吳闔廬染於伍員越句踐染於范蠡此五君者所染當故霸諸侯名傳於後世范吉射染於張柳朔中行寅染於籍秦吳夫差染於宰嚭知伯瑤染於智國中山尚染於魏義宋康染於唐鞅此六君者所染不當故國家殘亡身為刑戮宗廟破滅絕無後類君臣離散民人流亡舉天下之貪暴苛擾者必稱此六君也凡君之所以安者何也其行理生於染當故善為君者勞於論人而逸於治官不能為君者傷形費神愁心勞意然國愈危身愈辱此六君者非不重其國愛其身也以不知要故也不知要者所染不當也法儀子墨子曰天下從事者不可以無法儀無法儀而其事能成者無有也故百工從事皆有法度今大者治天下其次治大國而無法度此不若百工也然則奚以為治法而可莫若法天天之行廣而無私其施厚而不息其明久而不衰故聖王法之既以天為法動作有為必度於天天之所欲則為之天所不欲則止然而天何欲何惡也天必欲人之相愛相利而不欲人之相惡相賊也以其兼而愛之兼而利之也奚以知天之兼而愛之兼而利之也今天下無小大國皆天之邑也人無幼長貴賤皆天之臣也故曰愛人利人者天必福之惡人賊人者天必禍之是以天欲人相愛相利而不欲人相惡相賊也昔之聖王禹湯文武兼愛天下之百姓率以尊天事鬼其利人多故天福之使立為天子天下諸侯皆賓事之暴王桀紂幽厲兼惡天下之百姓率以詬天侮鬼其賊人多故天禍之使遂失其國家身死為戮於天下後世子孫毀之至今不息故為不善以得禍者桀紂幽厲是也愛人利人以得福者禹湯文武是也七患子墨子曰國有七患七患者何城郭溝池不可守而治宮室一患也邊國至境四鄰莫救二患也先盡民力無用之功賞賜無能之人三患也仕者持祿遊者憂佼君脩法討臣臣懾而不敢咈四患也君自以為聖智而不問事自以為安強而無守備五患也所信者不忠所忠者不信六患也蓄種菽粟不足以食之大臣不足以事之賞賜不能喜誅罰不能威七患也以七患居國必無社稷以七患守城敵至國傾七患之所當國必有殃墨子曰古之民未知為宮室時就陵阜而居穴而處下潤溼傷民故聖王作為宮室為宮室之法曰室高足以避潤邊足以圉風寒上足以待雪霜雨露宮牆之高足以別男女之禮謹此則止凡費財勞力不加利者不為也是故聖王作為宮室使上不以為觀樂也作為衣服帶履使身不以為辟怪也故節於身誨於民是以天下之民可得而治財用可得而足當今之主其為宮室則與此異矣必厚斂於百姓暴奪民衣食之財以為宮室臺榭曲直之望青黃刻鏤之飾為宮室若此故左右皆法象之是以其財不足以待凶饑振孤寡故國貧而民難治也君誠欲天下之治而惡其亂也當為宮室不可不節古之民未知為衣服時衣皮帶茭冬則不輕而溫夏則不輕而清聖王以為不中人之溫清故作誨婦人以為民衣為衣服之法冬則練帛之中足以為輕且煖夏則絺綌之中足以為輕且清謹此則止故聖人之為衣服適身體和肌膚而足矣非榮耳目而觀愚民也當是之時堅車良馬不知貴也刻鏤文采不知喜也得其所以自養之情而不感於外是以其民儉而易治其君用財節而易贍也府庫實滿足以待不極兵革不頓士民不勞足以征不服故霸王之業可行於天下矣當今之主其為衣服則與此異矣冬則輕煖夏則輕清皆已具矣必厚作斂於百姓暴奪民衣食之財以為錦繡文采靡曼之衣鑄金以為鉤珠玉以為佩女工作文采男工作刻鏤以身服之此非云益煖之情也單財勞力畢歸之於無用也以此觀之其為衣服非為身體皆為觀好是以其民淫僻而難治其君奢侈而難諫也夫以奢侈之君御淫僻之民欲用無亂不可得也君誠欲天下之治而惡其亂當為衣服不可不節古之民未知為飲食故聖人作誨男耕稼樹藝以為民食也足以增氣充虛強體適腹而已矣其用財節其自養儉故民富國治今則不然厚斂於百姓以為美食芻豢蒸炙大國累百器小國累十器前方丈目不能視手不能摻口不能味冬則凍冰夏則餕饐人君為飲食如此故左右象之是以富貴者奢侈孤寡者凍餒欲無亂不可得君誠欲天下治而惡其亂當為食飲不可不節古之民未知為舟車時重任不移遠道不至故聖王作為舟車以便民之事其為舟車也完固輕利可以任重致遠用財少而為利多是以民樂而利之法禁不急而行民不勞而上足以用故民歸之當今之主其為舟車與此異矣完固輕利皆已具矣必厚斂於百姓以為舟車飾飾車以文采飾舟以刻鏤女子廢其紡織而脩文采故民寒男子離其耕稼而脩刻鏤故民飢人君為舟車若此故右左象之是以其民飢寒並至故為姦邪姦邪多則刑罰深刑罰深則固國亂君誠欲天下之治而惡其亂當為舟車不可不節尚賢子墨子曰今者王公大人為政於國家者皆欲國家之富人民之眾刑政之治然而不得是其故何也是在王公大人為政於國家者不能以尚賢事能為政也是故國有賢良之士眾則國家之治厚故大人之務將在於眾賢而已然則眾賢之術將柰何哉譬若欲眾其國之善射御之士者必將富之貴之敬之譽之然後國之善射御之士將可得而眾也況又有賢良之士厚乎德行辨乎言談博乎道術者乎此固國家之珍而社稷之佐也亦必且富之貴之敬之譽之然後國之良士亦將可得而眾也是故古者聖王之為政也言曰不富不義不貴不義不親不義不近不義是以國之富貴人聞之皆退而謀曰始我所恃者富貴也今上舉義不避貧賤然則我不可不為義親者聞之亦退而謀曰始我所恃者親也今上舉義不避親疏然則我不可不為義近者聞之亦退而謀曰始我所恃者近也今上舉義不避遠近然則我不可不為義遠者聞之亦退而謀曰我始以遠無恃今上舉義不避遠然則我不可不為義人聞之皆競為義是其故何也曰上之所以使下者一物也下之所以事上者一術也故古者聖王之為政列德而尚賢雖在農與工肆之人有能則舉之高與之爵重與之祿任之以事非為賢賜也欲其事之成故當以德就列以官服事以勞受賞量功而分祿故官無常貴而民無恆賤有能則舉之無能則下之舉公義避私怨故得士得士則謀不困體不勞名立而功成美章而惡不生故尚賢者政之本也子墨子言曰天下之王公大人皆欲其國家之富也人民之眾也刑法之治也然而莫知尚賢而使能我以此知天下之士君子明於小而不明於大也何以知其然也今王公大人有一牛羊不能殺必索良宰有一衣裳不能制必索良工有一疲馬不能治必索良醫有一危弓不能張必索良工雖有骨肉之親無故富貴面目美好者誠知其不能也必不使是何故恐其敗財也當王公大人之於此也則不失尚賢而使能至建其國家則不然王公大人骨肉之親無故富貴面目美好者則舉之則王公大人之親其國家也不若其親一危弓疲馬衣裳牛羊之財歟我以此知天下之士君子皆明於小而不明於大也古之聖王之治天下也其所貴未必王公大人骨肉之親無故富貴面目美好者也是故昔者堯之舉舜也湯之舉伊尹也武丁之舉傅說也豈以為骨肉之親無故富貴面目美好者哉唯法其言用其謀行其道上可而利天中可而利鬼下可而利人是故尚賢之為說不可不察也尚賢者天鬼百姓之利而政事之本也非命古之聖王舉孝子而勸之事親尊賢良而勸之為善發憲布令以教誨賞罰以勸沮若此則亂者可使治而危者可使安矣若以為不然昔者桀之所亂湯治之紂之所亂武王治之此世不渝而民不改上變正而民易教其在湯武則治其在桀紂則亂安危治亂在上之發政也則豈可謂有命哉昔者三代之暴王不繆其耳目之淫不慎其心志之僻外之毆騁田獵畢弋內沈於酒樂不肯曰我為刑政不善曰我命故且亡雖昔也三代之偽民亦猶此也繁飾有命以教眾愚昔者禹湯文武方為政乎天下之時曰必使飢者得食寒者得衣勞者得息亂者得治遂得光譽令聞於天下夫豈可以為命哉故以為其力也今賢良之人尊賢而好蓄道術故上得其王公大人之賞下得其萬民之譽遂得光譽令聞於天下豈以為其命哉貴義子墨子曰世之君子使之一犬一彘之宰不能則辭之使為一國之相不能而為之豈不悖哉世之君子欲其義之成而助之脩其身則慍是猶欲其牆之成而人助之築則慍也豈不悖哉
