body:
  text: 蜀志蜀志劉璋字季玉江夏人也為益州刺史聞曹公征荊州遣別駕張松詣曹公曹公時已定荊州走先主不復存錄松松勸璋自絕漢晉春秋曰張松見曹公曹公方自矜伐不存錄松松歸乃勸璋自絕習鑿齒曰昔齊桓一矜其功而叛者九國曹操蹔自驕伐而天下三分皆勤之於數十年之內而棄之於俯仰之頃豈不惜乎是以君子勞謙日昃慮以下人功高而居之以讓勢尊而守之以卑情近於物故雖貴而人不厭其重德洽群生故業廣而天下愈欣其慶夫然故能有其富貴保其功業隆顯當時傳福百世何驕矜之有哉君子是以知曹操之不能遂兼天下者也先主姓劉諱備字玄德涿郡人也少語言善下人喜怒不形於色為豫州牧叛曹公劉表郊迎以上賓禮待之益其兵使屯新野曹公南征表會表卒子琮請降先生遂將其眾去與曹公戰於赤壁大破之益州牧劉璋降先主領益州牧諸葛亮為股肱法正為謀主關羽張飛馬超為爪牙許靖糜竺簡雍為賓友及董和黃權李嚴等本璋之所授用也吳壹費觀等又璋之婚親也劉巴者宿昔之所忌恨也皆處之顯任盡其器能有志之士無不競勸魏文帝稱尊號傳聞漢帝見害先主乃發喪制服即皇帝位於成都章武三年病篤託孤於丞相亮殂於永安宮諸葛亮集載先生遺詔敕後主曰朕疾殆不自濟人年五十不稱夭年已六十有餘何所復恨不復自傷也更以卿兄弟為念勉之勿以惡小而為之勿以善小而不為唯賢唯德能服於人汝父薄德勿效之吾終亡之後汝兄弟父事丞相也評曰先生之弘毅寬厚知人待士蓋有高祖之風英雄之器焉及其舉國託孤於諸葛亮而心神無二誠君臣之至公古今之盛軌也諸葛亮字孔明琅邪人也每自比於管仲樂毅時人莫之許也唯博陵崔州平潁川徐庶元直與亮友善謂為信然時先主屯新野徐庶見先主先主器之謂先主曰諸葛孔明者臥龍也將軍豈願見之乎先主遂詣亮凡三於是與亮情好日密關羽張飛等不悅先主解之曰孤之有孔明猶魚之有水也願諸君勿復言羽飛乃止成都平以亮為軍師將軍先主外出亮常鎮守成都足食足兵先主即帝位策亮為丞相錄尚書事先主病篤召亮屬以後事謂亮曰君才十倍曹丕必能安國終定大事若嗣子可輔輔之如其不才君可自取亮涕位曰臣敢竭股肱之力效忠貞之節繼之以死先主又為詔敕後主曰汝與丞相從事事之如父建興十二年亮悉大眾由斜谷出以流馬運據武功五丈原與司馬宣王對於渭南分兵屯田耕者雜於渭濱居民之間而百姓安堵軍無私焉相持百餘日亮病卒於軍初亮自表後主曰成都有桑八百株薄田十五頃子弟衣食自有餘饒至於臣在外任無別調度隨身衣食悉仰於官若死之日不使內有餘帛外有贏財以負陛下及卒如其所言漢晉春秋曰樊建為給事中晉武帝問諸葛亮之治國建對曰聞惡必改而不矜過賞罰之信足感神明帝曰善哉使我得此人以自補豈有今日之勞乎建稽首曰臣竊聞天下之論皆謂鄧艾見枉陛下知而不理此豈馮唐所謂雖得頗牧而不能用者乎帝笑曰吾乃欲明之卿言起我意於是發詔理艾焉評曰諸葛亮之為相國也撫百姓示義軌約官職從權制開誠心布公道盡忠益時者雖讎必賞犯法怠慢者雖親必罰服罪輸情者雖重必釋游辭巧飾者雖輕必戮善無微而不賞惡無纖而不貶庶事精練物理其本循名責實虛偽不齒終於邦域之內咸畏而愛之刑政雖峻而無怨者以其用心平而勸戒明也可謂識治之良才管蕭之亞匹矣關羽字雲長河東人也先主合徒眾羽與張飛為之禦侮先主與二人寢則同床恩若兄弟而稠人廣坐侍立終日隨先主周旋不避艱險先主使羽守下邳曹公東征擒羽以歸拜為偏將軍禮之甚厚袁紹遣大將軍顏良攻東郡太守劉延於白馬曹公使張遼及羽為先鋒擊之羽望見良麾蓋策馬刺良於萬眾之中斬其首還紹諸將莫能當者遂解白馬圍曹公表封羽為漢壽亭侯初曹公壯羽為人而察其心神無久留之意謂張遼曰卿試以情問之既而遼以問羽羽歎曰吾極知曹公待我厚然吾受劉將軍恩誓以共死不可背之吾終不留吾要當立效以報曹公而後乃歸遼以羽言報曹公曹公義之及羽殺顏良曹公知其必去也重加賞賜羽盡封所賜而奔先主左右欲追之曹公曰彼各為其主勿追之張飛字益德涿郡人也先主攻劉璋飛分定郡縣至江州破璋將嚴顏生獲顏飛呵顏曰大軍至何以不降而敢拒戰顏答曰卿等無狀侵奪我州我州但有斷頭將軍無有降將軍也飛怒令左右牽去斫頭顏顏色不變曰斫頭便斫頭何為怒耶飛壯而釋之引為賓客章武元年遷車騎將軍飛雄壯威猛亞於關羽魏謀臣程昱等咸稱羽飛萬人之敵也羽善待卒伍而驕於士大夫飛愛敬君子而不恤小人先主常戒之曰卿刑殺既過差又日鞭檛健兒而令在左右此取禍之道也飛猶不悛先主伐吳飛當率兵萬人自閬中會江州臨發其帳下將張達笵彊殺飛龐統字士元襄陽人也郡命為功曹性好人倫勤於長養每所稱述多過其才時人怪問之統答曰當今天下大亂雅道陵遲善人少而惡人多方欲興風俗長道業不美其談即聲名不足慕企不足慕企而為善者少矣今拔十失五猶得其半而可以崇邁世教使有志者自厲不亦可乎宗耒陽令在縣不治免官吳將魯肅遺先主書曰龐士元非百里才也使處治中別駕之任當展其驥足耳諸葛亮亦言之於先主先主見與善談大器之以為治中從事親待亞諸葛亮為流失所中卒先主痛惜言則流涕簡雍字憲和涿郡人也為昭德將軍時天旱禁酒釀者有刑吏於人家索得釀具論者欲令與作酒者同罰雍從先主遊觀見一男子行道謂先主曰彼人欲行淫何以不縛先主曰卿何以知之雍對曰彼有淫具與欲釀者同先主大笑而原欲釀者董和字幼宰南郡人也先主定蜀與諸葛亮並署大司馬府事獻可替否共為歡交死之日家無儋石之貯亮後為丞相教與群下曰夫參署者集眾思廣忠益也若遠小嫌難相違覆曠闕損矣違覆而得中猶棄弊蹻而獲珠玉也然人心苦不能盡唯徐元直處茲不惑又董幼宰參署七年事有不至至於十反來相啟告茍能慕元直之十一幼宰之慇勤有忠於國則亮可少過矣又曰昔初交州平屢聞得失後交元直勤見啟誨前參事於幼宰每言則盡後從事於偉度數有諫止雖姿性鄙闇不能悉納然與此四子終始好合亦足以明其不疑於直言也其追思和如此偉度者姓胡名濟義陽人也為亮主簿有忠藎之效故見述允字休昭和子也遷為侍中甚盡匡救之理後主嚴憚之後主漸長大愛宦人黃便辟侮諂欲自容入允常上則正色匡主下則數責於畏允不敢為非終允之世位不過黃門丞陳祗代允為侍中與互相表裏始預政事祇死後從黃門令為中常侍奉車都尉操弄威柄終至覆國蜀人無不追思允張裔字君嗣蜀郡人也丞相亮以為府長史常稱曰公賞不遺遠罰不阿近爵不可以無功取刑不可以勢貴免此賢愚之所以僉忘其身者也黃權字公衡巴西人也州牧劉璋召為主簿時別駕張鬆建議宜迎先主使伐張魯權諫曰左將軍有驍名今請到欲以部曲遇之則不滿其心欲以賓客禮待之則一國不容二君若客有泰山之安則主有累卵之危矣璋不聽出權為廣漢長先主遂襲取益州諸縣望風影附權閉城門堅守須劉璋稽服乃詣先主先主假權偏將軍先主將東伐吳權諫曰吳人捍戰又水軍順流進易退難臣請為先驅以嘗寇陛下宜為後鎮先主不從以權為鎮北將軍督江北軍南軍敗績先主引退而道隔絕權不得還故率將所領降於魏有司執法白收權妻子先主曰孤負黃權權不負孤也待之如初臣松之以為漢武用虛罔之言滅李陵之家劉主拒憲司所執育黃權之室二主得失縣邈遠矣魏文帝謂權曰君捨逆效順欲追蹤陳韓邪權對曰臣過受劉主殊遇降吳不可還蜀無路是以歸命且敗軍之將免死為幸何古人之可慕也文帝善之拜為鎮南將軍封育陽侯加侍中使之陪乘蜀降人或雲誅權妻子權知其虛言未便發喪後得審問果如所言及先主薨問至魏群臣咸賀而權獨否蔣琬字公琰零陵人也隨先主入蜀除廣都長先主嘗因遊觀奄至廣都眾事不理時又沈醉先主大怒將加罪戮諸葛亮請曰將琬社稷之器非百里之才其為政以安民為本不以脩飾為先願公重加察之先主雅敬亮免官而已亮每言公琰託志忠雅當與吾共贊王業者也密表後主臣若不幸後事宜以付琬亮卒琬為尚書令遷大將軍錄尚書事時新喪元帥遠近危竦琬出類拔萃處群僚之右既無戚容又無喜色神守舉止有如平日由是眾望漸服加大司馬東曹掾楊戲素性簡略琬與言論時不應答或欲搆戲於琬曰公與戲語而不見應戲之慢上不亦甚乎琬曰人心不同各如其面面從後言古人之所誡也戲欲贊吾是邪則非其本心欲反吾言則顯吾之非是以默然是戲之快也又督農楊敏會毀琬曰作事憒憒誠非及前人或以白琬主者請推治敏琬曰吾實不如前人無可推也主者重據聽不推則乞問其憒憒之狀琬曰茍其不如則事不當理事不當理則憒憒矣復何問邪後敏坐事系獄眾人猶懼其必死琬心無適莫得免重罪楊戲字文然犍為人也為射聲校尉著季漢輔臣讚其注載諸葛亮與張裔蔣琬書曰摝屬喪楊顒為朝中多損益襄陽記曰楊顒字子昭為丞相諸葛亮主簿亮嘗自校簿書顒直入諫曰為治有體上下不可相侵請為明公以作家譬之今有人於此使奴執耕稼婢典炊爨雞主司晨犬主吠盜牛負重載馬涉遠路私業無曠所求皆足雍容高枕飲食而已忽一旦盡欲以身親其役不復付任勞其體力為此碎務形疲神困終無一成豈其智之不如奴婢雞狗哉失為家主之法也是故古人稱坐而論道謂之王公作而行之謂之士大夫邴吉不問橫道死人而憂牛喘陳平不肯知錢穀之數云自有主者彼誠達於位分之體也今明公為治乃躬自校簿書流汗竟日不亦勞乎亮謝之又有義陽傅肜先主退軍斷後拒戰兵人死盡吳將語肜令降肜罵曰吳狗何有漢將軍降者遂戰死子僉為關中都督景耀六年又臨危授命蜀記載晉武帝詔曰蜀將傅僉前在關城身拒官軍致死不顧僉父肜為劉備戰亡天下之善一也豈由彼此以為異僉息著募後沒入奚官免為庶人吳志上孫權字仲謀吳郡人策弟也策薨以事授權權待張昭以師傅之禮而周瑜程普呂範等為將率招延俊秀聘求名士魯肅諸葛瑾等始為賓客分部諸將鎮撫山越討不從命赤烏元年初權信任校事呂壹壹性苛慘用法深刻太子登數諫權不納大臣由是莫敢言後壹姦罪發露伏誅權引咎責躬乃使中書郎袁禮告謝諸將因問時事所當損益孫休字子烈權第六子也弟亮廢孫綝使迎休改元永安以丞相濮陽興及左將軍張布有舊恩委之以事布典宮省興關軍國休銳意於典籍欲與韋曜盛沖講論道藝曜沖素皆切直布恐入侍發其陰失令己不得專因妄飾說以拒遏之休答曰孤之涉學所見不少其明君闇主奸臣賊子成敗之事無不覽也今曜等入但欲與講論書耳不為從曜等始更受學也縱復如此亦何所損君特當以曜等恐道臣下奸變之事以此不欲令入耳布得詔陳謝重自序述又言懼妨政事休答曰書籍之事患人不好好之無傷也此無所為非而君以為不宜是以孤有所及耳政務學業其流各異不相妨也不圖君今日在事更行此於孤也良所不取布拜表叩頭休答曰聊相開悟耳何至叩頭乎如君之忠誠遠近所知詩云靡不有初鮮克有終終之實難君其終之初休為王時布為左右將督素見信愛及至踐祚厚加寵待專擅國勢多行無禮自嫌瑕短懼曜沖言之故尤患忌休雖解此旨心不能悅更恐其疑懼竟如布意廢其講業不復使沖等入孫字元宗權孫也休薨迎立江表傳曰初立發優詔恤士民開倉廩振貧乏料出宮女以配無妻禽獸擾於苑者放之當時翕然稱為明主矣既得志麤暴驕盈多忌諱好酒色大小失望鳳皇二年愛妾或使人至市劫奪百姓財物司市中郎將陳聲素幸臣也繩之以法妾愬大怒假他事燒鋸斷聲頭投其身於四望之下天璽元年會稽大守車浚湘東大守張詠不出筭緡就在所斬之首諸郡江表傳曰浚在公情忠值郡荒旱民無資糧表求振貸皓謂浚欲樹私恩遣人梟首又尚書熊睦見皓酷虐微有所諫皓使人以刀環撞殺之身無完肌天紀三年晉命杜預向江陵王濬唐彬浮江東下初每宴會群臣無不咸令沈醉置黃門郎十人特不與酒侍立終日為司過之吏宴罷之後各奏其闕失逆視之咎謬言之愆罔有不舉大者即加威刑小者輒以為罪後宮數千而採擇無已又激水入宮宮人有不合意者輒殺流之或剝人之面或鑿人之眼岑昏險諛貴幸致位九列好興功役眾所患苦是以上下離心莫為盡力蓋積惡已極不復堪命故也四年濬彬所至則土崩瓦解皓奉書於濬濬受皓之降張昭字子布彭城人也孫策創業命昭為長史昇堂拜母如比肩之舊文武之事一以委昭每得北方士大夫書疏專歸美於昭昭欲嘿而不宣則懼有私宣之則恐非宜也進退不安策聞之歡笑曰昔管子相齊一則仲父二則仲父而桓公為霸者宗今子布賢我能用之其功名獨不在我乎策臨亡以弟權託昭昭率群僚立而輔之權每田獵常乘馬射虎虎常突前攀持馬鞍昭變色而前曰將軍何有當爾夫為人君者謂能駕禦英雄驅使群賢豈謂馳逐於原野校勇猛獸者乎如有一旦之患柰天下笑何權謝昭曰年少慮事不遠權於武昌臨釣臺飲酒大醉權使人以水灑群臣曰今日酣飲惟醉墮臺中乃當止耳昭正色不言出外車中坐權遣人呼昭還謂曰為共作樂耳公何為怒乎昭曰昔紂為糟丘酒池長夜之飲當時亦以為樂不以為惡也權嘿然有慚色遂罷酒每朝見言論辭氣壯厲義形於色會以直言逆旨中不進見後遣中使勞問因請見昭昭曰昔太後桓王不以老臣屬陛下而以陛下屬老臣是以思盡臣節以報厚恩使泯沒之後有可稱述而意慮淺短違逆盛旨自分幽淪長棄溝壑不圖復蒙引見得奉帷幄然臣愚所以事國志在忠益畢命而已若乃變心易慮以偷榮取容此臣所不能也權辭謝焉權以公孫淵稱藩遣張彌許晏至遼東拜淵為燕王昭諫曰淵背魏懼討遠來求援非本志也若淵改圖欲自明於魏兩使不反不亦取笑於天下乎權與相反覆昭意彌切權不能堪案刀而怒曰吳國士人入宮則拜孤出宮則拜君孤之敬君亦為至矣而數於眾中折孤孤嘗恐失計昭孰視權曰臣雖知言不用而每竭愚忠者誠以太後臨崩呼老臣於床下遺詔顧命之言故耳因涕泣橫流權擲刀致地與昭對泣昭容貌矜嚴有威風權常曰孤與張公言不敢妄也舉邦憚之顧譚字子嘿吳郡人也祖父雍卒代雍平尚書事是時魯王霸有盛寵與太子和齊衡譚上疏曰臣聞有國有家者必明嫡庶之端異尊卑之禮高下有差階級踰邈如此則骨肉之恩生覬覦之望絕昔賈誼陳治安之計論諸侯之勢以為勢重雖親必有逆節之累勢輕雖疏必有保全之祚故淮南親弟不終饗國失之終勢重也吳芮疏臣傳祚長沙得之於勢輕也今臣所陳非有偏誠欲以安太子而便魯王也由是霸與譚有隙步騭字子山臨淮人也拜驃騎將軍都督西陵中書呂壹典校文書多所糾舉騭上疏曰伏聞諸典校擿抉細微吹毛求瑕重案深誣趣陷人以成威福無罪無辜橫受大刑是以吏民跼天蹐地誰不戰慄昔之獄官唯賢是任故民無冤枉升泰之祚實由此興今之小臣動與古異獄以賄成輕忽人命歸咎於上為國速怨甚可仇疾明德慎罰哲人惟刑書傳所美自今蔽獄都下則宜諮顧雍武昌則陸遜潘濬平心專意務在得情騭黨神明受罪何恨此三臣者愚慮不至則已豈敢專擠車威福欺其所天乎權亦覺寤遂誅呂壹張紘字子綱廣陵人也權以為長史病卒臨困留牋曰自古有國有家者咸欲修德政以比隆盛世至於其治多不馨香非無忠臣賢佐闇於治體也由主不勝其情弗能用耳夫人情憚難而趣易好同而惡異與治道相反傳曰從善如登從惡如崩言善之難也人君承奕世之基據自然之勢操八柄之威甘易同之歡無假取於人而忠臣挾難進之術吐逆耳之言其不合也不亦宜乎雖則有釁巧辯緣閒眩於小忠戀於恩愛賢愚雜錯長幼失敘其所由來情亂之也故明君悟之求賢如饑渴受諫而不厭抑情損欲以義割恩上無偏謬之授下無希冀之望宜加三思含垢藏疾以成仁覆之大權省書流涕呂蒙字子明汝南人也拜虎威將軍關羽討樊權遣蒙到南郡糜芳降蒙入據城盡得羽及將士家屬蒙皆撫慰過於平時故羽吏士無心皆委羽降荊州遂定以蒙為南郡守蒙疾發權時在公安迎置內殿所以治護者萬方募封內有能愈蒙疾者賜千金時有減加權為之慘慼欲數見其顏色又恐其勞動常穿壁瞻之見其小能下食則喜顧左右言笑不然則咄唶夜不能寐病中瘳為下赦令令群臣畢賀後更增篤權自臨視卒權哀痛甚呂範字子衡汝南人也遷前將軍初策使範典主財計權時年少私從有求範必關白不敢專許當時以此見望權守陽羨長有所私用策或料覆功曹周穀輒為傳著簿書使無譴問權臨時悅之及後統事以範忠誠厚見信任以谷能欺更薄書不用也虞翻字仲翔會稽人也孫策命為功曹待以交友之禮孫權以為騎都尉數犯顏諫爭權不能悅又性不協俗多見謗毀權既為吳王歡宴之末自起行酒翻伏地陽醉不持權去翻起坐權於是大怒手劍欲擊之侍坐者莫不遑遽惟大司農劉基起抱權諫曰大王以三爵之後手殺善士雖翻有罪天下孰知之且大王以能容賢畜眾故海內望風今一朝棄之可乎權曰曹孟德殺孔文舉孤於虞翻何有哉基曰孟德輕害士人天下非之今大王躬行德義欲與堯舜比隆何得自喻於彼乎翻由是得免權因敕左右自今酒後言殺皆不得殺翻性疏直數有酒失權積怒非一遂徙翻交州張溫字慧恕吳人也容貌奇偉權延見文辭占對觀者傾竦權改容加禮拜議郎選曹尚書以輔義中郎將使蜀還權既陰銜溫稱美蜀政又嫌其聲名太盛眾庶炫惑恐終不為己用思有以中傷之會暨豔事起遂因此發舉豔字子休亦吳郡人也溫引致之以為選曹郎至尚書豔性狷厲好為清議見時郎署混濁多非其人欲令臧否區別賢愚異貫彈射百僚覈選三署率皆貶高就下其居位貪鄙志節汙卑者皆以為軍吏置營府以處之而怨憤之聲積浸潤之譖行矣競言豔及選曹郎徐彪專用私情憎愛不由公理豔彪皆坐自殺溫宿與豔彪同意數交書疏聞問往還即罪溫權幽之有司斥還本郡駱統表理溫曰伏惟陛下天生明德神啟聖心招髦秀於四海置俊乂於宮朝多士既受普篤之恩張溫又蒙最隆之施而溫自招罪譴孤負榮遇念其如此誠可悲疚然臣周旋之閒為國觀聽深知其狀故密陳其理溫實心無他情事無逆跡但年紀尚少鎮重尚淺而戴赫烈之寵體卓偉之才亢臧否之談效貶之議於是務勢者妒其寵爭名者嫉其才玄嘿者非其談瑕釁者諱其議此臣下所當詳辯明朝所當究察也在昔賈誼至忠之臣也漢文大明之君也然而絳灌一言賈誼遠退何者疾之者深譖之者巧也然而誤聞於天下失彰於後世故孔子曰為君難為臣不易溫雖智非從橫武非虓虎然其弘雅之素英秀之德文章之采論議之辯卓躒冠群煒曄曜世世人未有及之者也故論溫才即可惜言罪則可恕若忍威烈以赦盛德宥賢才以敦大業固明朝之休光四方之麗觀也君臣之義義之最重朋友之交交之最輕者國家不嫌與豔為最重之義是以溫亦不嫌與豔為最輕之交也時世寵之於上溫竊親之於下也臣竊念人君雖有聖哲之姿非常之智然以一人之身御兆民之眾從增宮之內瞰四國之外照群下之情求萬機之理猶未易周也固當聽察群下之言以廣聰明之烈今者人非溫既慇勤臣是溫又契闊辭則俱巧意則俱至各自言欲為國誰其言欲為私倉卒之閒猶難即別然以殿下之聰叡察講論之曲直若潛神留思纖麤研核情何嫌而不宣事何昧而不昭哉溫非親臣也臣非愛溫者也昔之君子皆抑私忿以增君明彼獨行之於前臣恥廢之於後故遂發宿懷於今日納愚言於聖聽實盡心於明朝非有念於溫身也權終不納駱統字公緒會稽人也權召為功曹統志在補察茍所聞見夕不待旦常勸權以尊賢接士勤求損益饗賜之日可人人別進問其燥涇加以密意誘諭使言察其志趣令皆感恩載義懷欲報之心權納用焉出為建忠郎將是時徵役繁數重以疫癘民戶損耗統上疏曰臣聞君國者以據疆土為強富制威福為尊貴曜德義為榮顯永世胤為豐祚然財須民生強賴民力威恃民勢福由民殖德俟民茂義以民行六者既備然後應天受祚保族宜邦書曰眾非后無能胥以寧后非眾無以辟四方推是言之則民以君安君以民濟不易之道也今強敵未殄海內未乂三軍有無已之役江境有不釋之備徵賦調數由來積紀加以殃疫死喪之災郡縣荒虛田壽蕪曠聽聞屬城民戶浸寡又多殘老少有丁夫思尋所由小民無知既有安土重遷之性且又前後出為兵者生則困苦無有溫飽死則委棄骸骨不反是以尤用戀本畏遠同之於死每有徵發羸謹居家重累者先見輸送小有財貨傾居行賂不顧窮盡輕剽者則迸入嶮阻黨就群惡百姓虛竭嗷然愁擾愁擾則不營業不營業則致窮困致窮困則不樂生故口腹急則奸心動而攜叛多也夫國之有民猶水之有舟停則以安擾則以危愚而不可欺弱而不可勝也是以聖王重焉禍福由之故與人消息觀時制政方今長吏親民之職惟以辦具為能取過目前之急少復以恩惠為治副稱陛下天覆之仁勤恤之德者也官民政俗日以彫獘漸以陵遲勢不可久夫治疾及其未篤除患貴其未深願陛下少以萬機餘閑留神思省補復荒虛深圖遠計臣統之大願足以死而不朽矣權感統言深加意焉遷偏將軍數陳便宜前後書數十上所言皆善朱據字子範吳郡人也拜左將軍嘉禾中始鑄大錢一當五百後據部曲應受三萬緡工王遂詐而受之典校呂壹疑據實取考問主者死於杖下據哀其無辜以厚棺斂之壹又表據吏為據隱故厚其殯權數責問據據無以自明籍草待罪數月典軍吏劉助覺言王遂所取權大感寤曰朱據見枉況吏民乎乃窮治壹罪賞助百萬
