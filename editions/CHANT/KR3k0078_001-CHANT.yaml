body:
  text: 刊群書治要考例謹考國史承和貞觀之際經筵屢講此書距今殆千年而宋明諸儒無一言及者則其亡失已久寬永中我敬公儒臣掘正意檢此書題其首曰正和年中北條實時好居書籍得請諸中祕寫以藏其金澤文庫及神祖統一之日見之喜其免兵燹乃命範金至台廟獻之皇朝其餘頒宗戚親臣是今之活字銅版也舊目五十卷今存四十七卷其三卷不知亡何時羅山先生補其三卷而一卷不傳故不取也但知金澤之舊藏亦缺三本近世活本亦難得如其繕本隨寫隨誤勢世以音訛所處以訓謬閒有不可讀者我孝昭二世子好學及讀此書有志校刊幸魏氏所引原書今存者十七八乃博募異本於四方日與侍臣照對是正業未成不幸皆早逝今世子深悼之請繼其志勖諸臣相與卒其業於是我公上自內庫之藏旁至公卿大夫之家請以比之借以對之乃命臣人見黍臣深田正純臣大塚長幹臣宇野久恒臣角田明臣野村昌武臣岡田挺之臣關嘉臣中西衛臣小河鼎臣南宮齡臣德民等考異同定疑似臣等議曰是非不疑者就正之兩可者共存又與所引錯綜大異者疑魏氏所見其亦有異本歟又有彼全備而此甚省者蓋魏氏之志唯主治要不事修辭亦足以觀魏氏經國之器規模宏大取舍之意大非後世諸儒所及也今逐次補之則失魏氏之意故不為也不得原書者則敢附臆考以待後賢以是為例讎校以上天明五年乙巳春二月乙未尾張國校督學臣細井德民謹識竊惟載籍之興其來尚矣左史右史記事記言皆所以昭德塞違勸善懲惡故作而可紀薰風揚乎百代動而不法炯戒垂乎千祀是以歷觀前聖撫運膺期莫不懍乎御朽自強不息乾乾夕惕義在茲乎近古皇王時有撰述並皆包括天地牢籠群有競採浮豔之詞爭馳迂誕之說騁末學之博聞飾雕蟲之小伎流宕忘反殊塗同致雖辯周萬物愈失司契之源術總百端乖得一之旨皇上以天縱之多才運生知之叡思性與道合動妙幾神玄德潛通化前王之所未化損己利物行列聖之所不能行翰海龍庭之野並為郡國扶桑若木之域咸襲纓冕天地成平外內禔福猶且為而不恃雖休勿休俯協堯舜式遵稽古不察貌乎止水將取鑒乎哲人以為六籍紛綸百家踳駿窮理盡性則勞而少功周覽汎觀則博而寡要故爰命臣等採摭群書翦截淫放光昭訓典聖思所存務乎政術綴敘大略咸發神衷雅致鉤深規摹宏遠網羅治體事非一目若乃欽明之后屈己以救時無道之君樂身以亡國或臨難而知懼在危而獲安或得志而驕居業成以致敗者莫不備其得失以著為君之難其委質策名立功樹惠貞心直道忘軀徇國身殞百年之中聲馳千載之外或大奸巨猾轉日回天社鼠城狐反白仰黑忠良由其放逐邦國因以危亡者咸亦述其終始以顯為臣不易其立德立言作訓垂範為綱為紀經天緯地金聲玉振騰實飛英雅論徽猷嘉言美事可以弘獎名教崇太平之基者固亦片善不遺將以丕顯皇極至於母儀嬪則懿后良妃參徽猷於十亂著深誡於辭輦或傾城哲婦亡國豔妻候晨雞以先嗚待舉烽而後笑者時有所存以備勸戒爰自六經訖乎諸子上始五帝下盡晉年凡為五合五十卷本求治要故以治要為名但皇覽遍略隨方類聚名目互顯首尾淆亂文義斷絕尋究為難今之所撰異乎先作總立新名各全舊體欲令見本知末原始要終並棄彼春華採茲秋實一書之內牙角無遺一事之中羽毛咸盡用之當今足以鑒覽前古傳之來葉可以貽厥孫謀引而申之觸類而長蓋亦言之者無罪聞之者足以自戒庶弘茲九德簡而易從觀彼百王不疾而速崇巍巍之盛業開蕩蕩之王道可久可大之功並天地之貞觀日用日新之德將金鏡以長懸其目錄次第編之如左古昔聖主賢臣所以孜孜講求莫非平治天下之道皆以救獘於一時成法於萬世外此豈有可觀者哉但世遷事變時換勢殊不得不因物立則視宜創制是以論說之言日浩撰著之文月繁簡樸常寡浮誕漸勝其綱之不能知而況舉其目乎此書之作蓋其以此也先明道之所以立而後知政之所行先尋教之所以設而後得學之所歸自典誥深奧訖史子辨博諸係乎政術存乎勸戒者舉而不遺罷朝而不厭其淆亂閉室而不煩其尋究誠亦次經之書也我朝承和貞觀之閒致重雍襲熙之盛者未必不因講究此書之力則凡君民臣君者非所可忽也尾公有見於斯使世子命臣僚校正而上之木又使余信敬序之惟信敬弱而不敏如宜固辭者而不敢者抑亦有故也群書治要五十卷五十卷內闕三卷神祖遷駿府得此書惜其不全命我遠祖羅山補之三卷內一卷今不傳今尾公此舉上之欲君民者執以致日新之美下之欲臣君者奉以贊金鏡之明為天下國家冀昇平之愈久遠心曠度有不可勝言者也信敬預事亦知遠祖所望信敬是所以奉命不敢辭也天明七年丁未四月朝散大夫國子祭酒林信敬謹序唐魏徵等奉敕撰徵字元成魏州曲城人官至太子太師謚文貞事蹟具唐書本傳案宋王溥唐會要云貞觀五年九月二十七日祕書監魏徵撰群書治要上之又云太宗欲覽前王得失爰自六經訖於諸子上始五帝下盡晉年書成諸王各賜一本又唐書蕭德言傳云太宗詔魏徵虞世南褚亮及德言裒次經史百氐帝王所以興衰者上之帝愛其書博而要曰使我稽古臨事不惑者卿等力也德言賜尤渥然則書實成於德言之手故唐書於魏徵虞世南褚亮傳皆不及也是編卷帙與唐志合穆案藝文志家類魏徵群書治要五十卷劉伯莊群書治要音五卷宋史藝文志即不著錄知其佚久矣此本乃日本人擺印前有魏徵序惟闕第四第十三第二十三卷今觀所載專主治道不事修辭凡有關乎政術存乎勸戒者莫不彙而輯之即所采各書并屬初唐善冊與近刊多有不同如晉書二卷尚為未修晉書以前十八家中之舊本又桓譚新論崔寔政要論穆案隋書經籍志崔寔正論六卷此衍要字仲長統昌言袁準正書穆案隋書經籍志袁準正論十九卷注又有袁子政書二十五卷亡蔣濟萬機論桓範政要論穆案隋書經籍志桓範世要論十二卷唐人避太宗諱改世曰政又案杜恕體論劉廙政論亦久佚近多不傳亦藉此以存其梗概洵初唐古籍也
