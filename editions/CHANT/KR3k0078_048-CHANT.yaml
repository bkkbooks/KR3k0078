body:
  text: 劉廙別傳備政夫為政者譬猶工匠之造屋也廣廈既成眾梲不安則梁棟為之斷折一物不備則千柱為之並廢善為屋者知梁梲之不可以不安故棟梁常存知一物之不可以不備故眾榱與之共成也善為政者知一事之不可闕也故無物而不備知一是之不可失也故眾非與之共得其不然者輕一事之為小忽而闕焉不知眾物與之共多也一非之為小也輕而蹈焉不知眾是與之共失也夫政之相須猶輗轄之在車無輗轄猶可以小進也謂之歷遠而不頓躓者未之有也夫為政者輕一失而不矜之猶乘無轄之車安其少進而不其頓躓之患也夫車之患近故無不焉國之患遠故無不忽焉知其體者夕惕若厲慎其愆矣夫為政者莫善於清其吏也故選託於由夷而又威之以篤罰欲其貪之必懲令之必從也而姦益多巧彌大何也知清之為清而不知所以清之故免而無恥也日欲其清而薄其祿祿薄所以不得成其清夫饑寒切於肌膚固人情之所難也其甚又將使其父不父子不子兄不兄弟不弟夫不夫婦不婦矣貧則仁義之事狹而怨望之心篤從政者捐私門而委身於公朝榮不足以光室族祿不足以代其身骨肉饑寒離怨於內朋友離叛衰捐於外虧仁孝損名譽得守之而不易者萬無一也不能原其所以然又將佐其室族之不和合門之不登也疑其名必將忘其實因而下之不移之士雖苦身於內冒謗於外捐私門之患畢死力於國然猶未獲見信之衷不免黜放之罪故守清者死於溝壑而猶有遺謗於世也為之至難其罰至重誰能為之哉人知守清之必困於終也違清而又懼卒罰之及其身也故不為昭昭之行而咸思闇昧之利姦巧機於內而虛名逸於外人主貴其虛名而不知賤其所以為名也虛名彰於世姦實隱於身人主眩其虛必有以闇其實矣故因而貴之敬而用之此所謂惡貪而罰於由夷好清而賞於盜跖也名實相違好惡相錯此欲清而不知重其祿之故也不知重其祿非徒失於清也又將使清分於私而知周於欺推此一失以至於欺茍欺之行何事而不亂哉故知清而不知所以重其祿者則欺而濁知重其祿而不知所以少其吏者則竭而不足知少其吏而不知所以盡其力者則事繁而職闕凡此數事相須而成偏廢則有者不為用矣其餘放欺無事而不若此者也不可得一二而載之耳故明君必須良佐而後致治非良佐能獨治也必須善法有以用之夫君猶醫也臣猶鍼也法陰陽補瀉也鍼非人不入人非鍼不徹於病二者既備而不知陰陽補瀉則無益於疾也又況逆失之哉今用鍼而不存於善術使所鍼必死夫然也欲其疾之療亦遠良醫急於速療而不恃鍼入之無恙也明君急於治平而不恃亡失之不便亡也正名夫名不正則其事錯矣物無制則其用淫矣錯則無以知其實淫則無以禁其非故王者必正名以督其實制物以息其非名其何以正之哉曰行不美則名不得稱稱必實所以然效其所以成故實無不稱於名名無不當於實也曰物又何以制之哉曰物可以養生而不可廢之於民者富之備之無益於養生而可以寶於世者則隨尊卑而為之制使不為此官不得服此服不得備此飾故其物甚可欲民不得服雖捐之曠野而民不敢取也雖簡於禁而民皆無欲也是以民一於業本務而未息有益之物阜而賤無益之寶省而貴矣所謂貴者民貴願之也匪謂賈貴於市也故其政惠其民潔其法易其業大昔人曰唯器與名不可以假人其此之謂與慎愛夫人主莫不愛愛己而莫知愛己者之不足愛也故惑小臣之佞而不能廢也忘違己之益己而不能用也夫犬之為猛也莫不愛其主矣見其主則騰踴而不能自禁此歡愛之甚也有非則鳴吠而不遑於夙夜此自效之至也昔宋人有沽酒者酒酸而不售何也以其有猛犬之故也夫犬知愛其主而不能為其主慮酒酸之患者不噬也夫小臣之欲忠其主也知愛之而不能去其嫉妒之心又安能敬有道為己願稷契之佐哉此養犬以求不貧愛小臣以喪良賢也悲夫為國者之不可不察也審愛為人君者莫不利小人以廣其視聽謂視聽之可以益於己也今彼有惡而己不見無善而己愛之者何也智不周其惡而義不能割其情也己不能割情於所愛慮不能其得失之機彼亦能見己成敗於所闇割私情以事其上哉其勢適足以厚姦人之資此朋黨者之所以日固獨善之所以孤弄也故視聽日多而闇蔽日甚豈不詭哉欲失夫人君莫不願眾心之一於己也而疾姦黨之比於人也欲得之而不知所以得之故欲之益甚而不可得亦甚疾之益力而為之者亦益勤矣何也彼將恐其黨也任之而不知所以信之朝任其身夕訪於惡惡無毀實善無賞分事無小大訪而後知彼眾之不必同於道也又知訪之不能於己也雖至誠至忠俾曾參以事其親借龍逢以貫其忠猶將屈於私交況世俗之庸臣哉故為君而欲使其臣之無黨者得其人也得其人而使必盡節於國者信之於己也疑賢自古人君莫不願得忠賢而用之也既得之莫不訪之於眾人也忠於君者豈能必利於人茍無利於人又何能保譽於人哉故常願之於心而常失之於人也非願之之不篤而失之也所以定之之術非也故為忠者獲小賞而大乖違於人恃人君之獨知之耳而獲訪之於人此為忠者福無幾而禍不測於身也得於君不過斯須之歡失於君而終身之故患荷賞名而實窮於罰也是以忠者逝而遂智者慮而不為為忠者不利則其為不忠者利矣凡利之所在人無不欲人無不欲故無不為不忠矣為君者以一人而獨慮於眾姦之上雖至明而猶困於見闇又況庸君之能之哉庸人知忠之無益於己而私名之可以得於人得於人可以重於君也故篤私交薄公義為己者殖而長之為國也抑而割之是以真實之人黜於國阿欲之人盈於朝矣由是田季之恩隆而齊魯之政衰也雖成之市朝示之刀鋸私欲益盛齊魯日困何也誠威之以言而賞之以實也好惡相錯政令日弊昔人曰為君難不其然哉任臣人君所以尊敬人臣者以其知任人臣委所信而保治於己也是以其聽察其明昭身日高而視日下事日遠而聽日近業至難而身至易功至多而勤至少也若多疑而自任也則其臣不思其所以為國而思其所以得於君深其計而淺其事以求其指撝人主淺之則不陷於之難人主深之則進而順之以取其心所闕者忠於國而難明於君者也所修者不必忠於國而易行於時者也因其所貴者貴之故能同其貴因其所賤者賤之故能殊於賤其所貴者不必賢所賤者不必愚也家懷因循之術人為悅心易見之行夫美大者深而難明利長者不可以倉卒形也故難明長利之事廢於世阿易見之行塞於側為非不知過知困不知其乏此為天下共一人之智以一人而獨治於四海之內也其業大其智寡豈不蔽哉以一蔽主而臨不量之阿欲能不惑其功者未之有也茍惑之則人得其志矣人得其志則君之志失矣君勞臣逸上下易所是一君為臣而萬臣為君也以一臣而事萬君鮮不用矣有不用人之名而終為人所用也是以明主慎之不貴知所用於己而貴知所用於人能用人故人無不為己用也昔舜恭己正南面而已天下不多皋陶稷契之數而貴聖舜獨治之功故曰為之者不必名其功獲其業者不必勤其身也其舜之謂與下視夫自足者不足自明者不明日月至光至大而有所不遍者以其高於眾之上也鐙燭至微至小而無不可之者以其明之下能照日月之所蔽也聖人能往知來不下堂而知四方蕭牆之表有所不喻焉誠無所以知之也夫有所以知之無遠而不無所以知之雖近不如童昏之履之也人豈踰於日月而皆賢於聖哉故高於人之上者必有以應於人其察之也視下視下者見之詳矣人君誠能知所不知不遺鐙燭童昏之見故無不可知而不知也何幽冥之不盡況人情之足蔽哉政略夫君王之治必須賢佐然後為泰故君稱元首臣為股肱譬之一體相須而行也是以陶唐欽明羲氏平秩有虞明目元愷敷教皆此君唱臣和同亮天功故能天成地平咸熙於和穆盛德之治也夫隨俗樹化因世建業慎在務三而已一曰擇人二曰因民三曰從時時移而不移違天之祥也民望而不因違人之咎也好善而不能擇人敗官之患也三者失則天人之事悖矣夫人乖則時逆時逆則天違天違而望國安未有也刑論患之巨者狡猾之獄焉狡黠之民不事家事煩貸鄉黨以見厭賤因反忿恨看國家忌諱造誹謗崇飾戲言以成醜語被以叛逆告白長吏長吏或內利疾惡盡節之名外以為功遂使無罪并門滅族父子孩耄肝腦塗地豈不劇哉求媚之臣側入取舍雖烝子啖君孤己悅主而不憚也況因捕叛之時無悅親之民必獲盡節之稱乎夫妄造誹謗虛書叛逆狡黠之民也而詐忠者知而族之此國之大殘不可不察也用奇或曰官人用士累功積效以次相敘明主之法忠臣之節盡矣若拔奇求異超等踰第非臣之事也應之曰顧當憂世無奇人倘有又不能識耳明法忠節未必已盡也自昔五帝之冠固有黜陟之謨矣復勤揚側陋殷有考誡之誥矣復力索巖穴西伯有呈效之誓矣復旁求魚釣小伯有督課之法矣復遽求囚俘漢祖有賞爵之約矣復急追亡信若脩敘為明法拔奇為非事是兩帝三君非聖哲而鮑蕭非忠吏也然則考功案第守成之法也拔奇取異定社稷之事也當多事之世而論無事之法處用奇之時而必效一官之智此所以上古多無嚴之國也是以高世之主成功之臣張法以御常人厚禮以延奇逸求之若不及索之若骨肉故能消災除難君臣同烈也曩使五主二臣牽於有司束於脩常不念疇諮則唐民康哉之歌不作殷無高宗之號周無殪商雅頌之美齊無九合功漢殲於京索而不帝矣故明君良臣垂意於奇異誠欲濟其事也使奇異填於溝壑有國者將不興其治矣漢元帝為太子時諫持法泰深求用儒生宣帝作色怒之云俗儒不達不足任亂吾家者太子也據如斯言漢之中滅職由宣帝非太子也乃知班固步驟盛衰發明是非之理弗逮古史遠矣昔秦穆公近納英儒招致智辯知富國強兵至于始皇乘歷世餘滅吞六國建帝號而坑儒任刑疏扶蘇之諫外蒙恬之直受胡亥之曲信趙高之諛身沒三歲秦無類矣前史書二世之禍始皇所起也夫漢祖初以三章結黔首之心並任儒辯以并諸侯然後罔漏吞舟之魚烝民樸謹天下大治宣帝受六世之洪業繼武昭之成法四夷怖征伐之威生民厭兵革之苦海內歸勢適當安樂時也而以峻法繩下賤儒貴刑名是時名則石顯弘恭之徒便僻危嶮杜塞公論專制於事使其君負無窮之謗也如此誰果亂宣帝家哉向使宣帝豫料柱石之士骨鯁之臣屬之社稷不令宦豎秉持天機豈近於元世棟橈榱崩三十年閒漢為新家哉推計之始皇任刑禍近及身宣帝好刑短喪天下不同於秦禍少者耳為君難或曰仲尼稱為君難夫人君者處尊高之位執賞罰之柄用人之才因人之力何為不成何求不得功立則受其功治成則厚其福故官人舜也治水禹也稼穡棄也理訟皋陶也堯無事焉而由之聖治何為君難耶曰此其所以為難也夫日月照於晝夜風雨動潤於萬物陰陽代以生殺四時迭以成歲不見天事而猶貴之者其所以運氣陶演協和施化皆天之為也是以天萬物之覆君萬物之燾也懷生之類有不浸潤於澤者天以為負員首之民有不霑濡於惠者君以為恥是以在上者體人君之大德懷恤下之小心闡化立教必以其道發言則通四海行政則動萬物慮之於心思之於內布之於天下正身於廟堂之上而化應於千里之外雖黈纊塞耳隱屏而居照幽達情燭於宇宙動作周旋無事不慮服一綵則念女功之勞御一穀則恤農夫之勤決不聽之獄則懼刑之不中進一士之爵則恐官之失賢賞毫氂之善必有所勸罰纖芥之惡必有所阻使化若春氣澤如時雨消凋污之人移薄偽之俗救衰世之弊反之於上古之朴至德加於天下惠厚施於百姓故民仰之如天地愛之如父母敬之如神明畏之如雷霆且佐治之臣歷世難遇庸人眾而賢才寡是故君人者不能皆得稷契之幹伊呂之輔猶造父不能皆得騏驥之乘追風之匹也御踶齧必煩轡銜統庸臣必勞智慮是以人君其所以濟輔群下均養小大審覈真偽考察變態在於幽冥窈妙之中割毫折芒纖微之閒非天下之至精孰能盡於此哉故臣有立小忠以售大不忠效小信以成大不信可不慮之以詐乎臣有貌厲而內荏色取仁而行違可不慮之以虛乎臣有害同儕以專朝塞下情以壅上可不慮之以嫉乎臣有進邪說以亂是因似然以傷賢可不慮之以奸乎臣有因賞以恩因罰以佐威可不慮之以奸乎臣有外顯相薦內陰相謀事託公而實俠私可不慮之以欺乎臣有事左右以求進託重臣以自結可不慮之以偽乎臣有和同以取諧茍合以求薦可不慮之以禍乎臣有悅君意以求親悅主言以取容可不慮之以佞乎此九慮者所以防惡也臣有辭拙而意工言逆而事順可不恕之以直乎臣有樸騃而辭訥外疏而內敏可不恕之以質乎臣有犯難以為士離謗以為國可不恕之以忠乎臣有守正以逆眾意執法而違私志可不恕之以公乎臣有不曲己以求合不耦世以取容可不恕之以貞乎臣有從側陋而進顯言由卑賤而陳國事可不恕之以難乎臣有孤特而執節分立而見毀可不恕之以勁乎此七恕者所以進善接下之理也御臣之道豈徒七恕九慮而已哉臣不易昔孔子言為臣不易或人以為易言臣之事君供職奉命身恭己忠順而已忠則獲寵安之福順則無危辱之憂曷為不易哉此言似易論之甚難夫君臣之接以愚奉智不易以明事闇為難唯以賢事聖以聖事賢為可然賢聖相遭既稀又周公之於成王猶未能得斯誠不易也且父子以恩親君臣以義固恩有所為虧況義能無所為缺哉茍有虧缺亦何容易且夫事君者竭忠義之道盡忠義之節服勞辱之事當危之難肝腦塗地膏液潤草而不辭者以安上治民宣化成德使君為一代之聖明己為一世之良輔輔千乘則念過管晏佐天下則思醜稷禹豈為七尺之軀寵一官之貴貪充家之祿榮華囂之觀哉以忠臣之事主投命委身期於成功立事便國利民故不為難易變節安危革行也然為大臣者或仍舊德藉故勢或見拔擢重任其所以保寵成功承上安下則當遠威權之地避嫌疑之分知虧盈之數達止足之義動依典禮事念忠篤乃當匡上之行諫主之非獻可濟否匪躬之故剛亦不吐柔亦不茹所謂大臣以道事君也然當託於幽微當行於隱密使怨咎從己身而眾善自君發為群寮之表式作萬官之儀範豈得偷樂容悅而已哉然或為邪臣所譖幸臣所亂聽一疑而不見信事似然而不可釋忠詭計而為非善事變而為惡罪結於天無所禱請激直言而無所訴深者即時伏劍賜死淺者以漸斥逐放棄蓋比干龍逢所以見害於飛廉惡來孔子周公所以見毀於管蔡季孫也斯則大臣所以不易為小臣者得任則治其職受事脩其業思不出其位慮不過其責竭力致誠忠信而已然或困辱而不均厭抑而失所是以賢者或非其議預非其事不著其陋不嫌其卑庶貫一言而利一事然以至輕至微至疏至賤千萬乘之主約以禮義之度匡以行事之非忤執政之臣暴其所短說合則裁自若不當則離禍害或計不欲人知事不從人豫而己策謀適合陳偶同上者或顯戮其身以神其計在下者或妒其人而奪其策蓋關思見殺於鄭韓非受誅於秦龐涓刖孫臏之足魏齊折應侯之脅斯又孤宦小臣所以為難也為小臣者一當恪恭職司出內惟允造膝詭辭執心審密忠上愛主媚不求奧而已若為茍若此患為外人所彈邪臣所嫉以職近而言易身親而見信奉公俠私之吏求害之以見直懷奸抱邪之臣欲除之以示忠言有若是事有似然雖父子之閒猶不能明況臣之於君而得之乎故上官毀屈平爰盎譖朝錯公孫排主父張湯陷嚴助夫數子者雖示純德亦親近之臣所以為難也為外臣者盡力致死其義一也不以遠而自外疏而自簡親涉其事而掌其任茍有可以興利除害安危定亂雖違本朝之議詭常法之道陳之於主行之於身志於忠上濟事憂公無私善否之閒在已典主可也然患為左右所輕重貴臣所壅制或逆而毀之使不得用或用而害之使不得成或成而譖之使不得其所吳起見毀於魏李牧見殺於趙樂毅見讒於燕章邯畏誅於秦斯又外臣所以為危也此舉梗概耳曲折纖妙豈可得備論之哉夫治國之本有二刑也德也二者相須而行相待而成矣天以陰陽成歲人以刑德成治故雖聖人為政不能偏用也故任德多用刑少者五帝也刑德相半者三王也杖刑多任德少者五霸也純用刑強而亡者秦也夫人君欲治者既達專持刑德之柄矣位必使當其德祿必使當其功官必使當其能此三者治亂之本也位當其德則賢者居上不肖者居下祿當其功則有勞者勸無勞者慕未之有也凡國無常治亦無常亂欲治者治不欲治者亂後之國士人民亦前之有也前之有亦後之有也而禹獨以安幽厲獨以危斯不易天地異人民欲與不欲也吳之馬庸夫統銜則為弊乘伯樂執轡即為良驥非馬更異教民亦然也故遇禹湯則為良民遭桀紂則為凶頑治使然也故善治國者不尤斯民而罪諸己不責諸下而求諸身傳曰禹湯罪己其興也勃焉桀紂罪人其亡也忽焉由是言之長民治國之本在身故詹何曰未聞身治而國亂者也若詹者可謂知治本矣政務凡吏之於君民之於吏莫不聽其言而則其行故為政之務務在正身身正於此而民應於彼詩云爾之教矣民胥效矣是以葉公問政孔子對曰子帥而正孰敢不正又曰茍正其身於從政乎何有不能正其身如正人何故君子為政以正己為先教禁為次若君正於上則吏不敢邪於下吏正於下則民不敢僻於野國無傾君朝無邪吏野無僻民而政之不善者未之有也凡政之務務在節事事節於上則民有餘力於下下有餘力則無爭訟之有乎民民無爭訟則政無為而治教不言而行矣節欲夫人生而有情情發而為欲物見於外情動於中物之感人也無窮而情之所欲也無極是物至而人化也人化也者滅天理矣夫欲至無極以尋難窮之物雖有賢聖之姿鮮不衰敗故脩身治國也要莫大於節欲傳曰欲不可縱歷觀有家有國其得之也莫不階於儉約其失之也莫不由於奢侈儉者節欲奢者放情放情者危節欲者安堯舜之居土階三等夏日衣葛冬日鹿裘禹卑宮室而菲飲食此數帝者非其情之不好乃節儉之至也故其所取民賦也薄而使民力也寡其育物也廣而興利也厚故家給人足國積饒而群術也以仁義興而四海安孔子曰以約失之者鮮矣且夫閉情無欲者上也咈心消除者次之昔帝舜藏黃金於嶄巖之山抵珠玉於深川之底及儀狄獻旨酒而禹甘之於是疏遠儀狄純上旨酒此能閉情於無欲者也楚文王悅婦人而廢朝政好獠獵而忘歸於是放逐丹姬斷殺如黃及共王破陳而得夏姬其豔國色王納之宮從巫臣之諫壞後垣而出之此能咈心消除之也既不能閉情欲能抑除之斯可矣故舜禹之德巍巍稱聖楚文用朝鄰國恭王終諡為恭也詳刑夫刑辟之作所從尚矣聖人以治亂人以亡故古今帝王莫不詳慎之者以為人命至重壹死不生一斷不屬故也夫堯舜之明猶惟刑之恤也是以後聖制法設三槐九棘之吏肺石嘉石之訊然猶復三判僉曰可殺然後殺之罰若有疑即從其輕此蓋詳慎之至也故茍詳則死者不恨生者不忿忿恨不作則災害不生災害不生太平之治也是以聖主用其刑也詳而行之必欲民犯之者寡而畏之者眾明刑至於無刑善殺至於無殺此之謂矣夫闇亂之主用刑彌繁而犯之者益多而殺之者彌眾而慢之者尤甚者何由用之不詳而行之不必也不詳則罪不值所罪不值則當死反生不必則令有所虧令有所虧則刑罰不齊矣失此二者雖日用五刑而民猶輕犯之故亂刑之刑刑以生刑惡殺之殺殺以致殺此之謂也兵要聖人之用兵也將以利物不以害物也將以救亡非以危存也故不得已而用之耳然以戰者危事兵者凶器不欲人之好用之故制法遺後命將出師雖勝敵而反猶以喪禮處之明弗樂也故曰好戰者亡忘戰者危不好不忘天下之王也夫兵之要在於修政修政之要在於得民心得民心在於利之利之之要在於仁以愛之義以理之也故六馬不和造父不能以致遠臣民不附湯武不能以立功故兵之要在得眾者善政之謂也善政者恤民之患除民之害也故政善於內兵強於外歷觀古今用兵之敗非鼓之日也民心離散素行豫敗也用兵之勝非陣之朝也民心親附素行豫勝也故法天之道履地之德盡人之和君臣輯穆上下一心盟誓不用賞罰未施消奸慝於未萌折凶邪於殊俗此帝者之兵也德以為卒威以為輔修仁義之行行愷悌之令闢地殖穀國富民豐賞罰明約誓信民樂為之死將樂為之亡師不越境旅不涉場而敵人稽顙此王者之兵也辨能夫商鞅申韓之徒其能也貴尚譎詐務行苛剋則伊尹周邵之罪人也然其尊君卑臣富國強兵有可取焉甯成郅都輩放商韓之治專以殘暴為能然其抑強撫弱背私立公尚有可取焉其晚世之所謂能者乃犯公家之法赴私門之勢廢百姓之務趣人閒之事決煩理務臨時茍辨但使官無譴負之累不省下民吁嗟之冤復是申韓甯郅之罪人也而俗猶共言其能執政者選用不廢者何也為貴勢之所持人閒之士所稱聽聲用名者眾察實審能者寡故使能否之分不定也夫定令長之能者守相也定守相之能者州牧刺史也然刺史之徒未必能考論能否也未必能端平也或委任下吏聽浮游之譽或受其戚黨貴勢之託其整頓傳舍待望迎賓聽其請謁供其私求則行道之人言其能也治政以威嚴為先行事務邀時取辨悕望上官之指敬順監司之教期會之命無降身以接士之來違法以供其求欲人閒之事無不循言說之談無不用則寄寓游行幅巾之士言其能也有此三者為之談聽聲譽者之所以可惑能否之所以不定也尊嫡凡光祖禰安宗廟傳國土利民人者在於立嗣繼世繼世之道莫重於尊嫡別庶也故聖人之制禮貴嫡異其服數殊其寵秩所以一群下之望塞變爭之路杜邪防萌深根固本之慮歷觀前代后妻賤而姪媵貴太子卑而庶子尊莫不爭亂以至危亡是以周有子帶之難齊有無知之禍晉有莊伯之患衛有州吁之篡故傳曰並后匹嫡兩政耦國亂之本也諫爭夫諫爭者所以納君於道矯枉正非救上之謬也上茍有謬而無救焉則害於事害於事則危道也故曰危而不持顛而不扶則將焉用彼相扶之之道莫過於諫矣故子從命者不得為孝臣茍順者不得為忠是以國之將興貴在諫臣家之將盛貴在諫子若託物以風喻微生而不切不切則不改唯正諫直諫可以補缺也詩云袞職有缺仲山甫補之柔亦不茹剛亦不吐正諫者也易曰王臣謇謇傳曰愕愕者昌直諫者也然則咈人之耳逆人之意變人之情抑人之欲不爾不為諫也雖有父子兄弟猶用生怨焉況臣於君有天壤之殊無親戚之屬以至賤干至貴以至稀閒至親何庸易耶惡死亡而樂生存恥困辱而樂榮寵雖甚愚人猶知之也況士君子乎今正言直諫則近死辱而遠榮寵人情何好焉此乃欲忠於主耳夫不能諫則君危固諫則身殆賢人君子不忍觀上之危而不愛身之殆故蒙危辱之災逆人主之鱗及罪而弗避者忠也義也深思諫士之事知進諫之難矣決壅夫人君為左右所壅制此有目而無見有耳而無聞積無聞見必至亂正故國有壅臣禍速近鄰人臣之欲壅其主者無國無之何也利在於壅也壅則擅寵於身威權獨於己此人臣日夜所禱祝面求也人臣之壅其君微妙工巧見壅之時不知也率至亡敗然後悔焉為人君之務在於決壅決壅之務在於進下進下之道在於博聽博聽之義無貴賤同異隸豎牧圉皆得達焉若此則所聞見者廣所聞見者廣則雖欲求壅弗得也人主之好惡不可見於外也所好惡見於外則臣妾乘其所好惡以行壅制焉故曰人君無見其意將為下餌昔晉公好色驪女乘色以壅之吳王好廣地太宰陳伐以壅之桓公好味易牙烝首子以壅之及薛公進美珥以勸立后龍陽臨釣魚行微巧之詐以壅制其主沈寞無端甚可畏矣古今亡國多矣皆由壅蔽於帷幄之內沈溺於諂諛之言也而秦二世獨甚趙高見二世好淫游之樂遺於政因曰帝王貴有天下者貴得縱欲恣意尊嚴若神固可得聞而不可得高遂專權欺內二世見殺望夷臨死乃知見之禍悔復無及豈不哀哉讚象夫讚象之所作所以昭述勳德思詠政惠此蓋詩頌之末流矣宜由上而興非專下而作也世考之導實有勳績惠利加於百姓遺愛留於民庶宜請于國當錄於史官載於竹帛上章君將之德下宣臣吏之忠若言不足紀事不足述虛而為盈亡而為有此聖人之所疾庶幾之所恥也銘誄夫渝世富貴乘時要世爵以賂至官以賄成視常侍黃門賓客假其氣勢以致公卿牧守所在宰蒞無清惠之政而有饕餮之害為臣無忠誠之行而有姦欺之罪背正向邪附下內上此乃繩墨之所加流放之所棄而門生故吏合集財貨刊石紀功稱述勳德高邈伊周下陵管宴遠追豹產近踰黃邵勢重者稱美財富者文麗後人相踵稱以為義外若讚善內為己發上下相效競以為榮其流之弊乃至於此欺曜當時疑誤後世罪莫大焉且夫賞生以爵祿榮死以誄謚是人主權柄而漢世不禁使私稱與王命爭流臣子與君上俱用善惡無章得失無效豈不誤哉序作夫著作書論者乃欲闡弘大道述明聖教推演事義盡極情類記是貶非以為法式當時可行後世可修且古者富貴而名賤廢滅不可勝記唯篇論俶儻之人為不朽耳夫奮名於百代之前而流譽於千載之後以其覽之者益聞之者有覺故也豈徒轉相放效名作書論浮辭談說而無損益哉而世俗之人不解作體而務汎溢之言不存有益之義非也故作者不尚其辭麗而貴其存道也不好其巧慧而惡其傷義也故夫小辯破道狂簡之徒斐然成文皆聖人之所疾矣
