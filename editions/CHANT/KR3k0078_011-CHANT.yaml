body:
  text: 孔子家語始誅孔子為魯大司寇朝政七日而誅亂法大夫少正卯戮之於兩觀之下兩觀闕也屍於朝三日孔貢進曰夫少正卯魯之聞人也今夫子為政而始誅之或者為失之乎孔子曰天下有大惡者五而盜竊不與焉一曰心逆而嶮二曰行僻而堅三曰言偽而辨四曰記醜而博醜謂非義五曰順非而澤此五者有一於人則不免於君子之誅而少正卯皆兼有之其居處足以撮徒成黨撮聚也其談說足以飾熒眾其強禦足以反是獨立此乃人之奸雄也不可以不除孔子為魯大司寇有父子訟者夫子同狴執之狴獄牢也三月不別其父請止夫子赦焉季孫聞之不悅曰司寇欺余曩告余曰為國家者必先以孝今戮一不孝以教民孝不亦可乎而又赦之何哉孔子喟然歎曰嗚呼上失其道而殺其下非理也不教以孝而聽其獄是殺不辜也三軍大敗不可斬也獄犴不治不可刑也何者上教之不行罪不在民故也夫慢令謹誅賊也徵斂無時暴也不誡責成虐也政無此三者然後刑可即也既陳道德以先服之而猶不可則尚賢以勸之又不可則廢不能以憚之若是百姓正矣其有邪民不從化者然後待之以刑則民咸知罪矣是以威厲而不誡刑措而不用也今世不然亂其教煩其刑使民迷惑而陷罪焉又從而制之故刑彌繁而盜不勝也世俗之陵遲久矣雖有刑法民能勿踰乎王言孔子閑居謂曾子曰參汝可語明王之道與居吾語汝夫道者所以明德也德者所以尊道也是故非德道不尊也非道德不明也雖有國之良馬不教服乘不可以取道里雖有博地眾民不以其道治之不可以致霸王是故昔者明王內修七教外行三至七教修而可以守三至行而可以征明王之道其守也則必折衝千里之外其征也還師衽席之上故曰內脩七教而上不勞外行三至而財不費此之謂明王之道也曾子曰不勞不費之為明王可得而聞乎孔子曰昔者帝舜左禹右皋陶不下席而天下治夫如此何上之勞乎若乃十一而稅用民之力歲不過三日入山澤以其時而無征此則生財之路也而明王節之何財之費乎曾子曰敢問何謂七教孔子曰上敬老則下益孝上尊齒則下益悌上樂施則下益寬上親賢則下擇友上好德則下無隱上惡貪則下恥爭上廉讓則下知節此之謂七教也七教者治民之本也政教定則本正矣凡上者民之表也表正則何物不正曾子曰道則至矣弟子不足以明之孔子曰參汝以為姑止此乎昔者明王之治民也有法必裂地而封之分屬而理之然後賢民無所隱暴民無所伏使有司日省而時考之進用賢良退貶不肖則賢者悅而不肖者懼哀鰥寡養孤獨恤貧窮誘孝悌選才能此七者脩則四海之內無刑民矣上之親下也如手足之於腹心下之親上也如幼子之於慈母矣上下相親如此故令則從施則行民懷其德近者悅服遠者來附政之致也田獵罩弋罩掩網也弋繳射也非以盈宮室也徵斂百姓非以充府庫也慘怛以補不足禮節以損有餘多信而寡貌其禮可守其言可覆其可履其於信也如四時其博有萬民也如饑而食如渴而飲民之信之如寒暑之必驗也故視遠若邇非道邇也見明德也是故兵革不動而威用利不施而親此之謂明王之守折衝乎千里之外者也曾子曰敢問何謂三至孔子曰至禮不讓而天下治至賞不費而天下之士悅至樂無聲而天下之民和明王篤行三至故天下之君可得而知也天下之士可得而臣也天下之民可得而用也曾子曰敢問此義何謂也孔子曰古者明王必盡知天下良士之名既知其名又知其實既知其實然後因天下之爵以尊之此之謂至禮不讓而天下治因天下之祿以富天下之士此之謂至賞不費而天下之士悅如此則天下之明譽興焉此之謂至樂無聲而天下之民和故曰所謂天下之至仁者能合天下之至親者也所謂天下之至智者能用天下之至和所謂天下之至明者能舉天下之至賢此三者咸通然後可以征是故仁者莫大於愛人智者莫大於知賢政者莫大於官能有士之君能修此三者則四海之內供命而已矣夫明王之所征必道之所廢者也是故誅其君而改其政弔其民而不奪其財故曰明王之征也猶時雨之降也至則民悅矣是故行施彌博得親彌眾此之謂還師衽席之上言安而無憂也大婚孔子侍坐於哀公公問曰敢問人道誰為大孔子對曰夫人道政為大夫政者正也君為正則百姓從而正矣君之所為百姓之所從也君之不為百姓何從公曰敢問為政如之何孔子對曰夫婦別父子親君臣信三者正則庶物從之矣內以治宗廟之禮足以配天地之神也出以治直言之禮足以立上下之敬也夫婦正則出可以治政言禮矣身正乃可以正人矣物恥則足以振之恥事不如禮則足以振教之也國恥則足以興之恥國不如禮則足以興起之故為政先乎禮禮其政之本與孔子遂言曰昔三代明王之必敬妻子也蓋有道焉妻也者親之主也子也者親之後也敢不敬與是故君子無不敬也敬也者敬身為大身也者親之支也敢不敬與不敬其身是傷其親傷其親是傷其本也傷其本則支從而亡三者百姓之象也言百姓之所法而行身以及身子以及子妃以及妃君修此三者則大化愾於天下愾滿也公曰敢問何謂敬身孔子對曰君子過言則民作辭過動則民作則言不過辭動不過則百姓恭敬以從命若是則可謂能敬其身能敬其身則能成其親矣公曰何謂成親孔子對曰君子者乃人之成名也百姓與名謂之君子則是成其親為君而為其子也孔子遂言曰為政而不能愛人則不能成其身不能成其身則不能安其土不能安其土則不能樂天不能樂天道也不能樂天則不能成身公曰敢問何謂成身孔子對曰夫其行已不過於物謂之成身不過於物合天道也問禮哀公問於孔子曰大禮何如子之言禮何其尊也孔子曰丘聞之民之所以生者禮為大非禮則無以節事天地之神焉非禮則無以辨君臣上下長幼之位焉非禮則無以別男女父子兄弟婚姻親族疏數之交焉是故君子此為之尊敬然後以其所能教示百姓卑其宮室節其服御車不雕璣器不雕鏤食不二味心不淫志以與萬民同利古之明王之行禮也如此公曰今之君子胡莫之行也孔子對曰今之君子好利無厭淫行不倦荒怠慢遊固民是盡以遂其心以怨其政以伐有道求得當欲不以其所言茍求得當其情欲而已虐殺刑誅不以其理夫昔之用民也由前用上所言今之用民也由後用下所言是即今之君子莫能為禮也五儀哀公問於孔子曰寡人欲論魯國之士與之為治敢問如何取之孔子曰人有五儀有庸人有士人有君子有賢有聖審此五者則治道畢矣所謂庸人者心不存慎終之規口不吐訓格之言格法也不擇賢以託其身不力行以自定見小闇大而不知所務從物如流而不知所執此則庸人也所謂士人者心有所定計有所守雖不能盡道術之本必有率也率猶述也雖不能備百善之美必有處也是故智不務多務審其所知言不務多務審其所謂所謂者謂言之要也行不務多務審其所由智既知之言既得之得其要也行既由之則若性命形骸之不可易也富貴不足以益貧賤不足以損此則士人也所謂君子者言必忠信而心不怨忍怨害也仁義在身而色不伐無伐善之色也思慮通明而辭不專篤行信道自強不息油然若將可越而終不可及者此君子也油然不進之貌越過所謂賢者德不踰閑閑猶法也行中規繩言足法於天下而不傷於身言滿天下無口過也道足化於百姓而不傷於本本亦謂身富則天下無宛財宛積也施則天下不病貧此賢者也所謂聖者德合天地變通無方窮萬事之終始協庶品之自然敷其大道而遂成情性明並日月化行若神下民不知其德者不識其鄰此聖者也鄰以喻畔界也公曰善哉非子之賢則寡人不得聞此言也雖然寡人生於深宮之中長於婦人之手未嘗知哀未嘗知憂未嘗知勞未嘗知懼未嘗知危恐不足以行五儀之教若何孔子曰君入廟而右登自阼階仰視榱桷俯察機筵其器皆存而不其人君以此思哀則哀可知矣昧爽夙興正其衣冠爽明也味明始明也夙早也興起也平旦視朝慮其危難一物失理亂亡之端君以此思憂則憂可知矣日出聽政至乎中昃中日中也昃日昳也諸侯子孫往來為賓行禮揖讓慎其威儀君以此思勞則勞可知矣緬然長思出乎四門周章遠望亡國之墟必將有數焉言亡國故墟非但一也君以此思懼則懼可知矣夫君者舟也民者水也水所以載舟亦所以覆舟君以此思危則危可知矣既明此五者而又少留意於五儀之事則於政治乎何有失哉哀公問於孔子曰請問取人之法孔子對曰事任之官言各當以其所能之事任之於官也無取捷捷無取鉗鉗鉗妄對不謹誠無取啍啍啍啍多言也捷捷貪也捷捷而不良所以為貪鉗鉗亂也啍啍誕也誕欺詐也故弓調而後求勁焉馬服而後求良焉士必愨而後求智能焉不愨而多能譬之豺狼不可邇也邇近也言人無智能者雖不愨信不能為大惡也不愨信而有智能者然後乃可畏也哀公問於孔子曰夫國家之存亡禍福信有天命非唯人耶孔子對曰存亡禍福皆在己而已天災地妖弗能加也昔者殷王帝辛之世帝辛紂也有雀生大鳥於城隅焉帝辛介雀之德介助也以雀之德為助也不修國政殷國以亡此即以己逆天時得福反為禍者也又其先世殷太戊之時道缺法邪以致夭孽桑榖生朝七日大拱太戊恐駭側身修行三年之後遠方慕義重譯至者十有六國此即以己逆天時得禍轉為福者也故失災地妖所以儆人主也寤夢徵怪所以儆人臣也儆戒也災妖不勝善政夢怪不勝善行能知此至治之極也明王達此也季羔為衛士師士師獄官刖人之足俄而衛有亂季羔逃之刖者守門焉謂季羔曰彼有缺季羔曰君子不踰又曰彼有竇季羔曰君子不隧隧從竇出又曰於此有室季羔入焉既而追者罷季羔將去謂刖者曰吾不能虧主之法而親刖子之足今吾在難此正子報怨之時而子逃我何故刖者曰斷足故我之罪也無可奈何曩者君治臣以法令先人後臣欲臣之免也臣知之獄決罪定臨當論刑君愀然不樂見於顏色臣又知之君豈私臣哉天生君子其道故然此臣之所以悅君也孔子聞之曰善哉為吏其用法一也思仁恕則樹德加嚴暴則樹怨公以行其子羔乎致思子路為蒲宰為水備修溝瀆以民之煩苦也人與一簞食一壺漿孔子止之子路曰由也以民多匱餓者匱乏也是以與之簞食壺漿而夫子使止之是夫子止由之行仁也孔子曰爾以民為餓何不白於君發倉廩以給之而私以爾食饋之是汝明君之無惠也速已則可不已則爾之見罪必矣子貢問治民於孔子孔子曰懍懍焉如以腐索御扞馬懍懍焉誡懼之貌扞馬突馬也子貢曰何其畏也孔子曰夫通達之屬皆人也以道導之則吾畜也不以道導之則吾讎也若之何其無畏也三恕孔子曰君子有三恕有君弗能事有臣而求其使非恕也有親弗能孝有子而求其報非恕也有兄弗能敬有弟而求其順非恕也士能明於三恕之本則可謂端身矣端正也孔子觀於魯桓公之廟有敧器焉孔子問於守廟者曰此為何器對曰此蓋為宥坐之器孔子曰吾聞宥坐之器虛則敧中則正滿則覆明君以為誡故置於坐側也顧謂弟子曰試注水焉水實之中則正滿則覆夫子喟然歎曰嗚呼夫物惡有滿而不覆者哉子路進曰敢問持滿有道乎子曰聰明叡智守之以愚功被天下守之以讓勇力振世守之以怯富有四海守之以謙此所謂損之又損之之道也好生哀公問於孔子曰昔者舜冠何冠乎孔子不對公曰寡人問於子而子無言何也孔子曰以君之問不先其大者故方思所以為對焉公曰其大何乎孔子曰舜之為君也其政好生而惡殺其任授賢而替不肖德若天地之虛靜化若四時之變物是以四海承風暢於異類異類四方之夷狄也鳳翔麟至鳥獸馴德馴順也無他好生故也君舍此道而冠冕是問是以緩對觀周孔子觀於明堂四方之墉墉牆有堯舜桀紂之象而各有善惡之狀興廢之誡焉又有周公相成王抱之而負斧扆南面以朝諸侯之圖焉孔子徘徊而望之謂從者曰此則周之所以盛也夫明鏡者所以察形往古者所以知今人主不務襲跡於其所以安存而忽怠於所以危亡是猶未有以異於卻步而欲求及前人也豈非惑哉孔子觀周遂入大祖后稷之廟廟堂右階之前有金人焉參緘其口而銘其背曰古之慎言人也戒之哉無多言多言多敗無多事多事多患安樂必誡雖處安樂必警誡也無行所悔所悔之事不可復行勿謂何傷其禍將長勿謂何害其禍將大勿謂不聞神將伺人焰焰不滅炎炎若何涓涓不壅終為江河不絕或成網羅微而不絕則有成網羅者豪末不扎如豪之末言微也扎拔也將尋斧柯尋用誠能慎之福之根也口是何傷禍之門也強梁者不得其死好勝者必遇其敵盜憎主人民惡其上君子知天下之不可上也故下之知眾人之不可先也故後之溫恭慎德使人慕之執雌持下人莫踰之人皆趣彼我獨守此人皆惑惑我獨不徙惑惑東西轉移之貌內藏我智不示人技我雖尊高人弗我害唯能於此天道無親常與善人戒之哉戒之哉孔子既讀斯文顧謂弟子曰小子志之此言實而中情而信賢君哀公問於孔子曰當今之君孰為最賢孔子對曰丘未之見也抑有衛靈公乎公曰吾聞其閨門之內無別而子次之賢何也孔子對曰臣語其朝廷行事不論其私家之際也公曰其事如何孔子曰靈公之弟曰公子渠牟其智足以治千乘其信足以守之靈公愛而任之又有士曰王林國者見賢必進之而退與分其祿是以衛國無游放之士靈公知而尊之又有士曰慶足者國有大事則必起而治之國無事則退而容賢言其所以退欲以容賢於朝靈公悅而敬之又有大夫史以道去衛而靈公郊舍三日琴瑟不御必待史之入而後敢入臣以此取之雖次之賢不亦可乎子貢問孔子曰今之人臣孰為賢乎子曰齊有鮑叔鄭有子皮則賢者矣子貢曰齊無管仲鄭無子產乎子曰賜汝徒知其一未知其二也汝聞用力為賢乎進賢為賢乎子貢曰進賢賢哉子曰然吾聞鮑叔達管仲子皮達子產未聞二子之達賢己之才者也哀公問於孔子曰寡人聞忘之甚者徙而忘其妻有諸孔子對曰此猶未甚者甚者乃忘其身公曰可得聞乎孔子曰昔夏桀貴為天子富有四海忘其聖祖之道壞其典法絕其世祀荒乎淫樂沈湎於酒佞臣諂諛窺導其心忠士鉗口逃罪不言鉗口杜口天下誅桀而有其國此之謂忘其身之甚者也子路問於孔子曰賢君治國所先者何在孔子曰在於尊賢而賤不肖子路曰由聞晉中行氏尊賢而賤不肖矣其亡何也子曰中行氏尊賢而弗能用賤不肖而不能去賢者知其不己用而怨之不肖者知其必己賤而讎之怨讎並存於國鄰敵搆兵於郊中行氏雖欲無亡豈可得乎哀公問政於孔子孔子對曰政之急者莫大乎使民富且壽也公曰為之奈何孔子曰省力役薄賦斂則民富矣敦禮教遠罪疾則民壽矣公曰寡人欲行夫子之言恐吾國貧矣孔子曰詩不云乎愷悌君子民之父母未有其子富而父母貧者也衛靈公問孔子曰有語寡人為國家者計之於廟堂之上則政治矣何如孔子曰其可也愛人者則人愛之惡人者則人惡之知得之己者則知得之人所謂不出環堵之室而知天下者知反己之謂也辨政子貢為信陽宰將行孔子曰勤之慎之奉天之時無奪無伐無暴無盜子貢曰賜也少而事君子豈以盜為累哉孔子曰而未之詳也夫以賢代賢是之謂奪以不肖代賢是之謂伐緩令急誅是之謂暴取善自與是之謂盜盜非竊財之謂也吾聞之知為吏者奉法以利民不知為吏者枉法以侵民此怨所由生也匿人之善斯謂蔽賢揚人之惡斯謂小人內不相訓而外相謗非親睦也言人之善若己有之言人之惡若己受之故君子無所不慎焉六本孔子曰行已有六本焉然後為君子立身有義矣而孝為本喪紀有禮矣而哀為本戰陣有列矣而勇為本治政有理矣而農為本居國有道矣而嗣為本繼嗣不立則亂之源也生財有時矣而力為本置本不固無務豐末親戚不悅無務外交事不終始無務多業反本修君子之道也孔子曰藥酒苦於口而利於病忠言逆於耳而利於行湯武以諤諤而昌桀紂以唯唯而亡君無爭臣父無爭子兄無爭弟士無爭友其無過者未之有也故曰君失之臣得之父失之子得之兄失之弟得之士失之友得之是以國無危亡之兆家無悖亂之惡父子兄弟無失而交友無絕孔子讀易至於損益喟然而歎子夏避席問曰夫子何歎焉孔子曰夫自損者必有益之自益者必有決之吾是以歎也子夏曰然則學者不可以益乎子曰非道益之謂也道彌益而身彌損夫學者損其自多以虛受之天道成而必變凡持滿而能久者未嘗有也故曰自賢者則天下之善言不得聞其耳矣孔子曰以富貴而下人何人不與以富貴而愛人何人不親發言不逆可謂知言矣孔子曰吾死之後則商也日益賜也日損曾子問曰何謂也子曰商也好與賢已者處賜也好悅不如己者不知其子視其父不知其人視其友不知其君視其所使故曰與善人居如入芝蘭之室久而不聞其香即與之化矣與不善人居如入鮑魚之肆久而不聞其臭亦與之化矣是以君子必慎其所與者焉哀公問政哀公問政於孔子孔子對曰文武之政布在方策其人存則其政舉其人亡則其政息故為政在於得人取人以身脩身以道脩道以仁仁者人也親親為大義者宜也尊賢為大親親之殺尊賢之等禮所生也是以君子不可以不脩身思脩身不可以不事親思事親不可以不知人思知人不可以不知天天下之達道有五其所以行之者三曰君臣也父子也夫婦也昆弟也朋友之交也五者天下之達道也智仁勇三者天下之達德也所以行之者一也或生而知之或學而知之或困而知之及其知之一也或安而行之或利而行之或勉強而行之及其成功一也好學近於智力行近於仁知恥近於勇知斯三者則知所以修身知所以修身則知所以治人知所以治人則能成天下國家矣公曰政其盡此而已乎孔子曰凡為天下國家者有九經焉曰脩身也尊賢也親親也敬大臣也體群臣也子庶人也來百工也柔遠人也懷諸侯也脩身則道立尊賢則不惑親親則諸父昆弟不怨敬大臣則不眩體群臣則士之報禮重子庶民則百姓勸來百工則財用足柔遠人則四方歸之懷諸侯則天下畏之公曰為之奈何孔子曰齊莊盛服非禮不動所以修身也去讒遠色賤貨而貴德所以尊賢也爵其能重其祿同其好惡所以篤親親也官盛任使所以敬大臣也盛其官任而使之也忠信重祿所以勸士也忠信者與之重祿也時使薄斂所以子百姓也日省月考既稟稱事所以來百工也既稟食之各當其職事也送往迎來嘉善而矜不能所以綏遠人也綏安也繼絕世舉廢邦朝聘以時厚往而薄來所以懷諸侯也治天下國家有九經焉其所以行之者一也凡事豫則立不豫則廢言前定則不跲跲躓事前定則不困行前定則不疚疚病道前定則不窮公曰子之教寡人備矣敢問行之所始孔子曰立愛自親始教民睦也立敬自長始教民順也教以慈睦而民貴有親教以敬長而民貴用命民既孝於親又順以聽命措諸天下無所不行顏回魯定公問於顏回曰子亦聞東冶畢之善御乎對曰善則善矣雖然其馬將必逸公不悅其後三日東冶畢之馬逸公聞之促駕召顏回顏回至公曰前日寡人問吾子以東冶畢之善御而子曰其馬將逸不識吾子奚以知之顏回對曰以政知之而已矣昔者帝舜巧於使民而造父巧於使馬舜不窮其民力造父不窮其馬力是以舜無逸民造父無逸馬今東冶畢之御也歷嶮致遠馬力盡矣然而其心猶求馬不已臣以此知之公曰善哉吾子之言其義大矣願少進乎顏回曰臣聞之鳥窮則噣獸窮則攫人窮則詐馬窮則逸自古及今未有窮其下而能無危者也公悅困誓衛蘧伯玉賢而靈公不用彌子瑕不肖而反任之史魚驟諫公不從史魚病將卒命其子曰吾在公朝不能進蘧伯玉退彌子瑕是吾為臣不能正君也生而不能正君死不可以成禮矣吾死汝置屍牖下於我畢矣畢猶足也禮殯於客位其子從之靈公弔焉怪而問之其子以其父言告公公愕然失容曰是寡人之過也於是命之殯於客位進蘧伯玉而用之退彌子瑕而遠之孔子聞之曰古之烈諫者死則已矣未有若史魚死而屍諫忠感其君者也可不謂直乎執轡閔子騫為費宰問政於孔子孔子曰以德以法夫德法者御民之具猶御馬之有銜勒也君者人也吏者轡也刑者策也人君之政執其轡策而已矣子騫曰敢問古之為政孔子曰古者天子以內史為左右手以德法為銜勒以百官為轡以刑罰為策以萬民為馬故御天下數百年而不失善御馬者正銜勒齊轡策均馬力和馬心故口無聲而馬應轡策不舉而極千里極至也善御民者一其德法正其百官均齊民力和安民心故令不再而民順從刑不用而天下化治是以天地德之天地以為有德而兆民懷之懷歸不能御民者棄其德法專用刑辟譬猶御馬棄其銜勒而專用箠策其不可制也必矣夫無銜勒而用箠策馬必傷車必敗無德法而用刑辟民必流國必亡凡治國而無德法則民無所法修民無所法修則迷惑失道古之御天下者以六官總治焉六官在手以為轡故曰御四馬者執六轡御天下者正六官是故善御馬者正身以總轡均馬力齊馬心迴旋曲折唯其所之故可以取長道可以趣急疾此聖人所以御天地與人事之法則也天子以內史為左右手以六官為轡己與三公執六官均五教齊五法仁義禮智信之法也故亦唯其所引無不如志五刑冉有問於孔子曰先王制法使刑不上於大夫禮不下於庶人然則大夫之犯罪不可以加刑庶人之行事不可以治禮乎孔子曰不然凡治君子以禮義御其心所以厲之以廉恥之節也故古之大夫其有坐不廉污穢而退放之者則曰簠簋不飾飾整齊有坐淫亂男女無別者則曰帷薄不脩有坐罔上不忠者則曰臣節未著有坐疲軟不勝任者則曰下官不職言其下官不務其職不斥其身也有坐干國之紀者則曰行事不請言不請而擅行也此五者大夫既自定有罪名矣而猶不忍斥然正以呼之也既而為之諱所以愧恥之是故大夫之罪其在五刑之域者譴發則白冠氂纓盤水加劍造於闕而自請罪君不使有司執縛牽掣而加之也其有大罪者聞命則北面再拜跪而自裁君不使人捽引而刑殺之也曰子大夫自取之耳吾遇子有禮矣是以刑不上大夫而大夫亦不失其罪者教使然也凡所謂禮不下庶人者以庶人遽其事而不能充禮故不責之以備禮也刑政仲弓問於孔子曰雍聞至刑無所用政至政無所用刑至刑無所用政桀紂之世是也至政無所用刑成康之世是也信乎孔子曰聖人之治化也必刑政相參焉太上以德教民而以禮齊之其次以政導民以刑禁之化之弗變導之弗從傷義敗俗於是乎用刑矣仲弓曰古之聽訟可得聞乎孔子曰凡聽五刑之訟必原父子之親立君臣之義以權之意論輕重之序慎測淺深之量以別之悉其聰明致其忠愛以盡之大司寇正刑明辟以察獄獄必三訊焉一曰訊群臣二曰訊群吏三曰訊萬民也有指無簡則不聽簡誠也有其意無其誠者不論以為罪附從輕赦從重附人之罪以輕為比赦人之罪以重為比疑獄則汎與眾共之眾疑赦之故爵人必於朝與眾共之也刑人必於市與眾棄之也古者公家不畜刑人大夫不養也士遇之塗弗與之言也屏諸四方唯其所之弗及以政弗欲生之故也仲弓曰聽獄獄之成成何官孔子曰獄成於吏吏以獄之成告於正吏獄官吏也正獄官長正既聽之乃告於大司寇大司寇聽之乃奏於王王命三公卿士參聽棘木之下外朝之法左九棘孤卿大夫位焉右九棘公侯伯子男位焉面三槐三公位焉然後乃以獄之成報於王王以三宥之法聽之君王尚寬罪雖已定猶三宥之不可得輕然後刑之也而後制刑焉所以重之也仲弓曰古之禁何禁孔子曰析言破律巧賣法令者也亂名改作變易官與物名執左道以亂政者殺左道邪道作淫聲淫逸惑亂之聲造異服非人所常見設奇伎奇器以盪上心者殺怪異之伎可以眩曜人心之器盪動也行偽而堅行詐偽而堅守言偽而辨學非而博順非而澤順其非而滑澤之以惑眾者殺假於鬼神時日卜筮以疑民者殺此四誅者不待時不以聽不聽於棘木之下也問玉子張問聖人之所以教孔子曰師乎吾語汝聖人明於禮樂舉而措之而已子張又問孔子曰師爾以為必布幾筵揖讓升降酌獻酬酢然後謂之禮乎爾以為必行綴兆執羽籥作鐘鼓然後謂之樂乎言而可履禮也行而可樂樂也聖人力此二者以恭已南面是故天下太平萬國順服百官承事上下有禮也夫禮之所興眾之所以治也禮之所廢眾之所以亂也昔者明王聖主之辨貴賤長幼正男女外內序親疏遠邇而莫敢相踰越者皆由此塗出也屈節宓子賤為單父宰恐魯君聽讒人使己不得行其政於是辭行也故請君之近史二人與之俱至官宓子戒其邑吏令二史書方書掣其肘書不善則從而怒之二史患焉辭請歸魯君以問孔子孔子曰宓不齊君子也意者其以此諫乎公寤大息而嘆曰此寡人之不肖也寡人亂宓子之政而責其善者數矣微二史則寡人無以知過微夫子則寡人無由寤遽使告宓子曰自今日以往單父非吾有也從子之制有便於民者子決為之五年一言其要宓子遂得行政於單父焉躬敦厚明親親尚篤敬施至仁加懇誠致忠信百姓化之正論定公問於孔子曰大夫皆勸寡人使隆敬於高年可乎孔子對曰君之及此言也將天下實賴之豈惟魯而已哉公曰何也孔子曰昔者有虞氏貴德而上齒夏后氏貴爵而上齒殷人貴富而上齒富謂世祿之家周人貴親而上齒虞夏殷周天下之盛王也未有遺年者焉年之貴於天下久矣次於事親是故朝廷同爵則上齒七十杖於朝君問則席君欲問之則為之設席八十不仕朝君問則就之而悌達於朝廷矣其行也肩而不並不敢與長者並肩也不錯則隨錯鴈行也父黨隨行兄黨鴈行見老者則車從避見老者在道車與步皆避之也斑白者不以其任行於路任擔也少者代之也而悌達於道路矣居鄉以齒而老窮不匱強不犯弱眾不暴寡而悌達於州巷矣古之道五十不為甸役五十始老不從力役之事不及山獵之徒也頒禽隆諸長者而悌達於蒐狩矣軍旅什伍同爵則上齒而悌達於軍旅矣夫聖王之教孝悌發諸朝廷行於道路至於州巷放於蒐狩修於軍旅則眾同以義死之而弗敢犯也公曰善哀公問於孔子曰寡人聞之東益不祥東益東益宅也信有之乎孔子曰不祥有五而東益不與焉夫損人而自益身之不祥也棄老而取幼家之不祥也釋賢而用不肖國之不祥也老者不教幼者不學俗之不祥也聖人伏匿愚者擅權天下不祥也故不祥有五而東益不與焉子夏問子夏問於孔子曰記云周公相成王教之以世子之禮有諸孔子曰昔者成王嗣立幼未能祚周公攝政而治抗世子之法於伯禽欲成王之知父子君臣之道所以善成王也夫知為人子者然後可以為人父知為人臣者然後可以為人君知事人者然後可以使人是故抗世子法於伯禽使之與成王居使成王知父子君臣長幼之義焉
