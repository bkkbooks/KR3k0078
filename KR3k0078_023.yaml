body:
  text: 後漢書二傳宋弘字仲子長安人也世祖嘗問弘通博之士弘薦沛國桓談才學洽聞幾能及揚雄劉向父子於是召談拜議郎給事中帝每宴輒令鼓琴好其繁聲弘聞之不悅悔於薦舉伺談內出正朝服坐府上遣吏召之談至不與席而讓之曰吾所以薦子者欲令輔國家以道德也而今數進鄭聲以亂雅頌非忠正者也能自改耶將令相舉以法乎談頓首辭謝良久乃遣之後大會群臣帝使談鼓琴談見弘失其常度帝怪而問之弘乃免冠謝曰臣所以薦桓談者望能以忠正導主而令朝廷耽悅鄭聲臣之罪也帝改容謝之使反服其後遂不復令談給事中弘推進賢士三十餘人或相及為公卿者弘當宴見御坐新施屏風圖畫列女帝數顧視之弘正容言曰未見好德如好色者帝即為徹之笑謂弘曰聞義則服可乎對曰陛下進德臣不勝其喜時帝姊湖陽公主新寡帝與共論朝臣微觀其意主曰宋公威容德器群臣莫及帝曰方且圖之後弘被引見帝令主坐屏風後因謂弘曰諺言貴易交富易妻人情乎弘曰臣聞貧賤之知不可忘糟粳之妻不下堂帝顧謂主曰事不諧矣韋彪字孟達扶風人也拜大鴻臚是時陳事者多言郡國貢舉率非功次故守職益懈而吏事寖疏咎在州郡彪上議曰孔子曰事親孝故忠可移於君是以求忠臣必於孝子之門夫人才行少能相兼是以孟公綽優於趙魏老不可以為滕薛大夫忠孝之人持心近厚鍛練之吏持心近薄三代之所以直道而行者在其所以磨之故也士宜以才行為先不可純以閥閲然其要歸在於選二千石二千石賢則貢舉皆得其人矣帝深納之彪以世承二帝吏治之後多以苛刻為能又置官選職不必以才上疏諫曰農民急於務而苛吏奪其時賦發充常調而貪吏割其財此其巨患也夫欲急民所務當先除其所患天下樞要在於尚書尚書之選豈可不重而間者多從郎官超升此位雖曉習文法長於應對然察察小惠類無大能宜簡嘗歷州宰素有名者雖進退舒遲時有不逮然端心向公奉職周密宜鑒嗇夫捷急之對深思絳侯木訥之功也往時楚獄大起故置令史以助郎職而類多小人好為姦利今者務簡可皆停省又諫議之職應用公直之士通才謇正有補益於朝者今或從徵試輩為大夫又御史外遷動據州郡並宜清選其任責以言績其二千石視事雖久而為吏民所便安者宜增秩重賞勿妄遷徙惟留聖心書奏帝納之杜林字伯山扶風人也為光祿勳建武十四年群臣上言古者肉刑嚴重則民畏法令今憲章輕薄故姦軌不勝宜增科禁以防其源詔下公卿林奏曰夫人情挫辱則義節之風損法防繁多則茍免之行興孔子曰導之以政齊之以刑民免而無恥導之以德齊之以禮有恥且格古之明王深識遠慮動居其厚不務多辟周之五刑不過三千大漢初興詳覽失得故破矩為圓斫雕為朴蠲除苛政更立疏網海內歡欣人懷寬德及至其後漸以滋章吹毛索疵詆欺無限果桃菜茹之饋集以成贓小事無妨於義以為大戮故國無廉士家無完行至於法不能禁令不能止上下相遁為弊彌深臣愚以為宜如舊制帝從之桓談字君山沛國人也拜議郎給事中因上疏陳時政所宜曰臣聞國家之廢興在於政事政事得失由乎輔佐輔佐賢明則俊士充朝而治合世務輔佐不明則論失時宜而舉多過事夫有國之君俱欲興化建善然而治道未理者其所謂賢者異也蓋善治者視俗而施教察失而立防威德更興文武迭用然後政調於時而躁人可定昔董仲舒言治國譬若琴瑟其不調者則解而更張夫更張難行而咈衆者亡是故賈誼以才逐而朝錯以智死世雖有殊能而終莫敢談者懼於前事也且設法禁者非能盡塞天下之姦皆合衆人之所欲也大抵取便國利事多者則可矣又見法令決事輕重不齊或一事殊法同罪異論姦吏得因緣為市所欲活則出生議所欲陷則與死此是為刑開二門也今可令通義理明習法律者校定科比一其法度班下郡國蠲除故條如此天下知方而獄無怨濫矣書奏不省是時帝方信讖多以決定嫌疑談復上疏曰今諸巧慧小才伎數之人增益圖書矯稱讖記以欺惑貪邪詿誤人主焉可不抑遠之哉其事雖有時合譬猶卜數隻偶之類陛下宜垂明聽發聖意屏群小之曲説述五經之正義略雷同之俗語詳通人之雅謀帝省奏愈不悅其後有詔會議靈臺所處帝謂談曰吾欲以讖決之何如談默然良久曰臣不讀讖帝問其故談復極言讖之非經帝大怒曰桓談非聖無法將下斬之談叩頭流血良久得解出為六安郡丞意忽忽不樂道病卒馮衍字敬通京兆人也更始二年遣尚書僕射鮑永行大將軍事安集北方乃以衍為立漢將軍與上黨太守田邑等繕甲養士捍衛并土及世祖即位遣宗正劉延攻天井關與田邑連戰十餘合後邑聞更始敗乃遣使詣洛陽獻璧馬即拜為上黨太守因遣使者招永衍永衍等疑不肯降而忿邑背前約衍乃遣邑書曰衍聞之委質為臣無有二心挈瓶之智守不假器是以晏嬰臨盟擬以曲戟不易其辭謝息守郕脅以晉魯不喪其邑由是言之內無鉤頸之禍外無桃萊之利而被畔人之聲蒙降城之恥竊為左右羞之時訛言更始隨赤眉在北地永衍信之故屯兵界休方移書上黨云皇帝在雍以惑百姓審知更始已歿乃共罷兵幅巾降於河內帝怨衍等不時至永以立功得贖罪遂任用之而衍獨見黜永謂衍曰昔高祖賞季布之罪誅丁固之功今明遭主亦何憂哉衍曰記有之人有挑其鄰之妻者挑其長者長者詈之挑其少者少者報之後其夫死而取其長者或謂之曰夫非爾者耶曰在人欲其報我在我欲其人也夫天命難知人道易守守道之臣何患死亡頃之帝以衍為曲陽令誅斬劇賊郭勝等降五千餘人論功當封以讒毀故賞不行建武六年日食衍上書陳八事其一曰顯文德二曰武烈三曰修舊功四曰招俊傑五曰明好惡六曰簡法令七曰差秩祿八曰撫邊境書奏帝將召見初衍為浪孟長以罪摧陷大姓令狐略是時略為司空長史讒之於尚書令王護尚書周生豐曰衍所以求見者欲毀君也護等懼之即共排間衍遂不得入後衛尉陰興新陽侯陰就以外戚貴顯深敬重衍衍遂與之交結由是為諸王所聘請尋為司隸從事帝懲西京外戚賓客故以法繩之大者抵死徙其餘至貶黜衍由此得罪嘗是詣獄有詔赦不問歸故郡閉門自保不敢復與親故通建武末上疏自陳曰臣伏念高祖之略而陳平之謀毀之則疏譽之則親以文帝之明而魏尚之忠繩之以法則為罪施之以德則為功逮至晚世董仲舒言道德見妒於公孫弘李廣奮節於胸奴見排於衛青此臣之常所為流涕也臣衍自惟微賤之臣上無無知之薦下無馮唐之説乏董生之才寡李廣之勢而欲免讒口濟怨嫌豈不難哉臣衍之先祖以忠貞之故成私門之禍而臣衍復遭擾攘之時值兵革之際不敢回行求世之利事君無傾邪之謀將帥無虜掠之心衛尉陰興敬慎周密內自修敕外遠嫌疑故與交通興知臣之貧數欲本業之臣自惟無三益之才不敢處三損之地固讓而不受之昔在更始大原執貨財之柄居倉卒之間據位食祿二十餘年而財産歲狹居處日貧家無布帛之積出無輿馬之飾於今遭清明之世敕躬力行之秋而怨讎叢興譏議橫世蓋富貴易為善貧賤難為工也疏遠隴畝之臣無望高闕之下惶恐自陳以救罪尤書奏猶以前過不用論曰馮衍之引挑妻之譬得矣夫納妻皆知取詈已者而取士則不能何也豈非反妒情易而恕義情難光武雖得之於鮑永猶失之於馮衍夫然義直所以見屈於既往守節故亦彌阻於來情嗚呼申屠剛字巨卿扶風人也遷尚書令世祖嘗欲出遊剛以隴蜀未平不宜晏安逸豫諫不見聽遂以頭軔乘輿輪帝遂為止時內外群官多帝自選舉加以法理嚴察職事過若尚書近臣至乃捶撲牽曳於前群臣莫敢正言剛每輒極諫又數言皇太子宜時就東宮簡任賢保以成其德鮑永字君長上黨人也父宣為王莽所殺事後母至孝妻嘗於母前叱狗而永即去之莽以宣不附已欲滅其子孫太守茍諫擁護召以為吏更始二年徵再遷尚書僕射行大將軍事持節將兵安集河東並州朔部世祖即位遣諫議大夫儲大伯持節徵永永乃收繫大伯遣使馳至長安既知更始已亡乃發喪出大伯等封上將軍列侯印綬悉罷兵但幅巾與諸將及同心客百餘人詣河內帝見永問曰卿衆所在永離席叩頭曰臣事更始不能令全誠慚以其衆幸富貴故悉罷之帝曰卿言大而意不悅為司隸校尉行縣到霸陵路經更始墓引車入陌從事諫止之永曰親北面事人寧有過墓不拜雖以獲罪司隸所不避也遂下拜哭盡哀而去西至扶風椎牛上諫冢帝聞之意不平問公卿曰奉使如此何如太中大夫張湛對曰仁者行之宗忠者義之主也仁不遺舊忠不忘君行之高者也帝意乃釋論曰鮑永守義於故主斯可以事新主矣恥以其衆受寵斯可以受大寵矣若乃言之者雖誠而聞之者未譬豈茍進之悅易以情納持正之忤難以理求乎誠能釋利以循道居方以從義君子之概也郅惲字君章汝南人也舉孝廉為上東城門候帝常出獵車駕夜還惲拒關不開帝令從者見面於門間惲曰火明遼遠遂不受詔帝乃回從東中門入明日惲上書諫曰陛下遠獵山林夜以繼晝其如社稷宗廟何暴虎馮河未至之誠誠小臣所竊憂也書奏賜布百匹貶東中門候為參封尉郭伋字細侯扶風人也王莽時為并州牧建武九年拜潁川太守十一年調為并州刺史引見宴語伋因言選補衆職當簡天下賢俊不宜專用南陽人帝納之伋前在并州素結恩德及後入界所到縣邑老幼相攜逢迎道路所過問民疾苦聘求耆德雄俊設几杖之禮朝夕與參政事始至行部到西河美稷有童兒數百各騎竹馬於道次迎拜伋問曰兒曹何自遠來對曰聞使君到喜故來奉迎伋辭謝之及事訖諸兒復送至郭外問使君何日當還伋計日告之既還先期一日伋為違信於諸兒遂止於野亭須期乃入樊宏字靡卿南陽人世祖之舅也宏為人謙柔畏慎不求茍進常戒其子曰富貴盈溢未有能終者吾非不喜榮勢也天道惡滿而好謙前代貴戚皆明戒也保身全已豈不樂哉宗族染其化未嘗犯法帝甚重之陰識字次伯南陽人光烈皇后之兄也以征伐軍功增封識叩頭讓曰天下初定將帥有功者衆臣託屬掖庭仍加爵邑不可以示天帝下甚美之興字君陵識弟也帝召興欲封之置印綏於前興固讓曰臣未有先登陷陳之功而一家數人並蒙爵土令天下觖望誠為盈溢臣蒙陛下貴人恩澤至厚富貴已極不可復加至誠不願帝嘉興之讓不奪其志貴人問其故興曰貴人不讀書記耶亢龍有悔外戚家苦不知謙退嫁女欲配侯王取婦眄睨公主愚心實不安也富貴有極人當知足夸奢益為觀聽所譏貴人感其言深自降挹卒不為宗族求位帝後復欲以興代吳漢為大司馬興叩頭流涕固讓曰臣不敢惜身誠虧損聖德不可茍冒至誠發中感動左右帝遂聽之朱浮字叔元沛國人也為幽州牧漁陽太守彭籠敗後世祖以二千石長吏多不勝任時有纖微之過者必見斥罷交易粉擾姓百不寧建武六年有蝕日之異浮因上疏曰臣聞日者衆陽之宗君上之位也凡居官治民據郡典縣皆為陽為上為尊為長若陽上不明尊長不足則干動三光垂示王者陛下哀愍海內新離禍毒保宥生民使得蘇息而今牧民之吏多未稱職小違治實輒見斥罷豈不粲然黑白分明哉然以堯舜之盛猶加三考大漢之興亦纍功效吏皆積久養老於官至名子孫因為氏姓當時吏職何能悉治論議之徒豈不喧譁蓋以為天地之功不可倉卒艱難之業當纍日也間者守宰數見換易迎新相代疲勞道路尋其視事日淺未足昭見其職既加嚴切人不自保各相顧望無自安之心有司或因睚眥以騁私怨茍求長短求媚上意二千石及長吏迫於舉劾懼於刺譏故爭飾詐偽以希虛譽斯皆群陽騷動日月失行之應夫物暴長者必夭折功卒成者必亟壞如摧長久之業而造速成之功非陛下之福也天下非一時之用也海內非一旦之功也願陛下遊意於經年之外望化於一世之後天下幸甚帝下其議群臣多同於浮自是牧守易代頗簡舊制州牧奏二千石長吏不任位者事皆先下三公三公遣掾史案驗然後黜退帝時用明察不復委任三府而權歸刺舉之吏浮復上疏曰陛下清明履約率禮無違自宗室諸王外家后親皆奉繩墨無黨勢之名斯固法令整齊下無作威者也求之於事宜以和平而災異猶見者而豈徒然哉天道信誠不可不察竊見陛下疾往者上威不行下專國命即位以來不用舊典信刺舉之官黜鼎輔之任至於有所劾奏便加退免覆案不關三府罪譴不蒙澄察陛下以使者為腹心而使者以從事為耳目是為尚書之平決於百石之吏故群下苛刻各自為能兼以私情容長憎愛在職皆競張空虛以要時利故有罪者心不厭服無咎者坐被空文不可經盛衰貽後王也夫事積久則吏自重吏安則民自靜傳曰五年再閏天道乃備夫以天地之靈猶五載以成其化況人道哉陳元字長孫蒼梧人也以父任為郎時大司農江馮上言宜令司隸校尉督察三府元上疏曰臣聞師臣者帝賓臣者霸故武王以大公為師齊桓以夷吾為仲父孔子曰百官總已聽於冢宰近則高帝優相國之禮大宗假宰轉之權及亡新王莽遭漢中衰專操國柄以偷天下況己自喻不信群臣奪公輔之任損宰相之威以刺舉為明徼訐為直至乃陪僕告其君長子弟變其父兄罔密法峻大臣無所措手足然不能禁董忠之謀身為世戮故人君患在自驕不患驕臣失在自任不在任人是以文王有日昃之勞周公執吐握之恭不聞其崇刺舉務督察也方今四方尚擾天下未一百姓觀聽咸張耳目陛下宜循文武之聖典襲祖宗之遺德勞心下士屆節待賢誠不宜使有伺察公輔之名帝從之桓榮字春卿沛郡人也以明經入授太子每朝會輒令榮於公卿前敷奏經書帝稱善曰得卿幾晚建武二十八年大會百官詔問誰善可傅太子者群臣承望上意皆言太子舅執金吾陰職可博士張佚正色曰今陛下立太子為陰氏乎為天下乎即為陰氏則陰侯可為天下則固宜用天下之賢才帝稱善曰欲置傅者以輔太子也今博士不難正朕況太子乎即拜佚為太子太傅而以榮為少傅賜以輜車乘馬第五倫字伯魚京兆人也舉孝廉帝問以政事大悅與語至夕帝謂倫曰聞卿為吏篣婦公不過從兄飯寧有之耶倫對曰臣三娶妻皆無父母少遭飢亂實不敢妄過人帝大笑拜會稽太守會稽俗多淫祀好卜筮人常以牛祭神百姓財産以之困匱其有自食牛肉而不以薦祠者發病且死先為牛鳴前後郡將莫敢禁倫到官移書屬縣曉告百姓其巫祝有依託鬼神詐怖愚民皆案驗之有妄屠牛者吏輒行罰民初恐懼或祝詛妄言倫案之愈急後遂斷絶百姓以安肅宗初為司空及馬防為車騎將軍當出征西羌倫上疏曰臣愚以為貴戚可封侯以富之不當職事以任之何者繩以法則傷恩私以親則違憲伏聞馬防今當西征臣以太后恩仁陛下至孝恐卒有纖介難為意愛也倫雖峭直然常疾俗吏苛刻及為三公值帝長者屢有善政乃上疏褒稱盛美因以勸成風德曰陛下即位躬天然之德體晏晏之姿以寬弘臨下出入四年前歲誅刺史二千石貪殘者六人斯皆明聖所鑒非群下所及然詔書每下寬和而政急不解務存節儉而奢侈不止者咎在俗弊群下不稱故也世祖承王莽之餘頗以嚴猛為治後世因之遂成風化郡國所舉類多辦職俗吏殊未有寬博之選以應上求者也陳留令劉豫冠軍令駟協並以刻薄之姿臨民宰邑專念掠殺務為嚴苦吏民愁怨莫不疾之而今之議者反以為能違天心失經義誠不可不慎也非徒應坐豫協亦當宜譴舉者務進仁賢以任時政不過數人則風俗自化矣臣嘗讀書記知秦以酷急亡國又目見王莽亦以苛法自滅故勤勤懇懇實在於此又聞諸王主貴戚驕者踰制京師尚然何以示遠故曰其身不正雖令不行以身教者從以言教者訟夫陰陽和歲乃豐君臣同心化乃成也其刺史太守以下拜除京師及道出洛陽者宜皆召見可因博問四方兼以觀察其人諸上書言事有不合者但可報歸田里不宜過加喜怒以明在寬也倫奉公盡節言事無所依違或問倫曰公有私乎對曰昔人有與吾千里馬者吾雖不受每三公有所選舉心不能忘而亦終不用也吾兄子常病一夜十往退而安寢吾子有疾雖不省視而竟夕不眠若是者豈謂無私乎鍾離意字子阿會稽人也顯宗即位徵為尚書時交址太守坐臧千金徵還伏法以資物簿入大司農詔班賜群臣意得珠璣悉以委地而不拜賜帝怪而問其故對曰臣聞孔子忍渴於盜泉之水曾參回車於勝母之閭惡其名也此臧穢之寶誠不敢拜帝嗟歎曰清乎尚書之言乃更以庫錢三十萬賜意轉為尚書僕射車駕數幸廣成苑意常當車陳諫般樂遊田之事天子即時還宮永平三年夏旱而大起北宮意詣闕免冠上疏曰伏見陛下以天時小旱憂念元元降避正殿躬自克責而比日密雲遂無大潤豈政有未得應天心者耶昔成湯遭旱以六事自責曰政不節耶使民疾耶宮室榮耶女謁盛耶苞苴行耶讒夫昌耶竊見北宮大作民失農時此所謂宮室榮也自古非苦宮室小狹但患民不安寧宜且罷止以應天心帝策詔報曰湯引六事咎在一人其冠履勿謝今又敕大匠止作諸宮減省不急庶消災譴詔因謝公卿百僚遂應時澍雨焉時詔賜降胡子縑尚書案事誤以十為百帝見簿大怒召郎將笞之意因入叩頭曰過誤之失常人所容若以懈慢為愆則臣位大罪重郎位小罪輕咎皆在臣臣當先坐乃解衣就格帝意解使復冠而貰郎帝性褊察好以耳目隱發為明故公卿大臣數被詆毀近臣尚書以下至見提拽常以事怒郎藥嵩以杖撞之嵩走入床下帝怒甚疾言曰郎出郎出嵩曰天子穆穆諸侯煌煌未聞人君自起撞郎帝乃赦之朝廷莫不悚栗爭為嚴切以避誅責唯意獨敢諫爭數封還詔書臣下過失輒救解之帝雖不能用然知其至誠亦以此故不得久留出為魯相後德陽殿成百官大會帝思意言謂公卿曰鍾離尚書若在此殿不立意卒遺言上書陳升平之世難以急治宜少寬假帝感傷其意下詔嗟歎賜錢二十萬宋均字叔庠南陽人也遷九江太守郡多虎暴數為民患常募設檻而猶多傷害均到下記屬縣曰夫虎豹在山黿鼉在水各有所託且江淮之有猛獸猶北土之有雞豚也今為人患咎在殘吏而勞勤張捕非憂恤之本也其務退姦貪思進忠善可一去檻除削課制其後傳言虎相與東遊渡江中元元年山陽楚沛多蝗其飛至九江界者輒東西散去由是名稱遠近浚遒縣有唐后二山民共祠之衆巫遂取百姓男女以為山嫗歲歲改易既而不敢嫁娶前後守令莫敢禁斷均乃下書曰自今以後為山娶者皆娶巫家勿擾良人於是遂絶徵拜尚書令嘗刪翦疑事帝以為有姦大怒收郎即縛格之諸尚書惶恐皆叩頭謝罪均顧厲色曰蓋忠臣執義無有二心若畏威失正均雖死不易志也小黃門在傍入具以聞帝善其不撓即令貰郎遷均司隸校尉寒朗字伯奇魯國人也守侍御史與三府掾屬共考案楚獄顏忠王平等辭連及隧鄉侯耿建朗陵侯臧信濩澤侯鄧鯉曲成侯劉建建等辭未嘗與忠平相見是時顯宗怒甚吏皆惶恐諸所連及率一切陷入無敢以情恕者朗心傷其冤試以建等物色獨問忠平而二人錯忤不能對朗知其詐乃上言建等無姦專為忠平所誣疑天下無辜類多如此帝乃召朗入問曰建等即如是忠平何故引之朗對曰忠平自知所犯不道故多有虛引冀以自明帝曰即如是四侯無事何不早奏而久繫至今耶朗對曰臣雖考之無事然恐海內別有發其姦者故未敢時上帝怒曰吏持兩端促提下左右方引去朗曰願一言而死小臣不敢欺欲助國耳誠冀陛下一覺悟而已臣見考囚在事者咸共言妖惡大故臣子所宜同疾今出之不如入之可無後責是以考一連十考十連百又公卿朝會陛下問以得失皆長跪言舊制大罪禍及九族陛下大恩裁止於身天下幸甚及其歸舍口雖不言而仰屋竊歎莫不知其多冤無敢忤陛下者臣今所陳誠死無悔帝意解詔遣朗出後二日車駕自幸洛陽獄録囚徒理出千餘人論曰左丘明有言仁人之言其利博哉晏子一言齊侯省刑若鍾離意之就格請過寒朗之廷爭冤獄篤矣乎仁者之情也東平王蒼顯宗同母弟也少好經書雅有智思顯宗甚愛重之及即位拜驃驛騎將軍位在三公上在朝數載多所隆益而自以至親輔政聲望日重意不自安數上疏乞上印綬退就藩國詔不聽其後數陳乞辭甚懇切乃許還國而不聽上將軍印綬加賜錢五千萬布十萬匹永平十一年蒼與諸王朝京師月餘還國帝臨送歸宮悽然懷思及遣使手詔告諸國中傅曰辭別之後獨坐不樂因就車歸伏軾而吟瞻望永懷實勞我心誦及採菽以增歎息日者問東平王處家何等最樂王言為善最樂其言甚大副是腰腹矣肅宗即位尊重恩禮踰於前世諸王莫與為比建初元年地震蒼上便宜後帝欲為原陵顯節陵起縣邑蒼聞之遽上疏諫帝從而止自是朝廷每有疑政輒驛使咨問蒼悉心以對皆見納用帝饗衛士於南宮因從皇太后周行掖庭池閣乃閲陰太后舊時器服愴然動容乃命留五時衣各一襲及常所御衣餘悉分布諸王主及子孫在京師者特賜蒼及琅邪王京書曰歲月騖過山陵浸遠孤心悽愴如何如何間饗衛士於南宮因閲視舊時衣物聞於師曰其物存其人亡不言哀而哀自至信矣惟王孝友之德亦豈不然今送光烈皇后假髻帛巾各一及衣一篋可時奉瞻以慰凱風寒泉之里又欲令後生子孫得見先后衣服之製願王寶精神加供養苦言至戒望之如渴建初六年冬請朝明年正月帝許之後有司奏遣諸王歸國帝特留蒼八月飲酎畢有司後奏遣乃許之手詔賜蒼曰骨肉天性誠不以遠近為親疏然數見顏色情重昔時念王久勞思得還休欲署大鴻臚奏不忍下筆顧授小黃門中心戀戀惻然不能言於是車駕祖送流涕而訣蒼薨後帝東巡守幸東平宮追感念蒼謂其諸子曰思其人至其鄉其處在其人亡因泣下沾襟遂幸蒼陵祠以大牢親拜祠坐哭泣盡哀賜御劍於陵前而去朱暉字文季南陽人也為尚書僕射是時穀貴縣官經用不足朝廷憂之尚書張林上言穀所以貴由錢賤故也可盡封錢一取布帛為租以通天下之用又鹽食之急者雖貴民不得不須官可自鬻又宜因交趾益州上計吏往來市珍寶收採其利武帝時所謂均輸者也帝然之有詔施行暉獨奏曰王制天子不言有無諸侯不言多少食祿之家不與百姓爭利今均輸之法與賈販無異鹽利歸官則下人窮怨布帛為租則吏多姦盜誠非明主所宜行也帝卒以林等言為然得暉重議因發怒切責諸尚書暉因稱病篤不肯復署議尚書令以下惶怖謂暉曰今臨得譴讓奈何稱疾其禍不細暉曰行年八十蒙恩得在機密當以死報若心知不可而順旨雷同負臣子之義今耳目無所聞見伏待死命遂閉口不言諸尚書不知所為乃劾效奏暉帝意解寢其事袁安字邵公汝南人也為司徒時和帝幼弱太后臨朝安以天子幼弱外戚擅權每朝會進見及與公卿言國家事未嘗不噫嗚流涕自天子及大臣皆倚賴之章和四年薨朝廷痛惜焉後數月竇氏敗帝始親萬機追思前議者邪正之節乃除安子賞為郎郭躬字仲孫潁川人也明法律有兄弟共殺人者而罪未有所歸帝以兄不訓弟故報兄重而減弟死中常侍孫章宣詔誤言兩報重尚書奏章矯制罪當腰斬帝復召躬問之躬對章應罰金帝曰章矯詔殺人何謂罰金躬曰法令有故誤章傳命之謬於事為誤誤者其文則輕帝曰章與囚同縣疑其故也躬曰周道如砥其直如矢君子不逆詐君王法天刑不可以委曲生意帝曰善遷躬廷尉正陳寵字昭公沛國人也章帝初為尚書是時承永平故事吏治尚嚴切尚書決事率近於重寵乃上疏曰臣聞先王之政賞不僭刑不濫與其不得已寧僭不濫陛下即位數詔群僚弘崇晏晏而有司執事猶尚深刻治獄者急於旁格酷烈之痛執憲者煩於詆欺放濫之文或因公行私逞縱威福夫為政猶張琴瑟大弦急者小弦絶故子貢非臧孫之猛法而美鄭喬之仁政詩云不剛不柔布政優優方今聖德充塞假於上下宜隆先王之道蕩滌煩苛之法輕薄箠楚以濟群生帝敬納寵言每事務於寬厚其後遂詔有司絶諸慘酷之科解妖惡之禁除文致之請讞五十餘事定著於令是後民俗和平屢有嘉瑞寵子忠字伯始擢拜尚書安帝始親朝事連有災異詔舉有道公卿百僚各上封事忠以詔書既開諫爭慮言事者必多激切或致不能容乃上疏豫通廣帝意曰臣聞仁君廣山藪之大納切直之謀忠臣盡謇諤之節不畏逆耳之害是以高祖舍周昌粲紂之譬孝文嘉爰盎人豕之譏世宗納東方朔宣室之正元帝容薛廣德自刎之切昔者晉平公問於叔向曰國家之患孰為大對曰大臣重祿不極諫小臣畏罪不敢言下情不上通此患之大者今明詔崇高宗之德推宋景之誠引咎克躬咨訪群吏言事者見杜根成翊世等新蒙表録顯列二臺必承風響應爭為切直若嘉謀異策宜輒納用如其管穴妄有譏刺雖苦口逆耳不得事實且優遊寬容以示聖朝無諱之美若有道之上對問高者宜垂省覽特遷一等以廣直言之路楊終字子山蜀郡人徵詣蘭臺拜校書郎建初元年大旱穀貴終以為廣陵楚淮陽濟南之獄徙者萬數又遠屯絶域吏民怨曠乃上疏曰臣聞善善及子孫惡惡止其身百王常典不易之道也秦政酷烈違忤天心一人有罪延及三族高祖平亂約法三章太宗至仁除去收孥萬姓廊然蒙被更生澤及昆蟲功垂萬世陛下聖明德被四表今以比年久旱災疫未息躬自菲薄廣訪得失三代之隆無以加焉臣竊案春秋水旱之變皆應暴急惠不下流自永平以來仍連大獄有司窮考轉相牽引掠治冤濫家屬徙邊加以北征胸奴西開三十六國又遠屯伊吾樓蘭車師戊已人懷土思怨結邊域昔殷民近遷洛邑且猶怨望何況去中土之肥饒寄不毛之荒極乎且南方暑溼障毒互生愁困之民足以感動天地移變陰陽矣惟陛下留念省察以濟元元孝元棄珠崖之郡光武絶西域之國不以介鱗易我衣裳今伊吾之役樓蘭之屯久而不還非天意也帝從之聽還徙者悉罷邊屯龐參字仲達河南人也順帝以為太尉是時三公之中參名忠直數為左右所陷以所舉用忤帝旨司隸承風案之時會茂才孝廉參以被奏稱疾不得會上計掾廣漢段恭因會上疏曰伏見道路行人農夫織婦皆曰太尉龐參竭忠盡節徒以直道不能曲心孤立群邪之間自處中傷之地臣猶冀在陛下之世當蒙安全而復以讒佞傷毀忠正此天地之大禁人主之至誡昔白起賜死諸侯酌酒相賀季子來歸魯人喜其紓難夫國以賢治君以忠安今天下咸欣陛下有此忠賢願卒寵任以安社稷書奏詔即遣小黃門視參疾太醫致羊酒復為太尉崔駰字亭伯涿郡人也竇太后臨朝竇憲以重戚出內詔命駰獻書戒之曰生而富者驕生而貴者傲生富貴而能不驕傲者未之有也今寵祿初隆百僚觀行當堯舜之盛世處光華之顯時豈可不庶幾夙夜以永終譽弘申伯之美致周邵之事乎語曰不患無位患所以立昔馮野王以外戚居位稱為賢臣近陰衛尉剋己復禮終受多福郯氏之宗非不尊也陽侯之族非不盛也重侯纍將建天樞執斗柄其所以獲譏於時垂衍於後者何也蓋在滿而不挹位有餘而仁不足也漢興以後迄于哀平外家二十保族全身四人而已書曰鑑於有殷可不慎哉夫謙德之光周易所美滿溢之位道家之所戒故君子福大而愈懼爵隆而益恭遠察近覽俯仰有則銘諸機杖刻諸槃杅矜矜業業無殆無荒如此則百福是荷慶流無窮矣及憲為車騎將軍辟駟為掾憲擅權驕恣駰數諫之及出擊胸奴道路愈多不法駰為主薄前後奏記數十指切長短憲不能容稍疏之因察駰高第出為長岑駰長自以遠去不得意遂不之官而歸卒於家
