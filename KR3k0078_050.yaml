body:
  text: 傅子傅子治國有二柄一曰賞二曰罰賞者政之大德也罰者政之大威也人所以畏天地者以其能生而殺之也為治審持二柄能使殺生不妄則其威德與天地並矣信順者天地之正道也詐逆者天地之邪路也民之所好莫甚於生所惡莫甚於死善治民者開其正道因所好而賞之則民樂其德也塞其邪路因所惡而罰之則民畏其威矣善賞者賞一善而天下之善皆勸善罰者罰一惡而天下之惡皆懼者何者賞公而罰不貳也有善雖疏賤必賞有惡雖貴近必誅可不謂公而不貳乎若賞一無功則天下飾詐矣罰一無罪則天下懷疑矣是以明德慎賞而不肯輕之明德慎罰而不肯忍之夫威德者相須而濟者也故獨任威刑而無德惠則民不樂生獨任德惠而無威刑則民不畏死民不樂生不可得而教也民不畏死不可得而制也有國立政能使其民可教可制者其唯威德足以相濟者乎賢者聖人所與共治天下者也故先王以舉賢為急舉賢之本莫大正身而壹其聽身不正聽不壹則賢者不至雖至不為之用矣古之明君簡天下之良財舉天下之賢人豈家至而戶閱之乎開至公之路秉至平之心執大象而致之亦云誠而已矣夫任誠天地可感而況於人乎傅說巖下之築夫也高宗引而相之呂尚屠釣之賤老也文武尊而宗之陳平項氏之亡臣也高祖以為腹心四君不以小疵忘大德三臣不以疏賤而自疑其建帝王之業不亦宜乎文王內舉周公旦天下不以為私其子外舉太公望天下稱其公周公誅弟而典刑立桓公任讎而齊國治茍其無私他人之與骨肉其於誅賞豈二法哉唯至公然後可以舉賢也夏禹有言知人則哲惟帝其難之因斯以談君莫賢於高祖臣莫奇於韓信高祖在巴漢困矣韓信去楚而亡窮矣夫以高祖之明困而思士信之奇材窮而願進其相遭也宜萬里響應不移景而相取矣然信歸漢歷時而不見知非徒不見知而已又將案法而誅之向不遇滕公則身不免於戮死不值蕭何則終不離於亡命幸而得存固水濱之餓夫市中之怯子又安得市人可驅而立乎天下之功也哉蕭何一言而不世之交合定傾之功立豈蕭何知人之明絕於高祖而韓信求進之意曲於蕭何乎尊卑之勢異而高下之處殊也高祖勢尊而處高故思進者難蕭何勢卑而處下故自納者易然則居尊高之位者其接人之道固難而在卑下之地者其相知之道固易矣昔人知居上取士之難故虛心而下聽知在下相接之易故因人以致人舜之舉咎陶難得咎陶致天下之士易湯之舉伊尹難得伊尹致天下之士易故舉一人而聽之者王道也舉二人而聽之者霸道也舉三人而聽之者僅存之道也聽一人何以王也任明而致信也聽二人何以霸也任術而設疑也聽三人何以僅存也從二而求一也明主任人之道專致人之道博任人道專故邪不得閒致人之道博故下無所壅任人之道不專則讒說起而異心生致人之道不博則殊塗塞而良材屈使舜未得咎陶湯未得伊尹而不求賢則上下不交而大業廢矣既得咎陶既得伊尹而又人人自用是代大匠斲也君臣易位勞神之道也今之人或抵掌而言稱古多賢患世無人退不自三省而坐誣一世豈不甚耶夫聖人者不世而出者也賢能之士何世無之何以知其然舜興而五臣顯武王興而九賢進齊桓之霸管仲為之謀秦孝之強商君佐之以法欲王則王佐至欲霸則霸臣出欲富國強兵則富國強兵之人往求無不得唱無不和是以天下之不乏賢也顧求與不求耳何憂天下之無人乎夫裁徑尺之帛刊方寸之木不任左右必求良工者裁帛刊木非左右之所能故也徑尺之帛方寸之木薄物也非良工不能裁之況帝王之佐經國之任可不審擇其人乎故構大廈者先擇匠然後簡材治國家者先擇佐然後定民大匠構屋必大材為棟梁小材為榱橑茍有所中尺寸之木無棄也非獨屋有棟梁國家亦然大德為宰相此國之棟梁也審其棟梁則經國之本立矣經國之本立則庶官無曠而天工時敘矣天下之害莫甚於女上之人不節其耳目之欲殫生民之巧以極天下之變一首之飾盈千金之價婢妾之服兼四海之珍縱欲者無窮用力者有盡用有盡之力逞無窮之欲此漢靈之所以失其民也上欲無節眾下肆情淫奓並興而百姓受其殃毒矣嘗見漢末一筆之柙雕以黃金飾以和璧綴以隨珠發以翠羽此筆非文犀之植必象齒之管豐狐之柱秋兔之翰用之者必被珠繡之衣踐雕玉之履由是推之其極靡不至矣然公卿大夫刻石為碑鐫石為虎碑虎崇偽陳於三衢妨功喪德異端並起眾邪之亂正若此豈不哀哉夫經國立功之道有二一曰息欲二曰明制欲息制明而天下定矣夫商賈者所以伸盈虛而獲天地之利通有無而壹四海之財其人可甚賤而其業不可廢蓋眾利之所充而積偽之所生不可不審察也古者民樸而化淳上少欲而下偽衣足以暖身食足以充口器足以給用居足以避風雨養以大道而民樂其生敦以大質而下無逸心日中為市民交易而退各得其所蓋化淳也暨周世殷盛承變極文而重為之防國有定制下供常事役賦有恆而業不廢君臣相與一體上下譬之形影官恕民忠而恩侔父子上不徵非常之物下不供非常之求君不索無用之寶民不鬻無用之貨自公侯至于皁隸僕妾尊卑殊禮貴賤異等萬機運於上百事動於下而六合晏如者分數定也夫神農正其綱先之以無欲而咸安其道周綜其目壹之以中典而民不越法及秦亂四民而廢常賤競逐末利而棄本業茍合壹切之風起矣於是士樹姦於朝賈窮偽於市臣挾邪以內其君子懷利以詐其父一人唱欲而億兆和上逞無厭之欲下充無極之求都有專市之賈邑有傾世之商商賈富乎公室農夫伏於隴畝而墮溝壑上愈增無常之好以徵下下窮死而不知所歸哀夫且末流濫溢而本源竭纖靡盈市而穀帛罄其勢然也古言非典義學士不以經心事非田桑農夫不以亂業器非時用工人不以措手物非世資商賈不以適市士思其訓農思其務工思其用賈思其常是以上用足而下不匱故壹野不如壹市壹市不如壹朝壹朝不如一用一用不如上息欲上息欲而下反真矣不息欲於上而欲於下之安靜此猶縱火焚林而索原野之不彫瘁難矣故明君止欲而寬下急商而緩農貴本而賤末朝無蔽賢之臣市無專利之賈國無擅山澤之民一臣蔽賢則上下之道壅商賈專利則四方之資困民擅山澤則兼并之路開兼并之路開而上以無常役下賦一物非民所生而請於商賈則民財暴賤民財暴賤而非常暴貴非常暴貴則本竭而末盈末盈本竭而國富民安未之有矣昔者聖人之崇仁也將以興天下之利也利或不興須仁以濟天下有不得其所若己推而委之於溝壑然夫仁者蓋推己以及人也故己所不欲無施於人推己所欲以及天下推己心孝於父母以及天下則天下之為人子者不失其事親之道矣推己心有樂於妻子以及天下則天下之為人父者不失其室家之歡矣推己之不忍於飢寒以及天下之心含生無凍餧之憂矣此三者非難見之理非難行之事唯不內推其心以恕乎人未之思耳夫何遠之有哉古之仁人推所好以訓天下而民莫不尚德推所惡以誡天下而民莫不知恥孔子曰仁遠乎哉我欲仁斯仁至矣此之謂也若子方惠及於老馬西巴不忍而放麑皆仁之端也推而廣之可以及乎遠矣蓋天地著信而四時不悖日月著信而昏明有常王者體信而萬國以安諸侯秉信而境內以和君子履信而厥身以立古之聖君賢佐將化世美俗去信須臾而能安上治民者未之有也夫象天則地履信思順以壹天下此王者之信也據法持正行以不貳此諸侯之信也言出乎口結乎心守以不移以立其身此君子之信也講信修義而人道定矣若君不信以御臣臣不信以奉君父不信以教子子不信以事父夫不信以遇婦婦不信以承夫則君臣相疑於朝父子相疑於家夫婦相疑於室矣小大混然而懷奸心上下紛然而競相欺人倫於是亡矣夫信由上而結者也故君以信訓其臣則臣以信忠其君父以信誨其子則子以信孝其父夫以信先其婦則婦以信順其夫上秉常以化下下服常而應上其不化者百未有一也夫為人上竭至誠開信以待下則懷信者歡然而樂進不信者赧然而回意矣老子不云乎信不足焉有不信也故以信待人不信思信不信待人信斯不信況本無信者乎先王欲下之信也故示之以款誠而民莫欺其上申之以禮教而民篤於義矣夫以上接下而以不信隨之是亦日夜見災也周幽以詭烽滅國齊襄以瓜時致殺非其顯乎故禍莫大於無信無信則不知所親不知所親則左右書己之所疑況天下乎信者亦疑不信亦疑則忠誠者喪心而結舌懷姦者飾邪以自納此無信之禍也傅子曰能以禮教興天下者其知大本之所立乎夫大本者與天地並存與人道俱設雖蔽天地不可以質文損益變也大本有三一曰君臣以立邦國二曰父子以定家室三曰夫婦以別內外三本者立則天下正三本不立則天下不可得而正天下不可得而正則有國有家者亟亡而立人之道廢矣禮之大本存乎三者可不謂之近乎用之而蔽天地可不謂之遠乎由近以知遠推己以況人此禮之情也商君始殘禮樂至乎始皇遂滅其制賊九族破五教獨任其威刑酷暴之政內去禮義之教外無列國之輔日縱桀紂之淫樂君臣競留意於刑書雖荷戟百萬石城造天威淩滄海胡越不動身死未收姦謀內發而太子已死於外矣胡亥不覺二年而滅曾無盡忠效節之臣以救其難豈非敬義不立和愛先亡之禍也哉禮義者先王之藩衛也秦廢禮義是去其藩衛也夫齎不訾之寶獨宿於野其為危敗甚於累卵方之於秦猶有泰山之安易曰上慢下暴盜思伐之其秦之謂與立善防惡謂之禮禁非立是謂之法法者所以正不法也明書禁令曰法誅殺威罰曰刑治世之民從善者多上立德而下服其化故先禮而後刑也亂世之民從善者少上不能以德化之故先刑而後禮也周書曰小乃不可不殺乃有大罪非終乃惟眚然則心惡者雖小必誅意善過誤雖大必赦此先王所以立刑法之本也禮法殊塗而同歸賞刑遞用而相濟矣是故聖帝明王惟刑之恤惟敬五刑以成三德若乃暴君昏主刑殘法酷作五虐之刑設炮烙之辟而天下之民無所措其手足矣故聖人傷之乃建三典殊其輕重以定厥中司寇行刑君為之不舉樂哀矜之心至也八辟議其故而宥之仁愛之情篤也柔愿之主聞先王之有哀矜仁愛議獄緩死也則妄輕其刑而赦元惡刑妄輕則威政墮而法易犯元惡赦則姦人興而善人困剛猛之主聞先王之以五刑萬民舜誅四凶而天下服也於是峻法酷刑以侮天下罪連三族戮及善民無辜而死者過半矣下民怨而思叛諸侯乘其弊而起萬乘之主死於人手者失其道也齊秦之君所以威制天下而或不能自保其身何也法峻而教不設也末儒見峻法之生叛則去法而純仁偏法見弱法之失政則去仁而法刑此法所以世輕世重而恆失其中也爵祿者國柄之本而貴富之所由不可以不重也然則爵非德不授祿非功不與二教既立則良士不敢以賤德受貴爵勞臣不敢以微功受重祿況無德無功而敢虛干爵祿之制乎然則先王之用爵祿不可謂輕矣夫爵者位之級而祿者官之實也級有等而稱其位實足利而周其官此立爵祿之分也爵祿之分定必明選其人而重用之德貴功多者受重爵大位厚祿尊官德淺功寡者受輕爵小位薄祿卑官厚足以衒宗黨薄足以代其耕居官奉職者坐而食於人既食於人不敢以私利經心既受祿於官而或營私利則公法繩之於上而顯議廢之於下是以仁讓之教存廉恥之化行貪鄙之路塞嗜欲之情滅百官各敬其職大臣論道於朝公議日興而私利日廢矣明君必順善制而後致治非善制之能獨治也必須良佐有以行之也故治其民而不省其事則事繁而職亂知省其職而不知節其吏厚其祿也則天下力既竭而上猶未供薄其祿也則吏競背公義營私利此教之所以必廢而不行也凡欲為治者無不欲其吏之清也不知所以致清而求其清此猶滑其源而望其流之潔也知所以致清則雖舉盜跖不敢為非不知所以致清則雖舉夷叔必犯其制矣夫授夷叔以事而薄其祿近不足以濟其身遠不足以及室家父母餓於前妻子餧於後不營則骨肉之道虧營之則奉公之制犯骨肉之道虧則怨毒之心生怨毒之心生則仁義之理衰矣使夷叔有父母存無以致養必不採薇於首陽顧公制而守死矣由此言之吏祿不重則夷叔必犯矣夫棄家門委身於公朝榮不足以庇宗人祿不足以濟家室骨肉怨於內交黨離於外仁孝之道虧名譽之利損能守志而不移者鮮矣主不詳察聞其怨興於內而交離於外薄其名必時黜其身矣家困而身黜不移之士不顧私門之怨不憚遠近之謫死而後已不改其行上不見信於君下不見明於俗遂委死溝壑而莫之能知也豈不悲夫天下知為清之若此則改行而從俗矣清者化而為濁善者變而陷於非若此而能以致治者未之聞也昔先王之興役賦所以安上濟下盡利用之宜是故隨時質文不過其節計民豐約而平均之使力足以供事財足以周用乃立壹定之制以為常典甸都有常分諸侯有常職焉萬國致其貢器用殊其物上不興非常之賦下不進非常之貢上下同心以奉常教民雖輸力致財而莫怨其上者所務公而制有常也戰國之際棄德任威競相吞代而天下之民困矣秦并海內遂滅先王之制行其暴政內造阿房之宮繼以驪山之役外築長城之限重以百越之戍賦過太半傾天下之財不足以盈其欲役及閭左竭天下之力不足以周其事於是蓄怨積憤同聲而起陳涉項梁之疇奮劍大呼而天下之民響應以從之驪山之基未閉而敵國已收其圖籍矣昔者東野畢御盡其馬之力而顏回知其必敗況御天下而可盡人之力也哉夫用人之力歲不過三日者謂治平無事之世故周之典制載焉若黃帝之時外有赤帝蚩尤之難內設舟車門衛甲兵之備六興大役再行天誅居無安處即天下之民亦不得不勞也勞而不怨用之至平也禹鑿龍門闢伊闢築九山滌百川過門不入薄飲食卑宮室以率先天下天下樂盡其力而不敢辭勞者儉而有節所趣公也故世有事即役煩而賦重世無事即役簡而賦輕役簡賦輕則奉上之禮宜崇國家之制宜備此周公所以定六典也役煩賦重即上宜損制以恤其下事宜從省以致其用此黃帝夏禹之所以成其功也後之為政思黃帝之至平夏禹之積儉周制之有常隨時益損而息耗之庶幾雖勞而不怨矣虎至猛也可畏而服鹿至麤也可教而使木至勁也可柔而屈石至堅也可消而用況人含五常之性有善可因有惡可改者乎人之所重莫重乎身貴教之道行士有伏節成義死而不顧者矣此先王因善教義因義而立禮者也因善教義故義成而教行因義立禮故禮設而義通若夫商韓孫吳知人性之貪得樂進而不知兼濟其善於是束之以法要之以功使下唯力是恃唯爭是務恃力務爭至有探湯赴火而忘其身者好利之心獨用也人懷好利之心則善端沒矣中國所以常制四夷者禮義之教行也失其所以教則同乎夷狄矣其所以同則同乎禽獸矣不唯同乎禽獸亂將甚焉何者禽獸保其性然者也人以智役力者也智役力而無教節是智巧日用而相殘無極也相殘無極亂孰大焉不濟其善而唯力是恃其不大亂幾稀耳人之性避害從利故利出於禮讓即脩禮讓利出於力爭則任力爭脩禮讓則上安下順而無侵奪任力爭則父子幾乎相危而況於悠悠者乎上好德則下脩行上好言則下飾辯脩行則仁義興焉飾辯則大偽起焉此必然之徵也德者難成而難見者也言者易撰而易悅者也先王知言之易而悅之者眾故不尚焉不尊賢尚德舉善以教而以一言之悅取人則天下之棄德飾辯以要其上者不矣何者德難為而言易飾也夫貪榮重利常人之性也上之所好榮利存焉故上好之下必趣之趣之不已雖死不避也先王知人有好善尚德之性而又貪榮而重利故貴其所尚而抑其所貪貴其所尚故禮讓興抑其所貪故廉恥存夫榮利者可抑而不可絕也故明為顯名高位豐祿厚賞使天下希而慕之不修行崇德則不得此名不居此位不食此祿不獲此賞此先王立教之大體也夫德修之難不積其實不成其名夫言撰之易合所悅而大用修之不久所悅無常故君子不貴也立德之本莫尚乎正心心正而後身正身正而後左右正左右正而後朝廷正朝廷正而後國家正國家正而後天下正故天下不正修之國家國家不正修之朝廷朝廷不正修之左右左右不正修之身身不正修之心所修彌近而所濟彌遠禹湯罪己其興也勃焉正心之謂也心者神明之主萬理之統動而不失正天地可感而況於人乎況於萬物乎夫有正心必有正德以正德臨民猶樹表望影不令而行大雅云儀形文王萬邦作孚此之謂也有邪心必有枉行以枉行臨民猶樹曲表而望其影之直若乃身坐廊廟之內意馳雲夢之野臨朝宰事情繫曲房之娛心與體離情與志乖形神且不相保孰左右之能正乎哉忠正仁理存乎心則萬品不失其倫矣禮度儀法存乎體則遠邇內外咸知所象矣古之大君子修身治人先正其心自得而已矣能自得則無不得矣茍自失則無不失矣無不得者治天下有餘故否則保身居正終年不失其和達則兼善天下物無不得其所無不失者營妻子不足故否則是己非人而禍逮乎其身達則縱情用物而殃及乎天下昔者有虞氏彈五絃之琴而天下樂其和者自得也秦始皇築長城之塞以為固禍機發於左右者自失也夫推心以及人而四海蒙其佑則文王其人也不推心慮用天下則左右不可保亡秦是也秦之虣君目玩傾城之色天下男女怨曠而不肯恤也耳淫亡國之聲天下小大哀怨而不知撫也意盈四海之外口窮天下之味宮室造天而起萬國為之瘁猶未足以逞其欲唯不推心以況人故視用人如用草芥使用人如用己惡有不得其性者乎古之達治者知心為萬事主動而無節則亂故先正其心其心正於內而後動靜不妄以率先天下而後天下履正而咸保其性也斯遠乎哉求之心而已矣夫能通天下之志者莫大乎至公能行至公者莫要乎無忌心唯至公故近者安焉遠者歸焉枉直取正而天下信之唯無忌心故進者自盡而退不懷疑其道泰然浸潤之譖不敢干也虞書曰闢四門則天下之人輻湊其庭矣明四目則天下之人樂為之視矣達四聰則天下之人樂為之聽矣江海所以能為百谷王者以其不逆之也茍有所逆眾流之不至者多矣眾流不至者多則無以成其深矣夫有公心必有公道有公道必有公制丹朱商均子也不肖堯舜黜之管叔蔡叔弟也為惡周公誅之茍不善雖子弟不赦則於天下無所私矣鯀亂政舜殛之禹聖明舉用之戮其父而授其子則於天下無所忌矣石厚子也石碏誅之冀缺讎也晉侯舉之是之謂公道未在人上天下皆樂為之用無遠無近茍所懷得達死命可致也唯患眾流異源清濁不同愛惡相攻而親疏黨別上之人或有所好所好之流獨進而所不好之流退矣通者一而塞者萬則公道廢而利道行矣於是天下之志塞而不通欲自納者因左右而達則權移左右而上勢分矣昧於利者知趣左右之必通必變業以求進矣昧利者變業而黨成正士守志而日否則雖見者盈庭而上之所開實寡外倦於人而內寡閒此自閉之道也故先王之教進賢者為上賞蔽賢者為上戮順禮者進逆法者誅設誹謗之木容狂狷之人任公而去私內恕而無忌是之謂公制也公道行則天下之志通公制立則私曲之情塞矣凡有血氣茍不相順皆有爭心隱而難分微而害深者莫甚於言矣君人者將和眾定民而殊其善惡以通天下之志者也聞言不可不審也聞言未審而以定善惡則是非有錯而飾辯巧言之流起矣故聽言不如觀事觀事不如觀行聽言必審其本觀事必校其實觀行必考其參三者而詳之近少失矣問曰漢之官制皆用秦法秦不二世而滅漢二十餘世而後亡者何也答曰其制則同用之則異秦任私而有忌心法峻而惡聞其失任私者怨有忌心則天下疑法峻則民不順之惡聞其失則過不上聞此秦之所以不二世而滅也漢初入秦約法三章論功定賞先封所憎約法三章公而簡也先封所憎無忌也雖網漏吞舟而百姓安之者能通天下之志得其略也世尚簡尊儒貴學政雖有失能容直臣簡則不茍寬則眾歸之尊儒貴學則民篤於義能容直臣則上之失不害於下而民之所患上聞矣自非聖人焉無失失而能改則所失少矣心以為是故言行由之其或不是不自知也先王患人之不自知其失而處尊者天下之命在焉順之則生逆之則死順而無節則諂諛進逆而畏死則直道屈明主患諛己者眾而無由聞失也故開敢諫之路納逆己之言茍所言出於忠誠雖事不盡是猶歡然之所通直言之塗引而致之非為名也以為直言不聞則己之耳目塞耳目塞於內諛者順之於外此三季所以至亡而不自知也周昌比高祖於桀紂而高祖託以愛子周亞夫申軍令而太宗為之不驅朱雲折檻辛慶忌叩頭流血斯乃寬簡之風漢所以歷年四百也天下之福莫大於無欲天下之禍莫大於不知足無欲則無求無求者所以成其儉也不知足則物莫能盈其欲矣莫能盈其欲則雖有天下所求無已所欲無極矣海內之物不益萬民之力有盡縱無已之求以滅不益之物逞無極之欲而役有盡之力此殷士所以倒戈於牧野秦民所以不期而周叛曲論之好奢而不足者豈非天下之大禍耶民富則安貧則危明主之治也分其業而壹其事業分則不相亂事壹則各盡其力而不相亂則民必安矣重親民之吏而不數遷重則樂其職不數遷則志不流於他官樂其職而志不流於他官則盡心恤其下盡心以恤其下則民必安矣附法以寬民者賞剋法以要名者誅寬民者賞則法不虧於下剋民者誅而名不亂於上則民必安矣量時而置官則吏省而民供吏省則精精則當才而不遺力民則供順供順則思義而不背上上愛其下下樂其上則民必安矣篤鄉閭之教則民存知相恤而亡知相救存相恤而亡相救則鄰居相恃懷土而無遷志鄰居相恃懷土無遷志則民必安矣度時宜而立制量民力以役賦役賦有常上無橫求則事事有儲而并兼之隙塞事有儲並兼之隙塞則民必安矣圖遠必驗之近興事必度之民知稼穡之艱難重用其民如保赤子則民必安矣職業無分事務不壹職荒事廢相督不已若是者民危親民之吏不重有資者無勞而數遷競營私以害公飾虛以求進仕宦如寄視用其民如用路人若是者民危以法寬民者不賞剋民為能者必進下力盡矣而用之不已若是者民危吏多而民不能供上下不相樂若是者民危鄉閭無教存不相恤而亡不相救若是者民危不度時而立制不量民而役賦無常橫求相仍弱窮迫不堪其命若是者民危視遠而忘近興事不度於民不知稼穡艱難而轉用之如是者民危安民而上危民危而上安者未之有也虞書曰安民則惠黎民懷之其為治之要乎今之刺史古之牧伯也今之郡縣古之諸侯也州總其統郡舉其綱縣理其目各職守不得相干治之經也夫彈枉正邪其不法擊一以警百者刺史之職也比物校成考定能否均其勞逸同其得失有大不可而後舉之者太守之職也親民授業平理百事猛以威吏寬以容民者令長之職也然則令長者最親民之吏百姓之命也國以民為本親民之吏不可以不留意也傅子曰利天下者天下亦利害天下者天下亦害之利則利害則害無有幽深隱微無不報也仁人在位常為天下所歸者無他也善為天下興利而已矣劉子問政傅子曰政在去私私不去則公道亡公道亡則禮教無所立禮教無所立則刑賞不用情賞刑不用情而下從之者未之有也夫去私者所以立公道也唯公然後可正天下傅子曰善為政者天地不能害也而況於人乎堯水湯旱而人無菜色猶太平也不亦美乎晉饑矣懈而為秦越禽人且害之而況於天地乎傅子曰秦始皇之無道豈不甚哉視殺人如殺狗彘狗彘仁人用之猶有節始皇之殺人觸情而已其不以道如是而李斯又深刑峻法隨其指而妄殺人秦不二世而滅李斯無遺類以不道遇人人得以不道報之人讎之天絕之行無道未有不亡者也或曰漢太宗除肉刑可謂仁乎傅子曰匹夫之仁非王天下之仁也夫王天下者大有濟者也非小不忍之謂也先王之制殺人者死故生者懼傷人者殘其體故終身懲所刑者寡而所濟者眾故天下稱仁焉今不忍殘人之體而忍殺之既不類傷人刑輕是失其所以懲也失其所以懲則易傷人人易相傷亂之漸也猶有不忍人心故曰匹夫之仁也傅子曰古之賢君樂聞其過故直言得至以補其闕古之忠臣不敢隱君之過故有過者知所以改其戒不改以死繼之不亦至直乎傅子曰至哉季文子之事君也使惡人不得行其境內況在其君之側乎推公心而行直道有臣若此其君稀陷乎不義矣傅子曰正道之不行常佞人亂之也故桀信其佞臣推役侈以殺其正臣關龍逢而夏以亡紂信其佞臣惡來以割其正臣王子比干之心而殷以亡曰惑佞之不可用如此何惑者之不息也傅子曰佞人善養人私欲也故多私欲者悅之唯聖人無私欲賢者能去私欲也有見人之私欲必以正道矯之者正人之徒也違正而從之者佞人之徒也自察其心斯知佞正之分矣或問佞孰為大傅子曰行足以服俗辨足以惑眾言必稱乎仁義隱其惡心而不可卒見伺主之欲微合之得其志敢以非道陷善人稱之有術飾之有利非聖人不能別此大佞也其次心不欲為仁義言亦必稱之行無大可非動不違乎俗合主所欲而不敢正也有害之者然後陷之最下佞者行不顧乎天下唯求主心使文巧辭自利而已顯然害善行之不怍若四凶可謂大佞者也若安昌侯張禹可謂次佞也若趙高石顯可謂最下佞者也大佞形隱為害深下佞形露為害淺形露猶不別之可謂至闇也已治人之謂治正己之謂正人不能自治故設法以一之身不正雖有明法即民或不從故必正己以先之也然即明法者所以齊眾也正己者所以率人也夫法設而民從之者得所故也法獨設而無主即不行有主而不一則勢分一則順分則爭此自然之理也天地至神不能同道而生萬物聖人至明不能一檢而治百姓故以異致同者天地之道也因物制宜者聖人之治也既得其道雖有詭常之變相害之物不傷乎治體矣水火之性相滅也善用之者陳釜鼎乎其閒爨之煮之而能兩盡其用不相害也五味以調百品以成天下之物為火水者多矣若施釜鼎乎其閒則何憂乎相害何患乎不盡其用也
