body:
  text: 體論體論人主之大患莫大乎好名人主好名則群臣知所要矣夫名所以名善者也善修而名自隨之非好之之所能得也茍好之甚則必偽行要名而姦臣以偽事應之一人而受其慶則舉天下應之矣君以偽化天下欲貞信敦朴誠難矣雖有至聰至達之主由無緣見其非而知其偽況庸主乎人主之高而處隩譬猶遊雲夢而迷惑當借左右以正東西者也左曰功巍巍矣右曰名赫赫乎今日聞斯論明日聞斯論茍不校之以事類則人主囂然自以為名齊乎堯舜而化洽乎泰平也群臣璅璅皆不足任也堯舜之臣宜獨斷者也不足任之臣當受成者也以獨斷之君與受成之臣帥訛偽之俗而天下治者未之有也夫聖人之修其身所以御群臣也御群臣也所以化萬民也其法輕而易守其禮簡而易持其求諸己也誠其化諸人也深茍非其人道不虛行茍非其道治不虛應是以古之聖君之於其臣也疾則視之無數死則臨其大斂小斂為徹膳不舉樂豈徒色取仁而實違之者哉乃慘怛之心出於自然形於顏色世未有不自然而能得人自然者也色取仁而實違之者謂之虛不以誠待其臣而望其臣以誠事己謂之愚虛愚之君未有能得人之死力者也故書稱君為元首臣為股肱期其一體相須而成也而儉偽淺薄之士有商鞅韓非申不害者專飾巧辨邪偽之術以熒惑諸侯著法術之書其言云尊君而卑臣上以尊君取容於人主下以卑臣得售其姦説此聽受之端參言之要不可不慎元首已尊矣而復云尊之是以君過乎頭也股肱已卑矣而復曰卑之是使其臣不及乎手足也君過乎頭而臣不及乎手足是離其體也君臣體離而望治化之洽未之前聞也且夫術家説又云明主之道當外御群臣內疑妻子其引證連類非不辨且悅也然不免於利口之覆國家也何以言之夫善進不善無由入不善進善亦無由入故湯舉伊尹而不仁者遠何畏乎歡兜何遷乎有苗夫姦臣賊子下愚不移之人自古及今未嘗不有也百歲一人是為繼踵千里一人是為比肩而舉以為戒是猶一噎而禁食也噎者雖少餓者必多未知姦臣賊子處之云何且令人主魁然獨立是無臣子也又誰為君父乎是猶髡其枝而欲根之蔭掩其目而欲視之明襲獨立之迹而願其扶疏也夫徇名好術之主又有惑焉皆曰為君之道凡事當密人主茍密則群臣無所容其巧而不敢怠於職此即趙高之教二世不當聽朝之類也是好乘高履危而笑先僵者也易曰機事不密則害成易稱機事不謂凡事也不謂宜共而獨之也不謂釋公而行私也人主欲以之匿病飾非而人臣反以之竊寵擅權疑似之間可不察歟夫設官分職君之體也委任責成君之體也好謀無倦君之體也寬以得衆君之體也含垢藏疾君之體也不動如山君之體也難知如淵君之體也君有君人之體其臣畏而愛之此文王所以戒百辟也夫何法術之有哉故善為政者務在於擇人而已及其求人也總其大略不具其小善則不失賢矣故曰記人之功忘人之過宜為君者也人有厚德無問其小節人有大譽無訾其小故自古及今未有能全其行者也和氏之璧不能無瑕隋侯之珠不能無纇然天下寶之者不以小故妨大美也不以小故妨大美故能成大功夫成大功在己而已何具之於人也今之從政者稱聖賢則先乎商韓言治道則師乎法術法術之御世有似鐵轡之御馬非必能制馬也適所以梏其手也人君之數至少而人臣之數至衆以至少御至衆其勢不勝也人主任術而欲御其臣無術其勢不禁也俱任術則至少者不便也故君使臣以禮則臣事君以忠晏平仲對齊景公君若棄禮則齊國五尺之童皆能勝嬰又能勝君所以服者以有禮也今末世棄禮任術之君之於其身也得無所不能勝五尺之童子乎三代之亡非其法亡也御法者非其人也茍得其人王良造父能以腐索御奔駟伊尹太公能以敗法御捍民茍非其人不由其道索雖堅馬必敗法雖明民必叛奈何乎萬乘之主釋人而任法哉且世未嘗無賢也求賢之務非其道故常不遇之也除去湯武聖人之君任賢之功近觀齊桓中才之主耳猶知勞於索人逸於任之不疑子糾之親不忘射鉤之怨蕩然而委政焉不已明乎九合諸侯一匡天下不已榮乎一曰仲父二曰仲父不已優乎孰與秦二世懸石程書愈密愈亂為之愈勤而天下愈叛至於弒死以斯二者觀之優劣之相懸存亡之相背不亦昭昭乎夫人生莫不欲安存而惡危亡莫不欲榮樂而惡勞辱也終恆不得其所欲而不免乎所惡者何誠失道也欲宮室之崇麗也必懸重賞而求良匠內不以阿親戚外不以遺疏遠必得其人然後授之故宮室崇麗而處之逸樂至於求其輔佐獨不若是之公也唯便辟親近者之用故圖國不如圖舍是人主之大患也使賢者為之與不肖者議之使智者慮之與愚者斷之使修士履之與邪人疑之此又人主之所患也夫賞賢使能則民知其方賞罰明必則民不偷兼聰齊明則天下歸之然後明分職序事業公道開而私門塞矣如此則忠公者進而佞悅者止虛偽者退而貞實者起自群臣以下至乎庶人莫不修己而後敢安其職業變心易慮反其端愨此之謂政化之極審斯論者明君之體畢矣凡人臣之於其君也猶四支之戴元首耳目之為心使也皆相須而成為體相得而後為治者也故虞書曰臣作股肱耳目而屠蒯亦云汝為君目將司明也汝為君耳將司聰也然則君人者安可以斯須無臣臣人者安可以斯須無君斯須無君斯須無臣是斯須無身也故臣之事君猶子之事父而加敬焉父子至親矣然其相須尚不及乎身之與手足也身之於手足可謂無間矣然而聖人猶復督而致之故其化益淳其恩益密自然不覺教化之移也姦人離而間之故使其臣自疑於下而令其君孤立乎上君臣相疑上下離心乃姦人之所以為劫殺之資也然夫中才之主明不及乎治化之原而感於偽術似是之説故備之愈密而姦人愈甚譬猶登高者愈懼愈危愈危愈墜孰如早去邪徑而就夫大道乎凡士之結髮束修立志於家門欲以事君也宗族稱孝焉鄉黨稱悌焉及志乎學自託於師友師貴其義而友安其信孝悌以篤信義又著以此立身以此事君何待乎法然後為安及其為人臣也稱才居位稱能受祿不面譽以求親不偷悅以茍合公家之利知無不為也上足以尊主安國下足以豐財阜民謀事不忘其君圖身不忘其國內匡其過外揚其義不下比以暗上不上同以病下見善行之如不及見賢舉之如不容內舉不避親戚外舉不避仇讎程功積事而不望其報進賢達能而不求其賞道塗不爭險易之利見難而無茍免之心其身可殺而其守不可奪此直道之臣所以佐賢明之主致治平之功者也若夫主明而臣暗主暗而臣偽有盡忠不見信有見信而不盡忠溷淆於臣主之分出入於治亂之間或被褐懷玉以待時或巧言令色以容身又可勝盡哉是以古之全其道者進則正退則曲正則與世樂其業曲則全身歸於道不傲世以華衆不立高以為名不為茍得以偷安不為茍免而無恥夫修之於鄉閭壞之於朝廷可惜也修之於己立壞之於闔棺可惜也君子惜茲二者是以有殺身以成仁無求生以害仁況害仁以求寵乎故孔子曰不義而富且貴於我如浮雲若夫智慮足以圖國忠貞足以悟主公平足以懷衆溫柔足以服人不排毀以取進不刻人以自入不茍容以隱忠不耽祿以傷高通則使上恤其下窮則教下順其上故用於上則民安行於下則君尊可謂進不失忠退不失行此正士之義為臣之體也凡趣舍之患在於見可欲而不慮其敗見可利而不慮其害故動近於危辱昔孫叔敖三相楚國而其心愈卑每益祿而其施愈博位滋高而其禮愈恭正考父傴僂而走晏平仲辭其賜邑此皆守滿以沖為臣之體也夫不憂主之不尊於天下而唯憂己之不富貴此古之所謂庸人而今之所謂顯士小人之所榮慕而君子之所以為恥也凡人臣之論所以事君者有四有賢主之臣有明主之臣有中主之臣有庸主之臣上能尊主下能一民物至能應事起能辨教化流於下如影響之應形聲此賢主之臣也內足以一民外足以拒難民親而士信之身之所長不以怫君身之所短不取功此明主之臣也君有過事能一心同力相與諫而正之以解國之大患成君之大榮此中主之臣也端殼而守法一心以事君君有過事雖不能正諫其憂見於顏色此庸主之臣也以庸主之臣也事賢主則從以賢主之臣事庸主則凶古之所以成其名者皆度主而行者也修之在己而遭遇有時是以古人抱麟而泣也夫名不可以虛偽取也不可以比周爭也故君子務修諸內而讓之於外務積於身而處之以不足夫為人臣其猶土乎萬物載焉而不辭其重水瀆污焉而不辭其下草木殖焉而不有其功此成功而不處為臣之體也若夫處大位任大事荷重權於萬乘之國必無後患者其上莫如推賢讓能而安隨其後不為管仲即為鮑叔耳其次莫如廣樹而並進之不為魏成子即為翟黃耳安有壅君蔽主專權之害哉此事君之道為臣之體也夫行也者舉趾所由之徑路也東西南北之趣舍也君子小人之分界也吉凶榮辱之皂白也由南則失北也由東則失西矣由乎利則失為君子由乎義則失為小人吉凶榮辱之所由生義利為之本母也是以君子慎趣舍焉夫君子直道以耦世小人枉行以取容君子掩人之過以長善小人毀人之善以為功君子寬賢容衆以為道小人徼訐懷詐以為智君子下學而無常師小人恥學而羞不能此又君子小人之分界也君子心有所定計有所守智不務多務行其所知行不務多務審其所由安之若性行之如不及小人則不然心不在乎道義之經口不吐乎訓誥之言不擇賢以託身不力行以自定隨轉如流不知所執此又君子小人之分界也君子之養其心莫善於誠夫誠君子所以懷萬物也天不言而人推高焉地不言而人推厚焉四時不言而人期焉此以至誠者也誠者天地之大定而君子之所守也天地有紀矣不誠則不能化育君臣有義矣不誠則不能相臨父子有禮矣不誠則疏夫婦有恩矣不誠則離交接有分矣不誠則絶以義應當曲得其情其唯誠乎孔子曰為政以德又曰導之以德齊之以禮有恥且格然則德之為政大矣而禮次之也夫德禮也者其導民之具歟太上養化使民日遷善而不知其所以然此治之上也其次使民交讓處勞而不怨此治之次也其下正法使民利賞而歡善畏刑而不敢為非此治之下也夫善御民者其猶御馬乎正其銜勒齊其轡策均馬力和馬心故能不勞而極千里善御民者一其德禮正其百官齊民力和民心是故令不再而民從刑不用而天下化治所貴聖人者非貴其隨罪而作刑也貴其隨亂之所生也是以至人之為治也民有小罪必求其善以赦其過民有大罪必原其故以仁輔化是故上下親而不離道化流而不薀夫君子欲政之速行莫如以道御之也皋繇瘖而為大理有不貴乎言也師曠盲而為太宰有不貴乎見也唯神化之為貴是故聖王冕而前旒所以蔽明黈纊充耳所以掩聰也觀夫弊俗偷薄之政耳目以效聰明設倚伏以探民情是為以軍政虜其民也而望民之信向之可謂不識乎分者矣難哉為君也夫君尊嚴而威高遠而危民者卑賤而恭愚弱而神惡之則國亡愛之則國存御民者必明此要故南面而臨官不敢以其富貴驕人有諸中而能圖外取諸身而能暢遠觀一物而貫乎萬者以身為本也夫欲知天之終始也今日是也欲知千萬之情一人情是也故為政者不可以不知民之情知民然後民乃從令己所不欲不施之於人令安得不從乎故善政者簡而易行則民不變法存身而民象之則民不怨近臣便嬖百官因之而後達則群臣自污也是以為政者必慎擇其左右左右正則人主正矣人主正則夫號令安得曲耶天下大惡有五而盜竊不豫焉一曰心達而性險二曰行僻而志堅三曰言偽而辭辨四曰記醜而喻博五曰循非而言澤此五者有一於人則不可以不誅況兼而有之置之左右訪之以事而人主能立其身者未之有也夫淫逸盜竊百姓之所惡也我從而刑之殘之刻剝之雖過乎當百姓不以為暴者公也怨曠飢寒亦百姓之所惡也遁而陷於法我從而寬宥之雖及于刑必加隱惻焉百姓不以我為偏者公也我之所重百姓之所憎也我之所輕百姓之所憐也是故賞約而勸善刑省而禁姦由此言之公之於法無不可也過輕亦可過重亦可私之於法無可也過輕則縱姦過重則傷善今之為法者不平公私之分而辨輕重之文不本百姓之心而謹奏當之書是治化在身而走求之也聖人之於法也已公矣然猶身懼其未也故曰與其害善寧其利淫知刑當之難必也從而救之以化此上古之所務也後之治獄者則不然未訊罪人則驅而致之意謂之能下不探獄之所由生為之分而上求人主之微旨以為制謂之忠其當官也能其事上也忠則名利隨而與之驅世而陷此以望道化之隆亦不幾矣凡聽訟決獄必原父子之親立君臣之義權輕重之敘測淺深之量悉其聰明致其忠愛然後察之疑則與衆共之衆疑則從輕者所以重之也非為法不具也以為法不獨立當須賢明共聽斷之也故舜命皋繇曰汝作士惟刑之恤又復加之以三誶衆所謂善然後斷之是以為法參之人情也故春秋傳曰小大之獄雖不能察必以情而世俗拘愚苛刻之吏以為情也者取貨賂者也立愛憎者也祐親戚者也陷怨讎者也何世俗小吏之情與夫古人之懸遠乎無乃風化使之然邪有司以此情疑之群吏人主以此情疑之有司是君臣上下不通相疑也不通相疑欲其盡忠立節亦難矣茍非忠節免而無恥免而無恥以民安所厝其手足乎春秋之時王道浸壞教化不行子産相鄭而鑄刑書偷薄之政自此始矣逮至戰國韓任申子秦用商鞅連相坐之法造參夷之誅至於始皇兼吞六國遂滅禮義之官專任刑罰而姦邪並生天下叛之高祖約法三章而天下大悅及孝文即位躬修玄默議論務在寬厚天下化之有刑厝之風至於孝武徵發煩數百姓虛耗窮民犯法酷吏擊斷姦宄不勝於是張湯趙禹之屬條定法令轉相比況禁固積密文書盈於機格典者不能姦吏因緣為市議者咸怨傷之凡治獄之情必本所犯之事以為之主不放訊不旁求不貴多端以見聰明也故律正其舉效之法參伍其辭以求實也非所以飾實也但當參伍聰明之耳目不使獄吏斷練飾法成辭於手也孔子曰古之聽獄求所以生之也今之聽獄求所以殺之也故斥言以破律詆案以成法執左道以亂政皆王誅之所必加也夫聽察者乃存亡之門戶安危之機要也若人主聽察不博偏受所信則謀有所漏不盡良策若博其觀聽納受無方考察不精則數有所亂矣人主以獨聽之聰考察成敗之數利害之説雜而並至以干窺聽如此誠至精之難在於人主耳不在竭誠納謀盡己之策者也若人主聽察不差納受不謬則計濟事全利倍功大治隆而國富民強而敵滅矣若過聽不精納受不審則計困事敗利喪功虧國貧而兵弱治亂而勢危矣聽察之所考不可不精不可不審者如此急也凡有國之主不可謂舉國無深謀之臣闔朝無智策之士也在聽策所考精與不精審與不審耳何以驗其然乎在昔漢祖者聰聽之主也納陳恢之謀則下南陽不用婁敬之計則困平城廣武君者策謀之士也韓信納其計則燕齊舉陳餘不用其謀則泜水敗由此觀之漢祖之德未必一暗一聰也在於精與不精耳廣武之謀非為一拙一工也在用與不用耳不可謂事濟者有計策之士覆敗者無深謀之臣也吳王夫差拒子胥之謀納宰嚭之説國滅身亡者不可謂無深謀之臣也楚懷王拒屈原之計納靳尚之策沒秦而不反者不可謂無計畫之士也虞公不用宮奇之謀滅於晉仇由不聽赤章之言亡於智氏蹇叔之哭不能濟崤澠之覆趙括之母不能救長平之敗此皆人主之聽不精不審耳由此觀之天下之國莫不皆有忠臣謀士也或喪師敗軍危身亡國者誠在人主之聽不精不審取忠臣謀博士將何國無之乎臣以為忠良慮治益國之臣必竭誠納謀懇惻而不隱者欲以究盡治亂之數舒展安危之策耳故準聖主明君莫不皆有獻可退否納忠之臣也昔者帝舜大聖之君也猶有咎繇獻謨夏禹納戒暨至殷之成湯周之文武皆亦至聖之君也然必俟伊尹為輔呂尚為師然後乃能興功濟業混一天下者誠視聽之聰察須忠良為耳目也由此觀之忠良慮治益國之臣者得不師蹤往古襲前聖投命自盡以輔佐視聽乎夫人君者以至尊之聰聽總萬機而賢之以至貴之明察料治亂而考焉將當能皆窮究其孔要料盡其門戶乎其數必用有所遺漏不有忠臣良謀輔佐視聽者則凡百機微有所不聞矣何以論其然乎夫人君所以尊異於人者順志養真也歡康之虞則嚴樂盈耳玩好足目美色充欲麗服適體遠眺回望則登雲表之崇臺逍遙容豫則歷飛閣之高觀嬉乎緑水之清池遊乎桂林之芳園弋鳧與鴈從禽逐獸行與毛嬙俱入與西施處將當何從體覺窮愁之戚悴識鰥獨之難堪乎食則膳鼎幾俎庶羞兼品酸甘盈備珍饌充庭奏樂而進鳴鐘而徹間饋代至口不絶味將當何從覺飢餒之厄艱識困餓之難堪乎暑則被霧縠襲纖絺處華屋之大廈居重蔭之玄堂褰羅帷以來清風烈凝冰以遏微暑侍者御粉扇典衣易輕裳飄飄焉有秋日之涼將當何從體覺炎夏之鬱赫識毒熱之難堪乎寒則服綿袍襲輕裘綿衾貂蓐疊茵纍席居隩密之深室處復帟之重幄熾猛炭於室隅以起溫御玉卮之旨酒以禦寒焰焰焉有夏日之熱將當何從體覺隆冬之慘烈識毒寒之難堪乎此數者誠無從得而知之者也凡百機微如此比類者必用遺漏有所未詳也如此則至忠之臣者得不輔佐視聽以起寤遺忘乎典語爵祿賞罰人主之威柄帝王之所以為尊者也故爵祿不可不重重之則居之者貴輕之則處之者賤居之者貴則君子慕義取之者賤則小人覬覦君子慕義治道之兆小人覬覦亂政之漸也易曰聖人之大寶曰位何以守位曰人故先王重於爵位慎於官人制爵必俟有德班祿必施有功是以見其爵者昭其德聞其祿者知其功然猶誡以威罰勸以黜陟顯以錫命耀以車服故朝無曠官之譏士無尸祿之責矣夫無功而受祿君子猶不可況小人乎孔子所以恥稟丘之封而惡季氏之富也故曰富與貴是人之所欲不以其道得之不處茍得其志執鞭可為茍非其道卿相猶避明君不可以虛授人臣亦不可以茍受也書曰天工人其代之是以聖帝明王重器與名尤慎官人故周申伯吉甫著誦祈父失職詩人作刺王商為宰單于震畏千秋登相胸奴輕漢推此言之官人封爵不可不慎也官得其人方類相求雖在下位士以為榮也俗以貨成位失其守雖則三公士以為辱也故王陽在位貢公彈冠王許並立班伯恥之天子據率土之資總三才之任以制御六合統理群生固未易為也是以聖帝明王憂勞待旦勤於日昃未有不汲汲於求賢勤勤於遠惡者也故大舜招二八於唐朝投四凶於荒裔殛鯀不嫌登禹親仁也舉子不為宥父遠惡也以能昭德立化為百王之命也夫世之治亂國之安危非由他也俊乂在官則治道清姦佞干政則禍亂作故王者任人不可不慎也得人之道蓋在於敬賢而誅惡也敬一賢則衆賢悅誅一惡則衆惡懼昔魯誅少正佞人變行燕禮郭隗群士嚮至此非其效與然人主處於深宮之中生於禁闥之內眼不親見臣下之得失耳不親聞賢愚之否臧焉知臣下誰忠誰否誰是誰非須當留意隱括聽言觀行驗之以實效之以事能推事效實則賢愚明而治道清矣王者所以稱天子者以其號令政治法天而行故也夫天之育萬物也耀之以日月紀之以星辰運之以陰陽成之以寒暑震之以雷霆潤之以雲雨天不親事而萬事歸功者以所任者得其宜也然握璿璣御七辰調四時制五行此蓋天子之所為任者也孔子曰唯天為大唯堯則之帝王之盛莫過虞昔帝堯之末洪水有滔天之災蒸民有昏墊之憂於是咨嗟四嶽舉及側陋虞舜既登百揆時敘二八龍騰並幹唐朝故能揚嚴億載冠德百王舜既受終並簡俊德咸列庶官從容垂拱身無一勞而庶事歸功光炎百世者所任得其人也天子所以立公卿大夫列士之官者非但欲備員數設虛位而已也以天下至廣庶事總猥非一人之身所能周理故分官別職各守其位事有大小故官有尊卑人有優劣故爵有等級三公者帝王之所杖也自非天下之俊德當世之良材即不得而處其任處其任者必荷其責在其任者必知所職夫匡輔社稷佐日揚光協齊七政宣化四方此三公之職籩豆之事則有司存大臣不親細事猶周鼎不調小味也故書曰元首叢莝哉股肱惰哉庶事墮哉此之謂也陳平曰宰相者上佐天子下理陰陽外無四夷諸侯內親附百姓使卿大夫各得其任其職也可謂知其任者也天下至廣萬機至繁人主以一人之身處重仞之內而御至廣之士聽至繁之政安知萬國之聲息民俗之動靜乎故古之聖帝立輔弼之臣列官司之守勸之以爵賞誡之以刑罰故明誡以效其功考績以核其能德高者位尊才優者位重人主總君謨以觀衆智杖忠賢而布政化明耳目以來風聲進直言以求得失夫如是雖廣必周雖繁必理何則御之有此具也夫君稱元首臣云股肱明大臣與人主一體者也堯明俊德守位以人所以強四支而輔體也其為己用豈細也哉茍非其選器不虛假茍得其人委之無疑君之任臣如身之信手臣之事君亦宜如手之繫身安則共樂痛則同憂其上下協心以治世事不俟命而自勤不求容而自親何則相信之忠著也是以天子改容於大臣所以重之也人臣盡命於君上所以報德也寵之以爵級而天下莫不尊其位任之以重器天下莫不敬其人顯之以車服天下莫不瞻其榮者以其荷光景於辰耀登階於天路也若此之人進退必足以動天地而應列宿也故選不可以不精任之不可以不信進不可以不禮退之不可以權辱昔賈生常陳階級而文帝加重大臣每賢其遺言博引古今文辭雅偉真君人之至道王臣之碩謨也夫料才核能治世之要也凡人之才用有所周能有偏達自非聖人誰兼資百行備貫衆理乎故明君聖主裁而用焉昔舜命群司隨才守位漢述功臣三傑異稱況非此儔而可備責乎且造父善御師曠知音皆古之至奇也使其探事易伎則彼此俱屈何則才有偏達也人之才能率皆此類不可不料也若任得其才才堪其任而國不治者未之有也或有用士而不能以治者既任之不盡其才不核其能故功難成而世不治也馬無輦重之任牛無千里之違其本性責其效事豈可得哉使韓信下帷仲舒當戎于公馳説陸賈聽訟必無曩時之勳而顯今日之名也何則素非才之所長也推此論之何可不料哉政有宜於古而不利於今有長於彼而不行於此者風移俗易每世則變故結繩之治五帝不行三代損益政法不同隨時改制所以救弊也易曰隨時之義大矣哉孔子曰不教民戰是謂棄之司馬法曰國雖大好戰必亡天下雖安忘戰必危明用武有時昔秦杖威用武卒成王業吞滅六國帝有天下而不斟酌唐虞以美其治損益三代以御其世爾乃廢先聖之教任殘酷之政阻兵行威暴虐海內故百姓怨毒雄桀奮起至於二世社稷湮滅非武不能取而所守之者非也傳曰夫兵猶火也不戢將自焚秦無戢兵之慮故有自焚之禍好戰必亡此之謂也徐偃王好行仁義不修武備楚人伐之身死國滅天下雖安武不可廢況以區區之徐處爭戰之世乎忘戰必危此之謂也漢高帝發迹泗水龍起豐沛仁以懷遠武以弭難任奇納策遂掃秦項被以惠澤飾以文德文武並作祚流世長此高帝之舉也秦漢俱杖兵用武以取天下漢何以昌秦何以亡秦知取而不知守漢取守之具備矣乎中世孝武以成功恢帝綱元成以儒術失皇綱德不堪也王莽之世內尚文章外繕師旅立明堂之制修辟雍之禮招集儒學思遵古道文武之事備矣然而命絶於漸臺支解於漢刃者豈文武之不能治世哉而用之者拙也班輸騁功於利器拙夫操刀而傷手非利器有害於工匠而夫膏粱旨饌時或生疾針艾藥石時或瘳疾故體病則攻之以針艾疾瘳則養之以膏粱文武之道亦猶是矣世亂則威之以師旅道治則被之以文德天生蒸民授之以君所以綜理四海收養品庶也王者據天位御萬國臨兆民之衆有率土之資此所以尊者也然宮室壯觀出於民力器服珍玩生於民財千乘萬騎由於民衆無此三者則天子魁然獨在無所為尊者也明主智君階民以為尊國須政而後治其恤民也憂勞待旦日側忘恕己及下務在博愛臨御華殿軒檻華美則欲民皆有容身之宅廬室之居窈窕盈堂美女侍側則欲民皆有配匹之偶室家之好肥肉淳酒珠膳玉食則欲民皆有餘糧之資充飢之飴輕裘纍暖衣裳重則欲民皆有溫身之服禦寒之備凡四者生民之本性人情所共有故明主樂之於上亦欲士女歡之於下是以仁惠廣洽家安厥所臨軍則士忘其死御政則民戴其化此先王之所以豐動祚享長期者也若居無庇首之廬家無配匹之偶口無充飢之食身無蔽形之衣婚姻無以致娉死葬無以相恤飢寒入於腸骨悲愁出於肝心雖百舜不能杜其怨聲千堯不能成其治是以明主御世恤民養士恕下以身自近及遠化通宇宙丕懼民之不安故能康厥世治播其德教焉
