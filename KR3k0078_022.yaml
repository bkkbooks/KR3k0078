body:
  text: 後漢書一本紀世祖光武皇帝諱秀字文叔南陽人高祖九世孫也更始元年遣世祖行大司馬事北渡河鎮慰州郡進至邯鄲故趙繆王子林以卜者王郎為天子都邯鄲二年進圍邯鄲拔其城誅王郎收文書得吏民與郎交關謗毀者數千章世祖為不省會諸將燒之曰令反側子自安更始立世祖為蕭王世祖擊銅馬高湖重連悉破降之封其渠帥為列侯降者猶不自安世祖敕令各歸營勒兵乃自乘輕騎案行部陳降者更相語曰蕭王推赤心置人腹中安得不投死乎由是皆服即皇帝位封功臣皆為列侯大國四縣餘各有差博士丁恭等議曰古帝王封諸侯不過百里強幹弱枝所以為治也今封諸將四縣不合法制帝曰古之亡國者皆以無道未嘗聞封功臣地多而滅亡者也乃遣謁者即授印綬建武十三年詔曰往年已敕郡國異味不得有所獻御今猶未止非徒有豫養導擇之勞至乃煩擾道上疲費過所其令大官勿復受明敕宣下若遠方口實可以薦宗廟自如舊制時兵革既息天下少事文書調役務從簡寡至乃十存一焉十七年幸章陵修園廟祠舊宅觀田廬置酒作樂賞賜焉時宗室諸母因酣悅相與語曰文叔少時謹信與人不款曲唯直柔耳今乃能如此帝聞之大笑曰吾治天下亦欲以柔道行之二十一年鄯善王車師王等十六國遣子入侍願請都護帝以中國初定未遑外事乃還其侍子厚加賞賜中元二年帝崩遺詔曰朕無益百姓皆如孝文皇帝制度務從約省初帝在兵間久厭武事且知天下疲耗思樂息肩自隴蜀平後非警急未嘗復言軍旅皇太子嘗問攻戰之事帝曰昔衛靈公問陳孔子不對此非爾所及也每旦視朝日晏乃罷數引公卿郎將講經論治夜分乃寐皇太子見帝勤勞不怠承間諫曰陛下有禹湯之明而失黃老養生之福願頤養精神優遊自寧帝曰我自樂此不為疲也雖身濟大業兢兢如不及故能明慎政體總攬權綱量時度力舉無過事退功臣而進文吏戢弓矢而散馬牛雖道未方古斯亦止戈之武焉孝明皇帝諱莊世祖第四子也永平二年春宗祀光武皇帝於明堂禮畢登靈臺詔曰朕以暗陋奉承大業親執圭璧恭祀天地仰惟先帝受命中興撥亂反正以寧天下封泰山建明堂立辟雍起靈臺恢弘大道被之八極而胤子無成康之質群臣無呂旦之謀盥洗進爵踧踖惟慚其令天下自殊死以下謀反大逆皆赦除之冬幸辟雍初行養老禮詔曰三老李躬年耆學明五更桓榮授朕尚書詩曰無德不報其賜榮爵關內侯食邑五千戶三老五更皆以二千石祿養終厥身其賜天下三老酒人一石肉四十斤有司其存耆耋恤幼孤惠鰥寡稱朕意焉六年詔曰先帝詔書禁民上事言聖而間者章奏頗多浮辭自今若有過稱虛譽尚書皆宜抑而勿省示不為諂子嗤也八年日有蝕之詔曰朕以無德奉承大業而下貽民怨上動三光日蝕之變其災尤大永思厥咎在豫一人群司勉修職事極言無諱於是在位者皆上封事各陳得失帝覽章深自引咎乃以所上班示百官詔曰群寮所言皆朕之過人冤不能理吏黠不能禁而輕用民力繕治室宇出入無節喜怒過差永覽前戒竦然兢懼徒恐薄德久而致怠耳十二年詔曰昔曾閔奉親竭歡致養仲尼葬子有棺無槨喪貴致哀禮存寧儉今百姓送終之制競為奢靡生者無擔石而財力盡於墳土伏臘無糟粳而牲牢兼於一奠糜破積世之業以供終朝之費子孫飢寒終命於此豈祖考之意哉又車服過制恣極耳目田荒不耕浮食者衆有司其申明科禁宜於今者宣下郡國十八年帝崩遺詔無起寢廟藏主於光烈皇后更衣別室帝遵奉建武制度事無違者後宮之家不得封侯與政館陶公主為子求郎不許而賜錢千萬謂群臣曰郎官上應列宿出宰百里有非其人則民受其殃是以難之故吏稱其官民安其業遠近肅服戶口滋殖焉論曰明帝善刑理法令分明日晏坐朝幽枉必達外內無幸曲之私在上無矜大之色斷獄得情號居前世十二故後之言事者莫不先建武永平之政孝章皇帝諱炟明帝第五子也少寬容好儒術顯宗器重之建初元年詔曰朕以無德奉承大業夙夜栗栗不敢荒寧而災異仍見與政相應朕既不明涉道日寡又選舉乖實俗吏傷民官職耗亂刑罰不中可不憂與昔仲弓季氏之家臣子遊武城之小宰孔子猶誨以賢才問以得人明政之小大以人為本鄉舉里選必纍功勞今刺史守相不明真偽茂才孝廉歲以百數既非能顯而當授之政事甚無謂也每尋前世舉人貢士或起甽畝不繫閥閲敷奏以言則文章可採明試以功則治有異文質斌斌朕甚嘉之其令太傅三公中二千石二千石郡國守相舉賢良方正能直言極諫之士各一人四年詔於是下太常將大夫博士議郎郎官及諸生諸儒會白虎觀講議五經同異帝親稱制臨決焉七年詔曰車駕行秋稼觀收穫因涉郡界皆精騎輕行無他輜重不得輒修道橋遠離城郭遣吏逢迎刺探起居出入前後以為煩擾也動務省約但患不能脫粟瓢飲耳所過欲令貧弱有利無違詔書元和二年詔曰令云民有産子者復勿算三歲今諸懷妊者賜胎養穀人三斛復其夫勿算一歲著以為令又詔曰方春生養萬物莩甲宜助萌陽以育時物其令有司罪非殊死且勿案驗及吏民條書相告不得聽受冀以息事寧民敬奉天氣立秋如故夫俗吏矯飾外貌似是而非揆之人事則悅耳論之陰陽則傷化朕甚饜之甚苦之安靜之吏悃愊無華日計不足月計有餘如襄城令劉方吏民同聲謂之不煩雖未有他異斯亦殆近之矣間敕二千石各尚寬明而今富姦行賂於下貪吏枉法於上使有罪不論而無過被刑甚大逆也夫以苛為察以刻為明以輕為德以重為威四者或興則下有怨心吾詔書數下冠蓋接道而吏不加治民或失職其咎安在勉思舊令稱朕意焉又詔曰律十二月立春不以報囚月令冬至之後有順陽助生之文而無鞫獄斷刑之政朕咨訪儒雅稽之典籍以為王者生殺宜順時氣其定律無以十一月十二月報囚三年春北巡狩敕侍御史司空曰方春所過無得有所伐殺車可引避引避之騑馬可輟解輟解之詩云敦彼行葦牛羊勿踐履禮人君伐一草木不時謂之不孝俗知順人莫知順天其明稱朕意論曰魏文帝稱明帝察察章帝長者章帝素知民厭明帝苛切事從寬厚感陳寵之議除慘之獄科深元元之愛著胎養之令割裂名都以崇建周親平徭簡賦而民賴其慶又體之以忠恕文之以禮樂故乃蕃輔克諧群后德讓謂之長者不亦宜乎在位十三年郡國所上符瑞合於圖書者數百千所嗚呼懋哉孝和皇帝諱肇章帝第四子也在位十七年而崩齊民歲增闢土日廣每有災異輒延問公卿極言得失前後符瑞八十一所自稱德薄皆抑而不宣舊南海獻龍眼荔支十里一置五里一候奔騰阻險死者繼路時臨武長汝南唐羌縣接南海乃上書陳狀帝下詔曰遠國珍羞本以奉宗廟茍有傷害豈愛民之本耶其敕太官勿復受獻由是遂省皇后紀序夏殷以上后妃之制其文略矣周禮王者立后三夫人九嬪二十七世婦八十一女御以備內職焉后正位宮闈同體天王夫人坐論婦禮九嬪掌教四德世婦主知喪祭賓客女御序於王之燕寢頒官分務各有典司女史彤管記功書過居有保阿之訓動有環佩之響進賢才以輔佐君子哀窈窕而不淫其色所以能述宣陰化修成內則閨房肅雍險謁不行者也故康王晚朝關雎作諷宣后晏起薑氏請愆及周室東遷禮序凋缺諸侯僭縱軌制無章齊桓有如夫人者六人晉獻升戎女為元妃終於五子作亂冢嗣遘屯爰逮戰國風憲愈薄適情任欲顛倒衣裳以至破國亡身不可勝數斯固輕禮弛防先色後德者也秦并天下多自驕大宮備七國爵列八品漢興因循其號而婦制莫釐高祖帷薄不修孝文席無辨然而選納尚簡飾玩少華自武元之後世增淫費至乃掖庭三千增級十四妖幸毀政之符外姻亂邦之前史載之詳矣及光武中興斫雕為朴六宮稱號唯皇后貴人貴人金印紫綬俸不過粟數十斛又置美人宮人采女三等並無爵秩歲時賞賜充給而已明帝聿遵先旨宮教頗修登建嬪后必先令德內無出閫之言權無私溺之授可謂矯其弊矣雖御己有度而防間未篤故孝章以下漸用色授恩隆好合遂忘淄蠹自古雖主幼時艱王家多舋必委成冢宰簡求忠賢未有專任婦人斷割重器唯秦芊太后始攝政事故穰侯權重於昭王家富於嬴國漢仍其謬知患莫改東京皇統屢絶權歸女主外立者四帝臨朝者六后莫不定策帷帟委事父兄貪孩童以久其政抑明賢以專其威任重道悠利深禍速身犯霧露於雲臺之上家嬰縲紲於圄犴之下湮滅連踵傾輈繼路而赴蹈不息焦爛為期終於陵夷大運淪亡神寶詩書所歎略同一揆故考列行迹以為皇后本紀云明德馬皇后伏波將軍援之小女也永平三年立為皇后既正位宮闈愈自謙肅能誦易經好讀春秋楚辭尤善周官常衣大練裙不加緣諸姬主朝請望見后袍衣疏粗反以為綺縠就視乃笑后辭曰此繪特宜染色故用之耳六宮莫不歎息時楚獄連年不斷囚相證引坐繫者甚衆后慮其多濫乘間言及惻然帝感之多有所降宥每於侍執之際輒言及政事多所毗補而未嘗以家私干欲寵敬日隆始終無衰自撰顯宗起居注削去兄防參醫藥事帝請曰黃門舅旦夕供養且一年既無異又不録勤勞無乃過乎太后曰吾不欲令後世聞先帝數親後宮之家故不著也帝欲封爵諸舅太后不聽明年夏大旱言事者以為不封外戚之故有司因此上奏宜依舊典太后詔曰凡言事者皆欲媚朕以要福耳昔王氏五侯同日俱封其時黃霧四塞不聞澍雨之應又田蚡竇嬰寵貴橫恣傾覆之禍為世所傳故先帝防慎舅氏不令在樞機之位諸子之封裁令半楚淮陽諸國常謂我子不當與先帝子等今有司奈何欲以馬氏比陰氏乎吾為天下母而身服大練食不求甘左右但著皂布無香薰之飾者欲身率下也以為外親見之當傷心自敕但笑言太后素好儉前過濯龍門上見外家問起居者車如流水馬如遊龍蒼頭衣緑領袖正白顧視御者不及遠矣故不加譴怒但絶歲用而已冀以默愧其心而猶懈怠無憂國忘家之慮知臣莫若君況親屬乎吾豈可上負先帝之旨下虧先人之德重襲西京敗亡之禍哉固不許帝省詔悲歎復重請曰漢興舅氏之封侯猶皇子之為王也太后誠存謙虛奈何令臣獨不得加恩三舅乎且衛尉年尊兩校尉有大病如令不諱使臣長抱刻骨之恨宜及吉時不可稽留太后報曰吾反覆念之思令兩善豈徒欲獲謙讓之名而使帝受不外施之嫌哉昔竇太后欲封王皇后之兄丞相條侯言受高祖約無軍功非劉氏不侯今馬氏無功於國豈得與陰郭中興之后等耶常觀富貴之家祿位重疊猶再實之木其根必傷且人所以願封侯者欲上奉祭祀下求溫飽耳今祭祀則受四方之珍衣食則蒙御府之餘資斯豈不足而必當得一懸乎吾計之熟矣勿有疑也夫至孝之行安親為上今數遭變異穀價數倍憂惶晝夜不安坐臥而欲先營外封違慈母之拳拳乎吾素剛急有胸中氣不可不順也若陰陽調和邊境清靜然後行子之志吾但當含飴弄孫不能復關政矣其外親有謙素義行者輒假借溫言賞以財位如有纖介則先見嚴恪之色然後加譴其美車服不軌法度者便絶屬籍遣歸田里廣平巨鹿樂成王車騎朴素無金銀之飾太后即賜錢各五百萬於是內外從化被服如一諸家惶恐倍於永平世乃置織室蠶於濯龍中數往觀視以為娛樂常與帝旦夕言道政事乃教授諸小王論議經書述敘平生雍和終日天下豐稔方垂無事帝遂封三舅廖防光為列侯並辭讓願就關內侯太后聞之曰聖人設教各有其方知人情性莫能齊也吾日夜惕厲思自降損居不求安食不念飽冀乘此道不負先帝所以化導兄弟共同斯志欲令瞑目之日無所復恨何意老志復不從哉廖等不得已受封爵而退位歸第焉和熹鄧皇后諱綏太傅禹之孫也選入宮為貴人恭肅小心動有法度帝深嘉愛焉及后有疾特令后母兄弟入親醫藥不限以日數后言於帝曰宮禁至重而使外舍久在內省上令陛下有幸私之譏下使賤妾獲不知足之謗上下交損誠不願也帝曰人皆以數入為榮貴人反以為憂深自抑損誠難及也每有宴會諸姬貴人競自修整簪珥光彩裳鮮明而后獨省素裝服無飾陰后以巫蠱事廢立為皇后是時方國貢獻競求珍麗之物自后即位悉令禁絶歲時但供紙墨而已列傳馮異字公孫潁川人也建武二年為征西大將軍大破赤眉屯兵上林苑威行關中六年朝京師帝謂公卿曰是我起兵時主簿也為吾披荊棘定關中既罷使中黃門賜以珍寶衣服錢帛詔曰倉卒蕪蔞亭豆粥呼沱河麥飯厚意久不報異稽首謝曰臣聞管仲謂桓公曰願君無忘射鉤臣無忘檻車齊國賴之臣今亦願國家無忘河北之難小臣不敢忘巾車之恩岑彭字君然南陽人也拜廷尉行大將軍事與大司馬吳漢等圍洛陽數月朱鮪等堅守不肯下帝以彭嘗為鮪校尉令往説之鮪曰大司徒被害時鮪與其謀又諫更始無遣蕭王北伐誠自知罪深彭還具言於帝帝曰夫建大事者不忌小怨鮪今若降官爵可保況誅罰乎河水在此吾不食言彭復往告鮪鮪乃面縛與彭俱詣河陽帝即解其縛拜鮪為平狄將軍封扶溝侯建武八年彭與吳漢圍隗囂於西城公孫述將李育守上邽蓋延耿弇圍之敕彭曰兩城若下便可將兵南擊蜀虜人苦不知足既平隴復望蜀每一發兵頭鬚為白臧宮字君翁潁川人也胸奴飢疫自相分爭帝以問宮宮曰願得五千騎以立功帝笑曰常勝之家難與慮敵吾方自思之建武二十七年宮與楊虛侯馬武上書曰胸奴人畜疫死旱蝗赤地疫困之力不當中國一郡萬里死命懸在陛下福不再來時或易失豈宜固守文德而墮武事乎詔報曰黃石公記曰柔能制剛弱能制強柔者德也剛者賊也弱者仁之助也強者怨之歸也舍近謀遠者勞而無功舍遠謀近者逸而有終逸政多忠臣勞政多亂民故曰務廣地者荒務廣德者強有其有者安貪人有者殘殘滅之政雖成必敗今國無善政災變不息百姓驚惶人不自保而復欲遠事邊外乎孔子曰吾恐季孫之憂不在顓臾且傳聞之事恆多失實茍非其時不如息民自是諸將莫敢復言兵事者祭遵字弟孫潁川人也從征河北為軍市令世祖舍中兒犯法遵格殺之世祖怒命收遵時主簿陳副諫曰明公常欲衆軍整齊今遵奉法不避是教令行也世祖乃貰之以為刺姦將軍謂諸將曰當備祭遵吾舍中兒犯令尚殺之必不私諸卿也河北平拜征虜將軍遵為人廉約小心克己奉公賞賜輒盡與士卒家無私財身衣韋布被夫人裳不加緣帝以是重焉及卒愍悼之尤甚遵喪至河南縣詔遣百官先會喪所車駕素服臨之望哭哀慟還幸城門過其車騎涕泣不能已喪禮成復親祠以太牢如宣帝臨霍光故事至葬車駕復臨贈以將軍侯印綬朱輪容車介士軍陳送葬諡曰成侯既葬車駕復臨其墳存見夫人室家其後朝會帝每歎曰安得憂國奉公之臣如祭征虜者乎遵之見思若此馬武字子張南陽人也封為揚虛侯為人嗜酒闊達敢言時醉在御前面折同列言其短長無所避忌帝故縱之以為笑樂帝雖制御功臣而每能回容宥其小失遠方貢珍甘必先遍列侯而大官無餘有功輒增邑賞不任以吏職故皆保其福祿終無誅譴者論曰光武中興二十八將前世以為上應二十八宿未之詳然咸能感會風雲奮其智勇稱為佐命亦各志能之士也議者多非光武不以功臣任職至使英姿茂績委而勿用然原夫深圖遠算固將有以焉爾若乃王道既衰降及霸德猶能授受惟庸勳賢兼序如管隰之迭升桓世先趙之同列文朝可謂兼通矣降自秦漢世資戰力至於翼扶王運皆武人屈起亦有鬵繒屠狗輕猾之徒或崇以連城之賞或任以阿衡之地故勢疑則隙生力侔則亂起蕭樊且猶縲紲信越終見葅戮不其然乎自茲以降迄於孝武宰輔五世莫非公侯遂使搢紳道塞賢能蔽雍朝有世及之私下多抱關之怨其懷道無聞委身草莽者亦何可勝言哉故光武鑒前事之違存矯枉之志雖寇鄧之高勳耿賈之洪烈分土不過大縣數四所加特進朝請而已觀其治平臨政課職責咎將所謂導之以法齊之以刑者乎若格之功臣其傷已甚何者直繩則虧喪恩舊撓情則違廢禁典選德則功不必厚舉勞則人或未賢參任則群心難塞並列則其弊未遠不得不校其勝否即以事相權故高秩厚禮允答元功峻文深憲責成吏職建武之世侯者百餘若夫數公者則與參國議分均休咎其餘並優以寬科完其封祿莫不終以功名延慶于後昔留侯以為高祖悉用蕭曹故人而郭伋亦譏南陽多顯鄭興又戒功臣專任夫崇恩偏授易啓私溺之失至公均被必廣招賢之路意者不其然乎永平中顯宗追感前世功臣乃圖畫二十八將於南宮雲臺其外又有王常李通竇融卓茂合三十二人故依其本第係之篇末以志功臣之次云爾太傅高密侯鄧禹中山太守全椒侯馬成大司馬廣平侯吳漢河南尹阜成侯王梁左將軍膠東侯賈復琅邪太守祝阿侯陳俊建威大將軍好畤侯耿弇驃騎大將軍參遽侯杜茂執金吾雍奴侯寇恂積弩將軍昆陽侯傅俊征南大將軍舞陽侯岑彭左曹合肥侯堅鐔征西大將軍陽夏侯馮異上谷太守淮陽侯王霸建義大將軍鬲侯朱祐信都太守阿陵侯任光征虜將軍潁陽侯祭遵豫章太守中水侯李忠驃騎大將軍櫟陽侯景丹右將軍槐里侯萬修虎牙大將軍安平侯蓋延太常靈壽侯邳彤衛尉安成侯銚期驍騎將軍昌成侯劉植東郡太守東光侯耿純橫野大將軍山桑侯王常城門校尉朗陵侯臧宮大司空固始侯李通捕虜將軍楊虛侯馬武大司空安豐侯竇融驃騎將軍慎侯劉隆大傅宣德侯卓茂馬援字文淵扶風人也建武九年拜為太中大夫十七年交址女子徵側及女弟徵二反攻沒其郡九真日南合浦蠻夷皆應之寇略嶺外六十餘城側自立為王於是拜援伏波將軍督樓船將軍段志等南擊交址斬徵側徵二傳首洛陽封援為新息侯援嘗有疾梁松來候之獨拜床下援不答松去後諸子問曰梁伯孫帝貴重朝廷公卿已下莫不憚之大人奈何獨不為禮援曰我松父友也雖貴何得失其序乎松由是恨之二十四年武威將軍劉尚擊武陵五溪蠻夷軍沒援因復請行遂遣援率中郎將馬武耿舒等征五溪援夜與送者訣謂友人謁者杜愔曰吾受厚恩年迫餘日索常恐不得死國事今獲所願甘心瞑目但畏長者家兒或在左右或與從事殊難得調獨惡是耳初軍次下雋有兩道可入從壺頭則路近而水嶮從充道則塗夷而運遠帝初以為疑及軍至耿舒欲從充道援以為棄日費糧不如進壺頭扼其喉咽充賊自破以事上之帝從援策進營壺頭賊乘高守隘水疾船不得上會暑甚士卒多疫死援亦中病遂困乃穿岸為室以避炎氣賊每升險鼓譟援輒曳足以觀之左右哀其壯意莫不為之流涕耿舒與兄好畤侯弇書曰前舒上言當先擊充糧雖難運而兵馬得用軍人數萬爭欲先奮今壺頭竟不得進大衆怫鬱行死誠可痛惜弇得書奏之帝乃使虎賁中郎將梁松乘驛責問援因代監軍會援病卒松宿懷不平遂因事陷之帝大怒追收援新息侯印綬初援在交址常餌薏苡實用能輕身省欲以勝瘴氣南方薏苡實大援欲以為種軍還載之一車時人以為南土珍怪權貴皆望之援時方有寵故莫以聞及卒後有上書譖之者以為前所載還皆明珠文犀馬武於陵侯侯昱等皆以章言其狀帝益怒援妻孥惶懼不敢以喪還舊塋裁買城西數畝地葬而已賓客故人莫敢弔會援兄子嚴與援妻子草索相連詣闕請罪帝乃出松書以示之方知所坐上書訴冤前後六上辭甚哀切然後得葬又前雲陽令同郡朱勃詣闕上書曰臣聞王德聖政不忘人之功採其一美不求備於衆故高祖赦蒯通而以王禮葬田橫大臣曠然咸不自疑夫大將在外讒言在內微過輒記大功不計誠為國之所慎也故章邯畏口而奔楚燕將據聊而不下豈其甘心末規哉悼巧言之傷類也竊見故伏波將軍馬援拔自西州欽慕聖義間關險難觸冒萬死孤立群貴之間傍無一言之佐馳深淵入虎口豈顧計哉寧自知當要七郡之使徼封侯之福耶八年車駕西討隗囂國計狐疑衆營未集援建宜進之策卒破西州及吳漢下隴冀路斷隔唯獨狄道為國堅守士民飢困寄命漏刻援奉詔西使鎮慰邊衆乃招集豪傑曉誘羌戎謀如涌泉勢如轉規遂救倒懸之急存幾亡之城兵全師進因糧敵人隴冀略平而獨守空郡兵動有功師進輒克誅鋤先零緣入人谷猛怒力戰飛矢貫脛又出征交址士多瘴氣援與妻子生訣無悔吝之心遂斬滅徵側剋平一州間復南討立陷臨鄉師已有業未竟而死吏士雖疫援不獨存夫戰或以久而立功或以速而致敗深入未必為得不進未必為非人情豈樂久屯絶地不生歸哉惟援得事朝廷二十二年北出塞漠南渡江海觸冒害氣僵死軍事名滅爵絶國土不傳海內不知其過衆庶未聞其毀卒遇三夫之言橫被誣罔之讒家屬杜門葬不歸墓怨隙並興宗親怖栗死者不能自列生者莫為之訟臣竊傷之夫明主醲於用賞約於用刑高祖嘗與陳平金四萬斤以間楚軍不問出入所為豈復疑以錢穀間哉夫操孔父之忠不能自免於讒此鄒陽之所悲也惟陛下留思豎儒之言無使功臣懷恨黃泉臣聞春秋之義罪以功除聖王之杞臣有五義若援所謂以死勤事者也願下公卿平援功罪宜絶宜續以厭海內之望臣年已六十常伏田里竊感欒布哭彭越之義冒陳悲憤戰栗闕庭書奏報歸田里子廖字敬平少以父任為郎肅宗甚尊重之時皇太后躬履節儉事從簡約廖慮美業難終上疏長樂宮以勸成德政曰臣案前世詔令以百姓不足起於世尚奢靡故元帝罷服官成帝御浣衣哀帝去樂府然而侈費不息至於衰亂者百姓從行不從言也夫改政移風必有其本傳曰吳王好劍客百姓多瘢瘡楚王好細腰宮中多餓死長安語曰城中好高髻四方高一尺城中好廣眉四方且半額城中好大袖四方用匹帛斯言如戲有切事實前下制度未幾後稍不行雖或吏不奉法良由慢起京師今陛下躬服厚繪斥去華素簡所安發自聖情此誠上合天心下順民望浩大之福莫尚於此陛下既已得之自然猶宜加以勉勗法大宗之隆德戒成哀之不終易曰不恆其德或承之羞誠令斯事一竟則四海誦德聲熏天地神明可通金石可勒而況於人心乎況於行令乎願置章坐側以當瞽人夜誦之音大后深納之卓茂字子康南陽人也以儒術舉遷密令視民如子舉善而教口無惡言吏民親愛而不忍欺之民常有言部亭長受其米肉遺者茂避左右問之曰亭長為從汝求乎為汝有事屬之而受乎將平居自以恩意遺之乎民曰往遺之耳茂曰遺之而受何故言邪民曰竊聞賢明之君使民不畏吏吏不取民今我畏吏是以遺之吏既卒受故來言耳茂曰汝為弊民矣凡人所以貴於禽獸者以有仁愛知相敬事也今鄰里長老尚致饋遺此乃人道所以相親況吏與民乎吏顧不當乘威力強請求耳凡人之生群居雜處故有經紀禮義以相交接汝獨不欲修之寧能高飛遠走不在人間邪亭長素善吏歲時遺之禮也民曰茍如此律何故禁之茂笑曰律設大法禮順人情今我以禮教汝必無怨惡以律治汝何所厝其手足乎一門之內小者可論大者可殺也且歸念之於是人納其訓吏懷其恩治密數年教化大行道不拾遺平帝時天下大蝗河南二十餘縣皆被其災獨不入密界王莽居攝以病免歸世祖即位乃下詔曰前密令卓茂束身自修執節淳固誠能為人所不能為夫名冠天下當受天下重賞今以茂為太傅封德侯食邑二千戶魯恭字仲康扶風人也太傅趙熹舉恭直言拜中牟令恭以德化為治不任刑罰民許伯等爭田纍年守令不能決恭為平理曲直皆退而自責輟耕相讓亭長從民借牛而不肯還之牛主訟於恭恭召亭長敕令歸牛者再三猶不從恭歎曰是教化不行也欲解印綬去掾史泣涕共留之亭長乃慚悔還牛詣獄受罪恭貰不問於是吏民信服建初七年郡國螟傷稼犬牙緣界不入中牟河南尹袁安聞之疑其不實使仁恕掾肥親往廉之恭隨行阡陌俱坐桑下有雉過止其傍傍有童兒親曰兒何不捕之兒言雉方將雛親瞿然而起與恭訣曰所以來者欲察君之治耳今蟲不犯境此一異也化及鳥獸此二異也豎子有仁心此三異也久留徒擾賢者耳還府具以狀白安是歲嘉禾生中牟安上書言狀帝異之
