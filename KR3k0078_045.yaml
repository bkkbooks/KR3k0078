body:
  text: 桓子新論桓子新論昔秦王見周室之失統喪權於諸侯故遂自恃不任人封立諸侯及陳勝楚漢咸由布衣非封君有土而並共滅秦高帝既定天下念項王從函谷入而己由武關到推卻關修強守禦內充實三軍外多發屯戍設窮治黨與之法重懸告反之賞及王翁之奪取乃不犯關梁塞而坐得其處王翁自見以專國秉政得之即抑重臣收下權使事無大小深淺皆斷決於己身及其失之人不從大臣生焉更始帝見王翁以失百姓心亡天下既西到京師恃民悅喜則自安樂不聽納諫臣謀士赤眉圍其外而近臣反城遂以破敗由是觀之夫患害奇邪不一何可勝為設防量備哉防備之善者則唯量賢智大材然後先見豫圖遏將救之耳維鍼艾方藥者已病之具也非良醫不能以愈人材能德行者治國之器也非明君不能以立功醫無鍼藥可作為求買以行術伎不須必自有也君無材德可選任明輔不待必躬能也由是察焉則材能德行國之鍼藥也其得立功效乃在君輔傳曰得十良馬不如得一伯樂得十利劍不如得一歐治多得善物不如少得能知物知物者之致善珍珍益廣非特止於十也言求取輔佐之術既得之又有大難三而止善二為世之事中庸多大材少少不勝眾一口不能與一國訟持孤特之論干雷同之計以疏賤之處逆貴近之心則萬不合此一難也夫建踔殊為非常乃世俗所不能見也又使明智圖事而與眾平之亦必不足此二難也既聽納有所施行而事未及成讒人隨而惡之即中道狐疑或使言者還受其尤此三難也智者盡心竭言以為國造事眾閒之則反見疑壹不當合遂被譖想雖有十善隔以一惡去此一止善也材能之士世所嫉妒遭遇明君乃壹興起既幸得之又復隨眾弗與知者雖有若仲尼猶且出走此二止善也是故非君臣致密堅固割心相信動無閒疑若伊呂之見用傅說通夢管鮑之信任則難以遂功竟意矣又說之言亦甚多端其欲觀使者則以古之賢輔厲主欲閒疏別離則以專權危國者論之蓋父子至親而人主有高宗孝己之設及景武時栗衛太子之事忠臣高節時有龍逢比干伍員晁錯之變比類眾多不可盡記則事曷可為邪庸易知邪雖然察前世已然之效可以觀覽亦可以為戒維諸高妙大材之人重時遇咎皆欲上與賢侔而垂榮歷載安肯毀名廢義而為不軌惡行乎若夫魯連解齊趙之金封虞卿捐萬戶與國相乃樂以成名肆志豈復干求便辟趍利耶覽諸邪背叛之臣皆小辨貪饕之人也大材者莫有焉由是觀之世閒高士材能絕異者其行親任亦明矣不主乃意疑之也如不能聽納施行其策雖廣知得亦終無益也凡人耳目所聞見心意所知識性情所好惡利害所去就亦皆同務焉若材能有大小智略有深淺聽明有闇照質行有薄厚亦有異度焉非有大材深智則不能見其大體大體者皆是當之事也夫言是而計當遭變而用權常守正見事不惑內有度量不可傾移而誑以譎異為知大體矣如無大材則雖威權如王翁察慧如公孫龍敏給如東方朔言災異如京君明及博見多聞書至萬篇為儒教授數百千人祇益不知大體焉維王翁之過絕世人有三焉其智足以飾非奪是辨能窮詰說士威則震懼群下又數陰中不快己者故群臣莫能抗答其論莫敢干犯匡諫卒以致亡敗其不知大體之禍也夫帝王之大體者則高帝是矣高帝曰張良蕭何韓信此三子者皆人傑也吾能用之故得天下此其知大體之效也王翁始秉國政自以通明賢聖而謂群下才智莫能出其上是故舉措興事輒欲自信任不肯與諸明習者通共茍直意而發得之而用是以稀獲其功效焉故卒遇破亡此不知大體者也高帝懷大智略能自揆度群臣制事定法常謂曰庳而勿高也度吾所能行為之憲度內疏政合於時故民臣樂悅為世所思此知大體者也王翁嘉慕前聖之治而簡薄漢家法令故多所變更欲事事效古美先聖制度而不知己之不能行其事釋近趍遠所尚非務故以高義退致廢亂此不知大體者也高祖欲攻魏乃使人窺視其國相及諸將率左右用事者知其主名乃曰此皆不如吾蕭何曹參韓信樊噲等亦易與耳遂往擊破之此知大體者也王翁前欲北伐匈奴及後東擊青徐眾郡赤眉之徒皆不擇良將而但以世姓及信謹文吏或遣親屬子孫素所愛好咸無權智將帥之用猥使據軍持眾當赴強敵是以軍合則損士眾散走咎在不擇將將與主俱不知大體者也夫言行在於美善不在於眾多出一美言善行而天下從之或見一惡意醜事而萬民違可不慎乎故易曰言行君子之樞機樞機之發榮辱之主所以動天地者也王翁刑殺人又復加毒害焉至生燒人以醯五毒灌死者飢肉及埋之復薦覆以荊棘人既死與木土等雖重加創毒亦何損益成湯之省納無補於士民士民向之者嘉其有德惠也齊宣之活牛無益於賢人賢人善之者貴其有仁心也文王葬枯骨無益於眾庶眾庶悅之者其思義動之也王翁之殘死人無損於生人生人惡之者以殘酷示之也維此四事忽微而顯著纖細而猶大故二聖以興一君用稱王翁以亡知大體與不知者遠矣聖王治國崇禮讓顯仁義以尊賢愛民為務是為卜筮維寡祭祀用稀王翁好卜筮信時日而篤於事鬼神多作廟兆潔齋祀祭犧牲殽膳之費吏卒辨治之苦不可稱道為政不善見叛天下及難作兵起無權策以自救解乃馳之南郊告禱搏心言冤號興流涕叩頭請命幸天哀助之也當兵入宮日矢射交集燔火大起逃漸臺下尚抱其符命書及所作威斗可謂蔽惑至甚矣淳于髡至鄰家見其突之直而積薪在旁曰此且有火災即教使更為曲突而徙遠其薪家不聽後災火果及積薪而燔其屋鄰里並救擊及滅止而亨羊具酒以勞謝救火者曲突遠薪固不肯呼淳于髡飲飯智者譏之云教人曲突遠薪固無恩澤燋頭爛額反為上客蓋傷其賤本而貴末豈夫獨突薪可以除害哉而人病國亂亦皆如斯是故良醫醫其未發而明君絕其本謀後世多損於杜塞未萌而勤於攻擊已成謀臣稀賞而士常榮猶彼人殆失事之重輕察淳于髡之預言可以無不通此見微之類也王者初興皆先建根本廣立藩屏以自樹黨而強固國基焉是以周武王克殷未下輿而封黃帝堯舜夏殷之後及同姓親屬功臣德行以為羽翼佐助鴻業永垂流于後嗣乃者強秦罷去諸侯而獨自恃任一身子弟無所封孤弱無與是以為帝十四歲而亡漢高祖始定天下背亡秦之短計導殷周之長道裒顯功德多封子弟後雖多以驕佚敗亡然漢之基本得以定成而異姓強臣不能復傾至景武之世見諸王數作亂因抑奪其權勢而王但得虛尊坐食租稅故漢朝遂弱孤單特立是以王翁不興兵領士而徑取天下又懷貪功獨專之利不肯封建子孫及同姓戚屬為藩輔之固故兵起莫之救助也傳曰與死人同病者不可為醫與亡國同政者不可為謀王翁行甚類暴秦故亦十五歲而亡失獵射禽獸者始欲中之恐其創不大也既已得之又恐其傷肉多也鄙人有得醬而美之及飯惡與人共食即小唾其中共者怒因涕其醬遂棄而但不得食焉彼亡秦王翁欲取天下時乃樂與人分之及已得而重愛不肯與是惜肉嗜之類也昔齊桓公出見一故墟而問之或對曰郭氏之墟也復問郭氏曷為墟曰善善而惡惡焉桓公曰善善惡惡乃所以為存而反為墟何也曰善善而不能用惡惡而不能去彼善人知其貴己而不用則怨之惡人見其賤己而不好則仇之夫與善人為怨惡人為仇欲毋亡得乎乃者王翁善天下賢智材能之士皆徵聚而不肯用使人懷誹謗而怨之更始帝惡諸王假號無義之人而不能去令各心恨而仇之是以王翁見攻而身死宮室燒盡更始帝為諸王假號而出走令城郭殘二王皆有善善惡惡之費故不免於禍難大災卒使長安大都壞敗為墟此大非之行也北蠻之先與中國並歷年茲多不可記也仁者不能以德來強者不能以力并也其性忿鷙獸聚而鳥散其強難屈而和難得是以聖王羈縻而不專制也昔周室衰微夷狄交侵中國不絕如於是宣王中興僅得復其侵地夫以秦始皇之強帶甲四十萬不敢窺河西乃築長城以分之漢興高祖見圍於平城呂后時為不軌之言文帝時匈奴大入烽火候騎至雍甘泉景武之閒兵出數困卒不能禽制即與之結和親然後邊甬得安中國以寧其後匈奴內亂分為五單于甘延壽得承其弊以深德呼韓耶單于故肯委質稱臣來入朝見漢家漢家得以宣德廣之隆而威示四海莫不率服歷世無寇安危尚未可知而猥復侵刻匈奴往攻奪其璽綬而貶損其大臣號位變易舊常分單于為十五是以恨恚大怒事相攻拒王翁不自非悔及遂持屈強無理多拜將率調發兵馬運徙糧食財物以彈索天下天下愁恨怨苦因大擾亂竟不能挫傷一胡虜徒自窮極竭盡而已書曰天孽可避自作孽不可活其斯之謂矣夫高帝之見圍十日不食及得免脫遂無慍色誠知其往攻非務而怨之無益也今匈奴負於王翁王翁就往侵削擾之故使事至於斯豈所謂肉自生蟲而人自生禍者耶其為不急乃劇如此自作之甚者也夫異變怪者天下所常有無世而不然逢明主賢臣智士仁人則修德善政省職慎行以應之故咎殃消亡而禍轉為福焉昔大戊遭桑穀生朝之怪獲中宗之號武丁有雊雉升鼎之異身享百年之壽周成王遇雷風折木之變而獲反風歲熟之報宋景公有熒惑守心之憂星為徙三舍由是觀之則莫善於以德義精誠報塞之矣故周書曰天子見怪則修德諸侯見怪則修政大夫見怪則修職士庶見怪則修身神不能傷道妖亦不能害德及衰世薄俗君臣多淫驕失政士庶多邪心惡行是以數有災異變怪又不能內自省視畏天戒而反外考謗議求問厥故惑於佞愚而以自詿誤而令患禍得就皆違天逆道者也或言往者公卿重臣缺而眾人咸豫部署云甲乙當為之後果然彼何以處知而又能與上同意乎孔子謂子貢億則屢中令眾人能與子貢等乎余應曰世之在位人率同輩相去不甚膠著其修善少愈者固上下所昔聞知也夫明殊者視異智均者慮侔故群下之隱常與上同度也如昔湯武之用伊呂高宗之取傅說桓穆之授管甯由溪豈眾人所識知哉彼群下雖好意措亦焉能責斯以可居大臣輔相者乎國家設理官制刑辟所以定奸邪又內量中丞御史以正齊轂下故常用明習者始於欲分正法而終乎侵輕深刻皆務酷虐過度欲見未盡力而求獲功賞或著能立事而恐劣弱之謗是以役以箠楚舞文成惡及事成獄畢雖使皋陶聽之猶不能聞也至以言語小故陷致人於族滅事誠可悼痛焉漸至乎朝廷時有忿悁聞惡弗原故令天下相放俱成惑譏有司之行深刻云下尚執重而令上得施恩澤此言甚非也夫賢吏正士為上處事持法宜如丹青矣是故言之當必可行也罪之當必可刑也如何茍欲阿指乎如遭上忽略不宿留而聽行其事則當受強死也哀帝時待詔伍客以知皇好方道數召後坐帝事下獄獄窮訊得其宿與人言漢朝當生勇怒子如武帝者刻暴以為先帝為怒子非所宜言大不敬夫言語之時過差失誤乃不足被以刑誅及詆欺事可無於不至罪易言大人虎變君子豹變即以是論諭人主寧可謂曰何為比我禽獸乎如稱君之聖明如堯舜同或可怒曰何故比我於死人乎世主既不通而輔佐執事者復隨而聽之順成之不亦重為矇曚乎潛夫論天地之所貴者人也聖人之所尚者義也德義之所成者智也明智之所求者學問也雖有至聖不生而智雖有至材不生而能故志曰黃帝師風后顓頊師老彭帝嚳師祝融堯師務成舜師紀后禹師黑如湯師伊尹文武師姜尚周公師庶秀孔子師老聃夫此十一君者皆上聖也由待學問其智乃博其德乃碩而況於凡人乎是故工欲善其事必先利其器士欲宣其義必先讀其書易曰君子以多志前言往行以畜其德是以人之有學也猶物之有治也故夏后之璜楚和之璧不琢不錯不離礫石夫瑚簋之器朝祭之服其始也乃山野之木蠶繭之絲耳使巧倕加繩墨而制之以斤斧女工加五色而製之以機杼則皆成宗廟之器黼黻之章可羞於鬼神可御於王公而況君子敦貞之質察敏之才攝之以良朋教之以明師文之以禮樂導之以詩書幽讚之以周易明之以春秋其有不濟乎凡為治之大體莫善於抑末而務本莫不善於離本而飾末夫為國者以富民為本以正學為基民富乃可教學正乃得義民貧則背善學淫則詐偽入學則不亂得義則忠孝故明君之法務此二者以為太平基也夫富民者以農桑為本以游藝為末百工者以致用為本以巧飾為末商賈者以通貨為本以鬻奇為末三者守本離末則民富離本守末則民貧貧則而忘善富則樂而可教教訓者以道義為本以巧辨為末辭語者以信順為本以詭麗為末列士者以孝悌為本以交游為末孝悌以致養為本以華觀為末人臣者以忠正為本以媚愛為末五者守本離末則仁義興離本守末則道德崩慎本略末猶可也舍本務末則惡矣夫用天之道分地之利六畜生於時百物取於野此富國之本也游業末事以收民利此貧邦之源也忠信謹慎此德義之基也虛無譎詭此亂道之根也故力田所以富國也今民去農桑赴遊業披採眾利聚之一門雖於私家有富然公計愈貧矣百工者所使備器也器以便事為善以膠固為上今工好造雕琢之器偽飾之巧以欺民取賄雖於姦工有利而國界愈病矣商賈者所以通物也物以任用為要以堅牢為資今競鬻無用之貨淫侈之幣以惑民取產雖於淫商有得然國計愈失矣此三者外雖有勤力富家之私名然內有損民貧國之公費故為政者明督工商勿使淫偽困辱游業勿使擅利寬假本農而寵遂學士則民富而國平矣夫教訓者所以遂道術而崇德義也今學問之士好語虛無之事爭著雕麗之文以求見異於世品人鮮識從而尚之此傷道德之實而惑矇夫之失者也詩賦者所以頌善醜之德泄哀樂之情也故溫雅以廣文興喻以盡意今賦頌之徒茍為饒辨屈蹇之辭競陳誣罔無然之事以索見怪於世愚夫戇士從而奇之此悖孩童之思而長不誠之言者也盡孝悌於父母正操行於閨門所以為列士也今多務交游以結黨偷勢竊名以取濟渡夸末之徒從而尚之此逼貞士之節而眩世俗之心者也養生順志所以為孝也今多違志以儉養約生以待終終沒之後乃崇飾喪紀以言孝盛饗賓旅以求名誣善之眾從而稱之此亂孝悌之真行而誤後生之痛者也忠正以事君信法以理下所以居官也今多姦諛以取媚玩法以便己茍得之徒從而賢之此滅貞良之行開亂危之源者也五者外雖有賢才之虛譽內有傷道德之至實凡此八者皆衰世之務而闇君之所固也國之所以治者君明也其所以亂者君闇也君之所以明者兼聽也其所以闇者偏信也是故人君通必兼聽則聖日廣矣庸說偏信則愚日甚矣詩云先民有言詢于蕘夫堯舜之治闢四門明四目通四聰是以天下輻湊而聖無不照故共蘇之徒也靖言庸回弗能惑也秦之二世務隱藏己而斷百僚隔捐賤而信趙高是以聽塞於貴重之臣明蔽於驕妒之人故天下潰叛弗得聞也皆知高殺莫敢言之周章至戲乃始駭閻樂進勸乃後悔不亦晚乎故人君兼聽納下則貴臣不得誣而遠人不得欺也是故明君蒞眾務下之言以昭外也敬納卑賤以誘賢也其無拒言未必言者之盡用也乃懼拒無用而讓有用也其無慢賤也未必其人盡賢也乃懼慢不肖而絕賢聖也是故聖王表小以厲大賞鄙以招賢然後良士集于朝下情達于君也故上無遺失之策官無亂法之臣此君民之所利而奸佞之所患也舜曰予違汝弼汝無面從退有後言故治國之道勸之使諫宣之使言然後君明察而治情通矣且凡驕臣之好隱賢也既患其正義以繩己矣又恥居上位而明不及下尹居其職而策不出於己是以卻宛得眾而子常殺之屈原得君而椒蘭搆讒耿壽建常平而嚴延妒其諫謀陳湯殺郅支而匡衡挍其功由此觀之處位卑賤而欲效善於君則必先與寵人為讎矣乘舊寵沮之於內而己接賤欲自信於外此思善之君願忠之士所以雖並生一世而終不得遇者也國之所以存者治也其所以亡者亂也人君莫不好治而惡亂樂存而畏亡然嘗觀上記近古已來亡代有三穢國不數夫何故哉察其敗皆由君常好其所以亂而惡其所以治憎其所與存而愛其所與亡是故雖相去百世殊俗千里然其亡徵敗若重規襲矩稽節合符故曰殷鑒不遠在夏后之世夫與死人同病者不可生也與亡國同行者不可存也豈虛言哉何以知人且病以其不嗜食也何以知國之將亂以其不嗜賢也是故病家之廚非無嘉饌乃其人弗之能食故遂死也亂國之官非無賢人其君弗之能任故遂亡也故養壽之士先病服藥養世之君先亂任賢是以身常安而國脈永也身之病待醫而愈國之亂待賢而治治身有黃帝之術理世有孔子之經然病不愈而亂不治者非灸鍼之法誤而五經之言誣也乃因之者非其人茍非其人則規不圓而矩不方繩不直而準不平鑽燧不得火鼓石不下金驅馬不可以追速進舟不可以涉水也凡此八者有形見物茍非其人猶尚無功則又況乎懷道以撫民氓乘六龍以御天心者哉夫理世不得真賢譬由治病不得真藥也是故先王為官擇人必得其材功加於民德稱其位此三代開國建侯所以能傳嗣百世歷載千數者也凡有國之君未嘗不欲治也而治不世見者所任不固也世未嘗無賢也而賢不得用者群臣妒也主有索賢之心而無得賢之術臣有進賢之名而無進賢之實此所以人君孤危於上而道獨抑於下也夫國君之所以致治者公也公法行則宄亂絕佞臣之所以便身者私也私術用則公法奪列士之所以建節者義也正節立則醜類代此姦臣亂吏思私之徒所以為日夜杜隔賢君義士之閒亟使不相得者也夫賢者之為人臣不損君以奉佞不阿眾以取容不墮公以聽私不撓法以吐剛其明能照姦而義不比黨是以范武歸晉而國姦逃華元反朝而魚氏亡故正義之士與邪枉之人不兩立而人君之取士也不能參聽民氓斷之聰明反徒信亂臣之說獨用污吏之言此所謂與仇選使令囚擇吏者也書云謀及乃心謀及庶人孔子曰眾好之必察焉眾惡之必察焉故聖人之施舍也不必任眾亦不必專己必察彼己之謂而度之以義故舉無遺失而功無廢滅也惑君則不然己有所愛則因以斷正不稽於眾不謀於心茍眩於愛唯言是從此政之所以敗亂而士之所以放佚者也故有周之制天子聽政三公至於列士獻詩庶人傳語近臣盡規親戚補察瞽史教誨耆艾脩之而後王斟酌焉是以事行而無敗也末世則不然徒信貴人驕妒之議獨用宿媚蠱惑之言行豐禮者蒙愆咎論德義者見尤惡於是諛臣佞人從以詆訾之法被以議上之刑此賢士之姤困也夫詆訾之法者伐賢之斧也而驕妒之臣噬賢之狗也人君內秉伐賢之斧而外招噬賢之狗欲其至理也不亦悲乎兵之設也久矣涉歷五代以迨于今國未嘗不以德昌而以兵強也今兵巧之械盈乎府庫孫吳之言聒乎將耳然諸將用之進戰則兵敗退守則城亡是何也哉彼此之情不聞乎主上勝負之數不用乎將心士卒進無利而退無畏此所以然也夫服重上步驟千里馬之禍也然騏驥樂之者以御者良足為盡力也先登陷陣赴死嚴敵民之禍也然節士樂之者以明君可為效死也凡人所以肯赴死亡而不辭者非為趍利則因以避害也無賢鄙愚智皆然顧其所利害有異耳不利顯名則利厚賞也不避恥辱則避禍亂也非此四者雖聖王不能以要其臣慈父不能以必其子明主深知之故崇利顯害以與下市使親疏貴賤愚智必順我令乃得其欲是以一旦軍鼓雷震旌旗並發士皆奮激競於死敵者豈其情厭久生而樂空死哉乃義士且以徼其名貪夫且以求其賞爾今吏從軍敗沒死公事者以十萬數上不聞弔唁嗟嘆之榮名下又無祿賞之厚實節士無所勸慕庸夫無所貪利此其所以人懷阻解不肯復死者也軍起以來暴師五年典兵之吏將以千數大小之戰歲十百合而希有功歷察其敗無他故焉皆將不明於變勢而士不勸於死敵也其士之不能死也乃其將不能效也言賞則不與言罰則不行士進有獨死之禍退蒙眾生之福此其所以臨陣忘戰而競思奔北者也今觀諸將既無料敵合變之奇復無明賞必罰之信然其士又甚貧困器械不簡習將恩不素結卒然有急則吏以暴發虐其士士以所屈遇敵抉此為將吏驅怨以禦讎士卒縛手以待寇也夫將不能勸其士士不能用其兵此二者與無兵等無士無兵而欲合戰其敗負也理數也然故曰其敗者非天之所災將之過也人君之稱莫大於明人臣之譽莫美於忠此二德者古來君臣所共願也然明不繼踵忠不萬一者非必愚闇不逮而惡名也所以求之非道耳夫明據下起忠依上成二人同心則其利斷金能如此者要在於明操法術而已矣夫帝王者其利重矣其威大矣徒懸重利足以勸善徒設嚴威可以懲奸乃張重利以誘民操大威以驅民則舉世之人可令冒白刃而不恨赴湯火而不難豈云但率之以共治而不宜哉若鷹野鳥也然獵夫御之猶使終日奮擊而不敢怠豈有人臣而不可使盡力者哉故進忠扶危者賢不肖之所共願也誠皆願之而行違者常苦其道不利而有害言未得信而身敗廣觀古來愛君憂主敢言之臣忠信未達而為左右所鞫案更為愚惡無狀之臣者豈可勝數哉孝成終沒之日不知王章之直孝哀終沒之日不知王嘉之忠也後賢雖有憂君哀主之情忠誠正直之節然猶且沈吟觀聽是以忠臣必待明君乃能顯其節良吏必待察主乃能成其功故聖人求之於己不以責下也凡為人上法術明而賞罰必者雖無言語而勢自治法術不明而賞罰不必者雖日號令然勢自亂是故勢治者雖委之不亂勢亂者雖懃之不治也堯舜拱己無為而有餘勢治也胡亥王莽馳騖而不足勢亂也故曰善者求之於勢弗責於人是以明王審法度而布教令不行私以欺法不黷教以辱命故臣下敬其言而奉其禁竭其心而稱其職此由法術明也是故聖人顯諸仁藏諸用神而化之使民宜之然後致其治而成其功功業效於民美譽傳於世然後君乃得稱明臣乃得稱忠此所謂明據下作忠依上成二人同心其利斷金者也人君之治莫大於道莫盛於德莫美於教莫神於化道者所以持之也德者所以苞之也教者所以知之也化者所以致之也民有性有情有化有俗性情者心也本也化俗者行也末也上君撫世先其本而後其末順其心而理其行心情茍正則姦慝無所生邪意無所載矣是故上聖不務治民事而務治民心故曰聽訟吾由人也必也使無訟乎導之以德齊之以禮民親愛則無相害傷之意動思義則無姦邪之心夫若此者非法律之所使也非威刑之所強也此乃教化之所致也聖人甚尊德禮而卑刑罰故舜先契以敬敷五教而後命皋陶以五刑三居是故凡立法者非以司民短而誅過誤乃以防奸惡而救禍敗檢淫邪而內正道耳民蒙善化則人有士君子之心被惡政則人有懷奸亂之慮故善者之養天民也由良工之為麴豉也起居以其時寒溫得其適則一蔭之麴豉盡美而多量其遇拙工則一蔭之麴豉皆臭敗而棄捐今六合亦由一蔭也黔首之屬猶豆麥也變化云為在將者耳遭良吏則皆懷忠信而履仁厚遇惡吏則皆懷姦邪而行淺薄忠厚積則致太平奸薄積則致危亡是以聖帝明王皆敦德化而薄威刑德者所以修己也威者所以治人也民之生世也猶鑠金之在鑪方圓薄厚隨鎔制耳是故世之善惡俗之薄厚皆在於君主誠能使六合之內舉世之人咸懷方厚之情而無淺薄之惡各奉公正之心而無姦險之慮則羲農之俗復見於茲麟龍鸞鳳復畜于郊矣
