body:
  text: 春秋左氏傳下昭公元年楚公子圍會于虢虢鄭邑也尋宋之盟也宋盟在襄二十七年晉祁午謂趙文子曰宋之盟楚人得志於晉得志謂先歃也午祁奚子也今令尹之不信諸侯之所聞也子弗戒懼又如宋恐楚復得志也楚重得志於晉晉之恥也吾子其不可以不戒文子曰然宋之盟也子木有禍人之心武有仁人之心是楚所以駕於晉也駕猶陵也今武猶是心也楚又行僭僭不信非所害也武將信以為本循而行之譬如農夫是穮是蔉穮耘也壅苗為蔉雖有飢饉必有豐年言耕鋤不以水旱息必獲豐年之收且吾聞之能信不為人下吾未能也自恐未能信也詩曰不僭不賊鮮不為則信也僭不信賊害人能為人則者不為人下矣吾不能是難楚不為患也三年齊侯使晏嬰於晉叔向從之宴相與語叔向曰齊其何如問興衰也晏子曰此季世也齊其為陳氏矣公棄其民而歸於陳氏棄民不恤之也公聚朽蠹而三老凍餒三老謂上壽中壽下壽皆八十以上國之諸市屨賤踴貴踴刖足者履也言刖多也民人痛疾而或燠休之燠休痛念之聲謂陳氏也其愛之如父母而歸之如流水欲無獲民將焉避之叔向曰然雖吾公室今亦季世也庶人罷斃而宮室滋侈滋益也道殣相望餓死為殣而女富溢尤女嬖寵之家也民聞公命如逃寇讎政在家門大夫專政民無所依公室之卑其何日之有言今至也讒鼎之銘讒鼎名曰昧旦丕顯後世猶怠昧旦早起丕大也言夙興以務大顯後世猶懈怠況日不悛悛改也其能久乎晉之公族盡矣肸聞之公室將卑其宗族枝葉先落則公從之初景公欲更晏子之宅曰子之宅近市湫隘囂塵不可以居湫下隘小也囂聲塵土也請更諸爽塏者爽明也塏燥也辭曰君之先臣容焉先臣晏子之先人也臣不足以嗣之於臣侈矣侈奢也且小人近市朝夕得所求小人之利也公笑曰子近市識貴賤乎對曰既利之敢不識乎公曰何貴何賤於是景公繁於刑有鬻踴者故對曰踴貴屨賤景公為是省於刑君子曰仁人之言其利博哉晏子一言而齊侯省刑四年楚子使椒舉如晉求諸侯晉侯欲勿許司馬侯曰不可楚王方侈天或者欲逞其心以厚其毒而降之罰未可知也其使能終亦未可知也唯天所相相助也不可與爭君其許之而修德以待其歸若歸於德吾猶將事之況諸侯乎若適淫虐楚將棄之棄不以為君也吾又誰與爭公曰晉有三不殆其何敵之有殆危也國險而多馬齊楚多難多篡弒之難也有是三者何向而不濟對曰恃險與馬虞鄰國之難是三殆也四嶽岱華衡常三塗陽城太室荊山中南九州之險也是不一姓雖是天下至險無德則滅亡冀之北土燕代也馬之所生無興國焉恃險與馬不可以為固也從古以然是以先王務修德音以享神人亨通也不聞其務險與馬也鄰國之難不可虞也或多難以固其國啓其疆土或無難以喪其國失其守宇於國則四垂為宇若何虞難齊有仲孫之難而獲桓公至今賴之仲孫公孫無知晉有里丕之難而獲文公是以為盟主衛刑無難敵亦喪之閔二年狄滅衛僖二十五年衛滅邢故人之難不可虞也恃此三者而不修政德亡於不暇又何能濟君其許之紂作淫虐文王惠和殷是以殞周是以興夫豈爭諸侯乃許楚子合諸侯于申椒舉言於楚子曰臣聞諸侯無歸禮以為歸今君始得諸侯其慎禮矣霸之濟否在此會也夏啓有鈞臺之享啓禹子河南陽翟縣南有鈞臺陂商湯有景亳之命亳即偃師周武有孟津之誓成有岐陽之搜康有酆宮之朝穆有塗山之會齊桓有召陵之師在僖四年晉文有踐土之盟在僖二十八年皆所以示諸侯禮也諸侯所由用命也夏桀為仍之會有緡叛之仍緡皆國名商紂為黎之搜東夷叛之黎東夷國名周幽為大室之盟戎狄叛之大室中嶽也皆所以示諸侯汰也諸侯所由棄命也今君以汰無乃不濟乎王弗聽子産見左師曰吾不患楚矣汰而愎諫不過十年左師曰然不十年侈其惡不遠遠惡而後棄惡及遠方則人棄之善亦如之德遠而後興十三年楚弒其君五年公如晉自郊勞至于贈賄往有郊勞去有贈賄無失禮揖讓之禮晉侯謂汝叔齊曰魯侯不亦善於禮乎對曰魯侯焉知禮公曰何為自郊勞及贈賄禮無違者何故不知對曰是儀也不可謂禮禮所以守其國家行其政令無失其民者也今政令在家在大夫不能取也有子家羈不能用也羈莊公玄孫奸大國之盟淩虐小國謂伐莒取鄆利人之難謂往年莒亂而取鄫不知其私不自知有私難公室四分民食於他他謂三家思莫在公不圖其終無為公謀終始也為國君難將及身不恤其所禮之本末將於此乎在而焉習儀以亟言以習儀為急言善於禮不亦遠乎君子謂叔侯於是乎知禮時晉侯亦失政叔齊以此諷諫晉韓宣子如楚送女叔向為介及楚楚子朝其大夫曰晉吾仇敵也茍得志焉無恤其他今其來者上卿上大夫也若吾以韓起為閽刖足使守門也以羊舌肸為司宮加宮刑也足以辱晉吾亦得志矣可乎大夫莫對薳啓疆曰可茍有其備何故不可恥匹夫不可以無備況恥國乎是以聖王務行禮不求恥人城濮之役在僖二十八年晉無楚備以敗於邲在宣十二年邲之役楚無晉備以敗於鄢在成十六年自鄢以來晉不失備而加之以禮重之以睦君臣和也是以楚弗能報而求親焉既獲姻親又欲恥之以召寇讎備之若何言何以為備誰其重此言怨重也若有其人恥之可也謂有賢人以敵晉則可恥之若其未有君亦圖之晉之事君臣曰可矣求諸侯而麇至麇群也求婚而薦女薦進君親送之上卿及上大夫致之猶欲恥之君其亦有備矣不然奈何君將以親易怨失婚姻之親實無禮以速寇而未有其備使群臣往遺之禽以逞君心何不可之有王曰不穀之過也大夫無辱謝薳啓疆厚為韓子禮六年鄭人鑄刑書鑄刑書於鼎以為國之常法叔向使詒子産書曰昔先王議事以制不為刑辟懼民之有爭心也臨事制刑不豫設法法豫設則民知爭端猶不可禁禦是故間之以義間防也之以政行之以禮守之以信奉之以仁奉養也制為祿位以勸其從勸從教也嚴斷刑罰以威其淫淫放也懼其未也故誨之以忠聳之以行聳懼也教之以務時所急也使之以和悅以使民臨之以敬之以彊施之於事為斷之以剛義斷恩也猶求聖哲之上明察之官上公王也官卿大夫也忠信之長慈惠之師民於是乎可任使也而不生禍亂民知有辟則不忌於上權移於法故民不畏上也並有爭心以徵於書而徼幸以成之因危文以生爭緣徼幸以成其巧僞也弗可為矣為治也夏有亂政而作禹刑商有亂政而作湯刑夏商之亂著禹湯之法言不能議事以制周有亂政而作九刑周之衰亦為刑書謂之九刑也三辟之興皆叔世也言刑書不起於始盛之世今吾子相鄭國制參辟鑄刑書制參辟謂用三代之末法將以靖民不亦難乎詩曰儀式刑文王之德日靖四方言文王以德為儀式故能日有安靖四方之功刑法也又曰儀刑文王萬邦作孚言文王作儀法為天下所信也如是何辟之有言詩唯以德與信不以刑民知爭端矣將棄禮而徵於書以刑書為徵錐刀之末將盡爭之錐刀末喻小事亂獄滋豐賄賂並行終子之世鄭其敗乎肸聞之國將亡必多制數改法也其此之謂乎復書曰若吾子之言復報也僑不才不能及子孫吾以救世也晉韓宣子之適楚楚人弗逆公子棄疾及晉境晉侯將亦弗逆叔向曰楚僻我衷僻邪衷正若何效僻書曰聖作則則法也無寧以善人為則無寧寧也而則人之僻乎匹夫為善民猶則之況國君乎晉侯悅乃逆七年楚子之為令尹也為王旌以田王旌游至於軫芋尹無宇斷之曰一國兩君其誰堪之及即位為章華之宮納亡人以實之無宇之閽入焉有罪亡入章華宮無宇執之有司弗與曰執人於王宮其罪大矣執而謁諸王執無宇也無宇辭曰天子經略經營天下略有四海諸侯正封封疆有定分古之制也封略之內何非君土食土之毛誰非君臣毛草也天有十日甲至癸人有十等王至臺下所以事上上所以供神也今有司曰汝胡執人於王宮將焉執之周文王之法曰有亡荒閲荒大也閲搜也有亡人當大搜其衆也所以得天下也吾先君文王楚文王也作僕區之法僕區刑書名曰盜所隱器隱盜所得器與盜同罪所以封汝也行善法故能啓疆北至汝水也若從有司是無所執逃臣也逃而舍之王事無乃闕乎昔武王數紂之罪以告諸侯曰紂為天下逋逃主萃淵藪萃集也天下逋逃悉以紂為淵藪集而歸之故夫致死焉人欲致死討紂也君王始求諸侯而則紂無乃不可乎若以二文之法取之盜有所在矣言王亦為盜王曰取而臣以往往去也盜有寵未可得也盜有寵王自謂也遂舍之赦無宇也八年石言于晉魏榆魏榆晉地晉侯問於師曠曰石何故言對曰石不能言或憑焉謂有精神憑依石而言也不然民聽濫濫失也抑臣又聞之抑疑辭也曰作事不時怨讟動於民則有非言之物而言今宮室崇侈民力雕盡雕傷也怨讟並作莫保其性性命也民不敢自保其性命也石言不亦宜乎於是晉侯方築虒祁之宮虒祁地名叔向曰子野之言君子哉子野師曠字也君子之言信而有徵故怨遠於其身怨咎遠其身也小人之言僭而無徵故怨咎及之是宮也成諸侯必叛君必有咎夫子知之矣叔弓如晉賀虒祁也賀宮成游吉相鄭伯以如晉亦賀虒祁也史趙見子大叔曰甚哉其相蒙蒙欺也可弔也而亦賀之大叔曰若何弔也其非唯我賀將天下實賀言諸侯畏晉非獨鄭九年周甘人與晉閻嘉爭閻田甘人甘大夫閻嘉閻縣大夫晉梁丙張躍率陰戎伐潁陰戎陸渾之戎潁周邑王使詹桓伯辭於晉辭責讓之也桓伯周大夫曰文武成康之建母弟以藩屏周亦其廢墜是為為後世廢墜兄弟之國當救濟之也先王居檮杌于四裔以禦魑魅言檮杌略舉四凶之一也故允姓之姦居于瓜州允姓陰戎之祖與三苗俱放於三危也瓜州今敦煌也伯父惠公歸自秦而誘以來僖公十五年晉惠公自秦歸二十二年秦晉遷陸渾之戎於伊川使逼我諸姬入我郊甸戎有中國誰之咎也咎在晉后稷封殖天下今戎制之不亦難乎后稷修封疆殖五穀今戎得之唯畜牧也伯父圖之我在伯父猶衣服之有冠冕木水之有本源民人之有謀主也民人謀主宗族之師長伯父若裂冠毀冕拔本塞源專棄謀主雖戎狄其何有余一人伯父猶然則雖戎狄無所可責叔向謂宣子曰文之伯也豈能改物言文公雖霸未能改正朔易服色翼戴天子而加之以恭翼佐也自文以來世有衰德而暴蔑宗周宗周天子以宣示其侈諸侯之二不亦宜乎且王辭直子其圖之宣子悅使趙成如周致閻田反潁俘築郎囿季平子欲其速成叔孫昭子曰詩云經始勿亟庶人子來言文王始經營靈臺非急疾之衆民自以子義來勸樂為之焉用速成其以勦民也勦勞也無囿猶可無民其可乎十二年楚子次于乾溪在譙國城父縣南僕析父從楚大夫右尹子革夕子革鄭丹也夕暮見也王見語曰今吾使人於周求鼎其與我乎對曰與君王哉今周服事君王將唯命是從豈其愛鼎王曰昔我皇祖伯父昆吾舊許是宅陸終氏生六子長曰昆吾少曰季連季連楚之祖故謂昆吾為伯父也昆吾嘗居許故曰舊許是宅也今鄭人貪賴其田而不我與我若求之其與我乎對曰與君王哉周不愛鼎鄭何敢愛田王曰昔諸侯遠我而畏晉今我大城陳蔡不羹賦皆千乘諸侯其畏我乎對曰畏君王哉是四國者專足畏也四國陳蔡二不羹也又加之以楚敢不畏君王乎王入析父謂子革曰吾子楚國之望也今與王言如響國其若之何譏其順王心如響應聲子革曰摩厲以須王出吾刃將斬之矣以已喻鋒欲自摩厲以斷王之淫慝王出復語左史倚相趨過倚相楚史名也王曰是良史也能讀三墳五典八索九丘皆古書名對曰臣嘗問焉昔穆王欲肆其心周穆王肆極也周行天下將皆必有車轍馬跡焉祭公謀父作祈招之詩以止王心謀父周卿士也祈父司馬掌甲兵之職招其名王是以獲沒於祗宮獲沒不見篡弒臣問其詩而不知也若問遠焉其焉能知之王曰子能乎對曰能其詩曰祈招之愔愔式昭德音愔愔安和貌也式用也昭明也思我王度式如玉式如金金玉取其堅重形民之力而無醉飽之心言國之用民當隨其力任如金冶之器隨器而制形故言形民之力去其醉飽過盈之心王揖而入饋不食寢不寐數日深感子革之言不能自克以及於難克勝也仲尼曰古也有志克己復禮仁也信善哉楚靈王若能如此豈其辱於乾溪十三年季平子立而不禮於南蒯南蒯季氏費邑宰也南蒯以費叛叔弓圍費弗克敗焉為費人所敗平子怒令見費人執之以為囚俘冶區夫曰非也區夫魯大夫若見費人寒者衣之饑者食之為之令主而共其乏困費來如歸南氏亡矣民將叛之誰與居邑若憚之以威懼之以怒民疾而叛為之聚也若諸侯皆然費人無歸不親南氏將焉入乎平子從之費人叛南氏十五年晉荀吳帥師伐鮮虞圍鼓鼓白狄之別鼓人請以城叛穆子弗許左右曰師徒不勤而可以獲城何故不為穆子曰吾聞之叔向曰好惡不愆民知所適事無不濟愆過也適歸也或以吾城叛吾所甚惡也人以城來吾獨何好焉賞所甚惡若所好何無以復加所好若其弗賞是吾失信也何以庇民力能則進否則速退量力而行吾不可以欲城而邇姦所喪滋多使鼓人殺叛人而繕守備圍鼓三月鼓人或請降使其民見曰猶有食色姑修而城軍吏曰獲城而弗取勤民而頓兵何以事君也穆子曰吾以事君也獲一邑而教民怠將焉用邑邑以賈怠不如完舊完猶保守賈怠無卒卒終也棄舊不祥鼓人能事其君我亦能事吾君率義不爽好惡不愆城可獲而民知義所知義所在有死命而無二心不亦可乎鼓人告食竭力盡而後取之克鼓而反不戮一人十八年火始昏見火心星也梓慎曰七日其火作乎宋衛陳鄭也數日皆來告火裨曰不用吾言鄭又將火前年裨欲用瓘斝禳火子産不聽鄭人請用之子産不可子大叔曰寶以保民也若有火國幾亡可以救亡子何愛焉子産曰天道遠人道邇非所及也何以知之焉知天道是亦多言矣豈不或信多言者或時有中也遂不與亦不復火十九年楚子之在蔡也生太子建及即位使伍奢為之師費無極為少師無寵焉欲譖諸王曰建可室矣王為之聘於秦無極與逆勸王取之楚子為舟師以伐濮濮南夷也無極言於楚子曰晉之伯也邇於諸夏而楚僻陋故弗能與爭若大城城父而置太子城父今襄城城父縣以通北方王收南方是得天下王說從之故太子建居於城父鄭大水龍于時門之外洧淵時門鄭城門也國人請為榮焉子産弗許曰我龍不我覿覿見也龍我何覿焉禳之則彼其室也淵龍之室吾無求於龍龍亦無求我乃止也言子産之智二十年費無極言於楚子曰建與伍奢將以方城之外叛齊晉又交輔之將以害楚其事集矣王信之問伍奢奢對曰君一過多矣一過納建妻何信于讒王執伍奢忿奢切言使城父司馬奮揚殺太子未至而使遣之知太子冤故遣令去太子建走宋王召奮揚奮揚使城父人執己以至王曰言出於余口入於爾耳誰告建也對曰臣告之君王命臣曰事建如事余臣不佞佞才也不能茍二奉初以還奉初命以周旋不忍後命故遣之既而悔之亦無及巳王曰而敢來何也對曰使而失命召而不來是再奸也奸犯也逃無所入王曰歸從政如他日善其言舍使還無極曰奢之子才若在吳必憂楚國盍以免其父召之彼仁必來不然將為患王使召之曰來吾免而父棠君尚謂其弟員棠君奢之長子曰爾適吳我將歸死吾智不逮自以智不及員我能死爾能報聞免父之命不可以莫之奔也親戚為戮不可以莫之報也父不可棄俱去為棄父也名不可廢俱死為廢名爾其勉之伍尚歸奢聞員不來曰楚君大夫其旰食乎將有吳患不得早食楚人皆殺之員如吳言伐楚之利於州于州于吳子僚也齊侯疥遂痁店瘧疾也期而不瘳諸侯之賓問疾者多在多在齊梁丘據與裔款二子齊嬖大夫言於公曰吾事鬼神也豐於先君有加矣今君疾病為諸侯憂是祝史之罪諸侯不知其謂我不敬君盍誅於祝固史嚚以辭賓欲殺嚚固以辭謝來問疾之賓公悅告晏子晏子對曰日宋之盟屈建問范會之德於趙武武曰夫子之家事治言於晉國竭情無私其祝史祭祀陳信不愧其家事無猜其祝史不祈家無猜疑之事故祝史無求於鬼神建以語康王楚王也康王曰神人無怨宜夫子之光輔五君以為諸侯主也五君文襄靈成景也公曰據與款謂寡人能事鬼神故欲誅於祝史子稱是語也何故對曰若有德之君外內不廢無廢事也上下無怨動無違事祝史薦信無愧心矣君有功德祝史陳說之無所愧是以鬼神用饗國受其福祝史與焉與受國福也其所以蕃祉老壽者為信君使也其適遇淫君外內頗邪上下怨疾動作辟違斬刈民力暴虐淫縱肆行非度不思謗讟不憚鬼神神怒民痛無悛於心其祝史薦信是言罪也以實白神是為言君之罪其蓋失數美是矯誣也蓋掩也進退無辭則虛以求媚作虛辭以求媚於神是以鬼神不饗其國以禍之祝史與焉所以夭昏孤疾者為暴君使也公曰然則若之何對曰不可為也言非誅祝史所能治山林之木衡鹿守之澤之萑蒲舟鮫守之藪之薪蒸虞候守之海之鹽蜃祈望守之衡鹿舟鮫虞候祈望皆官名也言公專守山澤之利不與民共布常無藝藝法制也言布政無法制徵斂無度宮室日更淫樂不違違去也內寵之妾肆奪於市肆放也外寵之臣僭令於鄙詐為教令於邊鄙也民人苦病夫婦皆詛祝有益也詛亦有損聊攝以東聊攝齊西界也姑尤以西姑尤齊東界也其為人也多矣雖其善祝豈能勝億兆人之詛耶君若欲誅於祝史修德而後可公悅使有司寬政毀關去禁薄斂己責齊侯至自田晏子侍于遄臺子猶馳而造焉子猶梁丘據公曰唯據與我和夫晏子對曰據亦同也焉得為和公曰和與同異乎對曰異和如羹焉水火醯醢鹽梅以烹魚肉宰夫和之齊之以味濟其不及以泄其過濟益也泄減也君子食之以平其心君臣亦然亦如羹君所謂可而有否焉臣獻其否以成其可獻君之否以成君可君所謂否而有可焉臣獻其可以去其否是以政平而不奸民無爭心今據不然君所謂可據亦曰可君所謂否據亦曰否若以水濟水誰能食之若琴瑟之專一誰能聽之同之不可也如是二十五年會于黃父鄭子太叔見趙簡子簡子問揖讓周旋之禮焉對曰是儀也非禮也簡子曰敢問何謂禮對曰吉也聞諸先大夫子産曰夫禮天之經經者道之常也地之義義者利之宜也民之行行者人所履行天地之經而民實則之則天之明日月星辰天之明也因地之性高下剛柔地之性也生其六氣陰陽風雨晦明用其五行金木水火土也氣為五味酸辛苦甘發為五色青黃赤白黑發見也章為五聲宮商角徵羽淫則昏亂民失其性滋味聲色過則傷性也是故為禮以奉之制禮以奉其性民有好惡喜怒哀樂生于六氣此六者皆稟陰陽風雨晦明之氣是故審則宜類以制六志為禮以制好惡喜怒哀樂六志使不過節哀有哭泣樂有歌舞喜有施舍怒有戰哀樂不失乃能協于天地之性是以長久協和也簡子曰甚哉禮之大也對曰禮上下之紀天地之經緯也經緯錯居以相成也民之所以生也是以先王尚之故人之能自曲直以赴禮者謂之成人大不亦宜乎曲直以弼其性簡子曰鞅也請終身守此言也二十六年齊有彗星出齊之分野齊侯使禳之禳除晏子曰無益也祇取誣焉誣欺也天道不諂諂疑也不二其命若之何禳之且天之有彗以除穢也君無穢德又何禳焉若德之穢禳之何損詩曰惟此文王小心翼翼昭事上帝聿懷多福厥德不回以受方國翼翼恭也聿惟也回違也言文王德不違天人故四方之國歸往之君無違德方國將至何患於彗詩曰我無所監夏后及商用亂之故民卒流亡若德回亂民將流亡祝史之為無能補也公悅乃止齊侯與晏子坐于路寢公歎曰美哉室其誰有此乎景公自知德不能久有國故歎也晏子曰敢問何謂也公曰吾以為在德對曰如君之言其陳氏乎陳氏雖無大德而有施於民公厚斂焉陳氏厚施焉民歸之矣詩曰雖無德與汝式歌且舞義取雖無大德要有喜悅之心式用也陳氏之施民歌舞之矣後世若少惰陳氏而不亡則國其國也已公曰善哉是可若何對曰唯禮可以已之在禮家施不及國大夫不收公利不作福也公曰善哉我不能矣吾今而後知禮之可以為國也對曰禮之可以為國也久矣與天地並君令臣恭父慈子孝兄愛弟敬夫和妻柔姑慈婦聽禮也君令而不違臣恭而不二父慈而教子孝而針針諫也兄愛而友弟敬而順夫和而義妻柔而正姑慈而從從不自專也婦聽而婉婉順也禮之善物也公曰善哉二十七年楚左尹郤宛直而和國人悅之以直事君以和接類鄢將師為右領右領官名與費無極比而惡之謂子常曰子惡欲飲子酒子惡郤宛又謂子惡令尹欲飲酒於子氏子惡曰令尹將必來辱為惠已甚吾無以酬之若何酬報獻無極曰令尹好甲兵子出之吾擇焉取五甲五兵曰置諸門令尹至必觀之而從以酬之及饗日帷諸門左張帷陳兵甲其中無極謂令尹曰吾幾禍子子惡將為子不利甲在門矣子無往令尹使視郤氏則有甲焉不往召鄢將師而告之將師退遂令攻郤氏且爇之爇燒也子惡聞之自殺國人弗爇令尹炮之炮燔也盡滅郤氏之族黨殺陽令終與晉陳及其子弟皆郤氏黨國言未已進胙者莫不謗令尹進胙國中祭祀也謗詛也沈尹戌言於子常曰夫左尹與中廄尹莫知其罪而子殺之以興謗讟至於今不已左尹郤宛也中廄尹陽令終戌也惑之仁者殺人以掩謗猶弗為也今吾子殺人以興謗而弗圖不亦異乎夫無極楚之讒人也民莫不知去朝吳在十五年出蔡侯朱在二十一年喪太子建殺連尹奢在二十年屏王之耳目使不聰明不然平王之溫惠恭儉有過成莊所以不獲諸侯邇無極也邇近也今又殺三不辜以興大謗三不辜郤氏陽氏晉陳氏幾及子矣子而不圖將焉用之夫鄢將師矯子之命以滅三族三族國之良也吳新有君光新立疆場日駭楚國若有大事子其危哉智者除讒以自安今子愛讒以自危甚矣其惑也子常曰是瓦之罪敢不良圖子常殺費無極與鄢將師盡滅其族以說于國謗言乃止二十八年晉魏獻子為政魏舒也以司馬彌牟為塢大夫賈辛為祁大夫司馬烏為平陵大夫魏戊為梗陽大夫戊魏舒庶子謂賈辛司馬烏為有力於王室二十二年辛烏帥師納敬王故舉之魏子謂成鱄鱄晉大夫吾與戊也縣人其以我為黨乎對曰何也戊之為人也遠不忘君遠疏遠也近不逼同不逼同位居利思義不茍得在約思純無濫心雖與之縣不亦可乎昔武王克商光有天下其兄弟之國者十有五人姬姓之國者四十人皆舉親也夫舉無他唯善所在親疏一也賈辛將適其縣見於魏子魏子曰辛來今汝有力於王室吾是以舉汝行乎敬之哉毋墮乃力墮損也仲尼聞魏子之舉也以為義曰近不失親謂舉魏戊遠不失舉以賢舉可謂義矣又聞其命賈辛也以為忠先賞王室之功故為忠也曰魏子之舉也義其命也忠其長有後於晉國乎梗陽人有獄魏戊不能斷以獄上上魏子其大宗賂以女樂訟者之大宗魏子將受之魏戊謂閻沒女寬二人魏子屬大夫曰主以不賄聞於諸侯若受梗陽人賄莫甚焉吾子必諫皆許諾退朝待於庭魏子之庭饋入召之召二大夫食比置三歎魏子曰吾聞諸伯叔諺曰唯食忘憂吾子置食之閒三歎何也同辭而對曰或賜二小人酒不夕食言饑甚饋之始至恐其不足是以歎中置自咎曰豈將軍食之而有不足是以再歎及饋之畢願以小人腹為君子心屬厭而已屬足也言小人之腹飽猶知厭足君子心亦宜然獻子辭梗陽人言魏氏所以興定公四年鄭子大叔卒晉趙簡子為之臨甚哀曰黃父之會在昭二十五年夫子語我九言曰無始亂無怙富無恃寵無違同無敖禮無驕能以能驕人無復怒復重也無謀非德非所謀無犯非義言簡子能用善言所以遂興也吳子伐楚陳于柏舉敗之五戰及郢楚子濟江入于雲中入雲夢澤中王寢盜攻之以戈擊王王孫由于以背受之中肩王奔鄖鄖公辛之弟懷將弒王曰平王殺吾父我殺其子不亦可乎辛蔓成然之子辛也昭十四年楚平王殺成然也辛曰君討臣誰敢讎之君命天也若死天命將誰讎詩曰柔亦不茹剛亦不吐不侮鰥寡不畏彊禦唯仁者能之言仲山甫不避疆淩弱也違彊淩弱非勇也乘人之約非仁也滅宗廢祀非孝也殺君罪應滅宗動無令名非智也必犯是余將殺汝辛與其弟巢以王奔隨申包胥如秦乞師曰吳為封豕長蛇以荐食上國荐數也言吳貪害如蛇豕寡君失守社稷越在草莽使下臣告急秦伯使辭焉曰寡人聞命矣子姑就館將圖而告對曰寡君越在草莽未獲所伏伏猶處也下臣何敢即安立依庭牆而哭日夜不絶聲勺飲不入口七日秦師乃出五年申包胥以秦師至吳師大敗吳子乃歸楚子入于郢初楚王之奔隨也將涉於成臼江夏竟陵縣西有臼水藍尹舋涉其帑舋楚大夫不與王舟及寧王欲殺之寧安定也子西曰子常唯思舊怨以敗君何效焉王曰善使復其所吾以志前惡惡過王賞辛王孫由于申包胥懷皆從王有大功子西曰請舍懷也以初謀殺王故王曰大德滅小怨道也終從其兄免王大難是大德也申包胥曰吾為君也非為身也君既定矣又何求且吾尤子旗其又為諸子旗蔓成然也以有德於平王求無厭平王殺之遂逃賞九年鄭駟歂殺鄧析而用其竹刑鄧析鄭大夫欲改鄭所鑄之舊制不受君命而私造刑法書之於竹簡故言竹刑也君子謂子然於是不忠茍有可以加於國家者棄其邪可也加猶益棄不責其邪惡也故用其道不棄其人詩云蔽芾甘棠勿翦勿伐召伯所茇召伯決訟於甘棠之下詩人思之不伐其樹茇草舍也思其人猶愛其樹況用其道而不恤其人乎子然無以勸能矣哀公元年吳王夫差敗越于夫椒遂入越越子以甲楯五千保于會稽上會稽山使大夫種因吳太宰嚭以行成吳子將許之伍員曰不可臣聞之樹德莫如滋去疾莫如盡勾踐能親而務施施不失人所加惠賜皆得其人親不棄勞推親愛之誠則不遺小勞與我同壤而世為仇讎於是乎克而弗取將又存之違天長寇讎後雖悔之不可食已食消也已止也弗聽退而告人曰二十年之外吳其為沼乎謂吳宮室廢壞當為污池二十二年越入吳越及吳平吳之入楚在定四年使召陳懷公懷公朝國人而問焉曰欲與楚者右欲與吳者左陳人從田無田從黨無田者從黨而立逢猾當公而進不左不右曰臣聞國之興也以福其亡也以禍今吳未有福楚未有禍楚未可棄吳未可從也公曰國勝君亡非禍而何楚為吳所勝也對曰國之有是多矣何必不復小國猶復況大國乎臣聞國之興也視民如傷是其福也如傷恐驚動其亡也以民為土芥是其禍也芥草也楚雖無德亦不艾殺其民吳日敝於兵暴骨如莽而未見德焉禍之適吳其何日之有言今至也陳侯從之及夫差克越乃修舊怨言吳不修德而修怨所以亡吳師在陳楚大夫皆懼曰闔廬惟能用其民以敗我於柏舉今聞其嗣又甚焉將若之何子西曰二三子恤不相睦無患吳矣昔闔廬食不二味居不重席室不崇壇平地作室不起壇器不彤鏤彤丹也鏤刻也宮室不觀觀臺榭也舟車不飾衣服財用擇不取費選取堅厚不尚細靡在國天有災癘親巡孤寡而供其乏困在軍熟食者分而後敢食分猶遍其所嘗者卒乘與焉所嘗甘珍非常食勤恤其民而與之勞逸是以民不疲勞死知不曠知身死不見曠棄吾先大夫子常易之所以敗我易猶反今聞夫差次有臺榭陂池焉宿有妃嬙嬪御焉妃嬙貴者嬪御賤者皆內官也一日之行所欲必成玩好必從珍異是聚觀樂是務視民如讎而用之日新夫先自敗也已安能敗我六年楚有雲如衆赤鳥夾日而飛三日楚子使問諸周太史周太史曰其當王身乎日為人君妖氣守之故為當王身若禜之可移於令尹司馬禜禳祭王曰除腹心之疾而置諸股肱何益不穀不有大過天其夭諸有罪受罰又焉移之遂不禜孔子曰楚昭王知大道矣其不失國也宜哉十一年吳子將伐齊越子率其衆以朝焉王及列士皆有饋賂吳人皆喜唯子胥懼曰是豢吳也夫豢養也若人養犧牲非愛之將殺之諫曰越在我心腹之疾也壤地同而有欲於我欲得吳也得志於齊猶獲石田也無所用之石田不可耕越不為沼吳其泯矣使醫除病而曰必遺類焉者未之有也弗聽使於齊屬其子於鮑氏為王孫氏欲以避吳禍反役王聞之使賜之屬鏤以死屬鏤劍名將死曰樹吾墓檟檟可材也吳其亡乎三年其始弱矣盈必毀天之道也越人朝之伐齊勝之盈之極季孫欲以田賦丘賦之法因其田財通出馬一匹牛三頭今欲別其田及家財各為一賦故言田賦使冉有訪諸仲尼仲尼不對不公答而私於冉有曰君子之行也行政事度於禮施取其厚事舉其中斂從其薄如是則丘亦足矣丘十六井若不度於禮而貪冒無厭則雖以田賦將又不足且子季孫若欲行而法則周公之典在若欲茍而行之又何訪焉十四年小邾射以句繹來奔曰使季路要我吾無盟矣子路信誠故欲得與相要誓而不須盟也使子路子路辭季康子使冉有謂之曰千乘之國不信其盟而信子之言子何辱焉對曰魯有事于小邾不敢問故死其城下可也彼不臣而濟其言是義之也由弗能濟成也二十四年公子荊之母嬖荊哀公庶子將以為夫人使宗人舋夏獻其禮宗人禮官對曰無之公怒曰汝為宗司立夫人國之大禮也何故無之對曰周公及武公娶於薛武公敖也孝惠娶於商孝公稱惠公弗皇也商宋自桓以下娶於齊桓公始娶文姜此禮也則有若以妾為夫人則固無其禮也公卒立之而以荊為太子國人始惡之惡公也
