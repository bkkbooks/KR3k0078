body:
  text: 周禮天官惟王建國辯方正位別四方正君臣之位君南面臣北面之屬體國經野體猶分邦畿之度經野疆理其井廬也設官分職置冢宰司徒宗伯司馬司寇司空各有所職而百官事舉以為民極極中也令天下之人各得其中不失其所也乃立天官冢宰使帥其屬而掌其邦治以佐王均邦國掌主也邦治王所以治邦國者佐猶助也建邦之六典以佐王治邦國一曰治典以經邦國以治官府以紀萬民二曰教典以安邦國以教官府以擾萬民三曰禮典以和邦國以統百官以諧萬民四曰政典以平邦國以正百官以均萬民五曰刑典以詰邦國以刑百官以萬民六曰事典以富邦國以任百官以生萬民典常也法也王謂之禮經常所秉以理天下者也邦國官府謂之禮法常所守以為法式也擾猶馴也統猶合也詰猶禁也任猶倳也生猶養也以八柄詔王馭群臣一曰爵以馭其貴二曰祿以馭其富三曰予以馭其幸四曰置以馭其行五曰生以馭其福六曰奪以馭其貧七曰廢以馭其罪八曰誅以馭其過柄所秉執以起事者也詔告也助也爵謂公侯伯子男卿大夫士也祿所以富臣下也幸謂言行偶合於善則有以賜與之勸後也生猶養也賢臣之老者王有以養之也奪謂臣有大罪沒入家財者也誅責讓也以八統詔王馭萬民一曰親親二曰敬故三曰進賢四曰使能五曰保庸六曰尊貴七曰達吏八曰禮賓統所以總物者也親親若堯親九族也敬故不慢舊也賢有善行也能多才藝也保庸安有功也尊貴尊天下之貴者也達吏察舉勤勞之小吏也禮賓賓客諸侯所以示民親仁善鄰也歲終則令百官府各正其治受其會正正處也會大計也三歲則大計群吏之治而誅賞三載考績也膳夫掌王之食飲膳羞大喪則不舉大荒則不舉大札則不舉天地有災則不舉邦有大故則不舉大荒凶年也大札疫癘也天災日月晦食也地災崩動也大故刑殺也春秋傳曰司寇行戮君為之不舉地官大司徒之職掌建邦之土地之圖與其人民之數以佐王安擾邦國教所以親百姓訓五品也擾亦安也言饒衍也而施十有二教焉一曰以祀禮教敬則民不茍二曰以陽禮教讓則民不爭三曰以陰禮教親則民不怨四曰以樂禮教和則民不乖五曰以儀辯等則民不越六曰以俗教安則民不愉七曰以刑教中則民不虣八曰以誓教恤則民不怠九曰以度教節則民知足十曰以世事教能則民不失職十有一曰以賢制爵則民慎德十有二曰以庸制祿則民興功陽禮謂鄉射飲酒也陰禮謂男女之禮也昏姻以時則男不曠女不怨也儀謂君南面臣北面父坐子伏之屬也俗謂土地所生習也愉謂朝不謀夕也恤謂災厄相憂也民有凶患憂之則民不懈怠也度謂宮室車服之制也世事謂士農工商之事少而習焉其心安焉因教以能不易其業也慎德謂矜其善德勸為善也庸功也爵以顯賢祿以賞功也以保息六畜萬民一曰慈幼二曰養老三曰振窮四曰恤貧五曰寬疾六曰安富保息謂安之使蕃足也慈幼愛少也養老七十養於學五十異粻之屬也振窮救天民之窮者也恤貧貧無財業稟食貸之也寬疾若今癃不可事不筭卒也安富平傜役不專取之也以鄉三物教萬民而賓興之一曰六德智仁聖義忠和二曰六行孝友睦姻任恤三曰六藝禮樂射馭書數物猶事也興猶舉也民三事之教成鄉大夫舉其賢者能者以飲酒之禮賓客之既則獻其書於王矣智明於事也仁愛人以及物也聖通而先識也義能斷時宜也忠言以中心也和不剛不柔也善於父母為孝善於兄弟為友睦親於九族也姻親於外親也任信於友道也恤振憂貧者禮五禮之儀也樂六樂之歌舞也射五射之法也御五御之節也書六書之品也數九數之計也以五禮防萬民之偽而教之中禮所以節止民之侈偽使其行得中也五禮謂吉凶賓軍嘉以六樂防萬民之情而教之和樂所以蕩正民之情思使其心應和也六樂謂雲門咸池大韶大夏大濩大武也鄉師以歲時巡國及野而賙萬民之艱阨以王命施惠歲時者隨其事之時不必四時也艱阨饑乏者也師氏掌以美詔王告王以善道也文王世子曰師者教之以事而諭諸德者也以三德教國子一曰至德以為道本二曰敏德以為行本三曰孝德以知逆惡也教三行一曰孝行以親父母二曰友行以尊賢良三曰順行以事師長德行外內之稱也在心為德施之為行也至德中和之德覆燾持載含容者也敏德仁義順時者也孝德尊祖愛親守其所以生者也孔子曰武王周公其達孝矣乎夫孝善繼人之志善述人之事也保氏養國子以道乃教之六藝一曰五禮二曰六樂三曰五射四曰五馭五曰六書六曰九數乃教之六儀一曰祭祀之容二曰賓客之容三曰朝廷之容四曰喪紀之容五曰軍旅之容六曰車馬之容養國子以道者以師氏之德行審諭之而後教之以藝儀也五射白矢參連剡注襄尺井儀也五馭鳴和鑾逐水曲過君表舞交衢逐禽左也六書象形會意轉注指事假借諧聲也九數方田粟米差分少廣商功均輸贏不足旁要方程今有重差夕桀句股也祭祀之容穆穆皇皇賓客之容嚴恪矜莊朝廷之容躋躋蹌蹌喪紀之容纍纍顛顛軍旅之容暨暨詻詻車馬之容匪匪翼翼司救掌凡歲時有天患民病則以節巡國中及郊野而以王命施惠天惠謂災害也節旌節也施惠賙恤春官大司樂以樂德教國子中和祗庸孝友中猶忠也和剛柔適也祗敬也庸有常也凡日月食四鎮五嶽崩大傀異災諸侯薨令去樂四鎮山之重大者也謂會稽沂山醫無閭霍山也五嶽岱衡華嵩恆也傀猶怪也大怪異災謂天地奇變若星辰奔霣及震裂為害者也去樂藏之也大札大凶大災大荒大臣死凡國之大憂令弛縣札疫癘凶凶年也災水火也弛釋下之也凡建國禁其淫聲過聲凶聲慢聲淫聲若鄭衛也過聲失哀樂節也凶聲亡國之聲若桑閒濮上也慢聲惰慢不恭之聲夏官大司馬之職掌建邦國之九法以佐王平邦國平成也正也制畿封國以正邦國封謂立封於疆為界設儀辯位以等邦國儀謂諸侯諸臣之儀進賢興功以作邦國作起也起其進善樂業之心建牧立監以維邦國維猶連結制軍詰禁以邦國詰窮治也正也施貢分職以任邦國職謂賦稅也任猶事也簡稽鄉民以用邦國稽計也均守平則以安邦國均謂尊者守大卑者守小也此小事大以和邦國比猶親使大國親小國小國事大國以九伐之法正邦國諸侯有違王命則出兵征伐而正也馮弱犯寡則眚之眚猶人眚瘦也四面削其地賊賢害民則伐之有鐘鼓曰伐以聲其罪暴內陵外則壇之置之空壇之中別立君也野荒民散則削之田不治民不附則削其地也負固不服則侵之侵用兵淺侵之而已賊殺其親則正之正殺也放弒其君則殘之殘滅其為惡者犯令陵政則杜之犯令逆命也陵政輕法也杜塞使不得與諸侯通外內亂鳥獸行則滅之仲春教振旅師出曰治兵入曰振旅皆習戰也四時獵各教民以其一焉遂以蒐田蒐擇也擇取禽獸不孕者仲夏教拔舍拔舍猶草舍軍有草止之法遂以苗田夏田為苗簡取禽獸不孕任若治苗去不秀實者也仲秋教治兵遂以獮田獮猶殺也中殺者多仲冬教大閱大閱簡軍實備禮不如出軍時遂以狩田冬田為狩言守取之無所擇也司勳掌等其功等猶差也以功大小為差等凡有功者銘書於王之大常祭於大烝銘之言名也生則書於王旌以識其人與其功也死則於烝先王祭之冬祭曰烝王旌畫日月為大常也凡賞無常輕重視功無常者功之大小不可豫秋官大司寇之職掌建邦之三典以佐王刑邦國詰四方一曰刑新國用輕典新國謂新闢地立君之國也二曰刑平國用中典三曰刑亂國用重典亂國謂篡殺叛逆之國也以圓土聚教疲民圓土獄城也聚疲民其中困苦以教之為善也民不愍作勞有似於疲也凡害人者寘之圓土而施職事焉以明刑恥之明刑謂明書其罪於大方板以著背也職事謂役使之也其能改者反于中國不齒三年其不能改而出圓土者殺以嘉石平疲民疲民謂為邪惡者也凡萬民之有罪過而未麗於法而害於州里者桎梏而坐諸嘉石役諸司空州里任之則宥而舍之有罪過謂邪惡之人所罪過者也麗附也未附於法未著於法也役諸司空坐日訖使給百工之役役月訖使其州里之人任之乃赦之也以肺石達窮民肺石赤石也窮民天民之窮而無告者凡遠近惸獨老幼之欲有復於上而其長弗達者立於肺石三日士聽其辭以告於上而罪其長復白也長謂諸侯及所屬吏小司寇凡命夫命婦不躬坐獄訟命夫謂大夫也命婦謂大夫妻也若有罪不自身坐使其屬及子弟也凡王同族有罪不即市刑於甸師氏也以五聲聽獄訟求民情一曰辭聽辭不直則煩也二曰色聽色不直則赧也三曰氣聽氣不直則喘也四曰耳聽耳不直則惑也五曰目聽目不直則眊然以八辟麗邦法附于刑罰辟法也麗附也一曰議親之辟若今時宗室有罪先請是也二曰議故之辟故謂舊也三曰議賢之辟若今時廉吏有罪先請是也四曰議能之辟能謂有道藝者五曰議功之辟謂有大勳力立功者也六曰議貴之辟若今時吏墨綬有罪先請是也七曰議勤之辟謂憔悴事國者八曰議賓之辟謂所不臣者三恪二代之後與司刺掌三刺三宥三赦之法以贊司寇聽獄訟刺殺也致三問之然後殺一刺曰訊群臣再刺曰訊群吏三刺曰訊萬民訊言問也壹宥曰不識再宥曰過失三宥曰遺忘不識謂愚民無所識也宥寬也壹赦曰幼弱再赦曰老耄三赦曰憃愚憃愚生而癡騃也赦謂免其罪也以此三法者求民情然後刑殺小行人若國札喪則令賻補之賻喪家補其不足若國凶荒則令賙委之委輸也若國師役則令犒禬之犒勞也合助相振為會若國有福事則令慶賀之若國有禍災則令哀弔之掌客凡禮賓客國新殺禮凶荒殺禮札喪殺禮禍災殺禮在野在外殺禮殺減也國新新建國也凶荒無年也札喪疫癘也禍災新有兵寇及水火也在野行軍在外也文傳解天有四殃水旱饑荒其至無時非務積聚何以備之夏箴曰小人無兼年之食遇天饑妻子非其有也大夫無兼年之食遇天饑臣妾輿馬非其有也國無兼年之食遇天饑百姓非其百姓也戒之哉不思禍咎無日矣言不遠也明開塞禁舍者其取天下如化變化之頓謂其疾不明開塞禁舍者其失天下如化不明謂失其機兵彊勝人人彊勝天勝天勝有天命能制其有者能制人之有不能制其有者人制之令行禁止王之始也官人富貴者觀其有禮施貧窮者觀其有德守嬖寵者觀其不驕奢隱約者觀其不懾懼其少者觀其恭敬好學而能弟其壯者觀其潔廉務行而勝其私其老者觀其思慎彊其所不足而不踰父子之閒觀其慈孝兄弟之閒觀其和友君臣之閒觀其忠惠鄉黨之閒觀其信誠設之以謀以觀其智示之以難以觀其勇煩之以事以觀其治臨之以利以觀其不貪濫之以樂以觀其不荒喜之以觀其輕怒之以觀其重醉之以觀其失縱之以觀其常遠之以觀其不貳昵之以觀其不狎復徵其言以觀其精曲省其行以觀其備此之謂觀誠芮良夫解厲王失道芮伯陳誥作芮良夫芮伯若曰余小臣良夫稽首謹誥天子惟民父母致厥道無遠不服無道左右臣妾乃違道謂德政違叛之民歸於德德則民戴否德民讎茲允效於前斯不遠信驗於前世不遠也商紂弗改夏桀之虐肆我有周有家舉桀行惡滅亡以為戒也嗚呼惟爾天子嗣文武之業惟爾執政小子同先王之臣昏行內顧道王不若同謂位同也昏闇也言教王為不順專利作威佐亂進禍民將弗龕專利侵亂進不善也治亂信干其行惟王暨爾執政小子攸聞行善則治行惡則亂皆所聞知也古人求多聞以鑒戒弗聞是惟弗知言古人患不聞故有所不知也爾聞爾知弗改厥度亦惟艱哉知而不改無可如何故曰難也夫后除民害不惟民害害民乃非后惟其讎是與民為怨讎民至億兆后一而已寡弗敵眾后其殆哉言上下無義對共相怨則寡者危已烏虖野禽馴服於人家畜見人而奔非禽畜之性實惟人民亦如之人養之故擾服雖家畜不養則畏人治民亦然也今爾執政小子惟以貪諛事王專利為貪面從為諛不對以備難下民胥怨財單力竭手足靡措弗龕戴上不其亂而言民相與怨上上加之罪民不堪命必作亂也惟禍發於人之攸忽咎起於人攸輕心不存焉變之攸伏言人所輕忽則禍之所起爾執政小子弗圖大艱偷生茍安爵以賄成茍安無遠慮賄成不任德賢智拑口小人鼓舌逃害要利並得其求惟曰哀哉賢者隱黜以逃害小人佞諂以要利各得其求故君子為之哀也我聞曰以言取人人飾其言以行取人人竭其行飾言無庸竭行有成惟爾小子飾言事王實蕃有徒爾自謂有餘余謂爾不足敬思以明德備乃禍難言其不足於道義也以用乃汝難至而悔悔將安及周語景王二十一年將鑄大錢單穆公曰不可古者天災降戾降下也戾至也災謂水旱蝗螟之屬於是乎量資幣權輕重以振救民量猶度也資財也權稱也振拯也民患輕則為之作重幣以行之民患幣輕而物貴則作重以行其輕於是乎有母權子而行民皆得焉重曰母輕曰子貿物物輕則子獨行物重則以母權而行之也子母相權民皆得其欲也若不堪重則多作輕而行之亦不廢重於是乎有子權母而行小大利之堪任也不任之者幣重物輕妨其用也故作輕幣雜而用之以重者貿其貴以輕者貿其賤也子權母者母不足則以子平之而行之也故錢小大民皆以為利也今王廢輕而作重民失其貨能無匱乎廢輕而作重則本竭而末寡也故民失其貨若匱王用將有所乏民財匱無以供上故王用將乏也乏則將厚取於民厚取厚斂也民不給將有遠志是離民也給共也遠志逋逃也且夫備有未至而設之備國備也未至而設之謂豫備不虞安不忘危有至而後救之至而後救之謂若救火療疾量資幣平輕重之屬是不相入也二者前後各有宜不相入不相為用可先而不備謂之怠怠緩也可後而先之謂之召災謂民未患輕而重之離民匱財是為召災周固羸國也天未厭禍焉而又離民以佐災無乃不可乎言周故已為羸病之國天降禍災未厭已將民之與處而離之將災是備禦而召之則何以經國君以善政為經臣奉而成之為緯也國無經何以出令令之不從上之患也故聖王樹德於民以除之樹立也除除令不從之患也絕民用以實王府絕民用謂廢小錢斂而鑄大也猶塞川原為潢污也其竭也無日矣大曰潢小曰污竭盡也無日無日數也若民離財匱災至備亡王其若之何備亡無救災之備也王弗聽二十三年王將鑄無射無射鐘名律中無射單穆公曰不可作重幣以絕民貨又鑄大鐘以鮮其繼鮮寡也寡其繼者用物過度妨於財也若積聚既喪又鮮其繼生何以殖積聚既喪謂廢小錢也生財也殖長也今王作鐘也無益於樂而鮮民財將焉用之夫樂不過以聽耳而美不過以觀目若聽樂而震觀美而眩患莫甚焉夫耳目心之樞機也樞機發動也心有所欲耳目發動也故必聽和而視正聽和則聰視正則明習於和正則不眩惑也聰則言聽明則德昭聽言昭德民歆而德之則歸心焉歆猶欣歆喜服也言發德教是以作無不濟求無不獲然則能樂夫耳納和聲而口出美言耳聞和聲則口有美言此感於物也以為憲令憲法也而布諸民民以心力行之不倦成事不貳樂之至也貳變也若視聽不和而有震眩於是乎有狂悖之言有眩惑之明出令不信有轉易也刑政放紛動不順時民無據依不知所力各有離心不知所為盡力上失其民作則不濟求則不獲其何以能樂三年之中而有離民之器二焉二謂作大錢鑄大鐘國其危哉王弗聽問之伶州鳩伶司樂官州鳩名也對曰夫匱財用疲民力以逞淫心逞怏也聽之不和比之不度無益於教而離民怒神非臣之所聞也王不聽卒鑄大鐘財匱故民離樂不和故神怒也二十四年鐘成伶人告和伶人樂人王謂伶州鳩曰鐘果和矣對曰未可知也州鳩以為鐘實不和伶人媚王謂之和故曰未可知王曰何故對曰上作器民備樂之則為和言聲音之道與政通也今財亡民疲莫不怨恨臣不知其和也亂世之音怨以怒故曰不知其和且民所曹好鮮其不濟曹群也其所曹惡鮮其不廢諺曰眾心成城眾心所好莫之能敗其固如城眾口鑠金鑠消也眾口所毀雖金石猶可消今三年之中而害金再興焉害金害民之金謂錢鐘也懼一之廢也二金中其一必廢也王曰爾老耄矣何知二十五年王崩鐘不和王崩而言不和明樂人之諛晉語武公伐翼弒哀侯止欒共子曰茍無死共子晉大夫共叔成也吾以子為上卿制晉國之政辭曰成聞之民生於三事之如一三君父師也如一服勤至死也父生之師教之君食之食謂祿也唯其所在則致死焉在君父為君父在師為師也人之道也臣敢以私利廢人道乎私利謂不死為上卿也君何以訓矣無以教為忠也從君而貳君焉用臣貳二心也遂而死文公問於郭偃郭偃卜偃曰始也吾以國為易易易治也今也難對曰君以為易其難也將至矣君以為難其易也將至矣以為難而勤修之故其易將至趙宣子言韓獻子於靈公為司馬宣子趙宣孟也獻子韓厥也司馬掌軍大夫也河曲之役趙孟使人以其乘車干行干犯也行軍列也獻子執而戮之宣子召而禮之曰吾聞事君者比而不黨比比義也阿私曰黨夫周以舉義比也忠信曰周舉以其私黨也夫軍事有死無犯犯而不隱義也在公為義吾言汝於君懼汝不能也舉而不能黨孰大焉事君而黨吾何以從政勉之茍從是行也勉之勸修其志是行今所行也臨長晉國者非汝其誰臨監也長帥也皆告諸大夫曰二三子可以賀我矣吾舉厥也而中吾乃今知免於罪矣叔向見司馬侯之子撫而泣之曰自其父之死吾莫與比而事君矣昔者其父始之我終之謂有所造為及諫爭相為終始成其事也我始之夫子終之無不可無不可言皆從藉偃在側曰君子有比乎君子周而不比故偃問之叔向曰君子比而不別比德以贊事比也贊佐引黨以封己引取也封厚也利己而忘君別也別為朋黨靈王為章華之臺章華地名與伍舉升焉曰美夫對曰臣聞國君服寵以為美服寵謂以賢受寵服以是為美安民以為樂以能安民為樂聽德以為聰聽用有德也致遠以為明能致遠人不聞其以土木之崇高彤鏤為美彤謂丹楹鏤謂刻桷也先君莊王為匏居之臺匏居臺名高不過望國氛氛祲氣也大不過容宴豆言宴有折俎籩豆之陳木不妨守備不妨城郭守備之材用不煩官府財用不出府藏也民不廢時務官不易朝常先君是以除亂克敵而無惡於諸侯今君為此臺也國民疲焉財用盡焉年穀敗焉敗廢其時務也百官煩也為之徵發數年乃成臣不知其美也夫美也者上下外內小大遠邇皆無害焉故曰美也若於目觀則美於目則美德則不也財用則匱是聚民利以自封而瘠民也胡美之為封厚也胡何何以為美夫君國者將民之與處民實瘠君安得肥安得獨肥言將有患故先王之為臺榭也積土為臺無室曰榭榭不過講軍實講習也軍實戎土也臺不過望氛祥凶氣為氛吉氣為祥其所不奪穡地稼穡之地其為不匱財用為作也其事不煩官業業事也其日不廢時務以農隙也瘠磽之地於是乎為之不害穀土也磽確城守之木於是乎用之城守之餘然後用之官寮之暇於是乎臨之暇閒也四時之隙於是乎成之隙空閒時夫為臺榭將以教民利也臺所以望氛祥而備災害榭所以講軍實而禦寇亂皆所以利民也不知其以匱之也知猶聞若君謂此美而為之正以為得事之正也楚其殆矣殆危也且廷見令尹子常且楚大夫子常囊瓦子常與之語問畜貨聚馬歸以語其弟曰楚其亡乎不然令尹其不免乎吾見令尹問畜聚積實如餓豺狼實財也殆必亡者昔子文三舍令尹無一日之積恤民之故也積儲也成王每出子文之祿必逃王止而後復人謂子文曰人生求富而子逃之何也對曰夫從政者以庇民也庇覆也民多曠者而我取富焉曠空也是勤民以自封也勤勞也封厚也死無日矣我逃死非惡富也故莊王之世滅若敖氏唯子文之後在至于今為楚良臣是不先恤民而後已之富乎今子常先大夫之後先大夫子囊也而相楚君無令名於四方四境盈壘盈滿也壘壁也言壘壁滿四境之內道殣相望道冢曰殣是之不恤而畜聚不厭其速怨於民多矣速召也積貨滋多蓄怨滋厚不亡何待期年子常奔鄭王孫圉聘於晉王孫圉楚大夫也定公饗之趙簡子相問於王孫圉曰楚之白珩猶在乎珩佩上之橫者對曰然簡子曰其為寶也幾何矣幾何世也曰未嘗為寶楚之所寶者觀射父言以賢為寶也能作訓辭以行事於諸侯言以訓辭交結諸侯也使無以寡君為口實口實毀弄也又有左史倚相能道訓典以敘百物敘次也物事也以朝夕獻善敗于寡君無忘先王之業又能上下悅于鬼神悅媚也使神無有怨痛于楚國痛疾也又有藪曰雲金木竹箭之為生也楚有雲夢之藪澤也龜珠齒角皮革羽毛所以備賦以戒不虞者也龜所以備吉凶珠所以衛火災角所以為弓弩齒所以為弭賦兵賦也所以供幣帛以亨於諸侯亨獻也寡君其可以免罪於諸侯而國民保焉保安也此楚國之寶也若夫白珩先王之玩也何寶焉玩玩弄之物也韓詩外傳楚莊王聽朝罷晏樊姬下堂而迎之曰何罷之晏乎莊王曰今者聽忠賢之言不知飢倦也姬曰王之所謂忠賢者諸侯之客與中國之士與莊王曰則沈令尹也樊姬掩口而笑王曰姬之所笑者何等也姬曰妾得侍於王十有一年矣然妾未嘗不遣人求美人而進於王也與妾同列者十人賢於妾者二人妾豈不欲擅王之愛專王之寵哉不敢以私願蔽眾美也今沈令尹相楚數年矣未嘗見進賢而退不肖也又焉得為忠賢乎莊王以樊姬之言告沈令尹令尹進孫叔敖叔敖治楚三年而楚國霸樊姬之力也高牆豐上激下未必崩也降雨興流潦至則崩必先矣草木根荄淺未必橛也飄風興暴雨墜則橛必先矣君子居是國也不崇仁義尊其賢臣以理萬物未必亡也一旦有非常之變諸侯交爭人趨車馳汨然禍至乃始愁憂乾喉焦脣仰天而歎庶幾乎望天之救也不亦晚乎田饒事魯哀公而不見察謂哀公曰臣將去君黃鵠舉矣哀公曰何謂也田饒曰君獨不見夫乎頭戴冠者文也足傅距者武也敵在前敢者勇也見食相告者仁也守夜不失時者信也雞雖有此五德君猶烹而食之者何也則以其所從來者近也夫黃鵠一舉千里止君園池食君魚啄君黍粱無此五者君猶貴之者何也以其所從來者遠也臣將去君黃鵠舉矣哀公曰止吾書子之言也田饒曰臣聞食其食者不毀其器蔭其樹者不折其枝有臣不用何書其言為遂去之燕燕以為相三年燕政大平哀公喟然大息為之避寢三月曰不慎其前而悔其後何可復得孔子曰士有五有埶尊貴者有家富厚者有資勇悍者有心智慧者有貌美好者埶尊貴不以愛民行義理而反以暴傲家富厚不以振窮救不足而反以侈靡無度資勇悍不以衛上攻戰而反以侵淩私心智慧不以端計數而反以事姦飾詐貌美好不以統朝民而反以蠱女從欲此五者所謂士失其美質也原天命治心術理好惡適情性而治道畢矣原天命則不惑禍福不惑禍福則動靜脩理矣治心術則不妄喜怒不妄喜怒則賞罰不阿矣理好惡則不貪無用不貪無用則不以物害性矣適情性則欲不過節欲不過節則養性知足矣四者不求於外不假於人反諸己而已天設其高而日月成明地設其厚而山陵成居上設其道而百事得序人有六情失之則亂從之則睦故聖王之教其民也必因其情而節之以禮必從其欲而制之以義義簡而備禮易而法去情不遠故民之從命也速智如原泉行可以為表儀者人師也智可以砥礪行可以為輔檠者人友也據法守職而不敢為非者人吏也當前快意一呼再諾者人隸也故上主以師為佐中主以友為佐下主以吏為佐危亡之主以隸為佐欲觀其亡必由其下故同明者相見同聽者相聞同志者相從非賢者莫能用賢故輔佐左右所任使有存亡之機得失之要也可無慎乎昔者不出戶而知天下不闚牖而知天道者非目能見乎千里之前非耳能聞乎萬里之外以己之度度之也以己之情量之也己欲衣食焉亦知天下之欲衣食也己欲安逸焉亦知天下之欲安逸也己有好惡焉亦知天下之有好惡也此三者聖王之所以不降席而匡天下者也故君子之道忠恕而已矣夫饑渴苦血氣寒暑動肌膚此四者民之大害也大害不除未可敢御也四體不掩則鮮仁人五藏空虛則無立士百姓內不乏食外不患寒乃可御以禮矣藍有青而絲假之青於藍地有黃而絲假之黃於地藍青地黃猶可假也仁義之士可不假乎哉東海之魚名曰鰈比目而行北方有獸名曰婁更食更候南方有鳥名曰鶼比翼而飛夫鳥獸魚猶知假而況萬乘之主乎而獨不知比假天下之英雄俊士與之為伍則豈不痛哉故曰以明扶明則升于天以明扶闇則歸其人兩瞽相扶不觸牆木不陷井則其幸也福生於無為而患生於多欲故知足然後富從之德宜君人然後貴從之故貴爵而賤德者雖為天子不貴矣貪物而不知止者雖有天下不富矣夫土地之生物不益山澤之出財有盡懷不富之心而求不益之物挾百倍之欲而求有盡之財是桀紂之所以失其位也古者必有命民民有能敬長憐孤取舍好讓居事力者命於其君命然後得乘車並馬未得命者不得乘乘皆有罰故其民雖有餘財侈物而無禮義功德即無所用其餘財物故其民皆興仁義而賤財利賤財利即不爭不爭即彊不淩弱眾不暴寡是唐虞之所以象典刑而民莫犯法民莫犯法而亂斯止矣趙王使人於楚鼓瑟而遣之曰必如吾言慎無失吾言使者受命伏而不起曰大王鼓瑟未嘗若今日之悲也王曰然瑟固方調使者曰調則可記其柱王曰不可天有燥濕絃有緩急柱有推移不可記也使者曰臣請借此以喻楚之去趙也千有餘里且有凶則弔之吉則賀之猶柱之有推移不可記也故明王之使人也必慎其所使既使之任之以心不任以辭也趙簡子有臣曰周舍立於門下三日三夜簡子使問之曰子欲見寡人何事周舍對曰願為愕愕之臣墨筆操牘從君之過而日有記也月有成也歲有效也簡子居則與之居出則與之出居無幾何而周舍死簡子後與諸大夫飲於洪波之臺酒酣簡子涕泣諸大夫皆出走曰臣有罪而不自知也簡子曰大夫無罪昔者吾友周舍有言曰千羊之皮不若一狐之掖眾人之唯唯不若直士之愕愕昔者紂默默而亡武王愕愕而昌今自周舍之死吾未嘗聞吾過也吾亡無日矣是以寡人泣也晉平公游於河而樂曰安得賢士與之樂此也船人蓋胥跪而對曰主君亦不好士耳夫珠出於江海玉出於崑山無足而至者猶主之好之也士有足而不至者蓋主君無好士之意耳何患於無士乎平公曰吾食客門左千人門右千人朝食不足夕收市賦暮食不足朝收市賦吾可謂不好士乎蓋胥對曰夫鴻鵠一舉千里所恃者六翮耳背上之毛腹下之毳益一把飛不為加高損一把不為加下今君之食客將皆背上之毛腹下之毳耳詩曰謀夫孔多是用不就此之謂也宋燕相齊見逐罷歸之舍召門尉陳饒等二十六人曰諸大夫有能與我赴諸侯者乎陳饒等皆伏而不對燕曰悲乎哉何士大夫易得而難用也陳饒對曰非士大夫易得而難用君弗能用也君不能用則有不平之心是失之己而責諸人也燕曰其說云何對曰三升之稷不足於士而君雁鶩有餘粟是君之一過也果園梨栗後宮婦女以相提挃而士曾不得一嘗是君之二過也綾紈綺穀靡麗於堂從風而弊士曾不得以為緣是君之三過也且夫財者君之所輕也死者士之所重也君不能行君之所輕而欲使士致其所重譬猶鉛刀畜之干將用之不亦難乎宋燕曰是燕之過也魏文侯問狐卷子曰父賢足恃乎對曰不足子賢足恃乎對曰不足兄賢足恃乎對曰不足弟賢足恃乎對曰不足臣賢足恃乎對曰不足文侯勃然作色而怒曰何也對曰父賢不過堯而丹朱放子賢不過舜而瞽叟頑兄賢不過舜而象敖弟賢不過周公而管叔誅臣賢不過湯武而桀紂伐望人者不至恃人者不久君欲治亦從身始人何可恃乎詩云自求伊祐此之謂也昔者田子方出見老馬於道喟然有志焉以問於御曰此何馬御曰故公家畜也疲而不為用故出放之田子方曰少盡其力而老棄其身仁者不為也束帛而贖之窮士聞之知所歸心矣魏文侯問李克曰人有惡乎對曰有夫貴者則賤者惡之富者則貧者惡之智者則愚者惡之文侯曰行此三者使人勿惡可乎對曰可臣聞貴而下賤則眾弗惡也富能分貧則窮乏士弗惡也智而教愚則童蒙者不惡也文侯曰善人主之疾十有二發非有賢醫莫能治也何謂十二發曰痿蹶逆脹滿支膈盲煩喘痺風此之謂也賢醫治之若何曰省事輕刑則痿不作無使小民飢寒則蹶不作無令財貨上流則逆不作無使倉廩積腐則賬不作無使府庫充實則滿不作無使群臣縱恣則支不作無使下情不上通則膈不作上振恤下則盲不作法令奉用則煩不作無使下怨則喘不作無使賢人伏匿則痺不作無使百姓歌吟誹謗則風不作夫重臣群下者人主之心腹支體也心腹支體無害則人主無疾矣故非有賢醫莫能治也人主皆有此十二疾而不用賢醫則國非其國也齊景公使使於楚楚王與之上九重之臺顧使者曰齊亦有臺若此者乎使者曰吾君有治位之堂土階三尺茅茨不翦采桷不斲猶以為為之者勞居之者泰吾君惡有若此者乎於是楚王怉如也
