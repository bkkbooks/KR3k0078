body:
  text: 魏志下傳陳思王植字子建每進見難問應聲而對特見寵愛既以才見異而丁儀丁廙楊修等為之羽翼太祖狐疑幾為太子者數矣黃初三年立為鄄城王太和元年徙為壅丘王三年徙封東阿王五年上疏求存問親戚因致其意曰臣聞天稱其高以無不覆地稱其廣以無不載日月稱其明以無不照江海稱其大以無不容故孔子曰大哉堯之為君唯天為大唯堯則之夫天德之於萬物可謂弘廣矣蓋堯之為教先親後疏自近及遠周之文王亦崇厥化昔周公弔管蔡之不咸廣封懿親以藩屏王室傳曰周之同盟異姓為後誠骨肉之恩爽而不離親親之義實在敦固未有義而後其君仁而遺其親者也臣伏惟陛下資帝唐欽明之德體文王翼翼之仁惠洽椒房恩昭九親群后百寮番休遞上執政不廢於公朝下情得展於私室親理之路通慶弔之情展誠可謂恕己治人推惠施恩者矣至於臣等婚媾不通兄弟乖絶吉凶之問塞慶弔之禮廢恩紀之違甚於路人隔閡之異殊於胡越以一切之制無朝覲之望至於注心皇極結情紫闥神明知之矣願陛下沛然垂詔使諸國慶問得展以敘骨肉之歡恩全怡怡之篤義妃妾之家膏沐之遺歲得再通齊義於貴宗等惠於百司如此則風雅所詠復存於聖世矣臣伏自思惟無錐刀之用及觀陛下之所戒授若以臣為異姓竊自料度不後於朝士矣若得辭遠游戴武辨解朱組佩青紱駙馬奉車趣得一號安宅京室執鞭珥筆出從華蓋入侍輦轂承答聖問拾遺左右乃臣丹誠之至願也遠慕鹿鳴君臣之宴中詠常棣匪他之戒下忠伐木友生之義終懷蓼莪罔極之哀每四節之會塊然獨處左右唯僕隸所對唯妻子高談無所與陳發義無所與展未嘗不聞樂而拊心臨觴而歎息也臣伏以為犬馬之誠不能動人譬人之誠不能動天崩城隕霜臣初信之以臣心況徒虛語耳若葵藿之傾葉大陽不為之回光亦終向者誠也竊自比葵藿若降天地之施垂三光之明者實在陛下今之否隔友於同憂而臣獨倡言者竊不願於聖世使有不蒙施之物必有慘毒之懷故柏舟有天只之怨谷風有棄豫之歎故伊尹恥其君不如堯舜臣之愚蔽欲使陛下崇光日月被時雍之美者是臣慺慺之誠也詔報曰夫忠厚仁及草木則行葦之詩作恩澤衰薄不親九屬則角弓之章刺今令諸國兄弟情理簡怠妃妾之家膏沐疏略縱不能敦而睦之王援古喻義備矣悉矣何言精誠不足以感通哉夫明貴賤崇親親禮賢良順少長國之綱紀本無禁諸國通問之詔也矯枉過正下吏懼譴以至於此耳已敕有司如王所訴植復上疏陳審舉之義曰臣聞天地協氣而萬物生君臣合德而庶政成五帝之世非皆智三季之末非皆愚用與不用知與不知也書曰有不世之君必能用不世之臣用不世之臣必能立不世之功昔樂毅奔趙心不忘燕廉頗在楚思為趙將臣生乎亂長乎軍又數承教於武皇帝伏見行師用兵之要不必取孫吳而暗與之合竊揆之於心常願得一奉朝覲排金門蹈玉陛列有職之臣賜須臾之間使臣得一散所懷攄盡蘊積死不恨矣然天高聽遠情不上通徒獨望青雲而拊心仰高天而歎息耳屈平曰國有驥而不知乘焉遑遑而更索昔管蔡放誅周邵作弼叔魚陷刑叔向匡國三監之舋臣自當之二南之輔求必不遠華宗貴族藩王之中必有應斯舉者故傳曰無周公之親不得行周公之事唯陛下少留意焉近者漢氏廣建藩王豐則連城數十約則饗食祖祭而已未若姬周之樹國五等之品制也若扶蘇之諫始皇淳于越難周青臣可謂知時變矣能使天下傾耳注目者當權者是矣故謀能移主威能懾下豪右執政不在親戚權之所在雖疏必重勢之所去雖親必輕蓋取齊者田族非呂宗也分晉者趙魏非姬姓也唯陛下察之茍吉專其位凶離其患者異姓之臣也欲國之安祈家之貴存共其榮沒同其禍者公族之臣也今反公族疏而異姓親臣竊惑焉今臣與陛下踐冰履炭高下共之豈得離陛下哉不勝憤悶拜表陳情若有不合乞且藏之書府不便滅棄臣死之後事可思魏略曰植以近前諸國士息已見發其遺孤稚弱在者無幾而復被取乃上書曰臣聞古之聖君與日月齊其明四時等其信恩不中絶教無二可以此臨朝則臣下知所死矣受任在萬里之外審主之所以授官必己之可以投命雖有構會之徒泊然不以為懼者蓋君臣相信之明效也臣初受封策書曰植受茲青社為魏藩輔而所得兵百五十人皆年在耳順或不踰矩虎賁官騎及親事凡二百余人皆使年壯備有不虞檢校乘城顧不足以自救況皆復耄耋罷曳乎而名為魏東藩使屏翰王室臣竊自羞矣就之諸國國有士子合不過五百人伏以為三軍益損不復賴此方外定否必當須辦者臣願將部曲倍道奔赴夫妻負襁子弟懷糧蹈鋒履刃以徇國難何但習業小兒哉愚誠以揮涕增河鼷鼠飲海於朝萬無損益於臣家計甚有廢損又臣士息前後三送兼人已竭唯尚有小兒七八歲已上十六七已還三十餘人今部曲皆年耆臥在床席非糜不食眼不能視氣息裁屬者凡三十七人疲瘵風靡疣盲聾瞶者二十三人唯正須此小兒大者可備宿衛雖不足以禦寇粗可以警小盜小者未堪大使為司使耘鋤穢草驅護鳥雀休候人則一事廢一日獵則衆業散不親自經營則功不攝常自躬親不委下吏而已陛下聖仁恩詔三至士子給國長不復發明詔之下有若皎日保金石之恩必明神之信定習業者並復見送暗若書晦悵然失圖伏以為陛下既爵臣百僚之右居藩國之任為置卿士屋名為宮名為陵不使其危居獨立無異於凡庶若陛下聽臣悉還部曲罷官屬省監官使解璽釋紱追柏成子仲之業營顏淵原憲之事居了臧之廬宅延陵之室如此雖進無成功退有可守節身死之日猶忪喬也然伏度國朝終未肯聽臣之若是固當羈絆於世繩維擊于祿位懷屑屑之小憂執無已之百念安得蕩然肆志逍遙於宇宙之外哉此願未從陛下必欲崇親親篤骨肉潤白骨而榮枯木者唯遂仁德以副前恩有詔皆遂還之也六年封植為陳王時法制待藩國既自峻逼寮屬皆賈豎下才兵人給其殘老大數不過二百人十一年而三徙都常汲汲無歡遂發疾薨孫盛曰異哉魏氏之封建也不度先王之典不思藩屏之術違敦穆之風背維城之義漢初之封或權侔人主雖云不度時勢然也魏氏諸侯陋同匹夫雖懲七國矯枉過也且魏之伐漢非積德之由風澤既微六合未一而雕翦枝幹委權異族勢同瘣木危若巢幕不嗣忽諸非天喪也五等之制萬世不易之典六代興亡曹囧論之詳矣中山恭王袞每兄弟游娛袞獨談思經典文學防輔遂共表稱陳袞美袞聞之大驚懼責讓文學曰修身自守常人之行耳而諸君乃以上聞是適所以增其負纍也且如有善何患不聞而遽共如是是非益我其誡慎如此袞尚約儉教敕妃妾紡績織習為家人之事袞病困令世子曰汝幼少未聞義方早為人君但知樂不知苦必將以驕奢為失也接大臣務以禮雖非大臣老者猶宜答拜事兄以敬恤弟以慈兄弟有不良之行當造膝諫之諫之不從流涕喻之喻之不改乃白其母若猶不改當以奏聞並辭國土與其守寵罹禍不若貧賤全身也此亦謂大罪惡耳其微過細愆故當奄覆之嗟乎小子慎修乃身奉聖朝以忠貞事太妃以孝敬閨闈之內奉令於太妃閫閾之外受教於沛王無怠乃心以慰餘靈薨詔使大鴻臚持節典護喪事贈賵甚厚評曰魏氏王公徒有國土之名而無社稷之實又禁防擁隔同於囹圄位號靡定大小歲易骨肉之恩乖棠棣之義廢為法之弊一至於此乎魏氏春秋載宗室曹囧上書曰臣聞古之王者必建同姓以明親親必樹異姓以明賢賢故傳曰庸勳親親昵近尊賢書曰克明俊德以親九族詩云懷德惟寧宗子維城由斯觀之非賢無與興功非親無與輔治也夫親親之道專用則其漸也微弱賢賢之道偏任則其斃也劫奪先聖知其然也故博兼親疏而並用之近則有宗盟藩衛之固遠則有仁賢輔佐之助興則有與共其治衰則有與守其土安則有與享其福危則有與同其禍夫然故能有其國家本枝百世也今魏尊尊之法雖明親親之道未備詩不云乎鶺鴒在原兄弟急難以斯言之明兄弟相救於喪亂之際同心於憂禍之閒雖有鬩牆之忿不忘禦侮之事何則憂患同也今則不然或任而不重或擇而不任一旦疆場稱警關門反拒股肱不扶胸心無衛臣竊惟此寢不安度謹撰合所聞敘論成敗論曰昔夏殷周曆世數十而秦二世而亡何則三代之君與天下共其民故天下同其憂也秦王獨制其民故傾危莫救也夫與人共其樂者人必憂其憂與人同其安者人必拯其危先王知獨治之不能久也故與人共治之知獨守之不能固也故與人共守之兼親疏而兩用參同異而並建是以輕重足以相鎮親疏足以相衛並兼路塞逆節不生及其衰也桓文帥禮王綱馳而復張諸侯傲而復肅二霸之後浸以陵遲吳楚憑江漢負固方城雖心希九鼎而畏迫宗姬姦情散於胸懷逆謀消於脣吻斯豈非信重親戚任用賢能枝葉碩茂本根賴之與自此之後轉相攻伐暨于戰國諸姬微矣至於王赧降為庶人猶枝葉相持得居虛位海內無主四十餘年秦據形勝之地騁譎詐之術至於始皇乃定天位曠日若彼用力此豈非深固根蒂不拔之道乎秦觀周之斃以為小弱見奪於是廢五等之爵立郡縣之官子弟無尺寸之封功臣無立錐之土內無宗子以自毗輔外無諸侯以為藩衛仁心不加於親戚惠澤不流於枝葉譬猶芟刈股肱獨任胸腹浮舟江海棄捐楫櫂觀者為之寒心而始皇晏然自以為關中之固金城千里子孫帝王萬世之業也豈不悖哉至於身死之日無所寄付委天下之重於凡人之手託廢立之命於姦臣之口至令趙高之徒誅鋤宗室胡亥少習刻薄之教長遭凶父之業不能改制易法寵任兄弟而乃師談申商咨謀趙高自幽深宮委政讒賊身殘望夷求為黔首豈可得哉遂乃郡國離心衆庶潰叛勝廣倡之於前劉項斃之於後向使始皇納淳于之策抑李斯之論割裂州國分王子弟封三代之後報功臣之勞士有常君人有定主枝葉相扶首尾為用雖使子孫有失道之行時人無湯武之賢姦謀未發而身已屠戮何區區之陳項而得措其手足哉故漢祖奮三尺之劍驅烏集之衆五年之中而成帝業自開闢已來其興立功勳未有若漢祖之易者也夫伐深根者難為功摧枯杇者易為力理勢然也漢監秦之失封殖子弟及諸呂擅權圖危劉氏而天下傾動者百姓所以不易心者徒以諸侯強大盤石膠固東牟朱虛受命於內齊代吳楚作衛于外也向使高祖踵亡秦之法忽先王之制則天下已傳非劉氏有也然高祖封建地過古制大者跨州兼郡小者連城數十上下無別權侔京室故有吳楚七國之患賈誼曰諸侯強盛長亂起姦莫若衆建諸侯而少其力則下無背叛之心上無誅伐之事文帝不從至於孝景猥用朝錯之計削黜諸侯親者怨恨疏者震恐吳越倡謀五國從風兆發高帝舋鍾文景由寬之過制急之不漸故也所謂末大必折尾大難掉尾同於體猶或不從況乎非體之尾其可掉哉武帝從主父之策下推恩之令自是之後齊分為七趙分為六淮南三割梁代五分遂以陵遲子孫微弱衣食租稅不預政事或以酎金免削或以無後國除至於成帝王氏擅朝劉向諫曰臣聞公族者國之枝葉枝葉落則本根無所庇蔭其言深切多所稱引成帝雖悲傷歎息而不能用至于哀平異姓秉歡假周公之事而為田常之亂高拱而竊天位一朝而臣四海漢宗室王侯解印釋綬貢奉社稷猶懼不得為臣妾或乃為之符命頌莽恩德豈不哀哉由斯言之非宗子獨忠孝於惠文之閒而叛逆於哀平之際也徒權輕勢弱不能有定耳賴光武皇帝挺不世之姿禽王莽於已成紹漢嗣於既絶斯豈非宗子之力邪而曾不監秦之失策襲周之舊制踵亡國之法而徼幸無疆之期至於桓靈閹豎執衡朝無死難之臣外無同憂之國君孤立於上臣弄權於下本末不能相禦身首不能相使由是天下鼎沸姦凶並爭宗端焚為灰燼宮室變為榛藪居九州之地而身無所安處悲夫漢氏奉天禪位於大魏大魏之興于今二十四年矣觀五代之存亡而不用其長策前車之傾覆而不改其轍子弟王空虛之地君不使之民宗室竄於閭閻不聞邦國之政權均匹夫勢齊凡庶內無深根不拔之固外無盤石宗盟之助非所以保安社稷為萬世之策且今之州牧郡守古之方伯諸侯皆跨有千里之土兼軍武之任或比國數人或兄弟並據而宗室子弟曾無一人閒廁其閒非所以強幹弱枝備萬一之虞也今之用賢或超為名都之主或為佩師之帥而宗室有文者必限小縣之宰有武者必置於百人之上使夫廉高之士畢志於衡軛之內才能之人恥與非類為伍非所以勸進賢能異宗室之體夫泉涸則流竭根朽則葉柘枝繁者蔭根條落者本孤故語曰百足之蟲至死不僵扶之者衆也此言雖小可以譬大且墉基不可倉卒而成威名不可一朝而立皆為之有漸建之有素譬之種樹久則深固其根本茂盛其枝葉若造次徙於山林之中植於宮闕之下雖壅之以黑墳暖之以春日猶不救於枯槁何暇蕃育哉夫樹猶親戚土猶士民建置不久則輕下慢上平居猶懼其離叛危急將如之何是以聖王安而不逸以慮危也存而設備以懼亡也故疾風卒至而無摧拔之憂天下有變而無傾危之患矣王粲字仲宣山陽人也拜侍中始文帝為五官將及平原侯植皆好文學粲與徐幹陳琳阮瑀應瑒劉禎並見友善琳字孔璋避難冀州袁紹使典文章魏氏春秋載紹使琳作檄文曰司空曹操祖父騰故中常侍與左悺徐璜並作妖孽叨餮故橫傷化虐民父嵩乞攜養因贓假位輿金輦璧輸貨權門竊盜鼎司傾覆重器操贅閹遺醜本無令德僄狡鋒俠好亂樂禍幕府昔遇董卓侵官暴國方羅英雄棄瑕録用謂其鷹犬之才爪牙可任遂乘資跋扈肆行酷裂割剝元元殘賢害善放志專行威劫省禁卑侮王宮敗法亂紀坐召三臺專制朝政爵賞由心刊罰由口所愛光五宗所惡滅三族群談者蒙顯誅腹議者蒙隱戮道路以目百寮鉗口梁孝王先帝母弟墳陵尊顯操率將士親臨發掘破棺裸尸略取金寶又署發丘中郎將模金校尉所過墮突無骸不露身處三公之官而行桀虜之態殄國虐民毒流人鬼加其細政苛慘科防互設繒繳充蹊坑塞路曆觀古今書籍所載貪殘虐烈無道之臣於操為甚袁氏敗琳歸太祖太祖謂曰卿昔為本初移書但可罪狀孤而已惡惡止其身何乃上及父祖邪琳謝罪文士傳稱琳謝曰楚漢未分蒯通進策於韓信乾時之戰管仲肆力於子糾唯欲效計其主取禍一時故跖之客可使刺由桀之犬可使吠堯也令明公必能進賢於忿後棄愚於愛前四方革命而英豪託心矣唯明公裁之太祖愛才而不咎也太祖以琳為軍謀祭酒管記室衛覬字伯儒河東人也為尚書明帝即位百姓凋匱而役務方殷覬上疏曰夫變情厲性強所不能人臣言之既不易人主受之又艱難且人之所樂者寶貴榮顯也所惡者貧賤死亡也然此四者君上之所制君愛之則寶貴顯榮君惡之則貧賤死亡順指者愛所由來也逆意者惡所從至也故人臣皆爭順指而避逆意非破家為國殺身成君者誰能犯顏色觸忌諱建一言開一說哉陛下留意察之則臣下之情可見矣今議者多好悅耳其言治則比陛下於堯舜其言征伐則比二虜於貍鼠臣以為不然漢文之時諸侯強大賈誼纍息以為至危況今四海之內分而為三群士陳力各為其主是與六國分治無以為異也當今千里無煙遺民困苦陛下不善留意將遂凋斃難可復振禮天子之器必有金玉之飾飲食之肴必有八珍之味至於凶荒則徹膳降服然則奢儉之節必視世之豐約也武帝之時後宮食不過一肉衣不用錦繡茵蓐不緣飾器物無丹漆用能平定天下遺福子孫此皆陛下之所親覽也當今之務宜君臣上下量入為出深思句踐滋民之術由恐不及而尚方所造金銀之物漸更增廣侈靡日崇帑藏日竭昔漢武信神仙之道謂當得雲表之露以玉屑故立仙掌以承高露陛下至通每所非笑漢武有求於露而由尚見非陛下無求於露而空設之不益於好而糜費功夫誠皆聖慮所宜裁制也劉廙字恭嗣南陽人也為五官將文學魏諷反廙弟偉為諷所引當相坐誅太祖令曰叔向不坐弟虎古之制也特原不問廙別傳載廙表論治道曰昔周有亂臣十人有婦人焉孔子稱才難不其然乎明賢者難得也況亂斃之後百姓雕盡士之存者蓋亦無幾其股肱大職及至州郡督司邊方重任雖備其官亦未得其人也此非選者之不用意蓋才匱使之然耳況長吏已下群職小任能皆簡練備得其人乎其計莫如督之以法也不爾而數轉易往來不已遂迎之煩不可勝計轉易之閒輒有姦巧既於事不省而為政者亦以其不得久安之故知惠益不得成於已而茍且之可免於患皆將不念盡心於恤民而夢想於聲譽此非所以為政之本意也今之所以為黜陟者近頗以州郡之毀譽聽往來之浮言耳非皆得其事實而課其能否也長吏之所以為佳者奉法也憂公也恤民也此三事者或州郡有所不便往來者有所不安而長吏執之不已於治雖得計其聲譽未為美屈而從人於治雖失計其聲譽必集也長吏皆知黜陟之在於此也亦何能不去本而就末哉以為長吏皆宜使少久足使自展歲課之能三年總計乃加黜陟課之皆當以事不得依名也事者皆以其戶口率其墾田之多少及盜賊發興民之亡叛者為得負之計如此行之則無能之吏修名無益有能之人無名無損法之一行雖無部司之監姦譽妄毀可得而盡也事上太祖甚善之陳群字長文潁川人也為司空録尚書事青龍中營治宮室百姓失農時群上疏曰禹承唐虞之盛猶卑宮室而惡衣服況今喪亂之後人民至少吳蜀未滅社稷不安今舍此急而先宮室臣懼百姓遂困將何以應敵此安危之機也唯陛下慮之帝答曰王者宮室亦宜並立滅賊之後但當罷守耳豈可復興役耶是故君之職蕭何之大略也群又曰昔漢祖唯與頂羽爭天下羽已滅宮室燒焚是以蕭何起武庫太倉皆是要急然猶非其壯麗今二虜未平誠不宜與古同也夫人之所欲莫不有辭況乃天下莫之敢違前欲壞武庫謂不可不壞也後欲置之謂不可不置也若必作之固非臣下辭言所屈若少留神卓然回意亦非臣下之所及也漢明帝欲起德陽殿鍾離意諫即用其言後乃復作之殿成謂群臣曰鍾離尚書在不得成此殿也夫王者豈憚一臣蓋為百姓也今臣曾不能少凝聖聽不及意遠矣帝於是有所減省陳矯字季弼廣陵人也遷尚書令明帝嘗卒至尚書門矯跪問帝曰陛下欲何之曰欲案行文書耳矯曰此自臣職分非陛下所宜臨也若臣不稱其職則請就黜退陛下宜還帝慚回車而反其亮直如此盧育字子家涿郡人也青龍中入為侍中侍中高堂隆數以宮室事切諫帝不悅育進曰臣聞君明則臣直古之聖王恐不聞其過故有敢諫之鼓近臣盡規此乃臣等所以不及隆隆諸生名為狂直陛下宜容之為吏部尚書前此諸葛誕等馳名譽有四窗八達之誚帝深疾之時舉中書朗詔曰得其人與否在盧生耳選舉莫取有名名如畫地作餅不可啖育對曰名不足以異人而可以得常士常士畏教慕善然後有名非所當疾也愚臣既不足以識異人又主者正以循名案常為職但當有以驗其後故古者敷奏以言明試以功帝納其言和洽字陽士汝南人也為丞相掾屬時毛玠崔琰並以忠清幹事其選用先尚儉節洽言曰天下大器在位與人不可以一節儉也儉素過中自以處身則可以此格物所失或多今朝廷之儀吏著新衣乘好車者謂之不清形容不飾衣裘斃壞者謂之廉潔至令士大夫故汙辱其衣藏其輿服朝府大吏或自挈壼餐以入官寺夫立教觀俗貴處中庸為可繼也今崇一概難堪之行以檢殊塗勉而為之必有疲瘁古之大教務在通人情而凡激詭之行則容隱僞矣孫盛曰夫矯枉過正則巧僞滋生以克訓下則民志險隘非聖王所以陶化萬物間邪存誠之道和洽之言於是允矣魏國既建為侍中後有白毛玠謗毀太祖太祖見近臣怒甚洽陳玠素行有本求案實其事罷朝太祖令曰今言事者白玠不但謗吾也乃復為崔琰觖望此損君臣恩義妄為死友怨歎殆不可忍也和侍中比求實之所以不聽欲重參之耳洽對曰如言玠罪過深重非天地所覆載臣非敢曲理玠以枉大倫也以玠出群吏之中特見拔擢顯在首職曆年荷寵剛直忠公為衆所憚不宜有此然人情難保要宜考核兩驗其實今聖恩垂含垢之仁不忍致之於理更使曲直之分不明疑自近始太祖曰所以不考欲兩全玠及言事者耳洽對曰玠信有謗上之言當肆之市朝若玠無此言事者加誣大臣以誤主聽二者不加檢核臣竊不安太祖曰方有軍事安可受人言便考之耶轉為太常清貧守約至賣田宅以自給明帝聞之加賜穀帛杜襲字子緒潁川人也為侍中將軍許攸擁部曲不附太祖而有謾言太祖大怒先欲討之群臣多諫可招懷攸共討彊敵太祖橫肉刀於膝作色不聽襲入欲諫太祖逆謂之曰吾計已定卿勿復言之襲曰若殿下計是耶臣方助殿下成之若殿下計非耶雖成宜改之殿下逆臣令勿言何待下之不闡乎太祖曰許攸慢吾如何可置乎襲曰殿下謂許攸何如人耶太祖曰凡人也襲曰夫唯賢知賢唯聖知聖凡人安能知非凡人邪方今豺狼當路而狐貍是先人將謂殿下避強攻弱進不為勇退不為仁臣聞千石之弩不為鼷鼠發機萬鈞之鐘不以莛撞起音今區區之許攸何足以勞神武哉太祖曰善遂厚撫攸攸即歸服高柔字文慧陳留人拜丞相理曹掾時置校事盧洪趙達等使察群下柔諫曰設官分職各有所司今置校事既非居上信下之旨又達等數以憎愛擅作威福宜檢治之太祖曰卿知達等恐不如吾也要能刺舉而辨衆事使賢人君子為之則不能也昔叔孫通用群盜良有以也達等後姦利發太祖殺之以謝於柔文帝踐祚轉治書執法時民閒數有誹謗妖言帝疾之有妖言輒殺而賞告者柔上疏曰今妖言者必戮告之者輒賞既使過誤無反善之路又將開凶狡之群相誣罔之漸誠非所以息姦省訟緝熙治道也昔周公作誥稱殷之祖宗咸不顧小人之怨在漢太宗亦除妖言誹謗之令臣愚以為宜除妖謗賞告之法以隆天父養物之仁帝不即從而相誣告者滋甚帝乃下詔敢以誹謗相告以所告罪罪之於是遂絶遷為廷尉明帝即位時獵法甚峻而典農劉龜竊於禁內射兔其功曹張京詣校事言之帝匿京名收龜付獄柔表請告者名大怒曰劉龜當死乃敢獵吾禁地送龜廷尉廷尉便當考掠何復請告者主名吾豈妄收龜邪柔曰廷尉天下之平也安得以至尊喜怒而毀法乎重復為奏辭指深切帝意寤乃下京名即還訊各當其罪辛毗字佐治潁川人也文帝踐祚遷侍中帝欲徙冀州士家十萬戶實河南時連蝗民饑群司以為不可而帝意甚盛毗與朝臣俱求見帝知其欲諫作色以見皆莫敢言毗曰陛下欲徙士家其計安出帝曰卿謂我徙之非邪毗曰誠以為非帝曰吾不與卿共議毗曰陛下不以臣不肖置之左右廁之謀議之官安得不與臣議也臣所云非私也乃社稷之慮安得怒臣帝不答起入內毗隨而引其裾帝遂奮衣不還良久乃出曰佐治卿持我何太急邪毗曰今徙既失人心又無以食也帝遂徙其半嘗從帝射雉帝曰射雉樂哉毗曰於陛下甚樂於群下甚苦帝默然後遂為之希出明帝即位時中書監劉放令孫資見信於主制斷時政大臣莫不交好而毗不與往來毗子敞諫曰今劉孫用事衆皆影附大人宜小降意和光同塵不然必有謗言毗正色曰主上雖未稱聰明不為暗劣吾之立身自有本末就劉孫不平不過令吾不作三公而已何危害之有焉有大丈夫欲為公而毀其高節者耶從僕射畢軌表言尚書僕射王思精勤舊吏忠亮計略不如辛毗毗宜代思帝以訪放資放資對曰陛下用思者誠欲取其效力不貴虛名也毗實亮直然性剛而專聖慮所當深察也遂不用出為衛尉楊阜字義山天水人也為將作大匠時初治宮室發美女充後庭數出入弋獵阜上疏曰陛下奉武皇帝開拓之大業守文皇帝克終之元緒誠宜思齊往古聖賢之善治總觀季世放蕩之惡政所謂善治者務儉約重民力也所謂惡政者從心恣欲觸情而發也惟陛下稽古世代之初所以明赫及季世所以衰弱至於泯滅近覽漢末之變足以動心誡懼矣曩使桓靈不廢高祖之法文景之恭儉太祖雖有神武於何所施其能邪而陛下何由處斯尊哉今吳蜀未定軍旅在外願陛下動則三思慮而後行重慎出入以往鑒來言之若輕成敗甚重詔報曰閒得密表先陳往古明王聖主以諷暗政切至之辭款誠篤實將順匡救備悉矣覽思苦言吾甚嘉之遷少府後詔大議政治之不便於民者阜議以為致治在於任賢興國在於務農若舍賢而任所私此忘治之甚者也廣開宮館高為臺榭以妨民務此害農之甚者也百工不敦其器而競作奇巧以合上欲此傷本之甚者也孔子曰苛政甚於猛虎今守功文俗之吏為政不通治體茍好煩苛此亂民之甚者也當今之急宜去四甚帝既新作許昌宮又營洛陽宮殿觀閣阜上疏曰古之聖帝明王未有極宮室之高麗以雕斃百姓之財力者也桀作璇室象廊紂為傾宮鹿臺以喪其社稷楚靈以築章華而身受其禍秦始皇作阿房而殃及其子二世而滅夫不度萬人之力以從耳目之欲未有不亡者陛下當以堯舜禹湯文武為法則夏桀殷紂楚靈秦皇為深誡巍巍大業猶恐失之不夙夜敬止允恭恤民而自逸唯宮室是侈是飾必有顛覆危亡之禍方今二虜合從謀危宗廟十萬之軍東西奔赴邊境無一日之娛農夫廢業民有饑色陛下不是為憂而營作宮室無有已時君作元首臣為股肱存亡一體得失同之臣雖駑怯敢忘爭臣之義言不切至不足以感寤陛下陛下不察臣言恐皇祖烈考之祚將墜於地使臣身死有補萬一則死之日猶生之年也奏禦天子感其忠言手筆詔答高堂隆字升平泰山人也為散騎常侍青龍中大治殿舍西取長安大鍾隆上疏曰昔周景王不儀刑文武之明德忽公旦之聖制既鑄造大錢又作大鐘單穆公諫而不聽泠州鳩對而不從遂迷不反周德以衰良史記焉以為永鑒然今之小人好說秦漢之奢靡以蕩聖心求取亡國不度之器勞役費損以傷德政非所以興禮樂之和保神明之休也是日帝幸上方隆興卞蘭從帝以隆表授蘭使難隆曰興衰在政樂何為也化之不明豈鍾之罪隆對曰夫禮樂者為治之大本也故簫韶九成鳳皇來儀雷鼓六變天神以降政是以平刑是以錯和之至也新聲發響商辛以殞大鐘既鑄周景以斃存亡之機恆由此作安在廢興之不階也君舉必書古之道也作而不法何以示後帝稱善遷待中猶領太史令崇華殿災詔問隆此何咎於禮寧有祈禳之義乎對曰夫災變之發皆所以明教戒也惟率禮修德可以勝之易傳曰上不儉下不節孽火燒其室又曰君高其臺天火為災此人君茍飾宮室不知百姓空竭故天應之以旱火從高殿起也上天降鑒故譴告陛下陛下宜增崇人道以答天意陵霄闕始搆有鵲巢其上帝以問隆對曰詩云惟鵲有巢惟鳩居之今興宮室而鵲巢之此宮室未成身不得居之象也夫天道無親唯與善人不可不深慮夏商之季皆繼體也不欽承上天之明命惟讒諂是從廢德適欲故其亡也忽焉臣備腹心茍可以繁祉聖躬安存社稷雖灰身破族猶生之年也豈憚忤逆之災而令陛下不聞至言乎於是帝改容動色帝愈增崇宮殿雕飾觀閣鑿太行之石英采穀城之文石起景陽山於芳林之園建昭陽殿於太極之北鑄作黃龍鳳鳥奇偉之獸飾陵雲臺陵霄闕百役繁興作者萬數公卿以下至於學生莫不展力帝乃躬自掘土以率之而遼東不朝悼皇后崩天作淫雨冀州水出漂沒民物隆上疏切諫曰昔在伊唐洪水滔天災眚之甚莫過於彼力役之興莫久於此堯舜君臣南面而已禹敷九州庶士庸勳各有等差君子小人物有服章今無若時之急而使公卿大夫並與廝徒共供事役聞之四夷非嘉聲也垂之竹帛非令名也是以古先哲王畏上天之明命矜矜業業惟恐有違災異既發懼而修政未有不延期流祚者也爰及末葉暗君荒主不崇先王之令軌不納正士之直言以遂其情志恬忽變戒未有不至於顛覆者也秦始皇不築道德之基而築阿房之宮不憂蕭墻之變而修長城之役當其君臣為此計也亦欲立萬世之業使子孫長有天下豈意一朝匹夫大呼而天下傾覆哉故臣以為使先代之君知其所行必將至於敗則弗為之矣是以亡國之主自謂不亡然後至於亡賢聖之君自謂將亡然後至於不亡昔漢文帝稱為賢主躬行約儉惠下養民而賈誼方之以為天下倒縣可為痛哭者一可為流涕者二可為長歎息者三況今天下雕斃民無儋石之儲國無終年之畜外有彊敵六軍暴邊內興土功州郡騷動若有寇警則臣懼板築之士不能投命虜庭矣又將吏奉祿稍見折減方之於昔五分居一夫祿賜穀帛人主之所以惠養吏民而為之司命者也若今有廢是奪其命既得之而又失之此生怨之府也今陛下所與共坐廊廟治天下者非三司九列則臺閣近臣皆腹心造膝宜在無諱若見豐省而不敢以告從命奔走唯恐不勝是則具臣非鯁輔也昔李斯教秦二世曰為人主而不姿睢命之曰天下桎梏二世用之泰國以覆斯亦滅族是以史遷議其不正諫而為世誡書奏帝覽焉謂中書監令曰觀隆此奏使朕懼哉隆疾篤口占上疏曰臣常疾世主莫不思紹堯舜湯武之治而蹈踵桀紂幽厲之跡莫不蚩笑季世惑亂亡國之主而不登踐虞夏殷周之軌悲夫尋觀三代之有天下聖賢相承曆載數百尺土莫非其有一民莫非其臣癸辛之徒恃其旅力知足以拒諫才足以飾非諂諛是尚臺觀是崇淫樂是好倡優是悅上天不蠲眷然回顧宗國為墟天子之尊湯武有之豈伊異人皆明王之胄也且當六國之時天下殷熾秦既兼之不修聖道乃搆阿房之宮築長城之守矜夸中國威服百蠻天下震竦道路以目自謂本枝百世永垂洪暉豈悟二世而滅社稷崩圮哉臣觀黃初之際異類之鳥育長燕巢口爪胸赤此魏室之大異也宜防鷹揚之臣於蕭牆之內可選諸王使君國典兵往往跱鎮撫皇畿翼亮帝室昔周之東遷晉鄭是依漢呂之亂實賴朱虛蓋前代之明鑒也夫皇天無親唯德是輔民詠德政則延期過歷下有怨歎則掇録授能由此觀之則天下之天下也非獨陛下之天下也臣百疾所鍾氣力稍微輒自輿出還舍若遂沈淪魂而有知結草以報田豫字國讓漁陽人也為護烏丸校尉魏略曰鮮卑素利等數來客見多以牛馬遺豫豫轉送官胡乃密懷金三十斤謂豫曰我見公貧故前後遺公牛馬公輒送官今密以此上公可以為家資豫張袖受之答其厚意胡去之後皆悉付外於是詔之曰昔魏絳開懷以納戎今卿舉袖以受狄金朕甚嘉焉乃賜青縑五百匹也徐邈字景山燕國人也為涼州刺史西域流通荒戎入貢皆邈勛也賞賜皆散與將士無入家者妻子衣食不充天子聞而嘉之隨時供給其家彈邪繩枉州界肅清嘉平六年朝廷追思清節之士詔曰夫顯賢表德聖王所重舉善而教仲尼所美故司空徐邈征東將軍胡質衛尉田豫皆服職前朝曆事四世出統戎馬入讚庶政忠清在公憂國忘私不營産業身沒之後家無餘財朕甚嘉之其賜邈等家穀二千斛錢三十萬布告天下王昶字文舒太原人也遷兗州刺史為兄子及子作名字皆依謙實以見其意故兄子默字處靜沈字處道其子渾字玄沖深字道沖遂書戒之曰夫人為子之道莫大於寶身全行以顯父母此三者人知其善而或危身破家陷於滅亡之禍者何也由所祖習非其道也夫孝敬仁義百行之首而立身之本也孝敬則宗族安之仁義則鄉黨重之此行成於內名著於外者矣若不篤於至行而背本逐末以陷浮華焉以成朋黨焉浮華則有虛僞之纍朋黨則有彼此之患此二者之戒照然著明而循覆車滋衆逐末彌甚皆由惑當時之譽昧目前之利故也夫富貴聲名人情所樂而君子或得而不處何也惡不由其道耳患人知進而不知退知欲而不知足故有困辱之纍悔吝之咎語曰不知足則失所欲故知足之足常足矣覽往事之成敗察將來之吉凶未有干名要利欲而不厭而能保世持家永全福祿者也欲使汝曹立身行己遵儒者之教履道家之言故以玄默沖虛為名欲使汝曹顧名思義不敢違越也古者盤杅有銘几杖有誡俯仰察焉用無過行況在已名可不戒之哉夫物速成則疾亡晚就則善終朝華之草夕而零落松柏之茂隆寒不衰是以大雅君子惡速成戒闕黨也若范胸對秦客至武子擊之折其委笄惡其掩人也夫人有善鮮不自伐有能者寡不自矜伐則掩人矜則陵人掩人者人亦掩之陵人者人亦陵之故三卻為戮於晉王叔負罪於周不唯矜善自伐好爭之咎乎故君子不自稱非以讓人惡其蓋人也夫能屈以為伸讓以為得弱以為強鮮不遂矣夫毀譽愛惡之原而禍福之機也是以聖人慎之孔子曰吾之於人誰毀誰譽如有所譽必有所試以聖人之德猶尚如此況庸庸之徒而輕毀譽哉昔伏波將軍馬援戒其兄子言聞人之惡當如聞父母之名耳可得聞口不可得道也斯戒至矣人或毀已當退而求之於身若己有可毀之行則彼言當矣若己無可毀之行則彼言妄矣當則無怨於彼妄則無害於身又何反報焉且聞人毀己而忿者惡醜聲之加人也人報者滋甚不如默而自修也諺曰救寒莫如重裘止謗莫如自修斯言信矣若與是非之士凶險之人近猶不可況與對校乎其害深矣可不慎與吾與時人從事雖出處不同然各有所取潁川郭伯益好尚通達敏而有知其為人弘曠不足輕貴有餘得其人重之如山不得其人忽之如草吾以所知親之昵之不顧兒子為之北海徐偉長不治名高不求茍得淡然自守唯道是務其有所是非則託古人以見其意當時無所貶吾敬之重之願兒子師之樂安任昭先淳粹履道內敏外恕處不避汙怯而義勇吾友之善之願兒子遵之若引而申之觸類而長之汝其庶幾舉一隅耳及其用財先九族其施舍務周急其出入存故老其議論貴無貶其進仕尚忠節其取人務道實其處世戒驕淫其貧賤慎無戚其進退念合宜其行事加九思如此而已吾復何憂哉鍾會字士季潁川人也司馬文王欲圖蜀以會為鎮西將軍從駱谷入姜維等悉降會詔以會為司徒會內有異志因鄭艾承制專事密白艾有反狀世語曰會善效人書於劍閣要艾章表白事皆易其言令辭指悖傲多自矜伐也於是檻車徵艾艾既禽而會獨統大衆威震西土自謂功名蓋世不可復為人下遂謀反諸軍兵殺會漢晉春秋曰文王聞鍾會功曹向雄之收葬會也召而責之曰往王經之死卿哭於東市而我不問也今鍾會躬為叛逆而又輒收葬若復相容其如王法何雄曰昔先王掩骸埋胔仁流朽骨當時豈先卜其功罪而後收葬哉今王誅既加於法已備雄感義收葬教亦無闕法立於上教弘於下以此訓物雄曰可矣何必使雄背死違生以立於時殿下讎對枯骨損之中野百歲之後為臧獲所笑豈仁賢所掩哉王悅之與宴談而遣之習鑿齒曰向伯茂可謂勇於蹈義也哭王經而哀感市人葬鍾會而義動明主彼皆忠烈奮徑知死而往非存生也尋其奉死之心可以見事生之情覽其忠貞之節足以愧背義之士矣王加禮而遣可謂明達矣
