body:
  text: 禮記曲禮曲禮曰毋不敬禮主於敬儼若思言人坐思貌必儼然安定辭審言語也安民哉此三句可以安民也傲不可長欲不可從志不可滿樂不可極此四者慢遊之道桀紂所以自禍也賢者狎而敬之狎習也近也習其所行畏而愛之心服曰畏愛而知其惡憎而知其善不可以己心之愛憎誣人以善惡夫禮者所以定親疏決嫌疑別同異明是非也道德仁義非禮不成教訓正俗非禮不備分爭辨訟非禮不決君臣上下父子兄弟非禮不定宦學事師非禮不親班朝治軍官行法非禮感嚴不行禱祠祭祀供給鬼神非禮不誠不莊班次也臨也莊敬也富貴而知好禮則不驕不淫貧賤而知好禮則志不懾懾猶怯惑國君春田不圍澤大夫不掩群士不取麛卵生乳之時重傷其類歲凶年穀不登登成也君膳不祭肺馬不食穀馳道不除祭事不縣大夫不食粱士飲酒不樂皆自為貶損憂民也禮食則祭所先不祭肺則不殺除治也縣樂器鐘磬之屬也檀弓知悼子卒未葬悼子晉大夫荀盈也平公飲酒師曠李調侍鼓鐘杜蕢自外來歷階而升堂酌曰曠飲斯又酌曰調飲斯又酌堂上北面坐飲之降趨而出三酌皆罰爵平公呼而進之曰蕢爾飲曠何也曰子卯不樂紂以甲子死桀以乙卯亡王者謂之疾日不以舉樂所以自戒懼也知悼子之喪在堂未葬斯其為子卯也大矣言大夫喪重於疾日曠也大師也不以詔是以飲之詔告也太師典司奏樂也爾飲調何也曰調也君之褻臣也為一飲一食忘君之疾是以飲之言調貪酒食也褻嬖也近臣亦當規君疾憂也爾飲何也曰蕢也宰夫也非刀匕是供又敢與知防是以飲也防禁放溢者也平公曰寡人亦有過焉酌而飲寡人聞義則服杜蕢洗爵而揚觶舉爵於君公謂侍者曰如我死則必無廢斯爵欲後世以為戒至於今既畢獻斯揚觶謂之杜舉此爵遂因杜蕢為名畢獻獻賓與君也孔子過泰山側有婦人哭於墓者而哀夫子式而聽之怪其哀甚也使子貢問之曰昔吾舅死於虎吾夫又死焉今吾子又死焉夫之父曰舅夫子曰何為不去曰無苛政夫子曰小子識之苛政猛於虎也陽門之介夫死陽門宋國門也介夫甲胄衛士司城子罕入而哭之哀子罕樂喜也晉人之覘宋者反報於晉侯曰陽門之介夫死而子罕哭之哀而民悅殆不可伐也覘窺視也孔子聞之曰善哉覘國乎善其知微王制凡官民材必先論之論謂考其德行道藝也論辨然後使之辨謂考問得其定也任事然後爵之爵謂正其秩次位定然後祿之爵人於朝與士共之刑人於市與衆棄之必共之者所以審慎之獺祭魚然後虞人入澤梁豺祭獸然後田獵鳩化為鷹然後設罻羅草木零落然後入山林昆蟲未蟄不以火田取物必順時候也昆蟲者得陽而生得陰而藏也國無九年之蓄曰不足無六年之蓄曰急無三年之蓄曰國非其國也三年耕必有一年之食九年耕必有三年之食以三十年之通雖有凶旱水溢民無菜色然後天子食日舉以樂民無食菜之飢色天子乃日舉樂以食也月令孟春之月立春之日天子親率三公九卿諸侯大夫以迎春於東郊命相布德和令行慶施惠下及兆民相謂三公相王之事者也德謂善教也令謂時禁也慶謂休其善也惠謂恤其不足也是月也天子乃以元日祈穀於上帝謂以上辛郊祭天也郊祀后稷以祈農事也上帝太微之帝也乃擇元辰天子親帥三公九卿諸侯大夫躬耕帝藉元辰蓋郊後吉辰也帝藉為天神借民力所治之田也禁止伐木盛德所在毋覆巢毋殺孩蟲胎夭飛鳥毋麛毋卵為傷萌幼之類毋聚大衆毋置城郭為妨農之始也掩骼埋胔為死氣逆生氣也骨枯曰骼肉腐曰胔也不可稱兵稱兵必有夭殃逆生氣也仲春之月養幼少存諸孤助生氣也命有司省囹圄去桎梏毋肆掠順陽氣也省減也肆謂死刑暴尸毋竭川澤毋漉陂池毋焚山林順陽養物季春之月天子布德行惠命有司發倉廩賜貧窮振乏絶振猶救也開府庫出幣帛聘名士禮賢者聘問也名士不仕者命司空曰時雨將降下水上騰修利堤坊導達溝瀆開通道路毋有鄣塞所以除水潦便民事也田獵罝罦羅罔畢翳餧獸之藥無出九門為逆天時也天子九門也命野虞毋伐桑柘愛蠶食也野虞謂主田及山林之官后妃齋戒親帥東向躬桑禁婦女無觀省婦使以勸蠶事后妃親採桑示帥先天下也東向者向時氣無觀去容飾也婦使縫線組紃之事命工師百工咸理監工日號無悖于時毋或作為淫巧以蕩上心咸皆也於百工皆治理其事之時工師則監之日號令戒之以此二事百工作器物各有時逆之則功不善也淫巧謂偽飾不如法也蕩謂動之使生奢泰孟夏之月無起土功毋發大衆為妨蠶農之事命野虞勞農命農勉作毋休于都急趣農事仲夏之月命有司為民祈祀山川百源大雩帝乃命百縣雩祀百辟卿士有益於民者以祈穀實陽氣盛而恆旱山川百原能興雲雨者也雩帝謂雩五精之帝也百辟卿士古者上公以下若句龍后稷之類季夏之月樹木方盛無有斬伐為其未堅韌也毋發令而待以妨神農之事發令而待謂出繇役之令以豫驚民民驚則心動是害土神之氣也土神稱曰神農者以其主於稼穡也水潦盛昌舉大事則有天殃孟秋之月乃命將帥選士厲兵命大理審斷刑命百官完堤坊謹壅塞以備水潦仲秋之月養衰老授几杖乃命有司趣民收斂務蓄菜多積聚為禦冬之備也乃勸民種麥毋或失時麥者接絶續乏之穀尤重之也季秋之月命冢宰舉五穀之要定其租稅簿藏帝藉之收於神倉霜始降百工咸休寒而膠漆作不堅好孟冬之月賞死事恤孤寡死事謂以國事死也命百官謹蓋藏謂府庫囷倉也固封疆備邊境完要塞謹關梁大飲蒸十月農功畢天子諸侯與其群臣飲酒於大學以正齒位謂之大飲天子乃祈來年於天宗祀於公社及門閭臘先祖五祀此周禮所謂蠟祭也天宗謂日月星辰也五祀門戶中霤行勞農以休息之黨正屬民飲酒正齒位是也天子乃命將帥講武習射御仲冬之月天子乃命有司祈祀四海大川山林藪澤有能取蔬食田獵禽獸者野虞教導之務收斂野物也大澤曰藪草木之實為蔬食季冬之月命取冰冰已入令告民出五種命田官告民出五種明大寒氣過農事將起命農計耦耕事修耒耜具田器天子乃與公卿大夫共飭國典論時令以待來歲之宜飭國典者和六典之法也周禮以正月為之也文王世子文王之為世子朝於王季日三雞初鳴而起衣服至於寢門外問內豎之御者曰今日安否何如內豎小臣之屬掌外內之通令者御如今小吏直日也內豎曰安文王乃喜及日中又至亦如之及暮又至亦如之其有不安節則內豎以告文王文王色憂行不能正履節謂居處故事也履蹈地也王季復膳然後亦復初食上必在視寒暖之節在察也食下問所膳膳所食也然後退武王帥而行之帥循也文王有疾武王不脫冠帶而養言常在側文王一飯亦一飯文王再飯亦再飯欲知氣力針藥所勝凡三王教世子必以禮樂樂所以修內也禮所以修外也禮樂交錯於中發形於外立太傅少傅以養之養猶教也言養者積浸成長太傅審父子君臣之道以示之為之行其禮也少傅奉世子以觀太傅之德行而審諭之為之説其義也太傅在前少傅在後謂其在學時也入則有保出則有師謂燕居出入時也是以教諭而德成也以有四人維持之師也者教之以事而諭諸德者也保也者慎其身以輔翼之而歸諸道者也慎其身者謹安護之是故知為人子然後可以為人父知為人臣然後可以為人君知事人然後能使人君之於世子也親則父也尊則君也有父之親有君之尊然後兼天下而有之是故養世子不可不慎也處君父之位覽海內之士而近不能以教其子則其餘不足觀之也行一物而三善皆得者唯世子而已其齒於學之謂也物猶事也故世子齒於學國人觀之曰將君我而與我齒讓何也曰有父在則禮然然而衆知父子之道矣其二曰將君我而與我齒讓何也曰有君在則禮然然而衆知君臣之義也其三曰將君我而與我齒讓何也曰長長也然而衆知長幼之節故父在斯為子君在斯謂臣居子與臣之節所以尊君親親也故學之為父子焉學之為君臣焉學之為長幼焉學教也父子君臣長幼之道得而國治語曰樂正司業父師司成一有元良萬國以貞世子之謂也司主也一一人也元大也良善也貞正也昔者仲尼與於蠟賓蠟者索也歲十二月合聚萬物而索饗之亦祭宗廟時孔子仕魯而在助祭之中事畢出遊於觀之上喟然而歎觀闕也言偃在側曰君子何歎言偃孔子弟子子遊也孔子曰大道之行也天下為公選賢與能公猶共也禪位授聖不家之也故人不獨親其親不獨子其子孝慈之道廣也使老有所終幼有所長鰥寡孤獨廢疾者皆有所養無匱之者是故謀閉而不興盜竊亂賊而不作是謂大同同猶和平今大道既隱隱猶去也天下為家傳位於子也各親其親各子其子大人世及以為禮城郭溝池以為固亂賊繁多為此以服之大人諸侯也禮義以為紀以正君臣以篤父子以睦兄弟以和夫婦以設制度以功為己故謀用是作兵由此起以其違大道敦朴之本其弊則然老子曰法令滋章盜賊多有也禹湯文武成王周公由此其選也由用也能用禮義成治者也此六君子者未有不謹於禮者言偃復問曰如此乎禮之急也孔子曰夫禮者先王以承天之道以治人之情故失之者死得之者生詩云人而無禮胡不遄死故聖人以禮示之天下國家可得而正民知禮則易教也是故禮者君之大柄所以治政安君故聖王修義之柄禮之序以治人情治者去瑕穢養精華也故人情者聖王之田也修禮以耕之和其剛柔陳義以種之樹以善道講學以耨之存是去非類也本仁以聚之合其所盛播樂以安之感動使之堅固故治國不以禮猶無耜而耕也無以入之也為禮不本於義猶耕而不種也嘉穀無由生也為義而不講以學猶種而不耨也苗不殖草不除講之以學而不合以仁猶耨而不穫也無以知收之豐荒也合之以仁而不安以樂猶穫而不食也不知味之甘苦安之以樂而不達於順猶食而不肥也功不見也四體既正膚革充盈人之肥也父子篤兄弟睦夫婦和家之肥也大臣法小臣廉官職相序君臣相正國之肥也天子以德為車以樂為御諸侯以禮相與大夫以法相序士以信相考百姓以睦相守天下之肥也是謂大順故無水旱昆蟲之災民無凶飢妖孽之疾言大順之時陰陽和也昆蟲之災螟螽之屬也故天不愛其道地不愛其寶人不愛其情言嘉瑞出人情至也故天降膏露地出醴泉山出器車河出馬圖鳳皇騏驎皆在郊棷龜龍在宮沼其餘鳥獸之卵胎皆可俯而窺也膏猶甘也器謂若銀甕丹甑也馬圖龍馬負圖而出也棷叢草也沼池也則是無故非有他故使之然先王能修禮以達義體信而達順故此順之實也禮器禮釋回增美質措則正施則行釋猶去也回邪僻也質猶性也措猶置也其在人也如竹箭之有筠如松柏之有心二者居天下之大端故貫四時而不改柯易葉箭篠也端本也四物於天下最得氣之本也或柔韌於外或和澤於內以此不變傷人之得禮亦猶然君子有禮則外諧而內無怨故物無不懷仁鬼神饗德懷歸先王之立禮也有本有文忠信禮之本義理禮之文無本不立無文不行言必外內具也禮也者合於天時設於地財順於鬼神合於人心理萬物者故天不生地不養君子不以為禮鬼神弗饗天不生謂非其時物也地不養謂非其地所生也是故昔者先王之制禮也因其財物而致其義焉故作大事必順天時大事祭祀也為朝夕必放於日月日出東方月生西方也為高必因丘陵謂冬至祭天於圜丘之上為下必因川澤謂夏至祭地於方澤之中是故因天事天天高因高者以事之因地事地地下因下者以事之因名山升中於天名猶大也升猶上也中猶成也謂巡狩至於方嶽燔柴祭天告以諸侯之成功也因吉土以饗帝于郊吉土王者所卜而居之土也饗帝於郊以四時所兆祭於四郊者也升中于天而鳳皇降龜龍格功成而太平陰陽氣和而致象物也饗帝於郊而風雨節寒暑時五帝主五行五行之氣和而庶徵得其序五行木為雨金為暘火為燠水為寒土為風是故聖人南面而立而天下大治是故先王制體也以節事動反本也修樂以導志勸之善也故觀其禮樂而治亂可知亂國禮慢而樂淫也內則子事父母雞初鳴咸盥漱冠緌纓端畢紳縉笏咸皆也緌纓之飾也端玄端士服也庶人深衣也紳大帶也左右佩用必佩者備尊者使令也以適父母舅姑之所及所下氣怡聲問所欲而敬進之柔色以溫之溫藉也承尊者必和顏色也父母有過下氣怡色柔聲以諫諫若不入起敬起孝悅則復諫父母怒不悅而撻之流血不敢疾怨起敬起孝撻擊父母雖沒將為善思貽父母令名必果曾子曰孝子之養老樂其耳目安其寢處以其飲食忠養之父母之所愛亦愛之父母之所敬亦敬之至於犬馬盡然而況於人乎玉藻年不順成則天子素服乘素車食無樂自貶損也君無故不殺牛大夫無故不殺羊士無故不殺犬豕故謂祭祀之時君子遠庖廚凡有血氣之類弗身踐也踐當為翦聲之誤翦猶殺也大傳聖人南面而聽天下所且先者有五民不得與焉且先言未遑餘事一曰治親二曰報功三曰舉賢四曰使能五曰存愛功功臣也存察也察有仁愛者五者一得於天下民無不足無不贍五者一物紕繆民不得其死物猶事紕猶錯也五事得則民足一事失則民不得其死明政之難也聖人南面而治天下必自人道始矣人道謂此五事也是故人道親親言先有恩親親故尊祖尊祖故敬宗敬宗故收族收族故宗廟嚴宗廟嚴故重社稷重社稷故愛百姓愛百姓故刑罰中刑罰中故庶民安庶民安故財用足財用足故百志成百志成故禮俗刑禮俗刑然後樂收族序以昭穆也嚴猶尊也百志人之志意所欲也刑猶成也詩云不顯不承無斁於人斯此之謂也斁厭也言文王之德不顯乎不承先人之業乎言其顯且承之樂之無厭樂記凡音之起由人心生也人心之動物使之然也感於物而動故形於聲宮商角徵羽雜比曰音單出曰聲形猶見也樂者音之所由生也其本在人心之感於物是故其哀心感者其聲以殺其樂心感者其聲嘽以緩其喜心感者其聲發以散其怒心感者其聲粗以厲其敬心感者其聲直以廉其愛心感者其聲和以柔六者非其性也感於物而後動言人聲在所見非有常也踧也嘽寬綽貌發猶揚也是故先王慎所以感之者故禮以導其志樂以和其聲政以一其行刑以防其姦禮樂刑政其極一也所以同民心而出治道凡音者生人心者也情動於中故形於聲聲成文謂之音是故治世之音安以樂其政和亂世之音怨以怒其政乖亡國之音哀以思其民困音聲之道與政通矣言八音和否隨政宮為君商為臣角為民徵為事羽為物五者不亂則無怠懘之音矣五者君臣民事物也凡聲濁者尊清者卑怠懘敝敗不和之貌也宮亂則荒其君驕商亂則陂其臣壞角亂則憂其民怨徵亂則哀其事勤羽亂則危其財匱五者皆亂迭相陵謂之慢如此則國之滅亡無日矣君臣民事物其道亂則其音應而亂也荒猶散也陂傾也鄭衛之音亂世之音比於慢矣比猶同也桑間濮上之音亡國之音其政散其民流誣上行私而不可止也濮水之上地有桑間者亡國之音於此水出也是故知聲而不知音者禽獸是也知音而不知樂者衆庶是也唯君子為能知樂禽獸知此為聲耳不知其宮商之變八音並作克諧曰樂審聲以知音審音以知樂審樂以知政而治道備矣是故不知聲者不可與言音不知音者不可與言樂知樂者則幾於禮矣禮樂皆得謂之有德幾近也聽樂而知政之得失則能正君臣民事物之禮也樂之隆非極音食饗之禮非致味隆猶盛極猶窮是故先王之制禮樂非以極口腹耳目之欲將以教民平好惡而反人道之正教之使知好惡先王之制禮樂人為之節言為作法度以遏其欲也衰麻哭泣所以節喪紀也鐘鼓干戚所以和安樂也婚姻冠笄所以別男女也射鄉食饗所以正交接也男二十而冠女許嫁而笄成人之禮也射大射鄉鄉飲酒也食食禮饗饗禮也禮節民心樂和民聲政以行之刑以防之禮樂刑政四達而不悖則王道備矣樂由中出和在心也禮自外作敬在貌也大樂必易大禮必簡易簡若於清廟大饗然也樂至則無怨禮至則不爭揖讓而治天下者禮樂之謂也至猶達行大樂與天地同和大禮與天地同節言順天地之氣與其數也和故百物不失不失性也節故祀天祭地成萬物有功報焉也明則有禮樂教人者也幽則有鬼神助天地成物者也如此則四海之內合敬同愛王者功成作樂治定制禮功主於王業治主於教民五帝殊時不相沿樂三王異世不相襲禮言其有損益也故聖人作樂以應天制禮以配地禮樂明備天地官矣官猶事也各得其事地氣上躋天氣下降鼓之以雷霆奮之以風雨動之以四時暖之以日月而百化興焉如此則樂者天地之和也禮者所以綴淫也綴猶止也是故先王有大事必有禮以哀之有大福必有禮以樂之哀樂之分皆以禮終大事謂死喪也是故先王本之情性稽之度數制之禮義合生氣之和道五常之行使之陽而不散陰而不密剛氣不怒柔氣不懾四暢交於中而發作於外皆安其位而不相奪也生氣陰陽氣也五常五行也密之言閉也懾猶恐懼也土弊則草木不長水煩則魚不大氣衰則生物不遂世亂則禮慝而樂淫是故其聲哀而不莊樂而不安慢易以犯節流湎以忘本感條暢之氣而滅平和之德是以君子賤之也遂猶成也慝穢也感動也動人條暢之善氣使失其所也凡姦聲感人而逆氣應之逆氣成象而淫樂興焉正聲感人而順氣應之順氣成象而和樂興焉唱和有應回邪曲直各歸其分而萬物之理各以類相動成象謂人樂習焉是故君子反情以和其志比類以成其行姦聲亂色不留聰明淫樂慝禮不接心術惰慢邪僻之氣不設於身體使耳目鼻口心智百體皆由順正以行其義反猶本也術猶道也然後發以聲音而文以琴瑟動以干戚飾以羽旄從以簫管奮至德之光動四氣之和以著萬物之理奮猶動動至德之光謂降天神出地祗格祖考也著猶成也故樂行而倫清耳目聰明血氣和平移風易俗天下皆寧言樂用則正人理和陰陽也倫謂人道也魏文侯問於子夏曰吾端冕而聽古樂則唯恐臥聽鄭衛之音則不知倦敢問古樂之如彼何也新樂之如此何也古樂先王之正樂也對曰今君之所問者樂也所好者音也相近而不同鏗鏘之類皆為音應律乃為樂文公曰敢問何如欲知音樂異意對曰夫古者天地順而四時當民有德而五穀昌疾疫不作而無妖祥此之謂大當然後聖人作為父子君臣以為綱紀綱紀既正天下大定天下大定然後正六律和五聲弦歌詩頌此之謂德音德音之謂樂當謂樂不失其所也今君之所好者其溺音乎鄭音好濫淫志宋音燕女溺志衛音趨數煩志齊音敖僻驕志四者淫於色而害於德是以祭祀弗用也言四國出此溺音也為人君者謹其所好惡而已矣君好之則臣為之上行之則民從之詩云誘民孔易此之謂也誘進也孔甚也民從君之所好惡進之於善無難也君子曰禮樂不可斯須去身致樂以治心樂由中出故治心也致禮以治躬禮自外作故治身也心中斯須不和不樂而鄙詐之心入之矣鄙詐入之謂利欲生也外貌斯須不莊不敬而易慢之心入之矣易輕易也故樂也者動於內者也禮也者動於外者也樂極則和禮極則順內和而外順則民瞻其顏色而不與爭也望其容貌而民不生易慢焉是故樂在宗廟之中君臣上下同聽之則莫不和敬在族長鄉里之中長幼同聽之則莫不和順在閨門之內父子兄弟同聽之則莫不和親故樂者所以合和父子君臣附親萬民是先王立樂之方也祭法夫聖王之制祭祀也法施於民則祀之以死勤事則祀之以勞定國則祀之能禦大災則祀之能捍大患則祀之是故厲山氏之有天下也其子曰農能殖百穀夏后氏之衰周棄繼之故祀以為稷共工氏之霸九州也其子曰后土能平九州故祀以為社帝嚳能序星辰堯能賞均刑法舜能勤衆事鯀鄣洪水禹能修鯀之功黃帝正名百物顓頊能修之契為司徒而民成冥勤其官而水死湯以寬治民而除其虐文王以文治武王以武功去民之災此皆有功烈於民者也及夫日月星辰民所瞻仰也山林川谷丘陵民所取財用也非此族也不在祀典祀典謂祭禮也祭義祭不欲數數則煩煩則不敬祭不欲疏疏則怠怠則忘是故君子合諸天道春禘秋嘗忘與不敬違禮莫大焉合於天道因四時之變化孝子感時而念親則以此祭之也霜露既降君子履之必有悽愴之心非其寒之謂也春雨露既濡君子履之必有怵惕之心如將見之非其寒之謂謂悽愴及怵惕皆為感時念親也樂以迎來哀以送往致齋於內散齋於外齋之日思其居處思其笑語思其志意思其所樂思其所嗜齋三日乃見其所為齋者見其所為齋思之熟也祭之日入室僾然必有見乎其位周旋出戶肅然必有聞乎其容聲出戶而聽愾然必有聞乎其歎息之聲是故先王之孝也色不忘乎目聲不絶乎耳心志嗜欲不忘乎心安得不敬乎君子生則敬養死則敬享享猶祭也饗也唯聖人為能饗帝孝子為能饗親謂祭之能使之饗之也帝天也先王之所以治天下者五貴有德也貴貴也貴老也敬長也慈幼也此五者先王之所以定天下也貴有德為其近於道也貴貴為其近於君也貴老為其近於親也敬長為其近於兄也慈幼為其近於子也言治國有家道也曾子曰身也者父母之遺體也行父母之遺體敢不敬乎居處不莊非孝也事君不忠非孝也官不敬非孝也朋友不信非孝也戰陳無勇非孝也五者不遂災及於親敢不敬乎遂猶成也夫孝置之而塞乎天地敷之而橫乎四海施諸後世而無朝夕詩云自西自東自南自北無思不服此之謂也孝有三小孝用力中孝用勞大孝不匱勞猶功思慈愛忘勞可謂用力矣尊仁安義可謂用勞矣博施備物可謂不匱矣思慈愛忘勞思父母之慈愛己而自忘己之勞苦父母愛之喜而弗忘父母惡之懼而無怨無怨無怨於父母之心也父母有過諫而不逆順而諫之父母既沒必求仁者之粟以祀之此之謂禮終喻貧困猶不取惡人之物以事己親樂正子春下堂而傷其足數月不出猶有憂色門弟子曰夫子之足瘳矣數月不出猶有憂色何也曰吾聞諸曾子父母全而生之子全而歸之可謂孝矣不虧其體不辱其身可謂全矣故君子跬步弗敢忘孝也今豫忘孝之道豫是以有憂色也一舉足而不敢忘父母一出言而不敢忘父母一舉足而不敢忘父母是故道而弗徑舟而不遊不敢以先父母之遺體行危殆一出言而不敢忘父母是故惡言不出於口忿言不及於身不辱其身不羞其親可謂孝矣徑步邪趨疾也虞夏殷周天下之盛王也未有遺年者是故天子巡狩諸侯待見于境天子先見百年者問其國君以百年者所在而往見之祭統凡治人之道莫急於禮禮有五經莫重於祭禮有五經謂吉凶賓軍嘉也莫重於祭謂以吉禮為首也夫祭者非物自外至也自中出生於心也心怵而奉之以禮是故唯賢者能盡祭之義是故君子之教也外則教之以尊其君長內則教之以孝於其親是故君子之事君也必身行之所不安於上則不以使下所惡於下則不以事上非諸人行諸已非教之道也必身行之言恕己乃行之是故君子之教也必由其本順之至也祭其是與故曰祭者教之本也已教由孝順生祭而不敬何以為也經解天子者與天地參焉故德配天地兼利萬物與日月並明明照四海而不遺微小其在朝廷則道仁聖禮義之序燕處則聽雅頌之音行步則有環佩之聲升車則有鸞和之響居處有禮進退有度百官得其宜萬事得其序詩云淑人君子其儀不忒其儀不忒正是四國此之謂也道猶言也發號出令而民悅謂之和上下相親謂之仁民不求其所欲而得之謂之信除去天地之害謂之義義與信和與仁霸王之器也有治民之意而無其器則不成器謂所操以作事者義信和仁皆在於禮也夫禮之於國也猶衡之於輕重也繩墨之於曲直也規矩之於方圓也故衡誠懸不可欺以輕重繩墨誠陳不可欺以曲直規矩誠設不可欺以方圓君子審禮不可誣以姦詐衡稱也縣錘也陳設也孔子曰安上治民莫善於禮此之謂也故朝覲之禮所以明君臣之義也聘問之禮所以使諸侯相尊敬也喪祭之禮所以明臣子之恩也鄉飲酒之禮所以明長幼之序也婚姻之禮所以明男女之別也夫禮禁亂之所由生猶防止水之所自來也故以舊防為無所用而壞之者必有水敗以舊禮為無所用而去之者必有亂患故婚姻之禮廢則夫婦之道苦而淫僻之罪多矣鄉飲酒之禮廢則長幼之序失而爭之獄繁矣喪祭之禮廢則臣子之恩薄而背死忘生者衆矣聘覲之禮廢則君臣之位失而背叛侵陵之敗起矣苦謂不至不答之屬故禮之教化也微其正邪於未形使人日徙善遠罪而不自知也是以先王隆之也易曰君子慎始差若毫釐謬以千里此之謂也隆謂尊盛之也始謂其微時也仲尼燕居子曰禮者何也即事之治也治國而無禮譬猶瞽之無相與倀倀乎其何之譬如終夜有求幽室之中非燭何以見之若無禮則手足無所措耳目無所加進退揖讓無所制是故以之居處長幼失其別閨門三族失其和朝廷官爵失其序軍旅武功失其制宮室失其度量喪紀失其哀政事失其施凡衆之動失其宜中庸天命之謂性率性之謂道修道之謂教性者生之質也命者人所稟受率循循性行之是曰道修治也治而廣之人放效之是曰教道也者不可須臾離也可離非道也道猶道路也出入動作由之須臾離之惡乎從是故君子戒慎乎其所不恐懼乎其所不聞莫見乎隱莫顯乎微故君子慎其獨也慎其獨者慎其間居之所為也小人於隱者動作言語自以為不見不見聞則必肆盡其情若有占聽之者是為顯見甚於衆人之中為之也子曰中庸其至矣乎民鮮能久矣鮮罕也言中庸為道至美故人罕能久行之者子曰無憂者其唯文王乎以王季為父以武王為子父作之子述之聖人以立法度為大事子能述成之則何憂乎堯舜之父子則有凶頑禹湯之父子則寡令聞父子相成唯有文王也武王纘大王王季文王緒一戎衣而有天下身不失天下之顯名尊為天子富有四海之內宗廟饗之子孫保之纘繼也緒業也子曰武王周公其達孝矣乎夫孝者善繼人之志善述人之事者也表記子曰仁有三與仁同功而異情利仁強仁功雖與安仁者同本情則異也與仁同功其仁未可知也與仁同過然後其仁可知也仁者安仁智者利仁畏罪者強仁功者人所貪過者人所避子曰君子不以辭盡人不見人之言語則以為善言其餘行或時惡也故天下有道則行有枝葉天下無道則辭有枝葉行有枝葉所以益德也言有枝葉是衆虛華也枝葉依幹而生言行亦由禮出也是故君子於有喪者之側不能賻焉則不問其所費於有病者之側不能饋焉則不問其所欲有客不能館焉則不問其所舍皆避有其言而無其實也故君子之接如水小人之接如醴君子淡以成小人甘以壞水相得合而已酒醴相得則敗淡無酸酢少味也不以口譽人則民作忠故君子問人之寒則衣之問人之飢則食之稱人之美則爵之皆為有言不可以無實也緇衣子言之曰為上易事也為下易知也則刑不煩矣言君不苛虐臣無姦心則刑可以措也子曰夫民教之以德齊之以禮則民有格心教之以政齊之以刑則民有遁心格來也遁逃也故君民者子以愛之則民親之信以結之則民不背恭以之則民有遜心臨也遜猶順也子曰下之事上也不從其所令而從其所行言民化行不拘於言也上好是物下必有甚矣甚者甚於君也故上之所好惡不可不慎也是民之表也言民之從君如影之逐表子曰禹立三年百姓以仁遂焉豈必盡仁言百姓效禹為仁非本性能仁也子曰上好仁則下之為仁爭先人子曰王言如絲其出如綸王言如綸其出如綍言言出彌大也綸今有秩嗇夫所佩也綍引棺索也故大人不唱遊言遊猶浮也不可用之言也可言也不可行君子弗言也可行也弗可言君子弗行也則民言不危行而行不危言矣危猶高也言不高於行行不高於言言行相應子曰君子道人以言而禁人以行禁猶謹也故言必慮其所終而行必稽其所敝則民謹於言而慎於行稽猶考也詩云慎爾出話敬爾威儀話善言也子曰為上可望而知也為下可述而志也則君不疑於其臣而臣不惑於其君矣志猶知也上人疑則百姓惑下難知則君長勞難知有姦心也故君民者章好以示民俗慎惡以御民之淫則民不惑矣淫貪侈也孝經曰示之以好惡而民知禁也子曰大臣不可以不敬也是民之表也邇臣不可以不慎也是民之道也民之道言民循從也子曰大人不親其所賢而信其所賤民是以親失而教是以煩親失失其所當親也教煩由信賤者也賤者無一德也子曰民以君為心君以民為體心莊則體舒心肅則容敬心好之身必安之君好之民必欲之心以體全亦以體傷君以民存亦以民亡莊齊莊也大學堯舜率天下以仁而民從之桀紂率天下以暴而民從之其所令反其所好而民不從言民化君行也君好貨而禁民淫於財利不能止也是故君子有諸己而後求諸人無諸己而後非諸人所藏乎身不恕而能喻諸人者未之有也故上老老而民興孝上長長而民興悌上恤孤而民不背所惡於上無以使下所惡於下毋以事上所惡於前毋以先後所惡於後毋以從前所惡於右毋以交左所惡於左毋以交於右詩云樂只君子民之父母民之所好好之民之所惡惡之此之謂民之父母言治民之道無他取於己而已好人之所惡惡人之所好是謂拂人之性災必逮夫身拂猶佹逮及也昏義昏禮者將合二姓之好上以事宗廟而下以繼後世也故君子重之男女有別而後夫婦有義夫婦有義而後父子有親父子有親而後君臣有正故曰婚禮者禮之本也夫禮始於冠本於婚重於喪祭尊於朝聘和於鄉射此禮之大體也古者天子后立六宮三夫人九嬪二十七世婦八十一御女以聽天下之內治以明章婦順故天下內和而家理也天子立六官三公九卿二十七大夫八十一元士以聽天下之外治以明章天下之男教故外和而國治也故曰天子聽男教后聽女順天子理陽道后治陰德天子聽外治后聽內治教順成俗外內和順國家理治此之謂盛德也是故男教不修陽事不得見于天日為之食婦順不修陰事不得見於天月為之食是故日食則天子素服而修六官之職蕩天下之陽事月食則后素服而修六宮之職蕩天下之陰事故天子之與后猶日之與月陰之與陽相須而後成者也之言責也蕩蕩滌去穢惡也射義古者諸侯之射也必先行燕禮卿大夫士之射也必先行鄉飲酒之禮故燕禮者所以明君臣之義也鄉飲酒之禮者所以明長幼之序也言別尊卑老稚乃後射以觀德行也故射者進退周還必中禮內志正外體直然後持弓矢審固持弓矢審固然後可以言中此可以觀德行也內正外直習於禮樂有德行者其節天子以騶虞諸侯以貍首大夫以采蘋士以采蘩故明乎其節之志以不失其事則功成而德行立德行立則無暴亂之禍功成則國安故曰射者所以觀盛德也騶虞采蘋采蘩今詩篇名也貍首亡也是故古者天子以射選諸侯卿大夫士射者男子之事因而飾之以禮樂也故事之盡禮樂而可數為以立德行者莫若射故聖王務焉選士者先考德行乃後決之射也男子生而有射事長學禮樂以飾之是故古者天子之制諸侯歲獻貢士於天子天子試之於射宮觀其容體比於禮其節比於樂而中多者得與於祭其容體不比於禮其節不比於樂而中少者不得與於祭數與於祭而君有慶數不與於祭而君有讓數有慶而益地數有讓而削地故曰天子之大射謂之射侯射侯者射為諸侯也射中則得為諸侯射不中則不得為諸侯大射謂將祭擇士之射也得為諸侯謂有慶也不得為諸侯謂有讓也故射者仁之道也求正諸己己正而後發發而不中則不怨勝者反求諸己而已矣孔子曰君子無所爭必也射乎
